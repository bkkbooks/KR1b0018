body:
  text: 尚書精義卷四十五宋黃倫撰成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命無垢曰夫逺夷以善心來則人主當賞玩其心使其於尊親之義知所涵泳此亦長善之一端也賞玩其心當見於實幣帛所以實之也恐逺夷不足以知此意此成王所以俾榮伯作命也敷述此意非有道德深究聖人用意處者不足以發揚之在庭之臣亦衆矣而俾榮伯則榮伯之為人可知也東坡曰東夷淮夷也在周為東肅慎東北逺夷也周公在豐將沒欲葬成周公薨成王葬於畢告周公作亳姑無垢曰營洛之時大會四方諸侯而復子明辟以正君臣之義此古今臣子之大法也夫七年之攝政制禮作樂朝天下諸侯於明堂以此太平天下一旦兩手付與成王退而就臣子之列大會諸侯於洛時為此盛舉周公平生大節無出於此故葬成周此周公之意以謂吾死亦不忘大節也其為天下萬世臣子之計亦已大矣又曰自周公至周公作亳姑蓋皆孔子序作書本意也然周公欲葬成周而成王乃葬於畢周公有死於大節之意成王有尊師重道之意各尊其所聞各行其所知其盛矣哉然而周公雖不獲葬成周不得盡見其死於大節之意孔子乃為序書明言其故使天下後世炯炯見周公之心焉是不葬猶葬也使無孔子誰與發明此大義哉東坡曰畢有文武墓葬公於畢示不敢臣也亳姑蒲姑也周公告召公作將蒲姑至此并告已遷歟周公既沒命君陳分正東郊成周作君陳孔氏曰成周周之下都監成周者正是一邑宰爾而特命君陳大其事者成王重周公所營猶恐殷民有不服者故命君陳分居正東郊成周之邑無垢曰其曰分正則使分其善惡而正其是非善者當世以為是而慕之惡者當世以為非而恥之畢公旌别淑慝表厥宅里蓋發端於此又曰鄭氏以君陳為周公子也余考一篇中略無此意然而以繼周公必當世大賢者何必周公子哉抑又有可歎者舜命九官一編已足而成王命君陳近數百言帝王煩簡可概見矣世之浮漓亦可概見矣吁可歎也陳氏曰鄭氏以君陳為周公之子或曰不然成王先命君陳而後命畢公畢公弼亮四世豈以周公之子先四世之老臣哉然則君之命臣以先後為老壯固未必然至於以為周公之子其不然必矣周公命康叔曰乃丕顯考文王又曰乃穆考文王成王命蔡仲曰無若爾考之違王命父子之苖裔見於告戒之辭如是之審况周公叔父有大勳勞於成王今命其子以繼父事獨無懿親之語但曰昔周公師保萬民又曰爾式時周公之猷訓又曰爾𢎞周公丕訓若言他人然決無是理也君之命辭雖曰告戒亦兼以寵其存沒成王命微子且曰殷王元子曰乃祖成湯克齊聖廣淵安有命周公之子而不以父子之辭寵之哉張氏曰成周之東郊近於妹邦周公嘗遷頑民於此而親治其既沒也命君陳而繼焉君陳王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉無垢曰夫尹東郊頑民非細事也必須遴選其人今東郊之民治之不可以急又不可以緩惟性溫晏不言而飲人以和與人並立而使人化者乃可以治君陳令德孝恭想見其為人矣夫孝恭之人居則氣貌溫良行則政事和粹以此等人在頑民之上其有不令人意消者幾希然而有孝恭而不能用以此自律則可以此濟物則暗於幾務失於大體其不招侮而召辱者寡矣君陳乃能用孝以友於兄弟又能用孝而施於有政則其紬繹事幾調燮乖戾胸中自有造化矣以此治頑民必有可觀者又曰孝恭之人日在敬中往來今成王又戒之以敬者何也嗚呼人之難保也甚矣惟聖罔念作狂聖而罔念猶作狂夫况未至於聖者可不戒乎舜自匹夫而為天子其道著聞亦已舊矣年餘九十而益方戒之以罔淫於逸罔遊於樂聖其可罔念乎林氏曰或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政百行之始莫大於孝在家則友于兄弟在邦則克施有政孝之施於政也愛敬而已蓋王者愛敬盡於事親而德教可以加乎四海然則施之有政有政者又豈難哉當周公既沒之後命君陳分政之初其所以命之無他語而惟及於孝友令德者何哉當使君陳念兹在兹無替前人之遺訓無墜大臣之美化使其終始惟一前後協同收其治功繼其成烈卒至於永永無窮斯可矣宜乎成王命之之辭丁寧勑戒以敬哉之語有旨哉吕氏曰師保東郊周家之重任周公既沒成王選揀分正東郊之人當時如太公畢公厚德重望布在朝廷者不為不賢然成王所以選君陳之意有兩説一説周公在成周師保萬民民懷其德所為綱紀法度一切備具了若使一箇才智人去便作聰明亂舊章所以選一箇孝弟純謹人庶不忍變周公之法度一説當時商民染紂之惡所謂天其與我民彝大泯亂如子弗服厥父事於弟弗念天顯乃弗克恭厥兄父子兄弟乖爭淩犯至於如此今欲治之惟有孝弟之人去儀刑他感動自化此成王所以獨命君陳昔周公師保萬民民懷其德往慎乃司兹率厥常懋昭周公之訓惟民其乂無垢曰周公聖人其訓有難以常情測知者蓋聖人見識甚髙所施為逈出於常情之外有事若疏而實密者有計若迂而實切者有防禍於千百年之後者有止亂於朝夕之間者其歸皆在於乂民使民安泰而已君陳以賢繼聖想於其遺訓有不能盡知者然君陳不欲乂民則無可言者儻欲乂民其於周公之訓其可不勉強學問以昭明之乎惟周公之訓逈出常情此所以必待勉強學問乃能一窺其事之萬一也林氏曰化及當時之人易化及後世之人難化止於目前者猶未至民懷於永久者為甚至昔召公之於南國美化興行人思其德甘棠至於勿剪勿伐既沒之後人懷不已究其所以然者不過聽訟一事耳又況周公以嚴教之而民不懷其德者未之有也今君陳紹有令緒時底盈成無可為者但嗣守大訓無敢昏逾斯可矣我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫無垢曰周公猷訓自明德中來也吾能因其言而求其心因其心而引吾心則吾之明德見矣然而先難後獲仁者之所為先事後得崇德之所尚則式法猷訓以求明德所在者不可以易心求之也當惟日孜孜以精其念慮當無敢逸豫以收其放心功深力到明德見矣明德既見尹正東郊沛乎其有餘矣陳氏曰君子以情用小人以刑用故禮教刑辱以加君子化以情也桎梏鞕朴以加小人化以刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若教化之廢推中人而墜於小人之域教化之行引小人而納於君子之塗以是為明德馨香之説嗚呼小人不忌刑則或有之矣其果不畏辱乎榮辱者教化之大權也明德在上則小人畏辱而為君子安有刑情之分耶有刑無情木偶人爾何化之有分刑情而言教化是不知教化而強言之也史氏曰不欺於天地有以見大臣愛慎之心不易其典常有以見人君責望之意夫以周公之聖而臨商民之頑甚易事耳然周公每以事天地之心而為待頑民之心故其治馨香四逹上際於天下蟠於地其求於德而不求於物蓋有素也周公嘗行是道成王嘗聞是訓今能用其道訓思之而不忘行之而不倦則成王之治有不足慮矣張氏曰善者陽之類其發為馨香惡者隂之類其發為臭穢馨香者人之所好臭穢者人之所惡至治之世上恬下熙禮制樂作叶氣嘉生薰為太平此其所以為馨香也至治之世其馨香之逺聞故可以感於神明神明為難感君非有馨香不足以感之雖然至治之所謂馨香者非黍稷之馨乃明德之馨而已謂之馨香者其香之逺聞者也三苖之虐發聞惟腥商紂之惡穢德彰聞以此觀之則惟至治為馨香而馨香出於明德可知矣凡人未見聖若不克見既見聖亦不克由聖爾其戒哉爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹林氏曰凡人之情未見聖則思欲見之既見聖未必能由聖之所行今君陳親見周公故勉之以化又曰柔而不能立者下民之無知動而有所化者人君之至術惟其含仁厚之性惟上命是從則動而化之豈可後哉夫然上之化下下之從上莫不披靡而向風遷善而不知其可不戒哉又曰政之當否必繫國之安危國之安危在審理之是非是以出入之際當以衆智度之而庶言既同則又當擇其可否當於理則行之不牽當世之浮言不屈衆人之異論窮其本緒詰其涯涘而不蔽於一曲矣東坡曰夫言有同異則聽者有所考言其利也必有為利之道言其害也必有致害之理反覆論辨廷議而衆決之長者必伸短者必屈焉真者必遂偽者必窒焉故邪正之相攻是非之相稽非君子之所患者庶言同而已考同者莫若繹古者謂紬繹絲者必求其端究其所終太甲曰有言逆于汝心必求諸道有言遜於汝志必求諸非道太甲之所謂求也爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉林氏曰善則稱君惡則稱己者臣下之美事臣能歸美以報其上者臣下之當然夫人之愛君者豈特貪天之功以為己有蓋世之能以為己分必有謀焉則義而決之必有猷焉則擬而圖之入告其君使稱其德意非我之所能如此此我后之德也於是嗟呼而告之曰臣人苟能順是此所以為良顯之道也今以易考之坤之一卦人臣之義也其辭有曰隂雖有美含之以從王事弗敢成也言隂非無美而不可見美以先陽臣雖有美不可専美以先君故含章以從王事代上以從事不敢尸其功豈不以地道之於天順從之而已觀易之辭與書之旨相為表裏王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和無垢曰凡人之情以其難化則必作威以懼之刻削以苦之作威非崇髙之勢則不行刻削非三尺之法則不效今君陳為東郊之長勢亦髙矣一邑號令載在令甲法亦具矣儻不推聖王之心以其難化也乃依勢以威之倚法以削之有何不可苐可以革其面而不可以服其心平居無事包藏禍心不見其迹一旦有急則疾視其上而為叛為亂以報復其上矣聖王之道務有以慰人心者以天下之理當如是也又曰夫寬則優遊而不迫有制則民防範而不過寬以慰之有制以節之從容此道以和之使民愛慕感激涵泳鼓舞依依乎繩約之中而無強很傲誕乖爭凌犯之心者此正和民之道也周公丕訓正在於此張氏曰勢者上之所以臨下也依勢作威則失於不仁法者君之所以治民也倚法以削則失於不義依勢作威則用義以讐民之身者也倚法以削則用義以斂民之財者也用義讐斂商之所以亡者在此君陳不可不戒之也居上之道雖貴乎寬寬之失常在於縱故欲其有制畜衆之道雖貴於容容之失常在於同故欲其以和寬而有制則剛柔足以相濟矣從容以和則可否足以相濟矣惟其剛柔可否足以相濟此德所以無一偏之失也吕氏曰所謂勢乃分正東郊之勢本不是君陳之勢所謂法乃周家之法本不是君陳之法君陳須至公無一毫私意不可依公家勢作自家威力使公家法去侵削人才依法便是私心此便非代天理物殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中無垢曰法者天下之大中與天下共守之者也非人主所得而私也昔漢文帝欲殺盜環驚馬者而張釋之不從此人主不得私殺人當以法為中也漢光武欲赦公主家奴而董宣不從此人主不得私宥人當以法為中也與天下共守此中則殺之者不以為怨宥之者不以為德君子有所怙小人有所懼處事之當無出於此林氏曰中之為道無施不可苟恃勢以愛人則失其中倚法以斂民則失其中惟寬失於縱故欲其有制從容者失於同故欲其和蓋臨人之道當審乎此刻核太至則不肖之心應之奢侈太至則非理之情報之誅求無厭則亂之由階聚斂太重則下之不足惟能寬得其法則奉以周旋罔敢失墜施為注措皆得其平孰謂非中可乎有弗若于汝政弗化于汝訓辟以止辟乃辟狃于姦宄敗常亂俗三細不宥張氏曰政以正之而有所不順訓以導之而有所不變則是其頑不可率矣於是可以致辟焉然則聖人不得已然後用刑則刑者期於無刑而已故曰辟以止辟乃辟無垢曰羊有敗羣羊之所以不育禾有稂莠禾之所以不蕃狃於姦宄敗常亂俗之人所以倡頑民為亂者也其可不刑乎端本清源正在於此此三等輩所為雖未見於大惡而微有是心者皆刑之而勿宥也辟以止辟正謂此爾吕氏曰若頑民有不順爾政不化爾訓爾要刑治他也須仔細若刑一箇人止得後來不犯法如此方刑若刑一箇人未可止絶後來犯法則不可刑何故在商民固被周公之化然舊染汚俗一一治他不得須去要領上治刑一人千萬人懼如一一治他則刑濫矣雖是如此若有怙終不悛之人雖三犯細罪也不可赦何故這是倡亂之人與尋常犯罪者不同如尋常犯罪者是舊染汚俗此不可罪若倡亂之人雖三細也不赦如此治之乃得其要領上治刑便自簡爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大無垢曰夫各有所長故禆諶謀於野則獲謀於國則否孟公綽為趙魏老則優不可以為滕薛大夫豈可求備乎哉隨其所長而器使之故小以成小大以成大則山川丘陵草木裕如也而况人乎成王使君陳涵養優容之意可於言辭間得之矣又曰嗚呼成王之待頑民何其仁厚如此也一篇之中皆以仁厚為宗如曰無依勢作威無倚法以削曰寬而有制從容以和曰辟以止辟乃辟今又曰有忍乃有濟有容德乃大仁厚之心間見層出聖王之道槩可知矣又曰白起不忍殺四十萬人項羽不忍殺二十萬人徒使人怨恨刻骨耳安能有濟乎見纍犯者若不可寬容曹操不容殺孔融黃祖不容殺禰衡徒使天下解體深忿其狹隘耳德果為大乎東坡曰有殘忍之忍有容忍之忍春秋傳曰州吁阻兵而安忍此殘忍之忍孔子曰小不忍則亂大謀此容忍之忍古今語皆然不可亂也成王指言三細不宥則其餘皆當宥之曰必有忍乃其有濟者正孔子所戒小不忍則亂大謀者也而近世學者乃曰當斷不可以不忍忍所以為義是成王教君陳果於刑殺以殘忍為義也夫不忍人之心人之本心也故古者以不忍勸人以容忍勸人則有之矣未有以殘忍勸人者也不仁之禍至六經而止今乃析言誣經以助發之豫不可以不論簡厥修亦簡其或不修進厥良以率其或不良林氏曰舜有天下選於衆舉皋陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣今當成王之時周公毖商頑民遷於洛邑密邇其訓則昔之心不可馴者今則善惡半矣在乎正之直之輔之翼之使自得之又從而振德之正賴君陳之力此成王之於分正之際不可不申言也今簡其修德之人使其不修者得以勸進其良善之人使其不良者得以率此正舜湯之遺意張氏曰修見於所為者也良出於所性者也見於所為者有修有不修簡其修者則不修者知所勸出於所性者有良有不良進其良者則不良者知所勵惟民生厚因物有遷違上所命從厥攸好無垢曰所以使君陳無忿疾無求備且容且忍而簡其修潔進其善良者則以成王真有所見也所見維何頑民其生本厚其所以澆薄至此者非其本性也因紂之惡習遷染耳如此豈有忿疾豈敢求備所以能忍所以能容也又曰孟子曰有物必有則民之秉彝也故好是懿德故堯舜率天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從君陳將欲變商之舊習汚俗不必諄諄於號令也莫若謹其所好耳文王雍雍在宫肅肅在廟所好如此故江漢遊女無思犯禮伐條婦人勉夫以正紂為天下逋逃主所好如此故殷罔不小大草竊姦宄違上所命從厥攸好豈非明甚然我謹其所好而民未化焉是吾好之猶未盡也孟子曰行有不得者皆反求諸已其身正而天下歸之其至矣哉林氏曰孟子曰人性善成湯曰惟皇降𠂻於下民若有恆性觀此則知民之生厚尚矣然多至於窮人欲滅天理梏喪其良心戕賊其正性蓋由因物而遷也孔子曰君子之德風小人之德草又曰上有好者下必有甚焉則知民之從行不從令久矣君仁莫不仁君義莫不義君正莫不正則知上之好為民之表固不可不謹也斯民不俟教誥視儀而動不令而行其不然乎爾克敬典在德時乃罔不變允升于大猷無垢曰爾敬典則殷民父子兄弟之恩深爾在德則殷民父子兄弟之性著恩深則交相親愛性著則自然和樂向來乖爭陵犯之風一變而為親愛和樂之俗向來遺殷頑民今與周民偕升于大道其盛矣哉又曰治國猶治病而不知病之所因則病無自安治國而不知國之病處則國無自治殷民之病病在風俗之薄救民俗之薄在我躬行而已是躬行者乃藥風俗之本也躬行者敬典在德也敬典則五常明在德則五常行張氏曰典在外者也欽之而不敢慢德在我者也在之而不敢廢上能欽典則民化之而不至於敗常上能在德則民化之而不至於亂俗則無或狃於姦宄也時乃罔不變者言其變惡而從善也惟豫一人膺受多福其爾之休終有辭於永世無垢曰人君不言福以風俗敦厚為福使人人有士君子之行此人君之多福也今商俗丕變商民偕升於大道人心忠厚風俗醇朴人君親享此時豈非膺受多福乎又曰風俗敦厚豈特為成王福哉君陳之美名亦不泯沒于後世矣其曰終有辭於永世者以見聖王期於人者甚逺也昔子産為政一年而民欲殺之三年而有誰其嗣之之歌向使子産求名於旦暮則鄭國何時可理乎惟賢者不求名朝夕而自期者甚逺聖王亦不責人於朝夕而期人者亦甚逺此所以賢者終享美名而聖王亦終享其成功也其曰終有辭於永世則成王之所存者盛矣哉

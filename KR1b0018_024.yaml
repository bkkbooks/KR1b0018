body:
  text: 尚書精義卷二十四宋黄倫撰周書惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇無垢曰武王待紂二年而不悛亦終焉為惡而已矣故十三年正月決意渡孟津而伐之也東坡曰謂文王受命九年而崩武王以大統未集故既位而不改元十一年喪畢觀兵於商而歸伊川曰一月者商厯已絶周厯未建故用天正今月之正也不書商厯以見紂自絶于天矣聖人一言一動無不合乎天理如此吴氏曰𫝊言卜諸侯伐紂之心非也且紂之惡天下共棄之武王觀兵不期而㑹者十三國伐紂之心固可知也豈待卜諸侯之心哉若是則乃是武王急欲取天下也觀兵孟津者所以警紂欲其悛心已而無自懼之意故伐之也若湯放桀之時湯貢伊尹而桀不用亦此之義也李定曰孔氏曰退以示弱或曰武王之退非示弱而襲之眀矣觀兵孟津者冀紂能知懼而反善也以予考之亦猶舜禹之征苖而班師振旅也始之往也順天應人而已矣及其至也猶兾其警悟而還之此篇云觀政于商則或人心之有所未絶天命之有所未終者于是退歸以俟之然舜禹之歸也苖民乃格此篇云惟紂罔有悛心又曰時哉不可失然後知人心已絶而天命已去於是誅其獨夫而拯其民於塗炭也易曰先天而天弗違後天而奉天時武王之謂也李石曰周文王没後九年丁丑武王觀兵于孟津又二年也己夘伐商編年厯丁夘文王斷虞芮之訟乃受天命後九年乙亥文王没又二年丁丑武王伐商其厯年甲子至此不同矣按泰誓惟十有一年武王伐商皇極經世盖本乎此編年厯斷以丁夘為文王受命至乙亥文王没凡九年又二年丁丑武王伐商是用尚書著泰誓惟十有一年者通文王受命武王即位而言也楊氏曰或曰周文既未嘗改元革命而周書首曰惟十有一年春復何謂而云乎荅曰盖追而書之爾仲尼已於商書伐君之始也貶伊尹以誅亂臣賊子焉泊周書則原周之所以得天下商之所以失天下為人君戒也紂之失天下也非敗於牧野之日而驟失之也周之得天下也非克於牧野之日而驟得之也夫得天下有道得其民斯得天下矣得其民有道得其心斯得其民矣故原紂之失天下心周之得天下心自虞芮質厥成始焉武王曰我文考文王大邦畏其力小邦懐其徳誕膺天命以撫方夏惟九年大統未集仲尼由是斷為受命之年焉若曰周之有天下也已十年矣紂之所存者唯位與號而已以十年有天下之周而伐已失天下之商則又豈一朝一夕之故哉孟子曰聞誅一夫紂矣未聞弑君也是故惟十有一年春云者仲尼討紂而與周之筆也不亦為君人者之戒乎顧氏曰十有一年者抑商之正朔邪抑周之正朔邪曰周之正朔也将周之文王邪武王邪曰周之文王也然則文王之生既為天子矣曰固也棫樸之詩曰周王于邁六師及之夫六師者天子之事也文王之征諸侯也固己為天子之軍討之矣此曰惟戊午王次于河朔當是時也商存焉而武王既嗣而為王矣此所以見文王之為天子也夫紂雖不道而猶存也文王烏得為天子哉曰文王之為天子以天而大義故也紂雖不道而猶存者聖人之仁心也夫文王之於紂也亦盡矣炮烙之刑天下無有敢言者而文王特言其不可黎侯之征不在乎成周之義而在乎懼紂之心言之而不用懼之而不悛可伐也林氏曰夫紂君也武王臣也以臣伐君天下之至逆武王豈好逆天下之大順而樂為此慙徳之舉哉盖有不得已於其間也齊宣王問於孟子曰臣弑其君可乎曰賊仁者謂之賊賊義者謂之殘殘賊之人謂之一夫聞誅一夫紂矣未聞弑君也紂之為君既失夫為君之道神怒之民怨之則武王不得不應天順人以伐紂非敢加無禮於其君也盖以紂失為君之道而天下之人既不以之為君矣則我雖欲不興師以伐之不可得也張氏曰窮則變往則返天地隂陽之常理也當紂之時天下之否極矣武王之伐紂将以傾否而為泰故其誓謂之泰誓惟十有一年武王伐殷者文王九年大勲未集而武王終文王之喪三年然後廣文王之聲而卒其伐功故稱十有一年一月戊午師渡孟津者一月即十三年正月也盖武王之伐紂至于孟津而反所以觀政于商盖亦兾其改悔而後已故服喪三年觀政三年繼文王之九年所謂十有三年者此也吕氏曰君臣之分天尊地卑不相犯當紂人心未離天命未絶武王事紂之心未嘗不至及紂人心已離天命已絶不可一時令他據天位武王亦不得不伐豈待三年而後致伐哉稱一月戊午不言正者紂之正朔已亡周之正朔未建此聖人作春秋之意春秋十二公惟定公無正不言正月盖以昭公喪在外定公未立舊君之天命已終新君之正朔未頒一月之辭聖人於毫釐之際謹嚴如此盖所以正天地之大義也泰誓上惟十有三年春大㑹于孟津王曰嗟我友邦冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰眀作元后元后作民父母無垢曰史記云八百諸侯皆曰紂可伐矣則是武王與八百國之諸侯及八百國卿士大夫之心皆一而無貳皆誠而非偽故同為此舉也天下之心如此武王特因天下之心而倡之耳使其間有一夫異心則是武王之舉乃盗賊而非天意也又曰人惟萬物之靈在萬物中為最靈者耳至元后則大不相似是元后於萬物之中又超然聰明出乎萬靈之上靈謂靈於萬物耳至於聰明又豈止於靈而已哉惟聰則所聞者逺惟明則所見者深聰眀安可强作耶惟天生聰明實異於衆人者乃能合天而為君耳元后聰眀在萬靈中所謂出乎其類㧞乎其萃者也惟其聰眀如此故其所聞所見髙出乎四海九州之上而為天下父母其政教法制無非保䕶斯民有同赤子盖民比萬物曰靈比聰眀之君則為至愚矣儻非聰明之君保䕶之其蹈害而貽禍必矣紂為元后而以淫酗倡率天下使皆為淫酗之民為民父母當如是乎嗚呼元后之任亦大矣天地為萬物父母耳而元后乃為萬靈父母可不自重武王将以數紂之罪故先立此四句以見人主之任其重如此也張氏曰友邦者親之也冢君者尊之也又曰萬物盈於天地之間無天何生無地何形此天地為萬物之父母也然水火有氣而無生草木有生而無知禽獸有知而無義人則有生有知又且有義此人所以獨靈於萬物矣靈者神之降而在人者也人為萬物之靈非亶聰明不足以治之仲虺之誥曰惟天生聰眀時乂此亶聰眀而後作元后者亶聰眀者言其聰明之徳充實乎内坦然而行之者也與所謂作聰眀者異矣元后之於民治之以義所以制其强撫之以慈所以恤其弱有以制之則民必尊之有以撫之則民必親之尊之親之父母之道也紂之無道喪其聰眀殘害于爾萬姓不足以作民父母此天之所以震怒而命武王以伐之也吕氏曰大哉乾元萬物資始至哉坤元萬物資生凡有形有氣皆受天地之中以生故天地為萬物之父母人者天地之心也故惟人最靈天地以一元之氣丕冒天下本無厚薄惟得其精與粹者為人得其偏與凡者為萬物皆自然而然莫之為而為者亶者言其誠實也聰眀非靈之外别有一箇聰眀不過得精粹清徹便作元后此言人君之職分作民父母此見與天地同功處此數句雖是武王因伐紂而言然百聖之相傳六經之總㑹皆不過此道理此最精處學者能含味此四句則可以通貫六經親見百聖今商王受弗敬上天降災下民沈湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅将天威無垢曰昬庸之君以謂蚩蚩之民耳而不知民心即天心也民喜即天喜民怒即天怒不以民為心是不以天為心也然則降災下民者豈非不敬上天乎夫有天下者所戒莫過酒色殺人耳有一於此未嘗不敗亡者也豈有為人君者若不肖子弟而耽酒濫色若凶惡盗賊而酷暴虐殺乎顧此資質在下則天子誅之在上則天下誅之此宇宙中所不容者也又曰舜罰弗及嗣而紂乃罪人以族舜賞延于世而紂乃官人以世是其所為每與舜相反矣由舜之道足以得天下由紂之道足以亡天下人主當自擇焉賞與官人有别乎曰有賞以祿耳而官人乃不問賢不肖皆使在位當紂之時受紂之私恩者決非賢者也然則湯有孥戮之刑則如之何曰戮辱也非族之謂也湯肯族誅人乎決不然也又曰自義理而行則以民為重自人欲而行則宫室臺榭陂池侈服為重以民為重則如漢文惜十家之産而罷營露臺以宫室至侈服為重所以紂殘害萬姓營此不急之舉而不恤也吁人欲其可畏哉然人欲不行於茅屋衡門之間而每行於四海九州之主茅衡之下衣敝履穿羹藜飯糗人欲何自而行乎尊臨四海雄覇九州號之則聽禁之則止人欲恣行無所忌憚不足怪也此臯陶所以告禹而曰兢兢業業湯得天下所以言慄慄危懼唯恐人欲之起也為天下君者常以民為心則發一號施一令興一事廢一法唯恐有害於民安得至此極耶又曰君天下自有君天下之資亡天下自有亡天下之資不可强也觀紂資禀乃盗賊之雄者耳天欲亡商必生此人良可痛也夫忠良而焚炙之孕婦而刳剔之此何等法度亦將何所不至哉當時商家在廷賢者為多不知忠良為誰也皇甫謐云紂剖比干妻而視其胎嗚呼殺諫臣而刳其妻又殺其未産之子凶虐如此此所以能亡商家之社稷歟又曰紂之凶暴如此此豈天心也哉天下之心皆怒是乃皇天震怒也紂凶暴臨於四海而文王忠厚亦臨於四海四海之人皆憤怒紂而歸心於文王欲文王舉湯故事而征之民心如此是乃天命文考肅將天威也西伯戡黎則文王嘗行天威以警紂矣使文王不死豈止戡黎而已哉此非文王私意也天下之心也天下之心天之心也自堯舜以來積至于商凡千七百有餘國而文王聖徳獨卓然出乎諸國之上則天之生文王正所以伐紂也吕氏曰聖人雖相去千百里之逺求其端則不過公私而已惟其公則天地萬物都如一體上則翼翼小心順帝之則下則慄慄危懼懐保小民惟其私則限七尺之軀此外皆壅蔽隔絶以天為蒼蒼空虚之物而不知敬以民為蚩蚩無知之物而不知愛又沈湎冒色只是一個昬昧但知七尺之軀養其體所以冒於聲色無所忌惮元初之聰明已自斵喪殆盡或㡬乎熄矣又曰人誰無好惡好惡出於公心便有節出於私意便無節惟紂出於私意故惡一人不己必至族族一人不己必及其世又曰紂之惡極天之怒亦與之俱極天之於人叩之小則小鳴叩之大則大鳴此見天人一體處紂之所以為惡只是一箇弗敬上天文王之所以為聖只是一箇肅将天威若是毫髮怠惰便是人欲非天威大勲未集肆予小子發以爾友邦冢君觀政于商惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮無垢曰西伯戡黎而紂改過與夫紂不改過而文王卒有天下則是大勲己集也自戡黎之後紂雖不改過而文王不幸死矣是文王之所以受天之付託者未成其功也文王既死紂之凶惡不改武王繼父之志述父之事豈得恝然坐視而不顧哉故十有一年以爾友邦冢君起伐紂之師至孟津而不渡所以伺察商之政事警紂之邪心使之遷善改過退而不伐盖以俟紂之改過也則周家忠厚之意可謂深逺矣又曰嗚呼弗畏天地百神祖先宗廟豈畏武王之兵哉事至於此無可為矣想紂之心寧燔身懸首以取快終不肯改過自新以遷善也又曰古之祭祀於犧牲粢盛甚嚴且謹祀五帝則芻之三月天子親帥三公九卿以有事於耕耤以供天地祖宗之粢盛其所以如此者上以荷天地之付託下以承祖宗之基業示不敢輕之意也今祀天地犧牲粢盛之物盡為凶盜所攘竊而啖食之紂乃縱而不問其罪是與凶盜同心也是不有天地宗廟也是以天地之付託祖宗之基業委之於凶盜也不祥莫大焉犧牲粢盛為凶盜所攘或以為不可乃曰吾有民以謂天下之民死生在我吾有命以謂吾既為君天命在我何所不可哉凶盜攘竊犧牲粢盛人以謂當殺我以謂無害忠良諌輔人以為當用我以謂當殺在我意耳有何不可哉其侮慢之心滋甚上至天帝下至后土旁至百神親至祖考略無分毫懲創改悔之心不燔身懸首則不已小人無賴為凶盜者類如是乃以置四海九州之上商緒何其不幸哉東坡曰若其悛也則武王當北面事之歟曰否文王武王之王也久矣紂若改過不過存其社稷宗廟而封諸商使為一王後也余竊以為不然武王誅紂尚使武庚微子為商後使紂改過安得僅同武庚微子乎此非所以論武王也聖賢所為豈至於此苐未深思之耳惟其罔有悛心偃然如舊略不知改此武王所以決意伐之而無退志也劉氏曰觀兵孟津者所以憚紂也欲其畏威悔過反善自修也如紂遂能改過武王亦北面事之而已矣然則進非示强也退非示弱也進所以警其可畏退所以待其可改及其終不畏終不改然後取之足以知武王之退非示弱而襲之眀矣張氏曰人君者神民之主也今紂弗事神祇遺厥宗廟大則自絶于天地逺則自絶于先王則其為惡無過於此然其昏迷曽不自悟乃曰吾有民有命言有民可以守邦有命可以享國此其惡之有加而無已也惟其如此故罔懲其侮夫人必自侮然後人侮之紂之罔懲其侮則有自侮之道此武王所以伐之也陳氏曰聖人之舉事其圖終也甚審其發端也甚謹堯舜不為惡與桀紂之不為善如水之不可使熱如炭之不可使寒安有改過之理武王觀兵猶或庶㡬紂有悛心者仁厚之辭也君臣之分不敢以遽瀆也故武王退守臣節遲以數年紂死而諸侯歸周亦無不可然紂惡極矣民窮久矣天怒甚矣武王不得已而再駕亦武王之所甚病也吕氏曰先儒以大勲未集謂文王不能定天下故勲未集以此觀文王却是以利心觀盖天以肇修人紀整頓天下付與文王當其天命未絶人心未離時文王能定亦是大勲既集若使紂一旦幡然改悔率天下諸侯以朝王雖謂之大勲既集亦可文王既不能滅紂又不能化紂此大勲所以未集天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志無垢曰天之愛民如父母之愛赤子豈容殘害如紂者在民上恣為苛政暴刑以殺斯民哉所以作君師以救民也夫桀無道則天生聰眀如湯者以乂之紂為無道則天佑君師如武者以救之有桀必有湯有紂必有武王此自然之理也天道茫然不可測知使有一人其徳足以為天下君其道足以為天下師此豈偶然哉君師之所在乃天所在也上帝愛民為君師者能寵綏四方乃所以相上帝也寵謂使之如意綏謂使之得所紂在上四方不如意不得所者多矣是大失上帝之心也上帝無心以民為心民如意則上帝如意民得所則上帝亦得所為人主者欲尊敬上帝宜尊敬斯民而已矣故孟子曰民為貴夫知武王之心者則以為體天救民是武王無罪也論武王之迹者則以為以臣伐君是武王有罪也若武王之志志在救民以為有罪者不敢怒也以為無罪者不敢喜也不以有罪無罪之説貳其心唯秉救民之志直之無前雖死生不逾此志也張氏曰民之有欲無主乃亂故天佑下民而作之君者所以治之也民之有常性而克綏厥猷者惟后故天佑下民作之師者所以教之也天佑下民作之君作之師則君師之任有罪而不妄救無罪而不妄誅其志在於克相上帝寵綏四方非可踰越也王日休曰武王於此遂以天子自任矣以文為受命則已當為天子也同力度徳同徳度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞無垢曰行兵之道度彼度已盖非一事也而其大體最在力與徳義而已力不同則太王事獯鬻勾踐事吳矣豈敢言兵哉或曰漢光武以八千破王莽百萬晉謝石亦以五千破符堅百萬何力之有乎曰先王之兵不論幸而論必力雖若强而理則甚弱是可必而非幸也此又不可不知使力同矣其可戰乎曰未可也其上又有事焉其事惟何又當度彼己之徳也彼徳為盛則陸抗不敢犯羊祐矣使徳同矣其可戰乎曰未可也其上又有事焉其事惟何曰又當度彼己之義也彼義為勝則晉文不敢犯楚成矣使力勝而徳又勝徳勝而義又勝則有前無後有進無退一戰決矣論紂之力則億萬異心而武王乃三千一心論紂之徳則滛酗肆虐而武王乃聰眀齊聖論紂之義則侮慢天地而武王乃救民水火以彼己度之武王之勝久矣不待牧野之戰而後為勝也使行兵者識此大體其取勝也必矣心存於利則人各有心心存於義則古今一心紂率天下以利人人快己所欲故雖有臣億萬如此之多然惟億萬心以其趨於利也武王率天下以義故雖有臣三千如此之少然惟一心以其趨於義也趨於利則惟知一已安知君父此紂自賊其功也趨於義則惟知公義所在安知一已此武王所以得天下也夫人心即天心也武王之心未欲誅紂是天意猶須暇之也武王之心今誓師必往是天意必欲誅紂也武王儻起絲毫私意以俟之是弗順此心也弗順此心是弗順天心也弗順天心是同紂為惡也閲實其罪與紂鈞耳可不畏哉張氏曰得道者多助失道者寡助此力之有强弱者也常厥徳保厥位厥徳匪常九有以亡此徳之有吉凶者也相時之宜師出有名此義有可否者也力不同未可以論徳以强弱之勢有所不侔也徳不同未可以言義以吉凶之理有所未辨也故力同然後可以度徳徳同然後可以度義武王以一心之三千當紂之億萬心之衆則周之力為强矣武王以世世修徳比紂之貫盈之惡則周之徳為吉矣奉将天命以誅無道則周之義為可知矣雖然武王之伐紂非出於一人之私意實天命而已天命之不從則弗順天者也弗順天則其罪與紂等矣陳氏曰力均則以徳勝徳均則以義勝今紂三者皆無吕氏曰天下事本是心人心離便是獨夫人心合便是天子民心離合都不干民事人君有以統屬之武王能統宗㑹元自然一心紂不能統屬自然為獨夫只是一箇心到紂之衆如何㑹有許多盖紂私心外蔽天下衆心皆無一箇總攝去處宜乎人人自有一心也予小子夙夜祇懼受命文考類于上帝宜于冢土以爾有衆底天之罰天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失無垢曰以弗順天誅紂則武王之罪與紂同所以武王夙夜祗懼而不敢己故以此意告於鬼神皇天后土而以爾有衆致天罰於紂也致天之罰以言非出私己也夫天之伐紂豈諄諄然命武王哉視民之所欲而已民不堪紂之暴虐如在湯火中曰夜欲去紂之心如決疣潰癰民之心如此武王之心亦如此天以民為心民心如此則天之心可知矣何以知天之心如此哉天矜於民民之所欲天必從之於是武王告有邦冢君及御事庶士以天意如此弗可已也予一人意已決矣爾輩庶㡬弼助我以成此大功盖凡舉事莫不有時欲四海永清顧難得其時耳今天意将清四海此時豈可失耶盖紂之所為實腥臊宇宙穢濁天地去紂一人則四海永清矣張氏曰紂為無道之甚武王以天命行天討可以無畏矣猶曰夙夜祗懼者盖人之所畏不得不畏不畏者已也畏之者所以同於人也吕氏曰天於民甚親得天人之際處源清則流清紂是源頭去得紂便是永清四海時不可失是勑天之命惟時惟㡬之意

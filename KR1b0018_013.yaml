body:
  text: 尚書精義卷十三宋黃倫撰啓與有扈戰于甘之野作甘誓無垢曰有扈繼禹之後然其罪止云威侮五行怠棄三正東坡謂不用夏之正朔服色也其說是矣意必以堯舜禪讓而啓遂傳其家為辭其語足以動搖人心事亦迫矣故不暇他顧親提兵柄出其不意特取間道而直抵其城使其意不及逺謀不暇思以堯舜校之豈不為德衰乎哉張氏曰王者有征無戰以啓之賢而伐有扈之罪必曰大戰何也蓋有扈氏惡積罪大威侮五行怠棄三正其征之則不服其討之則必拒拒而不服必至于大戰言大戰則有扈之惡可知矣東萊曰有扈負固強盛幾與天子之勢均體敵其與有苗弗率禹徂征之氣象自不同甘誓大戰于甘乃召六卿無垢曰古之將兵皆付之儒者禮曰天子六軍其將皆命卿是也夫兵事付儒者則所率之兵皆知禮義皆知臣子之分皆知上下之理觀啓出有扈不意直至城下當時六卿之謀亦已深矣又曰蓋臨戰之時不有以警懼之則勇氣不振羣心不肅有生之志無死之心所以號令嚴明約東果斷以示必行母有輕赦所以濟衆志一羣心也王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正天用𠞰絶其命今豫惟恭行天之罰左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命用命賞于祖不用命戮于社豫則孥戮汝無垢曰當益避啓於箕山之隂朝覲獄訟者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也人心愛啓如此此天意也而有扈獨不服焉則朝覲獄訟謳歌者皆惡之矣惡之者衆此天𠞰絶之也啓以此言誠有所見非虛辭也夫啓恭行天罰則六事之人亦當恭天之命六事之人恭天之命者左攻于左右攻于右御以正馬此恭天命也一或失職是為慢命罰何所逃乎兵事貴嚴不敢專也其賞也豫不得示私恩故載遷廟之主於軍以賞之其罰也亦不得示私怒故載社主於軍以戮之夫一人受賞一家尊榮一人受戮一家絀辱孥戮之意蓋在於此謂妻孥受辱耳張氏曰有天下國家者其於五行當畏敬之矣其於三正當勤保之矣今有扈氏於五行則威之而不能畏侮之而不能欽其于三正則怠之而不能勤棄之而不能保此其所以自絶于天也自絶于天者天必絶之也又曰祖人道也人道為陽社地道也地道為隂賞陽也故用命則賞于祖戮隂也故不用命則戮于社祖本仁賞之亦仁也社本義戮之亦義也賞必于祖戮必于社各從其類而已東萊曰五行散在天地間萬物皆有五行凡暴物害民皆是威侮五行三正天地人三者之正理雖曰三者其實則一凡我自暴自棄則天地之正理皆怠棄此乃惡之本原故啓言有扈自其本原已皆侮棄則其為惡無所不至方有扈侮棄之時天已絶其命至此啓則恭行天之罰而已又曰古者用兵必載遷主載社主故賞則曰先祖賞之殺則曰天地殺之豫則孥戮汝是於常法之外别立一件以嚴其制戮不獨殺亦有不殺之戮啓自知德不足故加之以刑然啓賢能敬承禹之道亦是自量其加刑之嚴乃是加敬心啓承堯舜禹重熙纍洽之後疑其不曉用兵之道今一旦有事誓師勑旅如素講者蓋啓受學於禹時其文武之事已並究考初不分精粗本末學者其可不知古人之學陳氏晉之曰祖陽也故賞于祖社陰也故戮于社賞于祖則所以賞之者非我也為祖宗也戮于社則所以戮之者非我也為社稷也賞以祖宗其罰也亦然罰以社稷其賞也亦然賞罰兩得則宗廟社稷安矣太康失邦昆弟五人須于洛汭作五子之歌無垢曰太康畋于有洛之表十旬弗反而羿距于河以廢之使大禹基業一旦而盡覆墜其可傷哉其弟五人侍太康之母從太康畋獵太康逐獵於終南五子與其母待于洛北太康既為羿所廢此五子所以咸怨而作歌以見意也然觀五子作歌如此其開明通濟豈尋常之流哉略不能諫於逰畋之前而至隨羣旅進相從於荒惑之地逮其失邦乃始作歌豈不晚乎曰五子知義理識幾微如此想家庭之間宴語之際其開導啓沃於太康者亦已久矣第告之不從諫之不聼雖知其必亡其如之何哉張氏曰人情之所甚親者莫隆於兄弟兄有過惡陷於不義之地且將緘默隱忍而不言豈所謂愛親之道哉此太康之以逸豫失邦厥弟五人形於歌詠所以攄發其怨憤之心是乃所以親愛其兄者也詩曰嗟嘆之不足故詠歌之則歌者庸非嗟嘆之不足而為之乎五子之歌太康尸位以逸豫滅厥德黎民咸二乃盤逰無度畋于有洛之表十旬弗反無垢曰夫德者民之心也人君有德則民心恱無德則民心離太康首先即位見逸豫而不見德是德為逸豫所滅也德滅則民心滅民心滅則天下亦滅亡矣嗚呼以太康而觀堯舜何其髙哉夫即位而以逸豫為心民心已二矣而乃不知改悔方盤樂逰逸不循法度委棄母弟親戚委棄宗廟社稷委棄朝廷機務自河北畋獵逺過洛南及至十旬而弗反夫十旬百日也百日不見母弟親戚百日不見宗廟社稷百日不理朝廷機務而甘心於逐禽走獸之樂此閭巷下俚破家之子也乃以天下授之啓亦有罪矣張氏曰祭祀之有尸不言不為居位而已古人以食是祿而不能以有為則謂之尸祿居是位而不能以有為則謂之尸位今太康有君人之位而不能為君人之事此其所以為尸位也先王之於天下以憂勤享國克成其德今太康以逸而不勤以豫而忘憂非惟不足以享國且將喪其德矣東萊曰自古之亡國者大抵逸為少而豫為多德者性之本有未易殄滅惟太康放逸不已遂滅其德德既盡滅則天下之民咸懷二心當此之時自當敬省變易前非乃盤逰無度畋于有洛之表至百餘日弗反太康豈不惜其位但安於逸樂天下雖危如纍卵而猶以為泰山也太康不知天位艱哉之義以為有此位者自當享此無窮之樂故以此為安而逺去宗國若知之則必不往矣林氏曰夏都冀州在大河之北洛在河之南太康逰畋舍其宗廟社稷渡河而去以畋于洛之南至于百日而猶不反有洛之表言其逺也十旬弗反言其久也古之為國者兢兢業業如臨深淵如履薄氷而猶懼乎肘腋之變蕭墻之禍或起於一二日之間今太康乃自肆於逰畋以言其逺則畋于有洛之表以言其久則至於十旬弗反是其在我者既有棄天下之心安得無后羿之變乎有窮后羿因民弗忍距于河無垢曰后羿因民不平之心而距于河北以絶其歸路使母弟墮於草莽宗廟社稷朝廷機務一旦制於他人之手乃知非君天下之資者必至於敗事如此左氏曰羿自鉏遷于窮石因夏民以代夏政蓋篡之也孔氏曰羿居窮石故曰有窮國名窮是諸侯之國羿是其君之名也說文云羿帝嚳射官也賈逵云羿之先祖世為先王射官故帝賜羿弓矢使司射淮南子云堯時十日並生堯使羿射九日而落之楚辭天問云羿焉彃日烏解羽歸藏易亦云羿彃十日說文云彃者射也此三者言雖不足以取信要之帝嚳時有羿堯時亦有羿是善射之號非復人之名字信如彼言則不知羿名為何也夏都河北洛在河南距太康於河北不得入國遂廢太康耳羿猶立仲康不自立也厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌無垢曰夫莫親如兄弟矣太康所為如此五弟乃至不堪而咸怨况四海之民於我無情者乎撫我者后虐我者讎其怨當又過於五子矣五子情懷抑鬱意態徊徨無以攄發炯然見大禹之戒一一效驗故祖述其意而作歌以舒寫其心耳張氏曰夫仁人之於兄弟不藏怒焉不宿怨焉今五子至於咸怨其兄者蓋怨之者乃所以親之也孟子曰親之過大而不怨是愈踈也五子之怨得非親之過大者乎苟親之過大為之弟者恬不以為事雖怨在心所以致其愛者內有致愛之誠而外無以寫其愛之之意則五子之志無自而見故於是述大禹之戒以作歌觀其五章之中或言皇祖有訓或言訓有之或言明明我祖則其述大禹之戒可知矣東萊曰想當時見太康放逸將至於亡朝夕在左右諌之不聽去之不能只得相隨而去以此見五子之歌非是一時驟作當是諫不能止去之不可之時已蓄積而成於胸中一旦而發故其言辭恭敬友愛非驟語者所能也其一曰皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚夫愚婦一能勝豫一人三失怨豈在明不見是圖豫臨兆民凜乎若朽索之馭六馬為人上者奈何不敬顧氏曰怨豈在明未必皆在明著之時必於未形之日思善道以自防衛之是備慎其微也無垢曰祖宗社稷以何為本以民為本耳民安則祖宗社稷安今視民草芥蚍蜉之不如則祖宗社稷亦若草芥蚍蜉之不如矣本固邦寧夫豈虛言又曰夫千萬人之心一人之心是也勿謂一愚夫婦之心與千萬人之心不同此幾也失一愚夫婦之心是千萬人之心皆失矣得民心則為天子失民心則為匹夫一能勝豫豈欺我哉且一人之微而三失民心積怨如此平居無事君君臣臣豈敢明言怨上乎其怨也不在語言嗟呼處乃在思慮包藏處此聖人所以圖於不見之處而不敢忘也又曰為人上者其道如何曰敬而已矣敬則無私欲一皆天理之所在而不見天子之為貴亦不見四海之為富不見賞罰利害之在我亦不見百官有司之服役第循天下之公理而行之民心欲飽我思所以豐其榖粟民心欲暖我思所以充其布帛民心欲安我思所以薄其征役如百畝之田以飽之墻下之桑以暖之五畝之宅以安之不敢以我私已有一毫害民之生理也審如是民視我如父母欲揮之而不去又何六馬朽索之足云乎奈何不敬之言其意深矣張氏曰萬物本乎天人本乎祖稱皇祖者不忘其本而已言而警之謂之戒順而導之謂之訓大禹以義言之也故曰戒皇祖以情言之也故曰訓謂之祖有訓則訓非已作也祖有之而已又曰以勢位言之則人君者固非愚夫愚婦之所能勝也以情與理言之則愚夫愚婦固有勝豫之道也蓋彼雖至愚也有所謂怨焉天之視聽從違猶且因之豈可以其愚而忽之者哉一人三失則所失者衆而怨多矣且怨出於人心非視聽之可及陳氏曰天下之民或哲或愚愚者固愚矣然邦國恃之以為本安有愚而不能勝我哉陳氏暘曰蓋卑而不可不因者民也一言一動宜因民心以為心我之動也不能因民則彼將有因民而伺我者矣蓋民之可畏而不可不敬也如此溫公曰荀子云馬駭輿則君子不安輿民駭政則君子不安位馬駭輿則莫若靜之民駭政則莫若惠之惠之於既駭之後不若安之於未惠之前故人君所以馭其民者如朽索焉東坡曰天下莫危於人主也聚則為君散則為仇讎聚散之間不容毫釐故天下往歸謂之王人各有心謂之獨夫其二曰訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一于此未或不亡無垢曰此六事常人有之必破家敗族名為浮靡為鄉閭所不齒一家長猶不可為况為天下君豈冝有此乎太康於六事中乃犯其二三繼帝王之後天下駭聞所以亡尤速也張氏曰荒者不治之謂也內作色荒殉于色者也外作禽荒常於畋者也內則嬖色外則從禽如是則政荒而不治此所以皆謂之荒其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃砥滅亡無垢曰都冀方而君天下者必有道存乎其間矣陶唐之道如何欽明文思安安允恭克讓是也今太康失欽明文思安安允恭克讓之道而尸位以逸豫故至於盤逰無度畋於有洛之表以亂其紀綱使羿距於河不得反其國都而底滅亡也欲知有道無道第觀其紀綱有無耳紀綱不亂則其人之有道可知紀綱顛倒則其人之無道可不言而喻也張氏曰陶唐之所以有冀方者以其有紀綱也大為之綱小為之紀先王所以維持於天下者未嘗不在於此今太康失道則紀綱從而亂矣紀綱亂則其滅亡無日陳氏曰都冀州者實自唐始唐禪虞虞禪夏世都冀州而𫝊其紀綱今亂之則堯之天下去矣其四曰明明我祖萬邦之君有典有則貽厥子孫關石和鈞王府則有荒墜厥緒覆宗絶祀無垢曰吾祖關石和鈞之法公私兩利王府無不有者不知其田獵果何謂乎典則不循王府不取而荒墜之乃故犯明訓逺事畋逰至于國破家亡使先祖血食無復受四海之職貢此所以含深悲之意而歌以發泄之也又曰漢律厯志云二十四銖為兩十六兩為斤三十斤為鈞四鈞為石是石為百二十斤矣其重莫如石禹乃通天下使同以此為重關者通也其次莫如鈞禹乃和天下使同以此為鈞和即通也和以見人情兩平無爭怒之意通以見南北不異無隔閡之意張氏曰自銖兩斤積而為鈞石以其不能無塞也故關之使通以其不能不乖也故和之使平關石和鈞者權也權衡度量其法始於權終於量王氏曰於石言關於鈞言和亦無深意唯文其辭耳乃欲鈞平而天下通用且大禹所為多矣特言此者以時困乏故特思而言之也胡氏曰鈞石者權而已積銖以為兩積兩以為斤積斤以為石積石以為鈞是之謂五權積斤以為石則不能無塞故必有以通之積石以為鈞則不能無乖故必有以和之是之謂關和也其五曰嗚呼曷歸豫懷之悲萬姓仇豫豫將疇依鬱陶乎豫心顔厚有忸怩弗慎厥德雖悔可追無垢曰其五之歌何其悲切而有志也豈其五之歌獨賢於四子乎曰不然廣唱之體當如此其一總領大綱言治天下當敬民之意其二開陳不敬必亡之意其三言不敬祖訓而失國都之意其四言不敬祖訓而失天下之意其勢至于五不得不深悲以足其歌也首尾相貫若出乎一人常留餘意使賡者各得盡其說焉其溫厚長者善與人同之風為可見也余於五子之歌非特見其尊敬祖先悲愴失國之意而又得其悲辛急迫中尚不忘風雅如是也真可仰矣陳氏曰鬱陶則憂積於中忸怩則愧發於外王氏曰鬱陶憂悶也忸怩慚色也謂憂於我心而靣顔加厚如有慚色以見天下不謹其所為今雖悔之其可追及乎又曰以禹之德在人百世而有天下未有過也一世而至啓德已不足以服人故有有扈之戰再世而至太康遂有滅亡之患嗚呼豈非以其生長於冨貴養其情態又有便嬖以奉之有諂諛以導之日復一日浸淫而不可已乃至於縱欲不能自克以及於難乎然則非中才以上者不可處大冨貴以其不克負荷故也張氏曰夫得天下有道得其民也得其民有道修其身也其下則紀綱可繼而不可亂其上則宗祀可守而不可亡不能如此至於患至而後悔雖有神智曰惟彼陶唐亦末如之何矣羲和湎淫廢時亂日𦙍往征之作𦙍征孔氏曰奉責讓之辭伐不恭之罪名之曰征征者正也伐之以正其罪無垢曰羲和以酒自汙使羿不疑孔子已知其心矣然而孔子不見微㫖如春秋之書紀侯來朝以恕其心何也曰人臣湎淫不修職事不可以為訓也以謂縱使罪在於此不過廢黜耳何至起兵動衆使𦙍往征之至有殱厥渠魁之說哉書𦙍往征之則見非仲康之命若𦙍自往征之𦙍乃羿之腹心相與為表裏以握朝廷之權而謀為篡逆者也張氏曰帝者行天道以治人故詳於天而羲和之官分而為四王者行人道以奉天故詳於人而羲和之官合而為一世變之異也今以湎淫故廢而亂之廢時則正朔失次亂日則甲乙乖戾此所以有可征之道也湎淫言其喪德廢時亂日言其荒政陳晉之曰廢者何不修也亂者何不治也日者十日也自甲乙至于壬癸有自然之敘猶天一至於地十有自然之數順之則治逆之則亂朔宜在乙先時則以甲為朔晦宜在壬不及時則以癸為晦如此則甲乙亂矣亂而不治時之所以廢也故治厯者以治日為始日治則時修日亂則時廢仲康以先王之誅命𦙍后𦙍后以仲康之命征羲和而所以告其衆者以其不知季秋之朔為羲和之罪其為罪也宜若未至於可殺然所以授人時者不得其正兆於此矣害吾所以敬民之意安得而不誅

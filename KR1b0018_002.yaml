body:
  text: 尚書精義卷二宋黃倫撰分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨無垢曰隂陽之氣各有其分陽為春為夏隂為秋為冬羲仲掌陽之始故曰分命羲叔掌陽之終故曰申命和仲掌隂之始故亦曰分命和叔掌隂之終故亦曰申命其分毫辨析如此想見堯之心深通造化之理也寅餞納日謂禾稻成實是刈是穫自日出而就功至日入而止息是其作也迎日而作其息也亦送日而息出入一循乎天此天人一致之理也其曰寅餞者以言其息亦不可緩也大抵聖人之政一循天理天理何自而見乎人情是也自日出而作至日入而息所以少休其勞苦而調養其血氣也强勉不已豈曰不可秋深時變霜露已凝一襲膚體不死則病是逆天理也聖人之政豈有逆天理之事乎寅餞納日其義深矣然出日言於春納日言於秋者又有說也其說如何有一嵗之時有一月之時一日之間日出於朝即一嵗之春也日入於夕即一嵗之秋也言出日於春言納日於秋其事亦相類矣宵中亦謂晝夜等也春言日中以春陽事也故以日為主秋言宵中以秋隂事也故以夜為主星虛即北方斗牛女虛危之星至仲秋即昏見於南方也虛見南方則仲秋之氣正矣厥民夷者乍去炎暑之酷小憩涼秋之清無暴背之苦而有樂事之心此所以言夷也夷者以形容其心之凱樂也毛毨謂鳥獸得秋氣則毛羽更生光潤而順理矣此皆秋氣之正者也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛無垢曰東作南訛西成未嘗不以方為言獨朔易不言北而云朔易者何也曰北無意義易北為朔其義無窮夫月旦謂之朔是盡時而復生也隂陽之氣至冬而盡故曰日窮於次月窮於紀星回於天數將幾終是朔有盡意然終不可盡也冬而復春豈有既哉是盡而更生也朔有盡而更生也朔有盡而更生之義北無此義也此所以言朔而不言北也東作南訛西成三時趨農人人勞苦至冬無事與三時不同矣此所以謂之朔易至於三時言平秩獨冬言平在又何也秩以言田事有次序至於冬則已收藏倉廩民無餘事何次序之有乎其曰在在察也雖收囷入廩然有無盜賊之窺而雀鼠之耗乎此和叔所以為之察也厥民隩亦順時而入也秋少憩冬室處豈私意哉天道已然矣氄毛孔氏謂鳥獸皆生耎毳細毛以自溫焉此亦驗天時之一法也余觀羲和所掌獨以人時為主其意専在民事而已觀作訛成易以應春夏秋冬之氣則人之所為乃天之所為也人或可容以僞惟天為不可欺如日之出日之中星鳥昏見鳥獸孳尾天豈有心乎適此時也必有此候其欺我哉如民之析因夷隩亦豈有心哉適此時也必有此事天人交通無有偏陂此堯之治所以為極致也王荆公曰冬者休息之時也當豫察來嵗改易之政耳事之改易於此時在察之事豫則立國家閒暇乃豫圖改易之時也胡氏曰夫氣隨天轉人逐時遷春之東作農事興焉故其民析老壯分析就功也夏之長養耕稼方盛故其民因相因舊功以力田也秋之收斂五榖畢登故其民夷平均其力以就嵗功也冬之祁寒人思安居故其民隩以入室處也孔安國以隩為室民當改嵗入此室處以辟風寒是音隩為鳥到反也說文亦同故正義引爾雅釋宫云西南隅謂之隩陸德明音為於陸反馬融云暖也則是冬寒民就隩暖之所也則知陸音為長而孔注為迂逺也帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熙胡氏曰昔之言嵗以四時計者各為日九十以六氣計者各為日六十以五行計者各為日七十有二九十而四之六十而六之七十有二而五之皆得三百六十則其三百六十者天數之正也其五日有竒者餘分之積也周天三百六十五度四分度之一而曰日行一度則一朞三百六十五日四分日之一舉全數以言之故云三百六十六日也傳又解所以須置閏之意皆據大率以言之云一嵗十二月一月三十日正三百六十日也除小月六又為六日今經云三百六十六日故云餘十二日不成朞以一月不整三十日今一年餘十二日故未至盈滿三嵗足得一月一則置閏也又曰日行遲月行速日行遲故日運一度而成一日月行速故月運十二度十九分度之七而成一日隂道常虧故月行周天之數為一月而常不足於三十日此所以有小月而嵗餘五日强也陽道常饒故日行周天之數為一嵗而常有餘於三百六十日此所以有閏而嵗閏亦五日强也以月之不足合日之有餘積而成嵗則所謂十一日弱者是也故三年一閏為天道之小成也五年再閏為天道之大成也古之人歸其餘以置閏三年而一五年而再十有九年七閏備矣又曰天度三百六十有五四分度之一而日所行者一日度耳故朞三百六十有五日四分度之一以小嵗言之則餘五日有竒矣月之行也速月行十二度十九分度之七其周而與日合也以二十九日半故月之為月其日不能常足於三十而有大小焉推月之不足計日之有餘一嵗之所竒凡十有一日弱積嵗之所竒而不為之閏三年而差一月九年而以春為夏十有九年而四時皆反又曰道散而後隂陽分隂陽分而後五行具凡麗乎隂陽屬乎五行者孰有不隨於數耶故一昆蟲之出入一草木之生死莫不待此以成自有心以至於無心自有形以至於無形莫不待此以行則數者時之所寓焉者也先王之政事皆繫於嵗月日時故以閏月定四時成嵗焉蓋日月之運行不能無贏縮作􅍓之久也不能無差錯惟以其餘置閏然後嵗月日時各得其紀而無先時不及時之患矣無垢曰周天三百六十五度四分度之一日運一度月運十二度有竒故日一嵗一周天月一月一周天日嵗一周天此所以朞三百有六旬有六日也使聖人不有以造化之任天之運以日一周天為一嵗則一年而立春之候亂矣二年而雨水之候亂矣三年而以正月為二月矣五年而以春為夏矣十九年而四時相反矣由是知天地之理止此而無能為矣惟聖人心與天一置造化於其間一嵗虛六日不用又虛五日有竒不用是一嵗積十一日有竒不用矣積三年不用之日以置一閏又積其餘五年又置一閏於是二十四氣皆得其序而時定矣積十九年四時不忒而嵗成矣時定而嵗成則百工之職以時而舉以嵗而㑹者皆可以案見而閲實矣允釐百工庶績咸熙復何疑乎又曰聖人大有功於天地矣天地亦大矣隂陽亦妙矣使世無聖人任其自生自化則草木暢茂禽獸繁殖人類滅絶而天理顛倒矣是天地之妙在聖人而聖人之餘為天地余始讀易見其所謂財成天地之道輔相天地之宜見其所謂彌綸天地之道見其所謂範圍天地之化求其說而不得今觀置閏一事而財成輔相彌綸範圍之說廓然大明王氏日休曰天之度數三百六十五度四分度之一四分度之一者謂又一度之中四分之一也度猶分界乃天輪有此分界之數日行一度謂之一日行遍此度數乃為周嵗蓋天輪自西而東乃所謂左旋也日月星辰則自東而西所謂右旋日在天一日止能行一度故三百六十五日二十五刻方能行遍天之分界故謂之朞朞遍也所以周嵗為朞然則周嵗之數乃三百六十五日二十五刻而此言三百有六旬有六日者舉其大數也日一日行一度故一嵗則周於天之分界所以謂日則一嵗一周天月一日行十二度有竒故一月則周於天之分界所以謂月則一月一周天然所謂一月者不必三十日以月之行不必待三十日乃五十九日則再周天是以月有小大盡蓋以五十九日分為兩月故也月既日行十二度有竒而星家謂之十三度者亦舉其大數也由是言之則日行甚遲月行甚速故月行二十九日有餘則追及於日是與日一月㑹於一處其處謂之辰則今子丑寅卯至申酉戌亥乃十二辰也天地皆有此分位是以日月於正月則㑹於寅二月則㑹於卯以次至十二月則㑹於丑矣一嵗之日既三百六十五日二十五刻而月之行則有小盡故積其餘日又為一月是以謂之閏蓋閏者餘之積也既為此閏月然後每嵗四時得正則嵗成矣故曰閏月定四時成嵗帝曰疇咨若時登庸放齊曰𦙍子朱啓明帝曰吁嚚訟可乎無垢曰夫口不道忠信之言為嚚心險而健者必訟口不忠信心險而健一身之理且不能順况能順四時之理乎可乎者所以甚言其不可也嗚呼堯之聖不可得而見也余于此而略見之夫人方以𦙍子心志開達性識明悟為薦而堯乃以口不忠信心險而健為言是衆人之惑而堯已識其所歸堯之聖明如此果可欺乎人君有何職事特知人為主而已知人如此復何憂乎張氏曰帝者之治詳於天而略於人王者之治詳於人而略於天惟其詳天此帝堯之世不特命羲和以詳天事而又咨若時者而登庸之也時者天之運若時者為其能順天道也聖人代天以理物故凡設施注措未嘗敢悖於天孟子曰順天者存逆天者亡則天道固不可不若之也堯之疇咨於衆有能若時者將登而用之放齊曰𦙍子朱啓明者𦙍子即堯子丹朱是也啓者言其性之開通明者言其性之敏悟使丹朱誠啓明也則登庸之何有不可然而朱之為人所好者慢逰所作者傲虐言不忠信而嚚好與物競而訟一身之中性命之理不能自若其能若天者乎此堯所以歎其不可也帝曰疇咨若豫采歡兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天無垢曰采事也即若時之事也前問放齊舉𦙍朱已不可用矣今又再問庶幾其得人也歡兜曰都者深美歎其人可用也其人為誰曰共工是也其人如何曰共工方且聚見其功以言其功顯著非止一事也帝曰吁則又識其人而發歎矣其人如何平居論議􅍓􅍓若可聽也一旦用之則盡皆背違其說此言其罔誕也不獨止此而已其外則有似乎恭其心則妄自尊大傲很無上若水之滔天然此言其詐也想見其為人虛華而不實諂佞而侮人以無為有以小為大善為藻飾以誑天下彼一身之理且不能順況能若天事乎陳氏曰靜則能言用而違之象恭者貌恭也其貌雖恭內實漫滅天理張氏曰靜言庸違則行不顧其言象恭滔天則心不踐其形是人也言僞而辨順非而澤動則妨事作則廢功以之若豫采其不敗績者鮮矣宜帝之所以不與也帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圮族嶽曰异哉試可乃已帝曰往欽哉九載績用弗成東坡曰孔安國以四嶽為羲和四子而太史公以羲和為司馬氏之先以四嶽為齊太公之祖則四嶽非羲和也當以史為正荆公曰山髙而陵下陵言襄山言懷何也地髙則襄陵地下則懷山又曰堯知鯀之方命圯族然卒使之何也曰方是之時舜禹皆未聞于世也在朝廷所與者鯀而已聖人雖有過人之明然不自用也故曰稽于衆捨己從人雖疑其不可任苟衆之所與亦不廢也故曰誰毁誰譽如有所譽者其有所試矣譽人尚必有所試則其廢人也亦必有所試而不勝任然後廢之耳鯀既未常試又衆之所與堯雖獨見其不可任敢不試而逆度以廢之乎敢違衆而自用乎聖人之立法皆以衆人為制中才之君獨見其所見不從衆人之所見逆度其不可任而不待其有所試則其為失也多矣故堯之聰明雖足以逆知來物明見鯀之不可任猶不敢自用所以為中人法也夫利一時而其法不可以推之萬世者聖人不為也此所謂聖人之仁也用己則聖人有所殆用衆則雖中人可以無為而治也故堯之用鯀也以四嶽之僉同其用舜也亦以四嶽之師錫所以為聖人者以其善用衆也天聰明自我民聰明唯天為大唯堯則之於試鯀與舜見之矣帝曰咨四嶽朕在位七十載汝能庸命㢲朕位嶽曰否德忝帝位無垢曰孔氏注堯年十六以唐侯升為天子在位七十年則時年八十六矣七十年為天子數亦過矣而忽有洪水之災此天意也其丹朱不肖亦天意也有舜抱𤣥德在下亦天意也此乾上九時也于此而不知進退存亡則為亢龍矣堯大聖人也知時知數知天意知進退存亡故咨四嶽以禪位之說焉又曰堯意雖知德莫如舜聖莫如舜得天􅍓數莫如舜然而天下至重一旦不詢于衆不考之公論斷以已意遽以一匹夫為天子此皆怪異不常驚駭觀聽之事聖人所不喜也蓋君子言必慮其所終行必稽其所敝使堯不先委四嶽遽以與匹夫使後世庸君效之得以奮其私意至有欲以天位與董賢如哀帝者故必先委四嶽以順天下之常情然後聽其辭受以卜天之􅍓數焉嶽曰德忝帝位此非謙辭也天下至重豈可不量力不度德遽欲當之乎荆公曰堯固已聞舜矣然且謂嶽汝能庸命巽朕位然則堯之出此僞歟曰非然也四嶽者皆大賢人故堯任之以與之釐百工熙庶績者矣堯雖聞舜然未敢自用其所聞也以為四嶽亦能庸命雖與之天下亦可以朝諸侯一天下也此四人苟有賢于已者宜亦知之苟知之宜亦推之故推四嶽之功善而云欲豫之天下四人者知足以知聖人而其汚不至乎貪天下也舜誠聖人而在下則四人宜知之矣知之則宜言之矣其肯相為比黨而蔽在下之賢於己者乎此堯稽于衆舍己從人不敢自用其耳目之聰明也必待四嶽師錫已以舜而後徵庸之耳然則四嶽何以不蚤舉舜歟曰隂雖有美含之以從王事必待上之唱也然後發故四嶽雖知舜必待堯之唱也然後錫曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦東坡曰明其髙明揚其側陋言不擇貴賤也舉舜而言其鰥者欲帝妻之也然余觀衆人舉舜之意非特欲帝妻之而已且欲更試舜以妻子之難也彼其未娶而處父母兄弟之間孝友之心尚未散也古人云妻子具而孝衰於親以匹夫之賤更以天子之女處之頑嚚傲很之間而又在父母兄弟妻子之列愛妻子則于父母兄弟必有所不終愛父母必于妻子有所未盡此天下之最難處也衆人舉舜之意亦豈輕以天下豫舜哉無垢曰天下非一人之天下乃天下之天下也必盡天下之公議乃可以與之堯不盡天下之公議遽欲與四嶽何也曰四嶽宰相也宰相為人臣之師為天下之表德不足以先天下才不足以濟天下其可當此位哉是位至宰相天下之所心服者也使堯子賢則已如其不賢必舉位以授下之賢者使不欲禪位則已如其禪位非自四嶽始將誰始乎夫舜之處頑嚚傲很之間而克盡為人子為人兄之道堯亦知之舊矣乃有如何之問何也曰此欲顯舜之德于天下也為人子而父心不則德義之經母口不道忠信之言為人兄而弟傲慢不恭舜之不幸可知矣夫在他人有頑嚚傲很者逺之可也絶之可也父母兄弟豈有逺之絶之之理乎然則將何以得其心哉欲合其心歟必同其頑嚚傲很可也此豈可為耶將潔其身歟此吾父母吾弟也吾何忍于父母兄弟問取名乎此所謂天下之難處也觀舜之用心真可以為天下法矣舜如之何曰天下自見其頑嚚傲很吾止見其為吾父母兄弟矣以事父母之道事之以友弟之道友之以吾之愛起父母弟之愛以吾之敬起父母弟之敬父子天性也兄弟天倫也天性天倫之中無他物也愛敬而已特為頑嚚傲很所亂未有以發之耳使吾以愛以敬日漸月摩時行時止則頑嚚傲很之氣散而愛敬之心見矣此克諧以孝蒸蒸乂不格姦之意也蒸蒸進也以言其漸也愛敬亦不可急也當優而柔之使自得之饜而飫之使自趨之若江海之浸膏澤之潤有不知所以然者蒸蒸之義也益曰日號泣于旻天于父母夔䕫齊栗瞽亦允若號泣愛也齊栗敬也允信也若順也以愛敬發之而頑嚚一變為信順此不格姦之說也嗚呼處父母兄弟之間一有不得其所使父母兄弟有惡名著見者皆人子不孝之罪也胡氏曰自上古以來君天下者父子相繼惟堯禪舜舜禪禹禹乃傳子商周遂然故韓詩外傳曰五帝官天下三王家天下官以傳賢家以傳子傳賢為民也傳子為民也故堯之將禪也先求登庸則嗣子嚚訟次求若采則共工象恭巽位則四嶽否德明揚則虞舜在下舜德未舉堯聰已聞故曰明明揚側陋使明明舉側陋之人必虞舜也師錫乃曰有鰥在下曰虞舜此則側陋之人明舉之也周氏範曰唐虞之際君臣之間何其德之盛而道之公歟堯為天子不以傳之子而遜于四嶽四嶽不以遜位為得而曰否德忝帝位師錫于帝者不以有位之大臣而以側微之虞舜蓋是時天下之人不以天下為可欲而以天下為不得已茅茨土階非有後世之富貴也君臣簡易非有後世之崇髙也有天下之憂而無天下之樂有天下之勞而無天下之佚故以天子之尊而授天下于在下之匹夫天下不以為異而大臣亦無覬覦羡慕之心惟其有至德者則天下相與推尊之以為君而無私天下之心此後世所以不及也司馬溫公曰所貴于舜者為其能以孝和諧其親使之進進以善自治而不至于惡也如是則舜為子瞽瞍必不殺人矣若不能正其未然使至于殺人執于有司乃棄天下竊之以逃狂夫且猶不然而謂舜為之乎是特委巷之言也殆非孟子之言也且瞽瞍既執于臯陶矣舜惡得而竊之雖負而逃于海濵猶可執也若曰臯陶外雖執之以正其法而內實縱之以與舜是君臣相與為僞以欺天下也惡得為舜與臯陶哉又舜既為天子矣天下之民戴之如父母雖欲遵海濵而處民豈聽之哉是臯陶之執瞽瞍得法而忘舜也所亡益多矣帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉無垢曰夫父頑母嚚弟傲而克諧以孝使之不格姦則天所以試舜者至矣堯方曰我其試哉夫近之則不遜逺之則怨天下之最難處者莫如婦人女子也貧賤之女尚難調和而況天子之女貴驕難下乎以匹夫之賤而娶天子之女自難處矣況置之于父母兄弟頑嚚傲很之間其難處益甚矣向來至孝未有妻子孝心天全也今以貴驕之女顔色之私雜于至孝之中能保其無疵乎于此而無疵則天下難事不足為矣堯曰女于時謂以女妻于是人也觀厥刑于二女謂觀二女之從舜以卜舜之家法也舜以蒸蒸之法行于二女下意于媯汭之陋不堪處之中克行婦道嬪服于虞氏之族而不恃其貴驕不鄙其微陋則舜之德真有大過于人矣推此以治天下蓋所優為也吕氏曰夫以舜之治家整齊如此堯復以欽哉戒之可見聖人不已之意如天之於穆不已文王之純亦不已此篇自放勳以下是舉堯德之大槩自乃命羲和以下是舉堯用人一件大處以見其餘後乃說遜位大率前面皆是堯盡天下之常自疇咨以下見堯所以處天下之變蓋堯朝盡君子今有小人是變也堯朝盡嘉祥今有洪水是變也既盡常又盡變如此可以遜位與人矣

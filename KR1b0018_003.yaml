body:
  text: 尚書精義卷三宋黃倫撰虞舜側微堯聞之聰明將使嗣位歷試諸難作舜典無垢曰舜之德大矣而孔子序書止曰堯聞之聰明何也曰聰明不可以小觀也舜之聰明如天之聰明也聰以言其疏通也理至於前無不察其曲折知其始終者此聰也明以言其髙逺也理隱於微無不灼其久近判其是非者此明也惟聰明如此則足以履天下而運四海識賢否而辨幾微堯欲禪位捨舜其誰乎張氏曰舜有聰明之德上達於堯而堯聞之此堯所以舉天下而讓之也雖然堯之聞舜固有素矣其以天下授之可以無疑必曰歷試諸難者何也孔子曰如有所譽者其有所試矣試之者又將以為天下後世之法也夫事不難無以見君子此堯之試舜必以諸難謂之諸難見其所試之非一事可知矣是故觀厥刑於二女試之以治家之事也慎徽五典試之以司徒之事也納於百揆試之以百揆之事也以至賔於四門納於大麓則堯之所以試舜者可見矣舜典曰若稽古帝舜曰重華協于帝濬哲文明溫恭允塞玄德升聞乃命以位荆公曰玄德亦俊德也自其著者言之則謂之俊自其妙者言之則謂之玄於聖人在上者稱其著於聖人在下者稱其妙無垢曰舜重華即放勳也勳則有功而可見華則有文而可觀又曰乾之九二九五皆曰利見大人孔子發之曰同聲相應同氣相求水流濕火就燥雲從龍風從虎又曰本乎天者親上本乎地者親下則各從其類也余於是曉然見協於帝之説矣夫堯之有舜所謂同聲同氣水火之於燥濕雲風之於龍虎性之上者親天性之下者親地其相協之意豈可以詁訓名之哉蓋情異則對面而若江湖肝膽而成楚越同心則千嵗如一日千里如同堂想其相協之心有未言而信未占而孚者也此豈偶然也哉張氏曰夫天下無二道聖人無兩心又况舜之於堯以帝繼帝故其心迹之契無毫髮之問謂之協帝不亦宜乎夫華者草木之末也聖人涉迹於人間世者特其末而已至其雕瘁而反本根則向之所謂華者不可得而形容之也濬哲文明溫恭允塞舜之四德也濬哲者思也溫恭允塞者欽也濬與濬川之濬同哲與命哲之哲同哲出於性濬之者人而已哲而能濬則疏通於內而無茅塞之患也濬哲而謂之思者蓋思曰睿睿作聖所貴於睿者亦欲其損實致虛以深通之而已此濬哲之所以為思也溫恭允塞而謂之欽者溫恭則欽之所以接物者也允塞則欽之所以直內者也於堯言欽明文思則德之出於所性自誠而明之者也所性者天也修為者人也堯行天道以治人故典之所載者天也舜行人道以奉天故典之所載者皆人也語其至則天也人也其實一也是道也以此處上帝王天子之德也以此處下玄聖素王之道也堯聖人之在上者也故其德謂之俊舜聖人之在下者也故其德謂之玄玄者言其聖而不可知之謂也至於俊則自可見之行而已雖然有諸中者必形諸外修諸已者必著於人舜雖居側微而其德有以升聞於上故不期於堯聞而堯聞之然而有是德者然後可以居是位故玄德升聞於是繼之以乃命以位陳氏曰堯有光華之德舜亦有光華之德以舜之光華合堯之光華故曰重華協於帝愼徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于德弗嗣東坡曰巧言令色帝之所畏也故以言取人自孔子不能無失然聖賢之在下也其道不效於民其才不見於行事非言無自而出之故以言取人者聖人之所不能免也納之以言試之以功自堯舜以來未之有改者堯將禪舜也曰詢事考言乃言底可績底之為言極也易曰窮理盡性以至於命可謂極矣君子之於事物也原其始不要其終知其一不知其二見其偏不得其全則利害相奪華實相亂焉能得事之真見物之情也哉故言可聽而事不可行事可行而功不可成功可成而民不可安夫功成而民不安是功未始成也舜禹臯陶之言皆成功而民安之者也無垢曰既歷試諸難三年于此矣凡所謀議施之有為無不成功者天意人心已盡歸之矣堯知天人交歸位有不可久居者所以不俟九年三考而有禪位之命也又曰濬哲文明溫恭允塞所以能應五典百揆四門大麓之變者以其發用在讓也惟讓則退退則靜而能觀惟讓則平平則安而能定所以成功者正在此欲知濬哲文明溫恭允塞試於讓而體之正月上日受終于文祖無垢曰堯禪位于舜故受終于文祖廟也受終之義其亦深矣夫人主上受皇天祖宗之託下膺臣民社稷之寄豈易事哉奢泰逸遊苛刻柔懦固不可為至于事一失其幾法一爽其節民情隱微或不加察姦人計慮或不灼知則足以招非意之辱作大禍之基今堯在位七十餘年矣兢兢業業幸上當天意下合民心祖宗之業不衰社稷之基不墜幾務清肅法度森嚴物情妥安姦宄消殞其保守先祖之德今日方知免矣所以受終于始祖之廟而以此重任付之舜也又曰人主即位改元肇正所以受終必在正月上日此春秋書元年春王正月之意也上日或以謂朔日以謂一嵗日之上也或以謂上旬之日以意逆志朔日之説為長在璿璣玉衡以齊七政胡氏曰璿生於淵之蚌而與月虧盈隂精之純也玉生於山之石而氣白如虹陽精之純也傳曰玉能除水之災珠能禦火之災故寶之以為隂陽之精則其為物神故也故璣衡之器運者為璣則以璇飾之觀者為衡則以玉飾之非以為侈也蓋于此以在七政而齊之其物非隂陽之精則有所不神而不足在故也又曰堯言􅍓象日月星辰而此言在璿璣玉衡以齊七政何也􅍓象者象也而璣衡者器也見乃謂之象形乃謂之器堯行天道以治人故占象以授人時舜行人道以奉天故制器以齊七政于堯典則言日月星于此則言七政政者事也而堯典之所言者道也無垢曰余昔在史館常觀渾儀之制始信璣衡之法為不謬也其制為三大輪其中空其外圎每輪畫分黃道赤道又畫二十八宿分野又畫為三百六十五度四分度之一春秋通為一輪冬夏各為一輪交分於臺上以分日之短長也臺下為柱以金龍繞之半在地上半在地下之説非謂置之于地也輪半畫為晝半畫為夜晝則轉在夜之輪于上夜則轉在晝之輪于下以此為地下之説爾輪即所謂璣也古以璿玉為之而王雱以美珠為璿璿璣者以珠為璣也以珠以玉皆不可判使以珠為之不過以為飾爾非以珠為日月五星也天象尊嚴故以璿為之玉衡之制其狀如今之所謂簫管也欲驗天文者先正璣輪乃以簫制輪中于簫管下上望其空直觀天星如堯典星鳥星火之制萬不差一儻日月薄蝕五星失度以簫置璣輪于其度中望之蓋無毫髮之差其制精密非聖人能為此制乎舜既受終未知天象如何故察璣衡以觀日月五星焉又曰天子者乃日月五星之主也使主非其人其象必變是七政待人主而齊也今察璣衡七政皆齊然後知洪水之災以見堯大數已過不得不退也七政既齊又以見舜􅍓數在躬不得而辭也張氏曰日月五星運行變動人所取正也故謂之七政是故人事修于下則天意應于上王政失于此則天譴形于彼此舜于即政之初所以察璣衡而齊之也璣運乎上而以璿為之取隂之精也衡望乎下而以玉為之取陽之精也蓋天地之精為隂陽隂陽之氣為日月隂陽之散為五行而其象在五星必取是以為器者蓋以類求之者也堯典言􅍓象日月星辰于此言在璿璣玉衡以齊七政者􅍓象以數推之者也璣衡以器得之者也數出于天故推之以授人時器出于人故占之以齊七政堯以道在天下故以􅍓象言之舜以政事治之特見諸形氣而已此璿璣玉衡之所由作也肆類于上帝禋于六宗望于山川遍于羣神無垢曰人主乃天地日月五星祖宗神明之主也豈可輕易哉主得其人則天清地寧日光月明五星順軌祖宗神明各安其分苟非其人則天變地動日月薄蝕五星失度祖宗神明皆失其所矣今舜受終方察璣衡七政齊矣是非特五典從百揆敘四門穆而已人意天心一切歸之舜知天位不可辭也然後肆類于上帝以告天神禋于六宗以告祖宗望于山川以告地祇遍于羣神以告有功于社稷者言已所以受終之意也又曰言上帝則日月星辰司中司命風師雨師皆在其中矣言六宗則文祖在其中矣言山川則社稷五祀四方百物在其中矣言羣神則法施于民以勞定國以死勤事能禦大災能捍大患者在其中矣胡氏曰萬物本乎天人本乎祖則尊尊者所以為義親親者所以為仁仁義之道無他報本反始而已此宗廟之制所由設也蓋有天下者祀七世所謂六宗三昭三穆也輯五瑞既月乃日覲四嶽羣牧班瑞于羣后無垢曰輯有收斂之義舜正月受終乃察璣衡乃類上帝禋六宗望山川遍羣神又考驗五瑞一月之間事已衆矣既月乃盡正月也於正月終日覲四嶽羣牧日覲者引之使前以新君即位人情未洽與之周旋欵洽使上下之情通因以覲其德性察其智識詢土風之異同防民情之好惡考人材之短長稱與不稱以待巡狩而黜陟焉既賢者無可廢置乃班瑞而復之使各安其位焉又見舜之安靜不擾亹亹乎有垂衣拱手之象焉其盛矣哉劉氏曰收諸侯之圭瑞還之王府必俟二月朔頒之諸侯者以新􅍓數也嵗二月東巡守至于岱宗柴望秩于山川肆覲東后協時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡守至于南嶽如岱禮八月西巡守至于西嶽如初十有一月朔巡守至于北嶽如西禮歸格于藝祖用特伊川曰自嵗二月已下言巡守之事非是當年二月便往亦非一嵗之中遍歷五嶽也范氏曰古者天子巡守至于方嶽必告祭柴望所以尊天而懷柔百神也後世學禮者失其傳而諸儒之諂諛者為説以希世主謂之封禪實自秦始古無有也且三代不封禪而王秦封禪而亡人主不法三代而法秦以為太平盛事亦已謬矣胡氏曰孔子云謹權量審法度四方之政行焉夫政事出於法度而法度出於權量宫室舟車之制衣服器用之等分田制祿之限斂財用物之法未有捨度數而能定者其同律度量衡為是故也則知協時月正日同律度量衡者所以齊政事也又曰昔者君子比德於玉焉而玉者天下莫不貴有道之象故人君執焉然天子用全公用龍侯用瓚伯用將至於子男則二玉而二玉道德之殺也然皆以其貴美者若之故曰五玉小行人曰成六瑞王用鎮圭公用桓圭侯用信圭伯用躬圭子用榖璧男用蒲璧以其為用者命之故又皆曰五器輯之則皆有所命驗故曰瑞贄則自有其美故曰玉還之則不廢其用故曰器所以備其名也荆公曰嵗月日時之所能齊律度量衡之所能一先王詳而謹之故居則􅍓象日月星辰出則同律度量衡而天下治無垢曰二月東巡五月南巡八月西巡十有一月朔巡蓋隨天道運行而合春分夏至秋分冬至之節以有事也天道一變而運于上君道一變而運于下天人交際輔相裁成彌綸範圍於不言之中而四時成矣萬國寧矣諸侯之賢不肖風俗之􅍇惡土地之有無民情之好尚無不知矣參稽審證立一代新政為羣聖祖為後世法則是行也豈固為是逸遊哉及其歸也以一特牛告至於藝祖之廟以見舜之為是巡守者蓋奉祖宗之命以行其出入往來無不以祖宗為念而非出於私意也然而巡守祭四嶽以柴山川以望歸祭藝祖以特亦可謂簡易矣於事神簡易如此則夫道路奉給寢膳共須想一切簡易而不為是煩費也後世人主不知此義乃千乘萬騎巡海求神仙於民事何益少君方士望蓬萊而見太一於天道何補哉可勝歎也張氏曰巡守分至之方雖不同然其理則一而已曰如岱禮者言嶽事之同也曰如初者言時事之同也曰如西禮者言方事之同也先嶽事而時事次之方事又次之此其敘也巡守必始於二月所以象雷之動而於卦為豫所謂以豫順動是也然而四時之出又必以四仲之月者蓋取陰陽之中巡守將以正其過不及故也歸格于藝祖者反必面之謂也其曰用特者蓋祭以特牲所以見其約則巡守之不為煩費可知也薛氏曰格廟用特其禮儉也廟禮從儉制度可知矣必其用有度而後可以巡守五載一巡守羣后四朝敷奏以言明試以功車服以庸劉氏曰唐虞氏分天下五服在其畿內甸服之君則皆執事之人也朝夕見焉故不待修朝覲之禮至于侯服當朝一年綏服當朝二年要服當朝三年荒服當朝四年則天下諸侯畢皆一朝一朝則天子巡守故五載一巡守也無垢曰嘗考易象上地下天易位矣乃謂之泰上天下地奠位也乃謂之否夫天君也地臣也民也臣民之情得以上通于君君之情得以下通于民故為泰泰者通也君民限隔絶然不相通故為否否者閉也聖人惡其否故每嵗一服入朝以盡諸侯之情通五年而羣后四朝矣故天子五載一巡守又以觀察天下以盡萬國之情焉又曰巡守來朝皆欲知諸侯之賢不肖而行黜陟以竦動之也何以知其賢不肖乎使其敷奏以言論國計之大體陳民情之利害吾則因其所奏之言以明試之觀其有功無功而為之賞罰耳當時諸侯賢者何其衆也何以知之其曰車服以庸而不及責罰以是知諸侯賢者之衆也必旌之以車服者車服華美顯然著見使人觀瞻詠歎而知所愛慕焉此聖人變移耳目之一術也肇十有二州封十有二山濬川無垢曰舜巡守四方遍􅍓天下其身親目覩利害皎然不疑想東北二方諸侯敷奏之餘必以冀與青二州疆理太大山川太逺人民稀濶號令隔疏而當洪水之後田賦有當檢治貢篚有當勸督非異時無事可守常法也將欲為之力有所不及將欲已之事有所不可舜乃創為新政分冀為三而有幽并分青為二而有營州一州之間當各有名山大川為之表識故亦分山為十二山言封為之厲禁也川言濬使之流行也非舜巡守何以見四方利害而敢為此舉哉胡氏曰夫州本九則十有二者以事言之天有九野有十二次州合而九者象九野也州分而為十二者象十二次也以理考之則乾元用九乃見天則九天德也六陰六陽所以分天道之大數不過十二則十二天道也蓋其象義取諸此也象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉荆公曰先王以為人之罪有被之五刑為己重加之以宥鞭撲為己輕己輕則不足以懲已重則吾有所不忍于是又為之制五流之法以宥五刑之輕者此則先王之仁以鞭撲五刑為未足以盡出入之差故也楊氏曰昔舜命臯陶作士而曰五刑有服五服三就五流有宅五宅三居者凡以用刑有就輕有就重有就輕重之中宅流有居近有居逺有居逺近之中凡以宥五刑之輕者而已且先王制刑有墨劓剕宫大辟此五刑也自此而下有鞭作官刑以治在官者焉有撲作教刑以治在學者焉苟惟人之有罪有被之五刑為己重加之鞭撲為己輕己重則在此者有所不忍己輕則在彼者有所不畏于是又為五流之法以宥五刑之輕者焉於戲盛哉其謂之祥刑謂之明刑者職此之由耳張氏曰易曰天垂象見吉凶又曰見乃謂之象則象者垂以示人使人見之之謂也象以典者所以治之也象以刑者所以制之也典如太宰之六典刑如司冦之五刑皆有以示之使之知所避就則人之犯禁也鮮矣人之罪有加之刀鋸則為太重有施之鞭撲則為太輕故于是又制五流之法所以宥五刑之輕者而已流如水之流也或近或逺各因其罪之輕重而為之所也鞭作官刑所以治在官之賤者撲作教刑所以治在學之少者在官在學皆士也其有不率者則為之鞭撲以治之所以警其怠也金作贖刑者使之出金以贖其罪蓋五刑之有疑者赦而從贖吕刑所謂其罰百鍰是也災眚肆赦者所以宥過也怙終賊刑者所以刑故也康誥曰乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺此眚災肆赦之謂也人有小罪非眚乃惟終自作不典不可不殺此怙終賊刑之謂也又曰欽者敬之至恤者憂之深重言欽哉尤當欽其欽而不敢忽也曾子曰如得其情則哀矜而勿喜吕刑曰哀敬折獄則古人之于刑未嘗不欽恤之矣陳氏曰古人有言曰立大事必用鈇鉞立大事不用鈇鉞唯至敬者能之舜之本心欽謹在上欲天下各安其所而五刑不用不幸而有敗常亂俗者舜不得已而用刑則是舜之所憂也恤憂也孔子曰修已以安百姓堯舜其猶病諸夫惟不得已而用刑則民有不安者矣民之有不安宜舜之所以憂也流共工于幽洲放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服東坡曰舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人為能擊天下之大族以服小民之心故其刑罰至於刑措不用又曰此皆世家巨室其執政用事也久矣非堯始舉而用之苐其存心不正聖人在上明照四海方且承明效職之不暇豈得肆其姦乎一旦堯老禪位舜乃以匹夫而攝天子自畎畝而位巖廊此四人者必憤悒不平凡前日堯之所吁而稱其惡者今則一皆著見不可掩沒矣儻舜不於􅍓試時按其罪惡或流或竄或放或殛則其禍有不可勝言者豈不為堯舜之玷乎周氏曰舜之時四凶皆在其朝而堯未之去舜既即位始正其罪投之四裔而天下咸服豈堯之知人不若舜之明歟且堯為天子舜為匹夫一旦舉而授以天下之重堯非有知人之明其孰能斷之而不疑哉夫天下之事其有難於以天子之位與人而必得其人者哉故曰以天下與人易為天下得人難堯既能知舜矣而謂其不能知四凶也可乎哉蓋四凶至此其罪已大著耳或曰堯非不知四凶也堯以舜興於側微之中天下之心未盡厭服故留遺此大功焉耳嗚呼亦未必然也黃氏君俞曰孔子曰善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解此四凶之所以誅也四凶於堯之末其惡已萌矣堯冀其遷善逺罪而未之誅也於舜之攝惡積而不可解所以見誅也堯舜之刑不刑其過刑其迹也堯舜之賞不賞其功賞其心也故三載考績三考黜陟幽明二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音無垢曰釋地云九夷八狄七戎六蠻謂之四海最難遍及也彼亦何為而靜絶八音哉此以見堯恩之逺及使遼逺如四海亦皆知愁苦而不忍聞絲竹之音金石之奏也夫不忍聞者以其心愁苦也一日如此已足可夸而況三年之久乎夫其所以愁苦必有以也一方如此且足以為美談而況四海皆如此嗚呼堯之德其大矣哉

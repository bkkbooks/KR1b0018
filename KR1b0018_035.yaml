body:
  text: 尚書精義卷三十五宋黃倫撰王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彝大泯亂曰乃其速由文王作罰刑兹無赦不率大戛東坡曰商紂之後三監之世殷人父子兄弟以相賊虐為俗周公之意蓋曰孝友民之天性也不孝不友必有以使之子弟固有罪矣而父兄獨無過乎故曰凡民有自棄於姦宄者此固為元惡大憝矣政刑之所治也至於父子兄弟相與為逆亂則治之當有道不可與寇攘同法我將誨其子曰汝不服父事豈不大傷父心又誨其父曰此非汝子乎何疾之深也又誨其弟曰長幼天命也其可不順又誨其兄曰此汝弟也獨不念先父母鞠養劬勞之哀乎人非土木禽犢稍假以日月須其善心油然而生未有不為君子也我獨弔閔此人不幸而得罪於三監之世不得罪于我政人之手天與我民五常之性而吏不知訓以大泯亂乃迫而蹙之曰乃其速由文王作罰刑兹無赦則民將避罪不暇父子兄弟益相忿戾至於賊殺而後已雖大戛擊痛傷民愈不率也舜命契為司徒曰敬敷五教在寬寬之言緩也五教所以復其天性當緩而不當速也矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂東坡曰禮云庶子之正於公族者教之以孝悌睦友子愛明父子之義長幼之序言治之以峻急雖國君不能况庶子乎無垢曰既以私意教民而不念聖王之意不用聖王所以道民之法徒以私意道民而不由天性上害君治下長民惡事至於此此成王周公所以大惡也君長不能行聖王之道乃用私意率民而殺之則為小臣者與夫在外為正人之官者視上所為皆以淫威酷虐為治大棄文王所以教化之命是乃以非德治民也張氏曰不率大戛猶且刑之無赦况夫庶子訓人與正人小臣諸節者乎夫自庶子至於小臣諸節其職在於分别善惡播敷政教以造民大譽今乃不念上之所教不為上之所用則是有以病其君矣欲治其國先齊其家古之人謂正家而天下治故不能正厥家人則小臣之與外正猶且不足以治之况其逺者乎此所以惟威惟虐而不能道上之德化大放王命而不能稟上之政令乃非德用人則其所以乂民者皆不由德也如是則康叔之治故當正家以先之汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則豫一人以懌無垢曰典即父子兄弟之典也文王於德則在所敬於罰則在所忌忌即慎也我以文王為法則知所敬知所忌矣乃寬裕以訓民曰我所以不敢峻刑以治汝不孝不友之罪者我將追文王所以教化天下之意而不事刑也夫文王能使江漢遊女無思犯禮伐條婦人勉夫以正虞芮爭田入其境而心化豈容有不孝不友之人乎如此用心則合成王周公之心此成王所以悅懌王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦無垢曰化殷民當法殷先哲王蓋由湯至于武丁賢聖之君六七作天下歸殷久矣儻求殷先哲王所以化民之德以率之則宜於民心而應天下之求矣此求當如童蒙求我之求蓋寒者求我而得衣餒者求我而得食不得其所者求我而安不由其道者求我而適正路儻不先合其心其肯求我乎迪者道也道之於吉康之地則適吉康道之於危亡之地則適危亡此理之自然也所以迪之者何政而已矣能迪民於吉康則一國之紀綱可知不能迪民而使之入於危亡之地是國無政而紀綱紊亂矣張氏曰好吉而惡凶好安而惡危民情之常也然其愚而無知非上之明為民以迪之則莫知所由矣若夫上不能迪民使之趨於吉康而民將沉陷於凶危之域如此則無政在厥邦蓋政在迪民故也王曰封豫惟不可不監告汝德之説于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天無垢曰天立國君以道民也民不靜不同是我道之者非其理也非其理國君得無罪哉國君有罪天將罰殛之罰當其罪何所怨乎嗚呼古之言天者皆責備於己而不求全於人也夫民不靜不同天不罪民而罪道民者則以民之本心罔有迪之而不從者今迪之而未同必我所以迪之者非其理也迪之非其理是逆天也逆天者亡罰殛何疑成王明告之曰天之罰殛不在大罪雖小必行不在多罪雖少不赦此古人所以慎獨而於屋漏暗室之間不敢忽也夫罪小而非大罪少而非多天猶且罰殛矧不止藏於心術之間而顯然著在人上腥聞于天者乎夫顯聞于天乃心術不慎自小積而為大自少積而為多也木披其枝者本之搖也水渾其流者源之濁也端本澄源其在慎獨乎君子不可不知也張氏曰成王以我不可不監民之情而告汝以迪民之道則我所以告汝者皆視乎民情而已然而民之所畏服如是而後迪之以德則莫不心悅而聽從矣先王之於天下先德而後刑則刑者所以輔德也今衛地習紂故俗驕淫矜夸草竊姦宄無所不至茍非先之以刑欲其悅德也難矣陳氏曰罪無微而不著無小而不積毫釐之微皆不可逃况今天以罰殛我我何可逃乎成王之自責至矣王曰嗚呼封敬哉無作怨勿用非謀非彝蔽時忱丕則敏德用康乃心顧乃德逺乃猷裕乃以民寧不汝瑕殄無垢曰不敬則忽故不恤天下之情而作怨至於罰為不慎不敬則昏故不燭天下之理而用非合道之謀畫非先王之典彝至於德為不明惟敬則慎豈敢作怨惟敬則明豈至於用非謀非彝哉此信敬之心以大則文王之敏德何謂敏德文王於德則明於罰則慎適中其幾可謂敏矣吾能斷行是信敬之心以文王為凖的以卜敬之進否夢寐文王羮墻文王則文王之心盡見於吾心矣內信於敬外法文王則行無玷而德明矣蓋敬勝百邪故可以康我心敬則三省故可以顧我德敬則深思故可以逺我謀敬之為用如此康叔其可忽哉內信此敬外法文王則待物以恕而罰慎矣蓋敬則踐履而知難易此所以能裕民裕民則民寧民寧則我亦寧於位而不為上所瑕疵上所殄絶矣史氏曰善為國者必先明立政用人之道善行道者斯能盡治己愛人之方古之告戒其臣與善事其君者蓋常以是為本也無嚴刑重賦以作其怨勿搔民變古以用其非彝立政之道審矣聽斷於至誠者而不疑取法於有德者而不慢任人之道至矣能推是道以行之則可以安康其心而不亂顧省其德而不流恢逺其猷而不狹寬裕其民而不暴舉是數者行而不悖非盡治己愛人之方能如此乎以是為國則過愆自絶之罪無自而至矣王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命高乃聽用康乂民無垢曰命天命也天命則爵位也豈有常哉明德慎罰則爵位可保無德濫刑則爵位殄絶此理之自然者也豈有常哉念天命之不常則警戒恐懼而明德慎罰常不絶朝覲之禮矣享當如享禮之享也儻惟不念天命放肆怠傲無德濫刑則將擯黜滅亡以絶朝覲之禮無從得望天子之清光矣服謂諸侯之服命謂諸侯之命若上公九命之類明服命之不可輕高其聽以法先王以言非文王與殷先哲之德刑則弗聽也其聽如此豈不高哉明服命之不可輕高其聽而不卑下則其心尊嚴逺大用此以康治民夫何難哉張氏曰康叔之封於妹邦有君道焉其制節則在我而無所拘故告之以肆哉曰惟命不于常汝念哉汝不能念天之不常則我以罪絶於汝使汝不得為諸侯而享止此所謂殄享者也王若曰往哉封勿替敬典聽朕告汝乃以殷民世享無垢曰成王告康叔其宗旨止在一敬字而已儻康叔聽其所告念兹在兹不忘於屋漏暗室之間則德性常尊學問有本而高明廣大常有尊嚴南面之象以此殷民世世子孫踐履此道享爵祿於國家夫何疑哉張氏曰諸侯所以保其國以享天子者豈他道哉欽典聽命而已酒誥王若曰明大命于妹邦乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜無垢曰妹邦紂所都其俗染紂之化為深沉湎之習猶在故周公成王令康叔推明酒誥大明于妹邦使知酒之為害也又曰文王在西土為西伯得以號令諸侯故有誥毖庶邦之事也誥毖者誥以所慎之事也夫其誥毖庶邦也非特其君而已自庶士以至御事皆誥之所慎者何事也朝夕誥曰祀祭方用此酒非因祭祀不用也夫因祭祀所以用酒者以酒可以發和氣而通神明也然人之飲酒不可過其量過量則為沉湎矣是以古人飲不過三爵一酬一獻一酢而以禮將之可見聖王之意矣又曰天降命為酒惟以祭祀天地鬼神爾而我民以天地鬼神所享之物縱之而至有酒禍是因飲酒而大亂喪德也大亂謂放辟邪侈淫酗肆虐也由是遂喪平生名節不可復齒于士君子之列其為喪德大矣民飲酒則喪德諸侯飲酒則喪邦非酒為不祥物也以祭天地鬼神之物人不可僣飲也如太常衮冕王所服用人僣用之其得罪如何非太常衮冕為不祥物也以王者所服用凡民不可僣也酒亦若此其可僣乎東坡曰酒行于天下非薄物細故也故本之天天始令民作酒者本為祭祀而已張氏曰酒所以養陽氣飲而無節亦足以速禍先王之於酒既立之監使守焉又佐之史使之識其過而防其亂也至於器用之間於彝有舟舟以載為事於樽有靁靁以鼓為事載有量鼓有節則其防亂之意益可見矣或至大亂喪德者無非以酒為行其甚至於喪邦者無非以酒為辜吕氏曰天當初所以教人置酒之本意只為祭祀設不為人酣飲設到後來人不知元初置酒之本意乃縱於酒至於大亂喪其德元不是緣酒所使然至於大邦小邦所以喪滅者亦皆是酒上得罪此自人飲酒後至於如此何故却説天降威以此知天之不在人心外民為酒所使為酒得罪便是天降威處文王誥教小子有正有事無彝酒越庶國飲惟祀德將無醉惟曰我民迪小子惟土物愛厥心臧無垢曰戒庶邦飲酒則曰誥毖戒小子飲酒則曰誥教毖則其辭嚴教則其辭緩責士大夫則嚴責民則寬之意也其教如何曰汝民當知在上有糾正之官在汝有耕作之事非祭祀養親不可常飲酒也蓋常飲酒則糾正之官當治汝罪矣而耕作之事必失天時矣又曰文王以有正有事無彝酒之説誥教小子小子以文王之教教子孫故文王之民上懼糾正下力耕作其土地所生之物種藝播植生長成熟一出於筋力之中擁培之內故皆薰然生保護愛惜之心惟恐有戕害殘賊之者其心如此豈不善乎故愛物則足以生善心害物則足以生不善之心吕氏曰當時文王便是衆迷中獨悟衆醉中獨醒所以教戒有正有事之人不可常飲酒至於庶國惟是祭祀後方可飲酒於是時而飲酒乃是飲福受胙時節雖然是飲神之福後飲酒又須當以德將之方才不至於醉大抵人中無所主則為麴蘖所迷奪惟是將之以德中有所主了方可無醉之失文王説與民汝當導由其小子惟是愛土物去勤稼穡服田畝其心方善豈可縱酒聰聽祖考之彝訓越小大德小子惟一無垢曰愛則其心善善心既生則聞一善言無不通曉此所以聰聽祖考之常訓也於彝訓中玩味涵泳深見祖父之心故小大長幼率皆感激得其祖父教育之恩無有一人生異意而害物者夫黍秫為酒儻使嗜酒必不愛土物盡以供一醉之用矣惟其上懼糾正下力耕作不敢常以飲酒為事所以有善心如此也張氏曰對小子而言之則曰祖考言民之小子能聰聽祖考之彝訓則其於小德大德率皆惟一而不至於二三也夫民德之所以歸一者由其不以酒亂之故也妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒無垢曰此成王周公體誥毖誥教之意以教妹土之民曰我股肱康叔有純一之德汝等當繼之康叔純一其心以事君汝等當繼康叔純一其心以事父母純一其心何以見之種黍稷以事父兄逺服賈以養父母是也蓋其心不純則犯世俗五不孝安能種黍稷逺服賈拳拳以父母兄弟為事乎又曰祭祀以酒養父母以酒養老以酒待賓以酒此二帝三王之法也人子既有黍稷供朝夕之奉又有逺物供意外之須則父母志意滿足自慶吾有子矣人子知吾父母歡樂愛念吾何以報天地之恩仁慈之德哉則當齋潔此心致殷勤厚意于酒用以奉吾父母以延留此歡樂愛念之心也人臣得人主意人子得父母意天下樂事也洗齋潔也腆厚也吕氏曰周公前面説許多所以禁酒者如此之嚴到此却又教他用酒大抵聖人之教不欲便斷絶人須要通人情所以前面閉了許多飲酒門路到這裏又復與他開一個飲酒門路但教人有節不要踰此節庶士有正越庶伯君子其爾典聽朕教爾大克羞耉惟君爾乃飲食醉飽無垢曰庶士羣吏也有正羣吏之長也庶伯衆官之長也君子君國子民謂康叔也戒之使常聽成王周公之教也蓋聽則教入于心布乎四體形乎動靜不聽則教無自入矣聽以耳者則茫洋而無所得聽以心者則深切而有所警言汝等大能進德為國耆老則人君當行養老之禮執醬執爵割牲奉爼而老者足以醉飽矣如此豈不風雅可觀其與沉湎無度者相去逺矣張氏曰爾大能進至於耉老則惟君當以養老之故故汝能以飲食醉飽夫大克羞耉則年之與德彌高彌劭非飲之使醉則無以養其氣非食之使飽則無以養其體君之所以飲食之而使醉飽者將以養其氣體而已然則人君欲飲食醉飽在夫大克進德保有天命然後可以享此丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元德永不忘在王家無垢曰此教康叔也言康叔當大思曰我當觀省商紂以酒而亡國又當觀省聖王有養親養老之禮以商紂為戒則嗜酒者有禁以養親養老為禮則飲酒者有數如此則不放肆以陷民罪不苛虐以失民心豈非中德乎又曰能作稽中德則爾為諸侯無愧於宗廟矣故可以進飲食以見祖宗焉飲福受胙則汝亦可以因福胙而少休矣又曰大臣佐天子治天下儻所行事不考中德太過而苛刻不及而縱恣則天下弊政可勝言乎惟作稽中德則蓄為和氣散為祥風忠厚而非姑息密察而非刻薄使天下依依繩墨之中而無厭苦之患此真王正事之臣也又曰作稽中德豈特可以為王正事大臣而已中者天下之大本和者天下之達道致中和天地位焉萬物育焉冝乎天順其大德而使世世有賢子孫受王朝封爵而不絶也不然康叔何以四十三傳獨後周而亡乎張氏曰克永觀省則所觀者非一朝一夕之故作稽中德則所作者無過不及之行夫如是然後可以守其宗廟保其祿位此所以庶幾能羞饋祀而自介用逸也羞進也介副也人臣能進其饋祀以享其先祖自副用逸以保其宴安蓋以其克永觀省作稽中德故也人臣能盡此道則上足以為天之所助下足以為王之所紀兹亦惟天若元德則天順而助之矣

body:
  text: 尚書精義卷八宋黄倫撰帝曰臣作朕股肱耳目予欲左右有民汝翼予欲宣力四方汝為予欲觀古人之象日月星辰山龍華蟲作㑹宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明予欲聞六律五聲八音在治忽以出納五言汝聴戴氏曰甚哉舜禹君臣相為戒敕而成無為之治者何其詳也仁義以為本而禮樂以成之所謂臣作朕股肱耳目者以此而已予欲左右有民汝翼者仁也予欲宣力四方汝為者義也左右斯民非仁不能宣力天下非義莫行仁義立矣則禮以文之故於是觀象作㑹作服而汝明之也樂以和之故於是以六律五聲八音在治忽以出納五言汝聴之也又曰衣裳之制十有二章之辨先儒紛然言之不齊尤不可以不辨也夫衣皆𤣥也裳皆纁也日也月也星辰也山也龍也華蟲也此六章者在衣而會之宗廟之彝也藻也火也粉也米也黼也黻也繡之於絺以為裳而已日月星辰以昭其明山以昭其仁龍以昭其變而華蟲文明之物也聖人明以治天下而仁以行之其用雖莫測也而治教刑政燦然備具以此臨民民其安之以此事神神其享之故此六物見於宗彞又見於衣也柔順清潔可以薦羞者藻昭明齊速可以烹飪者火米以養人粉以澤物至於黼則所以為斷也黻則所以為辨也聖人藻飾治具粉澤王猷以養天下在於斷而能辨然後足以成治功故此六物見於裳也惟天子備十有二章公自衮冕而下無日月星辰而有山龍盖九章也侯自鷩冕而下無山龍而有華蟲盖七章也伯自毳冕而下無華蟲而有虎蜼盖五章也子自希冕而下無虎蜼而有粉米盖三章也男則無冕裳黼黻而已其章不足道也此上下等殺之制於周為詳孫氏曰自日月至華蟲此六者皆畫於衣故曰作繪以法於天其數六者法天之陽氣之六律也自宗彝至黼黻此六者皆繡於裳故云絺繡絺繡紩也謂紩刺以為繡文以法于地其數亦六者法地之隂氣之六吕也故皋陶云五服五章哉鄭注云五服十二也臨川問曰宗彝所以象孝也象孝奚取於虎蜼文公曰虎義也蜼知也義以制事知以察物然後可以保宗廟故取於虎蜼予違汝弼汝無面從退有後言欽四鄰庶頑䜛説若不在時侯以明之撻以記之書用識哉欲並生哉無垢曰余讀至此乃知舜之所以求於羣臣也深矣夫左右有民宣力四方觀古人之象以作服以聲音察治忽出納五言此舜之欲也然人不自保欲在於此而輒自違之或怠意倦勤或私見害公或䜛説妨正於此四事一有背違則又望於臣下之正救也然人主勢位崇髙生殺可畏其有顧望怯懦者雖曉然知人主背違本欲納諌畏其刑威乃面從其短退知其不然也徒為後言以自解而已可謂不忠之大者也舜察臣下之情乃至於此可謂明聖矣又曰夫臣鄰之間翼為明聴不失其職至於君自背違則致正救之義此乃賢人君子也若夫翼為明聴一皆失職及見背違又不正救此乃庶頑䜛説也古人以心不則徳義者謂之頑而傷良者謂之讒頑讒之人心背正道必以舜之欲為未然口生浮言必以舜之欲有所沮豈有翼為明聴正救之心乎舜之待之亦有道矣其道如何侯以明之使之知耻而又不改則撻以記之使之知悔而又不改則書用識哉使之知懼其所以困厄之如此者豈有他哉工以納言時而颺之格則承之庸之否則威之荆公曰工以納言時而颺之者所謂以樂教也格則承之庸之者既教而成矣則有徳者承之而承之者使之在位也有能者庸之而庸之者使之在職也否則威之者教之不率而後威之以刑先王所以成就天下之材至於如此可謂至矣禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不讓敢不敬應帝不時敷同日奏罔功無垢曰禹聞舜威之之言有似有苗不率遽令徂征之意所以有俞哉之言也夫庶頑讒説所以不格者必吾有所未至也豈可遽威之哉聖王所以大有過人者以知責已之道也如有苗逆命帝知徳有所不至誕敷文徳七旬有苗格矣盖省已修徳積而至於七旬吾之徳日新則彼之惡日去感應之理也蕭氏曰賢否明則人安於分而無有競心是以讓也名器不瀆而不敢慢是以敬應苟不於是敷溥而大同之則是私於親近而賢者逺故日進於無功無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世予創若時娶于塗山辛壬癸甲啓呱呱而泣予弗子惟荒度土功無垢曰舜聖人也豈有傲乎曰遽征有苗益則曰滿遽威庶頑豈可不謂之傲乎此心不已必變為虐慢遊是好晝夜不息至罔水行舟以繼其逸欲朋淫于家以紊其天常皆傲不已之積也傲不已則殄厥世者乃傲之影響也今庶頑之不格豈有以召之者然乎予懲創傲虐之絶世所以娶于塗山不敢久安越四日而徃治水啓呱呱而弗子過門而不入其心所念惟荒度土功耳顧氏曰堯之為父而子之惡乃至于朋淫于家用殄厥世何也將堯之道不行於妻子耶聖人之於父子先之以恩而後之以義惟先恩而後義則其子雖不善而不至於忘父子之情夫丹朱既已不善矣彼堯將督責而懲創之則足以失父之慈而未足以致子於道此古人所以易子而教也故曰父子責善賊恩之大者又曰責善則離離則不祥莫大焉堯亦以其身之不幸也是故在於不幸之中又有甚之此固聖人明父子之際者雖然盖亦文而過之也舜之為聖人也至矣而禹戒之丹朱者何也此所以見君臣之無間也舜聖矣猶戒以丹朱下而逺者其可以黙哉弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苗頑弗即工帝其念哉胡氏曰自畿甸薄海隅其為地幾何則溥天之下莫非王土矣由王公迨黎庶其為衆幾何則率土之濵莫非王臣矣先王以地不能自守也必分地而與之守以民不能自治也必分民而與之治此分内外以為畿異逺近以為服不得已也先王以建萬國親諸侯則大邦小邦同姓異姓皆不出乎五服之内而弼成之則至于五千也盖方禹治水之初獸蹄鳥跡之道交於中國春作秋成有弗穫者焉則天下盖嘗否而無泰暌而難通惟地平天成人得平土而居山治則鳥獸之害消川治則龍蛇之居逺則向之所謂否者今則易而為泰向之所謂暌者今則變而為通朝覲㑹同於是以均道里貢賦於是乎一以之頒正朔以之考制度無不由此非禹弼成之尚何能哉盖拂我而相之之謂弼則禹之功有治險為平轉害為利者矣然後一州擇十二諸侯為之師而有以取正五國建一諸侯為之長而有以為率使内外相聫小大相屬如身之使臂臂之運指國體完備政無不舉則各迪有功乃其效也又曰聖人以一身之㣲臨四海之廣衆建諸侯以為夾輔然所謂諸侯者有人民焉有社稷焉甲兵足以自衛財賦足以自奉不設為之長則人各有心國自為政於是州各有師以司一州之諸侯又為州牧任一州之責其諸侯為甚衆又設為之長使相州牧而主諸侯使大以比小小以事大則上下相維尊卑相統莫之違矣所謂州者盖要服之内也帝曰迪朕徳時乃功惟敘臯陶方祇厥敘方施象刑惟明張氏曰由而行之之謂迪迪朕徳者言天下之人皆由舜徳而行之也舜以謂天下之人皆迪朕徳是汝功惟敘故也乃功惟敘者九功之得其敘也水火金木土榖惟修則六府之得其敘也正徳利用厚生惟和則三事之得其敘也六府得其敘則民有常産三事得其敘則民有常心既有常産又有常心則其迪徳也宜矣又曰率九功之敘而迪者在所賞違九功之敘而不迪者在所刑臯陶之方施象刑惟明乃所以祇九功之敘也當是之時惟苗頑不即九功之敘自非方祇厥敘之人其能明刑以治之哉夔曰戛擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后徳讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳳皇來儀夔曰於予擊石拊石百獸率舞庶尹允諧無垢曰嗚呼舜廷之臣幾於同氣而異息同心而異形大舜於庶頑讒説責之太嚴不知自反而禹乃以修徳諄諄反覆辯論幾數百言舜終不寤若不然禹之説者夔乃以典樂之事諫焉意言庶頑讒説皆舜有以感召之也豈可不自反而修徳哉如祖考來格虞賔在位羣后徳讓則堂上之樂戛擊鳴球搏拊琴瑟與夫詠歌有以召之也鳥獸蹌蹌則堂下之樂下管鼗鼓合止柷敔笙鏞間作有以召之也鳯凰來儀則簫韶有以召之也鳥獸率舞庶尹允諧則擊石拊石有以召之也夫樂一入中和隨類感召如此則庶頑讒説之不格豈可不自反而修徳乎夔之所言所以成就禹之所陳而開寤舜之心也禹夔二公其心無他一於是而已矣夔以樂為言則又顯然可見者如祖考之難格丹朱之難化鳥獸之難動鳳凰之難感樂一動尚使之來格使之在位使之率舞使之來儀若執契劵以取責於人無不如其意者苟吾徳之已至豈有如庶頑讒説者而不格乎舜可以無疑矣胡氏曰治定制禮功成作樂則樂之象成其來久矣自咸池雲門大章之樂作而舜因之則韶之為樂盡善盡美而無以加之矣然樂之數不過乎九成而樂之分不出乎上下而已盖堂上之樂所以象宗廟朝廷之治所謂戛擊鳴球搏拊琴瑟以詠者是也堂下之樂所以象鳥獸萬物之治所謂下管鼗鼓合止柷敔笙鏞以間者是也傳曰歌者在上貴人聲也故樂以登歌為貴則凡以詠者舉堂上之樂矣詩曰既和且平依我磬聲故樂以磬聲為依凡以間者舉堂下之樂也所謂間者乃堂上堂下之樂迭作而已則羣后德遜鳥獸蹌蹌不亦宜乎又曰戛擊是作止之名非玉器也故以戛擊為柷敔之狀經典無文漢初以來學者相傳皆云柷如漆桶中有椎柄動而擊其旁也敔狀如伏虎背上有刻戛之以為聲也樂之初作擊柷以作之樂之将末戛敔以止之故云所以作止又曰九成必以簫者凡樂大矣而未備則奏其器之大者及其既備則器之小者無不舉矣靈臺之詩曰賁鼓惟鏞有瞽之詩曰簫管備舉與此同意簫之為樂備矣小者無不舉又以其形象鳳之翼其聲象鳯之鳴古詩鳯凰啾啾其翼若竽其聲若簫簫之形聲取象鳯凰相匹而來也又曰有鳯有鳯樂帝之心簫者聲之至細鳯者物之難致以至細之聲來至難之物非在樂之聲音形容樂帝之心而已鳯凰之為物鳴中律吕色備五采治則見亂則隠賈誼曰覽徳輝而下之此於舜之時以類應也鳥獸蹌蹌鳯凰來儀固有間矣其或鳯凰而為蹌蹌則非其應也楊雄曰鳯凰蹌蹌匪堯之庭其知言乎簫韶必以九成者韶出於可欲文樂也武出於不得已武樂也文為陽武為隂陽之變止于九隂之變止于六凡樂每一變為一成故韶以九成武以六成又曰楚狂接輿歌而過孔子之前曰鳯兮鳯兮何徳之衰盖孔子自謂鳯鳥不至吾已矣夫夫聖人之出處天運之所在天下之所以治亂者也又曰周公謂召公曰收罔勉不及耇造徳不降我則鳴鳥不聞盖言在上者勉而不怠則足以倡其臣在下者徳降于民則足以成其君舜所以無為于上而禹臯陶所以樂盡其心者一唱一應皆得其道也鳯凰以其匹而來也實在此時周公以禹稷自任以舜望成王盖亦有意乎帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熈哉無垢曰夫人事皆天命也修人事則是謹天命非於人事之外别有天命也以威待庶頑此人事之不至也人事不至則是忽天命修徳以格庶頑此人事之盡者也人事之盡則是勅天命勑者正也夫人事之修不修當于時幾而察之庶頑不格此當謹天命之時也以威俟之則失天命之時矣庶頑不格此當謹天命之㡬也以威俟之則失天命之㡬矣失時則有後悔失㡬則有大禍㡬㣲之間豈可忽哉又曰天下之理一處明則萬理皆明一處暗則萬理皆暗舜因禹夔之説乃悟萬事皆自己出故百工熈哉遂斷之以元首起而不復疑也又悟元首之起乃自股肱之臣喜於開導也其深望於禹夔豈有既哉周氏諶曰古者君臣相遇未有如舜禹益稷臯陶之際方其朝廷論議開心腹露情素而上下無毫髪之間揚君之美稱已之善而應和唯諾直言忠告無所諱忌不啻若父子兄弟之親雍睦諧和而各進其謀謨此非特聖賢之遇合盖至誠有以結之也是以相與慮世也深而憂民也逺悉意丁寧無所不盡焉蒲氏宗孟曰天之所以命人君者非苟畀其天下之奉而已人君之所以勅正天命者非苟利其天下之養而已天命人君其要貴於不負其所畀人君勅正天命其要貴於不悖其所為故能措天下於安寧無事如是者豈有深逺難曉之迹變化不可知之理一言而可盡者惟在順時惟在謹㣲耳舉天下之事有大于天時乎不逆其時風雨順燠暘節日月光庶徴明天地之和格矣天下之事有深於幾㣲乎不忽其㣲釁隙閉芽蘖消桃虫之害去堅氷之禍不至矣時在天幾在人謹其在天者畏其在人者是以人君之政有一相戾於其間隂陽乖謬寒暑四時將不得其正生民將受其弊為之上者安得不謹乎臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉臨川曰臯陶承歌以戒帝有謂屢省乃成欽哉盖善始非難而善終為難能屢自顧其成功則治不至于亂安不至于危孟子曰一逰一豫為諸侯度是逰豫人之所不免也君子非不豫也豫至於逸不可也君子非不逰也逰至于盤則不可也此太康所以逸豫盤逰而至于失邦矣乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞徃欽哉無垢曰臯陶喜舜之開寤不自知其言之出也所以將順成就舜勑天命之美意而又堅固之使不變逺大之使不息也至於賡續舜股肱之歌而歌之至於載而不已者此又臯陶責舜之自反而修已也其歌之意以謂股肱良哉庶事康哉實由乎元首明哉而已是良與康乃人君明徳之效騐也又以謂股肱惰哉萬事墮哉實由乎元首叢脞而已是惰與墮乃人君叢脞效騐也然則庶頑不格是誰之過歟而區區欲以射侯撻罸書識威刑以懼之亦幾於苛碎矣不若退而修徳知夫惰與墮皆吾叢脞所致良與康皆吾明徳所致則修徳其敢已乎大禹之意夔之意臯陶之意無非使舜之自反舜祇敬三人之意而拜曰然自兹以徃其敢不欽乎范氏曰不明之君不能知人故務察而多疑欲以一人之身代百官之所為則雖聖智亦日力不足矣温公曰人君明則百官得其人百官得其人則衆事無不美人君細碎無大畧則羣臣不盡力羣臣不盡力則萬事皆廢壞此二者治亂之至要也

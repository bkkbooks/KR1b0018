body:
  text: 尚書精義卷三十六宋黃倫撰王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命無垢曰言文王之誥行於庶邦以致小子皆不厚於酒而留意於德商紂方庶羣自酒腥聞在上而文王之化乃使人不厚於酒至顯相之人皆有肅雍之德而江漢遊女無思犯禮伐條婦人勉夫以正此天所以眷顧我周家至於武王而能受天命以有天下也酒能亂德如此妹土之民可不警乎吕氏曰大抵酒者雖人所嗜之物然所性不存焉則為德甚薄這邊既薄旁邊須厚天下之理相為消長既不去這一邊厚必去那一邊厚才不厚於酒其於德業必須厚此其所以能受商之命乃不厚於酒而厚於德之力也王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲無垢曰成王言我聞在昔殷先明哲之王以道而畏天以道而顯小民迪道也何謂道畏天之心道也顯民之心亦道也使人主不畏天則放僻邪侈何所不至使人主不顯民則風俗敗壞亦何所不至此所當經德秉哲以畏天而顯民也經德則動容周旋皆中於禮秉哲則逺近幽深遂知來物以此顯民蓋沛乎其有餘矣經德秉哲上以畏天下以顯民逺以成王業近以畏賢相又曰惟人主畏相故御事所以輔人主者亦恭敬於職事不敢自暇怠逸豫之路以行也自之為言行也以為御事大臣其輔人主皆由恭敬行不敢由暇豫之路以行而廢職事也以是觀之天下之事無非自己而出我畏相而御事有恭敬孟子曰行有不得者皆反求諸己其身正而天下歸之又曰不敢自暇逸中行况曰其敢聚飲乎蓋有心則有迹無此心則安有此迹御事大臣尚無暇逸之心人主安得有聚飲之迹乎張氏曰夫殷先哲王上能迪畏於天顯則足以為天之所輔下能迪畏於小民則足以為民之所式夫天顯難忱矣奉之而弗違者所以迪天顯也欽之而不忽者所以畏天顯也小民難保矣訓之使不迷者所以迪小民也承之而不侮者所以畏小民也經德則常厥德而不廢也秉哲則操其智而不昧也言殷先哲王迪畏天顯小民經德秉哲自成湯以來率皆如此以至于帝乙皆成王畏相也越在外服侯甸男衛邦伯越在內服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王德顯越尹人祗辟無垢曰夫畏者不敢之心也殷先哲王持不敢之心以畏天而顯民以成王業以畏賢相故御事亦不敢暇逸不敢聚飲內服外服百姓里居亦不敢湎于酒不敢之心發於先王方寸之間守則為經德用則為秉哲推而上之則為畏天推而下之則為顯民逺之則成王業近之則畏賢相而風化所及使內服外服百姓里居皆由不敢之心以行嗚呼不敢之心豈不大乎使先王少肆不敢之心而為敢則亦何所不至哉故殷先哲王如中宗則不敢荒寧中宗傳此不敢之心至於髙宗髙宗亦不敢荒寧髙宗傳此不敢之心至于祖甲祖甲則不敢侮鰥寡祖甲傳此不敢之心至于周文王文王則不敢盤于遊畋嗚呼不敢之心如此其大殷自祖甲之後不敢之心絶而不傳故敢于耽樂之從其勇於敢之心小則短命故或十年或七八年或五六年或四三年大則喪邦則紂敢於淫酗而至於燔身懸首也嗚呼後世人主其以不敢而為聖明以敢而為昏庸者多矣可不知所警乎又曰夫其不暇以經營者果何事哉上則以助成王之德為事下則以正人為事近則以祗辟為事夫以不敢為主而經營於此三大事可謂有本有用矣天子以畏為德內服外服百姓里居亦以畏應之使天子之畏愈深其助成王德為何如哉下以正人使人皆以畏為心而不敢為惡近則敬天子之法以堅固我謹畏之心夫不少暇逸而汲汲於此三事天下之風俗皆在法度之中行整整乎其不可亂也緝緝乎其可法象也其盛矣哉我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彝用燕喪威儀民罔不衋傷心惟荒腆于酒不惟自息乃逸厥心疾很不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜無垢曰殷先哲王以道而畏天後嗣王紂以酒而不畏天殷先哲王以道而顯民後嗣王紂以酒而不留心於教化無以開寤下民殷先哲王以經德秉哲逺以成王業近以畏賢相後嗣王紂以酒而顛倒錯亂不復以成王業畏賢相為事所祗敬所保護者皆天下之怨府耳此心顛倒不可改易亡天下敗國家者類皆如是夫所以成王業者在得人心而怨府者所以失人心者也又曰天下之尊無逾人主以求一燕樂之故而盡喪人主之威儀至於與下俚等而不恥此民所以無不衋然傷心也衋驚也若齊顯祖袒露形體唐莊宗自為優人是也蓋人主居尊位髙天下當言思可道行思可樂德義可尊作事可法容止可觀進退可度使民畏而愛之則而象之可也而以求一燕樂為此下俚可勝惜哉又曰民傷心而紂方日甚威儀盡喪猶未已也且人之心於一處重必於萬事皆輕紂惟荒于酒故於國家事皆忽惟厚于酒故于國家事皆薄史謂以酒為池以肉為林使男女倮相逐其間為長夜之飲如此豈肯少自休息乎逸樂是慕惟日不足天下將亡必生此怪異不然六七聖賢所造基業豈易搖動乎又曰先王之祀以德不以物故奉牲以告奉盛以告奉酒醴以告皆以德為主耳有德則馨香無德則臭穢何謂德天下歌頌以為聖主此有德之君也其馨香為何如哉天以民為心民歌頌則是馨香之祀升聞于天矣天下怨怒以為殘賊此無德之君也其腥穢為如何哉紂方日視民如仇讐唯恐害之不盡力豈回心向道愛育斯民以薦馨香之祀乎又曰夫馨香則人所愛腥穢則人所惡人事如此天理亦然紂既腥穢升聞于天天罔愛于殷紂豈天深逺不可測知哉此其理也夫人主為天所子父豈不愛其子哉所以得罪于天至於如此者無他事也以逸而已蓋殷先哲王以德為天所相紂以逸為天所絶畏者何不敢之心也逸者何敢也敢其可不慎哉又曰紂為惡如此故自取滅亡焚戮之禍豈天以酷虐為心哉天下之理作善則百祥所集作不善則千殃所種紂不作善從百祥中行乃作不善自千殃中立天雖欲挽之於福祥之地不可得也東坡曰其心為酒所使忿疾強很不復畏死不醉而怒曰奰明醉者常怒也國君醉則殺人士庶人醉則相殺明酒之能使人怒也紂之怒至於殺其身而不畏吕氏曰到此周公又舉商之所亡者告康叔在今後嗣王酣身紂為長夜之飲全身在酒裏了其命自然顛錯昏迷無緣得顯于民到這裏又却都不恤民之怨其所以祗敬保養者只是一箇怨更不曽換易先王之興只是敬保其德而不易後世却只敬保其怨而不易夫怨不當保又却不能改易祗保者猶言惡力未已其勢自然亡王曰封豫不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時無垢曰人不可以水照形知形之妍醜無益也當以民照興亡知民之興亡則吾知所畏慕矣殷先哲王以畏而興後嗣王以逸而亡以殷為照吾其畏乎畏則吾家當興抑吾逸而不畏乎逸則吾家當亡矣豈特人主自士大夫下至庶民以殷士大夫庶民為照畏則可以保家逸則淪胥以敗我其可不用殷為一大照以兢畏撫安天下乎豫惟曰汝劼毖殷獻臣侯甸男衛矧太史友內史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒無垢曰劼固也毖慎也東坡曰堅固汝心敬畏殷賢臣之在侯甸男衛者其意殷之賢者以國家既亡散在侯甸男衛其識殷家典故知殷家之所以興亡汝當堅固此心不為私欲所搖蕩以敬畏之庶幾知為國之法也又曰非特太史內史典法所在汝當尊敬如汝國之賢臣為百司所宗之官者皆有德有行為可矜式非特獻臣為可尊敬汝所委任服休服采之人可不尊敬乎圻父司馬也司馬主封圻故曰圻父農父司徒也司徒本農事故曰農父宏父司空也司空主廓地故曰宏父父尊者之稱成王周公以為服休服采之人尚尊敬劼毖况為汝疇匹如司馬之伐叛司徒之若保司空之定辟考不可不尊敬之乎蓋三卿一國尊官皆天子命卿也其勢與康叔等必其智慮道德有足以毗贊康叔者其可輕哉王雱曰服休者以德為事服采者以事為事休德也作德心逸日休者也采事若豫采者也皆我所委任豈可忽哉司馬主薄伐愆違司徒主若國保民司空主治四民定而生之以致辟其意訓薄為伐謂有違命者司馬伐之吕氏曰剛制二字最有意夫當時酒之為病甚深苟泛泛悠悠地制他却不得若非是用力後斷然要制他如何制得他住故謂之剛制厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺東坡曰舊説以謂羣飲者周人則殺之殷人則勿殺也民同犯一罪而殺其一不殺其一周人其肯服乎民羣飲則死公卿大夫羣飲可不誅乎不誅吏則無以禁民吏民皆誅則桀紂之虐不至若此矣皆事之必不然者豫不可以不論無垢曰周人素知禮義雖立羣飲其殺之法蓋無有一人犯之者文王誥毖庶邦則庶邦飲惟祀誥教小子則我民厥心臧豈有羣聚飲酒之風乎想有一人唱之則必相與驚愕而譏評也至於殷人所以開導諸臣百工者惟以沉湎于酒為事一旦立羣飲其殺之法豈不酷虐乎先王為政大抵寬厚欲其知義理自不犯于有司不欲酷刑虐法置于有罪而其心無不自知其為不可犯也故曰勿用殺之姑惟教之姑惟教之謂當開喻訓導使其心曉然知飲酒無益足以喪德毁行敗國亡家如見涕唾如聞惡臭而不肯近也又曰成王周公之誥康叔其分明别白如此以為汝有此戒酒之效則是明於享上之道乃或不用我教辭而躬自飲酒使吏民波蕩從之則是汝康叔不以我一人為念沉湎于酒昏愚穢惡濁亂政事是以惡政陷民於罪而殺之也周氏曰古之用刑自唐以至于周一治一亂顧其間增損不同而五刑未嘗改也若乃其出入則視國之治亂而為之輕重亦不必同也豫於酒誥見之矣教化已明習俗已成而人有犯上之惡則罪雖小有被之大刑者矣其曰厥或誥曰羣飲汝勿佚盡執拘以歸于周豫其殺是也教化未明習俗未成則所當被以大刑者有釋而不治矣其曰殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之是也後之人苟能視其時之治亂而輕重焉帝王之治庶乎其復見矣王曰封汝典聽朕毖勿辨乃司民湎于酒東坡曰禁之難行者莫若酒周公憂之深矣故卒告之曰汝既常聽我所畏慎者又當専建一司以察沈湎若以泛責羣吏而不辨有司禁必不行矣或曰自漢武帝以來至于今皆有酒禁刑者有至流賞或不資未嘗少縱而私釀終不能絶也周公獨何以禁之曰周公無所利於酒也以正民德而已甲乙皆笞其子甲之子服乙之子不服何也甲笞其子而責之學乙笞其子而奪之食此周公所以能禁酒也梓材王曰封以厥庶民暨厥臣逹大家以厥臣逹王惟邦君汝若恆越曰我有師師司徒司馬司空尹旅曰豫罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歷人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟惟曰若稽田既勤敷災惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命已若兹監惟曰欲至于萬年惟王子子孫孫永保民案此篇經解永樂大典原缺成王在豐欲宅洛邑使召公先相宅作召誥召誥惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成無垢曰言成王至豐遣召公先周公相宅也宅洛之事召公營之周公定之以此一事付召公平昔思慮周密智意精深可知矣又曰召公順成王之命以來相洛二月癸卯晦三月甲辰朔三日丙午也其夜月方出而明生故謂之朏言朏則知其為三日矣太保自二月乙未受成王卜洛之命至三月戊申初五日晨朝至于洛而卜宅自乙未至戊申自豐至洛凡十四日也此皆史官暗存歷法于中使後世步日推策有所考也又曰於戊申又三日是庚戌乃三月七日也其日太保乃以庶殷攻治郊廟社稷朝市之位於洛水之北也在漢謂之河南城於庚戌又五日是甲寅是三月十一日是日攻治郊廟朝市之位已定矣攻之為言以為去災翳定向背量闊狹畫疆畔而未及架造也胡彥時曰卜宅而得卜攻位而位成者召公也逹觀新邑之所營分侯伯以役事者周公也王者所欲而一先一後將與悉力以成之此所以為周召歟王朝至於豐在於二月之乙未太保朝至於洛在于三月之戊申其相距至於旬有四日之近蓋上倡下應若是其速也攻位于庚戌位成于甲寅其成在五日之間蓋百工庶民趨事赴功如是其急也若翼日乙卯周公朝至于洛則逹觀于新邑營越三日丁巳用牲于郊牛二越翼日戊午乃社于新邑牛一羊一豕一無垢曰若助辭也今甲寅明日乃乙卯是三月十二日周公此日朝至于洛不及息肩則便四逹觀覽于新邑營建之處也又曰於乙卯又三日乃丁巳是三月十四日也於是日以牛祭天告定郊天之位于此也告天而用二牛則并后稷而告之矣蓋周公郊祀后稷以配天故有帝牛有稷牛禮曰帝牛不吉以為稷牛帝牛必在滌三月稷牛惟具所以别事天神與人鬼也又曰於丁巳之明日是為戊午三月十五日也是日以牛羊豕祭社告定社稷之位于此也祭天用犢貴誠也祭社稷以備所以羊牛豕俱備也禮有少為貴者祭天是也禮有多為貴者祭社稷是也社稷自古勾龍后稷為配而已禮曰郊特牲而社稷太牢二神共一太牢也夫國外曰郊此所以不言新邑社在國中此所以言新邑也言郊則祭地可知言社則祭稷可知然而祭天必以冬至祭地必以夏至今此之祭異於常典特告定郊社之位耳此所以於三月而不以冬夏同一日而不俟他日也聖賢以義起禮於此可見然而逹觀三日即郊祭郊祭明日即告社何僕僕而不少休也又古人之制祭也三日齋七日戒今何為如此汲汲也曰事有常有變常則當守典彝變則當循義理義理所安則急亦可緩亦可此所以為大儒之學也學不至於變何以為學孔子曰可與立未可與權權即吾所謂變謂權輕重而御變也葉祖祫曰經之者肇其始營之者成其終逹觀于新邑營則經之者可知矣召公得卜則經營之周公至洛則位即成矣逹觀于新邑營而已胡氏曰位成之時惟有事於郊社是也祀天惟用一牛而此之用牲于郊牛二者兼祭地而言之也昊天有成命曰郊祀天地也蓋祭地亦可以郊言之若其所郊之方異矣故事天之郊在南祭地之郊在北至于言社于新邑則非可與天地之神等也故有事於社則饗焉張氏曰始則考卜于洛得卜然後經營經營然後位成位成然後有事於天地固宜也越七日甲子周公乃朝用書命庶殷侯甸男邦伯厥既命殷庶庶殷丕作無垢曰言命殷庶者蓋周民服周之化久矣號令自如殷民染紂之習最難號令今命殷庶而庶殷丕作則是衆心齊一衆力協同無有咨嗟怠惰之意也何以使之然哉必有以感其心也張氏曰古者賦功屬役必有書周公用書命庶邦侯甸男邦伯者命之以功役之事也當是時四方民大和會侯甸男邦采衛咸在故周公用書而命之厥既命殷庶庶殷丕作者言庶殷之樂於趨事也謂之丕作則其所作者不一也夫庶殷讐民也讐民猶且丕作則侯甸男邦可知矣太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公誥告庶殷越自乃御事無垢曰成王既至洛邑庶邦既丕作故太保與庶邦諸侯朝王既朝太保乃率諸侯出取幣乃復入朝其復出何意也欲於大朝會顯明周公復辟之意使當時人心上下安定無復生疑後世人臣知天位之不可妄處神器之不可私竊又使後世人臣有大勳勞如周公者終身止當在臣子之位而已不當有絲髮之心可望僥幸也既納幣已乃曰我將陳忠言於成王順周公之本意矣周公之意何意也欲成王之修敬德也召公此篇所陳於王者正在此事非順周公之意而何又曰嗚呼召周之言天下之言也非一人之私言也此誥王意在修敬德耳上而天子下而御事皆當修敬德也天子不敬不保四海諸侯不敬不保社稷卿大夫不敬不保宗廟士庶人不敬不保四體顧惟敬之一字豈非天下之公言乎非召公有天下之髙識其能因告王而下及於御事乎其用也廣矣大矣吕氏曰此一段諸儒之説不同一説成王不在洛只告周公言不在洛却是以為告周公一篇却無告周公之辭又有一説終篇只戒成王成王在洛邑才告周公便與告成王一般成王在洛召公以天下諸侯以幣來獻者何故不便歸之成王却歸之周公序書言成王在豐又不聞在洛史官言太保來相宅不是自來此是洛邑事畢周公要歸宗周

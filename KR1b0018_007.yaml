body:
  text: 尚書精義卷七宋黃倫撰臯陶曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞強而義彰厥有常吉哉張氏曰載事也采亦事也載之為事見於已成而行之采之為事見於未成而有為載采采者言其所行之事嘗事某事此可見之行也以此而知人則人之情偽是非無以逃吾洞鑑之中矣無垢曰夫自寬至強皆天與之性也自栗至義皆學問之力也任性而行必至大過以學問輔之則成有用之德矣夫五穀之性可以濟飢而養氣此天與之性也使任其自生自成則稂莠害之螟螣殘之水旱乾溢之則穀實不成與凡草等耳惟耕耘以時除害惟謹水則泄之不使之沮洳旱則滋之不使之確瘠糞其土膏使脈理潤深其耔種使本根長然後實穎實栗實堅實好千倉萬箱以享上帝以祭祖先以燕賓客以給老幼同受終嵗之飽焉德亦猶是也一委之天而不以學問輔成之終為不才之人無可法則之士矣真可惜也此所以寬必養之以栗至於強必養之以義然後可為全材也以學問輔之則所謂允迪厥德也又曰寬如劉寬柔如馮道願如胡廣亂如朱博擾如王世充直如汲黯簡如李廣剛如郅都強如董宣皆委之於天而不濟以學問以聖人之論格之皆不得謂之無罪寬而栗若郭子儀者柔而立若陳子昻者願而恭若假秀實者亂而敬若龔遂者擾而毅若諸葛亮者直而溫若李泌者簡而亷若馬援者剛而塞若顔真卿者強而義若李固者皆以學問輔之故皆有可觀使為天下得此數公者在朝廷其尚憂不治者乎范氏曰寬而栗性寬厚而能莊栗寬者失於太緩故能莊嚴祗栗乃為德柔而立性柔和而能有立柔者失於懦弱遇事未必能執守有立乃為德願而恭願者謹也性謹願者失于遲鈍必能恭恪乃為德亂而敬亂治也能治亂事謂之亂能治事者或恃才輕物心不莊敬治而能敬乃為德擾而毅擾順也果決為毅性和順者失於無斷故擾而能毅乃為德直而溫正直者失於剛訐故直而能溫和乃為德簡而亷簡大也亷謂有亷隅如物之有稜曰亷性簡大者失於不謹細行不修亷隅故簡而能亷乃為德剛而塞塞實也剛者能斷失於空疏內心充實不為虛剛乃為德強而義強者無所屈撓強而無義必有害強直之人動必合義乃為德此九者謂之九德彰厥有常吉哉彰明也吉善也人君用九德必彰顯有常之人而用之然後為善若寬者常能祗栗柔者常能自立久而不變謂之有常用有常之人則吉用無常之人則凶故曰吉哉黎氏曰一言盡天地之道中之謂也九德中之本也臯陶之言深於本也夫寬舒者戒在駑緩故抗之以莊栗慤願者戒在愚野故文之以恭肅柔懦擾順則為縱慝為不斷故厲之以成立而繩之以嚴毅直而不溫慈其失也激訐亂而不遜謹其失也矜夸簡而無亷隅其失也倨肆剛而不充塞其失也愎違強而不由義其失也抗暴九德咸備而無有一失於其間則是聖人也夫天下之先務不過所謂知人安民也能知人則能安民矣然而天下之人賢與不肖在心而衣冠言貌皆人也吾何識其賢而用之歟亦在行有九德耳人之有是九德也猶身之有耳目手足也一不具不足為完人然皆出諸內而非自外入者也日宣三德夙夜浚明有家日嚴祇敬六德亮采有邦無垢曰夫一家內得三德之人以相佐助其諧內外接上下必剛柔得所緩急合宜至於有難處之事必能曲折周旋以應之有倉卒之變必能隨宜合理以待之蓋三德之人情性器度中和詳諦其理當如此也然非吾日宣之夙夜浚明之其德用亦何所自而見乎又曰以禮則嚴而不慢以事則祗而不怠以心則敬而不忽亮采者謂信而委以事也如此則六德之人皆得展盡底藴而一國之事舉矣夫有邦諸侯民人社稷所繫朝聘燕享所出天子有命鄰國有事大則風俗之原小則獄訟之委其間事變非常幾微百出儻非得中和之士以相佐助則緩急先後之施節文秩序之稱應機而欲中遇變而每安者其誰任之哉惟中和之人沉審而不浮從容而不迫變愈出而應愈奇事愈多而巧愈見一國之事盡處於談笑之間諸侯可不嚴而祗敬之與可不信任而委以事乎曾氏曰以天下之才為天下之用則用天下而有餘以一已之才為天下之用則為天下用而不足蓋為天子者奄有天下之廣必能盡用天下之才兼收並蓄罔有或遺然後能成天下之治故必用是九德之人自寬而栗至強而義者無所不容無所不受蓋所謂丘陵積土以為之髙江海積水而為之大大人合并以為公也惟其以是天下之才選為天下之用則雖天下之大不足以為患也至於諸侯則以其地不若天子之廣其民不若天子之衆故於九德之中能用其六則足以保其社稷和其人民矣卿大夫之於諸侯又其小者故九德能用其三則可以保其宗廟此言所處之勢有廣狹則所用之人亦有多寡也翕受敷施九德咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝無垢曰翕受之者兼收而並蓄之者也敷施者各隨其德以待其變也如此則九德之人各盡其材以效職事故在官者皆俊乂之士而無猥瑣闒茸之人為百僚者有相師之風而無倔強好勝之態為百工者因時建事而無怠惰苟且之心如此則剛柔適中緩急有序其無事也則朝廷之上有肅穆之風其有事也則論思之際有從容之妙事中其幾會逢其適春之治不行於秋離之治不興於坎如吕氏月令之説者則又撫于五辰而庶績其凝矣胡氏曰所謂撫于五辰者五行之辰也水火金木土在地則為物在天則為時順其時而撫之則五物者皆足以成其材而為用矣是故仲春斬陽木仲夏斬隂木所以撫木辰也季春出火季秋納火所以撫火辰也司空以時相阪隰所以撫土辰也秋為徒杠春達溝渠所以撫水辰也以春秋出納火則金之事可知矣然水與土金與火之事多合焉則以相待而成功相資以為用故也所為撫者如撫萬物之撫有愛心焉五行之材愛之則繁廡虐之則雕殘非特五行也凡物皆然若鄭國火則火不撫矣鑄非其人則金不撫矣鯀堙洪水則水不撫矣斧斤不以其時則木不撫矣然則何以言辰也自甲至癸謂之日自子至亥謂之辰日陽也辰隂也堯典言敬授則君道也故言時時者日運而成之也此篇言九德則臣事也故撫言辰辰者五行運而成之也薛氏曰古之知言者忘言而取意故言無不通後之學士膠於言而責其實故多疑多疑故多説天子用九諸侯用六大夫用三言不得不爾其實未必然也孔子曰天子有爭臣七人諸侯五人大夫三人使諸侯而有爭臣七人寧得謂之僭天子故觀書者取其意而已矣吕氏曰翕受敷施見人君如天之無不覆如地之無不載不以一已之才為才而合天下之才為才收而受之於一己而又散之於天下惟九德咸事然後可謂俊乂在官也無教逸欲有邦兢兢業業一日二日萬幾無垢曰天下之事無一事不出於天者有是事必有是官官所以代天治事也一官曠則一事闕一事闕則天事有不舉者人君代天君天下不舉可乎夫天事之舉以官得其人官得其人以人君之允迪厥德允迪厥德以戒懼於隱微此臯陶所以言兢兢業業一日二日萬幾也幾者動之微也戒懼正當在此於微稍怠則為逸於微稍忽則為欲逸欲之微兆於方寸潛行於天下是教天下以逸欲矣天下逸欲其可望九德之人乎如此則治天事者無其人治天事無其人則大亂矣臯陶言此所以深言為人君者不可以不允迪厥德以感移天下也溫公曰幾之為言微也言當戒懼萬事之微也夫水之微也捧土可塞及其盛也湮木石沒丘陵火之微也勺水可滅及其盛也焦都邑焚山林故治之於微則用力寡而功多治之於盛則用力多而功寡是故聖帝明王皆銷惡於未萌弭禍於未形天下隂被其澤而莫知所以然也周易坤之初六履霜堅氷至霜者寒之始也氷者寒之極也坤之初六於律為林鐘于厯為建未月陽氣方盛而隂氣已萌物未之知也是故聖人謹之曰履霜堅氷至言為人主者當絶惡於未形杜亂於未成也繫辭曰知幾其神乎君子知微知彰知柔知剛萬民之望謂此道也陳氏曰一日之間幾微之事其積有萬一或不謹一或不懼其失可勝既耶兢兢謹也業業懼也無曠庶官天工人其代之天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉史氏曰因天理以為之教化則代之者不可異其心順天道以為之賞罰則行之者不可怠其志天聰明自我民聰明天明畏自我民明威達于上下敬哉有土無垢曰欲知天之所在即民可見也故天之聰明即民之聰明也天之眀畏即民之明威也如是民之聞見天之聰明也民之喜怒天之明威也豈可欺哉同寅協恭和衷則知典禮之合於天政事懋哉懋哉則知賞刑之合於天其應如此豈可欺哉夫合天下之聞見以為聰明合天下之喜怒以為明威則天之為天亦可見矣倘有一毫私意橫乎其心者皆非天也又曰夫合天下之聞見以為喜怒合天下之喜怒以為刑賞其聰明明威如此可不敬哉賤而庶民貴為天子一以此待之耳蓋位有上下理無上下理之所在雖匹夫可以動天理之所黜雖天子謂之一夫則以天道無私合天下之聞見以為喜怒合天下之喜怒以為刑賞不以貴賤髙下其心故也然則有土之君獨何所恃乎所恃者敬而已矣張氏曰髙其目下其耳天之聰明也其所以聰明者因民之聰明而已善者福之淫者禍之天之明畏也其所以明畏者因民之明威而已天視自我民視天聽自我民聽則其聰明因民可知矣民之所就天之所豫民之所去天之所奪則其明畏自民可知矣於天言明畏於民亦言明威者蓋天不嫌於無威於天言畏則威可知矣於民言威則畏不足道也然民受天地之中以生其性命之理與天為一則其好惡取舍未嘗與天違也聖人知其如此故自民聰明以敘有典秩有禮則典禮不違民性自民明威以命有德討有罪則賞罰不悖民心聖人之因民乃所以因天者也然而天之明畏豈擇貴賤而加之故曰達于上下如是則有土之君不可不欽故曰敬哉有土臯陶曰朕言惠可砥行禹曰俞乃言砥可績臯陶曰豫未有知思曰贊贊襄哉無垢曰孔子云聖則吾不能我學不厭而教不倦也不厭不倦即贊襄之意也中庸曰維天之命於穆不已此言天之所以為天也文王之德之純此言文王之所以為文也純亦不已不已者天也文王也孔子之不厭不倦臯陶之贊襄也湯之盤銘曰苟日新日日新又日新思曰贊贊襄哉則允迪厥德不已而德日新矣又不已則日日新矣又不已則又日新矣東坡曰贊進也襄上也臯陶之意曰吾不知其他思日夜進進而已知進而不知退知上而不知下也益稷無垢曰益稷未嘗有一言而乃以名篇何也曰此史官之意也以謂禹之所以成功者以益稷同心為之佐也同心贊協得以名篇使後世之士知功不必爭名不必擅倘吾懷至公之心共成天下之務如益稷者亦自不廢於唐虞之時得列名於禹臯陶之後則忌嫉之心強愎之意庶幾其少瘳乎益助禹以刋木而奏鮮食稷助禹以濬川而奏艱食鮮食二人與同其勞苦共成其大功二人之心一而無間史官以其一也故以益稷名篇而附於臯陶之後焉帝曰來禹汝亦昌言禹拜曰都帝豫何言豫思日孜孜無垢曰舜使禹亦昌言禹見舜好善不已之心嘆曰美哉此好善之心然臯陶昌言至此極矣豫復何言哉豫思日孜孜行其平生所學所得者在克艱之言爾余讀至此乃知聖賢之心如此其一也又曰禹之功即舜之功舜不於禹之外别自求功臯陶之謨即舜之謨舜不於臯陶之外别自陳謨至于禹之心即臯陶之心所以不見謨在臯陶而若在己也臯陶之心即禹之心所以不見功在大禹而若在已也包氏曰君臣都俞相敕戒胥賡歌其功逺其言粹故録而為謨大禹謨臯陶謨是也益稷則不能言謨然稷為后稷益作虞奏艱食鮮食懋遷有無其功巨者也德焉而謨功焉而否不亦昭昭然乎臯陶曰吁如何禹曰洪水滔天浩浩懷山襄陵下民昏墊豫乘四載隨山刋木暨益奏庶鮮食豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居蒸民乃粒萬邦作乂臯陶曰俞師汝昌言張氏曰昏言其性之失也墊言其身之弱也民之昏墊如此聖人其可以坐視斯民之罹害而不為之憂乎此禹之所以思日孜孜至於三過其門而不入蓋以天下之溺猶已之溺故也吕氏曰豫乘四載即舊注所謂水乘舟陸乘車泥乘輴山乘樏隨山刋其木以相視水勢於是與益稷播艱食奏鮮食鮮鳥獸之食當水土未平之時田澤蔽塞全未播種故但奏鮮食及水漸平民之播種尚艱故曰艱食所謂榖粟之食也惟其艱故以食鳥獸之食相兼當洪水未平天下道路割絶不通故天下之物有處充積無處全無天生萬物欲以養天下不可不均化居變其居積謂如此處出茶茶必有餘積故化之於出鹽之地使鹽處有茶茶處有鹽物物如此自然均足於是蒸民乃得全用粒食天下皆得其治此非禹之夸辭也禹在虞朝所謂不矜不伐不自滿假之人也成功之後宜其所過者化而日求新功不忮不求何用不臧至子路終身誦之夫子則曰是道也何足以臧禹亦聖人豈不知此今乃歷舉其功似若矜伐者蓋治定功成禹恐虞朝之臣見其已成而不知其經營艱難若是故自言之以常存敬懼之心禹曰都帝愼乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休無垢曰夫居天子之位豈易事哉天命難諶斯民難保治中有亂安中有危可不謹哉謹之之道如何安汝止惟幾惟康其弼直此謹之之道也止謂心所安處不愧屋漏不欺暗室戒謹不睹恐懼不聞心則安矣雖居無人之處常若十手所指十目所視其敢忽乎然而禍有起於微眇變有生於倉猝古人所以詠履霜之不早戒言蔓草之難圖則於安其止之中又當觀幾微於將然也審證參詳果安而無危果吉而無凶果治而無亂則循其禮而行之因其勢而成之此所以又言惟康也然而自以為是未必天下皆以為是自以為正未必天下皆以為正私意妄見其害人多矣此所以有望於正救之臣而欲其弼直也惟正救之臣直則天子曰然弼臣曰不然吾將審其言而從其所謂不然者天子曰可弼臣曰不可吾將審其言而從其所謂不可者如此則以心而無愧以變而無忽以事則無謬以天下之聞見盡白於上則無不快於心者故一動則合人心而大應以待吾志矣人心既同則顯然上合天心而昭受上帝天其申命用休矣張氏曰在位者人君所與共治之人也與君子則治與小人則亂一或不謹其所與則敗亂隨至此禹之戒舜所以使之慎乃在位欲其無輕於得人故也又曰夫為人君者止於仁為人臣者止於忠為人父者止於慈為人子者止於孝禹之戒舜使之安汝止蓋以舜之為君當止於仁故也仁者靜則能止安其所止則安仁而已夫人莫鑑於流水而鑑於止水惟止能止衆止則為人君者其可不知所止哉惟幾則使之知其幾惟康則使之安其身也幾者動之微惟幾則其智足以有察康者安之至惟康則其動不妄安汝止惟幾惟康則其在我者盡矣然其在我者未能無失故其弼直者欲其所弼已者直也其弼直則左右前後皆正人為之君者可以立於無過之地矣如是則一人有事于四方而四方莫不丕應徯志丕應者聽唱而和之之謂也徯志者先意而從之之謂也惟動丕應徯志則人與之矣人與之則天與之天與之則天之所眷命故繼之以昭受上帝天其申命用休上帝者昊天上帝也天者凡在天之百神也昭受上帝則天與之矣天其申命用休則在天之百神又從而重命之以休福也陳氏曰大學之道在止於至善知止然後能定能定然後能靜能靜然後能安君止於仁臣止於敬既知其止則反覆倒置無非仁與敬也所居之位不同所臨之事不一而皆有一至善以為止反覆終始不忘於止然後能定能靜至於能安至於安矣則舉天下之事不能易其止其慮患也甚微其應物也出於無心慮患甚微者幾也應物無心者康也惟幾則嗜欲不生於心惟康則利害不汩於中嗜欲消而利害之甚者不能汩則凡弼輔乎我者自然直矣君能幾康而輔弼之臣又直是惟無動動則天下大應吾志而無有逆我者矣此不言而信信在言前之功用也如此則非惟人應之天亦將申錫其命以休美之矣帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞無垢曰臣哉鄰哉以言此事在衆臣與親近之力爾又曰鄰哉臣哉又言此事在親近衆臣之力爾其言反覆徑急此乃舜深見此理當臣鄰交修不可少怠也夫有衆臣效職於外然後論思獻納之官侍御僕從之人得以盡其忠此近臣須於衆臣之意也有近臣盡忠於內然後衆臣得以安其職此衆臣須於近臣之意也又曰漢元帝唐文宗皆孜孜求治之君也然元帝有一蕭望之而不能用乃信任石顯文宗有一裴度而不能用乃依鄭注李訓一則殺賢者之失一則有甘露之禍言之使人於邑豈知有舜為君有禹為臣乃至如此之盛乎張氏曰臣哉者以分言之也鄰哉者以情言之也一於分則離一於情則褻先王之馭其臣也其忘分以道其嚴分以禮外不至于離內不至于褻此臣哉鄰哉鄰哉臣哉舜之所以告禹也臣哉鄰哉者言臣當鄰我者也鄰哉臣哉者乃所以為臣也唐虞之世上下協心君臣同德都俞賡歌無或異志者進此道也

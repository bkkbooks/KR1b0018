body:
  text: 尚書精義卷三十三宋黃倫撰王曰爾惟舊人爾丕克逺省爾知寧王若勤哉無垢曰周公意言武王勤勞辛苦得天下為子孫萬世之基以綏養天下萬世之民今不可故違吉卜安坐求敬忍視王室之危亡而不恤矣如此訓諭則見周公義理深長而邦君御事之計似為迂濶矣天閟毖我成功所豫不敢不極卒寧王圖事無垢曰天意以成王沖幼坐繼武王之業恐其怠惰恣縱故閉塞勞苦我成功之所使我知天命之不易而人情之艱難也我何敢不盡心盡力以卒我武王所圖之事哉武王所圖之事何事也蓋天下盡歸周家之事也張氏曰閟言天命之否閉而不通毖言人事之難艱而不易事者功之始功者事之成前人之功積事以成之者也今也天閟毖我成功所則我于寧考所圖之功不能必成姑亦終其所圖之事而已天下之事先王定之于前極其卒之者非子孫其誰乎肆豫大化誘我友邦君天棐忱辭其考我民豫曷其不于前寧人圖功攸終天亦惟用勤毖我民若有疾豫曷敢不于前寧人攸受休畢無垢曰周公惟恐其未喻也乃曰至誠稱譽而非諂非諛者天必輔之欲知至誠稱譽不可考之于諸大夫恐其有爵祿之纍也其言可信也尚矣使民有徯豫后后來其蘇之辭有徯豫后后來其無罰之辭則天之輔我可知矣當時十夫來翼則民有忱辭歸我可知矣民有忱辭歸我則天之輔我亦可知矣其往征也何疑哉民欲征四國如此此天心也豫何敢違天不于武王與夫舊臣之功使之有無窮之計乎誠使周公聽求敬違卜之言坐視四國之叛而不為之經理則武王之天下未可知也四國叛亂如已有疾以害我周家之業我何敢不于前寧人武王與夫舊臣所受于天之休命有以終其業乎畢終也終其業則視四國叛亂如疾在躬必去之而後已張氏曰化者化之以其道也誘者誘之以其言也三監淮夷之叛有邦之君皆以為不可征此成王所以化之者也天棐忱辭其考我民者誠信而有辭天之所輔也我忱信而有辭天必輔我天道逺而難知欲知天之輔我當考之我民而已民之去就視賢十夫豫翼則民輔我矣天之視聽自民民輔我則天輔我矣天輔我民輔我豈特可以極卒寧王所圖之事其于圖功亦可以終之者也王曰若昔朕其逝朕言艱日思若考作室既底法厥子乃弗肯堂矧肯構厥父葘厥子乃弗肯播矧肯穫厥孝翼其肯曰豫有後弗棄基無垢曰武王既已統一天下未及紀綱萬事而死今成王繼之有四國之叛使不為之撲滅是若作室不肯為之營築也營田而不為之播種也况能制禮作樂立經陳紀為子孫無窮之計因其作室葘田之説又思曰父以敬存心見其子不繼其志其肯言曰豫有後不棄我基業乎為人子而不為父所信則亦何以為人哉使我今日不能繼武王之業以平四國之亂是武王無後也是盡棄武王之業而不為保守也如此不征其可乎張氏曰父作之于前而子不能繼之于後也肆豫曷敢不越卬敉寧王大命若兄考乃有友伐厥子民養其勸弗救東坡曰養厮養也父兄而與朋友伐其子其家之民養當助父兄歟抑助其子歟其將相勸助其父兄弗救其子也今王與諸侯征伐四國正如父兄與朋友伐其子爾衆人孰當助乎陳氏曰兄考者喻成王周公也友者邦君也喻四國也子者喻民也民養者厮養也喻羣臣也四國殘害我赤子我為赤子之父兄固將救之汝羣臣乃勸我弗救乎吕民曰如人之父兄被儕類伐其子父兄豈肯弗相救必被髮纓冠而往救之何况王者視民如子見得武庚管蔡害民為天下諸侯豈可不相救助此以世間常情論之王曰嗚呼肆哉爾庶邦君越爾御事爽邦由哲亦惟十人迪知上帝命越天棐忱爾時罔敢易法矧今天降戾于周邦惟大艱人誕鄰胥伐于厥室爾亦不知天命不易無垢曰爽明也清明邦國必賴哲人今兹十夫通知上帝之命命在周家故來翼我十夫可謂哲人矣清明四國叛亂者非十夫其誰十夫來助征伐是上帝來助征伐也其可已乎以是知非有以髙天下之見者則不足運動天下邦君御事學至於立矣特未可與權平居守常則有餘裕儻遇變故則不足以知幾而斡旋上天之法誠者輔之今周家至誠動天天遣十夫來翼邦君御事其可有異論不輔我至誠之心而易上天之心乎降戾周家使大艱人如三叔等以我至親乃大近相伐於室家之中此周家不幸天降此禍也禍端已起不可不治治之之道伐之而已矣夫上天之法本於輔誠此天之定命不可改易也三叔乃一時變故耳豈能易天之法與天之命哉天法天命既不可易邦君御事乃以謂不可征是不知天命之不易也吕氏曰天輔助我有周於誠實平定無事之時其時尚有不敢變易其法以輔誠天命何况今日天動威以警戒我周邦尤不當不從也豫永念曰天惟喪殷若穡夫豫曷敢不終朕畝天亦惟休于前寧人豫曷其極卜敢弗于從無垢曰殷之有天下猶畝之田也田有惡草則害嘉穀天下有不仁之君則害良民天相武王誅紂滅殷以保良民是若穡夫除去惡草以養嘉穀也今其莠猶在如武庚之叛也成王豈敢不力誅鋤以終天下之業而繼武王乎亦猶穡夫盡去惡草不使一苖有遺類也前曰日思此曰永念則知聖賢舉事不輕易如此東坡曰是時武王之舊臣皆欲從成王征伐故王曰天若欲休息此前寧人者豫何敢盡用卜敢不從衆而止乎張氏曰穡夫之治田去其害稼者而已蓋稂莠不除終為苖稼之害殷商之害虐斯民為天所畏有類于此故曰天惟喪殷若穡夫天之喪殷如是則為成王者故當斂之至于終畝所以應天者也極至也天之休美于前寧人使有天下成王自謂我何所至乎言有天下之休命者盡寧王之德也我卜既吉而不往從之則是逆天者也成王之所以必往伐之者從卜而已吕氏曰周公之論天之命喪商之意分明天降休命于武王又分明何必去占卜自合當從天命去東征雖不卜亦可率寧人有指疆土矧今卜并吉肆朕誕以爾東征天命不僭卜陳惟若兹東坡曰今寧人指我以疆域所至不可坐受侵略况今卜并吉是天欲征不欲休也盤庚與大誥皆違衆自用者所以藉口也使盤庚不遷都周公不攝政豈有異議乎平居無事變亂先王之政而民不恱則以盤庚與周公自比此王莽所以作大誥也張氏曰天雖難忱其示人以吉凶之命而無有僭差卜之所陳者如此此三監淮夷不可不征也荆公曰武庚周所擇以為商後三叔周所任以商事者也其材皆非庸人方主幼國疑之時相率而為亂非周公往征則國家安危存亡殆未可知然承文武之後賢人衆多而迪知上帝以決此議者十夫而已况後世之末流欲大有為而乃欲取同於汙俗之衆人乎成王既黜殷命殺武庚命微子啓代殷後作微子之命無垢曰征四國時實周公攝政故孔子序大誥曰周公相成王將黜殷則黜殷命殺武庚命微子啓雖曰周公相成王其實皆周公意也然孔子於大誥尚曰周公相成王至此則獨書成王而不及周公者何也曰論成王之意惑流言疑周公則黜殷命殺武庚命微子啓非成王意也余原成王本意豈願四國之叛而失吾家宗社哉特以疑故顛錯繆亂者使其無疑則原其本意實亦欲黜殷命殺武庚命微子啓代殷後也故聖人不書其疑而書其本意曰成王既黜殷命殺武庚命微子啓代殷後而不及周公不及周公所以深明周公行成王之意而非周公私意也前書周公所以尊周公之斷後不書周公其義豈不逺哉余乃知不書周公亦所以尊周公也又曰微子蓋帝乙長子特以其母初賤而生故不立其母後貴而生紂故紂得立然而紂無道亡天下其子武庚又背叛亡其國殷緒宜絶矣周家忠厚不忍滅殷宗廟社稷卒封微子以為殷後且使成湯以來不泯祭祀凡三十二傳而滅於齊是全湯之祭祀者微子也使微子繼帝乙有天下豈有牧野之事乎吕氏曰周公攝政時有流言之變天下皆疑周公有無王之心孔子特序此以發周公尊王之意欲使後世知禮樂征伐自天子出聖人經世之大法也又以見周公之本意微子之命王若曰猷殷王元子惟稽古崇德象賢統承先王修其禮物作賔于王家與國咸休永世無窮無垢曰立前代子孫以崇德其意以謂不立他人子孫而立微子者所以崇成湯之德不敢忘也立前代子孫以象賢其意以謂前代子孫必有先祖遺風立微子為諸侯所以象成湯之賢使我有所法也夏商各有一代禮物不相沿襲也先王不忍自尊一代之制而廢前代之禮故立二王後使統承先王之業不用當代之禮物其典禮正朔服色一從其故家所尚雖郊天祀地亦所不廢此所以使微子統承成湯常自修其家禮物也其意使前代子孫常見故家遺物而無悲苦傷悼之念嗚呼仁哉夫以客禮待之所以尊成湯也其心視之如成湯之存也先王忠厚尊敬之風可想見于此矣張氏曰以事言則為稽古本成湯而言之則曰崇德自微子而言之則曰象賢蓋王者之後必立其人以承其宗祀古之道也成王稽而行之故謂之稽古成湯有德矣必立先代之後以作賔王家所以崇其德微子為賢矣必建于上公加以爵服所以象其賢崇德象賢者將以嗣先王之統而承之也吕氏曰崇夏之後便是尊禹之德崇商之後便是尊湯之德蓋德厚者流必長德薄者流必卑夏尚忠商尚質周尚文蓋聖人於車旗正朔本數未度種種自有定制豈可不責其後世子孫之修然聖人公天下為心其所以創立一代規模蓋欲新時人之耳目然未嘗以已為是以先為非不敢盡掃滅先王之制度所以不要後人廢墜使修其禮物常常在此亦見得聖人公天下為心處且如秦恐人是古非今盡焚滅先王之典籍此只是秦私心如此然聖人所以留其禮物使之常修者蓋亦有意天下之理窮則變變則通通則久如循環然商因於夏禮所損益可知也周因於商禮所損益可知也其或繼周者雖百世可知也蓋聖人通百世為體若先王法度苟不修而我之法度或廢後世有聖人作却把何道理救得此所以修其禮物者蓋知變通之道損益而兼用之也嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寬除其邪虐功加于時德垂後裔無垢曰齊聖廣淵其德藴於中而未用至其發之於事也則見於撫民以寬寬乃齊聖廣淵之發也若夫傲慢蔽塞褊窄淺露之人其見於事也則為虐有德為寬無德為虐然則人主之於民其可不以寬為心乎桀以虐失民心湯以寬得民心盛哉成湯之聖也取塗炭之民付輯寧之地故其功加于當時不邇聲色不殖貨利以至克寬克仁其心法所流足以傳於子孫故其德垂于後裔功德兼隆其盛矣哉有德無功是能有而不能用有功無德是無其本也張氏曰人之致其力以興事造業謂之功功則可大故加于時直心而行之之謂德德則可久故垂後裔吕氏曰湯以盛德受天命以寬撫天下功既加于時德又垂于後裔如日月之明終古不息若本原不深厚功加于時則有之無緣會德垂後裔此王伯之辨緊要在此蓋伯者以私智相髙摟諸侯都是智巧機術相籠絡天下若本身死了便散潰解釋如齊桓方死五公子爭立諸侯來伐何緣會德垂後裔爾惟踐修厥猷舊有令聞恪慎克孝肅恭神人無垢曰踐修厥猷之實豈在虛空髙逺哉恪慎克孝肅恭神人此所謂踐修厥猷也紂荒怠弗敬而微子恪慎紂宗廟不享而微子克孝紂謂祭無益謂暴無傷而微子肅恭神人則躬行修治之意可以意會矣夫其為人恪慎克孝肅恭神人則至誠忠厚尊嚴和樂豈尋常人哉開國承家以繼先代禮樂舍斯人其誰乎吕氏曰恪慎克孝此是著實踐修處今閭巷之人皆知孝然只是養口體以此為孝不可謂之克若克果能盡孝之道如曾閔方是克孝肅恭神人此見得敬心常存不以幽顯二字易其心以此心事神以此心接人都無幽顯之間此心常不替豫嘉乃德曰篤不忘上帝時歆下民祗協庸建爾于上公尹兹東夏無垢曰孔安國謂孝恭之人祭祀則神歆享施令則人敬和其言論切實有補於教化余誦斯言至於三復請因其説而推明之夫上帝歆享下民敬和必有以感召之也微子恪慎克孝肅恭神人孝自恪慎中來恭自肅中見神人之樞機已管鍵于此矣故以此祀上帝則上帝歆享以此令下民則下民和敬使無其本能至是哉嗚呼欲觀人之有德與否請自孝恭而卜之上公九命為伯其國家宫室車旗衣服皆以九為節微子為成湯後故其盛如此然微子所以得此者成王取其孝恭也非特取其為湯子孫而已是孝恭之人可以為上公矣吕氏曰微子之行篤實而有光輝又恪謹肅恭無幽明隱顯之間如此方可謂篤不忘既如此所謂上帝時歆下民祗協本無二理以此心事上帝何緣不歆以此心對下民何緣不祗協此是上當天心下當民心所以建汝于上公之位命汝尹此東夏之民所謂東夏者蓋岐周在西其所以封微子在亳以岐周看亳却是東惟微子之德到得所謂可使南面所以因而命之欽哉往敷乃訓慎乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗豫一人世世享德萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命無垢曰烈祖之心欲安民而已初不以天下在我在彼為輕重也使微子不失孝恭以此訓民以此保服命以此率典常而蕃王室則成湯之心至微子而愈宏大矣夫烈祖德業之大固不可以一言盡其要不過納民於律度之中爾使微子不失孝恭之心則永安上公之位而足以毗助我一人之教化矣夫人主雖有仁心仁聞而所以使民被此澤者則在賢有德之諸侯以宣布之可也諸侯而不賢則吾仁心仁聞有所壅遏其為戕賊國家也大矣成王此意所以望微子也深矣使微子如上所戒則內足以貽子孫外足以範諸侯上足以保國家使一出乎此則子孫無所庇諸侯無所憚國家無所賴矣在微子當如何哉微子儻能以欽自持不忘昔日孝恭之心則舉事皆得其當矣豈不簡易乎哉微子如是之賢尚告戒如此者何也曰舜大聖人也年九十餘矣又自匹夫而為天子晏然若固有之踐揚重任職事修舉命九官黜四凶有大功數十天下尊之而益方戒之曰罔失法度罔逰于逸罔淫于樂而况微子其可不戒乎蓋仁義何常之有蹈之則為君子背之則為小人一念失路則一念小人一朝一夕失路則一朝一夕小人以一朝一夕之小人而舉事則為千百年之小人其可忽諸張氏曰治民不可以不欽化民不可以無訓欽哉使之欽以直已也往敷乃訓者使之順以導民也宏乃烈祖則其孝足以奉先律乃有民則其政足以率下夫然後下足以保其祿位上足以輔于天子故斷之以永綏厥位毗于一人如是則子子孫孫得以繼基緒而萬邦之衆莫不以為之典式此世世享德萬邦作式之謂也

body:
  text: 尚書精義卷十九宋黃倫撰盤庚五遷將治亳殷民咨胥怨作盤庚三篇無垢曰盤庚陽甲弟也止一遷耳而曰盤庚五遷何也曰湯遷於亳仲丁遷于嚻河亶甲居相祖乙圮于耿至盤庚遷于殷通數為五遷耳何以孔子序書指為五遷乎曰此為民咨胥怨言也以謂自仲丁以來一傳再傳即遷至盤庚又遷其遷不已靡有定居民心搖動生理無聊鬱抑不平所以咨嗟而相呼為其遷之多故曰五遷焉張氏曰可與守常難與適變可與樂成難與慮始凡民之常情也是故樂因循而憚改作居安逸而忘患害一旦驟而告之以遷都之事莫不怨咨於上不適有居是皆顧目前之利而不虞禍敗之旋至此盤庚之作其丁寧告戒見於三篇之書觀其長慮却顧將以與民興利除害則雖咈民以遷而民至於咨怨何足恤哉咨形於言怨在於心所咨者非一人也然則此盤庚三篇之作將以開導訓之而已王肅曰盤庚何以不言誥取其徙而立其功非但録其誥辭盤庚上盤庚遷于殷民不適有居率籲衆戚出矢言曰我王來既爰宅于兹重我民無盡劉不能胥匡以生卜稽曰如如台無垢曰盤庚知民心憂戚不從於是呼衆憂之人出誓言以告之曰我先王祖乙來居於耿耿有水圮之患是當遷矣又重念自伸丁以來四傳而三遷民亦勞矣儻不是之恤而復遷都是盡殺之也故因陋就寡邑居於耿越七世而未遷然而終不能相正以生歲歲為水作苦其可不遷乎儻因循苟簡水害日深民俗日弊終至亡國而後已盤庚雖意見如此又不敢自以為是及卜之蓍龜以考去留而蓍龜所告乃知我之意以為不可不遷也張氏曰率之者強之使從已也籲之者和之使無怨也其所以率籲衆戚必出矢言矢直也直言其和而曰我王來既爰宅於兹者言我商家王天下以來嘗遷而宅於此矣湯之居亳謂之從先王居則商先王故居亳矣今盤庚復自耿而徙居焉不忘先王之居而已先王之所以宅此者蓋以重我民之故使之違害就利而即於安寧之域無盡至於死亡故也為卜以稽其疑吉卜而可遷矣今民反曰卜稽其如我何非特明不從於人幽且不從於鬼神矣民愚如此誠所可誅盤庚不誅而教之者蓋以民迷日久不可遽施以刑罰故也東萊曰天下之怨惟先順其意使他心平氣定然後善言可入若不順他意而必以至理逆忤其心則彼悍然且與盤庚作敵之意不暇尚何以使之信其言而從其遷耶惟盤庚謂爾怨故是我先王亦曽宅於此了他之怨已息方以正理𨗳之然未嘗固執不知權變可遷即遷而已我先王非不知水患之圯壞爾民然而不肯使遷者重爾民命不忍盡遺害爾民之故以此見因陋就簡不能相正救使爾往就生處及我稽之於卜又如我志於是不得不遷也先王有服恪謹天命兹猶不常寧不常厥邑于今五邦今不承于古罔知天之斷命矧曰其克從先王之烈若顚木之有由蘖天其永我命于兹新邑紹復先王之大業砥綏四方無垢曰先王有故事謂自成湯以來皆敬慎天命也敬慎天命宜有定居矣然自太戊忽有桑榖之變故仲丁遷于囂河亶甲居相祖乙圮於耿而我遷於殷以繼湯遷于亳之舉惟敬慎天命儻天命有變必遷都以應之是敬慎天命猶不常寧况不敬慎者其能常寧乎蓋商家尚神以謂歲有水患是天不佑此邑將有改卜之意我當承天之意勞苦遷都以續天命蓋既已遷都則朝廷官府邑里民居為之一變若新受天命者此亦弭災變移造化之一術也若旱而徙市醫而變氣之理同其理亦微妙矣矧能紹復先王之業若顚木之再生乎蓋木已枯死顛仆于地其根生蘖乃有再生之理由蘖新都也儻或遷都必有再生之理則先王之大業可復紹而不絶四方可安定而不搖嗚呼天亦難知矣而盤庚指以示人若指涇渭之清濁烏鵲之黑白偃然不疑其亦異矣夫天下係人君之德如何耳豈有居耿天遽斷絶其命遷殷天乃長久其命乎此陰陽術數家説誑惑愚蒙者也而盤庚乃昌言之蓋其意以謂耿蕩析離居之患是天意不欲商居此地也殷都乃成湯興王之地天之眷佑其在此乎張氏曰恪則欽之在於心也謹則欽之在於外也先王常奉天以遷都今不從我以遷是不承於古矣不承於古則不承於天不承於天則逆天者也逆天者亡夫天所斷制之命我所不敗知也不知天之斷命則或至於流播殄滅其從先王之烈若顚木之有由蘖乎蓋遷居新邑然後足以更生故有顚木由蘖之譬也以不遷故不克從先王之烈則其遷也乃能紹復先王之大業上能順天命下能從先王然後足以砥綏四方砥綏四方者致四方於安寧之地也東萊曰耿邑所以水患乃天意也天以水患圮壞耿邑是天斷然命爾民不得居於此而遷於彼也今乃不然是不畏天也天尚不能畏况能從先王乎今之耿邑若一株朽木如何會有生理惟朽木中别有一新萌芽使土培之乃可再活今若即居耿邑如何活得惟得新邑而居之汝乃可生天以此將永我命于新邑乃能紹復先王之大功業盤庚斆于民由乃在位以常舊服正法度曰無或敢伏小人之攸針王命衆悉至于庭王若曰格汝衆豫告汝訓汝猷黜乃心無傲從康案此條經解永樂大典原缺古我先王亦惟圖任舊人共政王播告之修不匿厥指王用丕欽罔有逸言民用丕變無垢曰自古先王皆圖任舊人不聼新進其所舉事皆以常舊服不出私意夫惟新進好出私意以變更祖宗故事紛亂祖宗法度故先王圖任在舊人而不在新進又曰惟舊人能宣先王德意志慮故先王亦不敢少忽每發一號施一令必反覆審證必圖治安必行永久必便於民必合於天地鬼神而又詢之於公卿大夫考之於卜筮蓋無所不用其欽故其言可以為典則為法為度安有口過乎號令不出則已號令一出則天下聳動怠者奮汚者修鄙者寬薄者敦而四海之內無不風移俗易而大變矣盤庚言我遷都之計已深思而熟慮非出于輕易也故凡見之於播告者皆誠心實德之所在可以一變危亂之俗為治安之世一變目前之勞為悠久之安特汝未之信耳張氏曰經曰無遺壽耉又曰詢兹黃髮則人君所與共政者無非老成之人也惟老成人然後歷知古今成敗之迹與之共政則其智足以逺省矣王播告之修則其在外者不欺矣不匿厥指則其在內者無隱矣於先王能圖任舊人而又播告之以所修之政而不匿其指意則上之情得以下逹君之德意志慮曉然在人耳目而人知所從違矣夫豈有背違於上而不從君命以遷者哉今汝聒聒起信險膚豫弗知乃所訟非豫自荒兹德惟汝含德不惕豫一人豫若觀火豫亦拙謀作乃逸無垢曰臣下不知敷宣盤庚之意乃相與聒聒喧閧造為險膚之言迭相唱和略無事實起者唱也信者和也唱之者臣而和之者民想見喧啾輕薄如市井闤闠之態甚可惡也蓋小人欲鼓惑衆聽其言不險則不足以動小民不膚則不足以入小民謂之險膚其鄙倍儇囂蓋可坐見儻非我灼見天意斷然自信遂此遷都之舉其為汝搖撼如此者能不蓄縮乎今我儻惟汝含容不汝之制使汝愈不畏我是我若觀火之將燎原而不可救也救火者必撲滅救此險膚者必誅罰使豫不行誅罰之刑而聽汝聒聒不知畏憚是我拙謀以成汝之過也豈仁者之所為乎蓋小人不恥不仁不畏不義不威不懲小懲而大誡此小人之福也張氏曰險則不夷膚則不中言之循理則夷反乎此則謂之險言之由內則中反乎此則謂之膚不治謂之荒君有荒德則臣不順命可也今盤庚非自荒兹德則在我者蓋已無過而汝乃聒聒起信險膚不肯從我以遷則其曲為在彼矣夫人情大可見汝之含德不惕豫一人觀其肝膈已在面目之間灼然可見故曰豫若觀火言其情偽是非之不可逃也若網在綱有條而不紊若農服田力穡乃亦有秋汝克黜乃心施實德于民至于婚友丕乃敢大言汝有積德案此條經解永樂大典原缺乃不畏戎毒于逺邇惰農自安不昏作勞不服田畝越其罔有黍稷無垢曰譬若醫師治病知病之所在則可以攻治針刺使病去而氣必和儻惟不知病之本原而汗下補瀉雜然並進則性命不保矣今盤庚察微知幾見臣民之病止在傲上從康故諄諄誨誘以善言進之以苦言警之使傲上之心息而知君臣之義從康之心亡而獲勤勞之功則君臣情通而天下大治矣蕭氏曰惡一時之勞而不思毒之所及遍於逺邇是猶惰農之不畏飢也張氏曰汝不能黜其傲上從康之心而含德不惕于一人則是汝不畏其君矣不畏其君而從上以遷使逺邇之民化之而終陷于罪惡則是汝大害于逺邇矣夫不遷之害以天事言之或至於流播死亡而禍生在上以人事言之或至於罹其刑辟而劓殄絶之則其為毒也不亦大哉天下之事未有不始勤而終逸者惟昧者蔽於目前之利不知勤勞於其始故終無所得呂氏曰喻農之服田沾塗泥汙體足固是勤勞然其後必得黍稷汝之遷都犯霜露冒風雨亦固甚勞然其後必得安穩汝不和吉言于百姓惟汝自生毒乃敗禍姦宄以自災于厥身乃既先惡于民乃奉其恫汝悔身何及無垢曰夫心乖忤則言不和心凶險則言不吉乖忤凶險既生于心則為敗為禍為姦為宄而取誅戮矣乖忤凶險敗禍姦宄其誰之咎哉故毒曰自生而敗禍姦宄曰自災此蓋言災毒非自外來皆汝心之罪耳法行當自貴者始端本清源原情定罪則汝當受誅戮之痛矣不於今日改悔至于受罰時雖欲悔焉有弗及矣張氏曰和言者謂以言而諧之也吉言者謂以言而諭之也不和言于百姓以在位不能助王率籲衆戚故也不吉言於百姓以在位之聒聒起信險膚故也百姓者民之所望而聽從之也不和吉言於百姓而欲民從上其可得哉夫惟如此則罰及汝身是汝身生毒也乃敗禍姦宄以自災于厥身此自生毒之效也敗言其無成禍言其無福姦則惡之見于外宄則惡之見于內惟其敗禍姦宄此所以自取其災也吕氏曰今汝既已先播其惡於民乃汝鼓蕩民不遷民固以汝為好不以汝為惡其後圮壞於水則民必怨汝是汝先惡之也汝乃奉飬其恫恫病也相時憸民猶胥顧于針言其發有逸口矧豫制乃短長之命汝曷弗告朕而胥動以浮言恐沈于衆若火之燎于原不可嚮邇其猶可撲滅則惟爾衆自作弗靖非豫有咎無垢曰臣民倡和險膚以口舌儇捷為長是若市井憸利之民也觀此憸民以口舌軒輊人疑若無忌憚矣然一聞有針刺者則相顧􅌓眙而不敢騁蓋知針刺之言其禍有過於我以口舌傾覆人者憸民尚識利害如此豈有為士大夫不識利害反不如憸民乎人主能生殺制人長短之命非針言之可比也汝儻知遷都之非策何不别白以告我而相動以無根之浮言胥動相煽而起若火燎於平原廣野之中因風乘便其可嚮之近邇乎論浮言如此其亦可畏也已然野火雖不可嚮近尚可撲滅之况浮言無根其有不可消弭者乎不過擇其首惡唱造者誅而罰之罰當其罪遞相聳動則姦計消縮浮言撲滅矣盤庚不即誅罰浮言之人而訓誥諄諄如此仁心著見可以坐見先王之心也又曰嗚呼盤庚之不喜誅罰若父祖之於子孫恐其入邪惡是以丁寧告戒于再于三恐之以禍福發之於聲音若將無所容其罪者原其本心實不忍鞭朴之一傷其體也盤庚之於臣下亦若父祖之仁心歟未施誅罰未見傷殘而遽曰毒曰災曰恫曰短長之命曰其猶可撲滅戒勵恐動如此則以不忍誅罰之心若將已行誅罰者夫誅罰未行而已有惻怛之心而况果行刑乎遲任有言曰人惟求舊器非求舊惟新無垢曰人貴求舊則今日在朝老成人以為當遷者汝不可不從也又云器非求舊惟新則此耿都有蕩柝離居之患已如舊器不可用矣當舍此而遷新都以應遲任之言也夫天下之理古今之所共由遲任立此言初不為盤庚設理在於是吾因明此理以曉天下後世耳張氏曰人之有舊則古今成敗無不歷知器之有舊則頽圮蠧壞不可適用古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享于先王爾祖其從與享之作福作災豫亦不敢動用非德豫告汝于難若射之有志無垢曰以爾祖父與先王之遷都則同其勞苦既遷則同其逸樂其可忘哉我雖念舊不忘汝子孫如此然汝不可恃祖父之功以至於傲慢縱恣而不聽我號令也善自取福則為公卿大夫惡自取災則受誅罰撲滅我豈敢容一毫私意於其間以妄為賞罰耶爾祖父有功則祭從大享子孫有善則使之仕宦豫豈敢動用非德之享哉汝不可恃祖父而為惡也我之行賞未嘗及於惡人此亦天下之公理也遷都之舉斷然自任在於必遷正如射之有志志在於的的與矢對一發必中今我之遷志在安利安利之地正與遷對一發必中安利矣復何疑乎張氏曰古我先王與羣臣之祖父固常相與同其逸樂憂勤之事矣夫君臣相與猶一體也方其無事則與之同其逸也及其有事則與之同其勤也今汝衆臣不從我以遷是不念汝祖父之與我先王相與之道也汝之不能從我以遷固宜罰之所加且夫罰所以討罪也罰不當罪則為非罰賞所以彰德也賞不稱德則為非德前言非罰則知非德之為賞也此言非德則知非罰之為威也無德而不妄賞則有罪不可不刑之矣此又所以再三而告諭之也豫告汝于難若射之有志者其志正其體直奠而後發發期於中者射之志也先王之於賞罰蓋亦如此是以不敢動用非德非罰亦欲其中而已吕氏曰古我先王暨汝祖父同甘苦共勞逸豈我敢用非理之罰以罰爾故於爾功臣之間世選其勞苦者擢而用之雖行善亦不敢掩我大享先王爾祖亦配享我先王與爾祖父皆在其上我行賞罰又豈敢動用非德欺神明而為之豫告汝遷都之難事如射之有志於的言不妄發汝無侮老成人無弱孤有幼各長于厥居勉出乃力聽豫一人之作猷無垢曰夫老成理當尊敬孤幼理當撫恤今不肯遷都是侮老成弱孤幼也又曰雖好逸惡勞者人之常心汝當以力勝心斥去怠惰之志以聽我一人之所謀而遷焉夫使之勉出乃力是戒其從康也使之聽豫作猷是戒其傲上也無有逺邇用罪伐厥死用德彰厥善無垢曰今告汝亦已至矣自茲以往無有親踈逺近有罪者即刑之有德者即賞之不從遷都者罪也吾即刑之使汝無傲上從康蕩析離居之患此所謂伐厥死也從遷都者德也吾即用之使汝知君臣之義勤勞之功而後已此所謂彰厥善也夫人之所見偶失其趣有如此不同者盤庚臣下今僻在懷安在於為姦以造謗儻以此一節便盡廢其平生不念其祖先而放殛流竄之此秦皇漢武之暴非古聖王之心也張氏曰用罪者用其罪以刑之也以其有可死之道故用罪以伐之用德者用其德以賞之也以其有可欲之善故用德以彰之言伐厥死則知彰厥善之為生言彰厥善則知伐厥死之為惡聖人之於賞罰未嘗敢容私於其間又豈親近而踈逺邦之臧惟汝衆邦之不臧惟豫一人有佚罰無垢曰盤庚既獨以遷都自任臣下皆不以為然使臣下終不肯聽則盤庚之美意無所成就使臣下遷思回慮一聽盤庚之所為則是遷都而善皆卿大夫衆庶之力也遷都而不善盤庚詎可以罪援之他人哉張氏曰在位臧則邦人化之而皆臧在位不臧則邦人亦化之而不臧矣善者不勸惡者不懲此羣臣所以不臧也羣臣不臧則邦人亦從而不臧矣由是言之則邦之不臧豈非豫一人有失罰之過乎凡爾衆其惟致告自今至于後日各恭爾事齊乃位度乃口罰及爾身弗可悔無垢曰不肯遷都是不恭乃事也不守職分是不齊乃位也聒聒險膚是不度乃口也蓋自仲丁以來廢適而更立諸弟子諸弟子或爭相代立此九世之亂於是諸侯莫朝盤庚當衰弊之後臣民上下無復知君臣之分賢哲之風習為弛慢而不恭其事習為紊亂而不齊其位習為喧囂而不度其口盤庚忠厚盡赦其日前之過斷自今而後各恭爾事而毋或弛慢各齊爾位而毋或紊亂各度爾口而毋或喧囂儻或復蹈前習罰及爾身雖悔無及矣

body:
  text: 尚書精義卷三十一宋黃倫撰西旅獻獒大保作旅獒東坡曰大保召公也旅獒惟克商遂通道於九夷八蠻西旅砥貢厥獒太保乃作旅獒用訓於王無垢曰紂在上九夷八蠻皆不得其所故誠意斷絶不復修朝貢之禮及武王克商小人盡去弊政盡除四海一家中國一人九夷八蠻皆有獻誠之路而西旅所以致四尺之獒以為貢也犬四尺曰獒然則西旅貢非所當貢之物亦有罪乎曰夷狄何罪其國中所出者惟獒故以通誠意耳至受與不受有教化存焉受之則夷狄以謂中國好珍竒狗馬之玩將有輕中國之心不受則使四夷知中國所尚者理義不以竒玩為髙也其敢不警乎昔穆王征犬戎得四白狼四白鹿以歸自是荒服者不至然則受與不受利害如此召公豈得默默哉張氏曰西旅之獒非所當獻也武王之聖非所當受也非所當獻而獻之則其獻無名非所當受而受之則其受無義若然則召公之為太保其可以默而無言乎此旅獒之所以作也吕氏曰武王初克商歸馬放牛驅虎豹犀象而逺之論來武王初克商如此獒之微物必不能動武王何故前日歸許多馬放許多牛方驅許多虎豹犀象了不數日而西旅獻獒獒似不足以動武王而召公所以勤勤者蓋惟聖罔念作狂惟狂克念作聖聖與狂初不相逺特在念與不念之間耳何况創業之時若有一毫之纍便不垂統於後則後必有丘山之纍此正本謹始召公所以不得不戒武王方歸馬放牛驅虎豹犀象固是不得為一獒所動然武王初定天下已能歸馬放牛驅虎豹犀象若不又警戒時此心必恐便倚恃已前曽逺得珍禽竒獸便是罔念道理此召公之意正在此也曰嗚呼明王慎德四夷咸賔無有逺邇畢獻方物惟服食器用無垢曰禹貢九州所貢邇也萊夷所貢逺也各以其方所生之物為獻蓋土地所生風氣所宜先王不責以所無不廢其所有也然其所獻者非以資耳目之玩逞心志之欲如漢武以天馬而伐大宛以蒟醬而開西南夷也惟服食器用所不可缺者而已孔氏曰𤣥纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠簜供器用也是則以器用為一或以羽毛齒革瑶琨篠簜器也牛馬大龜之類用也吕氏曰聖人之心不曾留意於物所以受者蓋緣是少不得聖人不可不受至于珍禽竒獸聖人何嘗言蓋方物之來便是慎德之所召若方物之至玩好之物也受此心便是荒怠不是初致方物之本心聖人慎德工夫所以無窮也王乃昭德之致於異姓之邦無替厥服分寶玉於伯叔之國時庸展親人不易物惟德其物無垢曰畢獻方物乃吾德之形見也德豈吾所敢自居哉亦惟異姓諸侯同心協德所致耳先王不忌不刻善與人同之意可想見矣然則異姓諸侯受朝廷之賜其可少怠於德而不修其所服之職事乎上下修德則方物是來倘惟不德則兵革亦至矣又曰賜異姓以服食器用之物賜同姓以寶玉之物同是物也桀紂以是賜人則人恥之堯舜以是賜人則人貴之是物又以德為主也人所以不敢輕易吾君之所賜者以德在物也重其人則亦重其物矣禮論祭祀必求仁者之粟以祀其親粟一也而必求仁者豈非以德為貴乎吕氏曰明德之致於異姓之邦者蓋方物之獻德之所以致以事論之如肅慎來賀成王賜之賄是明德之致於異姓之邦無替厥服者所以教他因我所賜之物常思守邦敬守王度分寶玉於伯叔之國時庸展親者如魯之所謂寶玉大弓是王者雖公天下為心然自親以及疏所謂異姓之邦則疏所賜者不過逺方所貢方物而遇伯叔之國乃是枝葉之親故以重寶珍玉賜之以展親親之義德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力無垢曰君子勞心小人勞力君子盡心則經綸謀慮興起治功於旦暮之頃防間禍患於千載之後何以使君子得盡其心乎尊敬之委重之可也倘惟狎侮加於君子彼將振衣引去無復肯為朝廷盡心矣人主其誰恃乎昔宋孝武好狎侮大臣自太宰義恭以下不免穢辱常呼王𤣥謨為老傖劉秀之為老慳顔師伯為齴宗靈秀體肥每至集㑹多所賜豫欲其瞻謝傾踣以為歡笑故身死未幾太宰義恭受遺輔政而引身避事政歸近習至廢帝受弒其誰唘之又曰天下之功曷嘗不自尊嚴中成小人以力事上當至誠尊嚴以待之使其臨事不敢慢而櫛風沐雨侵寒犯暑罔或怠惰可也倘以狎侮待之君子知禮義第奉身而退耳小人不知此理亦以狎侮報之苟簡鹵莽偷閒怠惰而不肯盡其力矣何至此哉宋公靳宋萬而卒為宋萬所弒唐敬宗與羣小狎昵亦卒為羣小所弒其禍乃至於如此者召公之言優游不迫未欲極其說耳張氏曰狎則外有所䙝侮則內有所慢狎侮君子則遇君子不以禮矣此君子所以莫肯為之用也狎侮小人則遇小人不以禮矣此小人所以莫肯為之使也君子則人之所德而信之者也故狎侮君子非特罔以盡其心焉人之心且皆莫肯為之盡矣小人則非人之所德而信之者也故狎侮小人特曰罔以盡其力而已不役耳目百度惟貞玩人喪德玩物喪志無垢曰愚者以耳目為我聖人以心為我以耳目為我則姦聲亂色足以熒惑其心志以心為我耳目具位而不縱天下萬事皆以心造化之心正則耳目正矣蓋心體本正以心為我無往而不正故百事之度皆得其正玩人而喪德如紂為酒池肉林使男女倮逐其間者此玩人也如此所為何德之可言玩物喪志如漢武帝為一馬之故至起兵而伐人國此玩物也如此所為何志之可言蓋有德者常以敬自持故不敢以人為玩有志者常以道為準故不敢以物為玩張氏曰耳之於聲目之於色性也而君子不謂性若夫為耳目所役則逐物而不知返是故役於目則亂五色淫文章役於耳則亂五聲淫六律如此則百度所以失其正矣玩人則狎侮狎侮所以喪德玩物則役耳目役耳目所以喪志玩人有甚於玩物喪德有甚於喪志君子之志志於仁義而已今也一於玩物而不能居仁由義此志之所以喪也吕氏曰心之官以耳目為主當要虛中無我若是心聽命於耳目為耳目所使則心流於玩好本源如此則事皆頽壞百度所以不正惟是心之官虛中無我坐應萬變則百度無不正若為耳目所役則此心流於一物上唐莊宗好聲樂隋煬帝好宫室二君之心為耳目所役便在聲樂宫室上其他事都不理為人君者乃是萬化之本原本原須是十分澄徹虛中無我方是不為耳目所役百度自然正矣志以道寧言以道接無垢曰道即心也誠求得其本心以此出而為志則常安而不搖以此發而為言則善應而有法張氏曰志者心之所之也言者心之聲也心之本未嘗非道則心者道之所舍及其出而為志必以道而後足以寧身發而為言必以道而後足以接物若夫志不以道則志為物纍驕奢淫佚無所不為身有不寧者矣言不以道則言不循理詖邪淫遁無所不至物有不接者矣不作無益害有益功乃成不貴異物賤用物民乃足無垢曰作無益必害有益貴異物必賤用物此不易之理也故以有益為主則無益者自廢以用物為主則異物自廢史氏曰解心之繆則治身之效著去德之纍則及人之利溥今夫畋遊宴樂無益者也道德仁義有益者也吾不作無益而反害有益則心之繆解矣用以治身功其有不成者乎珍竒淫巧異物也黍稷桑麻用物也吾不貴其所異而反賤其所常用則德之纍去矣推以及人民其有不足者乎苟人君私縱耳目之欲一作於心而害生於彼一貴於上而賤及於下則自身以至於人顛倒錯亂其禍有不可勝救者矣張氏曰事之有益於理者可以為也不作無益以害之則有以興民之利故功乃成物之有適於用者可以貴也不貴異物而賤之則有以裕民之財故民乃足犬馬非其土性不畜珍禽竒獸不育於國不寶逺物則逺人格所寶惟賢則邇人安東坡曰王者之世宜尚亷而怯貪古之循吏能以亷服逺方者多矣而貪吏適足以致冦况於王乎周穆王得狼鹿而荒服因以不至無垢曰孟子曰君子居是國也其君用之則安富尊榮其子弟從之則孝悌忠信使人主視寶玉竒珍如糞土而以賢者為寶則必建長久之策致人主於三代之隆而中國之民人人得其所矣安富尊榮孝悌忠信何止邇人安哉决不為白狼而起犬戎之師决不為天馬而興大宛之役以人主所寶者賢也然則人主於所寶其可不謹哉張氏曰不寶逺物則於逺無所取而逺人不擾矣故逺人格逺人格則四夷來王是也所寶惟賢則於賢無所遺而邇人可以治矣故邇人安邇人安則四方無虞是也傳曰寶珠玉者殃必及身又曰仁人者國之寶也則有天下國家者其於所寶可不謹哉吕氏曰不寶逺物則逺人格這一句自衰周至於漢唐上自朝廷下至守邉吏所以蠻夷不服者都緣是貪太保這一句最親切的當如此曹丕求明珠孫權便不服穆王求白狼白鹿方物便不至後世守邉吏所以開邉釁而致戎狄之害者只緣是受逺物在乎貪也所寶惟賢一件事相為消長若見得賢實可寶之物則虛化之物定是不寶人惟不知賢之可寶見得一個異物可喜所以貪冒致戎狄之禍若真誠義理天下所可重所可寶者豈過於賢者入賢者門庭安賢者趣味逺物自然視如浮雲鴻毛之輕秋毫之微識其不可寶者則所寶莫非賢矣嗚呼夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣允迪茲生民保厥居惟乃世王無垢曰干雲蔽日之木起於萌芽懷山襄陵之水起於濫觴萌芽不絶則斧斤勞濫觴不治則胼胝苦蓋莫見乎隱莫顯乎微此古人於細行所以必愛惜也一時失路未為害也往而不已豈非為大德之害乎終纍大德真格言哉終之為言謂其不已也受一獒之獻細行也狎侮之心珍竒之念自此而起源源不絶將為漢武帝矣可不戒哉九仞之山以一簣而虧細行不慎為大德之纍是始之非難終之為難也允信也迪行也召公言武王信行慎德則此心安靜不為非法以擾動天下使生民皆得安其居耕田鑿井仰事俯育熙熙然知有生之可樂矣民心如此天心在焉天人同心幽明協德武王世世作民父母為天下王此自然之理也陸氏曰夫小者大之漸微者著之萌故君子慎初聖人存戒知機者所貴乎不逺而復知理者必在於未亂之前立輔臣置之左右朝夕納誨意在防微微而防之乃其識也涓涓不遏終遍桑田焰焰不除卒燎原野流煽己甚禍災遂成雖欲救之固無及矣易曰小人以小善謂無益而不為也以小惡為無傷而不去也故惡積而不可掩罪大而不可解然則小之不可不慎也如此巢伯來朝芮伯作旅巢命無垢曰夫巢伯來朝非朝武王也朝武王德也芮伯作旅巢命旅陳也安國謂芮伯周同姓圻內之國為卿大夫其所陳者述武王之意以命巢伯也其中必有戒飭如冏命畢命之意其篇亡矣武王有疾周公作金縢無垢曰武王有疾周公有代死之册在金縢之匱今録而成篇金縢之册非周公而誰作乎至於成王信流言以金縢之書而悔上天動雷電以金縢之書而知故史官因敘其事以見金縢之作以明周公之心也使武王無病則金縢之書不作使上天不怒則金縢之書不開然則因流言因天威乃見周公金縢之書所以孔子判之曰武王有疾周公作金縢也又曰聖人存心不求人知而求天知成王信流言疑周公周公雖死不自明也夫不自明而周公死豈不陷成王為有過之主哉曰吾之心取信於天耳使吾心無愧於天則成王必寤儻成王不寤而周公死是周公之心終有愧於天而天不為之動也其何怨天尤人之有乎周氏曰周公作金縢其訓諸後世之為臣者忠於其上雖其命有可易焉信乎曰周公之教人備矣昔武王老成王幼管蔡不可教周公身任天下之重也身任天下之重萬世我賴變不謀寧亂不謀定惡足為周公哉衛道也周慮患也深防患未然其唯金縢乎微是周室其變矣蘇子才曰案金縢乃周公策命之書自納金縢之匱及為流言所謗成王悟而開之史敘其事乃作此篇非周公作也金縢既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉圭乃告大王王季文王無垢曰克商明年武王有疾而弗豫弗豫猶不懌也蓋疾既甚則情思昏憒支體疲怠氣息微弱安有悅豫之心哉病至於弗豫則疾勢危矣臣子之心亦安得不憂哉夫武王年八十三伐紂八十四即位是弗豫之年已八十四矣年亦老矣而疾至於弗豫死為必然而生亦僥幸矣此召公太公所以欲敬而求諸龜卜也卜而吉固可慶也卜而不吉則將為立子計爾周公以謂若卜而不吉非周家之福也故以未可以憂我先王之辭拒二公若夫代死之事吾位居冢宰親則兄弟當自任之不可以委二公也功事也自以為己功者自以代死為己事也非以詐辭拒二公而自取其功也學者觀聖賢當以聖賢之心為心築土曰壇除地曰墠先除地以祛穢濁後立壇以尊神明為三壇於墠中故曰為三壇同墠也三壇之外又為一壇於三壇之南所以北面三壇而周公立於此壇也植璧於神坐而秉圭於掌握告太王王季文王以代死之事焉楊氏曰或曰二公曰我其為王穆卜周公曰未可以戚我先王其為臣子一也在他人則拒之在己則為之仲尼書之曰公乃自以為功得非過之也於此見周公之大也噫苟非公乃自以為功之一句則周公之心安顯哉嘗試論之武王之崩克商已五年矣尚有武庚三監叛於內奄及淮夷叛於外而况克商之二年而王有疾則天下之心未盡固矣宗廟社稷未為無慮矣於時周公自以安國定社稷為己事豈非大哉張氏曰昔孔子有疾子路請禱子曰丘之禱久矣示其無事於禱也然則武王之疾周公必欲禱之者豈固異哉孔子之不禱為己故也周公之必禱為君親也為己而禱是不知命也為君親而不禱是不知義也無義無命豈周公孔子之所為哉此其所以不同也雖然命出於天其死生夀夭之數固非人之所能為而欲以身代武王之死則周公豈不知天而苟為之哉蓋其愛君親之心出於至誠固足以感通於神明自非深知死生之故鬼神之情將曷足以及此史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責於天以旦代某之身豫仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷估四方用能定爾子孫於下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命於元龜爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭無垢曰祝辭曰若爾三王有大子之責於天則以旦代發之身責猶取責於人之責言天必欲周一大子之死三王不得而已也今我有一䇿可以免武王之死塞上天之責其策如何以旦代發之身是也事鬼神之道當誠實不當有隱情詩稱周公曰公孫碩膚以言周公有大美而遜退也今對三王自稱我仁孝能順曾祖考皇祖考皇考又稱我多材能多技藝能事鬼神安在其能遜退哉無乃有驕吝之心乎曰不然蓋遜退乃周公之本心而自稱乃窮迫不得已之辭也事鬼神之際當以誠實不當有隱情此周公所以自稱材德而不疑也不如是不足以動天地感鬼神矣人各有能有不能事鬼神者周公之能佑四方者武王之能周公之意以謂天必欲周家一子之死當取能事鬼神者不當取佑四方者取周公以事鬼神留武王以佑四方豈不為當乎下地對上天而言也四方之民知武王在上皆祗敬畏服不敢起姦邪之心蓋天下方定民心易搖使武王於是死則子子孫孫基業未可知也何以言之大位姦之窺也危病邪之伺也四方姦心將有不可知者矣其何敢保其祗畏乎且武王一死三監及淮夷乃挾武庚以叛則周公之說可謂先見事幾矣天之降寶命謂天使武王得天下也武王在則寶命長存寶命長存則宗廟嚴奉三王血食有所矣武王死則姦邪將起寶命殞墜寶命殞墜則宗廟以隳廢矣三王其何所依歸乎許我則兆見其吉是武王生而周公得死所也我將以此璧此圭歸家以待三王之命晏然而就死焉不許則兆見其凶是必欲王之死而不許周公之代也璧圭所以事鬼神既不許周公代武王之死是周公不可以事鬼神也故屏璧與圭而無所事焉東坡曰死生有可相代之理世多疑之豫觀近世匹夫匹婦為其父母發一至誠之心以動天地感鬼神多矣况周公乎且周公之禱非獨弟為兄臣為君也乃為天下為先王禱也上帝聽而從之無足議者世之所以疑者以己之多僞而疑聖人之不情也鄭氏曰君父疾病方困忠臣孝子不忍默爾視其歔欷而就死中心惻然欲為請命周公達於此理著在尚書若君父之病不為請命豈忠孝之至也然則命有定分非可代死周公為此者自申臣子之心非謂死實可代自古不廢亦有其人但不見爾未必周公獨為之吕氏曰天命所在夀夭長短自有定數當武王疾時周公聖人豈不知天命所在而欲以身代武王之死謂公出于一時忠愛之故不暇顧其正理亦不然於此當知天命一原之理乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害豫小子新命於三王惟永終是圖茲攸俟能念豫一人公歸乃納册於金縢之匱中王翼日乃瘳無垢曰是三龜非三王各設一龜以卜吉凶也乃用三代兆法以卜之故謂之三龜也一習吉者習因也先卜夏兆夏之兆法既以為吉次卜商兆商之兆法因之又以為吉次卜周兆周之兆法因之亦以為吉三兆雖不同而一皆因為吉則武王之不死無疑矣周官占人凡卜筮君占體大夫占色史占墨卜人占坼鄭康成解云體兆象也色兆氣也墨兆廣也坼兆舋也未見占書時大夫與卜人已見兆之為吉矣及取占書證之又見其為吉然後周公取兆以觀之兆即體也乃占兆之大象知王必安而無害矣新命於三王謂新得吉卜之命於三王也若此則武王不死而可創立規模為子孫長久之計矣茲攸俟所謂歸俟爾命也能念豫一人謂三王果能以武王為念使武王安也然則三王能念豫一人則天下安不能念豫一人則天下未可知也公歸歸俟三王之命乃納册於金縢之匱是祝册之明日武王即獲平安也

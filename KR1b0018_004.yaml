body:
  text: 尚書精義卷四宋黃倫撰月正元日舜格于文祖詢于四嶽闢四門明四目達四聰無垢曰夫天下之情多樂因循而安怠惰所以禍每藏於細微而變或起於肘腋非特有以聳動之則不足以興天下之治也舜歷試而先黜四凶攝位而先巡守即位而先詢四嶽闢四門明四目達四聰者是皆聳動天下之道也不如是治必不興禍必不弭周官曰惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸於宗周董正治官乃知自古聖王未有不為此舉而後能成天下之治也詢于四嶽謂舜與四嶽謀所以聳動天下之道也闢四門明四目達四聰此與四嶽所謀之事也四門嘗闢矣何待於即位乎曰所謂闢者謂不為深閉固拒尊嚴扞衛凡四方有鬱結之事素不快於心者於即位之時使四面皆至盡得以上達也所謂明四目達四聰者謂舜不自用其明用四方之視以為明不自用其聰用四方之聽以為聰庶幾端拱於一堂而天下之事洪纎曲折至閭巷之態小人婦女之情無不坐列於目前也後世置御史以為朝廷耳目之官置外臺以為天下耳目之官使內自宫閫廉陛之間外達四方萬里之外無不盡見其底藴者此蓋得舜之遺意也張氏曰堯崩三年之喪畢舜避堯之子於南河之南至於朝覲訟獄謳歌者不之堯之子而之舜不得已然後之中國踐天子位方其踐位也必格廟所以受命於祖也蓋舜之未踐位天下無政則即是月而後有正此所以不謂之正月而謂之月正也元日者日之吉也舜之始蓋嘗受命至是復之中國踐天子位故其格廟不必朔旦特用元日而已又曰遍而問之之謂詢開而通之之謂闢詢四嶽所以謀之於邇而邇臣之慮得以上聞矣闢四門所以求之於逺而逺人之志得以內達矣牆之外目所不見矣明四目然後足以廣覽里之前耳所不聞也達四聰然後足以兼聽目欲其照察者也故曰明聽欲其疏通者也故曰達吕氏曰舜典一篇自此以前舜之於治甚詳自此以後舜之於治甚略蓋當堯在上舜雖受位猶臣道也自堯崩始行君道焉觀書者於此以前當知坤作成物於此以後當知乾知大始自正月元日舜即位而至文祖之廟始然舜之繼堯非有積蔽而不通下情者蓋聖人初興自當如此譬如日之朝升日日如此當隂雨之後日出固如此當晴時日出亦如此舜之通下情雖首於治天下然不無其序四嶽纍朝之耆老舊德故先詢之咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服荆公曰古人皆以治逺自近始至於言柔逺能邇則先言柔逺者何也不柔逺則逺者將為己患而近者不得安矣雖欲善近不可得也欲善近者以柔逺為始乃若治之則自身至於家自家至於國自國至於天下四海之外未有不始乎近而後及乎逺也無垢曰舜既即位十有二牧皆來朝舜既與四嶽謀天下大務矣又咨於十二牧以治國之道夫侯服之外綏服也綏服之外則要荒矣密邇蠻夷易以生患然外患常起於內擾內擾常迫於衣食使十二牧知務農重榖春耕秋斂境內之民仰事俯育各得其所外患何從而至乎此告十二牧所以首以食哉惟時也又曰來則以禮接之去則以寬待之不責以細故不擾其封疆使忿無自而作釁無自而成者此柔之之術也至於待吾境內則當有以作成之能者作成之也夫人各有能非有以聳動之則皆置於腐爛朽蠧之地其作成之道何自而入哉曰有德者有善者吾則惇之信之使境內知所慕外若有得中實姦邪外若向善中實凶惡如任人者吾則防間鈐束不為艱難使境內知所畏夫聳動境內之民其道如此是所謂折衝尊俎運籌帷幄之幾也蠻夷烏能而不服乎所謂服者其心誠有所不敢也以為剛乎而寬厚之道每有以注其心以為柔乎而聳動之風每有以懾其勢此其所以率服也借使鳥獸其行豺虎其心故犯吾圉而干吾威者吾用所以聳動之術以應對之將見觸之者碎嬰之者斷矣舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝往哉無垢曰夫堯之事蓋皆欽明文思安安允恭克讓中出也豈因循苟簡鹵莽闒茸者所能廣大其事哉必須奮然自勵實有功名之心者晝思夜慮日參月考及事與心對幾隨事來吾求所以應之之計而未得焉及見堯之施為真有合天下之理而遏未然之禍者此所以言熙帝之載而必曰奮庸也誠能如此使居宰相則能明天下之事順衆人之心矣百揆者宰相之職也在廷之臣其可以當此任而合公論者非禹不可故衆皆同聲而舉曰伯禹作司空舜之心亦謂非禹不可也然而退藏聰明必待衆人舉之者蓋宰相之職居百僚之上非衆心歸服其可以吾一己之見以蓋衆人哉第觀其所舉者如何耳所舉不當吾則引堯故事曰吁曰嚚訟可乎曰靜言庸違曰方命圯族有何不可而阿黨比周如歡兜者吾方斥逐之矣其誰敢為此乎是其所舉者無非公論也所舉誠當吾正當順衆人公心而用之天下之人見吾之不可欺如此則雖在幽荒僻陋之間常若有執法御史在其前後而不敢為欺罔也今舉伯禹此舜所以不復疑難而稱禹曰汝平水土惟時懋哉張氏曰為而起之謂之奮廣而明之謂之熙有能奮庸言民功也熙帝之載言君事也下能致力於民功上能廣明於君事人臣之大也故可使之居百揆之任百揆者統率百官而以道揆之者也又曰亮采者明其事也惠疇者惠其疇也亮采則其智足以有察而百工之事獲其治矣惠疇則其仁足以有愛而百工之衆賴其福矣既仁且智則百揆之任得其人可知矣帝曰棄黎民阻飢汝后稷播時百榖無垢曰因禹讓百揆之職于稷契臯陶故舜歷稱三人之功而慰安之此意未易言也稱棄之功曰黎民阻飢汝后稷播時百穀者當洪水之作也懷山襄陵豈復有耕稼之地乎觀益稷之篇曰豫決九川距四海濬畎澮距川暨稷播奏庶艱食鮮食謂民以洪水艱於粒食而皆阻飢也禹既決九川距四海濬畎澮距川則水復故道昔時為水所浸沒者今皆可耕矣稷於是時隨地可耕處而為之播種百穀挈飢困之民於飽足之地其心不已勤乎又曰夫黎民阻飢棄乃有功蠻夷猾夏臯陶乃有功洪水滔天禹乃有功使不遇大變則賢者亦安常守分與衆人同耳豈肯表表自將求異於人哉商鞅不知此義盡變先王之法以求功宇文融不知此義盡括天下之田以求功此在先王之世皆為可誅也謂豫不信請觀禹稷契臯陶所以為功者豈若鞅融輩生事要功哉亦遇大變不得已而有功爾由是知大人君子所為古今一揆也張氏曰棄以名命之也稷以官稱之也因其生而有是名因其事而有是官此所以謂之棄而又謂之后稷洚水方平之初民尚艱食則黎民固阻飢矣棄為后稷之官播時百穀則蒸民乃粒而民食足矣吕刑曰稷降播種農殖嘉穀孟子曰后稷教民稼穡樹藝五穀五穀熟而民人育則稷之有功於民大矣帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬無垢曰因禹之讓契舜因稱契之功以安慰之也夫衣食足而後知禮節倉廩足而後知榮辱無常産者無常心此百姓自然之道也民遭洪水其日既久艱於粒食煎熬迫逐之態日攢於心其發於外也躁急暴慢不親不遜於親戚鄉黨之間者固不足怪禹治水稷播種已有生意矣契於是乃因其自然之性乘間暇時啓發其親遜之心使之還其所固有豈不美哉夫所以啓發之者亦優而柔之使自趣之饜而飫之使自得之若江河之潤膏澤之浸油然而不自知也儻惟督迫之驅逐之則斯民將驚苦無聊方晝思夜夢之不寧何暇樂於從善乎此孟子養氣所以有揠苗之喻而契之敷教所以有在寬之義也張氏曰不親者以不能相親也不遜者言其不能屈己以相與也夫君臣父子夫婦長幼朋友之間不能屈己以相與此其所以不親也百姓之所以不親五品之所以不遜則天與我之民彝日將泯亂此司徒之教所以不可緩也教之所行自其貴近者始故特言百姓蓋百姓者天下之所視效而聽從者也敷教之道在夫率之以身待之以久率之以身故戒之以敬敷待之以久故戒之以在寬記曰師嚴然後道尊敬敷之謂也詩曰載色載笑匪怒伊教在寬之謂也帝曰臯陶蠻夷猾夏寇賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允無垢曰孔安國謂羣行攻劫曰冦殺人曰賊在外曰姦在內曰宄且檮杌叨餮渾沌窮竒乃在朝廷而蠻夷乃來亂中華之地攻劫者殺人者為不正於內外者又雜然四起亂舜之治是雖盛時不免有小人也臯陶之作士也乃能處之使終不能為吾患鄭玄曰士察也孔安國曰士理官也理官以按獄為職也處之如何為墨劓剕宫大辟之刑以俟之所謂五刑有服也五刑所用各有所犯之事而定其罪服事也然罪有輕重則有陳於原野者有刑於朝者有刑於市者所謂五服三就也孔安國曰大罪於原野大夫於朝士於市意或然矣事在五刑而其情輕未忍置之於死者則有五流之法屏之逺方以宥其罪焉所謂五流有宅是也流有輕重有居四裔者有居九州之外者有居千里之外者所謂五宅三居也觀五刑有服五服三就五流有宅五宅三居之法其亦深體物情曲盡人意使姦無所逃情無所隱非明見幽隱信及豚魚何以能處之如此哉夫伯禹讓稷契臯陶舜乃因禹之言人人而稱奬之深玩其意嗚呼舜之仁厚溫晏如此使人有悅而忘勞忘死之心矣夫稷契臯陶盡心職事而舜乃深知其細微樂見其功效當朝廷之上羣臣在列之時乃分别其事條列其人舉其難以嗟咨之稱其功以慰勉之千世之下讀其遺書尚使人感慨不已則當時稷契臯陶之樂於見知其欣喜之情又為何如也陳氏曰居是官者不明則不足以盡人心不允則不足以當人罪故戒臯陶曰惟明克允帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓於殳斨暨伯與帝曰俞往哉汝諧無垢曰舜求百揆則曰有能奮庸而求共工則曰疇若豫工者意謂誰能順我考工之事以周官考之有攻木之工攻金之工設色之工刮摩之工以下皆工也是工之為職器械之所自出也其曰豫工者聖人在上則器械有法一或不然器械失度即器械可以上遡聖人之心其曰豫工又何疑哉觀象箸可以知桀觀玉杯可以知紂觀金人可以知始皇觀錦帆可以知煬帝以至鷸冠成而子臧亡鑑車美而慶封奔四載可以見禹之勤五絃可以詠舜之德而工匠器械自元成間鮮能及之亦可以見宣帝勵精政事也工曰豫工何疑之有其曰若者欲其順器械之理也夫刳木為舟剡木為楫乃有涣之象斷木為杵掘地為臼乃有小過之象弦木為􅓡剡木為矢乃有睽之象以至網罟取諸離宫室取諸大壯棺椁以易衣薪之野書契以代結繩之陋莫非仰觀俯察逺取近取因萬物自然之理而為之制作豈可亂天之經逆物之情為竒技淫巧以蕩上心而悅婦人哉此又若之意也又曰夫舉不當而許之亂也舉當其人而不許亦亂也一吁一俞之間天下治亂之幾自此而起其可輕也哉張氏曰記曰天子之六工曰土工金工木工石工獸工草工典制六材則六工皆天子之工也供是職者在若之而已守其法信其度因聖人所以創作之制而持循之此之謂若又曰帝於伯禹之讓則曰汝往哉於垂益之讓則曰往哉汝諧者禹之於百揆可以優為之矣故使往而無所戒可也至於伯夷之典禮非特使之往而又曰欽哉者蓋禮以欽為主謂之往欽哉則又使之往而加欽也共工治之末朕虞職之卑故戒之以汝諧而已蓋以事之不可咈衆之不可違此其所以貴於諧也帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞往哉汝諧無垢曰聖人以萬物為一體者也故曰豫上下草木鳥獸曾子知此意乃曰斷一木殺一禽不以其時非孝也故暴殄天物紂所以致討而有血氣之類弗身踐者所以為君子歟若之者豈一切生之而不殺歟曰非然也先王之世山澤之間為之厲禁食之以時用之以禮故獺祭魚然後漁人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林不麛不卵不殺胎不夭夭不覆巢此皆若之之術也夫聖人在上萬物各得其所則以為之厲禁人不得非時非禮以戕賊之也至於牛羊犬豕之類亦有品節犯分干時皆在所禁如諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕仲夏斬陽木仲冬斬隂木春獻鱉蜃秋獻龜魚之類皆所以安萬物使樂其生也故鳥獸魚鱉咸若所以為夏后而麀鹿攸伏白鳥翯翯於牣魚躍所以為文王也然草木鳥獸當在山澤儻或草木鬯茂禽獸繁殖以害吾中國則益有烈山澤之法周公有驅猛獸驅龍蛇之法是所謂若之也若者順也居於山澤順也交於中國逆也此又聖人之深意豈得以姑息為若哉張氏曰先王之政非特親親仁民而已其微至於草木鳥獸皆有以及之是故取之有時用之有禮不傷其生不咈其性則其愛物之心可謂勤且至矣此舜所以命官作朕虞帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞往欽哉無垢曰三禮即周官天神人鬼地示之禮也言人鬼則吉凶軍賓嘉皆在所掌矣夫其數可陳也其義可知也知其義而敬守之天子之所以得天下也故曰明乎郊社之義禘嘗之禮治國其如示諸掌乎伯夷之典禮豈特為祝史之事有司之職哉其亦當知義之所存矣其義安在舜戒以夙夜惟寅直哉惟清是也夫夙夜匪懈而不知寅敬其心則亦徒勞而已矣辦職事則在夙夜而所以感格神人者則在寅也正義直指而不知潔清其身則亦徒訐而已矣通幽明則在直而所以感格神人者亦在清也張氏曰夫禮將以交神人者也交神人之道不可以怠慢故戒之以惟寅不可以邪枉故戒之以直哉不可以濁穢故戒之以惟清傳曰禮者敬而已矣此所以欲其寅也神之聽之好是正直此所以欲其直也孟子曰雖有惡人齋戒沐浴則可以祀上帝此所以欲其清也舜之巡守則曰修五禮至此則曰典三禮者蓋三禮者五禮之體五禮者三禮之用禮之體則常而不變故命伯夷典之伯夷者臣也有法守焉故也禮之用則因時而為之損益此舜於巡守所以修之修之者君道也此其言所以不同帝曰夔命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔曰於豫擊石拊石百獸率舞王氏當曰夫聲起於氣而氣生於心蓋心者樂之本也故心和而氣和氣和而聲和和之所在物無不應故舜之命夔教胄子曰直而溫寬而栗剛而無虐簡而無傲而周公之教國子曰中和祗庸孝友未有不本於心也彼其素所養者無非其和則在陽無剛暴難制之聲在隂無憂愁不樂之氣大足以動天地幽足以感鬼神微足以致鳥獸蓋不足怪也史氏曰典樂而先乎中則所化者博作樂而極乎和則所格者大胡氏曰金尚羽石尚角土絲尚宫匏竹尚徴革木尚商此所以聲律相依而皆和故曰八音克諧諧者和之謂也張氏曰樂所以象成功者也以舜之治如此所以致衆樂之和由石聲而依永也顧氏曰夔既命而自贊之何也是所以歸美于君也然則九官衆矣而歸美止乎夔者夔之於樂也辨其器而調其音也舜之於樂也修其理而致其應者也屬乎器與音者藝也屬乎理與應者德也神人之和與夫鳥獸之舞其皆藝之所能及耶非也德之所感也此夔之所以自贊而異於他者若夫去樂而為功則皆一人之能其又何贊之耶吳氏曰樂本人心也人心和則氣和氣和則聲和聲和則寫之金石被之管絃無不和矣其在易雷出地奮豫先王以作樂崇德言雷一奮地而萬物以之鼓舞如聖人樂作而天下無不和悅舜之時可謂和悅矣遂作韶故命夔典之觀其時若此之盛意謂使我擊石拊石當可使百獸率舞則舜之治可知矣夫鳥獸有知而無情聖人在上德被者逺雖無情者尚可使之率舞况其他者乎帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允無垢曰垂讓龍舜乃因其讓而命龍為納言專以讒説為念也夫讒説之生專害君子變亂黑白詩人以比青蠅騰播無實詩人以比南箕比之㲋兔者逐之善走也比之貝錦者即之可觀也非大聖明其孰能不惑於此哉夫其生也因刑而入乘間而出其入也則足以搖動君子其出也則足以搖動朝廷之心震驚朕師豈欺我哉昔東漢出納帝命乃在宦官其擅誅陳蕃也出帝命則曰陳蕃謀反誅者有賞使聽者惑焉納帝命則又曰陳蕃謀反臣等已誅之使人主惑焉靈帝竟莫知陳蕃為忠正也以此觀之出納君命其可以不謹而使宦官如王甫輩為之乎史氏曰人君不以去邪為急而以建官為急人臣不以承命為勤而以立功為勤何哉讒邪之説雖大聖之世有所不能免也殄絶君子之行義震驚天下之耳目其為患蓋亦甚矣聖人不汲汲於去邪而汲汲於建官謂典言者苟得其人則夙夜憂勤出吾之命而將有所受納吾之命而將有所報雖上下異勢內外異情而能一之以信如是則讒邪之説當不絶自去矣吕氏曰讒人點白成黑殄行自絶其行此等人出易得驚怖人故命納言之官以通上下之情人君之治天下最患下情不通上下之情相隔塞中間無一人為之居職則讒邪便得以相蔽納言之職便是通下情之樞舜之時雖無此弊蓋亦不得不隄防帝曰咨汝二十有二人欽哉惟時亮天功無垢曰夫闢四門明四目達四聰天也食哉惟時柔逺能邇惇德允元而難任人天也亮采惠疇天也播百穀敷五教明五刑天也若豫工若豫上下草木鳥獸天也典禮以為秩宗典樂以教胄子夙夜出納帝命亦天也是皆天所當為舜不敢起一毫私意以亂之也二十有二人誠知事事皆天而時時不忘其欽是乃所以弼亮天功也夫天自有功惟欽其事以弼亮之者天功乃見焉如毛羽之文草木之華皆渾然天成非人力所能加損者二十有二人所職之事事中自有天功特在時時致欽盡心於所職以相輔之耳林氏曰周官有三公六卿有侯伯而顧命乃同召太保奭芮伯彤伯畢公衛侯毛公以人言之則六人而以職言之則不止於六人也蓋有以三公為六卿者有以侯伯入居公卿之位者雖數止六人而實兼數職也此四嶽九官十二牧當有二十五人但言二十二人者蓋或有兼居嶽牧之任者或有在州牧之中而又居九官之列者世之遼絶不得而知也欽者是使四嶽十二牧九官各敬其事也所以必在於敬事者以其所亮者莫非天功也亮有輔相之義與亮采惠疇之亮同臯陶曰兢兢業業一日二日萬幾無曠庶官天工人其代之蓋所謂設官分職者凡以代天工則四嶽九官十二牧莫非所以代天工者故以亮天工言之三載考績三考黜陟幽明庶績咸熙分北三苖無垢曰夫人之情放之則怠䇿之則勵雖大人君子盡心職事初無意於功賞亦不待於警䇿也然聖人言必慮其所終行必稽其所敝使盡以大人君子待天下而不為之檢約萬一有如四凶者始以才進後以姦濟此風一行天下事去也必矣故雖二十二人之賢舜所以必三載考績三考黜陟幽明也然考課之法急之則詐偽生寬之則功實見漢宣求治太急所以有偽增户口以求賞如王成者出焉子産為政一年而民欲殺之三年而民歌頌之使如漢宣之太急一年之外子産受誅久矣安得有三年而成效乎三載而一考之三考而乃黜陟之則所以待之者一何寬也待之以寬則在職者不求耳目之功而為千百載之計其間利害曲折設施開闢有出人意表者有使人驚歎者吾得安心肆志展其四體而無懼浮言讒説焉張氏曰孔子曰三年有成此唐虞考績之法必以三載者也雖然聖人猶以為未也故積之之久待之之盡至於三考然後為之黜陟是故為善積久而為明所以陟之為不善積久而為幽所以黜之善者陽之類也積之既久則浸之以明不有以陟之則無以勸君子不善隂之類也積之既久則浸之以幽不有以黜之則無以懲小人既有以黜陟幽明則人皆知賞之可慕罰之可畏於是乎樂事勸功此庶績所以咸熙也堯典言庶績咸熙在允釐百工之後則庶績之熙由於百工之允釐故也此言庶績咸熙在於黜陟幽明之後則庶績之熙由於幽明之黜陟故也分北三苗者所以黜幽也北者隂陽分背之地苗頑弗即工於是分北之則小人與君子異趣矣夫黜幽止於分北三苗者堯舜之世比屋可封君子多而小人少所可黜者三苖一人而已舜生三十徴庸三十在位五十載陟方乃死司馬溫公曰舜在帝位治天下五十載升於至道然後死爾非謂巡狩為陟方也東坡曰舜生三十謂為民三十載也徴庸三十謂歷試三十載攝位二十八載也在位五十載陟方乃死謂堯崩服喪三年然後即位蓋其年六十二矣在位五十載而崩壽一百有十二孔氏曰孟子云舜服三年喪畢避堯之子故服喪三年三年之喪二十五月而畢其一年即在三十在位之數惟有二年是舜年六十二為天子五十年是舜壽凡百一十二嵗也帝釐下土方設居方别生分類作汨作九共九篇稿飫上官氏曰昔舜理諸侯之事方置其官各居方而統治之又别之生而異其類使各相從故序之曰帝釐下土方設居方别生分類作汨作汨謂之治作謂之興言其治功之興也九共九篇則其義亡矣凡師枯稿則為賜酒食以飫之故作稿飫

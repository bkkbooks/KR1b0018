body:
  text: 尚書精義卷一宋黃倫撰總論司馬溫公曰自書契之作先民可得而聞者皆有史官其載籍博矣經傳所稱特二帝三王之事見於典謨訓誥誓命之文觀夫躡風雲之會起而應帝興王唐虞相禪夏后殷周相繼世代雖殊其所以享崇髙據大寶者皆積德纍功洽於百姓修仁行義考之於天然後謳歌訟獄有歸焉又曰上古帝王政事之迹於書為詳焉此書所以為政事之本也然而道之粗者在物以聖人之意而觀之則即事中有理即理中有事事中之理則藏於至賾之微而意有所不能致理中之事則發於至動之顯而言有所不能盡學者苟以理而會於事以事而徵於理精之以思通之以意則道德之義性命之理見於書矣顧氏曰學道者所以充智而智常至於不充窮經者所以立道而道常至於不立夫豈道固不足學而經不足窮歟道也者不修則不成經也者不求則不明聖人之立而有成者道也然則其可以不學乎天下之道所以質而法之者經也然則其可以不窮乎彼之所以學而窮之者涉乎其外而不造乎其中採乎其華而不食乎其實是以心雖勞而義不博智雖専而理不明又曰善求其法而無耽其文善觀其心而無泥其迹蓋書者有迹而有心成王之建官穆王之訓刑是皆所謂迹也周公之無逸伊尹之太甲是皆所謂心也迹者法也心者教也法存乎人教存乎身然後道無不通黃氏曰書五十九篇其要在於風俗之變與夫正君臣之分自堯舜以德相授一變而禹以有功得之有扈氏不服再變而君臣相責矣湯伐桀武王伐紂則變之極者也孔子每與舜而不與武王征伐者一時之極功名分者萬世之大法功不可沒而法不當廢將以通行於萬世則湯武之為罪人宜也雖然湯武救天下而親受其惡是非聖人有所不能蓋湯武為天下重而孔子為萬世重二者並行而不相悖先儒以為武王非聖人吾不知其指髙氏曰學記三王四代惟其師則知虞夏商周之君其人為足師也法言曰適堯舜文王者為正道則知虞夏商周之道其始為適正也書斷自唐虞以下迄於周而已蓋堯舜而前古風朴略不可得而紀也故孟子言必稱堯舜又曰我非堯舜之道不敢陳於王前東周而後霸道縱橫不可得而紀也故荀子謂道不過三代又曰言治者豫三王由此觀之仲尼之定書始於二典而終於二誓信不誣矣又曰書本一也或裂一為三作大禹臯陶謨益稷以其人異而意同也作康誥酒誥梓材以其人同而意異也作盤庚三篇作太甲三篇作說命三篇作泰誓三篇以其事大而體重也謨一也然大禹之功臯陶之嘉益稷之忠豈非人異而意同乎康叔一也然康誥之治頑民酒誥之戒沉湎梓材之為教化豈非人同而意異乎三篇一也然以臣放君以下伐上咈臣民而遷都由帝夢而立相不亦事大而體重乎或一書而三篇或三篇而一事不可不辨也虞書昔在帝堯聰明文思光宅天下將遜於位讓於虞舜作堯典無垢曰識夫子序書之意然後識吾夫子作春秋之心矣其造化之妙爐錘之工蓋與乾坤同用六子同機豈可以凡俗浮淺之慮妄窺之乎其曰昔在帝堯聰明文思光宅天下者此蓋指堯平生用力處為天下後世言也如三畫圖乾六畫圖坤錯綜圖六子使乾坤六子無所逃其妙而聰明文思光宅天下止八字耳其探索鈎致堯之賾隱深逺亦無所逃其妙矣非吾孔子其誰有此見識批判而不疑乎且想濬哲文明溫恭允塞之德則舜已在人耳目中矣想齊聖廣淵之德則湯已在人耳目中矣想徽柔懿恭則可以見文王想聰明齊聖可以見武王想豁達大度可以見髙祖想天日之表可以見太宗想聰明文思光宅天下可以見堯矣聰可想見其疏通明可想見其髙逺文可想見其溫潤思可想見其巧妙其所以斡旋四海運動六合者皆自聰明文思中來也光宅天下可以槩見矣然而堯典所載堯之德堯之用賢堯之同天堯之知人其遜位特所載中一事耳今孔子序書一切略去獨曰將遜於位讓於虞舜作堯典何也曰此與作春秋同幾其豫奪抑揚進退去取乾坤之功六子之妙也夫堯之德堯之用賢堯之同天堯之知人其幾莫敏於遜位也楊氏繪曰或曰皇之三帝之五其書皆存焉仲尼删書獨斷堯典為之始何也曰聖人所以垂世立教杜百代篡爭之亂也若後世羿浞莽卓秦項曹馬或篡焉或爭焉迹其所以然爭焉而已矣仲尼病後世之爭且亂故其删書也斷堯典為始焉美其能以聖讓聖也千古盛德將何以加諸取為百代典誥之首則萬世良者慕之悖者懼之不亦宜乎上官氏公裕曰堯典稱虞書先儒謂虞史所録故總謂之虞書此殆不達聖人制經之㫖矣仲尼所以經其史文其法載道以著萬世何為因虞史所録然也夫堯典稱虞書其見二帝以天下讓之㫖也故仲尼斷自堯典稱為虞書欲見其堯將遜位而天下已授舜也明堯之天下已舜之天下也張氏綱曰皇以道得名帝以德得名王以業得名聖人之於天下或為皇或為帝或為王非其道之不同也所遇之時適然耳雖然此特其塵垢粃糠而已聖人之所以為聖人不在是也聰明文思堯之四德也徐以氣聽而聽不以耳堯德之所以為聰也徐以神視而視不以目堯德之所以為明也惟聰矣故能聽逺其效足以作謀惟明矣故能視逺其效足以作哲聰明君德之大者也經曰亶聰明作元后元后作民父母蓋非聰明不足以作元后而為民之父母也又曰惟天生民有欲無主乃亂惟天生聰明時乂蓋非聰明不足以乂民之亂而為之主也則聰明者君德之所當先也堯有聰明之德其見之貌則恭而肅形之言則從而乂貌恭而言從動則成章是故謂之文由聰明以至於文則其德至矣不可不從之以思思者道之所成終而成始也聖人方其寂然不動則心死形廢而未始有思及其出應帝王之業而有為於人間世是又不可以無思且思於五行為土土之為物水資之以為灌溉之利火資之以為烹飪之功金得之以藏木得之以生是五行不可以無土而五事不可以無思此堯之四德必終之以思也堯有聰明文思之德充實於內及其英華外發則厥光大矣以此而宅天下則天民之阜可垂拱而坐視也堯典曰若稽古帝堯曰放勳欽明文思安安允恭克讓光被四表格于上下伊川曰放勳非堯號蓋史稱堯之道也以謂三皇而上以神道設教不言而化至堯方見事功也後人以放勳為堯號故記孟子者遂以堯為放勳也若以堯為放勳則臯陶當號允迪禹曰文命下言敷於四海有甚義無垢曰自曰若稽古帝堯至允恭克讓皆舜時史官名目堯也若晉人題目謝安為溫雅雄暢樂廣為清夷沖曠山濤為平簡溫敏戴逵為欣和通任之類是也夫堯大聖人豈若謝安輩所可題目哉於是知帝舜時史官非司馬遷班固之流也然其以題目堯者自有意義豈可以輕心淺慮求之哉又曰且日月以明為光而聖人以聲名為光夫堯以欽明文思安安允恭克讓之德端拱於廟堂其發於事業見之號令者皆有欽明文思安安允恭克讓之美布在其中如黃鍾起而萬物潛動淑氣生而天下皆春是以聲名洋溢乎中國施及蠻貊天之所覆地之所載日月所照霜露所墜舟車所至人力所通凡有血氣者莫不尊親此自然之理也此史官親見帝堯其目之曰欽明文思安安允恭克讓可也東萊吕氏曰曰放勳以下是厯說堯事凡天下功績皆曉然著見自有成理堯則依放之而初未嘗加一分人力此孔子述而不作之意克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍無垢曰漢髙祖識韓信於行伍漢武帝識金日磾於降虜開國承家託孤寄死照映於百世之下者則以漢髙漢武能識之也堯能識俊德之士展盡四體以施其學術故以親九族則九族睦平章百姓則百姓昭明協和萬邦則黎民於變時雍又曰嗚呼盛哉夫一親九族九族即時而睦一章百姓百姓即時而昭明一和萬邦萬邦即時而和樂豈特俊德之力哉想其謨謀獻納於堯前時言聽計從無有疑二故使其功效如是之速則堯之俊德亦可見矣夫能識俊德而九族睦百姓昭明黎民和樂其神速如此則欽明文思之用亦可想見矣張氏曰克明俊德所以修之身者也以親九族則修之家者也平章百姓則修之國者也協和萬邦則修之天下者也身修而後家齊家齊而後國治國治而後天下平之序也陳氏鵬飛曰克能也俊者能其至也克之謂能者謂能有所勝也天下之人莫不有能非堯獨能也物之不格知之不至意之不誠心之不正皆不克之謂也今堯之明德無一介之私存乎其中故無不極其至由是而齊家則九族親由是而治國則百姓昭明由是而治天下則黎民雍矣乃命羲和欽若昊天􅍓象日月星辰敬授人時胡氏伸曰􅍓以紀數故以日月之行託之於星辰之度而數不可亂此􅍓之法也象以具體故以光道象日月之行以星辰伏見之度而象不能匿此象之法也傳曰積陽之熱氣生火火氣之精者為日積隂之寒氣生水水氣之精者為月故在易之卦離為日坎為月然離隂卦也其象內隂而外陽坎陽卦也其象內陽而外隂故日體離之隂而用其陽月體坎之陽而用其隂日以昱乎晝其用在陽故也月以昱乎夜其用在隂故也日之行舒者體離之隂也月之行速者體坎之陽也日之循星周嵗而浹者舒故也月之循星既月而浹者速故也日行天度之一月則行十二有竒焉天度者所以為氣數也所謂日月之行皆有常數也星之可名者三百二十然此所謂星者二十有八舍也天極謂之北辰五緯有辰星然所謂辰者十有二次也春秋傳曰天以七紀蓋苐斗至壁是謂星武第奎至參是謂星虎第井至軫是謂星鳥第角至箕是謂星龍星武之星三十有五星虎之星五十有五星鳥之星六十有四星龍之星三十有二以類綜之則四方皆七故星辰之數二十有八也春秋傳日月之會是謂辰星志月辰者日月之㑹而建所指也蓋月行及日㑹而為辰辰本無體兼星而見故天正之辰在星紀自北而西則地正之辰在𤣥枵人正之辰在豕韋而西陸之降婁大梁實沈南陸之鶉首鶉火鶉尾東陸之夀星大火析木其所朔月可知也春秋外傳所謂日月砥於天廟者言建寅之月辰在娵訾也所謂日月㑹於龍尨者言建亥之月辰在天漢也蓋因朔月之所在以知辰因辰之所合以知斗知建焉鄭氏曰日月之行一嵗十二會聖王因其㑹而分之以為大數故辰之數十有二也夫度三百六十五有竒二十八星十有二辰各有分域凡星之度寡莫若觜多莫若井而辰之度皆二十有竒此所謂星辰之度皆有常數也又曰傳日月者天之使也星辰者天之期也蓋一左一右更有經緯而厯之為書紀日月之數者也象之為器著日月星辰之儀也五日謂之候三候謂之氣六氣謂之時四時謂之嵗此厯象日而以嵗時氣候明時者也日舒月速當其所合之謂朔舒速先後近一逺三謂之弦相與為衡分天之中謂之望以速及舒光盡體藏謂之晦此􅍓象月以朔弦望晦明時者也辰角見而雨畢天根見而水涸木見而草木節解駟見而隕霜火見而清風戒寒農祥晨正土乃脉發火中焉寒暑乃退此􅍓象星以伏見之時昏曉之中明時者也以辰辨方則謂之十二次故兼星言之謂之星辰十有二野繫焉所謂星土也以辰紀時則謂之十二子故配日言之謂之日辰十有二嵗十有二月繫焉所謂枝幹也朔月又行為辰而第辰者始於子終於亥者以建序之也蓋自斗柄之所加言之則謂建自日月之所㑹言之謂之辰斗柄左移日月右徙故辰與建常相合焉又曰聖人之興事造業豈任其私智而為之哉仰以觀於天道而已蓋日月之運行星辰之推移時所繫焉生死進退伏見流逆吾則􅍓以步其數而數不至於差象以占其儀而象不至於忒以此而頒正朔以此而授民事則天下之赴工趨務者如規矩設而不可欺以方圓如繩墨陳而不可欺以平直此東作南訛西成朔易其民析因夷隩有序而不可亂也無垢曰人時在昊天則以日月星辰為政昊天在人時則以東作西成南訛朔易為政􅍓象日月星辰蓋所以謹東作南訛西成朔易之事也張氏曰散天地之義氣以為羲羲者陽也斂天地之仁氣以為和和者隂也春夏陽也故羲仲羲叔主之秋冬隂也故和仲和叔主之夫隂陽者王事之本故堯之命官可謂知所本矣爾雅言四時之天於夏則曰昊天蓋言其氣之布散浩浩故也堯之􅍓象授時以氣為主故特曰昊天欽昊天者使之敬而不敢慢也若昊天者使之順而不敢違也日月星辰之運行於天其往來有數其伏見有象為之􅍓者所以稽其數為之象者所以占其象故分至啓閉弦望晦朔得而考以此而敬授人時則析因夷隩不失其候矣是故張昏中而種榖火昏中而種黍虛昏中而種麥昴昏中而收斂至於龍見而雩火流而授衣天根見而成梁水昏正而栽日至而畢則􅍓象以授時者此可見矣分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾無垢曰羲仲所掌者天下春事也春事自東方起故所掌之地所司之星辰日月民時鳥獸皆東方與春事也是其所職雖一方而其所治乃天下之春也又曰其曰寅賔者以言警戒農事迎日之出而赴功也然田有疆界故當平事有後先故當秩秩次序也謂如先耕乃播先播乃萟是也平秩特先為之區處而已又曰孔穎達謂丁壯在田老弱在室其析如此且鳥獸孳尾何與於人時哉曰此言聖人於農事如此其悉也蓋播種一非其時而失天地之性違隂陽之理今驗之日而晝夜等又驗之星而鳥見南方可以就功無疑乎曰未也更宜驗之鳥獸鳥獸孳養匹耦則仲春之氣正而無差矣以治農功萬不失一使時至仲春而日之不中鳥星之不見鳥獸之不孳尾則天時不正􅍓象差矣得無有不正之氣紊亂於其間乎蓋人主在上實為天地隂陽之主使人主心正氣和則四時有序儻或心失其正氣乖其和則形見於星辰鳥獸者必有非常之異矣此又帝堯所命羲和以驗已之得失也東坡曰嵎夷在青州暘谷則其地近日而先明當在東方海上以此推之則昧谷當在西極朔方幽都當在幽州而南交為交趾秋曰宅西徐廣曰西今天水縣蕭氏竑曰宅讀如克宅之宅所以安居其一方之事故謂之宅焉嵎夷東方之地也不曰宅東而曰宅嵎夷者蓋東方之治止於此凡四海之外去中國逺者其天時地氣之功固有殊絶是以先王有所不治焉嵎夷於禹貢在青州之域而未離乎中國也東方止於嵎夷則所謂南交西朔方皆於中國之內可知矣申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革按周禮司徒以土圭之法測土深日至之影尺有五寸鄭司農云土圭之長尺有五寸夏至之日立八尺表於陽城其影與土圭等按臨曜稱日永景尺五寸日短景丈三尺通卦驗曰夏至一尺四寸八分冬至一丈三尺周髀云成周土中夏至一尺六寸冬至一丈三尺五寸劉向洪範傳曰夏至一尺五寸八分冬至一丈三尺一寸四分春秋二分七尺三寸六分隋志云劉向二分之景直以率推非因立表其說非也隋志曰日去極近則景短而日長去極逺則景長而日短日行內道則去極逺無垢曰訛化也萬物化育也且如禾稻之屬春則苗夏則實自無而忽為有自幽而忽為明此訛之義也向非東作以滋其萌則其所謂訛者天亦不能自為之矣天之春夏秋冬即人之作訛成易也天人一致唯深造者於此而得之其曰敬致者一嵗事功莫大於夏夏能結實秋則成熟矣當其實也則防水旱之變謹蟊螣之傷勿使稂莠以敗其力勿使蔓草以害其功是夏時之訛既至吾當謹其至而致其力也此所以獨異於東作西成朔易而以敬致一語綴之歟又曰厥民因者春則老弱在室丁壯在野今農事正興天時既至不可失幾也雖老弱亦因丁壯之前功而在田野助其耘作矣鳥獸希革者驗之鳥獸毛羽希少而改易者此仲夏之正氣也隂陽之氣無物不有日得之而有長短星辰得之而有變動民得之而有作息鳥獸得之而有盛衰適此時也則有此候倘或不然則必有所以矣此聖人修省時也裁成天地之道輔相天地之宜其感見於此歟以此知天人相資其理一也劉氏敞曰申命義叔宅南交說者曰春與夏交非也冬與秋交秋與夏交春與冬交亦何不曰西交北交東交乎且春曰宅嵎夷曰暘谷秋曰宅西曰昧谷冬曰宅朔方曰幽都此皆指地而言不當於夏獨以氣言也本蓋言宅南曰交趾後人傳寫脫兩字故爾春云宅嵎夷秋云宅西推秋之西而知嵎夷為東也夏云宅南交冬云宅朔方推夏之南而知朔方為北也此蓋堯舜時四境四嶽所統故舉以言之爾

body:
  text: 尚書精義卷二十六宋黃倫撰古人有言曰撫我則后虐我則讐獨夫受洪惟作威乃汝世讐樹德務滋除惡務本無垢曰夫行德則天下歸之天下歸之者天子也暴虐則天下叛之天下叛之㷀㷀然擁虛器以在人上豈非獨夫乎天下叛之矣不知畏懼乃大惟作威以殺戮賢人君子不修郊社宗祀則天下視之又甚世之仇敵矣又曰德欲廣及惡欲知幾故立德者務滋欲其延蔓不已也除惡者務本欲其萌芽絶去也然則天下之惡皆萌芽於紂欲除天下之惡當除紂一人而已紂既滅絶則天下之惡脉理皆斷矣脉理皆斷善端自然發見焉張氏曰詩云惠而好我擕手同歸此撫我則后之謂也湯誓曰夏王率遏衆力率割夏邑有衆率怠弗協曰豫及汝皆亡此虐我則讐之謂也獨夫受洪惟作威乃汝世讐者謂之獨夫受以其孤危寡獨喪其君人之道也吕氏曰君臣之間如天尊地卑自有定分其所以相與固結者皆天理自然如此若其撫則后虐則讐如是容易是君不君乃反掌之間耳此蓋未知君臣之禮須當看古人有為而言亦當知武王有為而舉武王說天之所以設君者本不是居九重之尊這便是后蓋受天之寄為天子以撫養百姓這始是后若是縱暴肆虐失其君道這是民之讐蓋天之立君本是撫育百姓今失天之職肆虐於民便是讐又曰大抵廣德滋長則天下之人皆到可封之地位若除惡當就本根上除何故大抵惡豈人之所願為若不幸而為汙俗所染人君安可舉世除之除一人則天下之惡自除矣肆豫小子誕以爾衆士殄殲乃讐爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮無垢曰紂為天下冦讐乃天下所同疾特無有倡之者耳武王一倡則天下皆應之然則武王之倡非私怒也孟子識此意曰武王一怒而安天下之民夫天下皆視紂如冦讐而欲殄殲之則紂之為人主可謂失其所操持矣又曰迪進也登成也夫未舉事之前以謀為主既舉事之後以决為主故曰老者之智壯者之决武王之謀已無遺策矣今既渡河有進無退正用决之時也故其告如此以為爾衆士庶幾進於果决必取商紂以成我為辟之道又曰賞以進之則人皆知進戮以懲之則人不敢退戰功曰多以多為勝也功多則賞厚士卒其有自足之心乎不進則有顯戮士卒其有反顧之心乎嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良無垢曰紂所以暴虐者以昏文王所以光于四方顯于西土者以明其明如何若日月之照臨明豈有既乎日煜乎晝月煜乎夜晝夜常明想見文王心地無一毫之滓矣晝而思想皆無失念夜而夢寐皆無失路況事至乎前物形於眹其有不灼知其所從來而鑒觀其所往乎又曰昏為暴虐故有臣億萬惟億萬心明為仁聖故以西土之地而誕受多方也三分天下有其二其是之謂歟以此知明德之尊雖無意於天下而天下當自歸昏德之賤雖貴為天子富有天下不免為一獨夫而已又曰文王仁聖誕受多方則克紂者乃文王積德深仁感動天下之力豈獨武王今日之武哉夫以臣伐君雖以武王伐紂不免於有罪使武王勝紂僅能免文王之罪而已文王三分天下有其二以服事殷有何罪哉詩序以謂武王能廣文王之聲卒其伐功則伐紂者乃文王之心乎使武王不克紂文王能免罪乎又曰夫克紂則以文王為無罪不勝紂則以小子為無良以善歸親引惡歸已武王用心忠厚如此其肯貪位苟得為伐紂之舉哉舉天命人心所迫不得不然也張氏曰易曰垂象著明莫大乎日月又曰日月相推而明生焉則明之至者莫明乎日月文王有明德而詩人謂之明明在上故於此喻之若日月之照臨也宜矣照以言其明臨以言其髙惟其如日月之照臨故逺足以光于四方近足以顯于西土四方外也故言光西土內也故言顯吕氏曰文王盛德光華如此武王以眇然一身繼其後為甚難故武王常有不足之心使我克受非我之能乃文王之德無愆文王仰不愧俯不怍故武王得承藉餘休所以能克受若受勝我非文王盛德之不至乃是我無良不能繼文王耳這一段最見武王之心武王奉行天罰以紂為獨夫自然戰必勝攻必取不知武王才說了必之一字便不是天心便不是天討武王言自㑹伐紂便是有我便非無心非無心便非天討武王到此尚把紂來計較勝負見得武王無必豫克受非豫武見得武王無我此見得武王與天同心益見得武王無必武王戎車三百兩虎賁三百人與受戰于牧野作牧誓無垢曰合天下蠻夷之師豈止戎車三百兩虎賁三百人哉此止謂武王西土之衆腹心之師也武王為倡以率西土西土為倡以率天下故與武王同心死生者止在西土爾其餘輔贊之師雖盡力於武王武王不盡責以必死也此躬自厚而不責人之意至于總誓諸侯與蠻夷曰爾所不勖其于爾躬有戮此亦為之大門耳胡氏曰乘車既是虎賁左右必須勇士豈但有虎賁而無左右哉百夫長既乘戎車千夫長必非徒步何從有車而乘哉兵車甲士步卒共七十五人孔氏惟言步卒而不數甲士豈虎賁人猶御一車而不戰鬭邪以七十二人步卒計三百兩之戎車總二萬一千六百人不言六百人而言舉全數舉全數者乃自解注文非釋經也以舉全數三字易六百人之三字於文不暢豈如言二萬一千六百人哉張氏曰必記戎車虎賁之數者蓋言明殷商之衆其㑹如林而武王所以勝之在德不在衆也易野則以車為主險野則以人為主戎車即兵車是也虎賁即武勇之士也詩曰有力如虎謂之虎賁者取其有力而已吕氏曰大抵誓師有誓於軍門之外者有交刃而誓者故司馬法曰三王誓于軍中欲民先成其慮也或誓于軍門之外欲民先意以待事也或將交刃而誓致民志也武王此誓乃是交刃而誓也牧誓時甲子昧爽王朝至于商郊牧野乃誓王左杖黃鉞右秉白旄以麾曰逖矣西土之人無垢曰逖逺也以溫言勞之曰逺矣西土之人以言其跋涉之勞征行之苦使其心悅於上之見知也胡氏曰禮稱人道尚右戎事尚左記曰進退有度左右有局各司其局然而男子尚左女子尚右隂陽之義也偏將軍處左上將軍處右生殺之義也是則小戴之文未有定據老聃之說獨立𤣥言豈以一經一句以為凖哉白旄者取其易見也夫以色之易見者莫鮮於赤故朱干朱户以章其禮赤紱赤舄以異其數旄不以赤而以白者周之車服旌旗器械皆尚赤則所麾之旄必以白白者金之正色甲兵之事故異於赤而易見者謂以此也張氏曰鉞所以誅黃中也所以為信旄所以教白西也所以為義鉞用黃誅之必以信故也旄用白教之必以義故也武王杖信秉義足以致其來曰逖矣西土之人者叙其情憫其勞而勞其來之逺也吕氏曰武王自臨戰與士卒同其勞苦以鉞與旄任地指麾說道是逖矣西土之人觀此氣象至誠惻怛恁不敢不勉士卒見此自然不顧其矢石之勞亡其霜露之苦亦皆領武王之和王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛豫其誓無垢曰前言逖矣西土之人此誓武王之師也今曰嗟我友邦冢君此誓諸侯之衆也今誓至于旅則諸侯之官盡在於此矣師氏謂軍中以兵守門者千夫長謂一師之帥也百夫長謂一卒之長也戈㦸也㦸柄既長可以言稱矣想武王之時指㦸為戈耳方言干又云楯自關而東或謂之楯或謂之干關西謂楯是干楯為一也此特辨戈㦸干楯之名耳至於曰稱曰比曰立此又見行陳之法而威儀之壯也想像稱戈比干立矛之時森嚴縝密其何可犯乎又曰八國皆蠻夷也文王為西伯故西南夷來助文王美化行乎江漢之域故江漢之夷來助紂為無道非特諸侯欲伐之雖西南夷江漢夷亦欲伐之矣失人心如此尚欲君天下乎張氏曰武王之伐紂六卿莫不具在而特舉司徒司馬司空者蓋徒衆之令則聽之司徒軍旅之令則聽之司馬營壘之令則聽之司空此其誓所以特先於三卿也又曰庸蜀羌髳微盧彭濮人此皆西南之酋長也當是之時皆㑹於牧野之地故舉而誓之此所謂華夏蠻貊罔不率俾者也君子臨事而懼故雖將戰而猶誓之也吕氏曰武王到臨陳之時不止誓西土之人至于小大逺近諸國皆誓之武王嘗言來歸者八百國諸侯之衆何獨止言庸蜀羌髳微盧彭濮人此亦是史官序事之法舉逺而知近舉小而知大舉微而知著此言軍威須當辦備各各恁地整頓精神聽我一人誓命王曰古人有言曰牝雞無晨牝雞之晨惟家之索無垢曰蓋雞之為物雄鳴雌哺此常理也使䳄代雄鳴乃惡氣所感其家必有不祥事又曰家以牝雞司晨卜不祥國以婦人專政卜不祥將言紂用妲己之言故引古占卜為訓張氏曰男正位乎外女正位乎內內外異位則婦人故無預於外事矣婦人預於外事鮮不敗亂是猶牝雞之晨其懲遂至惟家之索也吕氏曰大抵天地中各自有定位如君唱而臣和男外而女內夫行而婦隨此皆不可易者至如牝雞司晨隂陽繆盩則一家索矣言天本不曽與紂易位以紂先自易位故天亦從而易之今商王受惟婦言是用昏棄厥肆祀弗答昏棄厥遺王父母弟不迪無垢曰放出師保囚奴正士焚炙忠良而惟婦人言是用此逆天理者也以牝雞之說卜之國之將亡也必矣家生敗子則有牝雞之晨國出亂君則惟婦言是用此皆不祥之兆矣又曰肆陳也答報也祭有祈焉有報焉載芟春祈社稷之詩良耜秋報社稷之詩以至蠟之祭迎猫為其食田鼠迎虎為其食田豕此皆報之之謂也紂惟婦言是用無往不昏使人神皆不得其所郊天祭地四時享廟皆人道之常也紂以昏故棄其陳祀不敬天地鬼神非特不敬而已凡當報答之祭亦皆棄之又曰紂惟婦言是用無往不昏同王父同母昆弟人之所愛敬也今皆棄而遺之不知待以昆弟之道是不復知有骨肉矣此豈人理也哉夫不敬天地鬼神不知有王父母弟安得有吉祥事乎吕氏曰所謂尊有常尊紂昏棄肆祀弗答是不能尊其常尊所謂親有常親紂昏棄王父母弟不迪是不能親其常親乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今豫發惟恭行天之罰無垢曰暴虐百姓姦宄商邑正紂之心亦四方多罪逋逃之心有此心而又有此才此紂所以是崇是長是信是使是以為大夫卿士也言暴虐則有殘民害物之事言姦宄則有蹤跡詭祕之事多罪逋逃有此才而紂能使之可謂同惡相濟矣天將亡商故生紂又生多罪逋逃以破壞殘滅之傷哉張氏曰夫惟幽不能欽神明不能愛親乃惟四方之多罪逋逃者是崇是長是信是使是以為大夫卿士則所與同于厥邦者皆羞刑暴德之人所與同于厥政者皆庶習逸德之人如是則紂孰與為善哉是崇者尊其道也是長者長其惡也是信者信其言也是使者用其力也是崇是長則以為之卿士而承之者也是信是使則以為大夫庸之者也今日之事不愆于六步七步乃止齊焉夫子勖哉不愆于四伐五伐六伐七伐乃止齊焉勖哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土勖哉夫子爾所弗勖其于爾躬有戮無垢曰夫不過六步七步乃一休止而整齊焉亦可謂深密矣休止以養其力整齊以警其慢稱夫子以壯其志稱勖哉以警其慢擊刺之法小進則四五大進則六七又休止而整齊之夫當其交戰之時而其法乃森密如此況其平居乎行陳之內其法乃森密如此況其大禮乎誰得而乘其便而伺其怠耶又曰上先稱夫子後言勖哉自此以後皆先稱勖哉後夫子大抵兵事以警備為體也桓桓武貌也如虎如貔如熊如羆此桓桓貌也夫此四獸搏物也其作威其猛厲為如何哉使將士之武如此四獸亦何可當也又曰克奔歸我者弗迓擊之第使之聽役于西土之衆而已夫西土之衆腹心之衆也彼奔歸我者安知非姦人刺客乃遽處之腹心之內兵事貴嚴如此何也此武王太公所以處商人也昔銅馬降光武光武遽入其營銅馬之衆曰蕭王以赤心置人腹中安得不投死乎使紂之人為腹心之衆其安反側也可知矣武王之舉誅其君而弔其民民之望武王如大旱之望雲霓也上下之心如此復何疑之有哉東坡曰孫武言用兵其勢險其節短故不過六步七步四伐五伐六伐七伐必少休而整齊之張氏曰用兵行師之道其坐作進退莫不有法其攻殺擊刺莫不有制不愆于六步七步乃止齊焉者告之以坐作進退之法使之不敢過也不愆于四伐五伐六伐七伐乃止齊焉者告之以攻殺擊刺之制使不敢踰也蕭氏曰先王之使人也始勉之以所慕終肅之以所畏然後人有所勸懲而功成焉泰誓曰立定厥功惟克永世始勉之者也下篇曰功多有厚賞不迪有顯戮自所勉而肅之也至此惟曰弗勖有戮者終于肅之而已吕氏曰當舜之時但只言罰弗及嗣賞延于世至啓有扈啓自度不如禹於法之外又添豫則孥戮汝孥戮却不是盡殺其妻孥但言纍及妻孥至湯伐桀與啓未逺亦未能便變得此法亦說豫則孥戮汝至武王伐紂却說其于爾躬有戮到此又看得聖人雖到世變風移又自能厚其已薄之俗于數千百年之下又不是湯不如武王到武王之時上承太王王季文王許多人積纍之德民心薰蒸之久啓既開此門武王到此因而又與閉了此門

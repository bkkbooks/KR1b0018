body:
  text: 尚書精義卷十五宋黄倫撰商書伊尹相湯伐桀升自陑遂與桀戰於鳴條之野作湯誓無垢曰伐桀之謀主於伊尹而非湯之心也自五進伊尹於桀之後想伊尹之心以謂吾所以委蛇為桀而納之於當道者其無所不至矣而桀於亡國敗家之舉無不争先至於道徳仁義日用所當行者一切視如讎冦決非君四海之資也至民有時日曷䘮予及汝偕亡之言是天棄夏而將改命於湯使桀為此而不知改也觀夫湯一征自葛始天下信之東面而征西夷怨南面而征北敵怨曰奚為後我則天之所以相湯而棄桀者可見矣此所以決然以伐桀自任而不疑若湯之心則猶欲進伊尹庶幾桀之開寤至於鳴條之事誠非其本心故曰予有慚徳聖人微見其端故序伊尹於湯之上湯在亳西當従東而往今乃升取道従陑者從下向上之名厯險迂路為出其不意故也又曰桀有一伊尹而不能用致欲一舉而取之出其不意而聲罪以伐之當如文王之付武王湯未可也葢此時之民如在湯火中如率遏衆力率割夏邑之言此豈可一日待耶伊尹之心以謂急欲救斯民不可使為之備以重困天下也不若出其不意一舉而取之豈得以武王之事律此哉張氏曰夫自上而下者其勢順自下而上者其勢難湯之伐桀自陑而升則非地勢之順所以見其勝夏在於人和而不在於地利也東萊曰叙書先伊尹而後湯者非有他意文勢順耳升自陑或以為出其不意或以為湯得人和不必地利升陑而戰皆不可用謂之出其不意固非謂之得人和亦非王者固仁義之兵然利害向背亦須決擇必是師當行之道夏之可攻處也楊氏曰商書之首曰伊尹相湯伐桀成湯君也伊尹臣也君而先乎臣必然之道也臣而先乎君必不然之道也仲尼敘湯放桀也又何先以伊尹而言乎曰兹所以見大聖人立教之深者也仲尼刪書斷唐虞以下堯之禪遜舜之大孝大禹之功臯陶之謨益稷之事四岳之職備矣及其敘湯放桀也雖曰義曰權曰救民于塗炭其如桀君也湯臣也曰堯曰舜曰禹皆以揖遜相代而湯始用征伐取天下聖人大懼後世暴未如桀仁未如湯將有假湯放桀為名而利於已者則以臣伐君自此始矣於是求其所以立教之㫖以湯聖人也固不可首其惡也已矣伊尹賢也可屈之以伸教焉故書曰伊尹相湯伐桀是移伐君之誚於伊尹也湯誓王曰格爾衆庶悉聽朕言非台小子敢行稱亂有夏多罪天命殛之今爾有衆汝曰我后不恤我衆舍我穡事而割正夏予惟聞汝衆言夏氏有罪予畏上帝不敢不正今汝其曰夏罪其如台無垢曰湯所有之衆即桀所有之衆也桀所有之衆平時怨嗟之言曰我后夏桀不憂念我衆民舍我稼穡之事而興臺榭池沼之役既使民失衣食之路矣又苛歛横賦而割剥我夏邑之民夫既用民力於無用之地使之失衣食之路矣又復苛歛横賦以割剥之使民憔悴困廹窮不聊生為民父母當如是乎天生民而立之君以司牧之是君者神之主也民之望也天之愛民甚矣豈使一人肆於民上以縱其欲而棄天地之性乎此湯所以畏上帝不敢不正夏之罪也張氏曰夏氏之罪聞於上帝上帝命我以征釋而不征是逆天者也逆天者亡故曰予畏上帝不敢不正武王之伐紂曰商罪貫盈天命誅之予弗順天厥罪惟鈞亦此意也今汝其曰夏罪其如台者言商民保湯以自安而夏罪所以不能加故其自言曰夏罪其如我何固無伐桀之志也然而至公以天下為心故不以私害公不以寡妨衆其肯恤一國之民而坐視天下之罹於㓙害者哉此所以厯陳夏桀之惡而告之以必往也蕭氏曰湯之伐桀也必不廢商民之農時然而民未知役止之期故曰舍我穡事也割正割斷而正其罪也然而湯之伐桀也不因民願乎曰夏民之願而商民未之願也以桀之禍不能及於商民故也東萊曰天人相去甚逺何以知天命在湯葢自民心而知之民之心即天心也聖人察民之心歸於我而不可舍故稱王以告衆故知天命之切者莫如民心知民心之切者莫如聖人又曰湯之德澤及於民者深教化及於民者明桀之民雖不聊生然商之民陶陶於農畝而不知非化之深者能如此乎桀為無道而且以為正夏非教之明而尊卑上下之分猶不忘乎至夏罪其如台尤足以見湯之化也葢夏之民在塗炭之内而商之民長在於春風和氣中夏王率遏衆力率割夏邑有衆率怠弗協曰時日曷喪予及汝皆亡夏徳若兹今朕必往無垢曰衆人受其困苦率皆怠惰疾視其上而不和協至為忿疾之言曰是日曷喪日指桀也謂是桀何時死乎受此困苦皆不欲生予及汝俱并力而死不復以生為樂矣為君而使民如此天下之心皆可知矣疑湯所聞皆伊尹醜有夏之言以其所親見親聞者告之於湯也桀之凶徳如此舉兵其可已乎故曰今朕必往也張氏曰率遏衆力者奪民之力也率割夏邑者害民之財也奪民之力則政繁害民之財則賦重政繁賦重則民不聊生此其所以率怠弗協也東萊曰天下之力當作衆人之事夏王乃聚衆人之力而為一人之事故曰率遏衆力想其多為宫室臺榭男不得耕女不得織皆罹凍餓之患爾尚輔予一人致天之罰予其大賚汝爾無不信朕不食言爾不従誓言予則孥戮汝罔有攸赦無垢曰夫民既有予及汝皆亡之言是伐桀者民之心也而湯猶以大賚誘之孥戮恐之使之有所畏慕何也豈此行非民之本心乎曰軍事尚嚴雖此舉因民心行之然而不有賞罸以聳動焉恐於號令之間有所乖違以至敗事不得不為之豫偹也張氏曰湯之伐桀其誓衆士賚必曰大戮必及孥者蓋賚之大則人情之所甚欲戮及孥則人情之所甚惡也以其所甚欲者誘之於前而使知所慕以其所甚惡者恐之於後而使知所畏夫然後人人各迪其功而罔不用命矣徐氏曰湯之承夏始變乎常道道序乎變則不能以直行是故協戴商徯后之衆而切切於大賚孥戮之間拯人塗炭而有口實慙德之誥特以為上誠之不諭者不足以定其業下情之不盡者不足以赴其功是以質之以天時示之以卜筮動之以禍福而期乎終行其志也東萊曰禹伐苗止曰爾尚一乃心力其克有勲至啟乃曰用命賞於祖不用命戮於社予則孥戮汝已與禹不同今湯誓師之辭雖與啟相似而又曰朕不食言罔有攸赦此世變風移聖人不得不然亦是敬心愈加之意湯既勝夏欲遷其社不可作夏社疑至臣扈無垢曰夫湯伐桀豈本心哉天下之心耳天下之心伊尹之心耳桀既亡矣湯心自有慙徳以十七代天子一旦而為旅人湯嘗北面事之今使之至此其心當如之何更欲廢其先王所立之社此忍人所為也不知其先王何罪焉姑存之以見湯忠厚之心不得已之意爾夏師敗績湯遂従之遂伐三朡俘厥寳玉誼伯仲伯作典寳無垢曰嗚呼桀之不可救也如此夫其師大敗湯不敢廹逐也従之者謂任其所之也此湯忠厚之心也桀都安邑在洛陽西北三朡定陶也在洛陽東南是桀自安邑東入山出太行乃東南涉河知三朡有寳玉遂伐三朡而取之夫天下大寳也桀既失之矣後有大兵猶不知悔乃區區貪三朡之寳玉而取之以行其下愚不移者歟誼伯仲伯傷桀之不知輕重如此乃作典寳之篇其書不可得而見也湯歸自夏至於大坰仲虺作誥無垢曰桀既奔亡湯心歉然方有慙德顧此情意何暇更伐人之國利其寳玉乎仲虺以湯之慙徳見於容止言語之間其心有不釋然者故至大坰作誥以安慰之仲虺乃湯之宰相觀其所誥忠厚廣大亦豈尋常之流哉又曰古之作誥不分君臣第於㑹同有說者皆謂之誥也東萊曰湯伐桀而歸至於大坰未至於亳方在中路間仲虺欲作誥不待至亳而中路便作者湯既伐夏其愧忸之心赧然發於胸中若不便作誥以消散之則是過而不化必有害於初政仲虺之誥成湯放桀於南巢惟有慙徳曰予恐來世以台為口實無垢曰方未伐桀也天下之心第是率遏衆力率割夏邑如行湯火中惟恐桀之不早逝也及桀既奔亡湯既為主天下之心則又焦然不寧曰吾有夏之民也今主天下者誰乎吾臣子也今君父奔亡不知何所往乎越在草莽得毋有暴露憔悴之苦乎所以至此極者其誰之咎歟此天下皆有慙德也湯心尤甚焉者湯為之主也堯舜以來以揖遜相傳至后羿以篡弑壊之今湯又以戰争壊之以戰争壊之可也為臣子逐其君父偃然奄而有之不知尊臨百官號令天下其心得無慙乎張氏曰湯之伐桀上應乎天則仰不愧於天下順乎人則俯不怍於人矣俯仰無愧怍而曰惟有慙德者蓋承堯舜禹揖遜之後始以征誅而有天下恐天下後世以已藉口而稱亂此所以不能無慙也非可慙而慙之豈非躬自厚之道哉王氏曰湯未伐桀之時勇以伐之既伐之後乃有慙徳此其本心寛厚不得已而伐惡以救民故伐畢乃慙亦如人之可罪而撻之及其撻之則又悔之皆寛厚之意也孔文仲曰無過者湯之事也慙徳者湯之心也四海之内家怨人怒願與其君偕亡則民之疾苦已甚而天下之勢危弱極矣以湯之聖其視天下之民如慈母之於乳子葛伯殺一饋餉之童湯猶且慨然徂征況桀之甚惡而民之無告其忍坐視天下入於陷穽鼎鑊而不救哉此其必至於伐桀者湯之事也雖然上下之分人之所甚嚴君臣之恩古之所尤惜湯雖勇於為天下驅殘除害至於放逐豈誠心之所樂哉此其所以慙者湯之心也東萊曰湯非是畏後世議論正恐後世以湯藉口而為亂然古君臣變易者近如有窮后羿亦弑君篡位此事非是湯作始湯何故獨恐後世以湯為口實葢后羿之徒天下皆曉然知其為小人之惡誰肯信之若湯為一代之聖人天下以為聖人既為之則凡欲此者夫何不為此湯之所以恐也林氏曰南巢地名薛氏曰廬江六縣東有居巢城書有巢伯來朝春秋楚人圍巢葢桀奔於此湯不殺也湯武之事皆是為天下之民除殘去虐不得已而以臣伐君然湯之於桀也惟放南巢而已至武王則殺受者葢湯之伐桀而桀避位出奔既已竄於南巢矣於是湯縱而不誅以見其順天應人有黽勉不得已之意也至紂之事則異乎此荀子曰武王選馬而進厭旦於牧之野鼓之而紂卒易鄉遂棄殷人而進誅紂葢殺之者非周人殷人也以是觀之則是武王本無誅紂之意而牧野之戰前徒倒戈攻於後以北是紂率如林之衆以逆戰葢自在行陣之間故殷人殺之耳紂既見殺武王無可柰何矣於是立其子武庚代殷後葢所以致其惻怛不忍之意是亦湯伐桀之意也邵康節曰下放一等則至於殺矣其意以湯能容桀而放之武王則不能放紂而殺之則降於湯一等失其㫖矣王氏曰桀之罪不若紂之甚故湯放之而已是亦鑿說宜以荀子之言為正記曰觴酒豆肉讓而受惡民猶犯齒袵席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君古先聖王聲為律身為度以為法於天下可傳於後世以此救民民猶有流為不善者湯之伐夏救民雖曰應天順人出於不得已而然然以分言之則是以臣伐君以諸侯奪天子之位湯之心雖無所利於其間而其迹則近於利之者故克夏而勝之則甈而不自安誠以為慮其所終而稽其所敝知後世亂世賊子必有以我藉口而行其篡奪之謀以利之者故忸怩然慙其德之不及古而慨歎曰予恐來世以台為口實彼其意誠以謂以臣伐君真吾之罪不以順天應人之舉為是固當然者其始終之際一出於誠實内不以自欺外不以欺人未嘗巧為文飾以為解免此所以不失為聖也湯既負其慙徳有不安之心矣仲虺於是推明湯之本意以為迫天人之望誠有不得己而不可以己者既以釋成湯之疑於是解天下後世之惑也且如魏文帝既逼漢獻帝而奪之位乃以受禪為名顧左右曰舜授禹之事吾知之矣其實篡奪而以舜禹之事欺其羣臣人其可欺乎自古亂臣賊子多矣未有如曹丕之無忌憚也湯自以為稱亂而天下後世不以為稱亂曹丕自以為舜禹而天下後世不以為舜禹此君子所以為時中而小人所以無忌憚者也仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂無垢曰仲虺可謂有髙天下之見矣其論民與人主何警絶也非其見在天下之上其能判别如此哉想見其人沉静閱世知治亂之本原置之人主左右必能防微杜漸陳善閉邪真宰相之識也何以言之其論民曰惟天生民有欲其論人主曰惟天生聰明時乂夫民與人主所禀不同豈偶然也皆天賦也天賦多欲乃下民之資天賦聰明乃人主之資不可强也多欲者治於人無人為之防閑則放僻邪侈無不為己此所以賴於人主也聰明者治人非人之所治也葢多欲則昏塞無欲則聰明惟天予之聰明非人為之聰明也其所聽皆知其心之所存其所見皆知其兆之所起葢彼自多欲中来吾自無欲中優游以閱之則夫清濁邪正君子小人之情狀其何所逃哉謹於未萌防於未兆進君子而退小人天下自然定矣葢天既生有欲之民亦必生聰明之主此理之自然也桀多欲如此乃下民之資也而置之民上不亡何待乎陳氏曰聰明本於性之自然不假於人力勇智發於機之自然自然者定之則清養之則明乃假於人力然不若天生之為絶人甚逺也卒然非人力所能致雖勉强為之則其中餒然而方寸亂矣張氏曰人生不能無欲欲而無度量分界則争争則亂亂而無主以治則攘奪簒弑無所不至又曰聽之所聞者不過邇言視之所見者不過近事如此則為人所乂者也烏能乂人哉然則乂民之亂非聰明之主其可乎有夏昏徳民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命無垢曰多欲則昏桀多欲而昏舉一世之民盡入昏徳之中如䧟泥塗無能自振如陷烈火無所求生然天下豈有此理哉其亂如此必有治之者矣當其亂時天已生一湯於衆亂之中勇以行善知以明善巍然為萬邦之表以正天下之羣邪猶衆星之北斗而羣山之泰華也桀其得存乎湯其可已乎如此則湯乃天生為人主而桀乃天生為下民也有一桀必有一湯此理之自然也所以禹之天下桀不能纘紹而得湯以紹之也張氏曰桀以不明於徳是以敷虐百姓百姓莫不罹其凶害而墜於塗炭之中天乃錫王勇智者啟佑成湯使之代夏救民於水火之中而已夫興大功立大業非勇有以斷則不能不懼非智有以決則不能不惑此天之所以錫湯必以勇智也史楠曰天生聖人莫急於靖亂聖人奉天莫大於反正甚矣有夏昏徳民墜塗炭上天擇其主而託之也錫之大勇俾所向無堅敵錫之真智俾所過無難事表正萬邦之民使之有所宗纘承五服之舊使之有所統故區區以靖亂之事而托之於湯者天意也湯不過率循大禹常行之典奉承上天不言之命反諸正而已矣天定而天下定湯可得而辭也哉劉敞曰凡聖王之後而至於衰者非其道衰也物使之衰也其至於亂者非其徳亂也俗使之亂也繼而起者明道以待物則衰逺矣正徳以訓俗則亂逺矣故可以中物者道也而道未嘗變可以革俗者徳也而徳未嘗變夏后氏有天下四百餘嵗桀為不道顛覆禹之典刑夏人不忍成湯伐而放之四海之内歸之如一非畔夏也以成湯為能復禹之績也東萊曰有夏昏徳正與聰明相背其源既已昏濁其流豈能徹清自然天下之民皆在泥塗火炭之中天乃錫王勇智此勇智非外於聰明聰明自其中出者也聰明體也勇智用也自古只有兩件曰智曰勇勇則能行智則能知如此則能表正萬邦使四方視為儀表而皆得其正纘禹舊服禹之服湯乃能繼其緒以此見得皇天無親惟徳是輔林氏曰嗚呼歎亂也言民之生有喜怒哀樂愛惡之欲失性命之情以争其所欲則侵盗攘奪無所不為矣不為之主以治之則欲者必争争而不已則亂也此篇論厥初生民所謂立君以治之之意也栁子厚曰生人之初萬物皆生草木榛榛牧豕狉狉人不能搏噬而且無羽毛莫克自衛必將假物以為用夫假物者必争争而不已必就其能斷曲直者而聴命焉其聰明所服必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣而無分其争必大徳又有大者衆羣之長又就而聴命焉以安其屬於是有諸侯之列則其争又有大者焉其徳又大者諸侯之列又就而聼命焉以安其封於是有方伯連帥之類則其争又有大者徳又有大者焉方伯連帥之類又就以聽命焉以安其人然後天下㑹於一是故有里胥而後有諸侯有諸侯而後有方伯連帥有方伯連帥而後有天子此說為盡葢所以為之君者惟主民之争而無以主之則亂故也夫惟立君以主民之欲而民不至於亂故非天生聰明之主其耳目之聞見足以周知四方之情偽則不足以乂其亂也苟非其聰明足以聞其所不聞見其所不見則民之好惡哀樂之情抑欝於下而無所上達亦終於亂而已故必天生聰明然後可以乂斯民也天生聰明其聰明出於天命之自然非人為之偽也如秦始皇魏武帝之徒豈謂其非聰明哉然其聰明出於天性而挾之以詐故以巧偽刼天下而服之雖能服之終亦叛而去者以其非天之生聰明故也王氏云民之所欲至於失性命之情以争之故攘奪誕謾無所不至為之主者非聰明足以勝之則亂而已此說大害義理夫所貴乎聖人者惟欲知天下好惡之情而已苟欲勝之則秦始皇魏武帝之聰明而已豈足以已其亂耶仲虺言此者葢謂天生民而立之君凡欲其聰明足以止亂而已今桀之虐斯民也如此已失夫所以立君乂民之意矣又所謂當誅而不得誅也武王誓師曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母亦此意也夏有昏徳則非聰明矣非聰明之徳則虐用其民矣故民之危險若陷泥墜火而無有救之者桀之暴虐如此則失其所以為君之道矣桀失為君之道而生民之亂不可以無主也故天乃錫湯勇智智足以有謀勇足以有斷即上所謂天生聰明時乂也葢惟智足以察斯民之情勇足以拯斯民之命是其聰明足以乂斯民也惟天以勇智錫湯是其意葢將使湯表儀天下以正萬國此葢發上文惟天生民有欲無主乃亂之義也纉禹舊服兹率厥典言禹以聰明之德為天所命以治斯民而其子孫弗率以至於民墜塗炭故天錫湯以勇智表正萬邦者凡欲使湯繼禹之功従其舊服以率其典常也天命既如此湯其可不奉若之哉原仲虺之意葢以謂昏徳如桀天既棄之不得而不伐勇智如湯天既順之不得而不順夫有桀之昏徳非湯之勇智則不得為天吏有湯之智勇而桀無昏徳則事之而已尚何伐之有哉以如是之勇智又適遭如是之昏徳故以臣伐君而不為逆苟為君之昏不如桀臣之勇智不如湯則固不可以為湯之所為矣又何患其以是為口實哉夏王有罪矯誣上天以布命於下帝用不臧式商受命用爽厥師無垢曰夫人不可無所畏庶民畏父母家相畏大夫三卿畏諸侯百官六卿宰相畏天子惟有所畏則有所不敢而義理明矣若夫天子何所畏哉所畏者上天而已使人主不畏天則亦何所不敢哉桀謂伊尹曰吾之有天下如天之有日也日有亡乎日亡吾亦亡矣觀桀此言則亦何所畏哉惟無所畏故無所不敢玩弄上天借以為從欲之舉晏然以謂豈我之外别有天乎又曰天無心也以民為心民心煩寃至有時日遏䘮予及汝皆亡之言則帝用不臧之實可以民心卜之矣東征西怨南征北怨此天式商受命之實也蓋民徯望如此而諸侯又皆歸湯乃天命湯以有天下東萊曰夏桀昏徳不知天之理凡事皆假託天之辭以布命令於下帝用不臧以覆物言之則為天以主宰言之則為帝天以桀為不善而用湯以受命用爽厥師者有夏之民以桀昏迷亦懵然不知道理所在故用湯以開明其衆凡此皆仲虺解湯之慙徳先言天之立君自然道理有夏失徳所以亡湯有徳如此所以王何慙之有簡賢附勢寔繁有徒肇我邦於有夏若苗之有莠若粟之有秕小大戰戰罔不懼於非辜矧予之徳言足聽聞無垢曰簡忽賢者趨附權勢觀望權勢之心如鷹如犬以陷害君子使桀召湯而囚之夏臺幾不免葢湯在衆亂之中翹然獨秀夐然獨異若苗之有莠也粟之有秕也羣小疾視誰不欲芟除播蕩之以快其不肖之心凡従湯之號令以為君子者小大戰戰無不懼乎非辜矧我湯之徳日新湯之言日著言行如此四方聽之者聞之者無不稱頌而歸向則湯之迹愈危矣東萊曰桀之時天下小人成羣見湯之賢則簡忽之見桀在天子之位則附親之此小人之常態當此時肇造我邦於有夏若苗之有莠若粟之有秕自常理論之則湯邦之人當為苗為粟桀衆當為莠為秕今小人却㸔湯人為莠為秕而桀人為苗為粟蓋主人不憎盗而盗憎主人其勢未有兩立者

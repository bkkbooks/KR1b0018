body:
  text: 尚書精義卷十八宋黃倫撰太甲下伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡無垢曰敬而非誠則不能格天愛而非誠則不能感人誠而不用於愛敬則不足以繼祖宗伊尹之意以謂太甲悔過其誠然耶其亦免禍而勉强耶人心之難知也久矣伊尹於太甲中篇戒以允德協於下矣今又於愛敬之外加以誠字允即誠誠即允也使太甲不誠則是憂苦之中愈生姦詭其何補乎使太甲一出於誠則皇天萬民祖宗皆得所託矣又曰與有德之人是與治同道也雖亂必興與無德之人是與亂同事也雖治必亡其始與君子也多出於抑情抑情者易怠其終與小人也多出於快意快意者無窮以易怠之心而君子以直道正之每見其咈違耳及快意之時而小人以邪道悅之每見其遜順爾此所以始鋭於君子者終入於小人之術也慎厥與非安禮義之君不能也知禮義則其心常明任血氣則其心常昏終始與君子日遊禮義之中其心明明有如日月曰明明后豈欺我哉東萊曰敬是天之理仁是民之心誠乃鬼神之德兢兢業業無二爾心蓋兢業之心即天之心故克敬方得天之理自然相親四方九州之廣本不可以智劫力求惟以我同然之心感彼同然之心故自然常懷鬼神之道本自有誠如中庸言鬼神之德其至矣乎至言夫微之顯誠之不可掩如此夫故惟克誠則自然來享又曰大凡與治世同道無有不興使今日之治如堯舜之世則安得不興與亂世同事無有不亡使今日之治如桀紂之世則安得不亡終始慎厥與惟明明后先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉若升髙必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始無垢曰夫上帝尊居宸極而日月星辰皆有紀而不亂先王尊居九重而朝廷邦國亦有紀而不亂是人主即天帝使人主在天則為上帝使上帝在人間則為先王克配上帝義蓋如此人主其可自輕乎然而有德則尊無德則賤尊則同於上帝賤則等於匹夫千官在列萬玉同趨此堯舜禹湯之所以為尊也放于南巢懸于白旗此桀紂之所以為賤也悲夫人主本同於上帝乃卑賤至於若此然則有天下者其於愛敬誠之三字在已可不自强而求賢可不以此為凖耶又曰夫學不躐等教不陵節悔過而少見先王之心未可止是而自欺也其上有事焉第如登泰山而始升一級適燕越而始進一步耳豈可止一級遽自欺以為泰山之頂止一步遽自欺以為燕越之都乎張氏曰若升髙必自下者告之使進德也若陟遐必自邇者告之使修業也德欲崇故以升髙譬之業欲廣故以陟遐譬之潁濵曰欲田甫田則必自其小者始小之有餘而甫田可啓矣欲來逺人則必自其近者始近者既服而逺人自至矣苟由其道其勢可以自得苟不由其道雖强求而不獲也范祖禹曰孔子云為君難夫知所難而後可以有為也傳曰君以為易則其難也將至矣君以為難則其易也將至矣太宗知守文之難所以能有終也有言逆于汝心必求諸道有言遜于汝志必求諸非道嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞無垢曰天下莫易革於有過之過莫難革於無過之過有過之過見於行事可以指陳若三風十愆是也無過之過著於性情雖聲色弗邇貨利弗殖而自謂賢聖不容開陳便是過惟恐己有過則喜聞逆心之言惡聞遜志之言人之常情逆則不喜遜則樂聞言逆于心是正中吾之過也必由其言以求吾所以不喜者是何物也既得其病格而去之過去言行則大道見矣言遜于志是乃長吾之過也必由其言以求吾所以樂聞者是何物也既得其病亦格而去之過去言止則非道亡矣於逆心處必求諸道於遜志處必求非道此乃痛自抑節知吾心以為逆者乃善道也吾志以為遜者乃非道也又曰夫人可欺也心不可欺也一人之心天下之心也不喜逆心之言樂聞遜志之言是自欺其心也借是逆心之言杳然不聞而遜志之言洋洋盈耳不知其於暗室之中屋漏之下端居之時夢寐之內其心安乎儻有分毫之愧則元良之性為之障蔽矣李泰伯曰讒者沮善者也諫者抑惡者也名之諫者皆知好焉名之讒者皆知惡焉然而人主不免於信讒者讒似乎諫也愎諫者諫似乎讒也君曰可用臣曰不可用不可之辭同而情則異矣用君子而小人沮之是為讒用小人而君子抑之則為諫君子小人之心恍惚而不可用是讒諌所以亂也好諫而不慎則姦臣進惡讒而不察則正人退世有信讒則衆非之矣愎諫則衆笑之矣溫公曰孔子曰人之言曰豫無樂乎為君惟其言而莫豫違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎是故明君之於聽納無彼我無親疏無先後惟其是而已矣若重我所有輕彼所陳信其所親而疑其所賤主先入之言而拒後來之議則雖有是者亦不可得而見矣夫人心之所好者見醜而為美所惡者見善而為惡苟能以平心察之則是非易見矣若必待合聖意則悅而從之不合則怒而棄之吾恐讒諂日進方正日疏殆非所以增社稷之福也張氏曰言之逆於汝心則苦言是也言之遜於汝志則甘言是也苦言則訐直而逆耳甘言則愈順而可聽言之逆心者不可以私惡而拒之也當求之於道恐有道之言而反逆故也言之遜志者不可以私喜而從之也當求之於非道恐人亦非道而媚故也心者道之所寓心之官不思則或失其道故有道之言逆于汝心者必當求之於道然後知所從也心之所之謂之志心之本未嘗非道其有所之則或迷而失道故非道之言遜于汝志必當求於非道然後知所違也又曰仁善謂之元甚善謂之良一人元良則在我者順性命之理而無違矣故萬邦化之莫不各正其性命此之謂萬邦以正蓋萬邦之所以取正者在於一人故也王氏曰遜順也有人之言雖於汝心為逆必於道理中求之恐其合於道而有益也有人之言雖於汝志為順必於非道理中求之恐其不合於道而有損也東萊曰大抵逆順之言須以理觀方知是非且觀逆耳之言有不合理處要知合處多不合處少遜志之言有合理處要知合處少不合處多求之于己非說便以逆耳為是遜志為非但於逆順求合於理然後為當伊尹之言自有言外之意如逆耳之言但以理觀不可以一己之私遂以為非遜志之言亦以理觀不可以一己之私遂以為是此伊尹所以言其無我之意也又曰弗慮則安能知理弗為則安能有成太甲之自怨自艾此慮而能獲也君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休無垢曰君一失其道則天下不安宰相一失其道則天下亦不安今太甲所可憂者矯激太過將有辨言亂舊政之事使天下不安伊尹所自憂者顧位不去將有寵利居成功之事使天下不安使太甲知辨言之可戒而一守先王之政使伊尹知寵利之可畏而致政以歸則太甲自此為商家為君之法而伊尹自此為商家為臣之法而天下自此將可永保為太平之世矣張氏曰舊政可由也以辨言而亂之則失其政成功可退也貪寵利而居之則喪厥功東萊曰雖然人君既知道非不知先王之成法不可亂惟辨言乃可喜處所以慮其或蔽於可喜人臣非不知成功不可居惟寵利乃情之可喜所以慮其或縱於可喜此兩句雖是戒君與伊尹自戒亦是總言君臣之大體伊尹作咸有一德無垢曰伊尹與成湯君臣之間皆超然真有所得上當天心可以受歷數而君九有革夏政夫一德之所在天之所在民心之所在也有此一德天必祐之民必歸之猶影之隨形響之逐聲也豈天私於我我求於民哉德之所在理固然耳夫成湯咸有一德而至得天下夏桀弗克庸德而至失天下然則吉凶在人災祥在德復何怨尤哉又曰夫有堯必有舜有舜必有禹有湯必有伊尹猶天必有地隂必有陽日必有月有一德之君必有一德之臣此自然之理也自堯舜禹湯文武以來其所以巍巍赫赫者則亦有所得非勉强而能爾也然湯學於伊尹其一德雖湯所固有乃伊尹指而示之也伊尹天民之先覺覺者一德也湯與伊尹皆有此德故足以斡旋天命變堯舜之所為而不疑其見於用也取民於水火之中而處之堯舜之世一德為用其如何哉伊尹既用此以放桀又用此以放太甲而使之以悔過中超然有得嗚呼一德之用其大矣哉東坡曰或以千金與人而人不喜或以一言使人而人死之者誠與不誠是也稽天下之潦不能終朝而一線之溜可以達石者一與不一故也誠而一古之聖人不能加毫末於此矣張氏曰道一而已散而為德未始不一也是故入乎一則道將得出乎一則道將失然則君臣之德豈可以二三而不一乎雖然有一德之君必須一德之臣以為之佐有一德之臣必賴一德之君以為之主君臣之間所以貴於咸有一德然後道同志合而政治立矣此伊尹之將告歸所以作咸有一德以陳戒於太甲也太甲昔嘗居憂而在亮隂之間則天下之政聽於伊尹矣至於三年之喪畢此伊尹所以復政厥辟也將告歸者蓋功成不居將致政而歸也東萊曰太甲悔過既力入道既深故伊尹於此篇講究實理以入道之極處告太甲自古以來前聖入道各有自得處在堯舜禹則謂之執中在伊尹則謂之一德在孔子則謂之忠恕在子思則謂之中庸在孟子則謂之仁義皆所以發明前聖之所未明處故此篇前後都說一德天之難信以其命之不常也德之常不常則位之保不保在反覆手耳太抵造道之深其言不易發故伊尹必先以天為言而重其事亦欲起太甲之敬心也咸有一德伊尹既復政厥辟將告歸乃陳戒于德無垢曰為人臣如伊尹亦可謂不幸矣使君如堯伊尹如舜可也使君如舜伊尹如禹可也今乃不然一出而桀為君乃相湯而伐之此豈美事乎再傳而太甲為君乃身自放之豈美事乎其不幸有如此者使太甲悔過復政之後伊尹不去其有待耶又曰髙哉伊尹既不使人主有殺功臣之惡又使人主有入德之門進退裕如不見其失功滿天地而心不有德垂億載而心不怠放君迎君而心不悔釋位而去而心不疑人臣如伊尹其亦難矣哉曰嗚呼天難諶命靡常常厥德保厥位厥德匪常九有以亡無垢曰將恃天乎天則難諶將恃命乎命則靡常不可恃也天雖難諶而吾德可諶命雖靡常而吾德有常使吾有常德則可以變易造化闔闢隂陽天命豈不為吾德之聽乎故常厥德者保厥位而厥德匪常九有必亡也張氏曰詩云天難忱斯周公曰天不可信所謂天難忱者以其命之靡常故也天雖命吉矣不能應之以德則有時而凶天雖命凶矣能修德以禳之則有時而吉此天命所以為靡常也常厥德則其德一矣不常厥德則其德二三矣德惟一者動罔不吉此所以能保厥位也德二三者動罔不凶故雖九有亦至於亡言九有以亡則不能保位可知矣夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正無垢曰夏王不知講學為人欲所亂故其德不常所嚮皆惡動皆負於幽明幽則慢神明則虐民天豈欲以多欲之主偃然在民上為天下君乎蓋德即天也夫一德之所在天之所在也非一德之外别有所謂天而天之外别有所謂德也又曰方天厭惡夏王眷求一德之人付以厯數為天地神明之主而伊尹與湯皆豁然悟入天理超然真有所得上契天心蓋伊尹與湯之心即天之心也民之心也以天之心故克享天心受天明命以民之心故有九有之師爰革夏正張氏曰桀德不常幽則慢神而神怨之也明則虐民而民讎之也孔子曰敬鬼神則神非可慢也又曰寬則得衆則民非可虐也今夏王弗克庸德而慢神虐民非特神民之所不與而皇天且將不保矣啓者所以開導之也迪者所以導達之也天之命人常在于人為之後謂之有命蓋言其德足以有命此天之所以啓迪之也眷求一德俾作神主蓋惟一德為能有命故也可則因否則革桀之暴德無道其政非可因也革之而已史氏曰有一聖人起必有賢人為之偶何也天將以天下託聖人顧其事甚重而不能諄諄以告之故又以聖人託於賢俾致其命焉者也夏桀弗類天擇其主而託之者甚急也天欲以天下託于湯是以先以湯託於伊尹伊尹知之故曰天之生斯民也使先知覺後知使先覺覺後覺豫天民之先覺者非豫覺之而誰是蓋知天有以命之也命之至天不容以言傳伊尹不得以言受然動靜語默不啻影響之應者天以心傳伊尹以心受也東萊曰德者天地神明之所同然者也惟夏王弗克庸德則自然慢神虐民天自然不保此言視幽明人已為二皆是德之反未言德之正也非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德無垢曰無心于求天而天佑之無心于求民而民歸之天非私我也以天心在此天雖欲外吾心不可得也我非求民也以民心在此民雖欲外吾心亦不可得也是一德者乃天與民歸之機也或者於此心之外别求天佑於此心之外别求民歸是不知本者也蓋此心即天心非此心之外别有天也此心即民心非此心之外别有民也又曰一者天理二三者人欲天理無往而不吉則以其體即吉也人欲無往而不凶則以其體即凶也所得在天理舉天下不得以亂故一所得在人欲注於東則已奔于西注於此則已分於彼非一之外别有吉非二三之外别有凶一則吉二三則凶也在人謂之吉凶在天謂之災祥夫一即吉即祥二三即凶即災是吉凶不僭在人如何耳天降災祥在德如何耳古之論福者乃謂信義而詩人之歌福履則曰后妃逮下是逮下有福非逮下之外别有福也信義乃福非信義之外别有福也史氏曰天人以無常觀聖人之心聖人以有常得天人之助天人無心視聖人如何而應之耳應之以治則吉應之以亂則凶天固無常者也撫我則后虐我則讎民固無常者也聖人其可不汲汲於修德而求其無常也哉終始惟一時乃日新此聖人有常之德也修我有常之德而應彼無常之理自然幽明之間不期于天佑而天自佑不必于民歸而民自歸矣不然則天豈容私民豈可求而得之耶張氏曰天無私親也所親者一德而已民無常懷也所懷者亦一德而已皇天之所以眷佑有商者非天私商而佑之也蓋天之所佑者佑其德也民之所以戴商者望之若大旱之望雨非商求民而民歸之也蓋民之所歸者歸其德也德出乎道者也道一而已則德不可以不慎終於始常而不變此德之所以一也一出一入或作或輟此德之所以二三也夫物類之起必有所始榮辱之來必象其德故德惟一者動罔不吉德二三者動罔不凶吉凶者災祥之始災祥者吉凶之應於人言其始故謂之吉凶於德言其應故謂之災祥在人者先吉而後凶所以誘之而使勸也在天者先災而後祥所以威之而使畏也東萊曰惟其德一則天也人也神也周旋曲折酬酢泛應無非此一故動則合於理苟二三則周旋泛應之際不能一故動則背於理此所以有吉凶所謂吉凶者降災降祥也合理與背理便是吉凶今嗣王新服厥命惟新厥德終始惟一時乃日新按此條永樂大典原缺任官惟賢材左右惟其人臣為上為德為下為民其難其愼惟和惟一無垢曰夫成湯與伊尹咸有一德所以能至格天之治今伊尹既告太甲以一德之說其求人材可不以一德是凖乎不如是不足以傳成湯伊尹之心矣此任官所以必惟賢材左右所以必惟其人也賢材而有一德則在位在職者皆精白而無他心左右而有一德則上自三宅下至僕從皆忠良而無邪心如此精擇則以為臣之道上在朝廷為公卿則當助成君德下在有司百執事之列則當膏澤斯民其任匪輕其責甚重則人君之求賢才左右不可輕易也故曰其難不可簡忽也故曰其慎一不難則小人朋來一不慎則小人乘間和則其容晬穆一則其心開濟以此求之萬不失一矣張氏曰庶官得賢才左右得其人則上可以致君下足以成民故次之曰臣為上為德為下為民美則將順惡則正救陳善以閉邪獻可以替否使君不失其聰明聖智之德此為上為德也教之誨之輔之翼之使民不失其孝悌忠信之行此為下為民也上言為德則知為民者行也下言為民則知為德者君也伊尹嘗欲使是君為堯舜之君則為上為德可知矣欲使是民為堯舜之民則為下為民可知矣夫人臣之責如此其重則選任不可不難聽察不可不慎東坡曰易曰天下之動貞夫一者也夫動者不安者也夫惟不安故求安者而託焉惟一者為能安天地惟能一故萬物資生焉日月惟能一故天下資明焉天一於覆地一於載日月一於照聖人一於仁非有二事也晝夜之代謝寒暑之往來風雨之作止未嘗一日不變也變而不失其常晦而不失其明殺而不失其生豈非所謂一者常存而不變故耶蕭氏曰於身也精進而不已於民也樂推而不厭此德之所以日新東萊曰臣之所以為上者輔君德也臣之所以為下者本不要役民為君安撫其民也此亦是視君民為一也其難其慎者慮小人也難之慎之者慮君子小人混然無辨也惟慎擇其不善者去之則吾之純一始見惟和惟一而皆為君子也惟君臣之間和同無間而展盡一心此其所以為一也德無常師主善為師善無常主協于克一俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永底蒸民之生無垢曰有一德之君乃能識一德之臣是賢材左右之有一德正在太甲先有一德乃能識之耳此伊尹所以反覆為太甲言一德之說也太甲悔過必有所得也豈有無所得遽能脫去縱欲而克終允德乎內磨琢以檢察外切磋於師友功深力到一旦豁然人欲斷絶天理滋彰一德見矣一德既見未發號令未見稱譽以前先王之祿已綏蒸民之生以永則以先王之心蒸民之心皆㑹于一德也黃成曰貞而不變者謂之一一者道之極也物之不齊物之情也然自其一者視之萬物莫不一也故得夫一則無往而不一不得夫一則物無以正其心矣東萊曰德之運用無常師也主善便是師善無常主如仁義禮樂皆非一也然仁義禮樂之用咸歸于一耳此所以謂之協一也嗚呼七世之廟可以觀德萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功無垢曰七世之廟尚觀其德萬夫之長尚觀其政况后非民罔使民非后罔事其相須之急如此其可自謂有一德而狹天下之民以謂不足與計乎一德者每見其不足故有進法而無止法孔子惜顏子曰吾見其進也未見其止也此真一德之用也蓋匹夫匹婦各有所見儻四海之內有一夫一婦不得自盡其情則吾之德亦有所闕矣伊尹始告太甲以允德及其將歸也又告太甲以一德又告以求臣下之一德其末又告之以求四海之內匹夫匹婦之德此無他猶富家老翁平生所祕者厥子罔知及臨絶將死之際盡出所未見者兩手而付之其意亦已切矣伊尹將去其付與太甲者無餘藴矣太甲宜如之何張氏曰后非民罔使者兩貴不能以相使君必得民然後有所使矣民非后罔事者兩賤不能以相事民必得君然後有所事矣然而為上之道常在乎并謀兼智樂取於人然後可以成功則自廣狹人於所當戒也自廣則以己為有餘狹人則以人為不足自廣以狹人則􅑲􅑲之聲音顏色拒人于千里之外使匹夫匹婦不得以自盡則民主其何以成功哉民主之功非一人之智力所能致必在夫積衆智以成之者也史氏曰所傳者逺則其所積也必厚所服者大則其所行也必至因所傳之逺近以求其所積之厚薄因所服之大小以察所行之至否其德與政何以逃智者之觀察哉伊尹勸太甲以修德為政之道其激進之也如此東萊曰君民之一體也無自廣以狹人君民既一體苟自以為廣而以人為狹亦非一矣雖匹夫匹婦之至賤不得自盡亦非一矣如此則人主無成功沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁無垢曰嗚呼商家不可一日無伊尹也久矣伊尹雖告歸朝廷有大務人主宰相所不能决者想太甲父子必就問之古禮所謂九十者天子欲有問焉則就其室以珍從是也及伊尹既死死已既葬朝廷皇皇焉意以謂有謀誰决有事誰咨有大患難其誰慿藉乎故咎單遂述伊尹平生法度以告沃丁使之遵守也東坡曰咎單作明居司空之職也舜宅百揆亦司空之事也禹作司空以此考之自堯舜至商蓋嘗以司空為政也伊陟相太戊亳有祥桑榖共生於朝伊陟贊于巫咸作咸乂四篇無垢曰商家猶有堯舜之風後世弗可及者昔益有昌言禹拜而俞之禹有昌言臯陶俞而師之其雍穆揖遜之風使人樂而不厭今伊尹既葬而咎單遂訓伊尹事亳有祥桑伊陟乃贊于巫咸其虛心克己惟朝廷是憂初不欲善之在已過之在人此堯舜之風也太戊贊于伊陟作伊陟原命無垢曰伊陟原命所載皆恐懼修省之事原孔安國以為臣名是太戊贊伊陟又命原以天變之事也其間君臣答問雖不得而知想見不過君臣相戒修德修政以答天意耳仲丁遷于嚻作仲丁無垢曰嚻皇甫謐謂在河北或曰今河南敖倉余因遷都事乃知桑榖之妖轉而為遷都耳夫太戊占之曰野木生朝國其亡乎是太戊不修德必有亡國之災惟其修德所以止於遷都耳河亶甲居相作河亶甲無垢曰太史公云仲丁崩弟外壬立外壬崩弟河亶甲立仲丁遷于嚻方一傳至河亶甲則又遷居于相矣祖乙圮于耿作祖乙無垢曰太史公曰河亶甲崩子祖乙立河亶甲時殷復衰故又有遷都之變而祖乙又遷于耿也桑榖之祥亦可畏矣皇甫謐曰耿在河東皮氏縣耿鄉至耿為河水所圮壞又不安其居此乃桑榖之祥又發於河患也

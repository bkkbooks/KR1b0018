body:
  text: 尚書精義卷十宋黃倫撰海岱惟青州按此段經解永樂大典原闕嵎夷既略濰淄其道無垢曰嵎夷地名乃青州極處洪水滔天嵎夷亦被其害水患既去嵎夷之封略可定矣濰水出琅琊箕屋山北至都昌縣入海淄水出泰山萊蕪縣原山北北至千乘縣博昌縣入海此故道也前日水患皆不由其道今禹治水使得復還其故道然而禹治水苐云既載既修砥績既從既作既道既澤既略其道其乂其藝既瀦砥平既入砥定既敷而不言治水之由何也曰昌言之際固已盡之矣其曰決九川距四海濬畎澮距川是也蓋道畎澮之水以入於川道九川之水以至於海其治之之法盡於此矣張氏曰嵎夷者青州之夷也既略則已為封略矣蓋地之接於嵎夷不為之封略而使有守則蠻夷有猾夏之變矣經之所稱或曰島夷或曰嵎夷或曰萊夷或曰和夷蓋亦因其地而名之者也必以夷而言之所以見禹之功施及者逺非特中國而已濰淄其道者言濰淄二水得由其道也厥土白墳海濵廣斥厥田惟上下厥賦中上厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石無垢曰向也洪水滔天土失其性今則水患既去土性復矣厥土白墳本性復矣青州之土雖白墳然青州瀕海至海濵之土則有異矣説文曰鹵鹹也東方謂之斥西方謂之鹵廣斥云者以言青州海濵其地甚廣然皆鹹地此亦水患既除海濵之土復其性矣斥鹵之地不植五穀而田第三賦第四以是知地性之不相害也夫海水皆鹹也而瀕海多甘泉則青州雖瀕海而去海尚逺不害其為田第三賦第四也青州瀕海故多鹹宜葛故貢絺海物奇形異狀可食者廣非一色而已故雜然並貢錯雜也青州距岱岱山之谷宜桑故貢絲宜麻故貢枲以金則産鉛以木則産松以水則産石故皆貢焉然而土地所出將以充服食器用鹽絺海物絲枲鉛松皆服食器用也怪石安用以為貢物哉得不啓後世人主玩好之心乎且余嘗言之矣貢非人主本意乃臣子區區報上之誠也怪石雖無用然其文理精緻顔色溫潤見者悅焉以人之悅也故勤其貢奉庶幾人主之悅懌焉此猶人子致甘旨之意也張氏曰厥土白墳者其色白而其性墳也海濵廣斥者海濵之地廣而且斥厥田惟上下則在第三厥賦中上則在第四厥貢鹹絺海物惟錯者海濵之地惟鹹為多故其貢以鹹為先而絺次之海物又次之海之所産非一物也故曰惟錯錯則雜而貢之者也九州所貢之物不必以精粗為次而其敘以多寡為之先後也岱畎絲枲鉛松怪石者岱畎則岱山之畎也岱畎則出桑麻為美故其貢以絲枲為先至於鉛也松也怪石也皆出於此故得以并而貢之者也王氏曰水去故見土色白而墳起海畔廣有斥鹵之水可煎以為鹽斥為鹽鹵也萊夷作牧厥篚檿絲無垢曰萊夷水退非特可以牧牛羊且可植蠶桑矣萊夷出山桑故所貢者檿絲也萊夷亦有報上之心故以檿絲致貢篚以效區區臣子之意至於絃琴瑟織衣服則為上所用耳如此立説似為不偏張氏曰萊夷亦青州之夷也作者言水退而草木作生也非特草木之作生也又可以牧焉故曰萊夷作牧厥篚檿絲者詩曰其檿其柘檿者桑柘之屬也檿絲其絲可以中琴瑟之絃故以篚而進之兖州之漆絲岱畎之絲枲皆不言篚獨於檿絲曰篚者得非以其中琴瑟在所貴者乎雖然言檿絲必於萊夷之後蓋以檿絲出於萊夷故也東萊曰中國以種植為生夷俗以畜牧為生萊夷可以畜牧則水平可知浮於汶逹於濟無垢曰此亦除青州水患而入奏冀都也然曰浮於汶逹於濟而不曰入於河者何也此蓋史官刪潤雜然互見使以意逆志也治兗州水既畢則曰浮於濟漯逹於河蓋順流曰浮以水入水曰逹自漯入濟自濟入河以言水路相通不復更遵陸而行也前既自濟入河則青州自汶入濟自濟入河意可推矣張氏曰汶濟二水也以經考之導沇水東流為濟又東北會於汶則知汶與濟通矣然諸州皆言逹於河而青州不言者以青州次於兗兗州之浮於濟漯逹於河則青州之逹於濟亦由濟以逹於河可知矣海岱及淮惟徐州無垢曰此禹治青州水畢又治徐州水患也徐州東至海北至岱南及淮此州乃受海岱淮之氣亦自異矣嶽瀆滄溟之氣磅礴扶輿其所産土則五色禮則夏翟樂則孤桐浮磬皆異他州淮沂其乂蒙羽其藝大野既豬東原砥平無垢曰乂治也藝種也向也淮沂二水為患蒙羽皆為巨浸今二水既平故蒙羽二山之內皆可種藝也嘗怪禹每治一州之水不言其所以治之之方至此又言淮沂其乂蒙羽其藝不言所以使之乂使之藝何也蓋於此篇之首言隨山刋木奠髙山大川史官已撮其大要言之矣東原所以砥平者以大野之水既豬也廣平曰原東原言砥平者以水患既除東原復其本性也禹之意以為後世東原有水患當知水自大野來也王氏曰乂治也謂治淮沂二水使歸故道則蒙羽二山自無水患而可種藝而大野之澤既已蓄水則水不彌漫矣東原之地乃致之平是無水患矣蕭氏曰青州先山而後川此先川而後山蓋施功所先故也凡言山有其藝可以藝也有既藝人功盡藝也有其旅盡旅也有旅平又見其廣平也厥土赤埴墳草木漸包厥田惟上中厥賦中中厥貢惟土五色無垢曰水患既去土色復其本性故赤黏而墳起草木復其本性故漸進而叢生也田第二而賦第五非土地不美也亦人力不致焉耳如冀州田中中而賦上上此可以意推也聖賢任土之才以為大社之用然後知聖王因人之才以為天下用其巧思每如此也物無棄物而天下無棄才至如籧篨蒙鏐戚施直鏄聾聵司火瞽矇修聲其上又如賢者用為公卿才者用為大夫亦任土為用之意也然物之才性則造化以作之如土五色夏翟孤桐浮磬是嶽瀆滄溟之氣所造也人之才性則聖王以作之如能言則學唯能食則尚右手春秋教以禮義冬夏教以詩書春夏學干戈秋冬學羽籥學成德修鄉大夫獻賢能之書於王王乃興賢出使長之乃興能入使治之是聖王風化所造也余因悟造化之理觀先王無棄物之心故厯論人才造化之意表而出之胡氏曰土之為物宜若甚賤而不足貴者然地之所出亦致其土以為上利者何哉蓋物有微而用重者雖賤在所不廢矣然王者封五色土以為社而封建諸侯則各以其方色土與之使歸國立社焉則其禮為甚重而不可忽矣此土之五色所以有時而見貢也先王之治貢法不責其所無不匿其所有地之所出雖賤不廢地之所無雖貴不取此其所以為萬世之法而其實則什一也揚子曰止於下而漸於上者木也知漸為進長詩曰如竹苞矣知包為叢生東萊曰草木漸包結實也羽畎夏翟嶧陽孤桐泗濵浮磬無垢曰夏翟用為旌旄孤桐用為琴瑟浮磬用為編磬此徐州所以致貢也又曰翟曰夏翟以言五色備者桐曰孤桐以言特然而生者磬曰浮磬以言若出水之上者此皆頴脫而出者可以為用焉王氏曰夏翟乃雉之名出於羽山之谷其羽可以為旌旄嶧山之南有孤生之桐堪為琴瑟泗水之涯有石出於水如浮然可以為樂器之磬皆以為貢也淮夷蠙珠暨魚厥篚玄纎縞無垢曰蠙蚌也蚌中之珠可以為飾魚可以食玄纖縞可以為衣服此四物者瀕淮之夷所貢所篚於王室者也召公曰眀王慎德四夷咸賔無有逺邇畢獻方物惟服食器用又曰不寶逺物則逺人格所寶惟賢則邇人安今淮夷貢篚豈堯科別其名必使之供上哉蓋水患既除物復有生淮中有珠有魚矣可以蠶桑而為玄纖縞矣臣子之心戴上之德以為吾享此安居衣食此土地而遂其生者其誰之力也故其土地所出人功所極如珠如魚如玄纖縞者皆貢篚於上以備服食器用以效其區區之誠焉浮於淮泗達於河無垢曰淮泗逹河必道於汴以水入水曰逹以禹貢觀之即今泗水道自淮入泗自泗入汴自汴入河乃故道也至於治徐州水患既畢入都奏陳則禹拳拳不自專之意每於九州畢貢見之矣其賢矣哉王氏曰順流於淮泗二水以至於河入揚州之境張氏曰淮泗二水也經曰導淮自桐柏東會於泗沂由淮以逹泗沂由泗以逹河然後可以會於帝都也淮海惟揚州案此假經解永樂大典原缺彭蠡既豬陽鳥攸居三江既入震澤砥定無垢曰向也洪水滔天彭蠡泛溢不復可辨故鴻鴈亦無自而居處今水患既除水復故道彭蠡之水既停蓄而不泛溢故鴻鴈至九月亦於此安處也鴻鴈謂之陽鳥者以其隨太陽所照而居也日之行也夏至漸南冬至漸北故鴻鴈九月而南正月而北震澤所以砥定者以三江既入於海也夫震澤在吳之西而大江在吳之東其間相去百數十里即使三江泛濫未入於海震澤何遽不砥定哉余以是知堯之洪水為害甚大也想見當時洪水泛濫不問東西自震澤以來通為巨浸不復可辨今彭蠡既豬而三江之水皆合於彭蠡以入於海故震澤可辨而無復水患也東坡曰三江自豫章而下入於彭蠡而東至海為南江自蜀岷山過九江會於彭蠡以入於海為中江自嶓冢導漾東流為漢過三澨至於大別以入於江匯澤於彭蠡以入於海為北江夫三江之水盡會於彭蠡以入於海而彭蠡以一澤而受三江之水則其深闊廣大蓋可知矣向也彭蠡未豬則三江之水橫出旁趨故震澤受其弊今彭蠡已豬三江之水皆有所託故震澤砥定也張氏曰彭蠡澤名也既豬則有淵可以蓄水也陽鳥鴻鴈是也鴻鴈謂之陽鳥者以隨陽故也揚州地在東南尤為多暑陽鳥至是而居不復南翔故曰陽鳥攸居三江既入者言三江皆自此而入海也一江自義興一江自毗陵一江自吳縣三江所自雖不同而同入於海故曰三江既入二江在震澤之上一江在震澤之下三江既入則震澤之水無泛溢之患故曰震澤砥定砥定者致功而後定也於覃懷則曰砥績於東原則言砥平至此則謂砥定蓋致力而後成功謂之砥績致功而後平謂之砥平致功而後定謂之砥定由砥績然後至於砥平由砥平然後至於砥定言雖不同其致力成功一也蕭氏曰學者誤以三江既入震澤砥定為一事故有以三江為自彭蠡入震澤三江之大非一震澤所能容又有以三江為自震澤入海則岷江最大之川安得遺而不載二説皆失之矣蓋三江既入自言三江之入海而已震澤砥定自言震澤之定不言平地者用功少也餘倣此東萊曰彭蠡今之鄱陽湖陽鳥攸居鴈屬隨陽之鳥昔以水患無岸可居今岸出則知水平以此推禹之治水或驗之鳥獸或驗之草木或驗之夷狄見其非特為人治水為天下萬物治水三江無定説或謂出於震澤之下篠簜既敷厥草惟夭厥木惟喬無垢曰向也彭蠡未豬三江未入此州通為巨浸篠簜草木安得遂其生哉今彭蠡豬矣三江入於海矣震澤砥定矣故小竹如篠大竹如簜者則已布生草則夭夭少長以遂其本性木亦喬然髙大以遂其本性篠簜草木已遂其生矣而况於人乎厥土惟塗泥厥田惟下下厥賦下上上錯厥貢惟金三品無垢曰土惟塗泥謂卑濕也故田第九賦第七水患既退種植既稀地利增美故雜出第六之賦也不計利害惟使民自貢不立定賦必其上供此所以為堯耳王氏曰以其地尤低故長為塗泥以見其草木長茂之後而後知土性則其地尤低可知田為第九以地甚低故也賦為第七以數亦不多故也上錯謂錯雜之物則為上等顔氏曰錯出諸品既云上錯則是有所定而云非錯出諸品也田最為下品而其賦乃出於第七或出於第六者人功修也瑶琨篠簜齒革羽毛惟木無垢曰詩云元龜象齒謂齒謂象齒也考工記曰犀甲七屬兕甲六屬是甲之所用犀革為上説文謂獸皮治去其毛曰革是革謂犀革南方之鳥有孔雀翡翠之羽可以為飾説文謂犛西南夷長旄可以為旌旗之飾楩楠豫章揚州美木瑶也琨也簜也篠也齒也革也羽也毛也木也此九物者皆揚州所貢以致臣子之義也此蓋九州風氣所成土地所産向也洪水皆失其性今水患既退物理自遂天地造化隨風土以醖釀之其奇偉譎詭皆可以為用特在聖賢所以經綸之耳王氏曰瑶琨篠簜皆以為貢者蓋與青州貢松之説同島夷卉服厥篚織貝厥包橘柚錫貢無垢曰島夷所服者卉服也冀州島夷以皮為服揚州島夷以卉為服皆自其土地所出而用之同謂之島夷也貝木名也至今南方採吉貝織為厚繒可以禦寒亦猶冀州島夷以皮之制小曰橘大曰柚揚州所有也至今此物永嘉江西為多苐難於致逺故貢篚之外又有包焉包所以封護其外使未遽失土性也此橘柚必錫命而後貢也夫錫命而貢人君宜慎矣以此供祭祀燕賔客猶有名也儻專恣口腹之故而勤勤為一橘柚出令亦可恥矣豈非堯禹深意也歟王氏曰有厥篚有厥包篚則盛之以篚包則用物包之以橘柚不包則壞也錫貢者有以與之則貢蓋若今和買然且禹貢言錫貢者二此則橘柚以其為食之餘不欲以此為常貢故錫之常若欲用則亦錫而後貢也東萊曰錫貢聖人不以口腹勞人凡此非宗廟大事不貢故曰錫貢沿於江海達於淮泗無垢曰於兗州曰浮於濟漯逹於河是濟可以入河矣故於青州止言浮於汶達於濟而不言入河以費辭也於徐州言浮於淮泗達於河是泗可以入河矣故於揚州言達於淮泗而不言入河以費辭也豈特古人文章如此大抵古人心地眀白其辭簡要而切中事理所謂豐不餘一言約不失一辭是也陳氏曰或由海以達江或由江以徑達淮泗以其州疆界闊逺貢篚之物或阻山川其所由之道不一荆及衡陽惟荆州案此段經解永樂大典原闕江漢朝宗於海九江孔殷沱潛既道雲土夢作乂無垢曰蓋滄海為百谷王是江漢有朝宗之義禹貢言此亦因物以示訓誨也古人取象此類蓋有寓意如葵霍傾太陽則因示臣子嚮君之意犬馬知愛主則因示臣子愛君之意朝宗之説意亦使人知尊君之義也既九江之水皆循故道甚得地勢之中不復泛濫之為害也蓋以水從江漢出者皆曰沱潛但地勢西髙東下雖於梁州合流還從荆州分出猶如濟水入河還從河出東坡謂禹雖賢聖何由知荆州之水乃梁州之沱潛也以味別之耳荆梁相去數千里非以味別安知其合而復出耶然水脈相貫理之自然毛氏曰水猶有所朝宗是假人事而言水也司馬氏曰雲夢者方八九百里則此澤跨江南北每處名存焉是雲夢一澤也特其疆界闊逺耳陳氏曰江漢二水經此州然後分勢以歸於海自岷山出者為江自嶓冢導漾東流者為漢江與漢至夏口而合焉孔衝要也殷當也九江衝要適當此耳王氏曰孔甚也殷分也江漢以海為宗去海尚逺其流赴海如朝其宗故云朝宗於海江漢之源尤在上其下乃為九江言甚分者以水患去而甚分別也沱潛二水既治之而從故道矣雲澤之土見於夢地皆可為治謂耕種也孔氏以雲夢為澤名此倒一字矣謂雲夢之土可以耕藝矣髙氏曰嶓冢導漾東流為漢漾水自東南流至漢中而東之焉岷山導江東別為沱江水自東南流至於沱而東之焉言二水由荆州至於海也曰朝宗者何也朝覲宗廟諸侯所以有事於天子也海為百谷王而江漢之水始於岷嶓視衆流發源最為逺者其間險阻障蔽為甚多故言江漢朝宗則天下之水皆歸往於海矣又曰九江至荆州始分方且去險阻障蔽之患故言孔殷治之之易也九河自兗州始分且經開導濬治之初故言作十有三載乃同治之之難也九河沱潛雖則不同其既道則一而已厥土惟塗泥厥田惟下中厥賦上下厥貢羽毛齒革惟金三品無垢曰土雖塗泥田雖第八而賦乃第三以是知人工加倍雖瘠確之地亦豐矣余觀浙人治田人力最深耕耘不失時水旱極其力樵刈如寇至故浙中一熟其利十倍至江西湖南春耕不力夏至不耘播種田中聽其自生自成而已水旱若越人視秦人之肥瘠略不以經意故嵗一不熟則賊盜四起以知人力不加而一聽於天者愚民也人事即天也人力不加已有飢饉之道然而獲倉箱之收者幸也人功加倍已有豐富之理然而水旱蝗螟不可致力焉此不幸也故為國者當寬其征輸薄其力役號令簡追呼絶使之安意肆志於田事其有怠惰者略取古人里布屋粟之法以困苦之而力田之科勤農之政取古人之可行者行之亦相天之道也王氏曰當時田之低者皆品第之賦則兼山與澤所出不專在田故此賦為甚髙田為甚卑也杶幹栝柏礪砥砮丹惟箘簵楛三邦砥貢厥名包匭菁茅厥篚玄纁璣組九江納錫大龜王氏曰大龜所以卜神眀之意天子寶之不謂貢者以貢則自下升上之義以重其神靈之物不以為自下升上故謂之納無垢曰三邦砥貢厥名謂三邦於三物之中致貢其尤美者則人意愜而文勢順也又曰大誥曰寧王遺我大寶龜紹天眀即命是大龜乃國之寶也故國有大事則命大龜以卜之禹曰官占惟先蔽志昆命於元龜魯頌曰憬彼淮夷來獻其琛元龜象齒元龜即大龜也以言其用則卜國之大事如立君立尸行師之類以言其名則大而為元以言其所貴則南金同獻至其最可寶者無若荆州九江所出歟然大龜雖九江所出既為國之大寶其亦難得矣豈可以致常貢哉時有得之者官司蓄之以待上之錫命而後納焉東萊曰三邦砥貢厥名凡杶幹及楛六物非朝廷所常用必使之貢則勞民不使之貢則有用而或闕故惟使貢其名名者列其條目而貢之也見聖人處事精審如此古者以大龜為寶亦不常貢浮於江沱潛漢逾於洛至於南河無垢曰順流而下曰浮自荆州順流入沱以至於漢則捨舟陸行以入洛自洛以入於南河自河以入冀都奏荆州所畢之功也王氏曰逾過也順行於江沱潛漢四水而過於洛水以至於南河入豫州之境東萊曰几曰逾者皆無水路從陸而逾也

body:
  text: 尚書精義書類提要臣等謹案尚書精義五十卷宋黃倫撰宋史藝文志載有是書十六卷陳振孫書録解題亦著於録稱為三山黃倫彞卿所編知其閩人此本有余氏萬卷堂刋行小序稱為釋褐黃君則又嘗舉進士然閩書及福建通志已均不載其仕履則莫能詳矣其刋書之余氏亦不知何時人案嶽珂九經三傳沿革例稱世所傳九經本以興國于氏及建安余仁仲本為最善又林之奇尚書全解亦惟建安余氏刋本獨得其真見之奇孫耕所作跋語中此編所稱余氏當即其人是在宋時坊刻中猶為善本也其書薈萃諸説依經臚載不加論斷間有同異亦兩存之其所徴引自漢迄宋亦極賅博惟編次不依時代每條皆首列張九成之説似即本九成所著尚書詳説而推廣之故陳振孫頗疑其出於偽托然九成詳説之目僅見宋志久經湮晦即使果相沿襲亦未嘗不可藉是書以傳九成書也其他如楊氏繪顧氏臨周氏範李氏定司馬氏光張氏沂上官氏公裕王氏日休王氏當黃氏君俞顔氏復胡氏伸王氏安石王氏雱張氏綱孔氏武仲孔氏文仲陳氏鵬飛孫氏覺朱氏震蘇氏洵吳氏孜朱氏正大蘇氏子才等當時著述並已散佚遺章賸句猶得存什一於是編體裁雖稍涉汜濫其裒輯之功要亦未可盡沒其書傳本久絶朱彝尊經義考亦曰已佚今從永樂大典各韻中採撮編綴梗槩尚存惟永樂大典之例凡諸解已見前條者他書再相援引則僅注某氏曰見前字其為全録摘録無由參校今亦不復補録姑就所現存者釐訂成帙分為五十卷存宋人書説之梗概備援證焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序理學昭融周歷千古於胸次不踰辰刻之頃儻翳障弗屏徹雖一瞬之境恍迷其真視千載而上之聖賢心傳於典謨訓誥誓命中若之何剖其祕析其微哉古書百篇嬴秦酷以虐焰仇之特甚先漢力追探之收拾散逸僅得孔安國所傳為正會巫蠱事旋復泯遏繇魏晉以降篇帙缺亡未備而精真之理晦蝕又不止此白魚赤烏之偽箕子荄滋之蔽禺鐵柳谷之訛在所不論然黨護於専門名家增倍師説至百萬言傳注訓詁之紛紜纍三萬言只解稽古二字眩亂世人耳目而指意為之誣衊殆與厄於秦同科理學曀蔽綿歷云久闡而明之蓋若有待時屬皇朝祖宗全盛之際關洛有二張二程之學崇索理致根乎聖賢心法以發明千載不傳之祕而福後學俾天下之士畢宗嚮夫理學之指南一洗漢唐注疏舊習豈第踸踔藩籬咀嘬餘胾者哉又有宗工碩儒落落復相望乎其間各出意表所見理根於心而心會於理更與啓其未悟者編檢紛如亦戛戛乎難槩以目力也噫十指之形必有巨擘翹錯之中當刈其楚粵自啓賢關升俊造以來有黃君倫素定規繩於方寸所謂疏通知逺不誣而深於書者萃古今議論而裁之其發揮五代帝王遺書之奧皆指中之擘翹中之楚者信精而又精其於理學殆無餘藴矣昔人有泳圓流者採珠而捐蚌登荆嶺者拾玉而棄石今所抄存猶摘翡翠之藻羽脫犀象之牙角宜乎稱此書為精義也覽者亦宜以余言為然淳熙庚子長至龍溪張鳳從道敘書解數百家或泛而不切或略而未備或得此而失彼或互見而疊出學者病之釋褐黃公以是應舉嘗取古今傳注及文集語録研精而翦截之片言隻字有得乎經旨者纂輯無遺類為成書博而不繁約而有要實造渾灝噩之三昧非胸中衡鑑之明焉能去取若是志於經學者倘能嚅嚌是書不必他求矣余得之不敢以私敬鋟木與天下共之所載諸儒姓氏混以今古余不暇次其先後觀者自能辨之淳熙庚子臘月朔旦建安余氏萬卷堂謹書尚書精義原序考證第一頁前八行案劉向云今易箕子作荄滋漢書儒林傳蜀人趙賓為易飾易文以為箕子明夷萬物方荄滋也晉鄒氏家諱云訓箕為荄詁子為滋漫衍無經不可致詰以譏荀爽據此乃易中傳訛之字序文上下二句皆就本經而言似此句可節今姑仍原文謹附識

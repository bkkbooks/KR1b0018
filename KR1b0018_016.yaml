body:
  text: 尚書精義卷十六宋黄倫撰惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟己改過不吝克寛克仁彰信兆民無垢曰不邇聲色不殖貨利想見其尊嚴髙逺矣徳懋懋官功懋懋賞想見其尊賢使能矣用人惟己取人以身也毁譽能動之乎改過不吝急於為善也諫諍有不從乎全徳如此宜責人之深求人之傋也而克寛以養天下之善克仁以感天下之心其行之也出乎中心之自然非以聲音笑貌為也所以布大信於兆民久矣張氏曰五聲令人耳聾五色令人目盲則聲色所以賊其性者也邇聲色則性為物蔽財猶腻耳近之汚人則貨財所以喪其志者也殖貨利則志為物累惟不邇聲色則視聽不蔽而耳目聰明惟不殖貨利則思慮不惑而心志廣大湯之大徳懋昭而聖敬曰躋者由不邇聲色不殖貨利以積之而已温公曰成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過則聖賢之意較然著明惟以改過為能不以無過為貴蓋為人之行已必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其徳日新是為君子遂非則其惡彌増斯謂小人故聞義而徙者常情之所難從諫勿咈者聖人之所尚東萊曰湯之本原既已澄澈則凡見於事為無不當理徳勉者勉之以官功勉者勉之以賞見其崇徳報功不差毫髪也用人惟己者如記所謂取人以身惟本原先正故能以身為度而任天下之材苟吾身自無權衡則何以稱天下之物改過不吝觀顔子可見顔子㡬聖者也其過則不貳所謂有不善未嘗不知知之未嘗復行也林氏曰此又言湯之盛徳善政巍巍如是所以得民之心也孟子曰桀紂之失天下失其民也失其民者失其心也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣得其心有道所欲與之聚之所惡勿施爾也為湯武毆民者桀與紂也惟湯武之徳既有以聚民之欲去民之惡故桀紂之民皆相率而歸之雖欲牢辭固遜而不可得是桀紂敺民而使歸之非湯武誘民而使來也老子曰惟無以天下為者可以有天下舜禹之受禪湯武之征伐奄天下之衆而有之貴為天子富有四海而天下不以為過者惟其未嘗有利之之心而無以天下為苟其有一毫利之之心則天下必有不服者豈能創業垂統以貽子孫萬世之業乎故仲虺言湯之盛徳而首以不邇聲色不殖貨利為言者謂湯之心清浄寡欲湛然不動舉天下之聲色貨利曽不足以動其心則其伐夏救民以有天下果其有利之之心乎不邇聲色言不近嬖寵也不殖貨利言不營財賄也此聖人之盛徳至大至剛不為外物之所變遷見於行事之深切著明者漢孔氏曰既有聖徳兼有此行其説失之矣見於所行者是真聖人之徳豈不邇聲色不殖貨利之外别有聖徳乎湯之修身行己見於實效者如此其取天下固無利之之心也而又能官有徳賞有功與天下同其利也人之勉於徳者我則勉之以官與之共天位治天職也人之勉於功者我則勉之以賞優其禄廩榮其車服以旌寵之不必共天位治天職也蓋有徳者以官勉之有功者以賞勉之各稱其實而已矣武王之崇徳報功亦此也非特此也又能用人惟己改過不吝而不徇一己之私也言用人之言如自己出若所謂善與人同舍己従人樂取諸人以為善也改過不吝則有過必改无復吝惜若所謂過則勿憚改也用人惟己則善無不從改過不吝則不善無不改此又所以合并為公以成其大也王氏曰用人惟已己知可用而後用之如此則是果於自任而不從天下之所好惡也王者心術之真大抵如此改過不吝言已有過則改之無復吝惜若所謂過則勿憚改也用人惟已則善者無不從改過不吝則不善無不改此所以能合并為公以成其大也其發而為政又能寛以居之仁以行之蓋所謂以不忍人之心行不忍人之政也惟湯之徳如上所言兹其所以明信於天下天下信之而欲以為君也孟子曰以萬乗之國伐萬乘之國簞食壺漿以迎王師豈有他哉避水火也如水益深如火益熱亦運之而已矣桀之所以失天下之心者惟其肆為威虐故民墜塗炭而莫之拯湯於是時以寛仁之徳彰信於天下故天下歸之若大旱之望雲霓然湯之所以能成寛仁之徳者其本則自於清淨寡欲𦕈然天下舉不足以動其心故能利與人同以施其不忍人之政兹其所以彰信於天下也蓋撥亂反正以成帝王之業者苟有利之之心則將奪於物欲見利而動惑於聲色貨利之私遂至以私害公不能執其所有以與天下共其利剛愎自用遂其非而莫之改如此則所施者無非虐政是水之益深火之益熱也古之人有行之者項羽是也漢髙祖與項羽當秦之未俱興義兵以除殘去虐較其勢則髙祖之不如羽逺甚然而髙祖卒得天下羽失之者以髙祖之寛仁而羽則惟肆其暴虐而已原其髙祖之所以寛仁者無他亦本於此數者之徳而已觀其入秦闗珍物無所取婦女無所幸封秦宫室府庫還軍灞上則其志已不小矣而又不愛爵賞降城即以侯其將得賂即以分其士好謀能聴從諌如轉圜惟此數者之徳皆備于己故其約法三章悉除去秦法而秦民皆按堵如故莫不欲髙祖王秦者而項羽之所為則皆反是此其成敗之勢所以不同也以髙祖之成帝業者而推之則知仲虺所以推本成湯誕膺伐夏救民之意始於不邇聲色不殖貨利改過不吝然後繼之以克寛克仁彰信兆民可謂知所先後矣乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰徯予后后來其蘇民之戴商厥惟舊哉無垢曰怨其來晚慶其已來民心如此此天意也張氏曰民之苦於桀故如墜塗炭之中待湯拯之然後得其蘇也夫草枯魚凍得和氣乃蘇民之憔悴於虐政得湯而蘇亦何異此夫成湯起於七十里而有天下則民仰之也非一朝一夕之故其所由來久矣林氏曰此又言湯既有寛仁之徳彰信兆民矣於是言其弔伐之時為天下之所歸向也湯之征伐蓋始於葛其畧見於仲虺之言其詳見於孟子孟子曰湯居亳至后來無罰孟子之時去古未逺必其載籍之所傳者如此是可以發明仲虺之意蓋湯之於葛其始也未嘗有伐之之意其祀也則遺之以牛羊既不祀也則使亳衆往為之耕及其殺饋餉之童子然後不得已而伐之其伐之也非以快一時之私為匹夫匹婦復讐也湯之伐葛既為匹夫匹婦復讐則匹夫匹婦之有讐者莫不願其為之復也故伐葛之後又有十一征焉皆所以復匹夫匹婦之讐也蘇氏曰用兵如藥石則病者惟恐其來之後也此説善矣故其十一征也東面而往征則西夷怨其來之後南面而往征則北狄怨其來之後曰均是民也何為先彼而後我哉所謂怨者與怨慕之怨同蓋望其來而怨其不至非實怨之也言西夷怨北狄怨者孔氏曰舉逺以言則近者著矣其所未伐之國則怨其來之後其所往伐者則室家相慶曰徯予后乆矣我后之來則自此可以蘇息矣所未至之國則怨其不至而曰徯獨后予其所至之國則慶其來曰徯予后后來其蘇民之所以責望於湯者如此其切而桀之惡日以滋至民之䧟於水火者日以益多湯雖顧君臣上下之分忍而不誅而民之脱於死亡者其廹切之情皆赴於湯湯不得而釋之矣昔楚白公之父為鄭所殺白公請伐鄭於楚以報父之仇子西曰楚未節也不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不逺矣遂厲劔曰殺子西其意蓋以吾讐也子西有可報之道而不為我報則讐在子西矣桀為斯民之所讐斯民之意以謂惟湯之寛仁可以救吾垂絶之命於水火之中故彼征則此怨此征則彼怨苟使湯安然自顧其私而不肯勉狥大義以救斯民則民之愁怨反歸於湯矣故寧使己之有慚徳而不忍失天下之望也民之戴商言民之戴我商家而望其拯救蓋初征自葛之時已欲其為君以有天下矣非出於一時之偶然乘機射利而覬非所望也佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌無垢曰湯有慙徳仲虺致臣子之心忠愛之義以安慰之佑賢輔徳顯忠遂良此乆存之道也兼弱攻昧取亂侮亡此必亡之道也今湯伐桀疑犯兼攻取侮之失然而猶有説者因天下之心而吾無所私也又曰君子獨立小人成羣君子寡助小人多朋其主張扶持全在人主耳佑輔顯遂此蓋欲湯主張扶持不使小人害之也蕭氏曰君不能待臣則忠者不得盡其心君惡聞其過則忠者無所盡其言是雖有忠臣沉黙而不聞也故於忠則顯之良者不為惡者也有以進其志乃能有成故於良則遂之徳日新萬邦惟懐志自滿九族乃離無垢曰夫懐慙在心則惡念斷絶善路分明使湯以慙之故力行善道以寛之則徳日新矣使湯已得天下無復顧憚惟已所欲則志自滿矣徳日新則萬邦感之無不懐念志自滿則雖骨肉之親亦不親附之矣東萊曰聖人之徳常運而不息則日新然湯苟以慙忸之念停於胷中而不化則於徳有所雜雜則止止則不能日新蓋曰湯於此正當日新其徳以大其功業豈可留慙忸之念王懋昭大徳建中于民以義制事以禮制心垂裕後昆無垢曰大徳謂廣大不自狹之徳也恐其每事如征伐之太過故戒之以建中於民欲其為可常行之道也恐其處事盡如征伐故戒之以以義制事恐其盡變前日不邇不殖之戒故戒之以以禮制心夫湯之征伐以濟一時之務可也豈可以垂裕後昆乎垂裕後昆必其造廣大之地為可行之事必處事以義理而不任情必處心以禮法而不縱欲可也儻惟一事有悖於此開基創業既已不正子孫其何所不為哉又曰仲虺之戒所以俟其不慙之後自足之時也恐其自足之時遇事自足而任情處心自足而縱欲故汲汲以子孫為言人之不可保如此也湯且不可保而况其他乎張氏曰抗之以髙明則絶物抑之以卑晦則失已然則中也者其天下之本歟湯之於民必曰建中蓋以此矣義生於心以之制事則事得其宜禮自外作以之制心則心不至縱治外者必以内為之主治内者必以外為之正此内外交治之道也湯之為法於天下可傳於後世在此道也東萊曰湯當此正宜勉明大徳以立民極豈可嘗留慙忸而不化以怠其業且以義制事以禮制心古人論事精詳悉備正如易既言敬以直内又言義以方外制事制心亦如此本原既深則取之不盡用之不竭自然垂裕於後世子孫予聞曰能自得師者王謂人莫己若者亡好問則裕自用則小無垢曰有慙徳則不自足故好問惟好問則深體物情每見其有餘自足則無忌憚故自用惟自用則不恤下情故每見其褊狹嗚呼誰知慙徳其用乃如此之大乎孔子曰其言之不怍則為之也難蓋人之不怍則無可救藥矣孟子曰恥之於人大矣不恥不若人何若人有蓋人而無恥則無復成人矣怍恥即慙徳也仲虺前言所以安慰者欲其不自沮也後言所以警戒者欲其不忘慙徳也抑揚予奪有禹治水周公兼夷狄孔子作春秋之用非力學者不足以見仲虺之心東萊曰人以為有道徳則敬之非所謂自得惟自得師則真可王矣謂人莫己若則孤峭特立傲然處萬物之上焉得而不亡好問則天下之善皆已之善豈有不裕自用一已之能有限豈不為小嗚呼慎厥終惟其始殖有禮覆昏暴欽崇天道永保天命無垢曰禮者敬而已矣敬則明不敬則昏敬則仁不敬則暴有禮自取植立昏暴自取覆亡天之道昭然如此惟以敬徳不敬徳為戒慎是以欽崇天道也如此則無所不用其敬而極其至於戒慎不睹恐懼不聞不愧屋漏不欺闇室明不歉於天地幽不負於鬼神而天命永保矣張氏曰殖徳所以福善除惡所以禍淫福善禍淫天之道也惟能殖有禮覆昏暴所以能欽崇天道惟能欽崇天道則天命可以長享矣故終之以保天命荆公曰禮者天之經地之義治道之極彊國之本也則人君之所殖孰大乎此陳氏曰慎厥終惟其始者謂有商之治自今日始不治亦自今日始東萊曰欽崇天道亦如勑天之命惟時惟幾欽崇便是天道天道便是欽崇正如尊徳性永保天命者永欽崇則永天命也君之徳日新則民之徳亦日新此萬邦懐也又曰有禮則殖昏暴則覆天之常也林氏曰仲虺又嘆而總括其義以湯之始也既能不邇聲色不殖貨利克寛克仁彰信兆民以成其王業豈有他哉惟慎厥終亦如其始則盡之矣能自得師以日新其徳此慎終始之道也既能慎終如始矣又能於有禮則封殖之於昏暴則覆亡之以終其推亡固存之義則民將永受其賜此蓋天之道也天道如此而我能欽崇則天之所以命我以休歸者可以永保矣商之宗社所以傳祚數十世凡歴六百年賢聖之君六七作其天命之永保者如此其原則自夫湯之日新其徳湯之日新其徳則自夫仲虺之諄諄告戒然則仲虺之相成湯其功業殆與伊尹相配矣是可以深嘉而屢嘆也若賈誼過秦論曰秦以區區之地致萬乗之權招八州而朝同列百有餘年然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑何也仁義不施而攻守之勢異也其意謂攻之可尚詐力而守之必資夫仁義秦以詐力攻之而不知以仁義守之故至於亡此説不然夫以詐力而攻之矣則其所知者詐力而已豈能復以仁義守之耶觀仲虺之誥其始言湯之不邇聲色不殖貨利以至於克寛克仁見其所以克夏者以此此篇終言徳日新萬邦惟懐以至於殖有禮覆昏暴欽崇天道言其所以守已成之業以祈天永命者亦惟如此而已由是言之攻守豈有異勢哉湯既黜夏命復歸于亳作湯誥咎單作明居無垢曰湯既歸夏萬方皆來朝賀其中豈有無慙徳者俱北面事人今一旦歸心於一方伯使逐其君於深僻之地而推戴人臣以據其位乃共北面以臣事之能無慙乎湯又以仲虺之言慰安諸侯挽其慙徳共轉入於為善之路所謂與人同過然後其仁可知也歟林氏曰亳者湯之都也既除桀之暴則不復都夏之故地而必歸亳本其王業之所興湯歸於亳諸侯則皆朝以見新君不可以無告也又曰馬融曰咎單為湯司空作明居民法一篇大意分明無可序者如伊尹作咸有一徳周公作無逸作立政之序文惜乎其亡矣湯誥王歸自克夏至于亳誕告萬方王曰嗟爾萬方有衆明聽予一人誥無垢曰君天下曰天子朝諸侯分職授政任功曰予一人今誥萬方曰予一人是湯以天子自處而朝諸侯矣張氏曰蓋衆不能以制衆所以制衆者寡故稱予一人者所以對萬方有衆言之也惟皇上帝降衷于下民若有恒性克綏厥猷惟后無垢曰民受天地之中以生所謂命也能者養之以受福不能者敗之以取禍然天地能生之所以成之者在人主而已矣天命之謂性率性之謂道使一世率性以行而能各安其道理者非人主有以造化之民其能自至於此哉古之聖王以身教化之以學校長育之以風俗漸染之使皆不失天地之中而順其常性以歸於善孟子所謂性善是也又有五畆之宅百畆之田墻下之桑使之仰足以事父母俯足以畜妻子各安其道而不流於放僻邪侈之路豈不盛哉張氏曰人雖有恒性不能自若故順而道之者君也不逆其所有不强其所無因嚴而教之敬因親而教之愛此之謂若有恒性能若有恒性然後能克綏厥猷猷者道也以作則有就以止則有守無非道也天道降衷於民保而安之者君也使之利其仁樂其義陶陶然歸於日新者此之謂克綏厥猷東萊曰惟皇上帝降衷于下民便是天命之謂性若有常性是率性之謂道克綏厥猷惟后是修道之謂教天之所賦者命人之所受者性子思言修此言綏夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇無垢曰桀雖為君不知使民若有恒性克綏厥猷之道而自殘滅其徳以作凶暴之威大布虐政於萬方百姓皆失其天地之中而逆其常然之性率遏衆力率割夏邑使民皆不安其生其凶害之及於人有如苦菜之荼蛇虺之毒不可堪忍人疾困極未嘗不呼天者窮則反本也民既不聊生萬口一音俯仰之間號呼天地所謂並告無辜于上下神祇也為人君而使萬方之民如此不亡何待乎張氏曰陽為徳隂為威威盛而無徳以將之非所以為威也東萊曰徳者人之本有以私欲而殄滅之故云滅威者性之所無以私欲而强作之故曰作以敷虐于爾萬方百姓人君者天下之原其勢甚利其君既作威則其酷虐自然廣布於萬方百姓而無一人不罹其惡天道福善禍淫降災于夏以彰厥罪肆台小子將天命明威不敢赦無垢曰善即福也淫即禍也此天道之自然者夏王滅徳作威敷虐萬方此即惡之最淫者善有感召惡亦有感召糞穢自招蛆蠅梧桐自招鸞鳯非有驅而主之禍者淫之所招淫萌于心禍見于外外之可惡如此則吾心中之所藴蓄蓋可見矣細察人事以卜吾心萬不失一是降災於夏者所以彰滅徳作威敷虐萬方之罪也天生一桀又生一湯是桀之作淫天固生湯以待之也使桀改過天命歸桀湯不失為忠臣使桀不俊天命歸湯湯將天命明威亦豈敢以私赦桀惡乎然則何以知天命明威之在我乎天出灾異以警桀民心戴商而不回此天命之所在也張氏曰善者福之所集淫者禍之所加天之道也天道在於福善禍淫故降灾于夏以彰厥罪則禍淫可知矣禍福無形灾祥有迹自天而言之則謂之禍福自人而言之則謂之灾祥於天言禍淫於夏言降災此其别也又曰明者言天之彰有徳甚明也威者言天之討有罪可畏也命有徳討有罪莫非天命將之者在人而已伊川曰或問福善禍淫如何曰此自然之理善則有福淫則有禍又曰天道如何曰只是理理便是天道也且必説皇天震怒終不是有人在上震怒只是理如此又問今人善惡之報如何曰幸不幸也東萊曰方天下被桀之虐聳然畏懼若泰山之壓其勢不可支威虐之極百姓共怒以怨於桀一人而告於上下神祇降災於夏而桀至此亦不可逭天之罰敢用𤣥牡敢昭告於上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命無垢曰湯之𤣥牡告天請夏之罪與元聖戮力請民之命豈行隂謀而私一已哉張氏曰伊尹以先覺先知之才自任以天下之重是其所以為元聖也湯之伐桀必賴伊尹以為之相故曰聿求元聖與之戮力上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖無垢曰天之於民愛之如子有撫綏之者則以為后有殘虐之者則謂之讐桀貴為天子富有天下其尊髙之稱在史謂之帝在經謂之王今以虐民之故一旦斥遂謂之罪人不復有帝王之稱矣桀謂之罪人紂謂之一夫吁可畏哉欲得天者當得民欲得民者當布仁政使天下之民悦樂而無憔悴不滿之心者此天與之也其可忽哉薛氏曰天命有信視民所與則殖之所不與則蹶之若草木然民所殖亦生不殖亦死張氏曰草木者天生之人殖之非天所生則民不能殖蓋人非天不能因故也非民所殖則天不能成蓋天非人不能成故也湯之興也天與之民立之東萊曰聖人知天於未見之先衆人知天於己見之後孚佑下民蓋聖人知天於先而至此果不失期也俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵無垢曰桀在上則天下責望於桀桀為無道積失民心以至於亡今桀既去乃湯在上天下移責望桀之心於湯矣湯自顧放君之罪已布於天下矣使湯能副天心民心則湯庶㡬可以免禍使湯偃然以英雄自任上忽天下忽民民心將復思夏之賢君則事又未可知也此皆言湯慙徳之發見也慄慄危懼若將隕于深淵非飾辭也湯之心誠是如此凡我造邦無從匪彝無即慆淫各守爾典以承天休無垢曰此成湯慙徳之發見也見桀放逐事至於此無可奈何湯雖欲復奉桀為君不可得也徒悵念不善之不可為耳故戒諸侯以無從匪彝匪彝者不法之事也又戒以無即慆淫慆淫者逸欲之事也桀為不法為逸欲以自快耳不謂昔為天子今為罪人昔者以天下為家今者以南巢為避禍之所嗚呼傷哉不法逸欲之不可為如此惟各守法度以承天之美耳儻或不然事未可知也爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心無垢曰若爾有善我弗敢蔽惟行加地進律之賞使其善暴白於天下胥訓胥效俾萬國咸樂於為善耳此慙徳之言也若伐桀之罪有不合天意當在我躬我亦豈敢自恕惟屏息待命以聽上帝擇之察之耳此亦慙徳之言也東萊曰天之心有善則福之人君在中間或蔽塞之則天之福不得及於善故凡為君者致天之命於民而弗蔽足矣而已之有罪亦豈敢咈天之意而自赦歟其爾萬方有罪在予一人予一人有罪無以爾萬方無垢曰斂天下之罪以歸於一身湯方且俯仰進退之間憂惶兢懼之不暇其敢少肆乎王氏曰此非謙而過厚之辭乃誠然矣天下有罪豈非天子不能治化故然乎天子有罪萬方何與焉嗚呼尚克時忱乃亦有終無垢曰忱者信也言之不足故嗟嘆之意以謂警懼之心言之不盡也使萬方庶幾能信我是言則可以長保社稷倘惟不信其可恃乎顛覆宗社一身竄逐如桀者亦可以為戒矣

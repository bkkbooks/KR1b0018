body:
  text: 尚書精義卷三十四宋黃倫撰唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾周公既得命禾旅天子之命作嘉禾無垢曰想成王聞唐叔之言知禾之所以為瑞者自周公盛德所致也所以親遣唐叔歸此禾于周公而致其感悟之意焉歸禾之篇具載之矣惜乎此篇之亡不及一見也想見唐叔忠信成王誠意和樂愷康開懷露意君臣之間不復包藏疑二天下之樂其有過於此者乎又曰周公既受成王命以禾來歸周公不敢當此美瑞乃陳天子之命以作書以謂禾之所生者乃成王之心所感召也此美禾者當主於成王我何與焉非周公撝謙人臣之道正當如此爾史氏曰歸美於周公故曰歸禾加德於成王故曰嘉禾君歸於下臣嘉於上一瑞而二書作焉盛德之至也三復其義不惟周公愛成王之深成王之愛周公也亦至周公遭變禾則盡偃成王泣書禾則盡起蒼蒼之天反復報應喜怒於立談之間不其怪哉非愛周公也愛成王也愛周公則成王可與有為矣唐叔之禾又前日之禾也成王悟流言之非而有袞衣之歸周公懷愛君之心而有東山之役異畝同穎此天借草木之靈以示君臣誠意無間異體同心之象也成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材無垢曰三監既誅乃盡以其地封康叔然周公不以封微子何也微子賢者也夫何疑哉蓋所以一商人之心也武庚之叛以故都之人思商家舊德故因以騁其區區之忿今微子雖賢商人見微子乃商家子孫其心不能無感傷姦雄乘此又將生變如此則天下何時可一乎安國云康圻內國名是未封衛以前康叔已受封矣康叔雖賢然初任重事荷大責其能舉而盡善乎此周公所以作康誥使康叔知明德慎罰之義作酒誥使康叔知剛制於酒之義作梓材使康叔知塗丹艧之義勤勤懇懇如此者以見其重大也張氏曰治殷餘民之道在於明德慎罰故康誥者誥之以明德慎罰之事也能明德慎罰然後可以化舊染之汚俗故酒誥者誥之以無困酒而革其舊俗也能革其舊俗然後可以粉澤藻飾以成至治此所以終之以梓材也吕氏曰命康叔為衛侯在周室封諸侯之一事爾何故三篇之書餘千言前次未嘗如此之多在唐虞之時命典樂命九官不過一兩語微子之命蔡仲之命不過一篇而已後世未嘗如康誥之詳者見得當時以三監既叛之後殷之餘民志尚未定所以邦之安危惟茲庶士康叔正是周室安危存亡之所係處周公成王之命康叔其言不得不詳此亦是時節之所當然康誥惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治東坡曰自惟三月哉生魄至此皆洛誥文當在洛誥周公拜手稽首之前何以知之周公東征二年之前乃克管蔡即以殷餘民封康叔七年而復辟營洛在復辟之嵗皆經文明甚則封康叔之時決未營洛又此文終篇初不及營洛之事知簡編脫誤也史氏曰都不定無以得天下之心法不明無以勸天下之治昔姬公之作周也其加意於此乎方成王尚幼王都未定周公定之王法未明周公明之謂天下之治與不治舉係於斯也是以定鼎於郟鄏以據天下之中邑既成矣四方之民莫不和悅五等之侯百工之衆莫不會同可謂得天下之心矣於是播周之號令使之知所守見商之多士使之知所畏勞來還定安集之逺近內外無有不得其所其勸天下也如此天下之治其有不舉者乎昔嘗以是而作大誥矣今復推廣大誥之意而申言之故曰洪吕氏曰生魄是三月十六日周公初立基址作新大邑於東國之洛四方之民皆譬如子來大和會於周皆供周公洛邑之役周公築洛邑大抵一箇版築斧斤勞苦之役人所最憚然周公所以得四方之民皆大和會供其役者何故此正如文王作靈臺經之營之庶民攻之不日成之經始勿亟庶民子來之意侯甸男邦采衛除要荒之外諸侯亦皆供周公洛邑之役王若曰孟侯朕其弟小子封惟乃丕顯考文王克明德慎罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時敘乃寡兄朂肆汝小子封在茲東土東坡曰孟長也康叔成王叔父而周公弟謂之孟侯則可謂之小子則不可且謂武王為寡兄此豈成王之言無垢曰丕顯考文王謂康叔有大明父文王也以謂文王識見智慧照燭萬事有如日月幽隱皆明其大意在自明其德與慎於刑罰而已明德在己無玷慎罰則待物以寬行此兩句其於治衛沛然其有餘矣君仁則所用皆仁人君義則所用皆義士知此則庸庸祗祗可見文王之明德矣且知其可用則用之知其可敬則敬之非文王之明德其能灼見人材如此乎夫人主能不侮鰥寡以感動天下之心而庸庸祗祗威威以聳天下之心則天下之民善心油然而生惡心怛然自沮造化之柄隂陽開闢與天地同功六子同用顯民之説豈欺我哉夫肇造區夏豈一旦而遽得之乎始行於一邦又行於一邦以至天下歸之夫一邦之不修則以己德之不明而待物之不恕文王専用明德慎罰之道以修邦之未修者自一邦又及一邦俄而滿四海盡在文王明德慎罰中其成矣哉西土謂岐周文王所都之邑也紂視民如冦讐苛政虐刑使民孤煢無所依倚姦回逋逃捃托戕賊使民窮極無所庇覆而西土之民獨於湯火中自有清涼之地蓋所依倚者文王所庇覆者文王也天以民為心今天下苦紂之虐慕文王之仁民心美之是上帝美之也其仁聲聞於天下之民是聞於上帝也夫何故以上帝以民為心也天乃大命文王是以天下之民皆歸文王而三分有其二也夫何故天以民為心也民皆歸文王是乃天大命文王也文王以仁受天命武王以義成文王之功父兄皆聖明聖作而明述受此天命河潤九里澤及三族一人乘車三人緩帶故使汝小子封得在茲東土有民人有社稷貴為諸侯而富有一國也可不敬哉王曰嗚呼封汝念哉今民將在祗遹乃文考紹聞衣德言往敷求於殷先哲王用保乂民汝丕逺惟商耉成人宅心知訓别求聞由古先哲王用康保民𢎞于天若德裕乃身不廢在王命無垢曰蓋念則能明德慎罰不念則私欲滋熾安知在己無玷待物以寬之理乎言今民將在康叔敬循文王明德之心紹聞明德之事躬行明德之言紹聞者謂今聞於我當常存諸心汲汲以文考在念繼求所聞使不斷續以增廣其德也衣之為言若衣服在體躬行而佩服之也天下一理也古今一理也明德之法當廣備衆體蓋學有多門不可以一塗取學無止法不可以一節拘如德行言語政事文學皆為孔子門人雖所造有淺深槩乎皆有所得也故祗遹文考未可止也更當敷求殷先哲王保乂斯民之心以敷求殷王未可止也故又當大逺惟商家前老成人所以宅心者在於何地則吾德愈廣矣吾德愈廣則天下之理如燭照數計隨民之病在於何處從而訓之無不如所志者蓋惟明德則見理見理則知訓民之要矣以逺惟商老成人宅心未可止也故又當别求聞由殷以上古先哲王若夏若虞若唐所以康保民之心用以治衛地乃為當耳天即吾性也孟子曰盡其心者知其性也知其性則知天矣邵堯夫作盡心知性贊曰廓然心境無大倫盡此規模有幾人我性即天天即性皆于微處起經綸至矣哉斯言夫心即性性即天心體甚大盡之者少耳故惟學問為可以宏之蓋祗遹文考天在文考而止耳敷求哲王天又在殷王焉逺惟商老成人天又在老成人焉别求古先哲王天又在古先哲王焉如此則吾之性天愈覺其無所不在矣非文王殷王商老成人古哲王能增吾之性天也吾性天本大特因文王殷王商老成人古先哲王發之耳天既宏大則吾所順者皆德而吾貌言視聽思皆為肅乂晢謀聖之用足以時風雨敘燠寒順隂陽而移造化裕然取足於身而無事於外求如此則心亦廣大髙明矣然何以驗其實乎止在不廢王命而已故能奉承王命不作聰明以亂舊章不敢以聞言而改厥度則若德之實也張氏曰徒善不足以為政徒法不能以自行為政不因先王之道者亦徒法徒善而已此周公之誥康叔使之祗遹文考敷求於殷先哲王蓋欲因先王之道以為政故也若德者順性命之理而無違也能順性命之理而無違則萬物皆備於我注之不滿酌之不竭豈不綽綽有餘裕哉雖然人臣之道在於奉君之命而行之者也故於此又戒之以不廢在王命在者存而有察意故於王命能存之察之而不敢廢然後可以保其祿位矣吕氏曰周公嘆息以成王之命告戒康叔曰汝念哉不可有一毫怠忽之心今衛國之民全在望康叔將率行文王之事何故蓋衛國之民聞文王之事見文王之子來臨諸侯必以祗遹望康叔了為康叔者須常接續所聞佩服道德之言不要斷絶康叔文王之子武王周公之弟朝夕在父兄之側其聞道德之言不為不多今既為衛侯逺父兄去周公恐他有間斷忘了故戒之以紹聞衣德言使他知接續前人之所聞佩服前人之德言如此方可副殷民之望王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民無垢曰恫痛也瘝疾也不知祗遹文考以至别求古先哲王則邵堯夫所謂微處起經綸者也人欲滋熾所鄉皆惡未問物論邦刑以痛疾其身其心紛紜擾亂大則為名好勝小則為利患失又其下為淫為侈為決其隄防疑沮曽不得須臾寧人見其平體慢膚若從容無事者而不知其心如此其蹙迫也天可畏而所輔者在誠吾勉求誠之所在可也小人難保其情大可見吾勉求其情之所在可也吾之誠民之情欲求之者無他焉自敬而入耳欲求誠自此以往當盡乃心盡心則誠見矣盡心即孟子盡心之説也心體甚大能盡之者少惟能盡則人欲斷絶天理昭著天正在此吾何往而不得天哉欲求民情當無安逸豫蓋勤儉則得民心逸豫則失民心民心不可保也勤儉則聚逸豫則去安有常心哉故乂民之道正在不好逸豫耳盡心不好逸豫之道在敬而已矣小人難保故多怨民怨則天所不佑夫民怨君不在大惡或起於小事不専在小事多由於大惡勿以謂起於小事而苛察細務簡忽大體也亦勿謂由于大惡而簡忽細行専務大體也如貫髙之圗髙祖徒以簡忽張敖耳果怨在大乎隋文帝親臨萬機至衛士傳餐而以喜怒生殺一傳而滅怨果在小乎然則幾微之禍如此可不専去逸豫而勉其不勉之心乎己乎汝康叔雖小子然其任重大所事者𢎞王應保殷民助王宅天命作新民豈可忽哉東坡曰武庚之亂征伐之餘民流徙者無常居故康叔之國有新民也方三監叛周天命蓋岌岌矣黜殷而封康叔天命乃定史氏曰人之性孰不有道而商民不順於道孰不有德而商民不勉於德皆其君不能順之勉之之故狃於姦宄敗常亂俗其不順於道驕淫矜誇怙侈滅義其不勉於德如此是皆習於商政故也康叔之居是邦也無俟於他求因其固有之性順以導之則昔之不順者於是而亦順因其固有之性勉以勸之則昔之不勉者何患乎不勉又焉用忿疾于頑過為刑戮以招怨謗哉王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺無垢曰夫明德則曰敬哉明罰則又曰敬明是明德慎罰専在敬而已矣敬勝百邪故在己無玷而德自明待物以恕而罰是敬乃能明德慎罰之門户也東坡曰近時學者解此書其意以謂人有小罪非過眚乃惟終成大惡非詿誤也乃惟自作不善原其情乃惟不以爾為典式是人當殺之無赦乃有大罪非能終成其惡也乃惟過眚原其情乃惟適爾非敢不以爾為典式也是人當赦之不可殺信乎此言是周公虐刑殺非死罪且教康叔以人之向背以為喜怒而出入生死也法當死原情以生之法不當死而原情以殺之情之輕重寄於有司之手則人人可殺矣雖大無道嗜殺人之君不立此法而謂周公為之歟吾嘗問之知法者曰此假設法也張氏曰目病謂之眚眚者過失之謂也人有小罪非眚則其故為可知矣乃惟終則非為人之所詿誤也乃惟自作則其惡出於自為者也原其情則不以君為典式是不法乎上之政令者也如此則其人罪雖小然出於有為故不可不殺所謂刑故無小是也乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺者乃有大罪非終成其人惡乃無過眚以災害於人與所謂惟終自作者異矣原其情則歸之於汝與所謂不典式爾異矣明其道以責之則極厥辜如是之人其罪雖大然出於過誤在於不可殺所謂宥過無大是也王曰嗚呼封有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂無垢曰斷獄之道如上文所謂若二人犯死罪其一若罪小而出於無賴其一若罪大而出於偶爾無賴者據法以殺之偶爾者援情以生之如此用刑乃為有敘夫何故以得法外意也人皆知法當死者以死斷為有敘而不知法當死者以權其死生者為有敘故夫非得法外意者不能爾也得法外意以斷獄則民知無賴之不可為而無辜者之必生如此則姦心消縮善意自生惟姦心消縮此所以皆謹勑而不敢放肆惟善意自生此所以皆相勉為和樂而不敢為狠戾也無賴而犯死罪者殺之不留如疾之在躬必務絶其根本如此則人知惡之不可為而盡棄去之惟恐汚染率為謹敕而不敢肆意矣偶爾而犯死罪者務有以保全之如赤子之赴井務有以救護之如此則人知善之不可不為皆行乎禮義安治之路率相勉為和樂而不敢履危塗矣張氏曰有敘者刑罰之施有輕重不失其先後之序也小罪非眚而殺大罪非終而赦上刑適輕而下服下刑適重而上服惟其刑罰之施不失其序則小人莫不畏服此民之所以勑懋和也勑則莫敢放肆和則無有乖戾然刑罰足以制人之形而不足以制人之心疾者人情之所同惡攻之而欲其亟去也赤子人情之所同愛保之而欲其不傷也人君惡惡欲去如有疾然則民莫不盡棄咎而為善人君愛民欲存如保赤子則民莫不盡歸於康乂而不擾刑罰非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人無垢曰刑謂剕宫之類殺謂大辟之類劓截鼻刵截耳古謂輕刑嗚呼缺者不可復全斷者不可復續刀鋸所臨痛楚切骨彼亦人子也使其毁殘父母遺體謂之輕刑可乎誠謂輕刑劓刵也亦一國之人以謂當劓刵非康叔私得劓刵也人者天地之德隂陽之交鬼神之會五行之秀氣豈容有偶藉父兄所庇因有爵土使在人上妄行刑殺劓刵取快其意荼毒斯民哉必不容也康叔賢者也豈容有是然而舜大聖人即位至九十餘嵗益方有罔失罔淫罔逰之戒而况康叔乎張氏曰經曰天討有罪五刑五用哉則刑罰皆出於天討為人君者奉將之而已矣此成王之誥康叔以謂非汝封得以刑人殺人汝無或妄有刑人殺人非汝封得以劓刵於人汝無或妄有劓刵於人其所以刑殺劓刵一稟之天意非己所敢私也劓刵者五刑之最輕也非特其重者在所當慎雖劓刵之輕猶不敢妄則其大可知矣王曰外事汝陳時臬司師茲殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚無垢曰前告康叔以刑殺既稱王曰而告以劓刵則稱又曰今告外事既稱王曰而告以要囚則又稱又曰以此知成王之告有未盡理者周公又雜而告之也王曰乃成王告之而又曰乃周公告之也外事諸侯以獄事來上康叔當觀囚之要辭以斷之要囚者若殺人一等也而有謀殺者有故殺者有鬪殺者有誤殺者有為人所誣迫於箠楚而自誣者儻將斷獄而不得其要領則將有寃枉者矣天下之重莫重於人命此所以於囚之要辭當服膺不舍當念慮不忽當反復尋繹終始考究揆之以人情驗之以事實察之於意外辨之於證佐求之於嵗月至於五六日而不已又至於旬又至於三月其要辭果實情而無寃枉矣然後大斷其罪而不復有絲髮之疑焉張氏曰德本也刑末也德內也刑外也故人君以德為內事以刑為外事王曰汝陳時臬事罰蔽殷彝用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕德惟乃知無垢曰汝陳周家法事斷以殷家故事當知天下公義以刑以殺勿得以汝封私意也此教康叔以行周法用殷法之理也夫自髙者義昏自卑者義明自髙則惟知一己之尊而不知理之所在此義之所以昏也自卑則不見一身之長汲汲然求天下之理而佩服之此義之所以明也使康叔斷獄盡順於理事事有敘康叔儻以此一毫自置於心則自髙之心生而義昏矣惟盡順於理事事有敘乃自處而思曰我豈於斷獄之間有未順於理者乎得無有寃枉者乎日日自省惟恐其不順於公義也如此則處心積慮惟善言是從善道是思義於是而明矣夫君臣所以相與成治功者以相知而不相疑爾成王知康叔之心所以付之以重任而不疑康叔知成王之心之德所以受此重任而不疑且成王知康叔之心而不及德康叔知成王之心而又言德者此有深意蓋康叔心可以為賢者而未有所得成王則有所得矣德者得也惟有所得則見天下之理如燭照數計故凡所以告康叔者以明德慎罰之説而推演文王之意者皆以成王周公實有所得而然也張氏曰且夫康叔所居者商之故都所治者商之頑民故其刑罰之所施必以殷之彝倫為監亦政由舊之謂也用其義刑義殺使之隨其成心而師之者也然而義刑義殺之道不可任一人之私意好惡喜怒要之合乎至公而已汝雖小子其心之善故非衆人所能及也朕心朕德惟乃知者言我之心德亦汝所知則我之所為汝無不知之也未有若封之心則汝宜為諸侯而在茲東土朕心朕德惟乃知則我之所以告汝者皆所能行汝故知之而不可不聽從之也凡民自得罪寇攘姦宄殺越人于貨暋不畏死罔弗憝無垢曰吉人為善惟日不足凶人為不善亦惟日不足暋強也寇攘姦宄殺越人其凶如此是乃強於為惡惟日不足不以死為可畏者也逆天下之大情如此等人誰不惡之憝惡也蓋人性本善故見孝悌忠信仁義禮智之人人皆愛之是人性本善也見寇攘姦宄殺越人于貨者無不惡之是非人性所有乃禽獸豺狼異類也人之所惡聖人亦惡之此刑之所以制也張氏曰自得罪者罪自己致非為人之所誘陷也凡民之自得罪有寇攘者有為姦宄者有殺越人于貨者完而支之之謂寇以手勝物謂之攘柔聚於外謂之姦剛窮於內謂之宄

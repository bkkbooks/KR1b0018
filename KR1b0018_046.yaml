body:
  text: 尚書精義卷四十六宋黃倫撰成王將崩命召公畢公率諸侯相康王作顧命無垢曰成王將崩太保召公太師畢公率天下諸侯相康王繼為天子遂有顧命之作也又曰若以三公職序論之太師居上太保居下而顧命之際孔子所序乃以召公居先何也曰召公太保也平生保輔成王者也腹心所寄情意所同以國為家以嗣王為骨肉最為親厚者也平時在朝任天下事者曰周公曰召公而已周公既死不以召公首當顧命之任可乎張氏曰顧命者成王將崩之命也夫天下大器也將欲傳之子孫則其受遺託孤之際尤所當戒顧命之所以作也顧有回視之意聖人以死為歸故其將崩之命則謂之顧命吕氏曰成王幼沖之時先嘗有流言之變成王思不得正其始今要得正其終成王能正其終則康王方能正其始蓋成王因事遇變如此不然自堯舜禹湯文武以來皆是大聖人聖人視死生如夜旦之常何獨成王臨終發命祗緣成王幼沖曽有危疑之變成王所以不得不正其終所以正其終欲教康王正其始史官載之以為後世法顧命惟四月哉生魄王不懌甲子王乃洮頮水相被冕服慿玉几乃同召太保奭芮伯肜伯畢公衛侯毛公師氏虎臣百尹御事無垢曰大位姦之窺也危病邪之伺也故成王將崩上自三公六卿下至百尹御事皆使至路寢之前委付以宗廟社稷後嗣之重使將絶之言琅琅在百官聞聽中而姦心邪志無自而生古先哲王其處死生之際森嚴如此女子小人得行其志乎庸詎有五王交亂門生天子之弊乎嗚呼其昭示萬世之意深矣張氏曰惟四月哉生魄王不懌者言其始疾也至甲子之日則其疾益甚成王於是洮頮水相被冕服憑玉几所以召羣臣而命之者也當是之時小大之臣皆在王庭而聽命遂與六卿而同召之則王庭之臣無不舉矣王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝無垢曰漸進也幾危也疾已大進而無退證惟危殆而難安康此心知死不久不可不為宗社計故呼公卿御事告以保輔嗣王之意也其不亂如此學問之力也黃氏曰死生之變亦大矣而不足以二其心自非聖人有所不能也孔子曳杖曽子易簀而成王被冕服見百官臨死而不亂如此子路問死子曰未知生焉知死夫死生一道也知生則知死矣孔子七十而從心所欲不踰矩曽子曰而今而後吾知免夫小子彼日夜之所存者無時而不正矣殆非死之不亂其生不亂故也昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命無垢曰成王以謂昔我先君文王武王宣布其前後哲王光眀之德以定民之所居民既得其居然後陳敷五教以教之既教之矣則使學而時習之民既習五教而聽用上之命令所以使殷之否運開逹為周家亨泰之大命也夫奠麗陳教則肄肄不違用克逹殷集大命皆宣重光用之也以此知成王傳家之法止為民而已矣張氏曰文王之德能光于四方至武王又能廣文王之教而昭先人之功此所以為宣重光也宣其光則揮散而不掩重其光則繼續而不絶舜典之言重華離卦之言繼眀皆宣重光之謂也吕氏曰大抵自古聖賢並只有兩箇時節所以堯舜君臣而並文武父子而處聖人有作自古上下數千年一箇光眀超越前後相照文武所以宣重光只在奠麗陳教一句在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾無垢曰成王晚嵗兵寢刑措可謂盛矣何艱難之有乎而成王言此何也曰天下之務皆艱難也將以為治而亂在其中將以為安而危在其中所以古人惜履霜之不早戒蔓草之難圖成王以太平為艱難豈非出於此乎又曰成王自謂我之言豈獨能濟艱難而已哉可以柔服蠻夷可以作成境內可以安慰勸勉大小衆國皆使安民教民使民習教聽用上之號令則召公畢公而下於成王之言當奉以周旋不可失墜開𨗳康王以履踐斯言可也觀成王臨絶之際其言嚴徑端莊如此念慮凝寂言語分明豈疾困死生所能動哉孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深其成王之謂歟東坡曰恭敬可以濟大難世以威儀為文飾而已不知其為濟難之具也故曰自亂于威儀幾危也非幾者安也惟安為可畏不可冒進也吕氏曰大凡一俯一仰一動一止皆天命秩然自有條理人自以私意自亂若夫天秩各有條理則一動一止井然不亂無非天命之流行爾衆臣無以康王昏進於非幾此一句尤切兹既受命還出綴衣于庭越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外延入翼室恤宅宗無垢曰綴衣孔安國以為幄帳是成王憑几出令時幄帳在焉既出命已將備死事故徹幄帳在庭也何以知之喪大記曰疾病君大夫徹懸士去琴瑟寢東首於北牖下廢牀鄭康成曰廢去也人始生在地去床庶幾生氣反也如大記所説則出綴衣者去懸而為死備也於明日乙丑之日成王果崩又曰昔成王將終命大臣相康王方是時親兵者太公望之子伋也宰臣召公奭命仲桓南宫毛取二干戈虎賁百人于伋以迎嗣子伋雖掌兵非有宰臣之命不敢發也召公雖制命非二諸侯將命以往伋亦不承也兵權散主不偏屬於一人可知矣又曰東坡解翼室謂路寢房左右翼室也成王喪在路寢故子釗廬於翼室為憂居之主也為憂居之主則若臣若民皆當憂居矣何則人主為天下之父也人主既崩天下皇皇焉無所依托其得不以憂而居乎苐禮制有限耳吕氏曰古者父子異宫太子之南宫自在南門之外成王既崩教入翼室為喪主然這一般故不是特地迎康王歸來最見當時臨大變法度周密如此太保命仲桓南宫毛這要見得召公是周家之重臣當時成王崩百官總已以聽於冢宰大命都是太保出丁卯命作册度越七日癸酉伯相命士須材吕氏曰伯相召公分陜為二伯以伯為相正如後世以上公為相謂之公相是也狄設黼扆綴衣牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席玄紛純漆仍几無垢曰祭統曰狄樂吏之賤者也喪大記復魄之禮曰狄人設階是喪事狄必主張設之事故孔安國曰狄下士也黼扆若今屏風之類曰黼者畫斧於其上者也考工記曰白與黑謂之黼言以白黑飾斧也綴衣即帷幄也此四座設此黼扆綴衣以象成王生時所臨也以起康王愛慕之心焉又曰孔頴逹云牖謂窗也間者窗東户西户牖之間也是黼扆之前敷三重之席其上重則用桃枝竹席其席以黼緣之鄭康成訓黼云以絳帛為質而以白黑之線繡斧文於上黼純黼扆意當以此又曰東西廂謂之序蒲蒻謂之底席綴純謂綴雜彩以緣之也敷重者意當如司几筵篾席之説苐文貝仍几以文貝飾仍几也孔安國云此旦夕聽事之坐以此東西序皆設窗牖也又曰東序西嚮敷重豐席畫純而用雕玉仍几也豐莞草也畫純以畫繢緣之也考工記曰畫繢之事雜五色孔頴逹曰以五彩色畫帛以為緣鄭康成曰以雲氣畫之為緣此畫純之法用玉仍几謂刻玉為文以飾几也孔安國云此養國老饗羣臣之坐又曰路寢為太室則東西序有夾室夾室云者非路寢正室也西序之夾室乃親屬私燕之坐故召公命狄於此敷重筍席玄紛純而設漆仍几也筍席篛竹席也玄紛純以黑組緣之也漆仍几者以宴親族不事華飾故不以貝玉飾几也孔頴逹引司几筵訓牖間為見羣臣覲諸侯之坐而疏西序東饗為旦夕聽事之坐東序西嚮為養國老饗羣臣之坐曰案燕禮云坐於阼階上西嚮則養國老及饗與燕禮同其西序之坐在燕嚮坐前以其旦夕聽事重於燕飲故西序為旦夕聽事之坐其疏西夾南嚮為親屬私宴之坐曰夾室之坐在燕饗坐後又夾室是隱映之處又親屬輕於燕饗故夾室為親屬私宴之坐又曰東坡曰將傳先王之顧命不知神之所在於此乎於彼乎故兼設平生之坐也余謂古人之於親森然如在目前豈敢有死其親之心乎故事死如事生事亡如事存其設此四坐儼然如先王親臨之其仁孝尊敬之心槩可見矣越玉五重陳寶赤刀大訓𢎞璧琬琰在西序大玉夷玉天球河圖在東序胤之舞衣大貝鼖鼓在西房兑之戈和之弓垂之竹矢在東房無垢曰越於也於玉五重之間陳赤刃大訓河圖之寶也五重者謂𢎞璧琬琰大玉夷玉天球是五重也琬圭以治德以結好琰圭以易行以除慝是兩物也安得以為一重考工記云琬圭琰圭皆長九寸既等兹所以為一重以琬琰為一重則知𢎞璧大玉夷玉天球皆有一雙蓋謂之重耳又曰赤刀鄭康成云武王誅紂時刀赤為飾大訓孔安國王肅以為虞書典謨且西序已設王旦夕聽事之坐而復陳寶于此不已隘乎曰孔頴逹以謂在坐之北又曰序者墻之别名其墻南北長坐北猶有序墻故言在西序又曰鄭康成云大玉華山之球也夷玉東方之珣玗琪也天球雍州所貢之玉色如天者皆璞未見琢治故不以禮器名之釋地云東方之美有醫無閭之珣玗琪焉以此一事考之則康成以大玉為泰華之玉天球謂雍州所貢其色如天者必有所考自是其書不存耳河圖即河出圖伏羲則之以畫八卦是也顧此寶列於養國老饗羣臣之坐北又曰胤之舞衣必有法為可傳寶者也大貝孔頴逹引伏生書傳云散宜生之在江淮取大貝如大車之渠者即此大貝也然古人豈以為玩好哉記曰天不愛其道地不愛其寶人不愛其情故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆在郊藪龜龍在池沼其餘鳥獸之卵胎皆可俯而窺也非是無故先王能修禮以逹義體信以逹順故此順之實也大貝之意豈以為此有德之君所感召者使人主知所警乎不然則石虎以芝為蓋麟駕車此妖耳何足寶也學者不可不知此義鼖鼓大鼓也考工記曰鼓長八尺謂之鼖鼓然則此所寶之鼓必有法度可貴故以傳示子孫也在東房者東序之房也又曰兑和垂皆古之工人製作精巧法度深密可為後世法者故傳寶之垂堯時共工則知兑與和皆古之工人矣西房西序之夾室也張氏曰周官天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之凡此示其為之先者能傳所寶為之後者能守所傳然則自越玉五重陳寶而下所陳先王之寶器也天數五地數五天地之所以成變化行鬼神不過於此則人得之以為德其數亦五而已所謂越玉五重者所以象德也大輅在賔階面綴輅在阼階面先輅在左孰之前次輅在右孰之前無垢曰大輅玉輅也綴輅金輅也賓階西階也阼階東階也面謂南嚮也先輅象輅也次輅木輅也孰釋宫云門側之堂謂之孰孫炎云夾門之堂也孔安國云先輅次輅皆北面頴達演其説曰孰前陳車必以轅內向故知左右孰前皆北面也孔安國又謂金玉象皆以飾車木則無飾馬融王肅謂不陳革輅者兵事非常故不陳之其説甚有理凡此陳設皆事死如事生事亡如事存之義使康王受顧命洋洋乎如成王在其上在其左右其敢以輕心聽之乎宗社之重不得不爾也張氏曰王之崩傳顧命於康王所陳之器所設之物非苟以為玩好而華國也蓋亦有義存焉是故設几之屬者以眀靜而居者有其道設車輅之屬者以眀動而行者有其道也至於一左一右一東一西或在房或在序莫非至理之所寓然則有天下而居之者其可苟乎二人雀辨執惠立于畢門之內四人綦辨執戈上刃夾兩階戺一人冕執劉立于東堂一人冕執鉞立于西堂一人冕執戣立于東垂一人冕執瞿立于西垂一人冕執鋭立于側階無垢曰禮云大夫服冕士服辨雀辨鄭康成云赤黑色如雀頭也惠鄭康成云蓋斜刃宜芟刈畢門路門也此衛門之士也綦青色戺堂亷也亷稜也四人綦辨執戈上刃夾兩階而立此衛陛之士也二人分守畢門兩廂四人分守東西兩階也又曰服冕大夫也自門而至階則用士衛自堂而至階則用大夫衛孔頴逹云以其去殯逺故使士為之以其去殯近故使大夫為之義或當也周官云大夫之服自玄冕而下士之服自皮辨而下是知服辨而衛者士服冕而衛者大夫近殯者尊故用大夫逺殯者卑故用士又曰垂盡也謂簷際也堂近壁垂近階東堂之外為東垂西堂之外為西垂立于階下者士也立于堂上者大夫也今執戣執瞿者皆冕可以知其為大夫而立于堂之盡處謂簷際也鄭康成曰戣瞿蓋今三鋒矛又曰側階鄭康成王肅皆以謂東下階孔安國以謂北下階上路寢之北將近內寢豈容有大夫執兵器立其階乎垂謂堂之垂階謂路寢之階也東下階阼階也宜有衛大夫為備也東坡云鋭當鈗説文曰鈗侍臣所執兵從金允聲周書曰一人冕執鈗讀若鈗其考證甚詳王麻冕黼裳由賓階隮卿士邦君麻冕蟻裳入即位太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮御王册命東坡曰麻冕三十升麻為冕蓋衮冕衮冕之裳四章獨用斧者以釋喪服告示變也王方自外入受命傳命者自阼階升則王當從賓階也又曰禮曰子張之喪公眀儀為志焉禇幕丹質蟻結於四隅殷士也鄭玄云畫禇之四角其文如蟻行往來相交錯殷之蟻結似今蛇文畫豈蟻裳亦為此文也歟君臣皆吉服然皆有變又曰太宗上宗皆大宗伯也彤纁也纁裳亦變也王與卿士邦君太史皆變服以示不忍之意緣先王之心吉服乃為天下計而凶服乃其心之所存形見於服者也方以天下為訃顧其服不得以私變時於衣裳之間微示其變焉此見其不得已也方喪其殯心摧膽裂而吉服以從事其得已乎其得已乎無垢曰孔頴逹取考工記為説曰圭尺有二寸天子守之鎮圭圭之大者介訓大也又曰大圭長三尺知介圭非彼三尺圭者典瑞曰王搢大圭執鎮圭以朝日玉人云大圭長三尺天子服之彼搢於紳帶是天子之笏不是天子所守故知非彼三尺之大圭也其意言今康王承嗣成王守天下故太保奉鎮圭使康王守之也同爵名瑁天子執之以朝諸侯太保承介圭使康王守天下上宗奉同使康王主祭祀奉瑁使康王冒諸侯其事皆重故由主階隮也又曰太史秉顧命之書隨康王後由賓階而隮也既隮乃進康王册命言成王命康王嗣有天下也余觀史官作書其作文之法有足為後世法者如太保太史太宗皆麻冕彤裳又曰太保承介圭上宗奉同瑁由阼階隮太史秉書由賓階隮使翰墨侔造化到此不能加損矣曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓無垢曰凡百所為率循文武以燮調和平天下大卞大法也文武大法何法也即文武宣前後哲王之光明見於安民教民使民習教聽用上之號令者是大法也其發於言語也謂之大訓其布之典也謂之大卞謂之大訓何以能臨君周邦謂之大卞何以能燮和天下大訓言其大體大卞言其大用臨君者大體也燮和者大用也能如此然後可以答揚文武之光訓矣張氏曰以上臨下謂之臨出命正衆謂之君臨周邦言其勢足以服人也君周邦言其道足以正人也臨君周邦之道在於率循大卞燮和天下用答揚文武之光訓而已王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威乃受同瑁王三宿三祭三吒上宗曰饗按此條經解永樂大典原闕太保受同降盥以異同秉璋以酢授宗人同拜王答拜無垢曰太保受康王所祭之同以降而盥手以異同實酒將以酢祭也孔頴逹曰祭祀以變為主不可即用王同故太保盥手更洗異同實酒于同中又曰璋半圭也酢報祭也王搢大圭執鎮圭以祭太保執半圭以酢祭降殺以兩之義也酢祭若亞獻爾孔頴逹云飲酒之禮稱獻酢者亦是報之義也又曰既酢祭告成王以已傳顧命之意酹畢乃授小宗伯以同而拜以致敬也王答拜者亦於殯所答拜言已受顧命之意也太保受同祭嚌宅授宗人同拜王答拜無垢曰召公冉受小宗伯同者將飲福酒也飲食必有祭其曰祭者祭先酒也謂祭先造酒也者示不忘本也曰嚌者飲福酒至齒而不飲也然則飲福酒吒嚌皆至齒而不飲何也曰尊神遽當之也可見古人不汲汲於榮利之意也又曰宅謂居其所也謂不移飲福之所而受小宗伯同而又拜以謝神所賜也王答拜者敬顧命之禮畢也大保降收諸侯出廟門俟無垢曰太保既畢事乃降自西階而有司收徹同爵器用也若乃綴衣及陳寶未葬以前不敢收也蓋以象其平生服用也此仁人孝子之意又曰諸侯出路寢門外以俟康王之命也寢門而曰廟門何也以殯宫而言也

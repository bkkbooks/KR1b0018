body:
  text: 尚書精義卷二十二宋黃倫撰説命下王曰來汝説台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯爾惟訓于朕志無垢曰嗚呼人不可不學如此高宗免喪弗言恭默思道夢賚良弼其所為蓋有大過人者既得傅説有霖雨金礪之説有啓沃瞑眩之説乃僚同心之説觀其語言節序皆入仁義道中此豈無所自哉今一聞傅説中篇啓沃之説與夫王忱不艱之説乃知力學猶未至也遂吐胸臆所得曰台小子舊學甘盤是知學力有淵源特未卒其業耳夫人之平生正在立志志王而王志霸而霸使宿昔之志一失其路則平生無可言者訓于朕志是使傅説指其踐履之路也嗚呼志者平生之基也其可不慎哉韓信之志志在萬家陳平之志志在宰天下陳蕃之志志在掃除范滂之志志在澄清雖有高下不同然皆有基地者基地正則天下受其福基地不正尚何言哉范氏曰仲虺之誥曰能自得師者王孟子又言今之諸侯好臣其所教人君若止能以所教之人為臣此不足以成功業若能以受教之人為臣必王天下臣其所受教者以受學之人為臣也高宗先學於甘盤後又學于傅説可謂好臣其所受教周公作君奭稱商之賢臣曰在武丁時則有若甘盤其後傅説本由甘盤之所啓迪是故周公止稱甘盤不稱傅説張氏曰昔雖學于甘盤而終無所明此所以有望于傅説者也以高宗觀之其未得説則能恭默思道及既得説則能克邁乃訓故其尊德樂道之誠有加而無已吕氏曰中篇説以精微之論告高宗高宗歎説之言乃曰旨哉説乃言惟服蓋覺其言深有滋味自以為天下之理盡于此矣及説復言知之非艱行之惟艱二句然後高宗方覺得旨哉之説自有無窮道理不可謂天下之理遽盡於此故又發問于説也至此高宗與説無非心腹説話云我舊學甘盤嘗經甘盤之煆鍊矣甘盤既不在其大成之功正賴説訓我之志成我後假工夫故曰爾惟訓于朕志若作酒醴爾惟麴糵若作和羹爾惟鹽梅爾交修豫罔豫棄豫惟克邁乃訓無垢曰麴糵無他用也專在作酒醴鹽梅無他用也專在作和羮其意欲傅説一意於高宗無他用心也專俟高宗念慮之失隨失而正救之幾微或失則有無窮之禍夫一日之間念慮億萬其得其失其幾亦億萬嗚呼其可畏哉此所以欲傅説交修勿放棄也交修者以言正救非一事罔豫棄者以言每事當正救勿放棄也嗚呼所以正救之者豈在言語哉古之教世子者所以必由禮樂禮自見中入樂自聞中入禮以正之樂以動之則邪心非意自然屏絶其中和之心自然發生矣故善言教者必曰樂所以修內也禮所以修外也禮樂交錯於中發形于外是故其成也儻高宗專以行其言為職則傅説亦不得不以交修為職大抵人情好順適而惡干犯高宗既以克邁自許矣是能於干犯中卜情性之病深墾而痛治之必期於堪所難堪受所難受而後已其志豈淺淺哉張氏曰大臣之事君道合則從不合則去苟高宗之於傅説不能從其道而行其言則説亦將棄之而去此高宗所以告之以罔豫棄而遂言豫惟克邁乃訓者也且高宗之於傅説迎之致敬以有禮言將行其言此説所以就之而不去又何俟於高宗之告哉吕氏曰酒醴未成之初則是米與水而已不得麴糵點化則米與水俱為腐敗之物惟是得麴糵以點化則米與水始可以成酒醴羮未和之時則是牲牢之物而已得鹽梅點化始變為和羮正如人之一身百性備具若親近得一好人以點化之則轉過資質也得會好若無人點化不過是天地間一物耳有高宗之聽而無傅説之言不可有説之言而無高宗之聽亦不可正如師之誨子弟師有成就學者之心而學者不能承當師之教誨不足謂之交修弟子有受道之資而師不善教亦不謂之交修惟有高宗之資質而得傅説之教有傅説之言而遇高宗之聽高宗與傅説共成一假好事故謂之交修豫夫我方期汝以交修之道則汝不可以我昏庸之故而固棄我也我今日方且勉進汝訓只怕爾不言我不憚行説曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪説攸聞無垢曰生知天理者億萬年中一人而已矣至墮於人欲者滔滔皆是也夫墮於人欲者亂亡之道也墮於人欲而不自量乃欲任心而行率意而往不以古聖賢為法不亡何待乎夫惟聖人既生知天理而又勉強學問故其立政立事皆足以為千百年基本高宗不欲為千百年之計則已如其欲之乃不以古聖人為準的非傅説所共聞也周範曰甚哉帝王之不可以不務學也其在易曰進德修業學以聚之問以辨之其在書曰若稽古其在詩曰學有緝熙于光明此帝王之所學也夏為天子十有七世凡四百三十有二年商為天子三十有一世凡六百二十有九年周為天子三十有六世凡八百六十有七年三代一千九百二十有九年其君以學見於經傳者唯禹湯高宗文王武王而已可謂至少也若夏之啓與少康商之祖甲中宗祖乙盤庚周之宣王康王皆有功烈見於詩書非學亦不能至也雖載籍闊略事逺難明然要之聖君少而庸君多故治日少而亂日多貴為天子富有天下苟不學則無聞於後人君可不勉哉范氏曰易大畜曰君子以多識前言往行畜德之大莫大于前言往行故能剛健篤實輝光日新其德人君鑑觀前古成敗治亂得失之迹所聞既多所學益富乃可施之於政若所知不博所聞不廣不知古今成敗則不足以立事張氏曰惟學然後能知道知道足以揆事端王人求多聞者天下之事其變無窮苟非所聞之該博則不足以建事夫前事者後事之師也能師古則治亂興廢之迹可以灼見吾將視其已成之效而循之然後可以為長久之計也吕氏曰夫人君多聞言學問之博故所聞之多非徒以助談柄為觀美而已大而至於立天下之大本經綸天下之大經彌綸天下之大化直至于贊天地之化育此所謂建事也蓋學問以事為實用不為虛設譬如人讀書非徒為利祿計在閨門則當孝于親在鄉黨則當順于長亦皆實用之學夫人既能體認得為學之實處則前言往行皆古人之陳迹體認而學之不容自已且古訓何不可學凡爾所學之事皆古人已做之事從而學之乃有所得若事不能師古欲求長世甚非説之所聞也惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺監于先王成憲其永無愆惟説式克欽承旁招俊乂列于庶位無垢曰遜志之路既開則德日新日日新又日新如汲井泉愈取愈有矣既入此幾不可失也當念兹在兹釋兹在兹處處在兹日日在兹時時在兹不以死生禍福富貴貧賤二其心則視聼言動皆無虛發而天下之道舉備於一身惟吾所用如何耳欲帝而堯舜欲王而禹湯顧何往而不然哉又曰學豈有止法哉始焉遜志者此學終焉教人者此學學然後知不足教然後知困知不足然後能自反也知困然後能自強也故曰斆學相長也然則教人者豈非學之半乎始也此學終也此學是終始常在於學矣典常也夫此學何學也即遜志之學也始遜志終遜志遜志之路可造堯舜閫域其間見聖賢作用蓋未易言也曽子得之名曰忠恕子夏得之見於灑掃子張得之悟於階席孟子得之發於徐行皆遜志中作用也儻於此路日復一日而又新則不知其身入於堯舜之域矣德修罔覺蓋謂此也此傅説直指高宗聖賢要路也其曰念終始者以謂不可頃刻放棄遜志也當言始終反曰終始者以謂終而復始蓋學無止法也遜志之學乃聖賢門中心傳之學也又曰夫此言先王指成湯而言也使高宗以成湯為準的則學必欲至成湯之地而後已成湯之學自何而始亦自遜志而始使高宗自遜志一路行之不已則見成湯之心見成湯之心則成湯之立政造事創法制度一一皆見其所自來矣又曰夫君臣之間學問既同則心志皆同心志皆同則其見識議論趣向取舍無適而不同蓋將不言而喻故高宗誠能如傅説之言學以遜志為本而遜志以成湯為準的則高宗凡有所為傅説無不欽承矣則以其學同故其幾同有不得而不爾者君臣之間相契如此然後傅説可以展盡四體不疑其所行而旁招四海賢能之士布滿朝廷矣倘人君不學而臣下遽欲旁招賢能之舉則上將有擅權之謗下將有朋黨之説矣是知臣下之事君倘人主學術乖異不可遽自招悔吝也舜之學與堯同故舜得施其所學禹之學與舜同故禹得施其所學伊尹之學與湯同故伊尹得施其所學下至管仲與齊桓所學同故管仲之學行矣商鞅與孝公所學同故商鞅之學行矣雖王霸不同邪正異路要之君臣之間未有所學不同而能為英雄聖哲之主也王氏曰遜順其志以受學則人樂于言而言易入又必以時而敏疾行之其所修者乃來矣謂所學之成乃如來也若不遜順其志則善無自而入若不時敏于行則所學者無自而成此二者所以必貴於兼之范氏曰斆教也教人之學益已學之半故曰斆學半學記曰建國君民教學為先人君欲教天下之人必自學學然後知不足教然後知所困知不足然後能自反知困然後能自強自知不足乃能進德不已人君欲教天下之人使皆為君子豈可不先學也常思念終始常在於學則其德進業修而不自覺王曰嗚呼説四海之內咸仰朕德時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜佑我烈祖格于皇天爾尚明保豫罔俾阿衡專美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民説拜稽首曰敢對揚天子之休命無垢曰夫風之于物雖無形色可見而披拂震動不言之中功用大焉與聖賢士君子處其氣類漸染鼓舞䇿勵亦何異於風乎有股肱然後成人有良臣然後成聖使股肱或虧安得謂之人良臣不出安能成聖人是以深知夫古之聖王所以能為天下萬世法者則以有賢臣為之左右輔相也今既得傅説則我所以入聖域者有其具矣夫人皆有仁義特患無以發起之耳伊尹以堯舜之道覺成湯使湯通體為堯舜又以堯舜之道覺斯民使四海之內無一夫不被堯舜之澤者是伊尹非特作我先王而已民與有焉惟伊尹之學如此所以能助祐我成湯格于皇天也夫所謂格于皇天者其意以為成湯無一毫人欲凡立政造事建法制度皆天理之自然者是移皇天之治于人間也傅説使高宗以成湯為準的而高宗亦使傅説以伊尹為準的伊尹佑烈祖格于皇天傅説亦當明保高宗如烈祖可也觀高宗此言其以一隅而明三隅也如此亦警悟矣其曰罔俾阿衡專美有商是欲商有兩伊尹其意豈不欲商有兩成湯乎立志如此則飲食成湯起居成湯寢處成湯動容周旋顛沛造次無不在成湯矣有如此資又有如此學又有如此師其不為聖人也幾希君得賢方乂賢得君方食以不義則不食臣於君義當食君之祿也故傅説未仕寧執賤役以供朝晡之給耳豈肯求不義之食乎高宗期傅説以保衡與夫綏民之説此天下之至言也此所謂休命也高宗揚此命于上以勉勵朝廷公卿傅説揚此命于下以勉勵在位庶僚使知為臣子者以堯舜其君堯舜其民為職此所謂對揚也夫人君揚之于上而宰相不知揚之于下則何以傳布四海感動人心變移風俗哉史氏曰夫為臣者莫難于致君而致君之道伊尹能自任莫先於愛民而愛民之心伊尹能自任莫大於格天而格天之誠伊尹能自任伊尹盡其道於己而成湯收其效于前甚昭昭也高宗之世適商道不振而一德之盛猶在人耳目崇願治之志成中興之業者其可不相勉以繼之於後哉是以説命終篇舉伊尹已成之效庶幾明保其治責傅説能繼之功使不自專其美如是而輔相之道盡矣張氏曰傅説之教高宗以惟學遜志至於厥德修罔覺則高宗之德可謂至矣君有至德于上則四海之內莫不仰君之德以觀化也然而高宗之德使四海莫不咸仰者實説之力也故曰時乃風風之為物鼓舞動蕩物賴之以生成也傅説之所以成就高宗者如此而已宜乎高宗所以歸美之也又曰昔先正伊尹之為保衡也能作成我先王之才先王固有聖人之才矣必待伊尹以作成之蓋湯嘗學于伊尹及其伐桀則與之戮力則伊尹之作我先王可知矣乃知豫弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時豫之辜此伊尹之念以天下之重為己任者高宗言此亦以伊尹之事望于傅説者也又曰惟后非賢不乂言君非賢則不治惟賢非后不食言賢非君則不食傳曰國以賢興以諂衰此惟后非賢不乂之謂也語曰邦有道榖邦無道榖恥也此惟賢非后不食之謂也吕氏曰夫四海仰德髙宗不歸之已而歸之傅説以此見高宗已得説遜志之道而説遜志之言已入股肱惟人如有手足方成得一箇人良臣惟聖如有良臣方成得一箇聖到此高宗一時放説不下蓋交修之功也昔先正保衡舉伊尹在成湯時居保衡之職興起我先王而尹自任之重至曰我不能致君為堯舜其心愧恥若撻于市㕓之間其辱莫大殆至一夫不得其所則又引咎歸己以為我之罪兩負君民之責一箇至誠廣大之心遂致輔佐我成湯至于與天為一所謂至誠贊天地之化育之意夫伊尹用心如此爾傅説于此當明白以一心事我無使伊尹專美于有商之家乃望之以伊尹之事使傅説不敢自止君臣相與以無窮之理斯亦交修之至至高宗既有德了尚且發出修身無窮説話其造理極矣傅説于此更無復可言于高宗者但曰對揚天子之休命而已高宗祭成湯有飛雉升鼎耳而雊祖已訓諸王作高宗肜日高宗之訓無垢曰高宗不聽傅説之戒而祀豐于昵是耳不聰也所以不聰者以其明不足以見理也雉以見不明之孽鼎耳以見不聰之過此祖己所以作訓以開𨗳高宗也胡氏曰天之於人其亦至矣人君有善則示之以休驗而使勸焉人君有惡則示之以咎徴而使懼焉高宗祭成湯有飛雉升鼎耳而雊祖己以訓諸王作高宗肜日孔安國以為耳不聰之異雊鳴也劉歆以為鼎三足三公象也而以耳行野鳥居鼎耳是小人將居公位敗宗廟之祀也鄭康成以為鼎三公象又用耳行雉升鼎耳而鳴象視不明天意若曰當任三公之謀以為政也孔以雉升鼎耳為耳不聰使雉在鼎足亦為足不良乎劉以野鳥居鼎耳小人將居公位是則用傅説為相學道于甘盤納祖己之訓其皆小人歟鄭以視之不明當任三公之謀以為政也則武丁夢良弼代豫言是不任三公之謀以為政邪三者皆不得雉異之實理余以為雉者羽蟲之孽孽之所作視之不明也升乎鼎者易曰巽下離上鼎元吉亨彖曰鼎象也以木巽火烹飪也象曰君子以正位凝命王弼以為革去故鼎取新取新而當其人易故而法制齊明吉然後乃亨故先元吉而後亨也是知武丁之善用人矣惟其政未能鼎新者也故祖己先言曰惟先格王正厥事言武丁雖賢而未知先代至道之君正事而易故法制齊明也武丁既祭又肜而豐儉不均故祖己訓之曰嗚呼王司敬民罔非天胤典祀無豐于昵雖祭而豐昵不均也不均則不恭不恭則不肅故雉異見于宗廟是不能知聖人烹以享上帝又不能大烹以飬聖賢是以雊于鼎之耳者提耳以告之視之不明故也吳孜曰大抵一事失則五者從之耳且雉小禽豈能為異於國邪聖人存此者蓋責人事之不修也且當祭祀之日而有野禽在宗廟中旁若無人而雊鳴之言其荒寂之甚也若傳記楚幕有烏春秋書鸜鵒來巢蓋皆責人事之不修人事果修則災不能為害人事果失則瑞不能為福吕氏曰大抵變異之來皆是天之所以警戒人君就中却有兩種一種是人君無道昏庸暴虐人怨神怒大干隂陽之和上天亦卒急未降災變如此等災異常來得遲到得有道之君道德純備至誠充塞天地情性稍有一毫不治天便把災異來警他如此等災異常來得速何故無道之主所做事非道天與君已自隔絶了至其殘民害物已甚容赦不得方才有災異其災異必不小有道之主與天一而無間天與君已自相通或少有不與天相似處天即降災異此亦些小災異如高宗是也高宗恭默思道是明哲之聖人高宗與天已相似祭祀之過於厚觀過知仁亦非高宗之大病何至於飛雉便升鼎耳而鳴災異來得如此速即知天與高宗混融和同默相往來一有些小病處天便以警高宗後世惟楚莊王知得此意莊王無災異而常恐懼曰天其棄我乎以此知天不以災異警人君必是棄人君高宗肜日高宗肜日越有雊雉祖己曰惟先格王正厥事無垢曰高宗肜日重復言之者何也前言高宗肜日此史官名目篇章也次言高宗肜日以謂於肜日有雊雉之異也蓋野鳥入廟之變非細事也其變自王心而來無此心則無此變先格王心則變自消矣張氏曰夫天之於人君有一不善則出怪異以譴告之及其不知改又出災害以警懼之凡以使之正其事於未然之前而已陳氏曰格正也祖已之意謂天示變異當先正心王心正然後可以正其事吕氏曰格至也已到先王地位或遇有這般災異但只就身上點檢天之所降災異不關他事必己身中有不到處祖己教高宗自去身上點檢故教以消變之方乃訓于王曰惟天監下民典厥義降年有永有不永非天夭民民中絶命無垢曰義理之所在天之所在也故順義理者其年永悖義理者其年不永非義理之外别有一天也當其順義理時是即永年也其悖義理時是即夭絶也然則天之視民等如一子豈有厚薄哉豈不欲人之壽登百年哉奈何其悖違義理自中絶其天年乎然而顔淵順義理而夭盜跖悖義理而壽祖己之言果如何曰人之生也直罔之生也幸而免論人之生皆以直道非直之生幸而免耳如盜跖雖生其神魄已自淪於幽冥雖生實死耳顔淵雖夭其淳風懿德雖千古而常在誰謂其夭哉則是祖己之言猶在也吕氏曰天以至公無私蓋視下民常主於義民之高下長短善惡壽夭咸其自取天何嘗容心於其間能合天之義便能順受其正能安天命如此年便永不能合天之義便不能順受其正不能安天之命如此年便不永民有不永年者非天固欲夭民使不永年中間自絶了天命大哉乾元萬物資始其初天皆欲使民得壽考到中間私意橫生不能保守天命以此便絶天命民有不若德不聽罪天既孚命正厥德乃曰其如台無垢曰夫有義者永年不義者絶命天之命其必信如此其禍福曉然欲使天下人人自正其德以永年也使若順德以行常在永年之地服罪以改不陷中絶之域即是順天以行也祖己既言天命必信如此乃謂高宗曰吾之言天命如此王無疑也其如我言以為警戒乎吕氏曰民有不順天德私意橫生嗜欲膠擾敗喪天命其不順天德如此民之罪何所逃而乃不去自訟傲然不受天之罪方居窮思難恥過作非遂過不悛謀辨解説日入於文過飾非之地殊不知天既已信其命正其德了如何改易大抵福善禍淫此乃天命天德天既信此命正此德民之不若德不聽罪者自當受天禍民雖多方計較欲回避此禍然天既如此了又豈可遷就民亦枉費了許多計較看既之一字則知夫民要遷就亦不得民要回避亦不得民不知天既如此了方且曰天其如我何看此書之作乃是祖己以高宗祭祀致豐而作而書中所言都不及高宗身上事即舉民以為言其言若緩而不迫蓋高宗是明哲之聖人目擊而道已存固不待祖己諄諄之告語嗚呼王司敬民罔非天胤典祀無豐于昵無垢曰夫王者之職專主敬民修人事而已至於祭祀自有常典安可昵鬼神以求福而不以敬民為職也哉以敬民為職則知所先後矣言自成湯以至小乙無非嗣天者也其常祀自有制度豈可出私意而豐于昵乎祀豐于昵是過也非惡也天乃戒懼之如此是知高宗之德上與天同天愛之如此也東坡曰或者乃謂先王遇災異非可以象類求天意獨正其事而已高宗無所失德惟以豐昵為過此乃諂事世主者言天人本不相與欲以廢洪範五行之説豫以為五行傳未易盡廢也書曰越有雊雉足矣而孔子又記其雊於耳非以耳為祥乎而曰不可以象類求過矣人君於天下無所畏惟天可以警之今乃曰天災不可以象類求我自視無過而已矣為國者之害莫大於此豫不可以不論胡氏曰七世之廟皆祖也常祀皆冝如禮不可獨豐于近廟蓋據時有此過而言也張氏曰夫祖考無非天嗣也故其祭祀之禮莫不有典不可豐不可殺高宗之祀特豐於近是亂其典矣祀典既亂此祀之所當正也吳氏曰傳謂特豐於近廟非也且祭祀豐年不奢凶年不儉此篇亦無豐厚之文但以祭之失因戒之耳故當以豐為風字言其風化於近以及逺也

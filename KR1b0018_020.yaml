body:
  text: 尚書精義卷二十宋黄倫撰盤庚中盤庚作惟渉河以民遷乃話民之弗率誕告用亶其有衆咸造勿䙝在王庭盤庚乃登進厥民曰明聽朕言無荒失朕命張氏曰君民之勢疑若甚逺而不相侔也盤庚之告必登進之則不壓之以勢所以密邇之而欲其親已也明聽朕言者欲知上之意也無荒失朕命者欲其勤上之事也嗚呼古我前后罔不惟民之承保后胥慼鮮以不浮于天時無垢曰既聳動之矣則又嗟嘆以感激之曰古我先王前後相傳以心者無他事焉惟民之承敬而已何以敬之蓋民至愚而神也至弱而强也即天之聰眀與明威也敢不敬乎惟君以敬民為心而民亦以保君為心要之終於一心而已同氣而異息同心而異形相與同其憂慼之事以觀天時之徃來東西南北惟天時之從浮言之義槩可見矣故天時在亳則遷于亳天時在囂則遷于囂天時在相則遷于相天時在耿則遷于耿其敢有私意者哉其敢有倡和險膚傲上從康者哉吕氏曰我先王蓋順從民民一有所欲先王未嘗不順從之先王順民如此民亦不敢違我先王故保我先王而與之同其憂以此君民之情便通惟君民之情通故我先王為事天時既至便隨天時而為之浮隨也殷降大虐先王不懐厥攸作視民利用遷汝曷弗念我古后之聞承汝俾汝惟喜康共非汝有咎比于罰無垢曰是殷降大虐先王不以懐亡為念而必遷也然而其遷豈快耳目之娯便心志之適哉以民為心而已視民之所利在於何地則隨民所利而遷之汝何不念我先王之徳所以聞於後世者無他以敬民為心而已惟以敬民為心故有喜樂康寧之事則使汝共享之今我之遷以此邦將有蕩析離居之憂而亳殷又有喜樂康寧之事故不敢違先王敬民之心挈汝以遷都所以避害而就利也非謂汝有罪犯當受逺謫之罰也不知汝何若而不肯遷乎患至而後思禍來而後悔亦無及矣張氏曰商之先王遭天所降之毒虐不得安其居處於是不敢以舊邦為懐故湯至祖乙逓遷則其不懐可知矣厥攸作視民利用遷者言其所作視民所以便利則從而遷矣予若籲懐兹新邑亦惟汝故以丕從厥志今予將試以汝遷安定厥邦汝不憂朕心之攸困乃咸大不宣乃心欽念以忱動予一人爾惟自鞠自苦若乘舟汝弗濟臭厥載無垢曰今我所以如此呼汝等懐此新邑者非謂我求耳目之玩便心志之適也惟汝等之故欲使汝喜樂使汝康寧大從汝之本志耳民之本志欲喜樂欲康寧今此耿邑將蕩析離居使民憂而不喜廹而不康然而下民見不及逺識不到微反違其心志之所欲非先王有以指示則是坐視斯民趨而之死地也舟所以濟川也新都所以圖安也乘舟而不肯濟川則所載之物皆為臭腐有新都而不肯徙則生生之具皆為棄物張氏曰籲和也籲兹新邑者以遷於此為和也懐歸也懐兹新邑者以遷於此為歸也上浮於天時下順於民事此之謂若率籲衆慼使之惟喜康共此之謂籲朕及篤敬恭承民命永地于新邑此之謂懐盤庚之所若籲懐兹新邑者亦惟汝民之故以丕從厥志而已吕氏曰若乘舟汝弗濟臭厥載此蓋已在道路中民尚有遲疑不肯遷之意盤庚恐其遲疑則至於害事故多所譬喻以告曉之謂今之遷都正如乘舟一般乘舟須是便渡不可遲疑若遂遲疑而不渡必將臭腐其所載之物矣爾忱不屬惟胥以沈不其或稽自怒曷瘳汝不謀長以思乃災汝誕勸憂今其有今罔後汝何生在上無垢曰不屬者不相接續也進聞我諄諄之言則有遷意退受小人聒聒之論則又懐安如此豈有他事哉原汝之病所以如此者止據目前之安不謀長久之計不思災患之來是大相勸趨於憂慼之地而已孟子曰不仁者可與言哉安其危而利其葘樂其所以亡者其盤庚之士大夫乎其誕勸憂之謂乎止欲為今日之安慿愚就短而不知改不復聽上之號令終以不寤非陷於刑辟則陷於患害其死也可立而待復何得生在人上乎張氏曰君以民為體臣以君為心則民屬於君者也今爾衆民不以誠信而屬君則與携貳矣故至於違上之命不適有居此所以沈陷於禍患而莫之或知也又曰常人之情貪朝夕之安不虞患害之在後是不謀長以思乃災故不遷也適所以勸憂而已勉進之謂也相勸以善則有可樂之道今不謀長久之計以思其災害其為禍莫大於此是之謂勸憂者也吕氏曰忱誠也屬聮屬也惟其信盤庚不可不遷之心與安土重遷之心兩者交戰故信盤庚之心不相聮屬盤庚言汝若信我之心不相聮屬汝惟相胥沉溺於水中也今其有今罔後汝何生在上言遷都機㑹不可失今遷都只有今日後將無日汝若不乘今日便遷汝將為水圮壊連汝生業如屋舍如畎畆盡為水所圮壊矣如何有留得生業在上面今予命汝一無起穢以自臭恐人倚乃身迂乃心予迓續乃命于天予豈汝威用奉畜汝衆無垢曰臣民聽上號令此本心也本心則一不知聽上而唱和險膚此二三其徳也一徳則言可道行可樂而遺芳千載矣二三則言為無根行為不道是遺臭萬世也小人欲為姦者必倚民之身以為重迂民之心使從惡其心以謂一心不足以動上故鼔動衆人呼吸羣類以逞其姦必欲得志而後已盤庚故諄諄告誡使遷新邑以迎續民命于天其心可謂仁矣夫唱和險膚摇動國家使商鞅當此必曰腰斬使李斯當此必曰族誅然盤庚乃方亶其有衆登進厥民丁寧辛苦若父兄之訓子弟豈以刑戮威之哉方將奉養斯民置於喜康之地吁以刑罰驅民者乃鞅斯之學以訓誨待民者乃先王之道也張氏曰夫物成則馨香敗則臭穢馨香人之所愛也臭穢人之所惡也民不聽上而惟胥以沉則其為惡莫大於此故告以無起穢以自臭然而民之不聽上命蓋亦在位之人無以率之故也陳氏曰民愚無知恐有倚其身使不直迂其心使不正不直則身亡不正則心亡内外俱亡汝民亦淪胥而死矣我將𨗳迎接續汝之正命使汝胥正以生豈以遷徙之事威虐汝輩乎奉此事以畜汝衆而已予念我先神后之勞爾先予丕克羞爾用懐爾然無垢曰予所以不忍用威刑以治汝罪而奉養汝衆者以念我先王曽勞勤汝先祖同成此大功業汝實先正子孫我當念舊不忘是以大能用進汝於士大夫之列方且誠心訓誥以懐來汝心庶幾回心易慮同此遷都之舉汝知其所以然乎吕氏曰言我之所以遷者我蓋念我先神聖之后已曽慰勞爾之祖先了我先王前日既慰勞爾之祖先今日烏得而不羞養爾蓋前日之民便是後日之民我之所以遷都縁要懐安爾故如此我若不要懐安爾我又何苦如此失于政陳于兹髙后丕乃崇降罪疾曰曷虐朕民汝萬民乃不生生暨予一人猷同心先后丕降與汝罪疾曰曷不暨朕㓜孫有比故有爽徳自上其罰汝汝罔能迪無垢曰儻我順汝之意而不遷權柄在下綱紀倒植是失于政也儻我隨汝之意而不遷懐安懐土不知避害是陳於兹也則我先王在幽㝠之中將大降罪疾曰汝何故怯懦而失於政汝何故愚暗而陳于兹使萬民坐受此患禍之虐乎是我之遷畏幽㝠之中鬼神之見誅矣我不遷則鬼神降罪疾於我夫得罪於人君尚可辯説以逃罪得罪於鬼神雖有辯如儀秦巧如恭顯其能解免乎是知聒聒之策正可以欺人而不可以欺天也張氏曰生生者進進之謂也夫物生則進而大故生有進意汝萬民不從我以遷是不能與我進而同心矣夫民之所為既不與君同心則是不能比輔其君者也古我先后既勞乃祖乃父汝共作我畜民汝有戕則在乃心我先后綏乃祖乃父乃祖乃父乃斷棄汝不救乃死兹予有亂政同位具乃貝玉乃祖乃父丕乃告我髙后曰作丕刑于朕孫迪髙后丕乃崇降弗祥無垢曰古我先王既與汝祖父同其勞苦以安養斯民汝今為我養民之官亦當與我同心如汝祖父之於先王可也今乃不能繼汝祖父養民之心而汝包藏賊心以害斯民今乃坐使民趨於死地而不顧非賊心而何蓋汝祖父與我先王相為安危者也我先王見汝如此用心故將降罪罰于汝以安汝祖父汝祖父亦欲安先王故斷汝而不収棄汝而不録不救以安國家汝乃趨於死地矣至於此時雖悔何及張氏曰亂政者治政之臣也同位者與之共天位也亂政之臣當以徳義事其上今乃務足於貨寳則是懐利以事其君者為人臣者懐利以事其君於是安土重遷以非義為民之唱其罪莫大乎此夫幽㝠之塗雖若異致然鬼神之情狀其與人不殊人之所好彼則從而福之人之所惡彼則從而禍之盤庚之遷始告之以人事既不聽從於是又告之以鬼神之事蓋亦因其俗之所尚而𨗳之者也嗚呼今予告汝不易永敬大恤無胥絶逺汝分猷念以相從各設中于乃心無垢曰不易者蓋言一定之理不可改易也順之則有福逆之則有禍汝當永敬我言無或中惰當大恤我言無或輕忽庶幾汝心變易上下情通億萬人之衆若出乎一家遐荒僻陋之逺若處于一堂而無相絶逺矣夫上下之情不通則為否上下之情通則為泰又曰蓋人之心本自明澈萬里森然惟舍此以合浮議則此心陷於浮議中而顛沛錯亂不可復反儻分其心而不為浮議所摇則能從吾遷居之長計而吾之中道見矣夫人心本中但一陷于偏陂則其中蔽且迷東西者㸔斗柄逃空虛者喜足音世皆偏陂儻非賢君為之指南則中道何由而見今臣民能聽盤庚之言則心安平中道見矣張氏曰分者使之别其善惡猷者使之謀其從違念則思之而不忘也惟能分别善惡而後能謀之得其當而後能念以相從矣設中于乃心則無依違顧望之累而惟義是從能惟義是從則知向之不從以遷者皆違義矣吕氏曰我告爾不易永敬者教之敬於久勿敬於暫大恤者教之恤其大勿恤其小當時人見盤庚舉其先祖父以教我誰不知敬後復為安土重遷之心惑亂則敬心去了如此乃是暫時之敬非久長之敬當時人顧惜貨寳而憚於遷徙是但恤其小者到得被水患圮壊雖性命亦不可保是恤其小而不恤其大也又曰設中于心庶幾不失之偏民受天地之中以生人誰無這箇中何待於設孟子説道是求其放心而已心何用求求生於敬中何用設惟是民見得傍一邊不見這一邊便偏了此心而不是中烏得而不設乃有不吉不迪顛越不恭暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑無垢曰盤庚遷于新邑正欲丕變弊俗一登于先王之世使人人有士君子之行豈容有凶殘小人得與於其間哉使凶殘小人得聞此戒姦心消縮善心油然盤庚之所願也張氏曰不能順命則為不吉不能循道則為不廸顛則不能以自立越則不能以守中不恭則不能以欽上柔聚于外而為姦剛窮于内而為宄乃有不吉不迪顛越不恭則暫遇姦宄其罪之輕者則劓之其罪之重者則殄滅之蓋其教之之篤則其刑之之重不為過矣以謂不如是則無以威之使畏而事無由濟矣吕氏曰今日過這一縣眀日過旁一縣謂之暫遇是這般時節姦人易得因此為姦宄他平日所以不敢做姦宄者必謂人識我姓名住處容易捉得所以不敢至别暫遇處必説是我暫時䖏此縱我做姦宄眀日便去矣又誰識得我又如何捉得我此是道路之大病故盤庚須要仔細根治徃哉生生今予將試以汝遷永建乃家無垢曰謂自今以徃各務為生生長久之計永使汝父子兄弟夫婦上下熈恬康樂與我國家同享安樂也史氏曰勞於從事者天下之常情巧於誘民者人君之智術自湯至於盤庚遷都者八而見於經者有五斯民䟦渉於深險奔走於寒暑提挈抱負區區怨怒至是而懐土重遷蓋其常情無足怪也盤庚於是可不巧為誘掖之説而動其不回之心哉言自今之遷都立家室一勞而無忤一定而不改生聚於斯當不復為前日之紛紛矣誘掖至此豈智術之得已哉盤庚下盤庚既遷奠厥攸居乃正厥位無垢曰盤庚既到新都晝參日景夜考極星以至相其隂陽觀其流泉以定官府萬民之居矣國家一新民居一變向來衰敝之風奢侈之俗亦一掃不見蹤跡矣然後可以興治化而變易民心焉吕氏曰此是已到新邑時乃安民之所居正厥位是分都邑立宗廟等事夫定宗廟非小事何故在奠民居之後蓋盤庚之遷為民而遷故纔到便使民就安穏處此亦見得盤庚先民故也綏爰有衆曰無戲怠懋建大命今予其敷心腹腎腸歴告爾百姓于朕志罔罪爾衆爾無共怒協比䜛言予一人無垢曰既遷而奠居正位矣乃安慰衆人曰汝等當敬以立身勤以厚生無或戲怠當勉為生生之計以安以養以葬以祀立此大命也惟不戲慢則能建此大命惟不怠惰則能勉此大命盤庚上中二篇以刑罰儆勵臣民今既遷矣敷心腹腎腸者展盡底藴曰汝無自疑汝前有罪我今一切不問汝等無或懐疑共怒相與協比興䜛賊之言於我也我今明白告汝罔罪爾衆日前之過矣汝等其各自安土乎又曰蓋天下之亂莫大於下有疑心懐恩疑代宗而作亂龎勛疑僖宗而作亂敬塘疑從珂而作亂而囘鶻之亂定於子儀之一言廷湊之亂定於韓愈之一言則盤庚之推誠竭志真知治之本矣張氏曰綏如車之有綏車之所恃以為安也故綏有安意盤庚之遷非擾於有衆將以安之而已此之謂綏爰有衆戲則不恭怠則不勤無戲者欲其恭乃事也無怠者欲其勤乃職也惟能無戲怠然後能懋建大命大命在天懋建者人而已懋者勉之使大也建者抗之使立也今盤庚披肝膽露情素而告之以其志盖将以率之而已罔罪汝衆者言我不以爾向之不告朕與不宣乃心為罪而罪之也我既無罪於爾則爾亦不得共怒協比䜛言於我則當一意以奉上而共怒協比䜛言宜不可為也吕氏曰大抵未遷止要得通逹不通逹如何得他曉正遷時止要得嚴肅不嚴肅如何得他不生變已遷時止要得撫綏不綏撫如何蘇得他勞損困弊故盤庚上則命衆悉至于王庭欲得其通逹中則使之勿䙝在王庭欲得其嚴肅後則綏爰有衆欲得其撫綏此見其處三節皆得當處教他不可戲狎怠惰各思自勉為萬世子孫長久之計古我先王將多于前功適于山用降我凶徳嘉績于朕邦今我民用蕩析離居罔有定極爾謂朕曷震動萬民以遷肆上帝將復我髙祖之徳亂越我家朕及篤敬恭承民命用永地于新邑無垢曰先王將立美功於耿都豈意水患為災民皆動蕩分析離其居處或東或西或南或北罔有定所乎是天意不欲商家都於此地也夫人事即天意非人事之外别有天意也先王依山為居遷徙都邑以降凶災於人事亦至矣而又有蕩析離居之患生於不意人事如此天意可知斯固不遷是逆天也此所以順天而又遷焉以天意如此故我與篤厚肅敬之臣恭謹承奉斯民之性命用長久居于此新邑所以如此者上當天意也張氏曰適于山者遷而適于山則依山以為居所以防其水泉沉溺之患也能遷以防患則民得以安其居然後可以驅而之善民善矣則吉徳升而凶徳降故曰用降我凶徳夫然後嘉美之績可以興於朕邦也吕氏曰昔我先王將欲増多前人之功當遷即遷徃于山山即髙處髙處無水患此所以降下了凶徳居于髙則凶徳自下去此是因地勢而言所以能成美功于其邦肆予沖人非廢厥謀弔由靈各非敢違卜用宏兹賁無垢曰夫理有是非則謀有臧否使一聽衆人之謀不惟理之所在其成其敗則曰非我之罪此衆人之謀也如此則君道亂矣苐謀之臧者用之謀之否者置之至於退有後言險膚胥動有所不能免也非特不廢人謀也雖鬼神亦不敢不敬焉卜鬼謀也人謀鬼謀既皆以為當遷矣故我宏此賁飾之法以起肅敬之心以策怠惰之志以除弊惡之風以新耳目之觀而布新化用舊人丕變前都之習俗使奢侈縱恣之萌不復著見而恭儉勤勞之惠油然而生則是遷也其意豈不偉乎張氏曰弔由靈者至誠用善之謂也非特不廢於人謀至於鬼神之謀則亦在所不廢故曰各非敢違卜者卜之既吉則可以遷矣其遷也將以大此朝市廟社宫室賁飾之事也嗚呼邦伯師長百執事之人尚皆隠哉予其懋簡相爾念敬我衆無垢曰外有邦伯諸侯内而師長公卿以至内外百執事之人其見吾心如此既已遷都不念舊惡一切不問自今以徃其皆庶幾體吾本心勿復以私僻之見自外於我也又曰念此民而不忽敬此民而不慢此正盤庚之心也使邦伯師長百執事之人與上同休戚則必念敬我衆民矣審有如此人吾將勉擇賢者以相助為此念敬之事蓋風俗弊壊為惡者衆有一人以民為心則羣起而攻之浸潤膚受必使其去乃已非人主有以扶持之其亦何所恃乎儻君能擇賢者助之則有唱有和有左有右而其志得施民於是而安俗矣簡相之義人主儻為君子計似不可一日而忽也張氏曰懋者所以勉之也簡者所以擇之也有以懋之則不隠者在所勸有以簡之則不隠者在所黜非特懋簡爾又且左右以輔相之故不忠不良之人固不得以沮毁之朕不肩好貨敢恭生生鞠人謀人之保居叙欽今我既羞告爾于朕志若否罔有弗欽無總于貨寳生生自庸式敷民徳永肩一心無垢曰人主之磨礪風俗要當示所好惡所惡者利則小人退所好者義則君子進盤庚新遷亳都將以一新風俗其可不明示好惡之所在乎如此則向來弊俗耳目一變安得不革心從善改過自新君子道長而為泰通之世乎總聚歛也前既曰不任好貨之人此又曰無聚歛于貨寳則知盤庚之時風俗之不美也夫為士大夫垂紳委珮在人之上而好貨殖財風俗如何醇厚禮義如何不消殞乎士大夫倘能永任一心以事君而無二三其徳則民徳不期而自敷矣一心則誠二三則偽誠則唯知君父而已天下利勢曽不足亂其胷次此二帝三王之臣所以為事君之要路也

body:
  text: 尚書精義卷三十二宋黄倫撰武王既喪管叔及其羣弟乃流言於國曰公将不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公無垢曰管叔周公之兄蔡叔霍叔周公之弟天下之至親者莫如吾兄弟也周公大聖宜兄弟之知其心矣今乃流無實之言以害周公豈人之情也哉曰周公權太重也成王幼弱周公專制天下剖斷萬機雖名曰臣其實行君之事其迹似可疑也則流言之起不為無名矣周公平昔用心兄弟宜知之矣曰不然唯聖知聖唯賢知賢心志既差識趣絶異凡情俗態安能知聖賢之所存乎為兄弟而不知以其心不同也而又何怪乎此亦聖賢之不幸者也公将不利於孺子此所謂流言也嗚呼何待周公之薄哉曰此以凡俗見周公不以周公見周公也指成王為孺子則天子幼弱可知矣夫殺管叔降霍叔囚蔡叔乃先王之心也使周公懐一毫私意以害兄弟其何以見先王乎所以告太公召公我儻以私意不致辟於三叔我将何以告我先王乎以此知周公之心乃先王之心先王之心乃天下之心而天下之心乃天心也居東二年乃始能殺管叔囚蔡叔降霍叔亦可謂強大矣東征時雖告成王成王不能不惑於流言而以周公為可疑既有疑心則成王安敢不從周公之請乃若其心盖以三叔為忠臣而以周公為簒賊也周公既誅三叔則成王疑愈深周公所以作鴟鴞之詩以遺成王成王盖莫之悟也其心方欲責問周公征誅之罪特以兵在公手未敢顯然形於語言耳吕氏曰武王既喪亡後事非是一時但史臣欲把周公始終合為一篇管蔡及羣弟流言於國非是周公待他不至自是他質資卑下以小人之心量聖人且四凶在堯朝至舜時乃露其惡態四凶元不是好人至舜之時罪不可掩耳管蔡之在武王時不聞其變至周公時乃如此其質資卑下遇事則發我之弗辟我無以告我先王見周公之不得已處此見舜之待象與周公之待管蔡其事雖異而其心則一何者象之欲害舜不過是舜之一身當周公時成王幼安危之機正决於此宜誅之秋大熟未穫天大雷電以風禾盡偃大木斯拔邦人大恐王與大夫盡弁以啟金縢之書乃得周公所自以為功代武王之説二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予沖人弗及知今天動威以彰周公之徳惟朕小子其新逆我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歳則大熟無垢曰夫雷風之異何自而來哉自成王心中來也心疑忠聖凝結成象故為雷為電為風以變常也如周公忠聖成王信之任之政事一聽之此常也成王有常心則為天清為地寜為和氣為太平安得有雷風之異成王信小人之言疑周公欲為簒賊此心之變常者也成王變常則為雷為電為風以見災異矣夫禾民藉以為命大木根蟠本固未易摇動也今禾偃木抜尚使人驚駭况如周公天下恃以為命其忠聖豈可一日而摇動哉王見天變怛焉恐懼故皮弁素服以見純實之意且啟金縢求占騐之書乃得周公代武王之冊嗚呼成王本無心求此書周公本無心留此書為後日計然而䜛謗由此而明盛徳由此而著然後知天人之理全在無心處耳使成王有心求此書則無風雷之變使周公有心留此書則是姦人偽士為身謀巧計豈足以致風雷之變哉故君子當盡其所以為臣子之道天人之理昭昭然不可誣也太公召公未見此書自知周公忠誠矣然當成王疑貳之際欲開釋辯明乎則恐成王疑其為黨也欲置而不問乎又豈仁人君子之用心哉困心衡慮欲因事乘機發明久矣特未有其㑹耳今忽見此書其事濟矣猶恐成王未悟也乃倡率成王使問諸史與百執事先言二公後言只此史官明著二公倡率之意也諸史謂當時告三王時作冊文者百執事謂當時告三王時奔走給事者當周公代死時本無一毫顧慮為後日心特欲武王安為天下計耳其事秘宻當時為史者百執事者亦皆一時忠信確實之人不如是周公不使與此事也既而周公戒之此事當秘宻不可宣露於人則此史官與此百執事者奉此勿敢言之説周旋於此罔敢失墜故雖見周公被䜛終不敢宣露以明周公之忠誠盖其意以謂周公生死乃臣子常事而宣洩所戒乃為不可倚信之人不可倚信亦何以為人哉故寜視周公之死而不忍宣洩其言也噫者不平有恨之聲也其不平有恨謂何謂周公命我勿敢言而我言之是負周公也周公既誅管蔡未敢遽歸以待成王之悔悟也既而風雷之變在上禾木之災在下金縢之書顯其忠諸史百執事證其説成王乃知聽流言之過而求自新之路矣自新當有其實衮衣繡裳以逆周公且曰我國家待賢之禮宜如此非過也夫成王向以流言而暗今以風雷而明過而不改是謂過矣過而能改天下仰之成王亦未可輕也以衮繡迎周公以玉幣謝天譴出郊所以謝譴也誰謂天道逺哉向也雷電以風今也雨而反風向也禾盡偃今也禾盡起大風反風盡偃盡起特在成王疑與不疑之間耳疑則變異如此不疑則為瑞如此然後知天止吾心而已矣無求諸髙髙蒼蒼之間也是以人主當先治其心伊川曰成王者是中才之主也如天大雷電以風而啟金縢之書成王無事而啟金縢之書者何耶盖二公之道如此欲成王悟周公耳或謂祝史何為藏之曰或焚或埋後之制也盖上古未有焚埋之制欲重其事故藏之金縢以久其傳耳曰然則武王有疾弗豫而周公乃冊祝請代武王可謂知命乎曰周公誠心只欲代其親何暇知命臨川曰然則大雷電以風與乃反風而史書之何也曰周公之所以得迎者以雷電風之變也其既迎之也則變復而嵗大熟人莫不以迎周公為是而當天意也則史可以勿書乎孔子以鬼神為難明而記曰疑事無質吾以天之變為周公也則是質之也以天之變為成王也則是亦質之也故善為史者是可書也而不可以質之也張氏曰夫天人之理其致一也故民之所欲則天之所欲是天之聰明因民而已且周公之居東也西人欲其歸則曰公歸不復於汝信宿東人惜其去則曰無以我公歸兮無使我心悲兮夫周公之得人者如此則其得天者可知矣武王崩三監及淮夷叛周公相成王将黜殷作大誥無垢曰周既滅殷分其畿内為三國詩風邶鄘衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監盖謂管蔡輔武庚以監此殷民也不謂管蔡因武王崩乃與武庚同叛而又挾以徐奄兵革四起周公之心以為害在武庚耳使殺武庚絶其本根則管蔡徐奄不攻自破矣此周公相成王所以當此機㑹専以黜殷為心也孔子識此心故聖筆獨標之曰周公相成王将黜殷而不及管蔡也吕氏曰武王既已滅商不忍商無其後故立武庚禄父于衛又恐其叛故使管蔡霍叔監其國故謂之三監及武王崩周公攝政為三叔者却挾連武庚及淮夷以叛然此序不言武庚叛乃言三監叛者盖此叛生於三監之謀欲害周公孔子聖人灼見其情故筆之於序獨言三監及淮夷叛其一字之貶有春秋誅賞之法周公相成王将黜殷作大誥者盖武王初崩成王㓜小周公居可畏之地内而三監有不利孺子之言外而武庚挾商之怨扇摇周室安危存亡之機在此周公大誥萬方明諭厥㫖方行天誅大誥所以作也大誥王若曰猷大誥爾多邦越爾御事弗弔天降割于我家不少延洪惟我幼沖人嗣無疆大歴服弗造哲迪民康矧曰其有能格知天命無垢曰猷謀也謀黜殷之事大誥多邦及三卿御事之臣将徵其兵以行也盖御事者諸侯謀議之臣故誥諸侯必及御事三王之盡人情盖如此周公潤色成王之意為此罪己之言曰天弗憫弔周民降屠割于我家不少延武王之命使我痛苦無極也武王既死大惟我㓜童人乃今繼此無疆大歴服也歴天命也服人事也夫我幼沖尚弗能深造知人之哲收賢才開道民於吉康之地况能感格深知天命之所在乎以言民事易見尚弗知所以安民之術况天命難測其能深識幽明之理乎張氏曰爾雅曰猷道也止而有守作而有就一作一止無非道也周公之誥多邦與夫御事非妄作也本夫道而已吕氏曰當時叛周不過淮夷三監今大誥多方者何故盖當天下初定人情未安其時乍革商為周天下亦未能曉然舉知天命所在加之三監扇動為變恐其為亂不止於三監淮夷所以大誥多方之諸侯及諸侯御事之臣先開他志諭以天命從違之意使其心下釋然曉悟則不至變生肘掖然後周公方出東征此周公討亂規模後世人君討亂本只是要討一處後來絲牽繩聨他處皆亂者只縁不能明告其衆耳且如唐有藩鎮之禍徳宗初討田悦後來王武俊李希烈之徒相繼而叛只縁徳宗不是天討不能告諭萬民故伐叛未幾而叛者相繼惟周公誠意已孚於告諭之時天下信周公者有素此乃鎮定萬方之本後雖東征三年之久而天下如故者由周公先有以鎮定之也己予惟小子若涉淵水予惟往求朕攸濟無垢曰既自念弗能造哲以迪民康又不能知天命其心茫然不知為計故嘆曰已乎我小子耳今嗣無疆大歴服如涉淵水欲罷不能欲進不可姑勉力前往求所以濟難之道耳涉淵無舟楫不可濟此艱難非人其可乎吕氏曰大率人君固當抑畏亦當自強兩者並行方能有濟若不抑畏以天下不足平則失之輕忽必不足以立事若徒然畏縮不求所濟之道只是一箇畏懦不能立事之人所以成王説若涉淵水一句便往須求攸濟道理亦是知天命也敷賁敷前人受命兹不忘大功予不敢閉于天降威用寜王遺我大寳龜紹天明即命無垢曰武王之所以取此天下皆邦君御事之力也邦君御事之功亦大矣我将於人事天命敷大之賁飾之則於邦君御事之功其可忘之哉今将謀誅三監所以不敢忘邦君御事之功而大誥諸侯共圖此功也天無心也福善禍淫殖有禮覆昏暴皆人自取耳故淫者必禍昏暴者必覆天之降威常在人為之後天子代天以行威者也今三監之惡理取誅戮天威明明如此我何敢以私意閉絶此威容惡縱姦以取怒於天哉所以必當征之也易曰天生神物聖人則之神物則大寳龜也寳龜能傳天命之吉凶故武王以此龜遺子孫使知天之明而繼之命之所在而即之東坡曰當時謂武王為寜王以其克殷寜天下也下文曰乃寜考知其為武王舊説以為文王非也曰前寜人者亦謂武王之舊臣也張氏曰人之不勝天久矣又况君之於天猶臣之於君臣之拒君命為逆則成王之於天威非所敢拒也故於是用寜王所遺我之大寳龜以卜知天意夫大龜神物也足以前知故能紹天之明而吉凶可預見吉凶之形既見夫然後知天意之所趨向而順之知天意之所背避而違之此所以能即天之命也王氏曰文武皆能安寜天下故謂之寜王是寜王者兼文武而言若寜人則又兼文武之臣而言也言寜考則謂武王耳吕氏曰古者大而天下小而一國皆有寳龜以鎮守國家若有大疑則卜之所以繼天之明命即此可以知天命之所在也夫聖人将舉大事必有定見何故只信龜卜非是聖人亦自見得不定也盖聖人至誠齊戒神明其徳以騐之於龜而龜者又至誠無私與聖人之心相協此天命不易之理非後世技術之卜也曰有大艱于西土西土人亦不靜越兹蠢殷小腆誕敢紀其敘無垢曰小國殷蕞爾武庚其地其人如此爾乃不量力不度徳大敢求續前人之敘以再王天下真取死之道也兵家以氣為主故其言不嫌於鄙薄吕氏曰武王崩便是有大禍難于西土西土之人亦憂懼惶惑於此時三監蠢動作亂武庚恃其國小小富厚便欲復商家之正統乃紀其敘之謂也成王言此者説武王既㓕商商之社稷已隳矣宗廟已絶矣於己隳已絶之中乃扶持而立之是武王有大功於商今武庚不知我武王扶持他於隳於絶之中乃大敢紀其敘敢之云者言其無所忌憚妄為僣亂欲復商之舊業而再為天子夫紂為大惡武王不得已而伐之其伐紂之後武王又不忍其無後即武庚而封之在武王者亦可謂恩徳周緻矣今武庚輙敢紀其敘言其不知恩徳如此武庚如此用心天所不覆地所不載成王此言所以説病源也天降威知我國有疵民不康曰予復反鄙我周邦今蠢今翼日民獻有十夫予翼以于敉寜武圖功我有大事休朕卜并吉無垢曰武庚之叛必乘間而起今所以起者以三叔流言於朝骨肉之間自為疑間民心震動是周家有疵也故因此而叛焉不言三叔流言而曰天降威者起無根之言亂朝廷之治此天所以誅罰而降威也以言叔之罪天所不赦也其辭如何曰予當復有天下為中興之君反以周邦骨肉危疑為可鄙也今四國起兵天下驚駭而蠢動起兵之明日四國民之賢者有十夫焉知武庚無道必敗惠然來翼我周家以撫慰寜王之武事而圖伐叛之功也周公謂我方舉兵以伐叛而有十夫來翼是周家之美事也人事既爾卜之鬼神卜又并吉并吉謂三龜並以為吉也三龜即三兆之法也天意人事如此其伐四國成功必矣盖武王方死人心摇撼而又仍之以流言之變武庚之變非周公安定其心據人事天意以為必勝之䇿則事未可知也古人遭變其安定乃如此則夫輕愠易喜數驚易摇者安足以議天下事乎東坡曰漢髙祖討陳豨至趙得四人皆封之千户曰吾以羽檄徵天下兵未有一人至者吾何愛四千户不以慰趙子弟乎此亦周公之意也黄氏曰天下之變莫大于新造之後易世危疑之際彼其抵巇竊發固未足以敗吾天下而其所憂大者特在於天下觀望以為去就夫天下各懐去就之心則其變不止一國亂不止一人也自武庚之叛周書大半為商人作而大誥専為周人逺之庶邦近之大臣若皆去周即商而其不叛者特十夫爾嗚呼是豈天下皆叛而十夫獨忠也哉方危疑之際人懐去就周公盖逆探天下之微而奪其欲去之心天下之心奪而商人之黨孤矣張氏曰夫得天在乎得民得民在乎得賢盖天之視聽從民民之去就視賢民獻十夫予翼則天與之民歸之可知矣吕氏曰大率聖人觀天命只就賢愚上看不就衆寡上看反鄙我周邦人若甚衆十夫來翼人若甚寡就衆寡論時商民實衆十夫實少若就賢愚論時商民雖多皆蚩蚩無知之衆若知天命之賢人來雖十人已足見得天命人心並歸周家了所謂反鄙周邦都不足道肆予告我友邦君越尹氏庶士御事曰予得吉卜予惟以爾庶邦于伐殷逋播臣爾庶邦君越庶士御事罔不反曰艱大民不靜亦惟在王宫邦君室越予小子考翼不可征王害不違卜無垢曰盖古人無愧於幽㝠幽㝠信於我故我亦信於幽㝠洋洋乎如在其上如在其左右故我凡一卜筮若與鬼神合堂同席相與議論者卜而得吉是議論以為可也鬼神以為可則何往而不可卜而得凶是議論以為不可也鬼神以為不可則何往而可此古人所以必信於卜也後人平居負於幽㝠者多矣非特不我信而我亦不敢必信於幽㝠其顛倒思慮傾邪心術誠安在哉古人責人常輕責己常重四國之叛必我有以致之豈可恃兵誇武以罪諉人而不思責己之道徒快意於一戰乎此心二肆小人得志君子無立足之地矣秦皇漢武率此道也觀周公之意頗以吉卜十夫為恃似有輕敵之心故庶邦君越庶士御事無不荅周公曰四國之難甚大豈可輕哉當先責己可也宫室皆深邃之地以言四國皆叛民之不靜乃吾屋漏暗室中失徳過行之所形見也誠諸中形諸外豈可欺哉考求也翼敬也邦君及庶士以民不靜在王宫邦君室耳則四國之叛豈可責之他人周公當輔成王以求敬之道於慎獨之間以率邦君亦求敬於慎獨之間以率天下㣲之顯誠之不可掩則干羽舞而有苖格考翼盡而四國歸豈可畧不思責己之道而遽以征伐為事哉且夫武王倒載干戈包之虎皮示不復用今肉未及寒乃遽以干戈為事何耶王曷不違卜以盡求敬之道乎吕氏曰周公言天人之心並依卜兆又卜如此了方敢告諸侯及尹人庶士御事説我已得吉卜則爾衆當奉我一人伐逋亡播蕩之臣此是周公敘初征與諸侯商量時節盖根本之禍乃在天子之宫諸侯之室須自省徳澤之未深教化之未至刑政之未孚初不在武庚一人之身是當時諸侯只教成王自反自反其敬未可出征伐雖龜卜如此分明然且當自反何不違卜肆予沖人永思艱曰嗚呼允蠢鰥寡哀哉予造天役遺大投艱于朕身越予沖人不卬自恤無垢曰周公以謂成王聞邦君御事艱大之言不靜之説亦長思其艱而歎曰嗚呼信乎舉兵行師摇動天下使鰥夫寡婦有思子之心其哀矣哉是則周公虚心下意聴邦君御事之言而不敢以其説為不當矣然權其輕重緩急動衆乃一時之小害而弭亂乃天下之大利我為天子為人所驅役東西南北當聴命于天天今遺我以四國之大事投我以四國之艱難我以𦕈然一身當此驅役其敢以汝衆責己之言委四國不問其罪乃斂然退而求敬而任其自猖獗以遺天命哉其理不得不聴十夫及寳龜之言以往征也張氏曰夫勞民以征伐則於民不能無撓而鰥寡尤在所可哀盖以鰥寡之民為無告故也予造天役遺大投艱于朕身言鰥寡雖可哀然予造天役則其興師動衆豈己之所欲為哉造為也不卬自恤者成王自言我幼沖之人非自恤也其所恤者在於寜考所圖之功所以見其往伐之意上則承天之命下則成於寜考圖功非出於一己之私故也吕氏曰盖人君代天而有天下無非供天之役今日之事我當深造天役又况到大艱難之事委在我一人之身盖言武王既喪而天役則在我天下至大之責亦在我一人之身况王者以萬民為子若坐視而不救之是廢天役自我也則我今日豈敢為身計言不敢自恤也義爾邦君越爾多士尹氏御事綏予曰無毖于恤不可不成乃寜考圖功已予惟小子不敢替上帝命無垢曰邦君御事識此公義見我當此大艱時則當安慰我曰無過憂勞此大艱之事當勉力往征不可不成武王所圖定天下之功也毖勞也如此則於義為得矣今乃使我求敬違卜以義觀之則為失當矣周公當衆論疑貳之際乃獨以義觀之聖人之見其造化乃如此大矣哉帝命髙逺何從而知所以傳帝意者寳龜也卜龜而吉是上帝欲征之也不從卜之言是違上帝命也上帝其可違乎張氏曰毖慎也無毖於恤言無慎於征伐之憂也征伐雖曰大事在所可恤然将欲成寜考所圖之功其涉危難故不足恤矣夫靜一天下者寜考所圖之功也為之子孫者當繼嗣而成之今三監及淮夷叛苟不能征之則寜考圖功或至于㡬成而敗矣卜征而吉則征之者出於上帝之命也然則天命其可以廢棄之哉昔湯之伐桀曰予畏上帝不敢不正武王之伐紂曰予弗順天厥罪惟鈞盖亦以天命之不可替故也吕氏曰天人並應卜又吉邦君之衆又都回心則上帝命我分明我𦕈然一小子既荷上帝之命如此豈敢替上帝之命言必往伐矣天休于寜王興我小邦周寜王惟卜用克綏受兹命今天其相民矧亦惟卜用嗚呼天明畏弼我丕丕基無垢曰武王所為上當天意故天美之何以見美之之實哉自小邦諸侯一旦振起之使有天下是也武王何以當天意耶曰惟卜是從耳以其取天意於卜今我安敢以邦君之言遽疑卜筮以拂上帝而悖先王乎此所以不可不征也天示吉卜令誅四國又遣十夫令誅四國誰謂天窈𡨕難測哉其威命明明如此可不敬乎夫商道不衰何以見髙宗四夷不叛何以見宣王漢無昌邑之變則無以啟宣帝唐無宫閫之變則無以啟明皇由此觀之則四國之亂乃天所以弼我周家積累之業也張氏曰易曰探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹莫大乎蓍龜古之聖人建大功成大事未嘗不用卜也夫寜王之所有天下莫如天命以其惟卜是用今我之征伐亦惟用卜則我之所為有以合於寜王若然則三監淮夷之征其可已乎天道無私其彰有徳甚明其討有罪可畏三監及淮夷之有罪在所宜誅則我周家世世修徳為天所弼可知矣積而大謂之丕丕者言其積之大也周之基業肇於太王而成於文王此所以謂之丕丕基陳氏曰在昔上天休我文王自小邦而有天下未嘗敢違卜以至於安受天命今天助我民况我敢不用卜哉天之命昭然可畏我既不敢違卜汝亦宜順天而輔我大此大基也吕氏曰天顯道可畏所以艱難禍變乃是天栽培弼助我丕丕無窮之基業正如孟子所謂故天將降大任於是人也必先苦其心志所以動心忍性増益其所不能畏之者乃所以弼之也大抵為國者多成於憂患亡於治安人君須知此乃是大欲輔成君徳不可自沮

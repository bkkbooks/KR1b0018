body:
  text: 尚書精義卷四十七宋黄倫撰康王既尸天子遂誥諸侯作康王之誥林氏曰昔高宗宅亮之際王庸作書以誥今康王既尸天子遂誥諸侯高宗亮陰二祀而恭黙思道康王在位而無所事故曰既尸天子宜乎楊氏曰古者無功而受禄謂之尸禄夏書數羲和之罪曰羲和尸厥官五子之歌又曰太康尸位以逸豫則尸之為言非善辭也明矣仲尼序康王之誥曰康王既尸天子遂誥諸侯作康王之誥然則尸之一字其說在於譏喪禮之所由變也商書曰王宅憂亮陰三祀周書曰作其即位乃或亮陰三年不言論語曰何必高宗古之人皆然君薨百官總已以聽於冢宰三年而康王居父之喪既已延入翼室恤宅宗則當委政於冢宰亮隂而不言方合乎古之禮何則乙丑成王崩越三日丁卯命作策度越七日癸酉王麻冕黼裳入即位太史秉書由賔階躋揚其策命之辭王再命興而受之固已異於古也雖然於是乎亦可以遂不言矣而復出在應門之外稱予一人以誥於四方羣臣既皆聽命相揖趨出方釋冕而反喪服噫所謂亮陰不言之禮無以異於此乎曲禮曰凡在喪王曰小童春秋既書王猛居于皇及其沒也止書王子猛卒以其未踰年也則天子踰年稱王明矣今聖人序其誥之首曰康王既尸天子遂誥諸侯得非譏喪禮之所由變乎吕氏曰禮有正有變三年除喪朝於廟之時所謂進戒於嗣王則是禮之正到得方在喪服中以請諸侯進戒則是禮之變成王之詩所謂敬之嗣王朝於廟是禮之正也如太甲成湯既沒太甲元年伊尹作伊訓祠於先王奉嗣王祗見厥祖侯甸羣后咸在此是禮之變何故太甲正是未除喪之時有敗度之漸伊尹恐太甲不能保天位所以用變禮進戒也自古有變禮有正禮後世論康王之誥引晉不見諸侯以為晉尚能守禮之常而已康王之誥王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乘黄朱賔稱奉圭兼幣曰一二臣衛敢執壤奠皆再拜稽首王義嗣徳荅拜無垢曰畢門之外為應門之内者以畢門有殯宫乃廟門也廟門則殯宫為主不可以見諸侯故孔安國謂出畢門立應門之中庭南面也孔頴達曰出在門内不言王坐諸侯既拜王即荅拜復不言興知立中庭南面也又曰太保召公時為西伯故率西方諸侯入見畢公太師也時為東伯故率東方諸侯入見師保職位自有高卑今以太保為首何也時召公為冢宰孔頴達云北面以東為右西為左入左入右隨其方為位也其訓甚明不事穿鑿又曰賔指諸侯也孔頴達謂天子於諸侯有不純臣之義故以諸侯為賔其訓甚當天子為主故諸侯稱賔稱舉也舉所奉之圭并馬幣進而言曰一二臣為國之衛者敢執土地所出以奠見也一二臣言諸侯也又曰既致壤奠乃皆再拜稽首以獻焉稽首者孔頴達曰九拜一曰稽首施之於極尊故為盡禮也其説甚當為王之義當繼先王之徳以為諸侯主今諸侯以誠歸我以先王望我故荅其善意而拜之者尊先王也義嗣徳三字乃史官立此意也林氏曰自西方來者宜入其左自東方來者宜入其右以明人臣事君莫敢固有所以自便坤之六五黄裳元吉者言臣事也斯干之詩曰朱芾斯皇者言臣道也康王於此釋服而接諸侯於是屈至尊而荅拜荅拜者徳也張氏曰易曰牝馬地類行地無疆故以馬喻臣布乘則陳者四馬也黄則物色朱則人朱而已有駜之詩曰駜彼乗黄則黄出乎自然者也宋公取白馬而朱其尾鬛則朱出乎人為者也馬必以黄而黄有中順之色則黄者臣之道也飾必以朱而朱有含陽之色則朱者君之道也諸侯體臣道而從君令故黄而朱之以示其不敢以有已也又曰王義嗣徳荅拜言王以釋喪接諸侯之入而嗣先王屈至尊禮諸侯之徳諸侯之見天子皆再拜稽首王不敢以尊大自居而荅拜焉此所以為徳是徳也先王之所常行而康王繼之故謂之嗣徳太保暨芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢協賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命林氏曰保莫大之業者必在乎恭敬成前人之功者莫先乎厎定前人所以貽厥後人後人所以紹前烈者不外此道也言皇天改大邦殷之命命我文王順天大道以安恤西土之民言西土者言其創業之初也惟成王受其成法紹有令緒興大利除大害去其殘虐保定厥功對揚至大之休建立可久之業施及子孫無有窮盡之期豈不艱哉今康王小子固當若涉淵水罔求於濟夙興夜寐慄慄危懼出入起居罔有不欽可不敬之哉然國之大事在於强兵故當張大六師之衆嗣成文武之命壯我國威張我王畧無忝前日之功斯可也吕氏曰繼體守成之君多不知憂患太保之戒所以先及此者即怕康王但見富盛宴安而已新陟是新升遐之成王亦猶今人言物故畢協是一賞一罰無有不當所以能戡定厥功誅武庚伐淮夷踐奄惟其如此所以大遺後人無窮之休論成王能敬迓天威則盛徳事亦甚多何故獨說賞罰葢此正為太子自齒胄之時入學所以師保輔相相與正戒凡道徳性命之説告之熟矣惟賞罰治道乃天下之事恐未曾熟所以進戒首言及此王若曰庶邦侯甸男衛惟子一人釗報誥昔君文武丕平富不務咎厎至齊信用昭明於天下則亦有熊羆之士不二心之臣保乂王家用端命於上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人無垢曰進戒不及於諸侯而止言召公芮伯報告不及於召公而止言侯甸男衛頴達以為互相見此足以見為史者之尚簡嚴也又曰召公等言成王以罰賞定功欲康王以六師保命而康王報告乃曰文武時天下太平且富不以咎罰人為務平謂君子小人各當其分富謂耕桑衣食各足其願夫君子在位小人在野天下之民穀足乎腹衣足乎體而君上無淫刑濫罰以擾動天下想見文武之世天下和樂矣且召公等方以賞罰六師為言而康王以平富不用刑為對其見識超邁存養淵深表裏相符内外相協真刑措之主歟又曰蓋天下之理窮則天下之機來無不知之矣記曰齊之為言齊也齊不齊以致其齊也是齊謂心不外馳孟子曰有諸己之謂信是信謂徳充乎已文武之時天下平富刑罰不用果何以致哉以文武底至足以待天下之變齊信足以感天下之心用此故能至天下平富刑罰不用而盛徳大功昭明於天下也又曰熊羆之士奮其勇力不二心之臣效其忠赤豈以殺人為事哉保乂文武之徳化而已惟上下各以徳為主所以用此直心命於上帝而日月星辰各順其道天不敢吝神器付與文武四方之民使之安養也康王之見何其逺乎又曰皇天既付畀四方文武自謂不能獨治乃命建諸侯樹藩屏以保衛後之子孫焉所建所樹皆當時賢者故今諸侯子孫得繼先公之業而為一國之君以為藩屏焉其可不盡心以保乂我國家乎林氏曰夫恃一己之聰明以致治則視聽不及資衆賢之智畧以致治則邦家自定先王之臨蒞天下後王之嗣守大業豈外是哉有天下者莫强於得人莫不善于自任既得其人與之共治則天下其有不安國家其有不乂乎昔宣王之時任賢使能如申伯如仲山甫如韓侯或為相或為將或為諸侯如方叔如吉甫如召虎或征蠻荆或伐玁狁或平淮夷想其當時將相之臣與百執事莫非忠正之臣則號為中興其所以賴者此也及觀周公之立政觀其告戒之際亦無非以用人為先今予一二伯父尚胥暨顧綏爾先公之臣服於先王雖爾身在外乃心罔不在王室用奉恤厥若無遺鞠子羞無垢曰人臣無己以人主為己人臣無心以人主為心以人主為己則身在外而不以在外自棄以人主為心故心在王室而不以王室為逺凡所念慮凡所議論凡所興建凡所號令凡所趣㑹皆若在人主之左右而對人主之清光也其敢少怠乎康王言此亦可謂知臣子之道矣又曰葢諸侯順道則王室尊榮諸侯不順則王室羞辱以一二伯父之賢豈尚有此曰仁義何常之有蹈之則為君子背之則為小人此康王所以儆飭之而使戒懼也吕氏曰維持天下不在威令而在恩意恩意是真維持天下之具爾今日来臣我乃是繼爾先公臣我先王之臣亦能安爾先公之臣見得諸侯不當私有其國爾今日来臣服王室不是服事康王乃是服事先王文武成王爾其言服於先王見得康王不敢私有天下康王所以言先王先公者葢自堯舜禹湯以来都有公共意思此康王所以不敢認為己有也羣公既皆聽命相揖趨出王釋冕反喪服林氏曰禮既成矣揖而退之其一進一退或止或出皆俟揖者所以明為臣之義必聽命於君而不敢專也張氏曰王釋冕反喪服者以冕服而見羣臣所以致其為君之道也反䘮而居憂所以致其為子之道也君臣父子之道人倫之大者不可以獨隆亦不可以偏廢康王於此兩得之矣康王命作冊畢分居里成周郊作畢命無垢曰頑民居於洛之外邑謂之成周以頑民所居尹成周者特重其任故以周公君陳畢公為之葢所以調治頑民使之心服而向化也周家於頑民一事亦可謂盡心矣意謂頑民服則天下安頑民動則天下危其巧深思智所以調䕶之亦至矣張氏曰古者大事書之冊康王命畢公承周公君陳之後以保釐東郊亦國之大事也此所以命作冊焉畢命惟十有二年六月庚午朏越三日壬申王朝步自宗周至於豐以成周之衆命畢公保釐東郊無垢曰惟康王十有二年六月三日庚午朏於朏三日壬申康王晨朝徐徐自鎬京至於文王之廟告文王命畢公保釐東郊也鎬京宗周也豐文王廟所在也張氏曰葢成周之衆周公師保之於其始君陳分正之於其中畢公之時則其治成矣不有以析而治之則美惡混淆而民不畏慕然則畢公之治將欲克成厥修不可不保釐之也吕氏曰康王就文武廟發大命以成周之衆命畢公保是一箇綏養懐撫釐是一箇整頓分明各有條理然又當總二字先後㸔之論其治先包容後分别雖分别前後然保養意思不散所以謂之保釐言其釐自保養中出王若曰嗚呼父師惟文王武王敷大徳於天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷於洛邑密邇王室式化厥訓既厯三紀世變風移四方無虞予一人以寧無垢曰古之人主其不忘祖宗有至於是也葢夏氏自有夏氏祖宗商家自有商家祖宗周家自有周家祖宗三代祖宗各乗時制作皆縁民心之所向而為之法度商之子孫已不同夏氏法度周之子孫不同商家法度葢斯民目所見耳所聞者周家法度也心所知身所履者周家法度也雖堯舜盛帝禹湯顯王於吾何有哉昔光武入洛父老泣曰不意今日復見漢官威儀則一代祖宗法度安可輕議而變易之乎變易祖宗法度是變易民心也變易民心是變易宗社也康王拳拳於文王武王敷大徳受殷命為言葢尊祖宗也尊祖宗如此敢變易其法度哉又曰有一代祖宗必有一代宗臣周公周家宗臣也故言祖宗必言周公非尊周公也尊祖宗也況周公左右先王文武以安定天下者哉其可忘之耶又曰天子不自安以天下之安為安天下亦不自安以一夫皆得其所為安國家天下既安矣獨殷民未服焉殷民未服天下安乎天下既未安人主能安乎故化殷頑民既歴三十六年頑民父子亦已一變父子相代善惡不同其風亦移殷民既變移是四方無可憂之事矣殷民變而四方安則人主安矣林氏曰觀此則周公之功可謂大矣周公之心可謂勤矣以王室之親託肺腑之任輔文武以起業贊成康以守成經營締構知無不為及至治殷頑民使之宻邇王室則威强易以鎮服聰明易以檢察徳教易以漸染仁義易以漸摩終至澆漓化為醇厚暴悍革為善良人人有士君子之行者豈無自而然也且殷之頑民非遷於洛邑則亦未遽化也何則天下之勢有逺近人君之治有先後近者親而逺者疎京師先而諸夏後惟周公之心無商周之間彼此之心一視而同仁此其既没之後使人懐思如是之甚也吕氏曰教民之道以政刑驅之所感固淺以號令諭之所及亦不深惟遷在洛邑聲名文物之地使之日漸月漬自然淪於肌膚浹於骨髓無有不化其訓何故有楚大夫之子以一齊人傅之衆楚人咻之如何㑹得齊語若教商民則在他舊地便使周家有勤勤告戒亦不過一齊人傅之惟遷於洛所謂引而置之莊嶽之間數年雖日撻而求其楚不可得也惟引他在文物之地使之化亦不知也周公遷頑民到此已三十六年矣父子相繼為一世世變是換一畨人風移是舊染沉湎之風都變移了此一句要㸔王者必世而後仁雖是聖人相繼出教化亦必乆於其道而化成道有升降政由俗革不臧厥臧民罔攸勸東坡曰始則遷其頑者而教之終則擇其善者而用之周之於商人也可謂無負矣夫道何常之有應物而已物隆則與之偕升物汚則與之偕降夫政何常之有因俗而已俗善則養之以寛俗頑則齊之以猛自堯舜以來未之有改也故齊太公因俗設教則三月而治魯伯禽因俗變禮五月而定三月之與五月未足為遲速也而後世之盛衰出焉以伯禽之賢用周公之訓而猶若是苟不逮伯禽者變易之患可勝言哉惟公懋徳克勤小物弼亮四世正色率下罔不祗師言嘉績多於先王予小子垂拱仰成無垢曰畢公為人於徳懋勉無一毫之怠克勤小物無一毫之過正色率下無一毫之邪如此等人使在民上端嚴莊敬有如父師之尊神明之重正禮所謂民瞻其顔色而弗敢争也望其容貌而民不生易慢者也一言之處誰敢易之又曰畢公弼亮四世其美功積累著在朝廷亦已多矣凡其為君制禮作樂立經陳紀無不自其禆贊措畫者天下太平防微杜漸成憲舊章無不畢具康王無可施為者苐垂衣拱手仰成於先王而已斯實畢公之力也林氏曰居大臣之任者以徳行為先化天下之人者在聲色之可尚常人之情於斯四者未始或無然罕有能臻其至者葢功不足以報國忠不足以輔君但可立名於一時而不能垂裕於悠乆惟公弼亮四世功加後裔故能勉其行徳能勤小物其徳行為可嘉矣尊其瞻視行其法言其聲色為可尚矣終至勲在王室藏諸盟府與國家相為終始與日月争其晝夜致一人垂衣拱端靖無為而享其成功矣王曰嗚呼父師今予祗命公以周公之事往哉旌别淑慝表厥宅里彰善癉惡樹之風聲弗率厥典殊厥井疆俾克畏慕申畫郊圻慎固封守以康四海無垢曰異善人所居之宅里使為善者顯在人上則好善者安於為善行惡者恥於為惡矣非特如此而止也又當以爵賞彰其為善者使在士大夫之列以刑罰癉其為惡者使受市朝之撻立揚善之風以鼓舞其性情立揚善之聲使傳聞于遐邇皆先王造化斯民聳動之術也若為善者無所恃為惡者無所憚悠悠冉冉卒淪胥以敗而入亂亡之中矣是以康王於太平之後而有表異風聲之說也其逺矣哉又曰表厥宅里曰此善人君子也如此則是宅里之間獨此家為善人君子而其餘皆非也如此亦可深恥矣尚猶有弗率吾教訓典常者豈可已乎此又有造化焉殊其井田疆界明言其為黨惡而不與善人君子之列焉林氏曰化天下之俗者當明善惡為先革當時之弊者尤在勤沮為本善不長則惡不消是非混淆可否無别欲民之向化也難矣又焉能救當時之弊乎惟能别頑民之善惡表善人之居里於善則著之於惡則病之於是又因其善惡立之風聲使之振動警戒其尤不率者又當殊井疆以處之使之畏辱而慕善又當堅固封疆之守備以安四海之遺民非惟商民安而天下之民舉安也張氏曰畢公之治與周公同故命之以周公之事者使之循行之者也旌别淑慝淑在性慝在心及其色形而成名於外故謂之善惡旌别其淑之與慝則善惡分而不相殽雜矣表厥宅里者言於善人之宅里必表異之則善者顯矣表厥宅里所以彰其善者也善者彰則惡者病立之風聲者以彰善癉惡猶未足以勸沮之故又立之風以鼓舞之而使之莫不振動立之聲以播告之而使之莫不聽従然猶有不率訓典者則是其惡積大終不可教也故又殊厥井疆以處之使之不得與善者雜焉禮記曰不變移之郊不變移之遂此弗率訓典殊厥井疆之謂也其所以如此者葢亦使之畏慕而已畏者欲其惡惡而不為也慕者欲其慕善而為之勸也政貴有恒辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉無垢曰孔頴逹云紂使師延作靡靡之樂靡靡者相順従之意紂拒諫飾非惡聞其短惟其靡靡相隨順利口㨗給隨従上意者以之為賢商人效之遂成風俗而東坡曰予以書考之知商俗似秦俗葢二世似紂也張釋之諫文帝曰秦以任刀筆之吏以亟疾苛察相髙其弊徒文具無惻隠之實以故不聞其過陵夷至於二世天下土崩今以嗇夫言辯而超遷之臣恐天下風靡凡釋之所論則康王以告畢公者也其説甚詳故并録之然至畢公時利口之風猶在未盡絶也畢公必能辨之何則惟公懋德則足以起人之誠心克勤小物則足以止惡於未然弼亮四世則飽諳時俗之變矣正色率下則非心邪意一皆散矣虚譁亡實阿諛苟且之態其敢復萌乎此所以知畢公必能辨此也林氏曰治必有先理由不異政者正也以仁為本以義為基不在崖異斬絶之行甚髙難行之理持一道以常行不恱於須㬰而厭於悠乆行於朝夕而忽於嵗月使民優游漸漬遷善逺罪而不自知易曰聖人乆於其道而化成則知政貴有恒也辭者發言之端也意盡而言之者天下之至言也言之而意不盡者天下之浮言也苟欲使民曉然知利害之所在而無惑於紛紜豈在多人旁搜指東為西而求異乎易曰吉人之辭寡則知辭尚體要也

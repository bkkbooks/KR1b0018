body:
  text: 尚書精義卷三十宋黄倫撰六三徳一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克無垢曰所謂三徳者發于正直剛柔之間皆中其節乃皇極之用自然如此也無皇極又安有三徳哉正則無邪直則順理剛克者其剛過人也克勝也嚴威儼恪端居廟堂可畏而不可犯彊梗不順之人其有不心慴而氣沮乎是故號之則聴令之則止柔克者其柔過人也温顔愉色開慰誘掖使其知善之可樂而徳之可慕是故吉良之人皆安於為善而無所沮喪且平康之人用正直待之正直者非剛非柔萬世常行中和之道也如舜詢于四岳闢四門明四目達四聰咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人此皆待平康之人萬世常行正直之道也非剛柔之偏勝也彊謂彊禦弗友謂弗順如此等人當以剛待之如舜流共工于幽洲放驩兜于崇山竄三苖于三危殛鯀于羽山此待彊弗友以剛克也是流放竄殛乃天理也豈舜私意也哉燮謂和燮友謂順理如此等人當以柔待之如舜命九官稱禹治水之功稱皋陶明刑之功此待燮友以柔克也三徳之用舜兼備之富氏曰王者行洪範九疇則彝倫攸敘故先五行次五事用八政協五紀建皇極至于皇極則治道成矣治道既成則君常執中以為徳聖人慮其執中而無權權所以適其變通也又曰敢問沈潛剛克髙明柔克何謂也曰沈者深沈之謂也髙者髙大之謂也俾人君深潛剛徳于内大明柔徳于外外其柔則其下愛而親之内其剛則其下畏而服之故泰卦泰内陽而外陰内健而外順為君子之道也髙氏曰徳本也本無剛柔亦無正直然人有殊習時有殊尚可剛則剛可柔則柔可中則中凡因彼而已裂一為三聖人應世之迹也有剛有柔又有剛柔之中交相治焉張氏曰道生一一生二二生三道之生也以三而成至其變也以三而復是故在天則有陰有陽有隂陽之中在人則有剛有柔有剛柔之中天之消息盈虚雖不同不過是三者之相代君之云為雖不一不過是三者之迭用惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒無垢曰惟辟作福柔克也惟辟作威剛克也惟辟玉食此萬世常行之分此正直也若非滿朝平康人君方且憂皇之不給何暇玉食乎三徳之柄不可在臣下也使人臣而用柔克以作福用剛克以作威用玉食以奉養天下止知有權臣而不知有天子張氏曰惟辟作福者言柔克之見乎政也惟辟作威者言剛克之見乎政也作福作威人君之權也有其權必彰之以其禮故繼之以惟辟玉食玉食者言人君之食備四海九州之美味故也作福作威玉食人君之所獨而臣弗與焉臣之有作福作威則下有以侵上之權臣之有玉食則下有以僭上之禮下侵權則上失政下僭禮則上失位既失位又失政此大亂之道也故至于害于而家凶于而國先害而後凶先家而後國此其亂之由内以及外由微以至著也非特害于家凶于國而天下之人莫不化之者矣故人用是以側頗僻民用是以僭忒側則不正頗則不平僻則不中人之所以側頗僻者由臣有作福作威而化之也僭則犯上忒則不當民所以僭忒者由臣有玉食而化之也吕氏曰大扺中者天下之大本人君亦是天下之本福威玉食只可出于一人纔出于臣下便是二出于臣下便不是中了亦不是權臣無有作福作威玉食臣之有作福作威玉食小而卿大夫則害于家大而人君必害于國在朝之臣則皆頗僻而植黨懐私下及于庶民則皆僭忒而心疏志蕩也七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔顧氏曰善用卜筮者聖人也能成聖人者卜筮也聖人将有為之初其功逺大而難明其事幽隱而不可測是以天下之人或有不從者聖人将以使之從義于是灼燧以占兆揲蓍以布卦舉而告天下曰此天地鬼神之命也然則天下之人其有敢以逆之者乎無也舜之禪禹也其辭曰龜筮協從周公之戒三監曰寧王遺我大寶龜紹天明命此則聖人假之以役人者也夫民之有所不從而終由蓍龜而從我故曰能成聖人者卜筮也史氏曰稽疑者卜筮之稱也聖人之意用而次三徳者盖使後世之君先以徳而化民民安俗康皆積徳之效凡欲舉行大事以斷天下之疑則君臣契心立籌建䇿然後假卜筮之語以傳先祖之命也故舜謂禹曰朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉然而天子諸侯動作於事則必告于廟尊所天也張氏曰可以作可以無作事之不能無疑也疑如之何稽之而已明則稽諸人以盡其智幽則稽諸鬼神以盡其神又曰古者鑽龜以卜揲蓍而筮龜天産也卜象也故曰雨曰霽曰蒙曰驛曰克以天下事言之也蓍地産也筮數也故曰貞曰悔以人事言之也天地合然後雨故曰雨言陰陽之和也天地辨然後霽故曰霽言陰陽之辨也蒙如蒙雜之蒙故蒙言陰陽之相雜驛如驛傳之驛故驛言陰陽之相傳克如克勝之克故克言陰陽之相勝也内則静而正故其卦謂之貞外則動而過故其卦謂之悔自雨至克五者所以為卜此以象稽之也自貞至悔所以為筮此以數推之也凡卜五占用二者以此而已吕氏曰聖賢之占卜不比後世之占卜聖人之卜假蓍龜以寓其誠者然蓍龜又是至公無私之物須是擇其卜筮之人亦如此至公無私方纔可卜凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮無垢曰夫天下事有小疑有大疑小疑易判大疑難決大疑出于人主人主先當以所疑事謀之于心若曰如此而利乎如此而害乎則又曰如此若利矣得無其中有如此害乎如此若害矣得無其中有如此利乎其謀如此可謂盡矣心不能決然後以此疑謀及朝廷卿士卿士又不能決主心之疑然後謀及卑賤如庶人者庶人又不能決吾心之疑然後謀及卜筮謀至于卜筮則吾心及卿士庶人智慮一切屏絶而惟卜筮是聽焉卜筮以為可吾心與庶人雖以為不可不敢任也第從卜筮所謂可而已卜筮以為不可吾心與庶人雖以為可不敢任也第從卜筮所謂不可而已盖自庶人以上謀之人也卜筮謀之鬼也事至謀及卜筮則亦極矣人之智慮盡矣故一聽鬼神之命而無所可否焉此又洛書之意天理之自然者然則人之有疑是亦天理也天理有疑雖聖人不得無疑若以謂聖人獨智舉事無有疑者是欺天也汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用靜吉用作凶無垢曰三從二違又以庶民龜筮為決也我心雖與卿士不以為然而亦獲吉盖庶民與龜筮同也稽疑以龜筮為決又可見矣然而三從之内龜筮盡從為吉儻龜從筮違筮從龜違而汝與庶民皆從若四從一違者吉乎凶乎曰吉夫稽疑以龜筮為決兩有一違安得為吉曰以其從者多矣儻汝與卿士庶民互有二從而龜筮亦有一從是亦為三從二違也其吉乎凶乎曰吉以龜筮有一從者異乎龜筮共違于人也箕子不盡言之者此留餘意以待武王自解也書不盡言言不盡意存乎其人如何耳又曰夫人主與卿士庶民謀事而無疑夫何俟于卜筮所謂卜以決疑不疑何卜也惟謀事而人主之心終有疑焉而卿士庶民不足以決其疑此所以一取信于龜筮也若人主與卿士庶民以為當如此而龜與筮皆以為不然此所謂龜筮共違于人如此則人主之疑是矣静而别謀則獲吉作而妄行則必凶髙氏曰有同心而無離心有同志而無異志謂之大同身其康彊子孫其逢吉大同之效之吉不足以盡之舜之命禹而曰枚卜功臣而謂朕志先定詢謀僉同鬼神其依龜筮協從此大同也是以天之歴數在汝躬啓賢能繼其道則身其康彊子孫其逢吉可知矣成王之欲宅洛邑也召公來相之周公往營之四方民大和㑹卜澗水西曰惟洛食卜瀍水東而曰亦惟洛食此大同也是以卜年八百卜世三十而終踰過歴之期則身其康彊子孫其逢吉可知矣至于或從或逆而龜筮之不違則皆云其吉而于筮逆則曰作内吉龜筮共違于人則曰用静吉何也盖稽必以卜筮為正故也聖人之意人之所疑不得不疑而謂卜以決疑當從其所卜而已又况有心者未若無心之為公有情者未若無情之為信豈謂枯莖朽骨而不靈于人哉不然又安得盤庚之遷都民咨胥怨羣臣乃言不和吉言于百姓則違而不從者多矣而卜稽曰其如台又曰我非敢違卜而已成王之東征也爾邦君庶士御事咸曰艱大則違而不從者衆矣而言曰朕不并吉又曰卜陳惟若兹而已故曰稽疑以卜筮為正吕氏曰天下一理聖人與天地萬物無不合所謂大同者是無一理之不該無一物之不順而一處之不合即是也身其康彊子孫其逢吉自然流慶無窮也古者人君洗心滌慮假至公無私之物以寓吾之誠惟龜與筮皆從庶幾吾無一毫未是處若龜從而筮不從亦是吾自身必有未盡處故作内吉如祭祀之事則可作外凶如征伐之事則不可龜筮二物共違于人用静吉用作凶謂卿士與庶民皆從汝又自從獨龜筮二物皆不從人君於此何必獨信枯莖朽骨只縁古人之卜筮不與後世同龜筮之不從便是揆之于理有未當處然卿士庶民與我雖從然其間必竟未免得一箇人為惟龜筮却是無心之物苟如此惟是守常則吉纔有所動作便凶八庶徵曰雨曰暘曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶無垢曰稽疑以龜筮可以無疑而自作矣然而天理猶以為未盡也更當以庶徵卜之雨暘寒燠風以時是吾肅乂晢謀聖之應也雨暘寒燠風之失時是吾狂僭豫急蒙之應也豈可謂龜筮之外更無事乎人事即天道人事可欺天道不妄以天道之徵以驗吾人事則分毫不差矣嗚呼人主其可肆乎張氏曰在天者有是事在人者有是理取諸彼以證此故謂之徵陽氣降而雨陰氣收而暘暘暖而燠凍凝而寒陰陽之氣吹嘘鼓動而為風五者備各以其序則陰陽調風雨時寒暑平三光全而萬物得以極其髙大矣曰休徵曰肅時雨若曰乂時暘若曰晢時燠若曰謀時寒若曰聖時風若無垢曰肅乂晢謀聖所謂休也雨暘寒燠風所謂徵也肅乂晢謀聖在我雨暘寒燠風在彼在我者五事皆敬則在彼者五物皆以時矣若順也謂人君貌而恭以恭作肅則時雨順之然則人君之于起居動作之間其可不謹乎貌而恭恭而肅則四海之内蒙時雨之休矣人君言而從從而作乂則時暘順之言當於理而從事當于理而乂則四海之内無陰霖之苦而有清明之休矣言發于此而暘應于彼人主於聲音謦欬之間其可忽乎人君視而明明而作晢則時燠順之盖内視而明無所不察而晢則時燠之幾已在此矣故煖氣應之而萬物相見繁昌而盛大矣視起于此而燠應于彼人主于是非邪正之際其可忽乎人君聴而聰聰而作謀則時寒順之矣盖反聴而聰事皆知其微而成謀則時寒之幾已在此矣此所以一之日觱發二之日栗烈而上天同雲雨雪紛紛益之以霡霂既優既渥既霑既足矣聴起于此而寒應于彼人主于利害成敗其可忽乎人君思而睿睿而作聖則時風順之矣盖自通于理而睿事無所不通而聖則時風之幾已在此矣此所以八風各以時至而萬物皆得極其髙大也思起于此而風應于彼人主于幾微慎獨其可不謹乎呂氏曰肅謂收斂無散漫故時雨若乂謂明辨故時暘若晢謂明晢故時燠若謀謂深沈故時寒若聖謂鼓舞動蕩故時風若大抵為于此則彼必應如古者一匹夫尚能動天孝婦含寃而死六月飛霜又况人君一身之氣便是天地之氣若鼓之應枹響之隨聲曰咎徵曰狂恒雨若曰僭恒暘若曰豫恒燠若曰急恒寒若曰蒙恒風若無垢曰反肅為狂貌不恭之應也貌不恭則强心作狂心起于此而恒雨順于彼是恒雨者即此之狂心形見于彼也反乂為僭言不從之應也言不從則僭心作僭心作於此而恒暘順于彼是恒暘者即此之僭心形見于彼也反晢為豫視不明之應也視不明則所見者不逺故忽逺圖而徇目前此逸豫之心所以作也豫心作于此而恒燠順于彼是恒燠者即此逸豫之心形見于彼也反謀為急聴不聰之應也聴不聰則急心作急心作于此則恒寒應于彼是恒寒者即此急心形見於彼也盖聴不聰則不原事之始終不見幾之先後不觀理之久近第欲千百年之成功立見于目前百千萬里之響應立至于頃刻倒行逆施而萬事皆不得其敘反聖為蒙思不睿之應也思不睿則蒙心作蒙心作于此則恒風應于彼是恒風者即此蒙心形見于彼也盖思不睿則放意而行直情而前恒風之應豈偶然哉恒雨恒暘恒燠恒寒恒風皆我之敗徳凝結而為戾氣耳然則人主於五事其可不敬乎不敬于一念而貽害于天下使凶荒札瘥毒流斯民其可忍乎休咎皆稱曰者丁寧之意也曰王省惟歲卿士惟月師尹惟日歲月日時無易百穀用成乂用明俊民用章家用平康日月歲時既易百穀用不成乂用昏不明俊民用微家用不寧張氏曰無為而治者王不勞而成者嵗也嵗者王之徵也積月以成嵗月者嵗之所總也卿士之職則總于王猶月之總于嵗月者卿士之證也積日以成月日者月之所總也師尹之職則總于卿士猶日之總于月日者師尹之證也嵗月日三者相繫屬大小詳畧各有常度而不可僭差猶王之與卿士師尹三者亦相繫屬尊卑小大各有常職而不可踰越是故大者治其大而畧小者治其小而詳上者安于上而不敢與下同徳下者安于下而不敢與上同道如嵗月日時之無易而嵗功以之成矣夫惟如是則功用以興分職以治以天事言則陰陽調風雨時而百穀成矣以人事言則禮義修政事立而乂用明矣若夫大者不能治其大小者不能治其小上偪下而與下同徳下僭上而與上同道如日月嵗時之既易而嵗功無由成故俊民微而家之所以不寧吕氏曰此言嵗功有統紀然治功亦有統紀前皆是天應處此又是人做處謂王一如嵗一般統十二月王在上為百官之統須當省察我亦如嵗一般卿士惟月各為方伯連帥之長師尹惟日又統十二辰苟嵗月日時無易謂上下各安厥職百穀自然成治自然明俊民自然章賢人在位國家自然平康苟日月嵗時既易謂上下各踰其位則百穀便不成治便不明俊民便微所謂邦無道則卷而懐之國家便不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨案此條經解永樂大典原缺九五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命無垢曰記曰百年曰期頥古語曰人夀一百二十又曰上夀一百中夀八十下夀六十是人夀本百年也得中之數極其夀所以使之滿百年者實人主敬用五事以錫厥中于天下也又曰死而不弔者三畏壓溺畏而死壓而死溺而死皆不成其所終之命也所終之命如何謂死于正寢死于牖下不死于婦人之手者也聖人在上人人皆知性命之理豈有横死不成其所終之命者乎是五福之柄全在人主也張氏曰終其天命而不中道夭者夀也足衣足食而無凍餒之阨者富也既夀而富安居徐行無患害禍難以擾之則康寧矣故三曰康寧康寧者安之至也既康寧而不知好徳則㒺之生也幸而免何足道哉故四曰攸好徳福夀康寧而能知好徳又在夫考終命者也考終命則順受其正矣若夫立乎巖牆之下動而徵病行而招死則非所謂考終命也六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱無垢曰鄭康成以為凶短折皆是夭枉之名漢書五行志並與孔不同以余觀之凶對五曰考終命而言短折對一曰夀而言也凡不得其所而死曰凶未至下夀而死曰短暴死曰折皆謂未至百二十年而言也五福之説多寛平故富次夀六極之説多急迫故疾次凶短折也疾當如伯牛之疾是也賢者而有此疾是和氣不盛所至也顔子之短伯牛之疾有以也夫哀哉作徳心逸日休何憂之有作偽心勞日拙此所以多憂也聖王在上使兔置之人莫不好徳今乃使人作偽而多憂是誰之過與古人曰貧者士之常聖王在上有徳者滿朝廷食君之禄何為而貧民百畝有田牆下有桑雞豚有畜何為而貧今使人至于貧者亦人主之治有未至也好徳之人雞鳴而起孳孳為善不好徳之人雞鳴而起孳孳為不善如王温舒為中尉則心開目明居他惛惛不辨此天生使之為惡也所以使之至此者亦人君教化不至也江漢游女無思犯禮伐條婦人勉夫以正豈可厚誣人為無善心哉見㡬不作見義不為如胡廣趙戒之徒是也好徳之人見賢思齊就義若渇其剛如此安得弱乎所以使之如此者亦人君立徳不至也裴矩在隋為佞臣在唐為賢士是則福極之柄全在人君而已矣人君敬用五事錫福庶民則天下之人皆嚮慕五福唯恐失之畏逺六極若將凂焉東坡曰夫五行之相沴本不至于六六沴者起于諸儒欲以六極分配五行于是始以皇極附益而為六夫皇極者五事皆得六極者五事皆失非所以與五事並列而别為一者也是故有眊而又有蒙有極而無福曰五福此應亦自知其疎也張氏曰不得其死曰凶凶者考終命之反也不永曰短中絶曰折短折者夀之反也禍莫大于凶短折故六極以凶短折為先而疾次之憂次之貧又次之憂疾則不康寧矣貧則不富矣惡者小人之剛也弱者小人之柔也惡弱則不能攸好徳矣五福人之所同好也所以使之慕而欲其至故其序以其所致之次而為之先後六極人之所同惡也所以使之畏而欲其亡故其序以人之所尤畏者為先而猶愈者次之武王既勝殷邦諸侯班宗彝作分器無垢曰武王既勝殷其有功於伐紂者皆裂地而封之不特封之又頒以宗彝之器使之保其宗廟社稷焉故有分器之篇此篇亡矣徒其序存爾宗彝者宗廟之酒尊也周禮有司尊彝之官孔頴達以謂盛鬯者為彝盛酒者為尊是彝上尊也左氏曰諸侯之封皆受明器于王室是封侯之法當以彝器賜之也

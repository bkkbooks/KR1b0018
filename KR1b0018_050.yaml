body:
  text: 尚書精義卷五十宗黃倫撰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓無垢曰東郊不開言淮夷徐戎自東而來也伯禽講武治糧申令于費費非戰地也孔武仲曰夫聖人之定書將以垂法於後世所以垂於後世者莫若立言之深切著明苟其言之善足以為法於人矣則位雖卑德雖薄何害其言之善乎苟其言之不善且或無言可録則雖桀紂之位貴為天子子弓之賢亞於聖人不聞有言可法於後世然則詩書之所録何必待其德與位哉此秦穆公不用蹇叔之言一戰於殽而敗績歸而有悔過自新之意魯伯禽率三郊三遂之兵征討徐夷有藩屛王室尊事天子之心是皆有美言善道可為後世之法列於書之末不亦宜乎張沂曰尚書謂之帝王遺書何以繫之以費誓秦誓曰孔子敘書以魯有佐王討罪之備秦有悔過自誓之戒足為世法故録以備王事然則秦魯之君皆是王臣故録其誓而繫之周書亦猶臯陶之謨繫於虞書也以是論之何必他議或曰孔安國曰魯有治戎征伐之備今子言魯有佐王討罪之備何據乎曰今據蔡仲之命曰成王東征淮夷費誓曰徐戎淮夷並興魯侯征之於費而誓衆是同王征伐而有備也周之時諸侯征伐多矣其事不載於書今獨載費誓是伯禽為聖人後能佐王討罪故録其誓也林氏曰何彼穠矣平王之詩而繫之國風者以治內之事在焉駉者僖公之詩而繼以頌後者以長善之意在焉今書者政事之紀帝王之軌範而連之以諸侯之事者孔子之意以魯有治戎征討之備秦有悔過自誓之戒足以為法故録以示於後蓋以長善救失之心是知詩書之意相為表裏吕氏曰帝王誥命至於文侯之命已絶文侯之命既絶是書合當以此終然而猶有費誓秦誓於其後孔子定書自有深意帝王之道乃古今常行共由之道也若是書終於平王文侯之命則是天子諸侯不能出誥命書便絶於此誥命有時而窮孔子要後世之道理無窮後面所以又有兩篇諸侯之誓正恐當時以為聖人之道如天天不可階而升道便於此窮極斷絶了且如易不終於既濟而終於未濟若終於既濟是天下無餘事易已無餘藴如此則是易有時而窮惟是終於未濟所以見易無時而窮若書果終於文侯之命則是帝王之澤亦終人無緣進於帝王之道所以存此兩者費誓一篇見得帝王之遺澤尚在夫子嘗言齊一變至於魯魯一變至於道時當春秋王綱解紐惟魯尚有周家典章文物紀綱法度由魯亦可以至於道孔子所以存費誓一篇見伯禽創業垂統承周公之教為無窮之法費誓公曰嗟人無譁聽命徂兹淮夷徐戎並興善􅙀乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善無垢曰弓矢言備戈矛言鍛鋒刃言礪皆法言也孔頴達曰弓一則矢百弓十則矢千使之數備足其説是矣戈矛非鍛則不精鋒刃非礪則不利林氏曰好生而惡死者天下之常情也今也魯侯驅民於萬死一生之地冒鋒鏑犯霜露以從事於此而又整戎備戒其士卒以至無有不善者何哉蓋好生惡死雖天下之常情而所欲有甚於生所惡有甚於死者為人上者得不所欲與之聚之所惡與之去之夫然後與民同樂而上下咸安者哉傅説曰惟干戈省厥躬蓋已之不正物將奈何今淮夷徐戎侵我邊鄙戕我人民吾得不帥民以去之宜乎告誓之如是之嚴也張氏曰甲之於身胄之於首干之扞蔽皆所以自衛也􅙀乃甲胄者簡擇之而使精也敿乃干者攻治之而使謹也凡用兵逺則弓矢者射之近則矛者勾之戈者刺之則弓矢戈矛與夫鋒刃皆所以討敵者也弓一而矢百則弓矢欲其備戈矛必有金而成之故戈矛欲其煆鋒刃必就礪也然後利故鋒刃欲其礪用兵行師以自衛者為先而討敵者次之故先言甲胄干而後曰弓矢戈矛鋒刃至於甲胄干非特欲其善也又欲其無敢不弔則其所以自衛者尤致其謹也吕氏曰大抵戎狄德盛則後服德衰則先叛蓋氣稟之偏者難服易叛所以伯禽宅曲阜之初徐戎乘新定未集便乘間來作亂今惟淫舍牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑無垢曰牛馬為車戰及負載之用軍事所不可忽也擭設機以捕獸者也穽掘地以陷獸者也軍傍之民有此類者本非有意於取軍中牛馬也然當吾放牧之際儻不杜絶敜塞之則必傷吾牛馬以害軍事故不杜敜有至傷牿者則軍有常刑矣此誓軍傍居民也嗚呼軍自軍民自民在軍則戰在民則耕故雖有軍事而軍傍居民不妨其安業也先王行兵乃如常事矣馬牛其風臣妾逋逃勿敢越逐祗復之我商賚汝乃越逐不復汝則有常刑無敢寇攘踰垣牆竊馬牛誘臣妾汝則有常刑無垢曰雖馬牛其風可逐而不敢逐臣妾逋逃可捕而不敢捕勿敢越逐者恐亂軍衆也有能得放逸之馬牛逋逃之臣妾而謹還其本主者此良民也吾乃商度多寡而等級以賞賚之所以勸其守分而不生僥幸之心也又曰乃越其部分不待號令而擅自捕逐之者乃有得馬牛臣妾認為己有而不還本主者二者則軍有常刑矣所以禁其亂衆而止其苟得也又曰人衆則氣盛故多妄作又有小人鼓唱其間故有恃衆而為寇盜者攘敓人財物者踰垣墻而為姦者竊他人馬牛者誘他人臣妾者固所不能免也唯探賾索隱鈎深致逺長慮却顧知其必有此事而先為之防範則衆心安定而小人無能為矣蓋刑所以禁未發而制邪心也其算索物情如此其精以此心而料敵制勝蓋有餘矣甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑無垢曰夫淮夷徐戎以伯禽宅曲阜而興兵侵擾今不俟其至先往征之此兵法所謂先有奪人之心也蓋興兵而來則其備嚴未至而先征之則出其不意而彼氣喪以周公之子行兵如此則知三代行兵與宋襄公成安君大異矣又曰兩軍相當性命相角干戈相持不服炊爨不事匕箸為此乾糒以充飢虛蓋軍飽則氣盈飢則氣乏其於糗糧其可不儲峙之以供軍需乎其或不逮使三軍飢乏是乏軍興也兵法乏軍興者斬汝則有大刑謂付之死地也軍事至重不得不嚴也又曰天子六軍則有六鄉六遂大國三軍故止言三郊三遂鄉即郊也國外曰郊郊外曰遂百里為郊二百里為遂三郊三遂儲蓄楨幹以備築壁壘及距堙之屬也距堙即土山也在外以窺城中在內以窺敵情楨幹謂築墻所立兩木謂之楨當墻兩邊障土者謂之幹幹即詩所謂縮板東坡曰徐戎淮夷近在魯東郊不伐之於郊而載糗逺征其國既以甲戌築亦以甲戌行何也古來未有知其説者以豫考之伯禽初至魯魯人未附韓信所謂非素拊循士大夫驅市人而戰者若伐之於東郊魯人自戰其地易以敗散築城而守之徐夷必爭使土功不得成故以是日築亦以是日行徐夷方空國冦魯魯侯乃以大兵往攻其巢穴師興之日東郊之圍自解所謂攻其必救築者亦得成功也費誓言征言築而終不言戰蓋妙於用兵周公之子蓋亦多才多藝耶又曰汝敢不供楨幹則吾之刑汝不遺餘力矣特不殺而已糗糧芻茭不供則軍飢故皆用大刑大刑死刑也楨幹不供比芻茭差緩故用無餘刑非殺也近時學者乃謂無餘刑孥戮也非止殺其身而已至於殺而猶不止誰忍言之伯禽周公之子也而至於是哉又曰言魯人以别之知當時有諸侯之師也楨幹芻茭皆重物故獨使魯人供之三郊三遂南西北方郊遂之人東郊以備冦不供也徐夷作難久矣魯固受其害而以宅伯禽知周公不私其子也伯禽生而富貴安佚始侯於魯遇難而能濟達於政練於兵皆見於費誓知周公教子有方也孔子敘書蓋取此也余考伯禽為方伯凡所統率兵皆在焉何獨魯人而已而供楨幹芻茭獨魯人者蓋糗糧則諸侯之師可自辦而楨幹芻茭皆重且多豈可使諸侯逺致哉林氏曰兵凶器也亦可置之吉戰危事也亦可置之安但觀其用心如何耳使其心乎安民則不在於殺伐為事不在於勇敢為能而大意欲為民去害而即安以亂而易治彼以有心來我以無心應不得不然也故其戒誓之辭禦戎之備無所不至戒誓之後汝往徂征故峙乃糗糧則逺者可致也故使諸侯之人峙乃楨幹芻茭則宜賦役近者故使魯人供之凡事之輕則誓之以常刑事之重則誓之以大刑且先王之時以去害為務以仁民為政應天順人興師動衆出於仁義而刑尚不可忘則知古者用兵未有去刑而能治也是必責之甚嚴戒之至備不得已而後動其於刑必使易避難犯以喻之至熟而後加焉故使之有過於死而人不怨也胡氏曰郊遂者制軍之數也天子六卿故六軍大國三卿故三軍魯以方百里之地非若王畿之可以制軍如鄉之數蓋合采邑與受田之人以其在野是以謂之三遂也方徐戎並興三鄉之軍未足以支故兼起於三遂也秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓無垢曰秦穆公初與晉文公伐鄭鄭使燭之武説秦秦與鄭盟而使杞子逢孫楊孫戌之杞子自鄭使告於秦曰鄭人使我掌北門之管若潛師以來國可得也秦穆訪諸蹇叔蹇叔不可公辭焉而召孟明西乞白乙使三人帥師伐鄭師經崤澠晉界也而不假道焉三人者其謀泄乃滅滑而還晉以秦因國有大喪而越境伐鄭師行不以告故候其師歸敗之於崤獲三帥焉晉文公夫人文嬴秦女也請三帥曰彼實間吾二君寡君若得而食之不厭君何辱討焉使歸就戮於秦以逞寡君之志若何公許之晉侯歸之穆公素服郊次嚮師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也秦人記此事於史孔子得其悔過之誓故取以附於周書之未焉又曰軍旅用誓豈獨秦國而聖人特取以附周書之末是知當時之誓師皆不義之舉也獨秦以悔過而作誓此諸國所無而暗合三王之道者也故孔子有取焉楊氏曰或問春秋止獲麟述其旨者衆矣書畢秦誓寧無意乎願聞其説曰仲尼藴聖人之業而不得施者也其生不辰於魯則昭公見逐在周則子朝造亂弒君三十六滅國五十二三綱絶矣仲尼歷聘以救之則又不得其位故退而定禮樂刪詩書修春秋以防乎微立乎教其刪書也堯舜之典大禹臯陶之謨商周之訓誥誓命淵然垂教亦備矣帝王之書至文侯之命而終焉則平王而下誥命絶矣周之號令不行於天下名位焉而已秦穆公西夷之國也乃能悔過誓衆作秦誓焉是三代之誥誓王朝所以令天下之文周不能有之而秦僭焉夫吳楚僣稱王徒竊其名號不過榮於外焉春秋尚夷而外之况秦穆公遂竊為帝王誥誓之文其志可量哉聖人見其微則防其著思其漸則憂其大履霜之不禁堅氷可期矣濫觴之不支襄陵難遏矣秦穆之僣為誓命其履霜乎其濫觴乎易曰臣弒其君子弒其父匪一朝一夕之故其所由來者漸矣由辨之不早辨也太史公曰秦雜戎狄之俗位在藩臣而臚於郊祀君子懼焉揚子雲曰天子制公侯伯子男也庸庸節節節莫差於僭僭莫重於祭祭莫重於地地莫重於天則宣文宣靈其兆也如是則秦之祖己僭王者之郊也至穆公遂僭乎誓也卒洎乎滅二周而遷九鼎豈一朝一夕之故哉則秦誓者其履霜也其濫觴也故仲尼刪書畢秦誓者有傷焉有戒焉三代之誥誓中國之王不能行之西夷之君乃用焉不亦傷乎然秦國之僭亂周若不早辨之秦之子孫循襲寖長其可量哉故亦以戒周也設周有明王復興悟孔子之戒消堅氷於履霜堤襄陵於濫觴防微不至於著杜漸不及於大立制度以誅僭竊後世安有稽首歸秦者哉故曰有傷焉有戒焉嗚呼仲尼刪書立教不徒焉耳吕氏曰穆公既為晉所敗深自克責作為悔過之書孔子所以載之於二帝三王之後這一書之理便是二帝三王之階梯聖人之全體在易之乾乾之德便是聖人之德乾本廣大其德剛健中正純粹精也人若要精於乾德階梯在甚處在復卦一陽生於五隂之下五隂在上重疊積纍正如衰世末路人為私意障蔽然一陽生莫之能禦須有復乎乾之理復是進乎乾之梯階春秋之時三綱五常都不明去二帝三王之時大段逺正如五隂在上看此一篇見得回心悔過其辭懇篤至誠若推是心以往便可到堯舜禹湯地位前許多私意邪慮亦蔽他不得書之秦誓便是易之復卦學者須玩味秦誓公曰嗟我士聽無譁豫誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉我心之憂日月逾邁若弗云來惟古之謀人則曰未就豫忌惟今之謀人姑將以為親雖則云然尚猷詢兹黃髮則罔所愆番番良士旅力既愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉人之有技冒疾以惡之人之彥聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉邦之杌隉曰由一人邦之榮懷亦尚一人之慶按此篇經解永樂大典原缺

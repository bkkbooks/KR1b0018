body:
  text: 尚書精義卷五宋黄倫撰臯陶矢厥謨禹成厥功帝舜申之作大禹臯陶謨益稷無垢曰臯陶言克艱之意以矢謨大禹行克艱之說以成功舜何為哉恭己南面優㳺無為垂衣廟堂之上各因其所長而稱薦慰安之豈有私意哉使陳謨者成功者各安心肆意展盡四體悉行其所學以恵天下四海焉張氏曰謀之已定謂之謨興事造業謂之功謨者坐而論道之事功者作而行之之事也作而行之非所以命禹故其名篇則謂之大禹謨雖然臯陶以謨則其絶徳在謨者也禹以功則其絶徳在功者也此經所以於臯陶言謨於禹言功各以其尤大者而稱之也有謨矣然後有功故經先言臯陶矢厥謨然後言禹成厥功以謨對功則臯陶之謨固不若禹功之大此篇之序所以先大禹而後臯陶大禹謨曰若稽古大禹曰文命敷于四海祗承于帝張氏曰域中有四大道大天大地大王亦大王者體道之大以配乎天地故其見於事業所以為大禹之所謂大者蓋禹以功而王其業之所以大故也文命禹之號也以其有以賁飾於事故謂之文以其有以號令於下故謂之命禹之所以為王者在此而已故其號所以因之者也敷于四海則為下為民是也祗承于帝則為上為徳是也下有以敷于四海則恵澤之施溥矣上有以祗承于帝則欽順之道盡矣蕭氏曰舜之事皆同乎堯故曰重華協于帝禹之事則有異乎舜故曰文命敷于四海祗承于帝文則非獨為之華而命則䖏之在我事雖有所不合而意則祗承之也有以文命稱禹者猶放勲之於堯也曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳無垢曰克艱之義其大矣乎以此處心則不欺暗室不愧屋漏以此處身則言無可擇行無過舉以此治家則女正位乎内男正位乎外以此治國治天下則事察其微㡬戒於早臨兆民若馭六馬見宴安若嗜鴆毒其敢輕乎君以克艱待臣下臣以克艱事君父各在警戒修省之地其誠心相感實徳交孚此風一行黎民自然樂於趨善矣夫民敏徳之㡬非在他也仍在乎君臣克艱之際耳使君克艱於上臣克艱於下則事不敢忽義不敢違思慮反覆號令叅審凡有施為無不當於人心合於公論民之從之也若走下之水傳命之郵此自然之理也黄氏曰古之人君以任天下為憂而後世以得天下為樂古之人臣以事君為憂而後世以得君為樂憂之則必知其難矣可憂而樂焉則易易則慢慢則弛此天下所以多亂也歟孔子曰人之言曰為君難為臣不易如知為君之難也不㡬乎一言而興邦乎夫子謂知為君之難可以興邦則知為臣之不易可以興邦矣帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克無垢曰虚心屈已故善言日聞賢者日進四方萬里之逺民情之細㣲物態之變故利害是非千百年之禍福皆皎然在於几席之間矣此萬邦所以咸寧也其克艱之狀如何不敢獨斷而考於衆謀不敢自是而舍己從人不敢自安而矜憐無告之窮民不敢自髙而禮遇天下之寒士合此四事以觀堯之心每見其兢業憂懼若危亡之立至而禍患之必來也凡禹之所言他人所憚者堯皆身親而心安之此所以言惟帝時克也惟舜處於克艱之地故深肯禹之言又深見堯克艱之心而能形容此數語也髙氏郢曰衆心成城衆口鑠金則輿人之誦不可輕故書曰罔咈百姓以從己之欲易曰聖人感人心而天下和平詩曰愷悌君子神所勞矣此言王者將有為也將有行也必稽于衆而順乎人則自然之福不求而自至未然之禍不除而自絶矣陳氏曰克能也稽于衆舍己從人此聴言之事也不虐無告不廢困窮此逮下之事也衆言皆稽之况嘉言乎困窮猶不廢之况大禹乎然聴言逮下堯之能事也舜敢廢之乎益曰都帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君無垢曰廣者大也運者行而不止也堯徳廣大行而不止此所以行於克艱之中而不急廹又以聖神武文行於克艱之中而不拘攣出入闔闢何所不可豈以為克艱而反急廹拘攣哉即形而下造形而上兹其所以為堯歟然則欲求廣運聖神武文者不求之他求之克艱足矣張氏曰廣言堯徳之體運言堯徳之用其大無疆而所施者博徳之廣也其動不息而所行者疾徳之運也堯有廣運之徳入與道俱則為乃聖乃神出與事顯則為乃武乃文大而化之之謂聖聖而不可知之之謂神聖而後神道之序也戡定禍亂而為武經天緯地而為文武而後文者事之序也堯有聖神武文之徳此皇天之所以眷命而使之奄有四海為天下君宜矣四海逺矣非有徳者不能奄而有之天下大矣非有徳者不能君而臨之謂之奄不特有之而已至於為天下君又見其出命以尹衆者也禹曰恵廸吉從逆凶惟影響無垢曰順於道理者吉則隨之非道理之外又有吉也當其順於道理時此即吉也此古之論福者曰百順之名也且謂體信而達義者謂之百順而詩人指葛藟纍之謂之福履其禹之意歟然而禹於益之意外又立從逆凶之説以發明之此亦禹始終于克艱之意也夫從逆即是凶不必謂逆之外别有凶也昔燕王旦謀反日深變怪愈至如大風折木鼠舞端門失火城樓此怪非自外來也即旦惡逆之心凝結成象耳豈自外來哉此君子所以戒謹乎其所不睹恐懼乎其所不聞而不愧屋漏不欺暗室誠諸中形諸外此理之自然者也如影之隨形響之隨聲影即形也豈形之外復有影乎響即聲也豈響之外復有聲乎禹是以知吉即恵廸凶即從逆非於順道之外别有吉從逆之外别有凶禹之此意以謂使吉在道外則福可邀使凶在逆外則禍可避如此則異端得志而吾道衰矣不可不謹於此矣張氏曰恵迪者順道之謂也故天命之以吉反是而従逆則凶矣夫順逆之理吉凶之報至於不旋踵而至而無毫髮之差如影之於形曲直長短因之而已如響之於聲洪纎髙下應之而已所謂如影響者其報應之騐也益曰吁戒哉儆戒無虞罔失法度罔遊于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟熈罔違道以干百姓之譽罔咈百姓以従己之欲無怠無荒四夷來王無垢曰虞度也謂於未可億度以前未然未形早為警戒也夫身欲逸心欲樂此天下萬世同情也逸不已必至於蕩樂不已必至於淫使舜在畎畝時與木石俱與鹿豕逰與頑嚚傲弟處何俟於益之進戒今貴為天子富有天下耳目與昔時異事㡬與昔時異處於逸樂之地而不見憂患之侵其習己慣其㡬己熟己逸而又求逸得無蕩乎已樂而又求樂得無淫乎益之歎息而警懼蓋謂此也又曰大抵人心有三事可行則行可止則止既非可行又非可止則為疑矣守法度可行則行也故能任賢不貳罔逰於逸罔淫于樂可止則止也故能去邪不疑疑於可行而又不敢行疑于可止而又不敢止此疑也乃蕩淫之漸而失法度之㡬也蓄之于心終必害道斷然斥去苐據可行可止明白光輝者而行止之如此則吾心之所嚮無不髙明光大矣此百志所以熈也然而行不可急也當循序而行之行之太急則違道以干譽矣如徳宗早嵗用崔祐甫杖邵光超行之太急事不終乆晚嵗乃任盧杞而黜陸贄是其始時特違道以干譽耳違道即不循序而太急也止亦不可急也當循序而止之止之太急則咈百姓以従己之欲矣如梁武帝初年捨身養菜以率士民無不従風而靡晚嵗乃信朱异而任侯景是其始時特咈百姓以従己之欲耳咈百姓則不循序而太急也夫天理自然豈可以私智亂之法度乃先聖之法度是天理也非私智也或行或止皆當循之儻出于法度之外而増損一毫非干譽即従欲耳史氏曰得民心難失民心易得失之原不過道與欲而已矣蓋道出於天下之公共欲本一人之私情違道者干百姓之譽而終不可得専欲者咈百姓之情而有所不顧道衰而欲勝民心之不失者未之有也又曰何謂道仁義禮樂歸於大中至正者是也何謂欲聲色貨利流於放僻邪侈者是也張氏曰法度者先王所賴以為治也在我者有法則下斯守法矣在我者有度則人皆謹度矣法度一失則綱紀以之大壊法度其可失者哉禹曰於帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壊無垢曰夫人者天地之德隂陽之交鬼神之㑹五行之秀氣凝聚而生者也然而有常産者有常心無常産者無常心顧上所以養之如何耳養如農夫之養禾慈母之養赤子不惰以失莭不急以助長滋以膏液時其渇飢去螟螣之害適寒煖之宜然後暢茂秀發光明碩大千倉萬箱五常百行以享終嵗之飽而為克家之子焉養民亦猶是也水火金木土榖以遂其日用之急正徳利用厚生以安其天與之性先富後教不失其序發揚感興不失其和進勤勞而黜怠惰勉辛勤而去康樂此戒之用休也宅不毛者有里布田不耕者出屋粟兕觥以辱之撻罰以恥之董之用威也歌載芟之詩詠良耜之頌沐浴膏澤歌詠勤苦使樂其事而忘其勞此勸之以九歌也夫於艱難之中而自有一時之適使之樂以感發而忘其辛苦此長乆之道也又曰顧大禹當日之意以謂正徳以正其心利用以致其用厚生以樂其生此所以養之也如人主不荒於酒色不盤於遊畋此正徳以養之也法度如江河之有隄防號令如風雷之能鼓舞此利用以養之也孔穎達謂薄征徭輕賦税不奪農時使民生計有餘衣食豐足以謂厚生以養之理或然矣林氏希曰已能成人然後以成於人成人者可與謀道成於人者可與謀教此正徳之所以先也徳孰為大善政為大政孰為大養民為大此則利用厚生所以次也是之謂三事人非天則不得其生非地不得其養非聖人不得其所以為人是故聖人因天下之材立天下之道屬乎天者則修之屬乎人者則和之修之故成萬物之體和之故蔵萬物之用夫是謂之有功有功則有敘天覆其徳地載其利而民卒不知所以然之者則亦歌之而已矣又曰當斯時也六府修三事和而九歌應之然禹猶務勸其君以致於勿壊則凡修之利不足加於世和之道不足徧於物雖有舜禹且不能以使之歌也况不為舜禹者乎帝曰俞地平天成六府三事允治萬世永賴時乃功張氏曰地平者水土之平也天成者四時之成也原隰至於底績萊夷可以作牧則地平可知東作西成不失其序南訛朔易不乖其次則天成可知横流之初天下無適而非水民之昏墊不得平土而居之則地未平矣地未平則天何自而成哉此所以先言地平而後言天成也帝曰格汝禹朕宅帝位三十有三載耄期倦於勤汝惟不怠總朕師張氏曰記曰八十九十曰耄百年曰期頥耄言乎其昬也期者指是以為期也期則當頥以養之之時舜生三十徴庸三十在位其宅帝位又至於三十有三載此所謂耄期之年也耄則昬矣昬則不可以有為期則養之時也養則不可以有為此舜之所以倦於勤夫天下之事日出而無窮惟孜孜克勤然後足以有濟今也耄期而倦於勤此所以欲遜位於禹而使之總師也嘗觀禹之治水八年於外三過其門而不入舜嘗稱其克勤於邦則禹之不怠可知矣惟不怠然後可以總朕師禹曰朕徳罔克民不依臯陶邁種徳徳乃降黎民懐之無垢曰夫臯陶刑官也朝夕所論者禦戎夷與夫治冦賊姦宄五刑五流五宅三就三居之事小則墨劓大則大辟又其大則陳之原野之刑爾何以知其為邁種徳哉非深知臯陶之所存其誰能於刑見其為徳耶余觀寒朗徐有功傳見其於告變謀反事使人主怒不得行威不能慴至濵於死而不懼孶孶以人命為重而不顧一身之死生舜大聖眀雖當時固無寃枉之獄然於有罪者想見臯陶以身體之時其飢渇審其寒暑不使一毫之寃意外之苦其脱免無罪辨析難眀固已出人意外至其就刑而赴死者亦矜憐撫恤傷痛嗟咨悼其失路而憫其無知使悔過於無形而修身於將來者又不可勝數也顔氏曰舜之將禪禹也禹遜以臯陶夫禹之所遜者必衆賢之優也而臯陶之所以優於衆人者何耶天下固有以徳而懐人者矣未有以刑而能懐人者也此臯陶之所以優也帝念哉念兹在兹釋兹在兹名言兹在兹允出兹在兹惟帝念功無垢曰夫操則存舍則亡此人之心也操之則為徳舍之則為欲矣念兹者操之也在兹者操其存也念念既乆徳機愈熟徳本愈深雖舍之亦不亡也釋兹者舍之也在兹者不亡也種徳至於舍之而不亡則徳逺而大夫既逺而大不能自已雖無意於此徳然發於聲音言語者亦自然無非徳也故曰名言兹在兹至其未發於聲音語言而動於念慮者亦無非此徳也故曰允出兹在兹至此則人與徳相忘矣原其本初特念之一字而已所以又指舜曰惟帝念功以言念之功如此也又曰孔子十五而志於學志念也至於立至於不惑至於知天命至於耳順皆念兹在兹也至於従心不踰矩此釋兹在兹也豈特孔子傳説告髙宗曰允懐於兹念終始典於學念兹在兹也日厥徳修罔覺釋兹在兹也聖賢相傳無非此念其可忽哉張氏曰思而不忘謂之念存而察之謂之在念兹在兹者念此人則當察此人而有可念之道也釋而廢則不念矣釋兹在兹者釋此人則亦察此人而有不可忘之理也念兹而不在兹則所念者未必有功釋兹而不在兹則所釋者未必有罪也名言茲在茲者名其人言其事所名之人未必果賢也所言之事未必果是也故當察此人之賢否此事之是非然後可以名言之矣允出茲在茲者信出於此道然此道未必皆可必當察此道之可否然後可以允出之矣禹以為臯陶在所當念不在所當釋也名其人則臯陶之賢在所可名矣言其事則臯陶之行在所可言矣允出於禪位則臯陶在所當禪不在所當廢矣故終之曰惟帝念功蓋亦以臯陶之功非所可忘也帝曰臯陶惟茲臣庶罔或干予正汝作士明於五刑以弼五教期於予治刑期於無刑民協於中時乃功懋哉無垢曰夫臣庶所以犯刑者則以其心不正也不正之念起於㣲芒長於芽蘖儻或縱之蕩如狂瀾不可收拾至於為冦賊姦宄而不知恥矣聖人憂之故設為五刑小有墨劓大有大辟或刑於朝或刑於市又其大有陳之原野者使見之者驚聞之者沮所以折天下不正之念而使銷殞於無刑之間也豈好殺人也哉今舜之臣庶其心皆正至無有一毫邪念犯舜之正者夫臣庶之心正何與於舜而謂乃舜之正哉蓋舜與天下通為一體者也使天下臣庶有一邪念犯其心之正者即犯舜之正也然則臣庶不以邪犯正是誰之力哉乃臯陶明五刑之功也明五刑於此則臣庶知邪念不收必墮刑獄皆儆戒檢察而不敢放肆如此則邪念消殞矣邪念消殞自然歸於仁義禮智信之中而識君臣父子兄弟夫婦朋友之用矣以弼五教夫復何疑臯陶之明刑果何為哉期於舜之天下人人有士君子之行而大治也豈好殺人哉期天下無一人犯法而後己使天下無一人犯法則天下之心皆正可知矣其心既正不待教令不煩鞭朴措心積慮自然合於中道矣史氏曰任法者不若責之以人任人者不若勉之以功以舜為君法不待於任以臯陶為臣功不待於勉然必區區為是者蓋治道之常有不可得而忽也夫五刑之設不獨待天下之有罪亦所以明天下之無罪自臯陶為士始至於弼教而終至於無刑皆豈任法之故耶始於大臣庶官罔干予正終於天下之民皆協於中則非任人有所不能也舍法而任人因人而有功為帝舜者其可不以是而勉之哉臯陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延於世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽於民心茲用不犯於有司無垢曰設法如江河使民易避下令如流水使民易従在下者不苦其煩處衆者不患其急罰止一身而不及嗣賞延於世非止其身過無大而不宥使人有自新之路故無小而不刑使人有謹獨之心罪疑惟輕無刻薄之態也功疑惟重有忠厚之風也求舜之處心與其殺不辜以勵威寧若失不經以取謗積此數事深見舜好生之徳矣夫舉一好生之心則天下無不感動且如罰弗及嗣宥過無大罪疑惟輕每舉一事則天下皆起寛恕之心矣賞延於世功疑惟重每舉一事則天下皆起樂善之心矣一事尚然而况事事如此乎所以好生之徳漸漬優渥洽於民心民心皆為忠恕皆自樂善邪念消殞中正自生不犯有司夫何足怪史氏曰徳不失於中則政無徃不中政不外乎中則民奚為而不中執其兩端用其中於民其斯以為舜乎不失之過不失之不及此徳之所以罔愆也簡之所臨寛之所御罰之所及賞之所延刑宥之小大功罪之輕重凡行之於政者自然無徃而不中矣是數者寧可失於不常不可殺於無辜忠厚之所寓權義之所立故也好生之徳洽民如此民奚為而不中哉東坡曰傳曰賞疑従與所以廣恩也罰疑従去所以謹罰也當堯之時臯陶為士將殺人臯陶曰殺之三堯曰宥之三故天下畏臯陶執法之堅而樂堯用刑之寛四岳曰鯀可用堯曰不可鯀方命圯族既而曰試之何堯之不聴臯陶之殺人而従四岳之用鯀也然而聖人之意蓋亦可見矣又曰可以賞可以無賞賞之過乎仁可以罰可以無罰罰之過乎義過乎仁不失為君子而過乎義則流而遂入於忍人仁可過也義不可過也古者賞不以爵禄刑不以刀鋸賞以爵禄是賞之道行於爵禄之所加不行於爵禄之所不加刑以刀鋸是刑之威施於刀鋸之所及不施於刀鋸之所不及先王知天下之善不勝賞而爵禄不足以滿也知天下之惡不勝刑而刀鋸不足以裁也是故疑則舉而歸之於仁以君子長者之道待天下使天下相率而歸於君子長者之道故曰忠厚之至也余氏曰聖人勸善所欲也懲惡不得已也以所欲之心行不得已之政知其所以然也又其君臣相戒飭之辭曰汝作士明於五刑以弼五教刑期於無刑而申之欽恤之言其不得已者亦所以弼教終必期於無刑而已矣其功罪疑者又非率然以意輕重之也蓋其君臣雖聖且賢不敢以神明自徳猶懐天下之疑故凡賞一功刑一罪公卿可士大夫可庶人可然後寘於爵位麗於刑辟衆之所疑者乃付輕重之議蓋舜臯陶善與天下之人同其好惡然耳帝曰俾予従欲以治四方風動惟乃之休無垢曰夫舜之欲何欲哉其所欲者臣庶不干予正民協於中爾今臯陶明刑弼教折邪心於無形起中正而有象五刑既明墨劓剕宫大辟閱實其罪使見者神驚聞者色沮四方震動不敢萌不正之心常若臯陶之明照燭於闇室屋漏無人之處而莫敢肆其邪焉惟乃之休豈曰虚語張氏曰無為而治者舜之所欲也然非臯陶明於五刑以弼五教則安従其所欲者乎雖然莫非教也有可欲之欲有不可欲之欲従欲以治則可欲之欲也咈百姓以従已之欲則非可欲也此聖人所以不欲也聖人之治也神而已鼓之舞之莫見其為之之迹天下之民莫不披靡而従焉此之謂風動自非臯陶用刑之效安能至於是哉故曰惟乃之休休者以其有美道可以為人所依故也

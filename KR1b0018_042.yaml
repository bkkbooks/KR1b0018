body:
  text: 尚書精義卷四十二宋黃倫撰成王東伐淮夷遂踐奄作成王政成王既踐奄將遷其君於蒲姑周公告召公作將蒲姑無垢曰成王即政淮夷與奄又叛此成王所以親征之而踐奄也踐奄成王正篇具載此意王者之政其仁如此何以知之下文云將遷其君於蒲姑周公作將蒲姑則知非滅其社稷蓋使之密邇王室以教之耳成王歸自奄在宗周誥庶邦作多方無垢曰成王見淮夷與奄又叛其意以謂商之諸侯尚多其心不服者頗衆故因凱旋而萬國畏威服義之際作誥以開慰之也東萊曰多士一篇當時初遷頑民於洛所以作書誥多方是既遷於洛了其後淮夷背叛當時叛不止商民是以成王于歸自踐奄之後遍告天下所以作多方之書多方惟五月丁亥王來自奄至于宗周林氏曰非商六七君之德無以致斯民雖異代而不忘非武王周公之聖無以懷斯民使歸心而即安甚哉武王取天下之易而周公安天下之難也非周公安天下之難蓋凡民之情當患難而急於安逸既安逸則思其舊主此勢之所常然也使非周公繼武王之德維持綏懷之有道則斯民未必不變而為商矣夫何故自成湯至於帝乙恩澤之在人也深一旦困於辛紂之虐則求欲脫於水火之厄為甚急初不問其主之新與舊也及夫出水火而奠裀席則商六七君之德朝夕常在於存想之間故武庚既叛而奄與淮夷又叛多方之篇非徒及於商之民而又及於四方之民是知當時雖曰歸周而其心未必盡服也周公安得不難哉周公曰王若曰猷告爾四國多方惟爾殷侯尹民我惟大降爾命爾罔不知林氏曰順天之命雖小必興逆天之命雖大必廢商有天下周德已大黜其命非有私意也在我者順天之命而在彼者不能常欽承於祭祀而已惟周之所謀者在於順天之命則不欽承於祭祀而逆天者周安敢不以天為意而不黜之哉是命也爾四國多方所以共知焉洪惟圖天之命弗永寅念于祀惟帝降格于夏有夏誕厥逸不肯戚言于民乃大淫昏不克終日勸于帝之迪乃爾攸聞厥圖帝之命不克開于民之麗無垢曰天人不逺我之心即天心也我之心正則天之星辰無不循軌我心不正則災異百出矣故君有仁德則歲星循軌有義德則太白循軌有禮則熒惑不失其度有智則太隂不失其度有信則星辰不失其度苟為不然則皆變為妖星矣蓋天之星辰必因人事人有是事則天必有是象故經星之外有所謂牢獄郎官匏瓜者皆應人事而為之也何以知之昔漢光武與嚴光同寢以足加於帝腹明日太史奏客星侵帝座以是知天人不相逺災祥皆在人君也惟帝降格以桀不敬念社稷故出災異以警懼之也又曰人君遇災異當罪己自責則民心悅矣民心悅則天意回矣唐德宗窮兵黷武致奉天之難用陸贄之言一為罪己之詔山東之民讀之莫不感涕何則方其黷武之時民雖忿怨一旦罪己必曰吾君悔過矣其心安得不悅乎德宗危而復安亡而復存以其發憂民之言故也又曰帝之命不可以他求在我而已終日檢察有一毫欺於心則自怨自艾終不自滿直至無愧怍處所謂帝也如是圖帝之命豈在粢盛豐潔牲牷肥腯哉無愧怍於中可也何謂民之麗麗者著也凡人念慮之起不麗於善必麗於惡善者人心所同也然必得君師啓導之開民之善路使知如是為仁如是為義如是為禮如是為智可也自非人君率先為善處心積慮無一毫欺於心又烏能開民之麗哉桀不開於民之麗非所以圖帝命也蓋民可使覿德不可使覿刑道之以政則免而無恥道之以德則有恥且格故堯舜率天下以仁而民從之桀紂率天下以暴而民從之武王克商未暇發一號出一令乃釋箕子囚封比干墓式商容閭使天下皆知賢之可尊散鹿臺之財發巨橋之粟使天下皆知義之可慕是皆所以開民之麗也又豈以刑罰率民哉林氏曰天之所為視民而已有國者不急於求天而嘗急急於求民蓋以民之附不附可以卜其天之從不從也苟惟恃天之有命而不恤乎民欲以謀天命之長豈不猶却行而求及前人者乎夏桀淫昏荒亂不明乎民之所附而將圖帝之命宜乎天之所不助而降罪以聚於夏也張氏曰天大而逺者也故圖天之命在於開民之麗開民之麗則帝之所佐者也蓋民之所麗者麗乎上也好惡取舍惟上之從為人君者故當啓迪之導達之使之主於善而後己今有夏之君乃大淫昏其所自為者且蔽塞而不通安能開民之麗哉吕氏曰大抵德之盛能動天惡之盛亦能動天德之盛能動天如所謂格于上下格于皇天是也惟帝降格于夏是惡之盛亦能動天也天既動威警懼也夏王方且大縱逸略無憂民之言這是昏迷不知畏天之威如此天方警動他他却為惡愈深不特無至誠憂百姓之心雖憂民之言亦忘了乃大降罰崇亂有夏因甲于內亂不克靈承于旅罔丕惟進之恭洪舒于民亦惟有夏之民叨懫日欽劓割夏邑無垢曰承民旅衆也桀既內亂不自知已之有善安能知天下之善孟子見性善俯視天下之人無不與我同此善者因以性善之説為天下倡使人皆以聖賢為歸又曰夫人內定則外恭譬如形聲影響之符也桀既內亂所以不能大進於恭而怠惰弛慢無所不至矣故放肆於民也又曰有夏之民果何罪哉因桀內亂不識忠厚亷靖之士故其所欽者皆貪叨憤懫之人貪叨者多刻剝憤懫者多殘虐以刻剝殘虐之人在民之上故日啖民之膏血而不恤也張氏曰因甲于內亂者崇亂有夏則其亂者外也外亂必自內始故曰因甲于內亂甲于十干為始甲于內亂者自桀而始也吕氏曰桀方且大降威罰崇長其亂于有夏其亂日日增長無時而已然桀之所以崇長其惡于有夏者其根本則始於內亂何故其先家道之不正一箇昏縱本根既潰亂自此以出無不亂天惟時求民主乃大降顯休命于成湯刑殄有夏惟天不畀純乃惟以爾多方之義民不克永于多享惟夏之恭多士大不克明保享于民乃胥惟虐于民至于百為大不克開無垢曰桀甲于內亂湯乃不邇聲色不殖貨利桀不克靈承于旅湯乃德懋懋官功懋懋賞桀罔丕惟進之恭湯乃改過不吝桀劓割夏邑湯乃克寬克仁以天理論之桀有必亡之理湯有必興之理其膺顯休也宜哉又曰天下豈無識義理之民哉識義理則內意誠而心正外國治而天下平然而惟聖人能享用義民之福桀方欽叨懫之民恭不明保享之士豈能久長用義民而多享用賢之福哉又曰伊尹曰非商求於下民惟民歸于一德是民之所以享者德而已民之所享在德人君保此則天下享之矣惟其恭敬不識義理之人此所以大不能明保享下民之道也又曰桀既內亂而所欽者叨懫之人所恭者又非保享于民之士君臣同惡相與虐民則凡百所為皆不明於道理之所在矣天下萬事皆有條理桀之君臣一切不曉惟知虐民不亡何待林氏曰天以天下而命之人君非直與之享無敵之貴無倫之富以為一身之榮也必使之助天以治民而已故必治乎民而得民之心者天必命之不能治乎民而失民之心者天必絶之有夏殄滅而不為天畀祐如此之大者非天私惡乎夏而欲滅之也夏桀之世非獨其君之虐其臣亦虐也吕氏曰大抵聖人立言本末完備既説民至公才無道便非夏之民又却説民之心本自長要享奉國夏自不能從民願聖人立言無不著一邊既説民心又説君民係屬處乃惟成湯克以爾多方簡代夏作民主慎厥麗乃勸厥民刑用勸以至于帝乙罔不明德慎罰亦克用勸要囚殄戮多罪亦克用勸開釋無辜亦克用勸今至于爾辟弗克以爾多方享天之命無垢曰治亂之道不在乎他在能用君子與不能用君子而已能用君子則治不能用君子則亂此古今不易之道也以此知為人君者初無難事能用君子則內可以正心誠意外可以安國保民而王道成矣桀不用多方義民所欽者叨懫之人所恭者又非保享民之士則其任用者皆小人耳烏能享用賢之福哉湯之興非有竒謀祕術也又非借才於異代也能用多方義民以有天下耳又曰人君之心術不可不正則言脫於口行脫於身四方萬里翕然響應烏可不謹乎吾一謹其所麗則民不期自勸矣又曰桀用刑而民怨湯用刑而民勸何哉蓋其用刑則同而其用刑之心則異桀不克開民之麗乃大降罰此民所以怨也湯既慎厥麗民宜從之乃不能從則舍刑不足以齊之矣然其刑之用也使民罔不自知曰君仁如此而吾乃不仁君義如此而吾乃不義其罹刑罰也是自取之耳吾之不仁不義致使吾君之不免於用刑耳烏得而不勸哉故曰厥民刑用勸也此明德慎罰之意又曰明德者即所謂慎厥麗慎罰者雖用刑而不敢易也必省厥躬曰吾之所麗無失德乎其不率者乃可加之以罰然罰未可遽用及其遇有罪也又將三令五申待其不改而後刑之此民之所以勸也以至要囚殄戮多罪若不可以為勸矣然其冒於刑罰者亦必自省曰吾君之明德如此而慎罰又如是必我有以取之也雖有頑獷之心亦不能不勸矣張氏曰要囚殄滅多罪而克用勸者要囚殄滅所以罰惡罰惡則惡者畏而姦心息此所以亦能勸而為善也開釋無辜亦克用勸者開釋無辜所以宥善宥善則善者畏而良心生此所以亦能勸而為善也乃勸者自然而勸也用勸者使然而勸也亦克用勸其為勸也勉強而已吕氏曰湯所麗者一出於正以此勸民天下皆將刑法湯無不勸矣故君是源民是流君是表民是影源清則流清表正則影正自然之理也君所麗者處既正以勸民而民必法效之無不翕然而勸嗚呼王若曰誥告爾多方非天庸釋有夏非天庸釋有殷乃惟爾辟以爾多方大淫圖天之命屑有辭乃惟有夏圖厥政不集于享天降時喪有邦間之乃惟爾商後王逸厥逸圖厥政不蠲蒸天惟降時喪無垢曰庸用也釋棄也言非天棄夏也夏自棄耳非天棄商也商自棄耳何則天即是我我即是天凡我所念所為無不合於道則日日有天命一念儻不當道即天所棄也故仰察璿璣之運足以知王政之治亂亦足以見天心之豫奪又曰桀之圖政不能集于享是民弗歸往也民之心即天之心民弗歸往此天所以降時喪也天既喪夏則必求能集於享者湯得所以集於享之道故能間有夏而受命湯亦起於諸侯故言有邦又曰桀之所以不集享者以逸而已湯之所以能間有夏而受命以知集享也以知正身之道也爾之後王其逸又甚於桀其步驟馳騁倣徨周浹無非逸樂不義之事所謂紂罪浮於桀者此也又曰蠲者潔也蒸者進也天下之本在國國之本在家家之本在身身既正矣則施為綱紀發為標凖垂衣拱手足正天下矣不能蠲潔其身以進於善則是身之不正也烏能圖厥政乎紂為不善如此必至於亡國敗家而後已此天所以降時喪也惟聖罔念作狂惟狂克念作聖天惟五年須暇之子孫誕作民主罔可念聽天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王靈承于旅克堪用德惟典神天天惟式教我用休簡畀殷命尹爾多方無垢曰聖狂之相去不啻霄壤之逺而其作聖作狂乃不出乎一念之頃何其易哉蓋念者覺也人本自聖所以不克由聖者念慮之起苦於不覺方其不覺之時聖則是狂覺則是聖而非狂矣此克念所以作聖也夫狂聖之分止在一時之頃則紂之喪宜無日矣而天之待紂猶周旋於五年之間冀其悔禍此何謂哉蓋有商之興賢聖之君作者六七天下歸商久矣天下之心眷眷於商天其忍遽絶之乎此所以待之如此之緩也而紂於五年之間心未嘗訟過口未嘗出悔痛之言一無可念一無可聽者蓋我能念天天亦念我我能聽天天亦聽我故曰皇天無親惟德是輔天既知紂終不悔過則又求爾多方之能顧天者故動以威想其當時災異百出不特警戒商紂又求之爾多方之君能開悟顧天者而乃無一克堪獨惟我周王能以善道承民民斯歸之矣天之聰明自民聰明民既歸之天命將焉之乎又曰我有德則能用德故好色則色至好貨則貨至好劔則劔士至皆我先有召之也克堪用德則周王先有是德故能用有德之人耳典者主也有德之人宜為神天所生今乃反主神天何耶蓋君即天耳苟非其人日月薄蝕星辰失度神靈不能得安其所惟克堪用德之君所為所行莫非天理故能彌綸天地之道範圍天地之化上下交泰宇宙肅清皆其心術所至此易所謂天地交泰后以裁成天地之道輔相天地之宜則知元后者真神天所賴以為主也又曰天即是我我得此理知如是而為仁如是而為義如是而為禮如是而為智則一出言一舉足無非仁義禮智之善其心豈不泮渙優遊泰然其日逸休乎所謂休者非自外來吾心安處耳周王所以大受商命而正爾多方也張氏曰惟聖罔念作狂者所謂舍則亡是也惟狂克念作聖者所謂操則存是也莫非聖也固天縱之將聖聖之出乎自然者也思曰睿睿作聖聖之出乎修為者也然則惟聖罔念作狂惟狂克念作聖豈非修為而然乎然則紂之無道而至於滅亡者以其有聖之道而罔念故也吕氏曰聖狂本無定名亦無限隔聖之與狂只在念與不念須知其本無定名聖豈有定名才罔念便是狂狂豈有定名才克念便是聖周公言此兩句蓋謂紂之為惡固已入於狂矣紂若能一念安知紂之不作聖又曰武王能善承於衆夏商之所以亡只是弗克靈承于旅周之所以興只是能靈承于旅以此知民為貴社稷次之克堪用德言武王能堪用德今我曷敢多誥我惟大降爾四國民命爾曷不忱裕之于爾多方曷不夾介乂我周王享天之命無垢曰古人化人全在一身之正故曰爾身克正罔敢弗正民心罔中惟爾之中又曰其身正不令而行其身不正雖令不從又曰以身教者從以言教者訟以成王之賢周公之忠聖如此宜不言而喻今紛紛如此不服者多方之罪也其不服而致我多誥者乃多方之罪非文武周公之罪也又曰夾輔也介其助也乂治也爾何不忱信寬裕夾輔我介助我致周王之治而享天命乎言乂我周王者多方不安則周王欲治不可得也其能享天命乎吕氏曰大抵殷民初所變亂者只為他不信天命不信周家之盛德只是有戀舊之情不充而大之不去大規模上看所以如此故周公所以勸殷民信周家而又寬大其心爾今爾尚宅爾宅畋爾田爾曷不惠王熙天之命爾乃迪屢不靜爾心未愛爾乃不大宅天命爾乃屑播天命爾乃自作不典圖忱于正無垢曰居爾舊宅畋爾舊田與在商無異汝何不順王廣天之命乎天命在我為爾不忱信不寬裕不夾不介不乂我則不能長久保爾宅畋爾田而自狹隘天命爾若不順我我將誅汝汝其能居爾宅畋爾田乎曰享天命熙天命者天命已定止享熙未能何者多方不享成王亦不享多方不熙成王亦不熙多方未乂成王其能安乎今爾常在不靜處蹈行故紛亂不靜者皆由爾心之未愛無顧藉愛惜之意是爾大不安天命是爾大棄天命豈他人纍爾哉張氏曰宅爾宅者言不失其所居也畋爾田者言不失其所食也今爾多方之尚宅爾宅畋爾田則我周於汝非故虐之也然爾不能惠王以熙天之命是汝之過也我惟時其教告之我惟時其戰要囚之至于再至于三乃有不用我降爾命我乃其大罰殛之非我有周秉德不康寧乃惟爾自速辜無垢曰討其倡亂執其朋黨至於再至於三若三監淮夷商奄之類是也我諄諄告戒如此再三不從不用我降命我將大罰殛汝矣然則豈周欲擾民哉爾自召之耳王曰嗚呼猷告爾有方多士暨殷多士今爾奔走臣我監五祀越惟有胥伯小大多正爾罔不克臬自作不和爾惟和哉無垢曰責有方多士暨商多士與胥伯多正之在上者當率其下也想當時多士有從周者有不從周者從周者少不從周者多故雖有在上之人自能從周而異謀者尚衆上之人亦未能率其下率其家也蓋當時所以為異謀必有為之倡者也然亦有不由倡而自為之者所謂自作不和者不由倡而自為者也吕氏曰周公告有方多士今爾奔走臣我已五年矣猶自未安寧先儒説遷殷民於成周五年無罪再使還舊土不見此意只是遷頑民必已得五年事何故既遷殷民於洛邑了自後淮夷奄叛成王既伐淮夷奄而歸到這裏已經涉得五年了監是長民之官也今爾奔走臣我已自五年今當安穩何故到而今爾也未安於我周爾室不睦爾惟和哉爾邑克明爾惟克勤乃事爾尚不忌于凶德亦則以穆穆在乃位克閲于乃邑謀介爾乃自時洛邑尚永力畋爾田無垢曰夫凶德之人其才足以為亂而其勢力又能使人不和為之長者不當忌之當有以感化之耳其所以至於不恤者亦由上之人無以化之反忌之故也又曰東坡謂服凶德者在於欽和蓋欽則不慢和則不暴夫人而逺暴慢之心則其溫恭和樂晬然見於聲容氣色之間彼凶德之人雖有悖傲作亂之心見如此亦必自為之感化矣此率下之道也臨川曰已能克享以和勤則何忌乎凶德哉君子忌吉德小人忌凶德而悔吉德張氏曰欲治其國先齊其家欲齊其家先修其身爾罔不克臬所以修身者也爾室不睦爾惟和哉所以齊家者也爾邑克明爾惟克勤乃事所以治國者也夫父子兄弟之間不能相與以睦則爾不可不和之也洪範曰汝弗能使有好于爾家時人斯其辜然則將克明爾邑則爾室不可不和之也天惟畀矜爾我有周惟其大介賚爾迪簡在王庭尚爾事有服在大僚無垢曰昔者多士共為凶德豈可使之在朝廷哉若其率化如此則我當開簡賢者使居王庭委任爾以事矣豈特委任以事當尊顯之使居大臣之列此告之以不終棄也張氏曰天之所以畀汝者錫之以福也天之所以矜汝者閔之以仁也非特天畀矜爾我有周亦大介賚爾蓋人君之賞罰亦順乎天者也迪簡在王庭尚爾事有服在大僚此所謂大介賚爾也大介爾如所謂佑賢輔德是也大賚爾如所謂錫之山川土田是也夫名器者天下之公也聖人何私於其間哉所聽用者惟德而已王曰嗚呼多士爾不克勸忱我命爾亦則惟不克享凡民惟曰不享爾乃惟逸惟頗大逺王命則惟爾多方探天之威我則致天之罰離逖爾土按此節解永樂大典原缺王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨無垢曰此篇皆以商人不肯從周而作而其所以稱天者無慮二十而稱帝者五蓋欲使商人知周之所以受命者非有意於取之也天之所命我周不能違也夫以我周猶不能違天命爾多士能屑播天命乎又曰東坡以又曰為他日甚善夫使我致天之罰皆由爾初不能欽和以化凶德使轉相率化則其自取天威非我咎之也故曰則無我怨夫桀無道而湯受天命紂無道而周受天命是或一道也商湯受命之初豈無夏之多士哉而下不聞有一人違命上不聞有告戒之辭今周王於此獨何為辛苦丁寧諄復誨諭之切耶豈文武之劣于湯而今之多士非昔之多士耶曰是不然有商與夏自不同也夫夏自大禹揖遜而得天下而啓繼之至少康而中興他無所聞焉有商之興賢聖之君六七作其仁恩德澤固結於民心者為己久故所以諄諄告戒猶或不從雖曰其頑可罪然亦可以見戀主之意矣吕氏曰大抵殷民之失其初已多周公到這裏乃説此乃爾之初何故自武王初定天下此乃殷民之初殷民乃從三監而叛成王既伐三監而作新大邑東國洛此亦是殷民之初到此人情猶未足烏有所謂初論來殷民已屢失其初周公却到這裏與他赦過宥罪再與他起頭説而今正是爾起頭為善時節爾若自後更不能親睦王室到得後來被罰那時却不可怨我以此見周公之於民尤惇篤懇切

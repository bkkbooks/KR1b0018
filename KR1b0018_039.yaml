body:
  text: 尚書精義卷三十九宋黄倫撰成周既成遷殷頑民周公以王命誥作多士無垢曰序言營洛既成遷此頑民故周公以王命誥之也嗚呼先王之道忠厚而已矣周公之視人也如吾親骨肉況此頑民皆商之士大夫特以懐舊君不暇顧其他耳其心亦可嘉也為計當以漸不當求速漸摩勸諭使知周之取天下非以為利乃順乎天而應乎人耳事久而定則是非明白矣此周公所以日俟其悔悟耳又曰序言頑民書云多士孔子書其惡所以見周家之忠厚周公稱其官所以見頑民之為士大夫深味孔子之意則周之徳愈見徒言頑民則不足以見殷之賢士徒言多士則不足以見周之徳量是序與書蓋相為表裏也吕氏曰謂之頑者何故大抵心在一處不知天命消息盈虛之理便是頑多士一篇多說箇天命至公之理以廓大殷多士志多士惟三月周公初于新邑洛用告商王士王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勅殷命終于帝無垢曰此三月是成王宅洛即政來歲之三月也何以知之去歲二月營洛今歲三月洛邑既成所以遷商民於此爾殷遺多士者以言爾等士大夫皆商之遺民也爾等知所以亡乎以商紂虐民違天天所不恤旻天以閔恤為事旻天且弗恤矣况天下乎詩序旻閔也舜得罪於父母號泣於旻天者以旻天最為易動也旻天既不恤所以大降喪亡於殷天以我周能奉承天命故天下民心皆歸於我我體天心以從事所以將天明威以伐紂致王者之罰以徳而不以力乃黜殷紂而誅之使不得居天位而我所以為此舉者非有他也天帝以伐殷事付我我則勤行此舉以終天帝之意耳張氏曰命有徳天之明也討有罪天之威也天雖有明威而將之者在人蓋天非人不因故也我有周之伐紂非出於一人之妄意也上則將天之威下則致王之罰所以勅正殷命而告終于帝也終者言天祿之永終也殷命至此而終則周之受命可知矣吕氏曰所將之威是天之威不是周之罰是王之罰在上為天在下為王都是至公無偏之理自天言之謂之天威自人言之謂之王罰名字不同其理則一若私己用威便是人威不是天威若私己用罰便是人罰不是王罰先說殷之所以亡周之所以興皆無非天肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉爲惟天明畏無垢曰紂非特天不與帝亦不與天帝一也天言定體帝言造化日月星辰天也執禍福之柄以應善惡者帝也夫為人君得罪於天又得罪於上帝其何以王天下乎欲知天帝之與不與當自民觀之民秉持我以為依賴為愛我以為父母則天帝之與我可知矣夫秉為之心當歸於紂今乃在周則天帝之黜商與周亦皦然矣天之明善威惡如此其可忽哉吕氏曰周固無心於求天天自左右輔翼周固不得不去討殷我何嘗敢求位惟順天公理不得不如此當時頑民染惡之久都去私意上看都不知天命廢興之常理將謂周是仇讎有意去取他周之文武無此心惟殷民有此心見得周雖無心似有心雖不求似有求此周公所以以天命至公不容己之理開他私心我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰無垢曰上言惟帝不畀故今言上帝之心上帝之心如何為人君者措民於安逸之地不以濫刑酷罰暴賦横斂以困之則合上帝之心而引其世祚至於長久儻困苦此民使不知有生之樂則上帝不畀而至於早墜厥命矣又曰有夏桀不合天意乃為瑶臺為酒池糟丘以疲民力又苛斂暴賦以割剝夏邑略不使民適於安逸天以民為心民既不得其所天乃出災害以譴告之又出怪異以警懼之又曰夏桀欲不勝道不能用帝之命而乃不顧天變大為淫泆汙穢沈湎之行其惡聲布滿四海以至腥聞于天又曰遭災害而不知省睹怪異而不知變乃怙終不更乃為惡滋甚為君如此天心亦何所望乎夫天所以區區出災害出怪異以譴告警懼之欲其畏天而修徳也今乃恬然不顧偃然自如天已絶望矣夫望之則災異多絶之則無所念無所聞不復眷顧仁愛廢其天命使宗社殞滅降以極刑使天位不保爾桀南巢之放此天也荆公曰引逸者易簡則逸反是則勞適逸者帝之所延也吕氏曰再自夏時說自上說與他我聞上帝開導有夏明示之輔翼之教他在安穩之地桀自不肯去平穩安逸之地天分明示人而人自不肯去惟帝降格天何嘗便肯絶夏一箇警動悚悟之意於夏甚多何故國於天地與有立焉有夏不適逸天何嘗便肯忘他猶示一箇眷嚮之意災害之出便是天嚮夏處水旱之來亦是天嚮夏處民心之怨亦是天嚮夏處上天拳拳警動他如此桀終不能順帝之時則其身縱放蹈於人欲播惡名於四方惟是天罔攸聞他既自絶於天天亦從而絶之所以廢其大命降其罰亡其社稷乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家無垢曰天下豈有無君之理哉一君為惡則天生一聖君為天子以代之矣天命豈可恃哉桀為惡不改故天命湯伐桀而革夏為商也惟乾九五之大人乃能用九二之大人有成湯革夏則有俊民治四方不足怪也以聖人為君而居人上俊民為臣而治四方則太平之治可一日而興也又曰自成湯至于帝乙罔不明德恤祀而在今後嗣王紂乃大不明於天道以其心不畏天也天且不畏况肯聽先王勤家之訓念先王勤家之事乎夫為人君上則無天下則無先王其亦何所不可哉紂之敗國亡家乃商家之不幸也誕淫厥泆罔顧于天顯民祗惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰無垢曰大為淫泆即沈湎冒色者也罔顧于天而弗敬上天罔明民可敬而降災下民民所以可敬者以民者天之心也上不顧天下不明民為可敬則天怒民怨而大命殞墜矣紂之所為如此所以上天不保佑之夫人主所以君天下者天相之也天相之則國家昌明天不相則國喪亡矣紂上不畏天中不念先王下不敬民天絶之先王絶之民絶之不亡何待乎又曰心與天同則天與之心絶於天則天罰之是以凡四方小國大國所以至於滅亡者無非不明於徳惡聲宣布腥聞于天此天所以罰之也張氏曰天之所顯者道也民之所祗者徳也罔顧于天顯則道不足以格天罔顯于民祗則徳不足以臨民夫皇天親有徳享有道今紂罔顧于天顯民祗則是反道敗徳者也此上帝之所以不保而降若兹大喪宜矣惟天不畀不明厥徳言不明厥徳者天之所不與也商罪貫盈則其徳昬矣上帝不保降若兹大喪則天不畀紂此可見矣王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告勅于帝惟我事不貳適惟爾王家我適予其曰惟爾洪無度我不爾動自乃邑予亦念天卽于殷大戾肆不正無垢曰上帝全付人民於人主者欲愛育保養之也紂不畏上帝以虐下民是上帝職事有曠闕矣故成王呼殷多士曰汝殷紂既廢墜上帝職事今惟我周文王武王乃大感通承奉上帝之職事文武無他職上帝愛民之心而奉承之耳靈有感通之意以言若與上帝酬答然者靈之意也又曰文武既與上帝若相酬答故知上帝有命於武王曰汝割絶殷紂勿令虐民武王承奉帝意黜殷殺紂以告正其罪於上帝言武王終上帝之事也又曰蓋以其叛所以遷于洛邑使商民不叛則周公無三監之伐亦無遷洛邑之事所以移動爾衆者汝邑自為之也我念天意止在即刑於殷倡亂如管蔡武庚之為大罪者而不在殷餘故我不正爾典刑而使之擯於人類也東坡曰我有事於四方曷嘗有再舉而後定者乎故曰惟我事不貳適貳適再往也惟於殷則觀政而歸己而再往是我先王不忍滅商之意也故曰惟爾王家我適不申言貳適者因前之辭也王曰猷告爾多士予惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨無垢曰武王親救殷民於湯火之中而民不知恩德所在乃反與武庚為叛儻不謀所以處之之道則其惡念何從而弭哉故我以道理而為此謀計遷汝西居於洛使密邇王家日見周之徳教日聞周之徳音日親周之賢士大夫庶幾其惡念熄滅而善端擴充乎嗚呼聖賢之處事可謂深逺矣又曰非我周王所禀徳性不好安靜也以汝好叛上天之意欲令汝去此舊染適彼新都而盡變其惡習也故我今日遷汝是惟天命非予私意也又曰遷居既出天命汝等不可違天也我奉承天命惟恐其後汝等當如何汝當知今日之舉出於上天非我私意無或致怨於我也嗚呼以周王貴為天子富有天下號令賞罰一出於己何畏民之怨乎其諄諄恐懼如此者則知周王之心其臨兆民凛乎若朽索之馭六馬也蓋平時暇日君尊如天民卑如地儼然南面莫敢仰視儻不以徳義固結民心一旦變起藩籬禍生肘腋則舟中皆敵國一夫能勝予其可不懼哉予味無我怨之語見其言温晏潤澤如春風之襲人膏雨之及物使人感愧戀慕嗚呼先王之心何其忠厚如此乎張氏曰成王誅管蔡商奄則殷遺多士嘗見徙矣今又營洛邑而遷之居西則疑於奉徳不能康寧之者也蓋人情好逸而惡勞安土而重遷今復遷之居西則寧不憚煩故周公又以此言而勞之也然而其所以遷徙不常者非我之所敢私也時惟天命而已天命以遷可順不可違故於是又告以無違也朕不敢後者趨時之道非敢緩也常人之情擾之使遷則不能無怨故又告之以無我怨惟爾知惟殷先人有冊有典殷革夏命今爾又曰夏迪簡在王庭有服在百僚予一人惟聽用徳肆予敢求爾于天邑商予惟率肆矜爾非予罪時惟天命無垢曰周公引商革夏故事告殷之多士乃答周公曰夏之士有蹈道者簡擇在殷王庭有為公卿者其次有服事於百僚為士大夫者意謂周儻遵殷故事何不選用商士為士大夫而擯棄疑貳之何哉觀此所言則商士知天命之不可回而將盡忠於周家矣又曰周公以成玉意答多士曰我惟聽有徳者之言用有徳者之才豈以商周之士貳其心也徳之所在聽用之所在也以勢觀之商士不知恩徳好為叛亂豈可用在朝廷及居百僚之間乎然予以聽用有徳為心故不分彼此敢求有徳於天邑商也他人豈敢如此乎又曰汝之叛亂理宜誅絶然而予率皆肆汝不罪矜汝不怒遷汝於洛邑又將擇有徳者而用之汝無自疑也予之遷汝欲汝日聞善言日見善行日親善人爾非我欲罪汝而為此紛紛也然而予之肆汝矜汝豈予私心哉是惟天命爾遷汝者天不殺者亦天則亦見周王之舉動無非天而已矣黄氏曰方商士之在洛也周公猶未之用其後有簡在王庭服在大僚則亦嘗試用矣陳豨反代高祖封趙可將者四人各千户曰吾以羽檄召天下兵未有至者今計惟邯鄲中兵耳吾何愛四千户不以慰趙子弟周初天下匈匈正坐商人耳徙其豪傑以解其謀而擇其可用用之以繫其心嗚呼亦高帝計也張氏曰迪之者開迪而教導之也簡之者甄別而升進之也迪之所以成其徳簡之所以用其才能迪簡之使在王庭然後得以服職在百僚也雖然周之於殷非不能如殷之於夏而迪簡之也蓋爾多士頑不可訓無可聽用之道而已又曰夫我之所以待汝者可謂盡矣然而不能用汝非我之罪是惟天命而已蓋彰有徳討有罪莫非天命豈人君之所敢私也吕氏曰大抵暴亂之民因他責望便以官與他却恣其意其惡愈深以天命之理至公之道說與他此見聖人臨大事之法王曰多士昔朕來自奄予大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜無垢曰誅其君而赦其民所以不致殺於汝等然而不可不為之計也故移汝以逺此惡俗而使比近服事臣服于宗周以下其虚驕叛亂之氣汝等見誅其君其心震恐又移逺惡俗其心純一故其所為無有前日倔强之心而多為遜順之行所以不復有殺汝之心也吕氏曰成周之地周公武王之化其俗濟濟多遜之人所以我既不遷爾於遐逖遷之於洛乃所以使爾宗多遜之人變移爾今我於商民可謂厚矣王曰告爾殷多士今予惟不爾殺予惟時命有申今朕作大邑于兹洛予惟四方罔攸賓亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止無垢曰言我所以作大邑於此洛邑者蓋有二事焉一則為四方諸侯來朝鎬京者無賓客之館故於洛邑置館舍以賓之二則亦惟爾多士居紂故都染紂惡習故我新此洛邑使若見若聞若親近皆周徳化周徳音與夫周賢士大夫庶幾轉邪心為正路變惡念為善端耳張氏曰作新邑非特諸侯之來賓也於是之時周公用書命庶殷而庶殷丕作則其服從而奔走從事臣我周王故亦多遜矣夫殷遺多士其始也能臣我宗多遜其終又能臣我多遜則周之教化固足以臣服之可知矣爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土予亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于兹洛爾小子乃興從爾遷王曰又曰時予乃或言爾攸居無垢曰遜順之心生於恭敬不敬則傲慢不遜此理之自然者也汝等能敬則與天同心與天同心則為天所與而不絶為天所矜而不棄天之畀矜即君之畀矜也君與之則置之於士大夫之間君憐之則有祿賜衣食之俸嗚呼豈特多士凡為人臣子者倘不知以敬存心則悖天之道而其禍有不可勝言者我代天者也汝心不敬我亦將致天之罰于爾躬誅殺絶滅躬且不得有矣而况於耕桑之業豈得有乎陳氏曰王曰之下當有缺文其簡脫矣又曰者承上文而言之也多方之末曰王曰我不惟多誥我惟祗告爾命又曰時惟爾初不克敬于和則無我怨用是知王曰之下當有文也乃或言爾攸居其文承上上簡脫矣予不能知其下矣周公作無逸無垢曰敬則不逸逸則不敬以敬為心則為恭為畏為不暇為克己尊先王之典彝而享國至於長久以逸為心則為傲慢為耽樂好田獵峻威刑聽小人之邪說享國不克長久此理之自然者也嗚呼人主有天下上焉則受皇天之畀付下焉則司萬民之性命内焉則祖宗社稷之所依外焉則蠻夷戎狄之所賴其任至大其責至深此豈細事哉如此重器必以敬為心者乃能負荷之其可以逸豫之心持之乎周氏曰天下常情莫不好逸而惡勞故聖賢之自處必以憂勤為監而以安逸為戒蓋憂勤則其興也勃焉安逸則其亡也忽焉古今必然之理也克勤于邦而夏禹以興坐以待旦而商湯以興禹湯之所以興者憂勤而興之也有衆率怠而夏桀以亡荒腆自恣而商紂以亡桀紂之所以亡者安逸而亡之也是故人臣之愛君者必以無逸為戒罔遊于逸伯益所以戒舜也無教逸欲臯陶所以戒禹也無時豫怠伊尹所以誥太甲也不敢逸豫傅說所以進高宗也罔或不勤太保所以訓武王也周公之心何以異於此哉范氏曰天下之善成於勤天下之惡起於逸故自天子至於庶人未有不先勤然後能成功者修徳不可以不勤舜雞鳴而起孳孳為善乃能成聖徳為學不可以不勤孔子終日不食終夜不寢乃能成聖學為治不可以不勤成湯昧爽丕顯坐以待旦文王日中昃不遑暇食故能成聖治荆公曰君子以勤得逸繼之以休小人以逸得勤繼之以憂李氏曰周之治迄成王而平周之化迄成王而備時已純熙則有可逸之勢物已盛多則有可逸之資天下有既濟之象而思患預防正難於此時矣周公得恝然無慮乎哉是以在彼舉三宗所以使知守成之不易在我而稱文王所以使知創業之艱難知守成之不易則宜效之而不可忽知創業之艱難則宜念之而不可忘張氏曰遇患難而憂勤享安寧而逸樂常人之情也周家之治自文武至於成王太平歌於既醉守成詠於鳧鷖其治為己安矣其時為己寧矣淫泆忽怠之心有不期至而至焉故周公於此遂作無逸之篇以戒於成王是非明足以見患而消患於無形者其何以及此無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺旣誕否則侮厥父母曰昔之人無聞知無垢曰周公未及一話一言不知見何事遽嘆而曰嗚呼乎蓋其所以嘆者深見君子所留心者其在無逸也嘗以意推之敬則神明尊逸則心志放神明尊則事事據理而行堯舜文武所以為聖者在此心志放則事事惟我所欲其殘民暴物皆所不恤也桀紂之所以為桀紂止以逸也嗚呼逸其可有乎周公所以見此未言而先嘆也又曰小人以盤樂怠傲為逸樂君子以稼穡艱難為逸樂小人所見近故其所謂逸樂者每足以亡國而敗家君子所見逺故其所謂逸樂者每足以享長年而傳後世蓋艱難中自有逸樂之理人自不知耳當其寒耕熱耘沾體塗足時已有千倉萬箱百室盈婦子寧之理矣豈非逸樂在艱難中乎若酣歌恒舞飛鷹嗾犬時已有亡國敗家覆宗絶祀之象矣何逸樂之有乎又曰農夫為父母其勤勞如此厥子既生寒而衣饑而食以謂吾所固有爾豈知其所衣所食者粒粒縷縷皆自父母勤勞辛苦中來乎亦猶後嗣王安享天下豈知尺地寸土皆自祖宗艱難勤苦中來乎又曰衣食既足而不知稼穡艱難則其心放逸其心放逸則其意輕忽其意輕忽則其言誕謾此自然之理也又曰不知稼穡之艱難而逸而諺而誕者此庸愚之子也其害為小否則侮厥父母曰昔之人無聞知此又凶愚之子也東坡曰舊説先知農夫艱難乃謀逸豫非也周公方以逸為深戒何其謀逸之亟也蓋曰王當先知稼穡之道惟艱難乃所以逸樂則知小人之依者以王者知此則不妨農時不奪民利不盡民力也史氏曰甚哉人君以民為憂而不以位為樂也惟其逸斯能念民之生為甚勞當其乃逸又念民之所賴為甚重二者安危治亂係焉特在人君知與不知而已稼穡艱難是為生者甚勞也吾知之而不敢肆小人之依是所賴者甚重也吾知之而不敢忽稼穡待小人而成小人因稼穡而養而知與不知特在夫逸與不逸之間為人主者可不戒哉張氏曰稼穡艱難小人之事也為君子而不知小人之事則侈靡自恣役天下以奉於一身無所不至也則稼穡艱難之事在君子不可不知也能知稼穡之艱難然後可以享其安逸非特可以享其安逸也又足以知小人之所依而不敢逸焉蓋小人者柔而不能以自立其所依乃在君子為君子者必勞心然後足以治之其可逸乎吕氏曰君子所其無逸謂君子不可斯須離去無逸此一句最在所字上止其所止之謂所須是以無逸為所居大抵人道健而不息這方是人道若有斯須怠惰便不是人道周公曰嗚呼我聞曰昔在殷王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧肆中宗之享國七十有五年無垢曰嗚呼周公之於成王之心可謂切矣前言小人放逸所以警之使退今言古先哲王敬徳所以引之使前成王知放逸之不可為而敬徳之可以長年也則入徳之階顯然可升矣中宗商王太戊也心不散則嚴貌不亂則恭中宗非特行於廟堂之上也在暗室之中亦若此焉不然何以動天心感民心哉又曰惟嚴恭故於天命則知所寅畏於治民則知自度又曰憂畏者必有儉徳儉則仁仁則惟恐勤民動衆殀夭殺胎故天下皆成和氣和氣所至動有生意此中宗所以長年也放逸者必侈汰侈汰則不仁害虐蒸民暴殄天物天下皆成怨氣怨氣凝結觸之則死豈有長年之理乎人主之所畏者最畏短命此周公所以警成王也周氏曰周公恐成王之未信也故引先代人君無逸享年者以明之中宗即太戊也太戊都亳亳有妖怪桑榖二木共生於朝七日而大拱天著不恭之訓大戊恐懼作原命之篇告其相伊陟以改過自新遂能弭災變致太平故經曰在太戊時格於上帝此嚴恭寅畏天命之實也自度治民者自其身由法度以率百姓源濁而求其流之清表曲而求其影之直沒世而不可得矣陳氏曰外致其嚴恭内致其寅畏自度言自治以法度也言祗以欽之言懼以畏之中宗嚴恭寅畏於天命故以之治身則自度以之治民則祗懼如是豈以逸豫為哉故於事不敢荒於心不敢寧尤以畏天為主也其在高宗時舊勞于外爰曁小人作其卽位乃或亮陰三年不言其惟不言言乃雍不敢荒寧嘉靖殷邦至于小大無時或怨肆高宗之享國五十有九年無垢曰中宗天性無逸高宗因艱難而無逸雖所入路不同其所以為無逸則一也高宗未為太子時其父小乙欲其知稼穡艱難故使之久勞于外爰暨小人同為艱難之事非苦之也蓋所以成就之也豈以小乙知武丁器質英邁必能中興商家故使之徧歴艱難庶幾知民間利病乎蓋惟涉山川者知險阻苦寒暑者知炎凉漢宣久在閭閻乃盡知民之疾苦遂為漢家賢主亦何怪乎高宗哉又曰嘉善也靖安也善安慰天下至于無小無大皆懐其深恩厚澤無一人或怨之者嗚呼其盛矣哉蓋放逸則必擾民故多怨無逸則必靖民故多譽此自然之理也其在祖甲不義惟王舊爲小人作其卽位爰知小人之依能保惠于庶民不敢侮鰥寡肆祖甲之享國三十有三年無垢曰孔安國謂祖甲為太甲此蓋惑於國語太史遷之說也國語之說曰帝甲亂之七代而殞太史遷之說曰武丁崩子祖庚立祖庚崩弟祖甲立是為帝甲帝甲淫亂殷道復衰其說如此故安國以祖甲為太甲安國以世次顚倒也乃為之說曰此以其徳優劣立年多少為先後巧則巧矣然亦辭費鄭康成不知見何古書獨曰祖甲武丁子帝甲也有兄祖庚賢武丁欲廢兄立弟祖甲以此為不義逃於人間故云久為小人果如是說則祖甲有伯夷叔齊泰伯虞仲之節可謂賢君矣又曰以祖甲之賢而舊在民間故深知稼穡艱難及一起而即位則知小民所依全在稼穡故不妨農時不奪民利不盡民力而天下皆受其賜矣以此知生於深宫之中長於婦寺之手未嘗知哀未嘗知憂未嘗知苦未嘗知懼者其亦危哉又曰中宗享國七十有五年高宗享國五十有九年祖甲享國三十有三年祖甲不及高宗高宗不及中宗豈徳有厚薄而年有長短也曰中宗高宗祖甲即位之初未知其老少如何老者必不久少者享國必長年如舜大徳在位五十載不及中宗之久豈可謂舜徳不如中宗哉古書無據未有以考之又况人之氣數自有長短第修徳者必延年而不敬者必夭折也此不可不知矣陳氏曰庶民有常産之民也鰥寡無告之民也有常産之民則保以安之惠以懐之無告之民則敬之而不敢侮保惠之仁也不敢侮禮也祖甲之不明卒能保惠庶民不侮鰥寡者豈非伊尹訓之先王子惠困窮民服厥命之力哉自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽或十年或七八年或五六年或四三年無垢曰三宗之無逸見敬徳而不見富貴後王生則逸見富貴而不見敬徳以此知之人主之不可不學也人主之敬多發於變故艱難中所謂知生於憂患也中宗因桑榖之異而知敬高宗因舊勞于外而知敬祖甲舊為小人而知敬又曰人心必有所係知稼穡之艱難則心在艱難聞小人之勞苦則心在勞苦如此則其心常在畏敬之地何敢少放逸乎後嗣王既不知稼穡之艱難又不聞小人之勞其心泛泛靡有所止見放蕩之路則必奔趨之矣此所以惟耽樂之從也又曰自祖甲之後有廩辛庚丁武乙太丁帝乙帝辛帝辛紂也周公曰自成湯至于帝乙罔不明徳恤祀則帝乙乃賢君也以周公今說次敘之則是廩辛十年庚丁七八年武乙五六年太丁四三年矣皆因耽樂以致短命是敬徳者必長年不敬徳者必短命也人主享國宜知所擇焉張氏曰三王以憂勤而享國長久後王以逸樂而罔克夀然則稼穡之艱難君子不可不知之也此周公所以惓惓於成王而歴告之也吕氏曰自此以後凡所以立王生便在深宫豢養之中都不知稼穡之艱難亦不聞小人之勞非特是不見亦不聞何故後來繼體守文之君固少有親見小人之勞者既然不知稼穡朝夕只在逸樂之中縱有人說小人勞苦事他亦顰蹙自不要聽又况左右却是讒謟面諛之人如何肯說凡小人之勞既都不聞則心無所用自然一意向聲色狗馬之樂設使曾知稼穡之艱難曾聞小人之勞他何緣安穩放心去聲色狗馬上

body:
  text: 尚書精義卷六宋黄倫撰帝曰來禹降水儆予成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功予懋乃徳嘉乃丕績天之厯數在汝躬汝終陟元后無垢曰鯀既績用弗成殛于羽山在廷之臣自度才智無足以任其責者皆退避不言太史公曰禹傷先人之功不成受誅乃焦心勞思居外十三年是衆人不敢當此任而禹自信以卒父業卒使東漸于海西被于流沙朔南暨聲教訖于四海以雪父之恥以遂禹之本志此所謂成允也披九山通九澤决九河定九州各以其職來貢不失厥冝此所謂成功也衆臣之中有及之者乎無有也故曰惟汝賢又曰勤儉之徳稍自好者亦能為之而不自滿假斯為難也秦始皇衡石程書亦已勤矣乃巡歴天下刻石紀功此自謂勤而滿假也梁武帝薄衣茹素亦已儉矣乃貽書臣下自述其功此自謂儉而滿假也惟禹雖惡衣服雖菲飲食盡力溝洫而退處於驚懼之地常恐盈溢廣肆以貽君子之譏焉衆臣之中有及之者乎無有也故又曰惟汝賢又曰夫有勤儉之能而不矜則亦息天下自矜之心矣故其能愈髙也有允成之功而不伐則亦息天下自伐之心矣故其功愈大也莫與爭者葢言天下之人亦因禹而無矜伐之心也夫我自矜則起天下自矜之心我自伐則起天下自伐之心此心既起以能相髙以功相大風俗薄惡妬嫉交行此非聖賢之道也陳氏曰天下之物有盈必有虧有盛必有衰盈虧盛衰先自戰于胷中欲天下之不與我爭不可得也聖人以天地萬物皆同乎吾之一體疾痛疴癢吾所當去安佚休息吾所當取初非有為物之心也故其能也不見有其能其功也不見有其功盈虧盛衰無一介有乎其心則天下孰與吾爭者耶黄氏曰不矜不伐聖賢之令徳也用之治世足以成其功名用之亂世足以辟其禍怨葢功名者世之所慎重也誠能不爭世之所甚重則怨禍希矣人心惟危道心惟微惟精惟一允執厥中無稽之言勿聴弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天祿永終惟口出好興戎朕言不再無垢曰夫天下之大四方萬里之逺事之不一物之不齊宜不可以一言斷之矣然而使聖人見天下見四方萬里若大若逺見事見物不一不齊竊意聖人之心亦已不給矣惟聖人知天下四方萬里若事若物之本執而綏之所以天下四方萬里事物之情無不灼然布于几席之上而發號施令靡然自當於天下四方萬里事物之心使無寃苦失職之嘆者則以得其本也夫所謂天下四方萬里事物之本何物也曰中而已矣葢天下此心也四方萬里此心也若事若物此心也此心即中也中之難識也久矣吾將即人心以求中乎人心人欲也人欲無過而不危何足以求中又將即道心以求中乎道心天理也天理至微而難見何事而求中曰天理雖微而難見惟精一者得之精一者何也曰精則心専入而不已一則心専致而不二如此用心則戒謹不睹恐懼不聞久而不變天理自明中其見矣既得此中則天下在此也四方萬里在此也若事若物在此也信而執之以應天下四方萬里事物之變葢綽綽有餘裕矣又曰君執此中也故可愛而不可逺民具此中也故可畏而不可忽是君與民皆有此中者也民非君之中其何以依倚故曰衆非元后何戴君非民之中其誰與保守故曰后非衆罔與守邦是中之所在無適而不宜也賈氏曰夫辯人心道心之異者正心之義也必精必一以勝人而入道者存誠之義也去人之危入道之微則心不外馳而中已確然矣其徳罔愆而廣運豈不宜哉雖然是中也堯既咨舜舜亦以命禹夏商周又以建極孔子又常常諷道之孟子亦願學孔子其相傳之妙固已明矣此韓愈氏所以得而言之且謂至軻而止也然則五世之所以盛豈徒然哉噫五世已往傳而在上故其道行五世以來傳而在下故其言立道之不明日已久矣周氏曰人心利欲之私也行乎利欲之間豈不危乎道心義理之心也求諸義理之所在豈不微乎惟危也故察之為難惟微也故明之為難是以三聖精研而不擾致一而不二本心昭曠而後能執其中道張氏曰孔子云仁者人也所謂人心者以道為心也莊子曰道兼於天所謂道心者以天道為心也轉之不得視之不見幽深不可度則道心可謂微而難知矣由人心以至於道心入道之序也至于道心則神矣神則極髙明矣及其出而應物又有以道中庸者焉故惟精所以存神惟一所以守精存之以精守之以一而不能以中行之則崖異卓絶且將異人異物則人將何望於我哉此又所以終之以允執厥中也精以存之則神無不明而天下之物莫足以䘮吾存也一以守之則精無不固而天下之物莫足以更吾守也孔子曰中庸之為徳其至矣乎則允執厥中其可忽哉能允執厥中則賢者智者不忽其易愚者不肖者不苦其難有餘者可以俯就不足者可以企及非天下之至中其孰能與此又曰四海困窮則饑饉凍餒民不聊生君雖有粟焉得而食此天祿所以永終也言永終者謂其不復有繼之之道也苕之華詩曰民可以食鮮可以飽此特幽王之時饑饉薦臻民卒流亡周室由是而大壊君子閔之故作是詩也有天下必以富民為先葢百姓足則君孰與不足故四海不困窮則天祿亦長享矣舜欲禪禹以位其告戒之詳至於如此葢天下大器也有而為之其可易耶禹曰枚卜功臣惟吉之從無垢曰舜使禹為百揆禹讓於稷契暨皋陶帝曰俞汝往哉不聞其復讓也及其禪位禹稱皋陶而不敢當舜亦稱皋陶而歸其美又備述禹之功徳盛大天之厯數已在其躬不可避之意又傳以為天下之心法事已備矣不可已也禹方欲枚卜功臣惟吉之從何其辭避之深與百揆時不同也曰天下克艱之物也愚者借此以為樂卒至於亡其軀墮其祖廟曾不若閭巷匹夫刻苦而自保也智者見天下之富不如貧之安見天子之貴不如賤之樂葢貧賤者責輕而憂寡富貴極者責重而憂深况以中人之資而使在人上意氣得行逸樂自恣其能免者幾希舜二十以孝聞三十而歴試諸難六十而即位在位十有三載而求禪位是生九十五年矣統攝位禪位六十餘載矣其於一身之理天下之事亦已熟矣而益方進罔遊於逸罔淫于樂之戒禹方進念兹在兹釋兹在兹之戒是為天子者不可頃刻而不戒也其艱難如此非至愚人其誰願以天下為樂乎張氏曰舜以天下讓禹禹以謂在舜之朝臣之有功於國者固非一人也當人人而卜之卜吉則從而授之以天下故曰惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭帝曰毋惟汝諧無垢曰夫官占之法先斷于人心非盡取於謀卜筮也惟先蔽志是先斷之以心也心既已定然後質之於鬼神葢幽明一也使吾先所見極盡天下至正之理則龜筮其有不從之者乎儻志之所見或暗於一偏則龜筮亦不得而私也是龜筮者所以證吾之明暗也舜以人事觀之其子不肖而吾年又耄期倦于勤矣大禹乃有盛徳元功如此天下非禹其誰乎是朕志先定也在廷之臣亦自謂禹之徳大舉天下無足以及之也天下非禹其誰乎此詢謀之間所以皆無異論而僉同也鬼神即天下之正理也舜之心如此鬼神舍此而何依乎龜筮協從自然之理也由是觀之人不能舍龜筮以自是而龜筮亦不能舍人而自私也龜筮在動植中無情而至公者也先聖取此以决疑非窮知事物之理者其能留此法以正後世妄作之君乎然卜以决疑不疑何卜舜無疑矣而猶卜焉者不敢自以為盡天下之理卜已協從則亦已矣豈有重卜習吉之理乎再三瀆瀆則不告天理之自然者也正月朔旦受命于神宗率百官若帝之初無垢曰文祖者堯之祖神宗者舜之宗祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯是神宗者乃堯廟也繼世者不忘於始祖受終於文祖者堯繼世也禪位者受命于所禪之君故受命必於神宗舜受堯命故也此理自可推矣率百官若帝之初則察璣衡類帝禋宗與夫巡守之事一皆循舜故事而不敢忽也張氏曰堯禪舜而堯受終於文祖堯言受終則舜之受命可知矣舜之禪禹而禹受命于神宗禹言受命則舜之受終可知矣文祖祖之逺者也神宗宗之近者也於前舉逺以見其近於後舉近以知其逺皆作書者之法也率百官若帝之初者如舜始事之時也舜之即位在璣衡以齊七政類上帝禋六宗望山川徧羣神五瑞則輯之四岳羣牧則覲之此帝之初也禹之受命如之而已故曰若帝之初帝曰咨禹惟時有苗弗率汝徂征禹乃會羣后誓于師曰濟濟有衆咸聴朕命蠢兹有苗昏迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭伐罪爾尚一乃心力其克有勲無垢曰禹方知有苗之過而不知朝廷之過且舉其過而誓于師有奉舜之辭罰苗之罪其克有勲之説是將芟夷藴崇之矣五十餘年向化一旦弗率遽為此舉豈不太嚴乎且其舉有苗之罪曰昏迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎其信然乎曰信然則征之宜矣曰禹雖有盛徳大功人臣也人臣而攝君位儻非君子其能無疑乎有苗之國資禀小人見舜之攝則作亂至竄至分北然後已今又見禹之攝位則又不率矣其不率也以昏迷而不知聖賢之舉也不恭侮慢以禹之故自賢反道敗徳以禹之故其中必有君子諫其不然者故遂使之在野必有小人同心以濟其惡者故用之以在位民不以為然故棄而不保天不以為然故降之咎其失皆以禹故其心不明其氣不平故為昏迷而不恭為侮慢為自賢為反道為敗徳至小人與之君子皆棄之三旬苗民逆命益贊于禹曰惟徳動天無逺弗届滿招損謙受益時乃天道帝初于厯山往于田日號泣于旻天于父母負罪引慝祇載見瞽瞍䕫䕫齊慄瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于兩階七旬有苗格無垢曰贊助也夫徳可以動天是無逺弗至也今三苗雖在王畿之外未為逺也徳且可以動天地况近如有苗豈不可至乎然而所以弗率而逆命者豈徳有所未至乎夫五十年向化一有弗率遽往征之是疑於滿矣退而修徳謙也謙必受益遽而往征滿也滿必招損此天之道也然則苗之弗率而逆命此乃天道警戒舜禹也夫頑如瞽瞍舜號泣于旻天于父母以哀感之也負罪而不敢辯引慝而不敢辭祗載以見而不敢踈䕫䕫齊慄而不敢慢此以敬感之也感於此必應於彼瞽亦信順之舜哀敬之力積久而形見也至誠尚可以感幽明之鬼神况顯明如有苗者其有不感乎然則弗率而逆命是舜禹之滿形見于有苗者誠諸中必形諸外豈可忽哉張氏曰贊者利導之而已蔡仲之命曰皇天無親惟徳是輔泂酌序曰皇天親有徳則徳之可以動天可知矣夫以天之髙逺徳猶可動其有逺人而不届者乎滿招損言天道之虧盈也謙受益言天道之益謙也易曰天道虧盈而益謙此滿招損謙受益所以謂之時乃天道又曰易曰咸感也速也葢因時乗理而感物之速者莫如咸故至諴可以感神夫神之為物在色非色在聲非聲視之不見聴之不聞自非至誠曷足以感之者哉天則有形者也故曰動神則有情者也故曰感詩序言動天地感鬼神與此同意夫天之髙也有徳者足以動之神之幽也至諴者足以感之瞽瞍之至頑舜之大孝足以使之允若矧兹有苗其有不化之者哉又曰孔子曰逺人不服則修文徳以來之帝乃誕敷文徳將以柔逺人也舜之文徳其修之也固有素矣至此乃曰誕敷者葢亦聖人躬自厚之道也夫干戚之舞羽旄之容所以為樂舞干則干戚之舞武舞者所執也舞羽則羽旄之容文舞者所執也葢武以象扞蔽之功故其執以干干主扞蔽故也文以昭翼蔽之徳故其執以羽羽主翼蔽故也舞以干所以示武之可威舞以羽所以示文之可懐非武非文無以示徳則舞干羽于兩階者示之徳故也此所以七旬有苗格則其慕徳可知矣皋陶謨曰若稽古皋陶曰允迪厥徳謨明弼諧無垢曰徳者得也心有所得凡外之富貴貧賤死生患難不足以動之者是所謂徳也倘有一毫動蕩凡心俗慮豈可謂有所得哉允迪厥徳謂信行其所得也欲知所得有無苐觀謀事明與暗弼人和與乖耳夫信行其所得者心地廓然洞見是非成敗利害之㣲近在一世之表逺在千萬年之外莫不如鑑之照形燭之灼物其謀事豈有不明乎心神和粹使人之異意也消䋲愆紏謬格其非心穆如春風之著物盎如和氣之襲人其弼人豈有不諧乎張氏曰堯舜君也若稽古於上所以盡君道禹皋陶臣也若稽古於下所以盡臣道君臣上下分雖不同其於古也必皆有以若稽之葢以事不師古而克永世者未之聞也又曰自仁不仁言之則有吉有凶自智不智言之則有昏有明君子之於徳向吉而背凶舍昏而即明則其允迪可知矣又曰能允迪厥徳則心徹於内而思慮不蔽智徹於外而視聴不悖以之成謀則明謂其智足以燭理故也以之受弼則諧謂其仁足以從諫故也謀之既臧則具是違謀之不臧則具是依非所謂謨明也誨爾諄諄聴我藐藐匪用為教覆用為虐非所謂弼諧也凡皆以不能允迪厥徳而有物以蔽之故也吕氏曰允迪厥徳謨明弼諧此兩句史官斷盡皋陶為人有徳者必有言皋陶以謨聞天下史官惟恐人徒知其謨之出於言故先言允迪厥徳指其根本以示人惟其有徳故以謨則明以弼則諧禹曰俞如何皋陶曰都慎厥身修思永惇敘九族庻明勵翼邇可逺在兹禹拜昌言曰俞無垢曰禹問如何其言未終不知皋陶何所見而遽歎美之曰都乎以此知古人黙識衆理見其美惡而發於吁都之間者他人葢莫知也其美如何使九族親厚近臣勵翼亦可謂大矣然不過吾允迪厥徳而已豈非可歎美乎吾何以知徳之所在哉慎厥身修思永而已夫慎厥身修者以謂修身不可不慎也楊墨皆修身也惟不慎其所取楊遂至於無君墨遂至於無父其弊如何弊在不思而已矣君子過言則民作辭過動則民作則故君子言必慮其所終行必稽其所敝豈肯遽然無所稽考思慮妄以謂修身之法在此哉必也索賾探隠鈎深致逺於利中求害於是中求非參之於心驗之於古詢之於朋友正之於父師必使考諸三王建諸天地質諸鬼神百世以俟聖人不謬不悖無疑不惑而後已皋陶曰都在知人在安民禹曰吁咸若時惟帝其難之知人則哲能官人安民則恵黎民懐之能哲而恵何憂乎驩兜何遷乎有苗何畏乎巧言令色孔壬無垢曰知人乃哲也哲則能隨人才大小而官之安民乃恵也恵則能使天下皆懐之審堯能盡哲恵顧如驩兜有苗巧言令色孔壬之徒一皆使之在朝廷豈能害吾知人安民乎惟堯之徳未至於哲恵所以憂四凶在廷吾不能不惑其姦而至人不盡其材民不獲其所所以憂所以遷所以畏則以不自保其有哲恵之徳也嗚呼此禹之見耳此禹以理當如是者為艱難耳不知憂遷畏乃所以為哲恵也夫驩兜之比周理在所憂而放之三苗之作亂理在所遷而竄之巧言令色孔壬若共工者理在所畏而流之非能哲而恵之君豈能為此儻使四凶不去此不哲不恵之罪也禹反以為不能哲恵者此自其艱難中見之也堯固如是哉然則禹之言害道乎曰此正堯之心也安得謂之害道堯之心肯自以謂吾能哲而恵乎不能者正堯之用意䖏使天下後世皆知堯以謂不能則其能豈有既乎余指其憂遷畏為哲恵者以謂天下之觀堯者當如此而欲學堯者當如禹之言以不能自處可也此又聖賢之微意孔氏曰甚哉人之難知也天地吾知其寒暑代至而萬物所以生也鬼神吾知其鑒察幽微而禍福所以應諸人也山川吾知其險阻在前而梯航可以逾也若夫斯人吾不知其思慮藏諸心而縁事以發也將以言求耶則其議論莫非聖賢而所為不少侔焉出而面諸人則道前古之遺餘而歸於善退而怡於私則怨睢薄惡而靡所不至將以行考耶則其獨居操履修正無缺而處衆莅事曾莫通其情焉為名利而自勉則君子也當憂危乘隙志盈而中變則又小人也藏諸中發諸外者言與行爾言行既不可以盡其心則知之也豈不誠難哉張氏曰智足以有察然後可以言知人之方仁足以有愛然後可以言安民之道不知人則賢佞無所别故為君之道在知人而已不安民則黎庻失其養故為君之道在安民而已堯舜之知不徧物則知人者帝之所難堯舜之仁不徧愛則安民者帝之所難夫人心險於山川難於知天則人固不易知矣能知人然後可以為哲夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨則民固不易安矣能安民然後可以為恵

body:
  text: 尚書精義卷二十八宋黄倫撰乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓悦服無垢曰紂反先王之政而天下亂武王反紂之政而天下治反紂之政豈用武王私意哉一由商之舊政耳商之舊政民心在焉政一由舊則民心歸矣又曰紂以箕子為有罪而囚之以比干為有罪而殺之又以商容為有罪而絀之夫此三人者商民之所歸心也紂乃囚之殺之絀之則民心去矣今武王一入商邑解釋箕子之囚增封比干之墓式敬商容之閭民心歡欣當如何哉皆知武王之心與民心同矣武王知民心在此其入商邑未及一話一言首為此舉而民皆悦之八百年基業自此立矣於乎盛哉老泉曰武王以天命誅獨夫紂揭天下大義而行夫何䘏天下之人而其發粟散財何如此之汲汲也意者雖武王亦不能以徒義加天下也乾文言曰利者義之和又曰利物足以和義嗚呼盡之矣君子之恥言利亦恥言夫徒利而已東坡曰實者所以信其名而名者所以求其實也有名而無實則其名不行有實而無名則其實不長凡今儒者之所論皆其名也昔武王既克商散財發粟使天下知其不貪禮下賢俊使天下知其不驕封先聖之後使天下知其仁誅飛亷之惡使天下知其義如此則其教化天下之實固已立矣天下聳然皆有忠信亷恥之心然後文之以禮樂教之以學校觀之以射御而謹之以冠昏䘮祭民是以目擊而心喻安行而自得也張氏曰繼治世者其道同繼亂世者其道變武王之伐商則繼亂世而已故反商紂之惡政而政由舊也如湯之伐桀所謂纉乃舊服同義釋箕子囚封比干墓式商容閭所以禮君子也散鹿臺之財發鉅橋之粟所以恤小民也大賚於四海所以錫予善人也蓋武王於建萬國親諸侯而大封之将以與之共治也惟其如此此萬姓之所以悦服呂氏曰武王與成湯合徳同心紂之所以亡者縁其盡變舊政武王伐之豈有他哉欲盡還天下之舊使天下再見湯太甲六七賢君也聖人同心同道如此箕子賢人也前日囚之吾今日則釋之比干亦賢人也前日殺之吾今日則封之商容亦賢人也前日貶之吾今日則式而禮之此都是天地重開日月還明之氣象也紂之利己不利人不知天之生財生粟本欲要養天下之人是人人有分也下之供上如九賦九貢固自有常數也紂欲歛天下之財粟而為己有聚之於鹿臺鉅橋奪天生養民之具自歸於己是以聚天下之怨武王一發散之解其前日之怨還合當有分之物萬姓自然悦服後世以私心看武王乃謂武王收天下之心以紂歛天下之怨使武王欲收天下之心是亦一紂也武王豈有此意哉武王循天理而已列爵惟五分土惟三胡氏曰列爵惟五者孟子謂五等附庸在其間也其列爵也公侯伯子男凡五等其分土也公侯百里伯七十里子男五十里凡三等庶邦冢君暨百工受命於周故其制則列爵惟五分土惟三而異乎商之制也王制言公侯伯子男凡五等此列爵惟五也公侯百里伯七十里子男五十里此分土惟三也周官言諸公之地封疆五百里侯四百里伯三百里子二百里男百里其制與此不同者葢武成孟子王制言其封之實而周官之制兼附庸而言之徳不倍者不異其爵功不倍者不異其土以徳異爵此公侯伯子男所以别之以五也以功異土此公侯百里伯七十里子男五十里所以分之為三也建官惟賢位事惟能重民五教惟食䘮祭惇信明義崇徳報功垂拱而天下治無垢曰建官非賢其何以成朝廷治事非能其何以濟度庶物官若公孤之屬非大有徳行不可以居此位事若六卿之屬非大有才智亦不可以居此位然則徳者責以才智乎才智其有徳行乎曰是何言也公孤位重才智為不足道爾六卿羣司之長使無徳行亦豈能在朝廷苐公孤以徳行為任故稱賢六卿以才智為大故稱能武王新得天下豈容有無徳無才者居公卿之位乎此可以意㑹也民者邦之本五教者人之大倫食者民之天䘮者人之送終祭者人之報本此五事者皆有天下者之所當尊敬也重然諾者其言可法故當厚待之惇者厚待之也謹踐履者其行可師故當顯揚之明者顯揚之也徳為天下所尊故當崇功之在人有不可忘者故當報此皆百王之所同千聖之所傳也豈為過分也哉夫使人主厚待然諾之人顯揚踐履之士尊徳行而報功勞此豈非太平之主乎武王一得天下其所施為皆當人心嗚呼其盛哉又曰謂垂拱而天下治何也天下之理順而行之則其心初無為其廢其興一於理而已矣夫武王之伐商豈於天地之外有一毫私心哉商勻當伐紂自當死箕子自當釋比干自當封商容自當式鹿臺自當散鉅橋自當發四海自當賚諸侯自當受命廟自當祀天自當郊武自當偃文自當修以至信自當惇義自當明徳自當崇功自當報此天理也武王垂衣拱手坐觀衆理而行之豈有一毫私心以為之哉呂氏曰建官位事在内之政官不賢不可居其官所以天工人其代之須與天相似便是賢位事者各随其能重民五教王者之事不過教養而已重之者非强使之重五教扵食䘮祭之中非食䘮祭之外别有五教而已所謂衣食足然後知禮節惇信明義崇徳報功武王各因其所當然有信則惇之有義則明之徳則崇功則報萬物各得其所自然垂拱無為而天下治與舜優㳺南面垂拱無為而天下治太平無異也武王勝殷殺受立武庚以箕子歸作洪範無垢曰洪大也範法也言九疇乃自有天地以来天地之大法不可違也不謂之法而謂之範法則入範則出猶植之在範以一而生無窮之物也九疇造化天下豈有紀極哉東坡曰殺受立武庚非所以問洪範者而孔子於此言之明箕子之徳武王葢師而不臣也箕子之言曰今殷其淪䘮我罔為臣僕殷亡則箕子無復往之道以此表正萬世為君臣之法如伯夷叔齊之志也箕子之道徳賢扵微子而况武庚乎武王将立殷後必以箕子為首微子次之而卒立武庚必二子辭焉武庚死而立微子則是箕子固辭而不可立也太史公曰武王封箕子于朝鮮而不臣也非五服之外賔客之國則箕子不可得而侯也楊氏曰且殺受立武庚無預扵作洪範若曰武王勝商以箕子歸作洪範斯亦可矣然仲尼叙洪範必載殺受立武庚於其間者著武王周公之失也夫立商之後者非若居常繼世以立諸侯然使之開國以奉商世先王之祀非為紂一人而已豈得知箕子之賢訪之以洪範而不立之俾奉商祀而立其殺者不肖之子俾為二王後茲非失乎至成王時武庚果作叛卒至扵動兵勞衆而僅克誅之則武王周公作事謀始之失不亦著矣哉張氏曰道散而為隂陽隂陽散而為五行五行散而為萬物萬物盈天地之間出於機入於機有待也而生有待也而死物之所聴者命命者命於此而已物之所由者道道者道於此而已六合為大矣未離其内秋毫為細矣待之成體此五行之所莫適而為大矣洪範之所謂洪者指五行而言之也是故合之則為洪圍之則為範範雖未離乎形而有形者之所自出此所謂洪範又曰紂為無道殺之義也立武庚以為之後仁而有禮也惟其勝殷殺受而又為立武庚以繼其後則武王之所遇商者可謂盡其道矣苟為不然則箕子孰肯歸周而為之陳洪範呂氏曰武王殺受乃是應天順人為革命之舉此至大之事箕子只是區區一箇奴囚以他歸作洪範自與上件輕重不同如何却将来對説以迹而論固有是間然以理而論武王革命之舉固欲除天下之大害以箕子歸又欲傳天下之大法都無輕重洪範惟十有三祀王訪于箕子孔氏曰此經開源於首覆更演説非復一問一答之勢必自箕子自為之也發首二句自記被問之年自王乃言至􅂜倫攸敘王問之辭自箕子乃言至􅂜倫攸敘言禹得九疇之由自初一曰至威用六極言禹第敘九疇之次自一五行以下箕子更條説九疇之義此條説者當時亦以對王更復退而修撰定其文辭使成典教耳無垢曰此篇箕子自具問答之由目之曰洪範非周史所作也何以言之商曰祀周曰年如泰誓言惟十有三年春大㑹於孟津稱年而不稱祀今曰惟十有三祀稱祀而不稱年扵以見不忘扵殷之意不臣於周之心也周之史官不敢沒其意者以箕子之心天地鬼神知之舊矣豈可沒也以箕子歸未聞箕子朝武王而首云王訪于箕子則武王寛大之徳遂其不臣於周不忘於殷之節亦可以見武王矣然而箕子作洪範首書此者以名節之不可失也上官公裕曰唐虞曰載夏曰嵗商曰祀周曰年載言王事之有成嵗言陽步之有終祀者記其祭之周年者記其榖之稔帝道運而不息是以稱載夏道尊時故稱嵗焉商道尊神故稱祀焉周道尊榖故稱年焉洪範周書也而曰十有三祀者葢主箕子而言祀亦猶禹貢記堯之時事則稱十有三載多方誥商之餘民則稱五祀也又曰方周之興賢人衆多而武王乃訪洪範於箕子豈以箕子為獨賢哉亦其權而已矣夫紂之亡亦不用箕子之言而箕子之設心豈忍幸君之亡以逞吾私憤哉亦必有􅉃怛之心焉故嘗曰商今其淪䘮我罔為臣僕其一於事商而不以存亡二其心者也武王入商釋其囚而收之故曰以箕子歸以此見箕子不二於周也特武王收之而與歸耳然則箕子之心豈能無愧乎故武王因而訪之所以釋其心之愧也王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彞倫攸敘孔氏曰騭定也言民是天所生形神天之所授故天不言而黙定下民羣生受氣流形各有性靈心識下民不知其然是黙定也相助也協合也助合其居者言民有其心天佑助之令其諧合其生出言是非立行得失衣食之用動止之宜無不禀諸上天乃得諧合失道則死合道則生言天非徒賦命於人授以形體心識乃復佑助諧合其居業使有常生之資九疇施之於民皆是天助之事也無垢曰隲升也夫隂升下民而不顯示其符不如是則神怪民惑而奸人得志矣人君代天造化者也相協厥居者乃人君之職相助也協和也居其所禀常性也天以五行隂升之人君以五事至福極助和之則天為萬物父母元后作民父母之説行矣夫惟助和其性當有常理次叙而武王未之學焉此所以下訪而問也張氏曰道散而為五行五行之在天地之間也一始一終而終始有不可窮之彞一先一後而先後有不可亂之倫是故方生方死方死方生新故相仍往来相繼此其彞之不可窮也天一地二天三地四天五地六天七地八天九地十此其倫之不可亂也因其不可窮也故推使之通因其不可亂也故辨使之治此彞倫之所以得其敘者天也敘之者人也武王欲知其彞倫攸敘所以道箕子而使之言也陳氏曰隲升也天降格於民民升達扵天使其性命之理隂有以相通也天之使是民相通其道葢将以助民而協其居所謂助民而協其居者資之以生生之道也水火土金木自是而用矣九疇自是而起矣武王言我不知其常倫之所敘是咨之以九疇之次序也箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸敘無垢曰五行在天不能無偏勝故其在人不能為全徳賴聖人輔相調和之如何耳堯時洪水為害是五行中水偏勝也輔相調和之當以常理水之常理趨下為理鯀不知此理也乃出私智以湮塞之使水失趨下之理然則輔相調和之道安在哉夫五行一物失性則五物顛倒葢五物相資以生者也如水生木木生火火生土土生金金生水水失其性則生理亂矣木火土金安得不亂乎上帝以五行造化萬物而鯀陻洪水汨陳其五行使造化之權不行安得不震怒乎夫識萬理之自然而行其所無事者乃能知九疇之理鯀方命圯族不循常理豈受九疇之資乎不與洪範九疇而常理皆壊不足怪也又曰鯀之殛乃舜也而曰帝乃震怒又曰鯀則殛死以此知舜之心即上帝之心舜之殛鯀乃上帝殛鯀也則有天下者其操賞罰可以私喜怒而亂天道乎吁可懼也鯀死而禹興大舜何心哉上帝亦何心哉禹之為人也克勤克儉不矜不伐是循常理以行也其治水也行其所無事因水自然之性而開導之是循水之常理而行也九疇天下之常理而已矣惟循常理之人然後可以授造化常理之柄此天所以錫禹洪範九疇而常理一皆有敘也劉正叟曰謹按河出圖洛出書聖人則之是圖書之説在羲皇作易之先也圖書其備天理之數爾何以知之觀仲尼大衍則可知當時圖書之㫖也是則洛書之出非禹之時也前乎禹則為堯也堯之治天下而任九子各主其一九疇之數九子之職也至於農用八政司空司徒之官唐虞已設之矣協用五紀羲和氏已正之矣此則非俟禹受洛書之後而後設其官其道素行也葢伏羲而降洛書止存其數爾聖聖相師觀其㫖義明其體用達其事變意授而心傳之以治天下不俟其辭故未著於典墳也禹則敘而陳究極天下之故畀法萬世與天地同其覆載也富鄭公曰或曰命為一人之私既聞之矣敢問教為天下之公何謂也曰五福六極不能獨為教通九疇而用之然後福與極著於民矣敢問何謂也曰在昔帝不畀鯀洪範九疇彞倫攸斁天乃錫禹洪範九疇彞倫攸敘彞倫者九疇也王者體五行以立徳謹五事以修身厚八政以分職協五紀以正時建皇極以臨人乂三徳以適變明稽疑以有為念庶徴以調氣彞倫攸敘是謂治世至治之世五福被於民彞倫攸斁是謂至亂至亂之世六極傷於民又曰或曰敢問彞倫攸斁則六極如何傷於民也曰王者不謹五事則五常失其道五行失其性五星失其度四時失其平五聲失其和五色失其正五味失其常故政隳焉農失業則食不足商失業則貨不通祀失時則神不享司空失職則土地曠司徒失職則政教衰司冦失職則刑罰濫賔失儀則禮壊師不練則威削五紀亂則政令差皇極傾則王路塞三徳乖則治道廢稽疑逆則衆心異夫然故小人在位君子在野忠信亷遜之道消纎巧詐偽之風扇盗賊起而刑莫制戎夷動而兵莫加故咎徴作焉咎徴者悖五事之應也蕭氏曰水為五行之本陻之則失其故常而五行亦汨矣五行為九疇之首汨陳之則亂其所以範圍之道而九疇亦敗矣違天者天所不佑故曰震怒不畀天之常理未嘗失也由人之所敗故曰攸斁張氏曰夫彞倫之敘天之道也因其敘而敘之者人而已聖人因其彞倫之有敘於是裁成之以道輔相之以宜使五者各得自然之敘也是故能敘之以相天則天之所畀不能敘之以逆天則帝之所怒又曰夫道立於一成於三變扵九至扵九也復變扵一終則有始之謂也此洪範之疇所以有九呂氏曰人君代天理物輔相裁成豈可不知其彞倫所敘須當訪問箕子然武王非是真箇不知堯以是傳之舜舜以是傳之禹禹以是傳之文武周公道統已在文武武王所以謂我不知其彞倫攸敘者武王灼然見得聖學無窮處㸔王乃言曰又看箕子乃言曰這兩句看得武王不敢輕問箕子不敢輕説皇極九疇雖未説出也自見得了洪水之方害須自去疏通他鯀却去陻塞了鯀只是陻塞其水却謂汨陳其五行水只是五行之一何故四行都堙沒此便見五行一原初一曰五行無垢曰五行以言五行於天地間最為初始也夫天以五行造化萬物而人為五行之秀氣故為萬物之最靈民得其所則五行順序一夫不得其所則五行已為之變動故善治五行者専㑹養教育斯民使得其所使人人有士君子之行是以在天則五星循軌在地則六府允治富氏曰或問九疇自五事而下皆曰用唯五行不言用何謂也曰洪範五行之數之性之味之臭之聲之色之物葢天地之五行非人之日用者故不曰用焉由五事而下皆人君所用之道用之得失皆通扵五行者因其數明其性成其器辨其味有其臭著其聲彰其色為其物各以類而推之故五行繫九疇之首為政教之源矣上官氏曰初者氣之始而未離乎形也一者萬之總而未離乎數也先天地而無始極方来而無終其博也數之所不能窮其㣲也數之所不能分皆道也道無終始則不可以言初道無多寡則不可以言一及其散而播扵四時之間也五行而已矣張氏曰太初有無無有無名一之所起有一未形物以生之謂恵是故有太初然後各有初有太一然後各有一初者氣之始也一者形之兆也五行萬物之所資莫之或先故初一曰五行此五者往来乎天地之間而不窮是以謂之行雖然九疇之言五事八政皆曰用扵五行獨不言用者葢五行出於道也其先後有自然之倫其始終有自然之彞道萬物而無所由命萬物而無所聴其可以用言之哉呂氏曰太極動而為隂陽布而為五行五行上既有隂陽隂陽上又有太極何故便説初一曰五行這箇須當仔細看貎言視聴思此五者須當敬而用次二曰敬用五事無垢曰五事亦多門矣而其用處止在一敬字而已惟敬則百念皆正百邪皆逺視聴言貌思皆自敬中出則與上帝同心矣張氏曰在天則有五行在人則有五事謂之事者以其具於有思有為乃其事耳非可以道名之也五事出於人心不可以不敬敬者所以直内也故曰敬用五事次三曰農用八政無垢曰政亦多術矣而其用處止在一農事而已農者厚也厚於食則薄税歛省徭役厚扵貨則市㕓而不征關譏而不征厚於祀則三日齋七日戒不敢簡忽也厚於司空則土堦三尺茅茨不剪不敢奢侈也厚於司徒則父子篤兄弟睦夫婦和不敢悖亂也厚扵賔則薪芻館舍各有攸司厚扵師則不斬祀不殺厲故天下風俗皆為忠厚之行張氏曰農厚也言君子之道施於有政取諸此以厚彼而已次四曰協用五紀無垢曰政必有主之者故嵗月日星辰厯象生焉五者不同其用在和協而不亂也人事不亂則五紀和矣王省惟嵗卿士惟月師尹惟日天下政事皆總扵此師尹總日要卿士總月要天子受嵗㑹天下之事整整乎不可亂矣然庶民惟星其好惡則天子卿士師尹所當察也日月之行則有冬有夏厯數自此而生矣皆以人事協和王事也張氏曰八政人之政也五紀人之紀也為政之道必協之以嵗月日星辰厯數之紀故農用八政之後繼之以協用五紀次五曰建用皇極張氏曰皇道也極中也君以道建中故謂之皇極皇之有極則衆材之所㑹辰之有極則衆星之所拱凡以其中故也此舜之用中湯之建中易之二五禮之中庸春秋之權衡皆皇極之謂也次六曰乂用三徳無垢曰中徳出而治民則為三徳人君於三徳其用處在治民而已乂治也遇强弗友則剛克為中遇燮友則柔克為中遇平康則正直為中故随所遇而用三徳治之世皆以無過不及為中而不知過亦有中不及亦有中子莫不識中乃於為我兼愛間求一中以執之孟子曰執中無權猶執一也所惡執一者為其賊道也舉一而廢百也是故非用皇極者安能用三徳也胡氏曰皇極則見聖人之道三徳則見聖人之徳次七曰明用稽疑無垢曰事有是非未分邪正未判㡬微之間有大禍福大榮辱大利害存乎其中者安得無疑也謀之人不足以决吾疑則謀之鬼神其可已乎稽疑而卜筮謀之鬼神也鬼神之隠誰得而知此稽疑用處所以在乎明也胡為而明惟敬則明張氏曰天下之事紛紛擾擾是是非非在我者不能無疑疑則如之何稽之而已是故明則稽於人以盡其智幽則稽扵鬼神以盡其神然則稽之不可不明不明則終於疑矣次八曰念用庶徴無垢曰天下萬事廓然無疑可以已乎曰未也誠諸中者形扵外雨暘燠寒風其徴在彼其兆在此故庶徴用處在人主之念也惟念念於肅乂晢謀聖則五者来備矣失念則恒雨恒暘恒燠恒寒恒風此豈自外来哉皆吾心中物耳儻不以五者為徴則是天人皆可欺也張氏曰在我者其事有得有失在天者其徴有休有咎次九曰嚮用五福威用六極無垢曰福極之柄以人主論之則在天以下民論之則在人主五福其用在嚮六極其用在威以嚮用五福則天下皆歸以威用六極則天下皆畏納天下於大中之福此人主之本心也顧此一章皆洛書所載天理之自然者也禹敢加損哉説者謂初一至次九敬用至威用皆禹所演以余觀之有不然者初一至次九皆天理之敘敬用至威用皆相協五行之妙也皆天理也禹敢加損哉張氏曰自五事至於庶徴行之得其序則五福之所自来自五事至於庶徴行之失其序則六極之所由集此九疇所以終之以嚮用五福威用六極五福言嚮欲其慕而趨之也六極言威欲其畏而避之也

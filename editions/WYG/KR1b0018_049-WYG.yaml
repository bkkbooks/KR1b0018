body:
  text: 尚書精義卷四十九宋黄倫撰吕命穆王訓夏贖刑作吕刑無垢曰吕命者命吕侯為司冦也命為司冦而不明言之如君牙為司徒伯冏為太僕正之例何也曰為司㓂乆矣吕侯以時度之知周刑太重乃建明于穆王以夏贖刑為法穆王是之故因可吕侯贖刑之法而遍及天下也是篇非為命為司冦而作也此所以謂之吕刑也名言吕刑則知贖刑之意出自吕侯建明也東坡曰周公之刑二千五百而穆王三千雖增其科條而入墨劓者多入宫辟者少也贖者疑赦之罰耳然訓刑必以贖者非贖之鍰數無以為五刑重輕之率也如今世徒流者皆折杖非以杖數折不知徒流增减之率也司馬槱曰善治天下者使法勝民而不使民勝法法勝民則治民勝法則亂是以先王藏法於幽隠之中而不以示民者懼民之勝吾法也夫人君所以制天下之命者在於法而所以行天下之法者在於權權者我之所持以制之而不可使人持之以反制我也今藏法於胷中而原心以定罪度情以制法刑則刑殺則殺使人不得以罪之大小而求法之輕重則天下之法在於我矣故民惟俛首以聽命斂手以避法遷善逺罪截然俱入於規矩凖繩之中則姦偽巧詐之心無自而作况敢玩法以議其上耶黄氏曰不待爵而勸不待刑而懲是君子也堯舜之民也爵之而後勸刑之而後懲是衆人也治世之民也爵之而不勸刑之而不懲是姦民也亂世之民也余讀舜典其命百官也曰惟刑之恤云爾其臯陶曰惟明克允云爾盖其終篇者無幾嗚呼何為法之簡也至讀吕刑反復數千言凛乎惟恐聽之之不詳閱之之不實誅之之不當宥之之不審重輕之不齊辭貎之不一曲為之禁而大為之防其屬至於三千則何法之詳也至讀春秋定哀之篇盖終乎二百四十二年之間爵刑之用備矣聖人予之天下之人背而去之聖人奪之天下之人趨而歸之向也僣而今也簒向也專而今也逐向也假君之權而今也國其國矣爵非不立也刑非不明也然而天下莫之從也是何法之弛也夫刑非聖人之得已也既為之防於此以待天下矣而天下猶有出乎防之外則為之刑以待之凡刑措而不用者非上之人不用之也天下安行於至善而入吾刑者少矣自教化之具弛而後犯法者衆犯法者衆而後刑益詳其刑詳矣而不務於教及其乆也習而安之則刑亦玩而不威矣故法簡於舜而詳於周雖以孔子之聖盡力救之於其末流而不能正故吕刑為帝王之書之終而春秋為六經之終夫刑非聖人之得已也其用出於不得已則策已下矣而猶不能以有為聖人若曰嗚呼治道至於刑而窮矣故書與春秋皆終焉林希曰穆王訓夏贖刑周失刑也周刑之屬墨五百剕五百大辟五百穆繼成康丕式之後享國耄荒其臣甫侯為訓夏乃作詳刑以誥四方墨劓不五百而千剕五百宫三百大辟二百孔子曰五刑之屬三千其庶矣乎荀子曰刑名從商則夏刑密亦得輕重之中張沂曰夏承堯舜之後民淳易治故制刑近輕輕則民慢至湯刑稍重厥後紂作炮烙之刑罰益重周承其後不可頓使太輕雖輕於商猶重於夏至成康之問刑措不用下及穆王民復易治故吕侯度時制宜請訓用夏法非聖人制作不及吕侯盖刑罰世輕世重所宜損益也吕刑惟吕命王享國百年耄荒度作刑以詰四方王曰若古有訓蚩尤惟始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯䖍苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刵椓黥越兹麗刑并制罔差有辭民興胥漸泯泯棼棼罔中于信以覆詛盟虐威庶戮方告無辜于上上帝監民罔有馨香徳刑發聞惟腥皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下乃命重黎絶地天通罔有降格羣后之逮在下明明棐常鰥寡無盖皇帝清問下民鰥寡有辭于苗徳威惟畏徳明惟明乃命三后恤功于民伯夷降典折民惟刑禹平水土主名山川稷降播種農殖嘉榖三后成功惟殷于民士制百姓于刑之中以教祗徳穆穆在上明明在下灼于四方罔不惟徳之勤故乃明于刑之中率乂于民棐彞典獄非訖于威惟訖于富敬忌罔有擇言在身惟克天徳自作元命配享在下王曰嗟四方司政典獄非爾惟作天牧今爾何監非時伯夷播刑之迪其今爾何懲惟時苗民匪察于獄之麗罔擇吉人觀于五刑之中惟時庶威奪貨斷制五刑以亂無辜上帝不蠲降咎于苗苗民無辭于罰乃絶厥世王曰嗚呼念之哉伯父伯兄仲叔季弟幼子童孫皆聽朕言庶有格命今爾罔不由慰日勤爾罔或戒不勤天齊于民俾我一日非終惟終在人爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休惟敬五刑以成三徳一人有慶兆民頼之其寧惟永王曰吁來有邦有土告爾祥刑在今爾安百姓何擇非人何敬非刑何度非及兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過五過之疵惟官惟反惟内惟貨惟來其罪惟均其審克之五刑之疑有赦五罰之疑有赦其審克之簡孚有衆惟貎有稽無簡不聽具嚴天威墨辟疑赦其罰百鍰閱實其罪劓辟疑赦其罰惟倍閱實其罪剕辟疑赦其罰倍差閱實其罪宫辟疑赦其罰六百鍰閱實其罪大辟疑赦其罰千鍰閱實其罪墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之罰其屬二百五刑之屬三千上下比罪無僭亂辭勿用不行惟察惟法其審克之案以上經觧永樂大典原缺上刑適輕下服下刑適重上服輕重諸罰有權無垢曰上刑適輕者如同是殺人也殺人者死此上刑也然其問有誤殺者此在殺人中適輕也適輕則服下刑矣下刑適重者如鬬毆不死此下刑也然其間有謀殺而適不死焉此適重也適重則服上刑而死矣用刑者豈可以殺人鬬毆不問情之輕重而行刑哉情輕則罰亦輕情重則罰亦重以情為權而論疑罪之輕重則其刑罰為當矣刑權輕重以為上下罰權輕重以為多少則先王之用刑罰其大指亦簡要矣史氏曰以法而用法不若以權而用法法者一定之制權者一時之宜任法則罪有時而不合任權則罪無往而不當法無輕重因罪而為之輕重非聖人善用其權則法有時而不恕矣當服上刑矣而情適於輕使之下服則必無濫獄當服下刑矣而情適於重使之上服則必無隠情輕重以權不以法也刑罰世輕世重惟齊非齊有倫有要東坡曰穆王復古而不是古變今而不非今厚之至也曰各隨世輕重矣民有犯罪於改法之前而論法於今日者可復齊於一乎舊法輕則從舊法今法輕則從今法其不齊所以為齊也倫者其例也要者其辭也辭例相叅考必有以處之矣張氏曰商人羣飲而赦之不害其為輕周人羣飲而殺之不害其為重或輕或重因世而已若夫不能隨世為之輕重欲為一法以齊之則非所以為齊也惟齊以非齊則其齊也齊矣有倫者言或先或後不失其序也有要者言或因或革不失其統也罰懲非死人極于病非佞折獄惟良折獄罔非在中察辭于差非從惟從林氏曰夫刑者侀也一成而不變君子宜盡心焉罰之懲人非致之死然人已極於病矣刑人有至死者可不慎乎言刑之當謹也如此然不可以才而折獄也惟内有仁心者乃可折獄也佞者才也如左傳云寡人不佞是也以才折獄則失之縱以仁折獄則失之柔兩者皆非中道也凡察囚辭之差者使不得盡其情則彼雖非心服而從亦屈而從矣吕氏曰治獄之道要察罪辭寃枉於差誤處若不於差悮處察無縁知得他實情如他有理他十次說十次無差錯若無理十次說是十様司政典獄須是去不同處察他之情狀都無逃避處非從惟從不可從他辭説須是從他一箇實情不能從他實情只是從他辭説這不是從大抵用刑不從民之口從民之心不從民之心乃所以從民之心哀敬折獄明啓刑書胥占咸庶中正其刑其罰其審克之獄成而孚輸而孚其刑上備有并兩刑吕氏曰折獄之人如得其情則哀矜而勿喜以哀敬之心折獄這是治獄之本後世折獄之官却以折獄為能事纔得其情便自喜了盖治獄之官是代天行罰須是哀敬明啓刑書所謂載在象魏無不詳備須是明啓了又須衆人相與占度方能咸庶中正不可以己意自占若以己意自占便不能中正何故獄不是等閒事纔出不是刑便是罰其刑便傷人肌膚其罰便傷人財貨到這裡須是審克之又曰大抵獄最要看人輸情須是看初輸情時節若不是看初輸情時節看他已成獄則已成者皆是深文煆煉得成這不可信所謂輸者是初欵看他初欵輸辭無寃枉時方可信如漢杜周深刻煆煉臯陶有所不為以此見得須是看他吐露情實時方信無寃枉又曰奏獄于上須盡備許多條目有并兩刑者有一人兼犯兩罪合得兩刑聖人則并兩刑為一刑就其重者刑之所謂其刑上備者見得聖人不欲遺漏有并兩刑者見得聖人不多罪王曰嗚呼敬之哉官伯族姓朕言多懼朕敬于刑有徳惟刑今天相民作配在下明清于單辭林氏曰欽而畏法者人君所以望天下之民喜於用刑者人君所以遺天下之毒何則刑者先王為天下沮惡表善之具也使其樂於用刑而無戒懼之心則民將輕於犯法則善者無所勸而惡者無所沮矣惟其哀之憐之則天下之民畏法自重而無自棄於善之域豈不嘉哉雖然犯法者天下之民典法者有司之責使其典法者不以上天之心為心不知人君所以戒勑於我者非惟上負皇天人君之委託則民將必有所不服矣又曰夫兩造具備則易以折斷單辭無主則難於審聽為有司者其可不明聽之哉吕氏曰今天之相助下民無非以天討正民之罪作配在下是司政典獄代天行罰與天作配有對天之功此豈可容易何故天能死生人司政典獄亦能死生人須是對越在天心與天對無一毫私曲方可用刑明清于單辭所謂單辭最難察有兩辭者却是有對頭單辭無對頭無證佐又無主家今若欲識得如一人殺一人那一人已死只有殺人者在又無對頭獄辭都由這一人説此之謂單辭明清須是自家知慮澄清初無私昵方始能仔細察得他若不是十分知慮清明如何察得單辭單辭察了兩辭不足道民之亂罔不中聽獄之兩辭無或私家于獄之兩辭獄貨非寳惟府辜功報以庶尤永畏惟罰非天不中惟人在命天罰不極庶民罔有令政在于天下無垢曰夫民之所以治者以典獄之官先得理之中無私喜無私怒以此聽獄之兩辭則直者得理曲者服刑曲直在彼而我無一毫私心變動於其間焉所以君子有所怙小人有所懼又曰不能分兩辭之曲直者多由私家亂之也私家云者私喜私怒其下至於納賂受賄以亂曲直者皆是也可不以私家為戒乎又曰鬻獄得貨人見其為寳耳非寳也乃聚罪狀耳東坡云辜功猶罪狀也古者論罪有功其迹狀也此意猶昔人作假山其傅曰此非假山也乃血山耳以言獄貨非寳也乃聚衆禍耳取禍入門稍知利害者為之乎而貪吏見金不見禍其亦可哀也故穆王指獄貨為禍使知所警焉又曰作善降之百祥作不善降之百殃此天理之自然者人以寃枉求正於我而我受人貨賂變是為非亂曲為直此正作不善者也報以庶尤即降之百殃之謂也天罰昭然如此自古及今所不昧者也其可不長乆畏之乎永畏云者非一朝一夕之畏也又曰鬻獄而變是非亂曲直天乃降之殃禍此必然之理也豈天不以中道待人哉惟人自取其殃禍耳召誥曰今天其命哲命吉凶命歴年是哲命吉命凶命歴年之命天何容心惟人自取之耳在者謂人自取正在殃禍之命也又曰人君代天者也庶人為不中之行以强凌弱以衆暴寡以智詐愚以勇苦怯人君當行天命以罰之今人君失職使典獄者變是非亂曲直天乃自降殃禍以罰不中之民事至於此是人君紀綱大壊無有善政在於天下者也何謂善政無辜者得理有罪者服刑此善政也王曰嗚呼嗣孫今往何監非徳于民之中尚明聽之哉哲人惟刑無疆之辭屬于五極咸中有慶受王嘉師監于兹祥刑無垢曰此篇大抵多主於中如曰士制百姓于刑之中曰故乃明于刑之中曰觀于五刑之中曰咸庶中正曰民之亂罔不中曰非天不中而終曰咸中有慶今又曰今汝嗣孫自今以往何監法乎非立徳以啓發民之中乎庶幾汝嗣孫明聽我言哉盖民各有中得此中則上下貴賤老少長幼各安其分不相陵犯有和睦之風無乖争之俗安得䧟於刑辟哉顧惟此中其何能自發見乎惟在上者行徳以啓發之耳昔堯以穆穆在上而羣后以明明在下君臣合徳醖釀造化灼于四方故乃明于刑之中率乂于民棐􅂜則民之中果在上立徳以啟發之耳又曰知人則哲哲者知人之謂也有知人之哲而以斷刑則人之是非曲直何所逃哉是非明辯曲直昭然善人怙焉惡人懼焉萬口一音稱頌贊美者此自然之理也然則孰為而哲曰自知孰為自知曰三省三省則自知一心之是非曲直矣自知一心之是非曲直則天下之是非曲直皆影見於吾一心矣猶懸鏡於堂妍醜皆入澄水於江星斗自見哲盖自於此又曰哲人何以有無疆之譽哉以其斷獄皆屬於五刑之中故也不輕以用刑有罪者無所逃不重以用刑無罪者無所慮一以中斷刑而已矣吾何容心哉大而大辟小而墨辟皆得其中所以有無疆之慶譽也哲人豈求名於人哉鼓鐘于宫其聲自聞于外蘭生于林其馨自逹于逺林氏曰本之以徳者人君愛天下之誠輔之以刑者人君治天下之術使其本之以徳則施為仁政發為仁術而躋民于仁壽之域又非爵賞勸乎其前刑罰驅乎其後民皆狃於為善則雖有刑法亦將措而不用卷而懷之此人君愛天下之誠然也惟其輔之以刑則不專以刻薄為心鍜鍊為利立氏之極享天之福法得其情情當其罪放僻邪侈之心無自而生遷善逺罪之風油然而起此人君治天下之術然也平王錫晉文侯秬鬯圭瓉作文侯之命無垢曰余讀史記知幽王廢申后及太子宜臼以褒姒為后而立其子伯服為太子宜臼奔申申侯怒與犬夷殺幽王虜褒姒晉文侯與鄭武公乃即申侯共立宜臼是為平王嗚呼尚忍言哉即以史考之是平王因申侯殺其父而得立也嗚呼尚忍言之耶嗚呼春秋之作始于隠公其亦以是乎使平王知有父子方且痛苦求死之不給肯為弑父者所立乎又曰晉文侯仇迎立平王遷于洛邑平王徳之故錫以秬鬯圭瓉彤盧弓矢使為侯伯即分陜之任也毛萇云九命諸侯然後錫以秬鬯圭瓚孔頴逹云晉文侯於時九命為東西伯故得受其賜也秬鬯者秬黒黍也鬯鬱金之氣也以鬱金釀秬黍為酒圭瓚以圭為勺柄以酌鬱鬯祼以求神也此諸侯之盛禮也禮曰賜圭瓚然後為鬯未賜圭瓚則資鬯於天子以是知非如晉文侯安定國家安得受此禮乎胡氏曰玉人祼圭尺有二寸有瓚明堂位曰灌用玉瓚祭統曰君執圭瓚祼尸太宗執璋瓚亞祼盖古者賜圭瓚然後為鬯未賜圭瓚則資鬯於天子故旱麓言瑟彼玉瓚黄流在中江漢言釐爾圭瓚秬鬯一卣為其有功而賜之也然則文侯有功於東周而平王賜之以此凡以崇徳報功而已傳曰孝道備者賜以秬鬯圭瓚宗廟之盛禮也於此見之林氏曰先王之念有功也必有物以賜之諸侯之受其賜也必因義以報之盖諸侯也者誠心夾輔安奬王室若手足之捍頭目子弟之衛父兄有不可後者夫何故義當然也夫君臣之分若冠屨之不相侔儻或賜之以物崇之以禮其何以見親愛之誠心乎今也平王東遷文侯有迎送安定之功於是賜之以秬鬯圭瓚張氏曰經言賜文侯以秬鬯弓矢焉特言秬鬯者舉其盛者而言之也周官典瑞祼圭有瓚以肆先王以祼賔客則圭之與瓚皆挹秬鬯之賜也賜秬鬯則圭瓚及之文侯之命王若曰父義和丕顯文武克慎明徳昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位無垢曰明徳之人其心上合于天下合于民保䕶明徳之人是上合天之心也所以昭然升于上下合民之心也所以敷美名於下民心即天心天心即明徳君子之心文王能保䕶明徳君子所以上帝集萬國之歡心而命文王為天子也嗚呼明徳君子其用如此人君儻不為保䕶而使小人䜛賊之是絶民之心也絶民之心是絶天之心也又曰先正即周召吕畢諸公也文武能保䕶明徳君子則明徳君子亦能布其四體安意肆志盡行其所學昭然以大公至正之道左右事其君使其君不陷於禍難焉平王言幽王之禍患皆左右不得其人也又曰文武丕顯保䕶明徳之人明徳之人亦能昭然以大公至正之道左右文武故於小大謀猷無不如意謀者猷之始猷者謀之成以先世有聖君賢臣成此謀畫道徳人材紀綱政令一皆全備故平王先祖自成康而降皆得安然在位也林氏曰聖人之徳不可揜常懐欽謹之心聖人之誠不可忽宜格天人之大夫常人之徳既格其大明也則怠慢之心生於中而矯詐之怨發於外又焉能逹於上下乎惟聖人之徳既如是其大明也而主心於物又如此其能慎也夫然後上合乎天雖幽而無不格下合乎民雖逺而無不聞自非聖人孰能與於此夫然後大命集於文王亦惟先正左右小大之臣咸出謀猷昭事其君使我先祖歸于在位也自古之得天下未甞不資輔弼之臣以為之助使其盡一己之智力不資左右之謀猷將見力愈勞而心愈不給一不成而萬有皆喪求其致天下之大利成天下之大順不可得也惟其委之至重任之至專彼其輸誠相與共致無為之治豈不嘉哉吕氏曰自堯舜以來或説敬或説慎異名同實皆是作聖工夫這明徳是天生聰明自然之明徳慎之一字是保養持守此徳此亦見得文武保養之功深是以昭升于上敷聞于下自然克明上下四逹此其所以集命于文王上帝集命時元不在外只是明徳中纔慎命所以集不慎命所以散文武之徳固如是此亦縁當時有先正之臣能左右昭明於小大謀猷罔不率從見得文武是尊信賢哲無小大皆率而從之所以能率先王也這裏却説小大謀猷罔不率從是小事大事皆出於臣下明徳安在如臨之六五曰智臨大君之宜吉言六五之君能以虚心待天下便是智臨大君之宜吉若區區任一己之聰明不任衆人之謀猷如何昭升于上敷聞于下嗚呼閔予小子嗣造天丕愆殄資澤于下民侵戎我國家純即我御事罔或耆壽俊在厥服予則罔克曰惟祖惟父其伊恤朕躬嗚呼有績予一人永綏在位無垢曰平王言我嗣位正當天大禍患絶資用惠澤於下民無以自振而犬戎侵伐我國家為大患難時其何以自支乎然禍難之作天所以開聖人也啇道不衰何以見髙宗四夷不叛何以見宣王漢無昌邑之變則無以啓宣帝唐無宫閫之變則無以啓明皇患平王無志耳苟惟有志則呼名如夫差嘗膽如勾踐輕徭薄賦以收民心尊賢使能以慰民望選兵鍊將以報國讎仗大義攄宿憤與天下共誅弑天子者豈非臣子之職乎又曰天下之理有當謙者有不當謙者承祖宗之業不謙則不足以持盈當禍患之後不任則不足以成功且以成湯觀之得一伊尹其為言曰思天下之民匹夫匹婦有不與被堯舜之澤者如已推而納之溝中又曰予罔弗克俾厥后為堯舜其心愧恥若撻于市其任如此所以能佑佐成湯自諸侯而為天子自七十里而有天下今平王君父至為犬戎所弑乃曰予則罔克此豈謙退時耶又曰平王有辛苦之言而無發憤之意有求助之言而無自立之意豈有如此而能中興者乎用伐鬼方髙宗所以能中興如震如怒宣王所以能中興明明廟謨赳赳雄斷者光武之中興也予不能事事其何以見于郊廟憲宗之中興也豈有如平王資質而能有為乎林氏曰有國家者成之孔艱壊之甚易百年成之不足一朝毁之而有餘為人後嗣者宜念乃祖經營締構積行累功豈易為爾詎可廢法亂紀敗常亂俗而自取喪亡哉夫有周之天下自后稷開基公劉經始文寧之武定之其用心可謂勤矣其慮後可謂深矣迨及幽王為犬戎所弑殄絶先王之命荒廢祖宗之緒在我後嗣有不克負荷其位亦云㢙矣故今歴陳失天下之由自陳任天下之重如此其難也言我小子遭天大罪使恩澤下絶政教隳毁殄絶于下民也又侵我土地傷我人民及言當時左右之臣則無老成人又無俊傑在位是致國家之亡使我又不克負荷其任也又言我惟祖惟父其不恤我躬以致如是於是告文侯曰今汝有功予一人則使長在位父義和汝克昭乃顯祖汝肇刑文武用㑹紹乃辟追孝于前文人汝多修扞我于艱若汝予嘉林氏曰纂先王之服者莫若昭前人之功法先王之功者斯可配前人之徳前人所以貽厥後後人所以紹前烈者不外乎此道也何則夫欲傳祖業者必思得祖宗之人既得祖宗之人然後可以致祖宗之治祖宗之得天下必有大義之親以為之輔翼吾之所守者祖宗之業其可不責以祖宗之事今汝苟能克昭乃祖之徳惟能纂祖宗之烈使文武之道不至於墜地用能紹乃辟追孝于前世文徳之人今汝之功多甚修矣乃扞我于艱難其功可嘉得不勉之成之以紹前人之徳歟胡氏曰傳稱我周之東遷也晉鄭焉依是晉之文侯鄭之武公犬戎滅周之後在平王遷洛之時輔弼東周戡定王室之不殞繄二國之是頼也故文侯之命曰汝多修扞我于艱若汝予嘉是乃扞禦于艱難誅犬戎而成周室也王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹林氏曰諸侯有錫所以示一人之至恩禮物不同所以昭人君之厚徳何則天下之大不能獨治必有資於共治之人惟吾同姓之親恩同肺腑徳厚丘山得不頼於維持之力推奬之功也古者先王之制征伐叛而討之所以示刑服而舍之所以示徳故諸侯征伐有功則賜之弓矢夫文侯扞我多艱宜乎賜之有彤有盧也馬之為物可以任重可以代勞其性則柔順而能行此正如坤為人臣之徳也故諸侯享天子以馬天子之錫諸侯亦以馬其意可見矣張氏曰卣中尊也有中和之徳足以承先祖奉祭祀故以秬鬯一卣賚之彤者正陽之色也盧者正隂之色也陽為徳賜之以彤弓彤矢者以其徳足以㑹紹乃辟也隂為刑賜之以盧弓盧矢者以其刑足以扞我于艱也馬之為物其行地無疆承載於下而使人無為於上有臣道焉故又賚之以馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯徳林氏曰天下之勢有逺邇人君之治在徳政近者易治而逺者易疎惟人君以徳而為政逺者既柔則邇者自歸感此而彼應感近而逺應將見如嬰兒之慕駒犢之從其從之也不期而然矣且民之情不難服也愛之則親不難格也利之則至何則好順而惡逆者斯民之常心一咈其心則彼將㩦持而去好利而惡害者民之常情一順其情則彼將竭蹷而趨為人上者得不以惠而康之乎東坡曰唐徳宗奉天之難陸䞇為作制書武夫悍卒皆為出涕唐是以復興嗚呼平王獨無此臣哉張氏曰逺者柔之則逺人格邇者能之則邇人安告文侯以柔逺能邇者以晉戎狄之與隣故也至於小民則其保為尤難故欲其惠康之也惠以愛之康以安之則小民可得而保矣

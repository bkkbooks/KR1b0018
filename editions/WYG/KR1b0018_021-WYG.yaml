body:
  text: 尚書精義卷二十一宋黄倫撰髙宗夢得說使百工營求諸野得諸傅巖作說命三篇無垢曰髙宗夢自上帝得傅說乃使百官經營搜求田野遂於傅巖而得之然則曷不求之於朝而必求之於野乎盖髙宗夢𫝊說形狀已在目中矣乃審厥象以求之當其象之出也衣服氣類决非市朝中人而朴質敝陋無以異於深山之野人故决意使求諸野也皇甫謐云衣褐帶索此豈非野人之服乎然而傅說在版築髙宗在廊廟姓名不通心志不接非有半面之舊一夕之談也髙宗雖恭黙求賢非注意於傅說傅說雖有心康濟亦無求於髙宗不知何為而此兩人者精神忽交感於夢寐之間哉又不知髙宗之夢到傅說之所耶抑亦傅說之神到髙宗之夢耶此理亦難究矣曰天下之至誠無彼此之間也非髙宗來版築亦非傅說到廟堂凡心俗慮有髙下之不同而至誠所在通古今於一息髙宗傅說同此一心兩人之心同此一誠髙宗推誠所注則發見於傅說之心傅說致君之義又交於髙宗之心此理㣲矣惟力學者知之自古聖人未有不以此而運動四海也伊川曰或問髙宗得傅說於夢文王得太公於卜古之聖賢相遇多矣何不盡形於夢卜乎曰此是得賢之事豈必盡然盖髙宗至誠思得賢相寤寐不忘故朕兆先見於夢且如常人夢寐間事有先得者多矣亦不足怪至於卜筮亦然今有懐誠心求卜有禱必應此理之常然又問髙宗夢往求傅說耶傅說來入髙宗夢耶曰髙宗只是思得賢人如有聖人自然應感他亦非此往亦非彼來譬如懸鏡於此有物必照亦非鏡往照物亦非物來入鏡也大抵人心虚明善則必先知之不善亦先知之周氏曰髙宗夢得傅說由是舉而相之夫其得之於夢則説之賢否未可知也而遂相之何也盖髙宗即位之初商道中衰甘盤遯世朝多具臣傅説賢而隠於版築之賤一旦舉而加於百竂之上則天下之心未盡厭服衆必駭異故託夢得而旁求天下置諸左右如天所授羣臣莫之敢疑然後傅説之道得行也若不素知其才而徒以夢取之則與後世按符命據圖䜟以用人者何異哉聖人删書而存之可以見髙宗之意矣王正仲曰或曰堯之於舜必因四岳之師錫而後用髙宗之於説則不待羣臣與四方之稱薦獨託於夢而取之若相戾然何也曰堯之於舜其知之而已詳矣然亦咨曰汝庸命遜朕位夫以四岳皆賢人雖使有天下皆可以朝諸侯一海内儻有賢於己必稱薦之豈至於貪天下私己哉故四岳卒以舜對盖堯之時四岳諸臣智足以知舜堯雖已知之尚待師錫而後用之為易也髙宗之朝其在位之臣雖為君子顧其智能未足以知説自即位以來至其免䘮未有以説為言者必待其能知説又能薦説然後用夫君臣死生之靡常與天下之事有切於治亂者將可以任萬世之憂哉此其勢有不得已也儻卒然取之於版築之間而位之百官之上則羣臣疑百姓惑於是神之於夢曰非我之聰明獨見也天以命我矣則羣臣於朝無過言百姓於下無疑心此其所以為髙宗范氏曰髙宗雖賢君擇相重事何為不先舊徳元老而憑一夢遂求於天下傅説處賤陋之極何為一舉遂能繼阿衡之賢亦若可疑以至誠之道言之則不足疑惟至誠之道可以贊天地化育可與天地參誠則形形則著著則明大或為國之禎祥小或見乎蓍龜皆誠之形也髙宗恭黙思乎至道而上帝賜之良弼以應其上乃誠而形之至大者故曰以至誠之道言之為不足疑張氏曰形開而有思神交而有夢是夢出於思者也古人之致一以深思故雖上帝之靈可以感通此髙宗之夢得説無足怪也夫夢之可信也其來尚矣故武王之伐紂則曰朕夢協朕卜周官有占夢之官則古人之於夢未嘗不信之者也此髙宗之夢得説所以使百工營求諸野營求者求之周而急也果得説於傅巖之中以符厥夢則帝之所以賚我者信不誣矣呂氏曰清明在躬志氣如神嗜慾將至有開必先髙宗舊學於甘盤恭黙思道則其至誠所召自然有開必先而見之於夢大抵誠則一一則無間惟能至誠故志為氣之帥見之於夢者無非眹兆之先髙宗一夢見得説遂信此夢而不疑便使百執事經營於野求之果然得傅説常人志為氣之役心志惑亂不定則其夢者亦顛倒錯亂亦不敢自信其夢而方且以為怪髙宗一夢得傅説不以為怪疑而使求之野果然得之則髙宗之夢乃周禮之正夢也説命上王宅憂亮隂三祀既免喪其惟弗言羣臣咸諌于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令無垢曰三年不言臣民之心已皇皇矣既免喪於禮可以言矣於人情不得不言矣而猶弗言若居䘮之時天下之心為何如哉其所以弗言者説也盖其在亮隂之中隐拱黙視見朝廷羣臣皆非中興之臣而吾就甘盤之學森然在心豈肯以為尋常凡庸之主哉既已免喪天下將拭目以觀新政儻惟命令之間一失其機則小人得以窺伺而天下皆失其望矣嗚呼天子與王豈可輕哉謂之天子則慶賞刑威萬邦百官承之以為式謂之王則播告訓誡臣下稟之以為令豈可輕哉今髙宗上承天之所為則當慶賞刑威明示好惡使萬邦百官知所趨向下承先王之所為則當布告訓戒施於號令使臣下知所奉行今既免喪乃不見慶賞刑威之用使萬邦百官不知好惡之所向不聞播告訓戒之音使臣下不知號令之所歸似為天子與王之職為未盡也此所以進諌也東坡曰天子三年不言百官萬民莫不憂懼以待命若大旱之望時雨也一言而天下信之若神明然昔楚莊王齊威王皆三年不出令而以一言致强霸亦此道也恨其所得非傅説之流是以止此亦可謂神而明矣范氏曰能知禮義則為明智有明智則能為天下之人立法則中庸曰動而世為天下道言而世為天下法行而世為天下則髙宗知居喪三年不言之禮此所以為法則也然而過三年猶不言此不可以為法則也若知三年之外不可不言如此則是明智之君可以為法則矣故曰明哲實作則張氏曰自知之謂明知人之謂哲自知則内不惑知人則外不疑此明哲實可以為天下則若夫在我之知則未能至於不惑不疑方且取則於人安能至於作則哉莫非則也詩言有物有則是則之出於自然者也此言明哲實作則是則之出於使然者也呂氏曰君薨百官總已以聽於冢宰三年此亦是人君之常及至免喪之後自可發號施令與天下更始臣民拭目觀化聳然聴命之時髙宗猶且弗言盖弗言者正恭黙思道非柔懦闇弱胷中自無所主而惟是不能言也大抵人君胷中無所主者其不言則闇懦怯弱之形著見于外此必召變胷中有所主者雖未嘗言其至誠發越自不可掩髙宗雖不言是恭黙思道之時已至誠昭著發越而不可掩宜乎羣臣黙窺於不言之表而有明哲之説也大抵天下之事只争一個知與不知知則為聖人不知則為常人孟子所謂先知先覺盖知則明哲矣明哲通天下一個道理當是大公至同之心苟為自私則不謂之明哲以先知覺後知以先覺覺後覺乃作則之意此兩句正當觀髙宗維持天下在言語之外而髙宗之臣亦明哲之士是以見得髙宗於精㣲之間王庸作書以誥曰以台正于四方台恐徳弗類茲故弗言恭黙思道夢帝賚予良弼其代予言乃審厥象俾以形旁求于天下説築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳無垢曰恐徳不善茲故弗言是其弗言也真有在矣其志亦可謂髙大矣意將言而為天下法今恐我徳不善不足以號令天下不若不言之為愈儻止此而無説豈理也哉不言之中自有造化存焉恭黙思道是也惟恭則神定惟黙則力專以此誠而思所以正四方之道其取則不逺矣昔舜命禹以天下而曰惟精惟一允執厥中精近於恭一近於黙自精一而徃則中道見自恭黙而徃則上帝見中即上帝也精一深於恭黙故上帝在我而為中恭黙未至於精一故中在彼而為上帝中庸所謂誠則形形則著者其夢上帝賚良弼之謂也精一恭黙雖有淺深要之皆誠而已矣髙宗以誠而夢上帝以誠而應傅説以誠而感之者合徳不出乎一誠誠其至矣哉何謂誠曰難言也世皆指專為誠審專是誠則若樵夫愚婦者皆可列於聖人之域也至誠無息使專為誠儻一有應對酬酢則非誠矣是誠有息也以此卜之則誠其見矣蕭氏曰人君不可以弗言言而不本於徳不如弗言而已髙宗恐徳之不似而不言則其自知明矣恐故恭不言故黙然而徒恭則勞徒黙則葸恭黙以思乎道故於夢足以有感焉誠之至也呂氏曰夫説一匹夫耳一旦遽為髙宗之求幡然而居相位髙宗憑一夕之夢輙倚説以大事何耶此兩叚當参堯舜二典㸔夫堯非不知舜方且觀其刑於二女而又徽五典賔四門宅百揆歴試以諸難之事以堯舜而觀髙宗似失之鹵莽以髙宗而觀堯舜似失之覼縷要知兩叚事又當以孔門二子觀之孔子曰参乎吾道一以貫之曽子曰唯顔淵問仁孔子曰克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目曽子以唯悟道却如髙宗以一夢信説顔子既得克己復禮之言方且請問其目却如堯之舉舜二者本無異體譬如夏葛冬裘時節如此堯之舉舜顔之問目直是詳審曽子之唯髙宗之夢直是直㨗若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心無垢曰霖雨所利者衆舟楫所利者狹礪所利者在物耳要之三者所湏皆急而不可少緩髙宗之視天下豈為不急之務哉其心盖可想見也張氏曰若金用汝作礪資之以成己之徳也若濟巨川用汝作舟楫以其有渉難之才而資之以濟難也若歳大旱用汝作霖雨者以其有愛民之仁而資之以澤民也啓乃心者使之在彼無所隱沃朕心者許其在我者無所拒沃如水之沃物浸而入之者也君之受言如此故謂之沃既責之使言又許之以受言則君臣之相與以有為足以排患釋難而措世於康寜之域矣呂氏曰盖金不就礪則止於鈍而已若無舟楫以濟川則大不可下一句切似上一句夫濟巨川而無舟楫則止於不可渡若夫大旱之嵗羣心所仰望以為終嵗之穫者惟霖雨之作而已苟霖雨不作則苖槁較之無舟楫渡河則又大於此者此一句又切似上一句髙宗資說之深望説之切觀其言一句切似一句其見道明如此夫髙宗望説以啓沃則二心一心也羣臣期髙宗明哲則二心亦一心也若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷無垢曰沃有漸義沃之既久非心將去又將乗機據㑹一掃而使之無餘也夫漸則其去也微决則其去也猛當非心之熾則去之當以漸故有沃心之説及非心之衰則去之當以猛故有瞑眩之説不如是則不足脫此遺殃餘孽也如醫之治積當積之盛作則以温平之藥消磨之及積之將去則以迅利之藥蕩滌之當其蕩滌不免肢體疲頓血氣虚羸瞑眩憒悶理之必然然而病之本根自此盡矣非心將盡則當以遂心之言難堪之語芟其本根一舉而净盡之至於若跣弗視地厥足用傷乃髙宗自警也意以謂履天下之重任儻不得大人君子開心之障翳若率意而行則將有危亡之變矣張氏曰天下之事常成於剛㫁而廢於猶豫故喻之以若藥弗瞑眩厥疾弗瘳使之致果以有行者也動不因時則或至於妄動行不循理則或至於妄行故又喻之以若跣弗視地厥足用傷使之慮善而後動者也陳氏曰髙宗之命傅説欲其開汝之心以灌溉於我心顧我之心若雖就學然未有所得亦冥行而已矣呂氏曰大抵人臣進言告君始則諌大畧到中則漸引其君以當道至終方敢極苦口之言此其進諫之次序也髙宗慮傅説初來未逹髙宗意必不肯盡言相告髙宗望説一見我便説逆耳難聴之言言不逆耳則我過不㑹改盖藥不猛烈則疾必不愈譬如學者為學能容難受之言斯去難除之病其求諫之心又切於前數句惟暨乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民嗚呼欽予時命其惟有終無垢曰髙宗之命傅説其意無它專欲康兆民而已故其命之以朝夕納誨以輔台德者欲康兆民也命之以金以礪以舟以楫以旱以雨者欲康兆民也命之以啓乃心沃朕心者欲康兆民也命之以藥以跣以同心者欲康兆民也君民一體也民康則君保其遐福民不康則君亦不終厥位矣髙宗之命所以如此傅説安得不欽其所以命之之意乎非欽髙宗之命也欽民也非欽民也欽先王欽髙后也傅説一欽髙宗之命而欽民欽先王欽髙后一舉而皆得之傅説安可忽乎説復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命無垢曰其曰后克聖謂后從諫也不曰從諫而曰克聖盖傅説直指從諫為聖使髙宗自此一門而入焉夫君之所以為君臣之所以為臣非苟相為翫富貴取威儀為戯事而已其職專在康兆民使不以民為心者豈所謂明良相㑹哉髙宗果行從諌之説則上而朝廷下至都邑曉然知吾君以民為心豈惟傅説一人欽順其命將見凡為臣子者無不欽順此意儻有一毫害民亦無不進諌以建長久之策矣嗚呼從諌一門其大如此人主可不念乎張氏曰髙宗之告傅説以啓乃心沃朕心故傅説於是復王以木從繩則正后從諌則聖夫木曰曲直則木不能以自直必待繩直之而始正以譬后不能自聖必待臣諫之而後聖若夫后能從諌至於克聖則聰足以作謀言足以作乂思足以知道如是則君臣相得於不言之中君雖不命之以諌而臣莫敢不承之矣又况君之休命孰敢不欽順之者哉呂氏曰大抵人臣進言貴濟君所不及如告漢武帝不當言武功盖武功帝所自知也如告漢元帝不當言恭儉盖恭儉帝所自有也髙宗命説朝夕納誨已切於從諫今説復告以從諫非所謂濟其所不及也大抵人君為事怕過惟是從諫一事不怕過愈從諌愈好故傅説不怕髙宗有餘只怕髙宗不足故復告之以諌必欲使到舜舍己從人禹聞善言則拜地位譬如學者受益已自有益後復受人之益而不倦何嫌於過哉今吾君欲臣之教誨君亦湏自聖盖主聖則臣必直既為江海何憂百川之不歸説此言又擴髙宗受諫之量説命中惟説命總百官乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民無垢曰髙宗命説總百官其任至重其責至專乃敢進言於王耳使髙宗誠意不著委任未深傅説亦未敢遽盡言於人主也盖為臣之法理當如此言未及之而言言及之而不言未見顔色而言謂之躁謂之隱謂之瞽也由是而推則夫朱雲乞斬張禹劉輔譏斥帷幄李雲言帝不禘三代臣子無此法也故未信而諌孔子以謂謗交淺言深古人以為戒胡氏曰日月列星四時之在天其廣狭小大逺近遲速皆有綱紀不相差也日月相繼以照臨下土先王立后王使之繼世而王天下猶是也列星森羅東南西北各有分野先王立君公使之分土以守天下猶是也四時之運二中二正與夫二十四氣相輔而後嵗功成先王立大夫師長使之相輔以立政事猶是也呂氏曰此説自本原説出來夫明王奉順天道以立邦國都邑上則有后王君公以統其下下則有公卿大夫師長以奉承其上故為君享一個六寝六宫為臣享一箇俸禄天豈徒遺人君以安逸之具哉其意正欲人君不恃己之尊憂勤以治民爾後世錯認了題目見后王君公以下許多臣都來奉我一人則我當享安榮逸樂皆自奉飬一己曽不知天之所以立爾為君者本不是要爾逸豫如此只為要爾治民如此是以為君者不當謂富貴之可樂當在於治民也為后王君公者不當僭生殺之權亦在於治民也為大夫師長者不專奉上以從事亦在於治民也惟天聰明惟聖時憲惟臣欽若惟民從乂無垢曰天昭然在上聰明如此使人主奉若之不敢逸豫惟以治民為心則君公大夫師長皆欽若人主而不敢違天下四海皆低首拱手聼人主號令而不敢逆亂此自然之理也人主不憲天則已矣使人主憲天則不下几席不離傾歩臣即欽若民即從乂矣此機㑹之自然者也故傅説立為四語其辭勁疾以其深見機㑹迅速如此故也張氏曰夫髙其目而無所不見者天之明下其耳而無所不聞者天之聰也天之所以為聰明者因民之聰明以為聰明而已人君之聰明非敢作也必也取法於天其所法天者盖亦因民而已惟憲天聰明以為視聼則耳目不為物所蔽此其臣所以欽若其民所以從乂若夫人君之聰明不足以勝之則彼方且悖慢逆亂而無所不至其能欽若從乂哉呂氏曰髙宗恭黙思道已是明哲聖人所謂知之曰明哲便是天之聰明一個自然道理天與聖人舉無間㫁然髙宗既有明哲可以作則今似不必憲天也蓋明哲之在髙宗若火之始然泉之始逹引之而深積之而明今其憲天聰明非是自外面求不過從其本來素有者擴而推之傅説此言正欲充擴髙宗之明哲使之廣大無窮是以教髙宗於憲字上下工夫君既憲天聰明如此則為臣者不得不敬順為民者不得不從治盖端本澄源盡出一人之正君天也天其可違乎當以此意觀惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休無垢曰此髙宗非心也雖未見之行事而傅說已知之矣此所以於未形之先而箴刺焉昔扁鵲之見威侯知病在腠理醫和之見秦伯知病在膏盲夫在腠理則可治在膏盲則已矣髙宗四病已在腠理此所以懃懃懇懇為髙宗科别而言之人固各有短處此髙宗之短也先事而言格人主之非心亦如治病使不知非心之本而每事進戒則亦勞矣傅説知髙宗之病發見於此四處故每事而進戒之且曰戒此四病信説此言則静見四病之源而瞭然無障無所徃而不美矣史氏曰言輕而不戒則招辱動輕而不戒則致冦賞輕用而不戒則濫罰輕行而不戒則傷四者一失則上拂天意而下違人心矣又曰起羞者招辱之謂也號令之出所以取風雷之鼓舞則其言與天同矣口之不慎豈天不言之意哉起戎者致冦之謂也軍旅之動所以象隂陽之肅殺則其動與天同矣甲胄不慎豈天好生之徳哉天命有徳而後五服五章今有所賞而衣裳在笥示行天賞者不可以妄出也天討有罪而後五刑五用今有所罰而干戈省厥躬示行天討者不可以妄舉也張氏曰口所以出命者也出而不當則有以起羞甲胄所以備患者也恃其有備則有以起戎衣裳所以章有徳也在笥者欲其不可以妄與也干戈所以討有罪也省厥躬者欲其正己以正人也呂氏曰夫言一形於口其初不離於毫末及其彌滿散布不可収拾原其所自則皆出於口故於言未發之前當思可以起羞則王用丕欽罔有逸言而言滿天下無口過所謂惟口起羞是也甲為備禦之具其備禦也嚴而無隙之可投則姦宄不能乗間而入而戎兵不起譬如人自備甲胄其一身周遍然後鋒刃不可入苟有些不周覆處則鋒刃自然入得故於甲胄當思有起戎之患所謂惟甲胄起戎是也此出於己者戒其失之在人也赤舄衮冕所以錫予人也當於未錫之前審其當否及既與人了有不當處始悔前日之誤如何悔得故衣裳必在笥之時言謹其用也興師動衆以加人之境必審其實可罪也苟不審其罪狀遽興師以討之則彼將有辭於我惟干戈省厥躬言不可妄用也此戒其在人者不可不察諸己也惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢無垢曰治亂不在天下而乃在庶官庶官所以造治亂也使庶官得其人則治非其人則亂不必禮樂彰法度著謂之治朝廷皆君子則治之本已舉亦不必三綱淪九法斁謂之亂朝廷皆小人則亂之形己見官所以使能爵所以尊賢能必實能以私昵而官人則適所以妨能賢必真賢以惡徳而爵人則適所以害賢人主官爵之所自出也官欲使能爵欲尊賢雖中才之君其心亦固知其如此然而卒至於官及於私昵爵及於惡徳何也則以私情亂之故見識顛倒如此私情昵於親近故能不當其官見識蔽於賢否故以惡徳而受位私昵在官惡徳受爵如此而不亂者未之有也呂氏曰傅説言國家之興亡治亂繫於羣臣言髙宗官人爵人之際不可不戒官或及於私昵此便是出於私意便不是憲天聰明爵或及於惡徳此亦是出於私意便非憲天聰明夫天命有徳五服五用則官本天所有之物豈人君所得私而有哉既不得私而有當於能者任之修其天爵以要人爵爵亦天所有之物豈人君所得私而有哉既不得私而有當於賢者與之官不自我而自天則當於能也固宜爵不自我而自天則當於賢也亦宜夫官爵既當賢能是知其能欽若也又固宜是徳所以憲天聰明也慮善以動動惟厥時有其善喪厥善矜其能喪厥功無垢曰慮而必獲為而必成輙自滿溢此覆亡之道也齊桓公九合諸侯一匡天下葵丘之㑹微有震矜則叛者九國豈特齊桓晉武自平吳之後明皇自天寳之後憲宗自平淮之後莊宗自滅梁之後皆以功業自足不復警戒卒至不克終始而貽子孫社稷之禍顔氏曰王者孳孳為善惟日不足一日志滿而自謂有善則所積之善皆廢一日志滿而自謂有能則已立之功皆壊故舜美禹曰汝惟不伐天下莫與汝争功汝惟不矜天下莫與汝争能仲虺作湯誥曰徳日新萬邦惟懐志自滿九族乃離昔人謂盈滿為伐者如自伐刈其徳取喪敗之道也呂氏曰此之善實天之善公善也非人君之善也苟自有其善則喪厥善矣此之功乃天之功公功也非人君之功也苟自有其功則喪厥功矣夫前所以做得許多事者正以憲天無心故做出許多事來今若有善矜能則私心日重非所謂憲天矣惟事事乃其有備有備無患無啓寵納侮無恥過作非惟厥攸居政事惟醇無垢曰事事有備無後悔之非雖使變生倉卒禍起蕭墻吾亦無患矣則以其小心畏懼早正素治於未然未形之時雖治而常若亂雖安而常若危履霜而憂堅氷大旱而徹桑土不恃患之不至而每恃吾有以待之又曰人之常情順適則喜干犯則怒怒干犯而喜順適則君子日逺小人得志矣君子正直故多干犯小人邪僻故多順適喜君子君子受知則愈生恭敬寵小人小人恃寵則必至侮慢此天下之理也君開寵以待之小人納侮以報之其侮也乃吾寵有以致之也顔氏曰王者萬事慮於未然為有備有備則免倉卒之患故君子思患而豫防之事豫則立不豫則廢言前定則不跲事前定則不困若圖安於己危防患於己形如大寒而後索衣裘馬駭車僨而圖羈靮雖有明智強力亦無如之何呂氏曰夫一日二日萬幾事亦甚多若物物事事欲其有備當以無心理㑹然後可以該遍如必智力則一人之智力能有幾多豈能一一辦理偹於左則失於右備於前則失於後惟是天之聰明只順自然道理隨事以處所以有備黷於祭祀時謂弗欽禮煩則亂事神則難無垢曰黷數也數於祭祀是所以敬親也反䧟於不欽是心實以善為之反自堕於不善也誰知愛親乃反為不敬乎夫禮祭不欲數數則煩煩則不敬祭不欲䟽疏則怠怠則忘是祭之為義數既不可疎亦不可必求合於禮而已矣合於禮是合諸天道也霜露既降君子履之必有悽愴之心所以有秋甞之祭雨露既濡君子履之必有怵惕之心所以有春祠之祭至礿夏烝冬皆有所感而然也如此則既非數又非疎既非煩又非怠髙宗愛親之深失之於數數故煩煩故亂亂者不敬也如以數為禮後何以為繼乎是事神以難而不以禮也先王貴禮而不為難故荷蓧荷蕢長沮桀溺皆在所黜而許行陳子皆在所屏則以此數人者為難而不合禮也人道如此事神亦然明乎此則可以識先王之道王曰㫖哉説乃言惟服乃不良于言予罔聞于行説拜稽首曰非知之艱行之惟艱王忱不艱允恊于先王成徳惟説不言有厥咎無垢曰嗚呼髙宗豈尋常人哉其能决擇言語如此蓋以舊學甘盤其心明照邪正之言一無所逃傅説之言美哉故我佩服之使汝之言不良我豈當喋喋與臣下争長短哉第不聞行其言於事為之間耳夫髙宗既已知傅説之言為美矣徒知之而不能行與不知同也且學貴於行不貴於知行則有力知多無功行則見於實效知多止於説詞自愚庸觀之則知之惟艱自聖賢觀之則行之惟艱大抵知而不能行者多矣然則行之之艱如此是終不可勉強歟曰是何言也特誠有不至耳使知此言為美而以誠意加焉則見易而不見難言入於耳知見於行知則有盡行則無窮以誠者行之機也故曰至誠無息忱者誠也日月以誠故行於晝夜四時以誠故行於春夏秋冬則以誠者行之機也使髙宗以誠為主何患於行乎髙宗以忱誠為主雖不期於合先王而自合矣則以先王成徳正在誠也又曰觀傅説中篇之意節目雖繁疑使人紛然不知其守然其意止在王忱不艱一句而已是於紛然之中其指自有所歸也讀古人書者其可輕忽乎顔氏曰能勉於道則必有不息之誠既篤於誠則必有丕承之烈甚矣學之而為者事也始貴於知終貴於行知而不行與不知同行而不篤與不行何異也能知能行周旋注措皆出於誠意昔之難者皆反於易矣仰視先王之遺烈不亦著見於當時也哉范氏曰凡事之善者知其義不為難身履而行之為難行之難由信之不篤則居之不安故曰知之者不如好之者好之者不如樂之者至樂之則從容顛沛無不中其義豈有以行為難者誠能行之不難則信同乎先王大成之盛徳呂氏曰髙宗於此聼説之言心領神受涣然氷釋怡然理順深有所得不覺曰㫖哉美説之辭也乃言其可佩服而行使爾當初不良其言以教我則我何縁有所聞而見於行觀髙宗此言便見得髙宗已下工夫説話

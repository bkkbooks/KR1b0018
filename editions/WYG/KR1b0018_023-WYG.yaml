body:
  text: 尚書精義卷二十三宋黄倫撰殷始咎周周人乗黎祖伊恐奔告于受作西伯戡黎鄭氏曰西伯周文王也時國於岐封為雍州伯也國在西故曰西伯無垢曰始文王遵養韜晦殷人不以西伯為意紂日夜為惡西伯日夜為善天下之心日夜去紂而歸西伯殷之賢者為國家深思逺慮知天下之勢將盡歸于文王紂將盡亡祖宗社稷此所以始咎周也夫黎近王圻文王威徳日隆動無不克其勢將至王朝矣此祖伊所以恐而奔告也恐而奔告其驚懼之心亦可見矣夫文王稱兵廹近王畿使朝廷大臣驚恐此不赦之罪也借使得專征伐當如是之恣乎使紂按其不臣之心下令而廢黜之有何不可至無以為計稱天自解何也曰天下之勢已歸文王矣王者無勢以天下之勢為勢勢既去矣特一獨夫耳禁之誰止令之誰從使文王肯聽天子之令天下其肯舍文王乎賴文王大聖不肯遽順天下之心舉成湯故事使當伊尹成湯之際紂有南巢之放久矣孔子見其心故曰周之徳可謂至徳也已矣黄氏曰商始咎周周人乗黎黎近邑也祖伊恐奔告于受則勢亡已廹矣文王三分天下有其二天下未有非之者及其戡黎而聖人獨念之深如此葢以非吾有以取之而心歸焉則受天下而不為非君臣之間一有嫌隙而遽秉其近邑若將廹而取之則黎雖區區不得無罪雖然一邑不可取則天下宜不可取取一邑為罪則取天下宜為大罪夫不許其取一邑也益以見其不取天下之為至徳也耶且事君如文王至矣而以一邑獲罪况其下文王一等者乎嗚呼聖人之心微矣哉張氏曰紂之無道天下歸周乆矣然昏迷而不悟至於周人乗黎乃始咎周夫黎之與殷輔車之相依今既乗黎則是唇亡齒寒殷之所以惡周以此而已祖伊紂之臣也方且恐懼奔走以告于王憫其䘮亡無日此西伯戡黎之所以作也吕氏曰紂之惡日盛周之徳日著此祖伊之所以咎謂之始咎者商元不曾咎周便見得商人安於文武甚久亦文武有君人之大徳事君之小心也黎國近紂都與同惡之國周戡伐其逼近紂都之國事勢近廹故祖伊奔走而告于受西伯戡黎西伯既戡黎祖伊恐奔告于王曰天子天既訖我殷命格人元龜罔敢知吉無垢曰文王為西伯則凡西方一道諸侯皆得以征伐之使紂在上朝廷清明西伯戡黎乃方伯稱職何警懼之有則夫祖伊所以恐而奔告者以朝廷紊亂故深為之疑慮也以事勢觀天命將歸于周而絶于殷此祖伊之見也未敢以為然而問之至道之人至道之人以謂殷命將絶矣又卜之元龜元龜之兆亦以謂殷命將絶人謀鬼謀無有以為吉者其歸周也必矣陳氏曰格至也大學曰致知在格物所謂致知者窮理也窮理而至萬物之所至則格之為言能極物理之所至也至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體今以格人而考元龜不見其吉則商之事可知矣張氏曰周已勝黎祖伊恐而奔告于王者欲其畏禍而知改也將告之以天命故以天子稱之天既訖我殷命者言文王三分天下有其二則其受命久矣周既受命今又戡黎則殷王之命於此乎終矣格人則其誠足以前知者也元龜則其神足以前知者也格人元龜罔敢知吉則其凶咎必至于天人之所不與也惟其天人不與此所以不能保其宗廟社稷而至于覆亡吕氏曰當時人皆不恐懼獨祖伊恐懼者何故祖伊是衆醉中獨醒者奔告于王呼天子言天已絶了我商家之命其情甚急切非先王不相我後人惟王淫戲用自絶故天棄我不有康食不虞天性不迪率典無垢曰先王以儉而紂以淫先王以恭而紂以戲先王以恭儉垂後而紂以淫戲絶之是先王絶紂乎紂絶先王乎此所以謂之自絶也且紂嬖婦人愛妲已收狗馬竒物作沙丘苑臺其淫乃如此北里之舞靡靡之樂以酒為池以肉為林使男女相倮逐其間其戲乃如此將何以見先王乎想祖宗在𡨕㝠之中方悲悼不已雖欲以私意祐之不可得也使祖宗祐之是祖宗為淫戲者作淵藪也神人一理人所惡則祖宗神靈亦惡之矣又何疑哉又曰祖宗即天也自絶于祖宗則亦自絶于天也自絶于天故天棄之自絶于先王則先王亦棄之無疑矣何以見棄之之實乎天下之民無有安于田畆而康食者以皆苦征役無有安其常心而虞天性者以皆為草竊無有事父母畜妻子而迪率厥典者以皆為敵讎事至于此則天人之意祖宗之意葢可知矣張氏曰不有康食言其困窮也不虞天性言其内不足以度知天命不迪率典者言其外不足以率循常道也夫紂之將亡民可以食鮮可以飽此之謂不有康食惟其不有康食則常心遂喪於内則不虞天性而至於無命于外則不迪率典而至於無義此殷之所以即喪也王荆公曰不虞天性能度天性而行則義矣吕氏曰商之賢聖之君六七作非不可以憑藉扶持先王亦非不相助爾後人自是爾淫酗戲狎以自絶于先王今我民罔弗欲喪曰天曷不降威大命不摯今王其如台王曰嗚呼我生不有命在天無垢曰先王之心天之心也天之心民之心也紂自絶于先王故自絶于天而天棄之天棄之故民棄之今民無不欲紂之亡者是民棄之也原其所以自棄于先王者則以先王之心乃天之心也天之心乃民之心也何以見民欲紂之亡乎其為言曰天何不降威命誅紂又大命在於廢昏立明今何為不至乎摯至也言欲天早誅廢紂而立明君也今王能信如我之所言而改悔乎尚庶㡬天命之復囬也又曰為天下君豈有無所顧藉者紂無賴乃有如閭巷下俚之所為者豈人情也哉葢亦有所恃也所恃者何天也不知紂以天為何物哉觀其言天乃以天為無知之物專驕養人主使恣心極意為無道以取娛樂耳是凡為人主者皆天私之而不問其賢否也殊不知天心乃民心得民則得天矣周氏曰夫命者聖人之所罕言凡國之所以興亡時之所以治亂莫不係于人為而非由命也世之賤者衆而貴者鮮愚者多而賢者少中人安於擯棄俟時而動而不競葢聖人以此籠愚賤息爭端也夫謂之命則有命之者安可生而黙定哉桀紂據禹湯之資不善守而亡民斯為下矣其能不曰命哉吕氏曰我自有命在天大抵為惡之人多不自省悟一如陳後主方隋師韓擒虎等渡江邊帥告急之疏陳後主皆不覺及隋已滅陳乃知前日邊帥告急之疏皆未曾開以此知亂世無道之君都不自悟如此祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦無垢曰祖伊見紂不悟恃天以為惡故報之曰汝罪其數多矣今參列布于上天天將按罪相聖人誅汝至於此時汝尚能責天以命殷之喪亡不俟終日將在即日矣其喪亡之由皆汝功事所致指由也紂有何功哉功一也聖主功於養人暴主功於殺人天隨其功而報之功於養人故天報周以數過其厯功於殺人故天報紂以燔身懸頭以亡其社稷不無戮于爾邦盖指紂也張氏曰夫莫之為而為者天也莫之致而至者命也乃罪多參在上則是為之致之在我而已其可以責天命哉功者積力而致其成也積力以為善則有為善之功積力以為惡則有為惡之功紂徒積惡而已故亦謂之功言惡如此不能無戮于爾邦此書所謂自作孽不可逭也殷既錯天命微子作誥父師少師無垢曰夫天生民以司牧之使不失性今紂作惡於上變亂風俗至於如此豈天所以命紂為人主之意哉一切顛倒天理而窮心極意以騁其私欲耳微子知天命將移祚於周家而殷之將亡不乆也欲去則有所不忍欲留則有所不可屈原所謂心煩意亂不知所從者也况㣲子與比干箕子皆宗臣也利害一體故作誥以問二公而求所安焉又曰商之亂至此極矣無可為者然三人之心尚庶㡬其萬一焉故微子則去國以警紂比干則直諫以警紂紂殺比干至箕子獨佯狂而不死者尚庶㡬紂之警悔吾可以成就之也紂終不悔而死此三人者一存宗祀一守死節一陳洪範去者非叛死者非訐生者非偷故孔子表而出之曰殷有三仁焉以此知臣子之處心當究觀微子一篇可也又以知所謂仁者或去或死或留皆仁也倘以去為是而留為非以死為是而生為非皆常人之客氣而非聖人之道也苐顧其心於宗社如何耳楊繪曰噫錯之一言不以深乎商周之不敵一言盡之矣夫天之所以命君者俾之司民也而紂專虐民非錯天之命而文王專愛民非合天之命而何非天惡商商之所為自錯其命而已非天私周周之所為自合其命而已錯其命者滅合其命者興天人相與之際君天下者其監茲哉李太伯曰存其身存其祀亦仁也亡其身存其國亦仁也若進死者退生者狂狷之士將奔走焉褒生者敗死者宴安之人將寘力焉故同歸諸仁各順其志殊途而一揆異行而齊政俾後之人優柔而自得焉葢春秋微婉之義也孫覺曰君可去乎曰不可國滅而祀滅去之可古之人有行之者微子是也君可詐乎曰不可君不道全身詐之可古之人有行之者箕子是也君可死乎曰不可言不從而死之可古之人有行之者比干是也商之衰紂為不道而時乎微子死則商滅去則商祀微子者如之何而不去時乎箕子内明而外難進戮退戮為箕子者如之何而不奴時乎比干祀存乎微道行乎箕尚一言而悟其心者如之何而不死曰然則三子者舉皆有過矣舍其君而去之不忠詐其君而奴之不信君不可諫諫之不智忠信智三子未盡孰為仁哉曰去其可去孰為之忠詐其可詐孰為之信死其可死孰為之智告一世之君而存百世之祀微子之仁也志不得乎亂世而道行乎治平箕子之仁也安一身之死而勸萬世之臣比干之仁也微子去商祀綿箕子奴周道􅂜比干死臣節殫其所行異其為道同易地則皆然也去奴死其號各殊其所以為仁一也劉氏曰三人或死或生其事不同而同謂之仁者明死生不足言仁也夫仁者有成質略舉其大方而言之則不遷怒不貳過不樂生不惡死端而虚靜而一若是者人貌而天其有利害夀夭成敗是非則寒暑燥濕春夏秋冬四時之運也故命仁者以其成質非語其運之變而名之也成質卞氏之玉也運之變者或刻以為璽或刻以為璧也璽與璧則異矣然而稱寳者卞氏之玉也張氏曰天之立君命之以治民而已今殷王弗或亂正四方此所謂錯天命者也殷既錯天命則其覆亡無日故微子作誥以告父師少師所以陳其出處去就之節也吕氏曰大抵天下有道仁人君子相與謀議於朝天下無道仁人君子相與謀議於家微子一篇是微子比干箕子以紂之將亡相與謀議各致其一身之義使三仁人遇堯舜之朝必如臯䕫相與謀議於堯舜之前使其在湯之朝必如仲虺相與謀議於成湯之右惟其居無道之世此所以自相議論各欲自致一身之義於此足以見仁人君子之用心處孔子所謂殷有三仁者以此微子微子若曰父師少師殷其弗或亂正四方我祖底遂陳于上我用沈酗于酒用亂敗厥徳于下無垢曰或有也殷家將不復有治正四方之事矣天子所以治正四方者也不復有治正四方之事則是大器將移於他人之手矣又曰底致也言終始其徳也遂成也言成為法度也以言我祖成湯終始其徳設為法度森然陳布于上世以垂裕後昆而紂乃沈湎酗醟以敗之詩曰人之齊聖飲酒温克彼昏不知一醉日富是有徳之人乃不為酒所亂無徳之人飲酒則昏惑不復知義理所在矣是酒能敗徳也張氏曰治亂之謂亂正直之謂正弗或亂正四方者言紂之無道不能治正於四方也易曰或之者疑之也言弗或亂正四方則其為不能必矣吕氏曰此一篇書不可把做憤疾㸔當做憫惻㸔此一書中皆是憫惻之辭如此方㸔得出其者疑而未定之辭也紂已是不能治正四方微子不敢便言紂不能治正四方乃謂殷其弗或亂正四方乃是疑而未定之辭於此見得微子之用心忠厚處商之賢聖之君六七作我祖先王之功陳列於上紂乃沉湎于酒至於敗壊喪亂其徳於下當時沉湎于酒自是紂初不是微子何故不説紂用沉湎于酒乃説我沉湎于酒於此見得君臣一體紂之沉湎于酒便是微子沉湎于酒相似殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恒獲小民方興相為敵讎今殷其淪喪若渉大水其無津涯殷遂喪越至于今無垢曰朝廷風俗如此而無知小民所在而起作敵讎不復知有朝廷紀綱至此亦大亂矣且夫文王雝雝在宫肅肅在廟而江漢游女無思犯禮汝墳婦人勉夫以正今紂沉酗於上而小大草竊姦宄卿士師師非度小民相為敵讎以此知天下治亂盡在人主而已人主治亂盡在一心而已使人主正心誠意如文王雝雝肅肅行於宫室宗廟之間則徳風潛行天下安妥朝廷尊嚴小民和樂豈有此等風俗乎如微子所言商家社稷不可拯救矣又曰微子見天下朝廷小民風俗大壊如此雖有區區拯救之心而紂沉酗不可嚮邇茫然四顧無可依憑徒見殷之滅亡如大水中𣺌無津岸不可拯救耳臣子忠誠之心其如何哉又曰葢賢者觀理不觀形理既顛倒如此雖位居九五衆號億萬宗臣滿朝其覆亡必矣理儻安平雖越在草莽衆止三户人才不多其勃興也必矣是以觀人之國者每以理為斷也吕氏曰君道善羣君能善羣則强不凌弱衆不暴寡民何縁㑹至於草竊姦宄君不能善羣則强凌弱衆暴寡無小無大已皆好為草竊姦宄曰父師少師我其發出狂吾家耄遜于荒今爾無指告予顛隮若之何其無垢曰微子既言殷之亂亡然後問箕子比干以處已之事言我以紂之故積憂生疾發出為狂在家耄亂遯于荒野以寫其憂其不能處如此嗚呼宗臣之心乃如此其烈乎又曰微子憂國狂亂如此責箕子比干略無一言告我以國之顛隕隮墜當如何其救之也以此見微子區區為宗社計隕穫至於如此然而當時自有釣於渭濵如太公者亦有居北海之濵如伯夷者微子何乃憂苦如是哉葢宗臣以社稷為己任不得不爾也至吾夫子聖之時有可以仕而仕可以止而止可以乆而乆可以速而速之説然後吾道其沛然矣出乎其類㧞乎其萃自生民以來未有盛於夫子惜乎微子未之知也張氏曰微子言紂之遂喪憂傷之至無如之何故其發生狂亂昬惑不知所處故欲遜于荒野此微子有去之之意也今汝父師少師無意告我以商祀顛隮之事當如之何若之何其者問其䇿之安所出也父師若曰王子天毒降災荒殷邦方興沈酗于酒乃罔畏畏咈其耉長舊有位人無垢曰箕子亦順其事而答之故亦稱若曰也稱王子以知微子為帝乙首子也今天酷毒降此災殃故生紂專以亂殷邦為事則昏亂暴恣豈復知所畏乎君子之所畏者三畏天命畏大人畏聖人之言乃罔畏畏則是於天命大人聖人之言皆不知所畏矣咈老成前軰元功重徳者不足怪也夫為民而不事耕稼不樂本業以飲酒為事且不畏天命狎大人侮聖人之言於長者明徳動為咈逆是朝廷無刑辟也如此為國不亡何待張氏曰夫耉長舊有位人皆能守先王之法度不從紂以為惡非所宜咈也今汝咈之而不從則其惡積罪大而不可化矣吕氏曰到這裏皆無畏憚孔子所謂畏天命畏大人畏聖人之言他都不畏了老成之人君所當畏也今來咈逆之舊有位人君所當畏也今乃慢忽之此最是亡國之大證騐今殷民乃攘竊神祇之犧牷牲用以容將食無災降監殷民用乂讎斂召敵讎不怠罪合于一多瘠罔詔無垢曰夫祭天地神祇犧牷牲用此人主精神之所寓也其可忽乎今殷民乃敢攘竊之是不知有天地神祇不知有人主也其罪豈可勝誅推原其心雖弑父與君亦安行而為之矣宜乎見之者憤聞之者驚而朝廷不以為意乃公然容縱使行而食之略無忌憚又無罪災以及之如此則是滿朝不知天地神祗不知有人主矣又曰夫人者天地之德陰陽之交鬼神之㑹五行之秀氣合之則神一之則强得之則為王而乃戕賊如此用虐法乂之又視之如仇讐又斂之如盗賊日夜失民之心起敵讐之志而不恤不懼竭力虐政專以戕賊為事夫戕賊斯民是戕賊天地陰陽鬼神五行也安得有吉祥之事乎又曰上觀紂所為如此下觀殷民所為又如此若形之於影聲之於響無有少異者是其上下君民之罪同出於一律皆當受天之誅無疑也東坡曰殷之君臣下視其民若仇讐而聚斂之以此為治力行不怠皆召敵讐之道也張氏曰今紂之弗欽上帝遺厥先宗廟弗祀故犧牷牲用既為殷民所攘竊㦯以容㦯將或食皆無災以及之此即所謂凡有辜罪乃罔常獲者也夫殷之上下以讐斂而召敵讐至於罪合于一復有惠澤之加乎民哉此民之多瘠而無告愬故曰多瘠罔詔謂之多瘠言其困病之甚也吕氏曰天之降視商民甚是分明商民不知天之所以降視者甚分明其朝夕用工夫只是相仇讐相斂怨上用工夫其所以召仇敵怨讐更不曾㑹倦怠所謂吉人為善惟日不足凶人為不善亦惟日不足做好事要住也不能得做惡事要住也不能得論來只是一箇闗捩纔撥轉得過為惡不怠便是為善不怠亦合于一天下皆化紂之惡與紂一般了大抵源清則流清紂恰是天下之本源本源既濁亂了流派亦從而濁亂所以謂之罪合一言其上下皆同惡也多瘠罔詔以此便見民多疾病都無説處天下未至於大無道雖或説與君不得亦可説與公卿公卿不得亦可説與大夫事到這裏上也無説處下也無説處商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮自靖人自獻于先王我不顧行遯無垢曰商既淪沒喪亡箕子與比干將與社稷俱亡耳是比干將以死諫而箕子將佯狂以觀紂之改否也箕子比干處心已定已無去國之意故曰我罔為臣僕以謂誓不為他人所臣屬也孔頴逹謂於時箕子蓋請立啓而帝乙不聽然則微子不去非特宗祀不保兩人必皆受誅微子去則箕子可少安矣此正與劉𤦺之事相合昔劉表以𤦺貌類於己甚愛之後妻蔡氏愛琮而惡𤦺毁譽之言日聞於表𤦺不自寧嘗與諸葛亮謀自安之術亮初不對後乃共升髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言乎亮曰君不見申生在内而危重耳居外而安乎𤦺感悟隂䂓出計以是知微子止有去計耳無他説也又曰靖謀也言三人各自謀所以獻于先王而無愧者微子自謀存宗祀以獻于先王比干自謀死諫以獻于先王箕子自謀佯狂俟紂悔過以獻于先王亦豈必同哉况一人之身豈能兼此三人之事各守一節可也三人之志將各為謀以謂葢棺之後可以藉口見先王於天上無愧心足矣豈有一毫為身計為家計而不為國計用其智巧恃其虚譁以獻于先王耶東坡曰刻害也箕子在帝乙時以微子長且賢欲立之而帝乙不可卒立紂紂忌此兩人故箕子曰子之出固其道也我舊所云害子子若不出則我與子皆危矣荆公曰我舊云刻子刻責也舊以社禝之責責微子也乂讐歛言因用公治法以刑讐民以職斂民讐民則召民敵斂民則召民讐也因用治法讐斂民所謂阻法度之威以責於下者也吳氏曰商業已墜賢人親戚遯退而天下歸於周矣傳謂告二師而去非也觀此篇之文但微子言紂惡之甚使我心不寧而生狂疾吾殷家昏亂已在荒廢汝當告我以何道箕子乃勸微子去以存商後為祭祀之主二子非不知紂不可諫而不去者葢欲存臣子之節也劉氏曰刻猶害也言我舊云紂常欲害子今王子不出必見殺王子見殺我乃隕滅矣所以然者三仁存則商存三仁亡則商亡武王觀兵此其騐也均之不可亡而微子先遜于荒者微子以地逼見疑欲害與其見殺而速亡不如避禍而緩死也然則三人亦何向何背何去何處特勢㑹之變微子以母兄宜避比干箕子以同姓宜留此仁者之外化内不化也故可為百世師張氏曰夫先王之所以望於後世子孫者惟忠與孝而微子去之則自獻以其孝箕子為之奴比干諫而死則自獻以其忠先王之所以望後世在於忠孝而三子之所自獻者亦以忠孝此所以無負於先王者也此孔子所以謂之三仁其去則利而不貞其死則貞而不利惟箕子之囚為利貞故易曰箕子之明夷利貞者此也吕氏曰箕子昔日嘗言於帝乙立微子帝乙不從箕子之言而立紂故箕子告微子我舊時之言為汝之害使微子而不出我則立致於顛隮箕子教微子出猶有彌縫紂之意大抵人有疑心縱有好言語亦不能聴箕子舊日曾言立微子紂之心到今亦不能無疑惟微子既出則紂無疑心無疑心箕子庶可與紂説話

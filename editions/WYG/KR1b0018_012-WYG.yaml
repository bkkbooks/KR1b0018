body:
  text: 尚書精義卷十二宋黄倫撰導弱水至于合黎餘波入于流沙無垢曰此又言導川之事也夫導山之首尾既已具于前則導水之首尾亦豈可闕哉盖禹不特為當世計盖欲使萬世知山川首尾如此在山則不可絶其地脉在川則不可失其故道山川得其性則人禽草木亦各得其所止其意顧不逺哉弱水在雍州界導山導川事皆自雍始何也合禹治水至雍州而功畢故因言所以導山川以次及於餘州也其謂之流沙者以其沙日夜流而不止也其亦異矣弱水失其性亦為害于雍州今導歸故道則不復為害矣禹之功其大矣哉張曰禹之導水始于西終于東南以入海盖東南者地勢之最卑而百川水潦之所歸故也弱水在雍州其勢極西順而導之以至于合黎使其餘波西溢入於流沙流沙亦最西之地也導黑水至于三危入于南海張氏曰黒水在雍梁二州之間三危在雍州之西導黒水自雍而南經三危之山遂自梁而入于南海導河積石至于龍門無垢曰釋水謂河出崑崙虚色白郭璞謂發原髙處激湊故水色白潛流地中受渠衆多渾濁故水色黄而漢書西域志乃云河有兩源一出蔥嶺一出于闐是河源不知所從來也或以為出崑崙或以為出于闐蔥嶺至茫昧小説乃謂張騫乘槎窮河源至天上得牛女支機石以還太史占天以其夜有客星犯牛女以明河源出天上也禹貢導淮自桐柏導渭自鳥鼠道洛自熊耳是淮出桐柏渭出鳥鼠洛出熊耳故皆言自至於導河積石不以自字綴之以見河不自積石出也故安國謂施功發於積石積石在金城西南耳以此知雖禹亦不能窮河源所出以治之治水不得其源則其施功尤為倍費故鑿龍門以行河北此因河之下流治之所以為費力也使河源果在中國余知禹将自其源而治之不為如此紛紛甘氏曰夫今古之患在河也禹所先治者也書曰導河自積石言來自西北也砥柱析城至于王屋言自此而河正東也禹之治河自大伾循山而北矣故曰覃懐底績者言自今河已致功而北也至于衡漳今漳水是矣南至于華隂東至于厎柱又東至于孟津無垢曰河自龍門南行至華山之隂又東行至于厎柱底柱山在西虢界河水分流包山而趨山在河中若一柱然又自底柱東趨以至于孟津在河内河陽縣南堯都於冀往來者皆道孟津以出入冀都故衆路輻湊於此以渡焉古今常以為津耳酈道元曰禹之治水山陵當道者毁之故破山以通河河水分流包山而過山見水中若柱故謂之底柱東過洛汭至于大伾無垢曰言河所行之道也河自孟津東過洛汭迤邐至于大伾也洛汭入河處正在河南鞏縣東大伾之説不一論伾之義當從爾雅之説而河行之勢又不可不細考也北過降水至于大陸無垢曰河自大伾北過降水迤邐至于大陸也大陸又在降水之北故自大陸而觀則降水在南矣又北播為九河同為逆河入于海無垢曰河自大陸以北遂分為九河又逆九河之流為一大河使河流入于渤海余觀禹治河以不得其源故極為費力鑿龍門以開水路又分九河以殺水怒又為逆河以引歸于渤海雖曰行其所無事然其探水之本性亦已勞矣使河源在中國余知禹治河當與導渭導洛導淮等耳後世河流為患最大者禹既不得其源而禹之故迹亦復堙塞則其決壊夫復何疑王介甫曰逆河者逆設之河非並時分流也嶓冢導漾東流為漢又東為滄浪之水無垢曰黒水弱水沇水皆言導而不言自不言山導淮自桐栢導渭自鳥鼠導洛自熊耳皆言自而導河積石獨不言自嶓冢導漾岷山導江則又有異焉者列山於上與淮渭洛河大為不同地理志便以武都為漢水豈以沔水乃漢水之上流其流不逺而更名為漢故不復别沔漢之名乎此漢水東流為滄浪之水也漢水梁州界滄浪荆州界也漾水有四名始出山謂之漾東南流謂之沔東行謂之漢又東行謂之滄浪一水而四名其亦異矣沇一水而三名皆以味别之也過三澨至于大别南入于江東匯澤為彭蠡東為北江入于海無垢曰三澨水名也此漢水為滄浪又滚滚而過三澨至于大别也大别漢上山也漾雖為沔為漢為滄浪至于漢之名獨逺首自武都迤邐流至荆楚而漢名獨傳漾水既東南流為沔至漢中東行為漢又東行為滄浪又過三澨至于大别乃南入于大江漢水既入江其性又東行至揚州界為彭蠡矣匯迴也其性本東為山所激而南故又東迴而行至彭蠡之地以遂其本性其地窪下故鍾而為澤也彭蠡能止其性乎曰不能也漢水之性欲東耳非至于海不止也特以其地窪下其勢且當鍾聚耳非漢水欲鍾聚也漢水之性雖匯為彭蠡豈嘗一念忘海哉故又自彭蠡而東為北江入于海也北江之義如何曰岷山之江亦匯為彭蠡與漢水合而入于海故其東也則謂之中江岷山導江東别為沱又東至于澧無垢曰江水源出岷山禹自其源而導之然江水本東南流耳而至荆州忽分一派别為東行此江水之性也豈人力所能為哉漾水南入于江非本性也為大别山所擊耳至于江水忽分為沱乃其性欲然非若漾有所擊也水性如此其可逆乎此言江水枝流别為沱而正水乃至于澧也澧亦在荆州過九江至于東陵東迆北會于匯無垢曰江水至東陵東陵不足以受之遂溢而散流彭蠡卑下故諸散流者遂北㑹于彭蠡也東為中江入于海無垢曰江水自彭蠡東趨自為中江以入于海也夫漾自彭蠡出為北江豫章自彭蠡出為南江故蜀江自彭蠡出為中江也班固曰南江從㑹稽吳縣入海中江從丹陽蕪湖縣西東至㑹稽陽羡東入海北江從㑹稽毗陵縣北東入海㑹稽丹陽原有此三江然皆是東南支流小水自相派别而入海者禹貢所謂中江北江自彭蠡出者也徒見禹貢有三江中北江之名而不悟一江三分合而異味也導沇水東流為濟入于河溢為滎無垢曰導沇水歸海之路也沇濟一也發源為沇既流為濟如􅃞水東流為漢江水東别為沱􅃞水既為漢則􅃞水之名熄矣故為漢之後不復名為􅃞沇水既為濟則沇之名熄矣故為濟之後不復名為沇至江水東别為沱乃其支流耳江水之名自若也東出于陶丘北又東至于菏又東北會于汶又北東入于海無垢曰濟水自滎澤東出于陶丘之北又東至于菏澤又東北㑹于汶是汶水自西南來濟水自東北往以汶言則㑹于濟故前曰浮于汶逹于濟以濟言則㑹于汶故今言又東北㑹于汶也濟水既與汶㑹遂自北趨東以入于海也導淮自桐柏東會于泗沂東入于海無垢曰在堯時雖胎簮亦謂之桐柏耳豈若後世於桐柏中别指其名為胎簮乎決不肯以胎簮為桐柏以惑亂後世也沂水出泰山盖縣南至下邳入泗泗水出濟隂乗氏縣至臨淮睢陵縣入淮是沂水先入泗泗水乃入淮今曰東㑹于泗沂者沂入泗泗挾沂水而來而淮乃自桐柏而往三水合㑹而東共入于海也在九水中無若淮之所厯未乆而遽入于海也然而與四瀆並列者以其發源甚微而滔滔東注横厲于徐揚之間其勢不減江河與濟也導渭自鳥鼠同穴東㑹于灃又東㑹于涇又東過漆沮入于河無垢曰鳥鼠同穴天下無此理也而渭水所出乃有此異焉是天下之事不可以耳目所止而决其有無也造化之理何所不有雀化為鴿鳩化為鷹此豈可臆决哉鳥鼠同穴此渭水凝結成象也惟智者黙而識之盖渭水自西南趨東而灃水自扶風來㑹涇水又自安定來㑹是渭水先㑹于灃又㑹于涇也必以渭為主者以渭水兼受二水以趨河也漆沮二水其原自西來入渭既而先渭水而流行至洛渭水反在其後渭水性本與漆沮合漆沮既在前故渭水過之同入洛以趨河也王氏曰導渭自此山向東乃㑹于灃水又向東㑹于涇水又向東過漆沮二水乃入于河陳氏曰灃文王所都也漆沮武王所都也即所謂鎬京也漆沮之名有二公劉詩言民之初生自土沮漆公劉都豳此漆沮之在扶風者也瞻彼洛矣維水泱泱釋者以為漆沮之水入洛此漆沮之在鎬京者也今長安南三十里鎬京之洛又與東都伊洛之洛不同導洛自熊耳東北㑹于澗瀍又東㑹于伊又東北入于河無垢曰導弱水以至導洛凡九水澗水出𢎞農新安縣東南入洛瀍水出河南穀城縣潛亭北東南入洛洛水東南向東北流入于河而澗瀍皆在東北二水適與洛㑹故皆隨洛水以入于河也且澗瀍入洛其意非謂逆流以入洛也謂洛水自東北流故二水入洛以趨河耳今曰東會于伊是伊水在澗瀍之下洛水既流與澗瀍會乃與澗瀍流東而又與伊水會也四水既合為一乃又東北流而入于河也四水之性以入河為主向也皆失其故道故豫州有水患今禹既導洛而四水已復其性豫州之水患除矣王氏曰洛水出于熊耳山導此水自熊耳山向東又北乃會于澗瀍二水又東㑹于伊水又東而復北乃入于河九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海㑹同六府孔修庶土交正厎慎財賦咸則三壤成賦中邦無垢曰九州攸同者言水復故道九州同無墊溺之患也四隩既宅者室隅為隩謂其僻逺也言水患既除四方僻逺之處亦各安其所居也禹之功大矣取九州四海之民於陷溺之中使皆享其有生之樂九州之山本自旅祭九州之川本自不壅九州之澤本自不溢向也洪水滔天致失其故道禹行其所無事而治之使九州之山無大無小皆已表道而復其旅祭矣九州之川無大無小皆已滌源而復其不壅矣九州之澤無大無小皆已隄障而復其不溢矣昔之水失故道一皆顛倒敗壞何敢云㑹同孔修乎今水患既去非特九州之民往來無阻而蠻夷戎狄皆復㑹同于京師矣非特水得其性而火金木土穀亦各得其性而為天下用矣曰厎慎者以言不敢忽也蓋一或不慎則多寡不當有無不實而貽斯民萬世無窮之禍夫不以土地相比較何從知肥瘠髙下之宜民此言厎慎財賦所以必先以庶土交正也既以厎慎庶土比較財賦然後立上中下三等以别九州之壤而定賦髙下則又準三壤以分輕重而立賦法焉四夷財賦不及聴其貢篚而已故言成賦且曰中邦也王氏曰水火金木土穀惟修財賦乃所以敷於下而用於上者前此則未知其髙下多矣今方得其數故謹其出入也其言中邦者盖對夷狄而言謂禹之治水有及於四夷者而不取其賦故言中邦之賦而已若崑崙析支之類乃在荒服之外是豈取其賦哉張氏曰淫溢之患去而昬墊之災彌四方萬里得以通㑹于京師而㑹同之禮可以講矣嗚呼禹之功如此其利􅄎矣自九山刋旅析而名之則山之名見於經者三十有五自九川滌源析而名之則水之名見於經者四十有五自九澤既陂析而名之則澤之名見於經者九貢篚名其物田賦差其等内而中國外而戎夷舟車所至雨露所濡而禹迹無所不及宜乎稱美之以為萬世所賴錫土姓祗台德先不距朕行無垢曰夫禹懲創丹朱以傲而殄厥世故過門而不入啓􅈱􅈱而弗子祗勤我徳以先之遂弼成五服至于五千而州十有二師外薄四海之長各迪有功皆不違我之所行焉以是知禹所以成此大功者非求之他也祗我勤徳以先之而已天下事豈不自我而出哉文王雝雝在宮肅肅在廟而江漢之人無思犯禮伐條婦人勉夫以正夫其無犯禮勉以正處乃雝雝肅肅之效也信乎簫韶奏而鳯凰儀干羽舞而有苖格髙宗思而傅説肖成王悔而天反風皆祗台徳先之機也王氏曰古者姓如封爵故人多無姓今以水患既去故有功徳者則與之姓上官氏曰不得於家不可以為教而姓立家之本也不得於民不可以為政而土聚民之勢也故錫之以土使之有國錫之以姓使之有家有國以君之有家以宗之然後可以責其祗徳而不違行法而不距也聶氏曰錫土者使之立國也錫姓者使之立宗也因姓可以别氏因氏可以别族昭穆以辨尊卑以序嗣以子而統之有宗奕以孫而𫝊之罔極以嚴宗廟以重社稷錫土者利也錫姓者名也先王輕與人以利而重與人以名故錫土而不錫姓者有之未有錫姓而不錫土者也五百里甸服百里賦納總二百里納銍三百里納秸服四百里粟五百里米無垢曰王畿規方五百里皆謂之甸服甸者以言五百里内以田事供役也總者何物也安國曰禾藁曰總禾則穀穗藁則禾秸也既納禾又納藁以其近地易輸将故責之備也聖人體盡人情以天下為身其血脉相貫使人樂於從役而無愁勞嘆苦之聲銍穫禾鐵也禾穂用銍以銍表禾穂也百里之内納總以其近也二百里差逺也故止納禾穗而不納秸也王畿三百里内彌逺故止納藁秸而已不納帶藁之穗也盖秸輕而穗重二百里納帶藁之穗三百里止納藁秸以其逺而彌輕也其間納數之多寡則亦有曲折焉大抵彌逺者彌寡此聖賢仁心隨在而見矣藁秸雖輕而舟車負載不若粟米之數少也其賦藁秸也數多而賦粟米也數少彌逺彌輕之説見矣粟麄而米精是米又不若粟數之多也張氏曰甸者井牧其地什伍其民之謂也王氏曰王者使人耕甸而服事於王故名甸服服者大畧若今所謂路如京畿路京西路之類傅楫曰惟其金石羽毛可以飾器皿絲枲絺紵可以具衣服菁茅可以薦鬼神土木可以備采章王國之所無四方之所有然後諸侯貢之以充於王府也推此以觀則賦税之専屬於天子者止於甸服之内甸服之外則盡歸於諸侯之君而天子無與焉此所以不言也東萊曰甸服王畿王畿而以甸名者井牧丘甸大率相似夏時常以甸為準奕奕梁山惟禹甸之少康中興一成之田可以見甸制推而上之則為同為畿推而下之則為丘為井五百里侯服百里采二百里男邦三百里諸侯王氏曰侯服之内百里乃王者食采諸侯所封之地不得有其地唯采其所産之物故謂之采此外百里為二百里謂之男邦謂得有其地而封以為男此男邦之外統三百里以封諸侯以其國大而勢强故封於外以為扞禦張氏曰内足以捍難外足以庇人者侯也諸侯有君道焉故以庇民為事有臣道焉故以捍難為職此建諸侯之國也建男邦於近則内不外偪建侯國於逺則外不内陵五百里綏服三百里揆文教二百里奮武衛韋氏曰以文教武衛為安王之賔因以名服陳氏曰揆文教者四方于宣也奮武衛者四國于蕃也天子内服亦未嘗無武但徳柔中國刑威四夷於逺者尤宜尚武爾張氏曰綏安也以其用中國之政務以安民為事故也文教言揆者以綏服於京師為甚逺其於文教則揆之而已不必一一以遵上之法也武衛言奮者以其鄰於戎狄故使之奮武以衛中國也胡氏曰綏服者五服之中也内而之中國則為逺外而逼蠻夷則為近内三百里揆文教外二百里奮武衛也惟其内以揆文教外以奮武衛所以有安之道盖不能揆文教則不足以接内治不能奮武衛則不足以禦外侮雖欲安之不可得也東萊曰綏服者去王畿漸逺不可不常存綏撫之心聖人非私於彼加意於逺􅄸計見效與近者均也五百里要服三百里夷二百里蔡無垢曰要者以言在九州之外非如九州可用詳治也要服三百里之内已有夷狄之風當存要約而已盖夷狄與中國之性居處嗜好率皆不同倘以中國望之非特夷狄不安其生而聖賢之心亦無時少寧矣其餘二百里則謂之蔡蔡謂人之有罪不忍殺之者放之於此矣放之於此者困苦之也道里既逺來有䟦涉之勞風俗又乖動有性命之害所謂苦其心志勞其筋骨餓其體膚空乏其身行拂亂其所為所以動心忍性増益其所不能者也張氏曰政弗致詳刑弗致嚴使無乖離散徙以為吾中國之害者要也五百里荒服三百里蠻二百里流無垢曰自要服之外又規方五百里謂之荒服荒者以言居要服之外荒忽無常不可要約待之也等之禽獸而已來則際之以禮去則任而弗責朝則在明堂之外宴則有折體之簡其待之如此者以其荒忽無常則亦以若有若無之禮待之故視其來如有及其去如無欲不遜則為吾禮所防欲生怨則為吾樂所感張氏曰荒則不治也以其去王畿為最逺又不可以要而治之也故其服謂之荒雖然亦服中國之正朔此所以列於五服之内也蠻者慢也蠻之外二百里曰流者流罪人於此也舜之去四凶於驩兠言放以驩兠之罪輕則放之者也於共工言流以共工之罪重則流之者也蔡在要服流則荒服則流之有甚於蔡可知矣東漸于海西被于流沙朔南暨聲敎訖于四海禹錫𤣥圭告厥成功按此條經觧永樂大典原闕

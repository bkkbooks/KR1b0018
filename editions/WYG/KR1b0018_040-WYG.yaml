body:
  text: 尚書精義卷四十宋黄倫撰周公曰嗚呼厥亦惟我周太王王季克自抑畏文王卑服即康功田功徽柔懿恭懐保小民恵鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民無垢曰文王抑畏之心又見於卑薄其衣服卑服如所謂惡衣服是也其不留意衣服之間其心必有所主也康功謂安民之功田功謂稼穡之功安民欲其有功則於民之細㣲無不體究矣治田欲其有功則於田之利害無不諳悉矣其曰功者必欲民之康田之豐而後已也卑薄其衣服而留意在此所以謂之即歟又曰抑畏在心故無剛暴之氣每見其徽柔無倨傲之状每見其懿恭徽懿皆羙也羙在其中而暢於四肢發於事業暢於四肢故柔則徽而恭則懿可以想見文王之聖容發於事業故小民則懐保之鰥寡則恵鮮之可以想見文王之徳政有諸中形諸外此理之必致者也又曰葢一日之㡬有萬儻稍失其㑹則禍必及於天下惟以勤爲心事事經理使發號施令無一人不滿其意者此咸和之理也陳晉之曰卑服則不自尊其身即康功田功則致其力於民即康功所以安天下孟子所謂文王一怒安天下是也即田功所以養天下孟子所謂文王制其田里是也言卑服則不耽樂之從可知言即康功田功則聞小人之勞知稼穡之艱難可知胡氏曰抑有遏之之意人所以肆行而無畏者不能自抑也遏其妄情止其私慾惟義是從則必畏天命必畏祖宗必畏師必畏諌必畏謗讟必畏禍亂凡可以致治者無不爲凢可以致亂者無不去也此非他人所能惟我而已故曰克自抑畏言其自爲之不由乎人也然畏一也有當畏者有不當畏者雖聖人不敢不畏若夫逆理之臣子反道之夷狄則當修明刑政以攘却之如舜罰有苖周征三監高宗伐鬼方宣王伐玁狁亦何所畏哉文王不敢盤于逰田以庻邦惟正之供文王受命惟中身厥享國五十年無垢曰文王爲西伯則西道諸侯皆聴命而供貢賦是以文王不敢盤樂於遊逸田獵惡夫以庻邦所貢賦供逸遊之好也夫四方貢賦皆出於霑體塗足愁筋苦骨之餘上以奉宗廟朝廷下以給百官有司庻乎其可也而乃欲以供逸樂之具天理豈肯容乎周公於中宗言不敢荒寜於高宗亦言不敢荒寜於祖甲言不敢侮鰥寡於文王言不敢盤於遊田者此葢無逸之心也葢無逸則兢畏而不敢逸則肆而無不敢使以敢爲心則亦何所不可哉欲行無逸當以敬欲行敬當自不敢中入吕氏曰文王之所以壽只爲不養其小體成王若欲壽初不在養其小體以此知此最是周公感悟成王親切䖏何故纔養其小體便去理㑹衣服飲食遊田殊不知此乃是伐心之斧溺身之穽却是夭之端若是一个養其大體使心和氣平乃是長乆享壽之道理文王如此勤勞却享許多壽當知勤勞中元不曽有焦熬地位勤勞之中自有樂地文王所以能如此勤勞而自樂者乃是文王徽柔懿恭所養至此周公曰嗚呼繼自今嗣王則其無淫于觀于逸于遊于田以萬民惟正之供無垢曰商之三宗周之文王不敢逸豫享國乆長明白如此今後嗣王欲為賢聖之君不墜祖宗基業而享國長乆者無他道也法則三宗文王之不過於觀眺逸樂遊冶田獵而已夫此四事有一于此上廢㡬務下傷民財萬民之供賦役以備百官郊祀有司之奉宗廟社稷朝廷之大而已非以供觀逸遊田也夫逸豫之作常見於觀逸遊田此三宗文王所以不敢為此以貽子孫後世之患也胡氏曰何謂觀如魯隠公觀魚于棠莊公觀社于齊景公欲觀于轉附朝儛魯臧孫所謂不軌不物曹劌所謂後嗣何觀而晏子所謂流連荒亡為諸侯憂則觀之過也何謂逸如魯文公三不㑹盟而怠於誄祭大室屋壊而怠於宗廟自正月不雨至于秋七月而怠于憂旱魯國失自文公始則逸之過也何謂遊如周穆王欲肆其志周行天下將必有車轍馬跡焉秦始皇隋煬帝作離宫别館不知其數千乘萬騎極意廵行百姓嗟怨以亡其國則遊之過也何謂田如夏太康畋于有洛之表十旬弗反為羿所奪漢武帝㣲行出獵夜過桓谷渴而求漿為主人所辱則田之過也故于觀于逸于遊于田則必輕費妄用萬民正供之賦不足以歛之而重歛於民民至困窮弱者死溝壑其終如此此聖人所以長慮却顧而戒之於其初也吕氏曰前說以庻邦惟正之供後說以萬民惟正之供以此知天下之貢賦非要供奉天子夲不是供人主之身乃是供人主之位何故天作之君作之師所以使萬民來貢賦夲不是私奉一人之身所以惟是宗廟賔客合當用者方用貢賦只是供人主之位不是私奉人主之心何故當時所以使他貢賦㡬曽要供人主之觀逸遊田當知夲不是如此此周公又警動成王親切處無皇曰今日耽樂乃非民攸訓非天攸若時人丕則有愆無若殷王受之迷亂酗于酒徳哉無垢曰淫于觀逸遊田則人欲動蕩其心迷亂不復知天理所在故反以酗酒為徳夫酒所以䘮徳也紂因得以鼓其凶燄乃認以為徳意逸豫之極盖有如此顛倒成王得不以此為戒哉吕氏曰這心一開便収不得何故纔說我是今曰暫耽樂便上不順天下不順于人便是自絶于天自絶于民了以此知此心不可頃刻放下人君纔放下時天下便陷于災害之地時今人為惡多是自初間說道我今日時暫如此到得後來為惡日長不可禁遏皆縁初間始周公曰嗚呼我聞曰古之人猶胥訓告胥保惠胥教誨民無或胥譸張為幻此厥不聽人乃訓之乃變亂先王之正刑至于小大民否則厥心違怨否則厥口詛祝無垢曰古之人即中宗至文王也君臣上下皆以無逸為徳故君臣上下率由無逸之中豈不儼然如上天森然如北極天下焉有不太平神祇祖宗焉有不安樂乎又曰君臣相訓告保惠教誨以無逸而君或不肯聴臣下無逸之言則放逸之言得入矣先王正刑自無逸中出放逸之言入則必盡變亂先王之正刑若小若大盡皆變亂以快私意此理之自然也又曰民心違怨民口詛祝怨氣充塞安有壽考之理乎夫民者天也民心違怨是天違怨也民口詛祝是天誅譴也如此國家亦安得有吉祥事乎史氏曰人君有迪哲之性不修則不明凢人有好亂之心不防則不止夫交修並用謂之胥君臣之間胥訓告則相示以法胥保惠則相愛以徳胥教誨則相規以道古之聰明睿智之君其盛徳雖出於天縱於是三者猶眷眷而不忘豈有他哉凢以開悟其迪哲之性而隄防小人好亂之心者盖不得不爾也周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王兹四人迪哲厥或告之曰小人怨汝詈汝則皇自敬徳厥愆曰朕之愆允若時不啻不敢含怒無垢曰迪蹈也行也謂用知人之哲以自照也盖知人之是非則易見知己之是非則難行知人之是非以反照己之是非則入聖人之域矣故聞怨詈則自敬徳愆在於彼則曰朕之愆正孟子所謂行有不得者皆反諸己其身正而天下歸之之意也於殷獨舉三宗而不及湯於周獨舉文而不及武王此學者所以多說也盖湯武親以兵臨桀紂之罪其無逸也不足言三宗皆承富貴之後文王亦承積累之基其無逸也為可法此正為成王言也又曰天下莫難受於怨詈我誠有過則彼之怨詈為有物我元無過則彼之怨詈為讒賊此衆人聞怨詈所以多怒也夫以三宗文王尚不免小人怨詈况未及三宗文王者乃遽欲人人稱頌乎第三宗文王之處怨詈也有道其道何如迪哲而已聞怨詈之至則用平生知人之哲即怨詈而自照焉其果有也則改之不疑其無有也則愈加檢飭使吾心無一毫之玷而後己大自敬徳此之謂也胡氏曰哲者知也迪者由也由其天稟之智不以私昏之則其明不蔽所以人莫之欺也史氏曰以畏慎處已以忠厚待人此聖人盛徳之事也聞譽則喜聞毁則怒善則稱諸已惡則歸諸人此理之必然也凢人情之所不堪者吾今一切反之非盛徳孰能之哉張氏曰自知者明知人者哲哲者明之發乎外足以知人之謂也人孰不有是哲不能迪之則茅塞其心而昏惑闇黯之累生焉是故哲出於性迪之者人而已自殷王中宗以至於我周文王兹四人迪哲者於哲則能迪之則其性天之明不為物之所蔽也此厥不聽人乃或譸張為幻曰小人怨汝詈汝則信之則若時不永念厥辟不寛綽厥心亂罰無罪殺無辜怨有同是叢于厥身周公曰嗚呼嗣王其監于兹無垢曰夫聞怨詈之言而迪哲以自照則變忿怒為和緩此心已在三宗文王閫域中矣安得不長有天下亦安得其心不常寛裕乎聞怨詈之言而輕信以含怒此心已在桀紂室中矣豈復能長有天下乎不知迪哲自責之道而信讒含怒因事而發不復審問是非所在乃恣罰無罪殺無辜之人以快一時之憤凢有同是無罪無辜而被殺罰者無不怨恨以叢萃於一人夫以𦕈然一己而天下之怨皆萃而歸焉不知其何以堪之此古帝王之所畏也邴歜殺其君有以也夫又曰無逸迪哲之說上引三宗近質文王凢治亂安危之㣲享國長短之要盡於此矣此古今存亡一大鑑也吕氏曰惟無逸則勤勞勤勞則公明謙遜虚受自然樂於聞過若自此縱逸則怠惰驕傲必至於自滿何縁㑹聽人之言惟是無逸方能聽言周公所以又嘆息嗣王其監于兹盖欲成王看這怠逸存亡樣子召公為保周公為師相成王為左右召公不悦周公作君奭無垢曰太保之職其救王惡太師之職其詔王媺盖與之同太師太保皆宰相也召公為保周公為師相成王而左右夾輔之其任重矣使成王有微惡萌於心則召公為失職使成王有一善之不為則周公為失職而以成王資質論之管蔡流言成王遽疑周公丕視功載成王悉用私人是其心惡氣昜生善端猶蔽此召公所以不悦而欲求去也荆公曰召公不悦何也曰成王可與為善可與為惡者也周公既復辟成王既即位盖公懼王之不能終而廢先王之業也是以不説焉夫周之先王非聖人則仁人也積徳累行數世而後受命以周公繼之累年而後太平民之習治也乆矣成王以中才承其後則其不得罪於天下之民而無負於先王之烈也不亦難乎如此則責任之臣不得不以為憂也賈氏曰成王㓜在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師道之教訓三公之職也於是皆選天下之端士孝弟博有道術者以衛翼之使與天子居處出入故天子初生固見正事聞正言行正道左視右視前後皆正人也習與正人居之不能無正也楊氏曰召公不説者非不説周公之留也召公之與周公同心而同徳者若使不説周公之留則召公之心豈其有疑乎周公無可疑之事召公無疑周公之心使召公果有疑之之心則當疑於權在手未歸政之前必不疑於己歸政之後也君奭之篇即周公已攝政之初復子明辟之後周公留為太師與召公相成王為左右之時也而召公方有疑之之心無乃後哉或曰召公之所以不悦者何哉曰召公見周公己歸政成王歸就臣位而成王中主也方在弱冠新即大政召公之心盖憂其志慮謀意或未保於無過宗廟社稷或未任於負荷盖其心憂國之深故不悦也周公因其憂而不悦於是歴陳商之所以亡周之所以興復謂自古國家多難得賢臣則安盖將以古賢臣之功勉召公而寛其憂成其忠相與協力以濟成王於太平之域也君奭周公若曰君奭弗弔天降喪于殷殷既墜厥命我有周既受我不敢知曰厥基永孚于休若天棐忱我亦不敢知曰其終出于不祥無垢曰我周既已受殷家有天下之命其吉其凶未可知也我不敢知周家基業其永信如今日之休美而子孫能順天道天其常輔子孫之誠乎我又不知其終出于不祥如殷紂乎此周公憂懼之深故以問召公也張氏曰在天者有命在人者有義命之在天莫之致而至其可必哉所可必者在我之義而已是故殷之墜命與夫周之受命非周公之所敢知也厥基永孚于休與夫其終出于不祥亦非周公之所敢知也凡此言天難諶命靡常吉凶禍福相為休長相為倚伏不可得而知矣嗚呼君已曰時我我亦不敢寧于上帝命弗永逺念天威越我民罔尤違惟人東坡曰周公昔嘗問召公曰天其將使周室永孚于休歟抑將出于不祥歟皆未可知也于時召公荅曰是在我而已我若能祗上帝之命不敢荒寧則天將永孚于休若其弗念天威及使民無所尤違則天將終出于不祥此皆在人而已今我不去正為此耳故舉其昔言以喻之無垢曰于民無所尤是任其作惡也于民無所違是順其作惡也民知善之所向惟上之人於其為善而任順之則人人有士君子之行而見風俗之厚矣儻惟于民任順其為惡而無所尤違惡俗已成其終出于不祥也無疑矣荆公曰此言君奭既曰是在我我亦不敢暇逸于天命而不永逺念天威之於我民無尤違言天威於民皆當其罪無僣差已不可以不念也張氏曰謂之禍矣福有時而來謂之吉矣凶有時而至則上帝之命我之所以不敢安也作不善而降之殃不欽徳而墜厥命則上天之威無過也無違也未始或僣焉苟能作徳則天威雖曰可畏不足畏也已不敢寧于上帝命所謂雖休勿休是也不敢不永逺念天威越我民罔尤違所謂雖畏勿畏是也在我後嗣子孫大弗克恭上下遏佚前人光在家不知天命不易天難諶乃其墜命弗克經歴嗣前人恭明徳無垢曰天道難保有徳者輔之無徳者去之既不能恭承天地又不能宣重文武之徳又與宦官女子昏于深宫不知天命之不可輕是則天必將墜其有天下之命亡不旋踵豈能經歴乆逺以嗣文武恭天地之徳與夫文武光明之徳乎此言成王中才正在周召夾輔之意不可求去以為高也荆公曰前既言在我者不敢不勉此乃言在人者非我所及知也惟在人者若我後嗣上則大不克敬恭天與祖考下則大不克敬恭諸侯臣民遏佚前人光在室家之中沈溺于近習而不知天下之艱難則天命靡常難可諶信乃其墜命不能經歴乆逺嗣前人敬明之徳在今予小子旦非克有正迪惟前人光施于我沖子無垢曰惟恐其不能嗣前人恭明徳故在今我小子旦不敢去國而留佐成王也然而我之佐成王豈敢自以為能正之哉此盖周公不敢以大人自處也第行文武之明徳以開警于成王爾夫闇室之中灼燈則闇者皆明前人光即燈也成王猶闇室耳使周公行文武明徳以示成王則成王闇處皆廓然矣張氏曰正已而率之者正也先身而道之者迪也周公自謂我非能有所正也亦非能有所迪也惟以前人光明之徳施之成王而已又曰天不可信我道惟寧王徳延天不庸釋于文王受命無垢曰天不可信我其柰何哉惟道行武王安天下之徳使周家享國延長庶㡬天不用釋廢王所受之命也盖受命者文王武王有聖徳復受天命周公道行武王之徳則其享國長延也無疑矣大誥寧王指武王故知此所謂寧王者武王也吕氏曰天不可信周公前既説天難諶至這裏又説天不可信周公非不知天何故不信天盖天元不在外若外面信天便是外面别有箇天不要倚靠外面底天紂言我生不有命在天紂自不去理㑹一身只専信天却自外討天盖天元不在外心外别無天紂愈攀援天天愈絶紂維武王自盡其徳自敬其徳可也天命自無窮此欲逺却近若是紂欲近却逺公曰君奭我聞在昔成湯既受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤率惟兹有陳保乂有殷故殷禮陟配天多歴年所無垢曰伊尹在太甲時伊陟臣扈在太戊時皆能格于上帝夫天帝一也而周公于湯時言格于皇天于太甲太戊時言格于上帝何也盖上帝則秉禍福之權而作善者降之百祥矣天則日月星辰是也格于皇天則日月合璧五星連珠甘露降醴泉湧山出器車河出馬圖鳳凰麒麟皆在郊陬朝廷盖可知也格于上帝則慮而有獲動而有成子孫千億四夷來王矣其心之體無絲毫之欺是格于皇天也其心之用無絲毫之欺是格于上帝也又曰夫乂王家者治人事也伊陟告于巫咸巫咸修人事以應桑榖之變桑榖既消則人事修之力也人事修則治與上帝之心同矣上帝秉禍福之權以馭萬物人主秉禍福之權以馭萬民其理一也人事不治則有桑榖之妖人事既治則格于上帝是則人主代天無求合於天也第脩吾人之事而已矣又曰巫賢之於祖乙甘盤之于高宗亦用格于皇天上帝與夫乂王家之道也然則商家所以得天命者以此數賢輔弼之力也周公與召公豈可去朝廷乎去則高矣其如文武之業何不去則夾輔成王不失皇天上帝之意使天不庸釋于文王受命利害皎然夫復何疑又曰殷之賢君皆得賢者輔相故皆以禮終陟升遐也以禮終則其死也配天而無愧矣其道相傳如此故殷之享國多歴年所而不中絶命也然則賢者所係如此其可輕去朝廷而不以天下國家為念乎荆公曰伊尹保衡其實一也在成湯時則格于皇天在太甲時則格于上帝其故何哉文公曰可與盡道則盡道可與盡徳則盡徳成湯可與盡道者也太甲可與盡徳者也張氏曰天人之理其致一也所謂天之道者即吾身之道是也所謂帝之徳者即吾身之徳是也體此道而神焉是與天同道斯足以格于皇天矣得此徳而明焉是與帝同徳斯足以格于上帝矣格于皇天者是其道之至而與天無間也格于上帝者是其徳之至而與帝合一也若夫道徳有所未至則未可以言於于皇天上帝故特曰乂王家而已天惟純佑命則商實百姓王人罔不秉徳明恤小臣屏侯甸矧咸奔走惟兹惟徳稱用乂厥辟故一人有事于四方若卜筮罔不是孚無垢曰言天之所以大佑命商家者則以商家百姓大族王人之㣲者無不秉徳明恤下民以至為小臣者皆可以藩屏侯甸如所謂赳赳武夫公侯干城之意則夫天之佑商家者則以商家得人故也又曰朝廷四海形異而心同勢逺而理一故天子出一號發一令則四方罔不是而信之則以上下逺近内外表裏皆有徳之士也嗚呼儻非伊尹伊陟臣扈諸人有以倡之其能如此之盛乎審知此義則周召之不可不留也審矣

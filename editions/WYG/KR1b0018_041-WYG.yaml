body:
  text: 尚書精義卷四十一宋黄倫撰公曰君奭天壽平格保乂有殷有殷嗣天滅威今汝永念則有固命厥亂明我新造邦無垢曰天之所以壽中宗髙宗祖甲者以有和平感格之徳也何以明之有殷之君大抵嗣天心以除虐耳除去虐民之事則民安矣滅威者除虐之謂也使人君有此和平感格之徳非得賢臣輔相之可乎又曰今汝召公長念人主當有平格之徳盡心以輔相之則天命堅固不至渙散其為治也郁乎煥然足以明我周家新造之天下矣夫人臣事君動欲上合天心其敢以私意雜其間乎此三代之臣所以為純臣也張氏曰武丁之類皆有商平格之君也伊尹甘盤之徒皆保乂有商之臣也平者言其徳不偏也格者言其道之有所至也惠足以輔其君者保也才足以治其事者乂也天相平格之君與夫保乂有殷之臣皆降之以永年而不中絶其命故曰天壽又曰亂我新造邦者所以治之而使不亂明我新造邦者所以明之而使不昏也吕氏曰商家君臣之盛天之所壽者是至公極盡道理商家君臣至公無私既極其至所以壽之扶持輔相保乂有商前許多聖賢維持方到天夀平格保乂有商地位今嗣子紂不能到天便滅絶而加之以威以是知果然天命之不易天難諶今命不在天只在召公永念與不永念便是天命固處若知無常而能時時保䕶則有固命天命亦從而固其治煥然一新而能顯明于我新造之邦使億萬斯年而不墜若不永念目下便以為安時豈不知必到覆亡地位蓋天命之固不固只在召公之念永不永公曰君奭在昔上帝割申勸寧王之徳其集大命于厥躬惟文王尚克修和我有夏亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括無垢曰東坡曰寧王武王也天降割喪文王申勸武王而集大命也蓋天勸文王修徳久矣詩曰維天之命於穆不已蓋曰天之所以為天也文王之徳之純蓋曰文王之所以為文王也純一不已文王不已處即天勸之也武王有聖徳復受天命是天重勸武王之徳也以其有徳故集大命于厥躬而身為天子富有四海之内宗廟享之子孫保之也有夏中國也中國遭紂之亂其敗壞不修乖離不和也乆矣文王於此時獨能修其敗壞和其乖離此所以三分天下有其二也亦惟有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括言文王修和有夏亦惟此五人之力耳孔安國謂虢國叔字文王弟閎氏夭名又曰散泰南宫皆氏冝生顛括皆名文王有此五人亦猶成湯太甲之有伊尹太戍祖乙髙宗之有伊陟巫賢輩也是則成王左右其可一日無周召乎然而不及太公者以太公主兵事非文王本心也吕氏曰周公前既説商家聖賢之君六七作所以致如此功業者皆頼相之人此又舉廹切本家事説與他蓋古人相訓告自逺及近其情漸至其語漸切故前面説商家後面説本家事所以使召公聽之切也割裁正之意申申重之意勸勸相之意當時天祐周家一箇委曲裁成輔相如此故我寧王所以至於動無過則皆是上帝裁割申重勸相委曲之至如此見得武王天人無間䖏所以能集天下之大命于其身又曰無能往來兹迪彞教文王蔑徳降于國人亦惟純佑秉徳迪知天威乃惟時昭文王迪見冒聞于上帝惟時受有殷命哉無垢曰此言修和有夏文王全賴此五人也使文王無此五人徃來中外導此􅂜常之敎於下民則文王無從有徳意降于國人矣其敗壊乖離何時而已乎以文王之聖尚不可無人為之助况於成王乃能獨為之而周召不在朝廷乎蓋周召天下善類之宗也周召去則善類去善類去其誰與共治天下乎又曰純佑即前天惟純佑命之意秉徳即百姓王人罔不秉徳之意其詳已前陳于商家矣故此以亦惟一語該之使召公自㑹也夫五人昭文王之徳意使文王之徳行顯然著見覆冒西土下合民心民心即天帝也故聞于上帝而文王受此殷家之天下也然則文王有此五人故得有天命成王無周召在朝廷天意未可知也周公深知天意所在故為召公别白而言之張氏曰君任道臣任事任道者常逸任事者常勞彞敎雖出於文王徃來而迪之使其徳降於國人者實賴五臣而已故周公又以謂若無此五人奔走徃來以為文王之助則文王雖有彞敎其誰迪之此文王所以蔑有徳而降于國人也武王惟兹四人尚迪有禄後暨武王誕將天威咸劉厥敵惟兹四人昭武王惟冒丕單稱徳無垢曰此四人後與武王大舉天威皆劉厥敵謂誅紂伐奄之類也言四人暨武王豈以四人主伐紂之謀與惟尹躬暨湯之意同乎四人在文王時修和有夏在武王時咸劉厥敵為將為相無不可者其亦天下之英傑矣又曰此四人所以劉厥敵者去惡除害而昭布武王之徳意覆冒天下也天下盡被武王之徳故無小無大盡稱頌武王之徳而無異辭四人之功為如何哉嗚呼朝廷不可闕人如此周公與召公豈忍以脱去為髙而使文武之徳不克終乎今在予小子旦若游大川予徃暨汝奭其濟小子同未在位誕無我責收罔朂不及耉造徳不降我則鳴鳥不聞矧曰其有能格無垢曰今我觀朝廷之勢如游大川中向非我與公左右協力輔賛成王以濟此艱難成王在位如未即政天下安平時則我與召公無大責矣其自任如此可見周公之忠聖夫以周公之聖召公之賢輔弼成王疑若無難危事矣而有大川之喻者何也蓋天下之事以易自處則百事皆忽而禍起於談笑以難自處則思患豫防而功可成於不日又曰周公之意必欲輔成王如商家諸人之格于皇天上帝使成王有不勉不及之心則周召當左右檢束收斂之使必如商家諸賢君可也儻老成有徳如召公者以引去為髙不降意以輔成成王以纉文武之業雖前有鳯鳴岐山之瑞我且不得與聞矣况能格於皇天上帝乎張氏曰易以涉大川喻濟大難髙宗之命傅説若濟巨川用汝作舟楫然則游大川者非得臣以為之助則莫之或濟矣周公自謂予小子旦當周家艱難之事若游大川然故自今已徃暨汝君奭其濟小子助成王是也若游大川者必期於濟然後可以無沉溺之患今我暨汝同心協力以濟成王同成王未在位之時庶幾乎可以無大責也且成王未在位未有所知已得周公召公為之左右為之訓導遂至於奄有天下而承文武莫大之基緒今既在位矣復遭周家之大難而成王有所不堪而二公濟之同未在位之時則其所以輔於成王者終始之道盡矣此大臣之節可以無大責也吕氏曰周公說文王武王得天之佑又得許多人方能濟王業今盡付與小子旦如何獨自做得且如文武之時比至如涉大川一般正要召公同濟此大險周公説前時如此今日却自教我一人擔當此大事一人划船如何划得過岸也公曰嗚呼君肆其監于兹我受命無疆惟休亦大惟艱告君乃猷裕我不以後人迷無垢曰有無疆之休必有無疆之恤得其人則有無疆之休美非其人則有無窮之艱難矣召公視此其可不留在朝廷乎以此知周公之留未嘗有一毫為人謀也為天下國家而已矣又曰周公以謂為召公計當謀以寛裕為心以寛裕為心而不以引去為髙則周公之心已寛裕矣豈特周公寛裕賢者舉動必為世法事君以寛裕為心期以歳月致君於堯舜之上不當急迫以引去為髙則後世之為人臣者皆顯然知寛裕為臣子之道也使召公以引去為髙則後人皆迷於事君之義矣張氏曰貴為天子富有天下則我之周家受命可謂有無疆之休矣然而不欽厥徳則早墜厥命不常厥徳則九有以亡故曰亦大惟艱告君乃猷裕我不以後人迷者周公告召公使之長慮却顧當謀所以裕我者使我綽綽然而有裕也召公之所以謀裕周公者豈有他哉蓋亦啟迪成王而引之以當道使之不失為持盈守成之君此周公所以裕也公曰前人敷乃心乃悉命汝作汝民極曰汝明勗偶王在亶乘兹大命惟文王徳丕承無疆之恤無垢曰偶左右之義也亶誠信也蓋誠信則能行天命不信不誠此鬼蜮中人也其何以行天命乎明朂謂昭然見左右成王之道不可不勉也無窮之憂其何以堪承之欲大承無窮之憂而不失其道者止法文王之徳而已文王之徳何徳也即任賢圖治之徳也君徳在任賢今周召皆去成王何以為君乎武王顧命如此召公其可不念諸張氏曰陽竒而隂偶偶者二之謂也婦者夫之偶也臣者君之偶也臣雖為君之偶當明勗其所以偶王之道也明所以偶王之道而不至於昏昧朂所以偶王之道而不至於怠棄明朂偶王之道在亶乘兹大命而已蓋有徳者必為天之所命能惟文王之徳以丕承無疆之恤則天命固可以永保之也公曰君告汝朕允保奭其汝克敬以予監于殷喪大否肆念我天威予不允惟若兹誥無垢曰允信也周公所信者朝廷有人則治無人則亂逺觀商室近觀文武莫不若是故今所告召公者無非周公所信者非道聽塗説之比也然而周公如此豈非大賢乎曰不然也世已衰矣事亦急矣周公儻如召公之去朝廷則存亡未可知也故上稱君言我之所告無非我之所深信者今稱保稱奭又言汝當克敬我之所言夫何故以我親見殷紂之喪亡大亂及念我周家仗天威以伐紂以紂不道朝廷無賢者也故召公不可不敬我言而輕言去國也張氏曰否者泰之反也否之時陽消而隂長大徃而小來上下不交而天下無邦然則殷喪大否在召公不可不讓周公而監之也以殷喪大否之如此故今我天威不可不念之也予不允則是在我者不能克敬也不能克敬則喪亡無日故亦如此告之所言喪大否也予惟曰襄我二人汝有合哉言曰在時二人天休滋至惟時二人弗戡其汝克敬徳明我俊民在讓後人于丕時無垢曰召公言曰成王業誠在吾二人然而文武以積徳天之休美雜沓而至顧我與周公其何以當之則召公之憂畏小心亦可見矣予觀周公之心一以天下國家為重而召公之心以慎守名節為重二人之在朝廷周公經綸造化召公彌縫賛襄天下安得不治人主安得有過乎無周公則幾務不理無召公則過惡必滋張氏曰在已者能欽徳則内足以盡己在人者能明俊民而讓之則外足以徳人明俊民則無蔽賢之實在讓則有不爭之徳人臣之善無大於此後人所以於汝而大之也嗚呼篤棐時工人我式克至于今日休我咸成文王功于不怠丕冒海隅出日罔不率俾公曰君予不惠若兹多誥予惟用閔于天越民案此條經解永樂大典原缺公曰嗚呼君惟乃知民徳亦罔不能厥初惟其終祗若兹徃敬用治無垢曰民之為徳多鋭於始而怠於終以言召公初輔成王盡心朝廷幾鋭於始矣成王雖即政文武之業未廣乃欲潔身求去是幾於不能終也惟當與周公盡心以輔成王使為周家賢君則可以逃責矣儻知以去為髙是不善其終也張氏曰靡不有初鮮克有終常人之情也祗若兹徃敬用治所以克慎厥終而已能慎厥終者將以成民之徳故也雖然慎始非難而慎終為尤難周公之告召公使之相成王以克成厥終故其言有及于此蔡叔既没王命蔡仲踐諸侯位作蔡仲之命蔡仲之命惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗徳周公以為卿士叔卒乃命諸王邦之蔡無垢曰伊尹放太甲于桐宫取天下而自為之當時卿士庶人不疑其有簒君之心周公以叔父之親聖人之徳負成王於黼扆三叔皆其兄弟也而反流言以惑成王豈周公之徳不及伊尹哉蓋風俗浸薄無夏商忠厚敦朴之氣也蔡仲克庸祗徳豈周禮所謂中和祗庸孝友六徳歟蔡仲有是二徳矣故周公舉而用之儻使周公疑忌羣叔而并及其子是周公亦可疑矣周公不疑羣叔而羣叔流言是管叔自取其誅蔡叔自取其囚霍叔自取其降非周公有意也三叔既自取其罪而周公舉用其子觀其至誠不疑之心其肯無罪而誅囚兄弟乎則三叔之罪又可見矣東坡曰蔡叔之罪至是已赦之故言既沒又封蔡仲必於叔卒之後林氏曰天下之道二仁義而已仁者所以愛親親為先義者所以制尊尊為尚聖人之心未嘗不欲兩存不幸時有以害吾之仁義吾則舍其一存其一既存則事之大者必舉而小者有所不恤也非不足恤也事不能以兼全在聖人亦不可得而恤也聖人之心惟示以公事一定而天下無可疑者矣夫武王老而成王未生管叔已有繼武王之心奈何迫於周公之聖而隂懐不平之心迨成王嗣位尚幼而周公代之是以向日不平之心倡為流言不已又縱之以叛則商民之亂愈熾矣下之惑愈甚周室未能保其有國也故周公去親親之仁而存尊尊之義不忍舍尊尊之義而自顧其小節也寧在已有自愧之徳而措天下之安寧不忍使王室之危而為天下之害也此所謂不幸不獲於兩全捨其小而存其大者矣又曰周公相武王而定天下武王疾而作代死之書相成王而致太平成王壯而有復辟之請此為己乎為天下乎蔡叔叛而囚之其子仲賢而復封之此為己乎其心不在於一己而在天下也必矣張氏曰徳出於所性庸之祗之在人而已克庸徳則能常厥徳者也克祗徳則能欽厥徳者也以其克庸祗徳此周公所以用之為卿士蓋位以徳序故也吕氏曰象之於舜使之完廪使之浚井其所以殺舜者亦多而舜終不殺象者蓋象之害舜止於舜之一身故舜不以一身而殺兄弟至於周公乃天下凖的三叔動摇周公是摇動周之社稷管叔罪尤重故不得不殺之蔡叔霍叔之罪輕故不得不囚之降之囚蔡叔以車七乘所以使其徒衆之少敎他自反自怨自艾降霍叔待三年猶封大抵周公分付處蔡叔於郭鄰之地蓋嘗日日望蔡叔於三年間終身不改而周公許多恩意無所分付幸而其子能用敬徳則周公之心自少慰故命之以為卿士如鯀之為惡舜殛之禹乃嗣興抑彼取此父罪子賢而任用之矣王若曰小子胡惟爾率徳改行克慎厥猷肆予命爾侯于東土徃即乃封敬哉無垢曰文武之徳為世標凖為子孫者豈可不率乎蔡仲能改父之行率祖宗之徳此資質之美者周公所以命諸王而復封之也又曰蔡仲能率徳改行質固美矣復戒之以敬者以蔡仲年尚少執徳未堅恐其自滿也譬之張弓矢未及鏃而發之則所及不逺矣故戒之以敬使之進而不已諺曰百尺竿頭更須進步此言雖質其理有可取者孔氏曰率徳者率文武之徳改行者改父之行吕氏曰周公以成王之命告蔡仲爾得侯于東土縁爾能克用敬徳汝今徃就乃封不可不敬此徳爾尚蓋前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後無垢曰蔡叔之惡在于不忠不孝欲蓋其愆者無他忠孝而已此周公庶幾蔡仲蓋其父之愆也忠則不欺其君孝則能事其親夫能以忠孝事君親則無不可矣又曰蔡仲生羣叔之間而能脱身自立於善日克勤於秪庸之徳而無怠惰之心其質美矣此其所以能垂憲於後歟林氏曰無以慰君親之心則無以盡躬行之實無以盡躬行之實則無以為後人之法自古聖人所以命人臣而形告戒之辭者非有他也忠孝必貴於兩全是以對君親而無愧蹤跡必兾其可驗是以善躬行而無忽然後上焉可以顯其親雖前人之有過得以掩而蓋之也下焉可以貽其法在後世之子孫得以視而式之也又曰蔡叔協商人以叛則不忠莫甚焉棄文王而黨武庚則不孝莫甚焉張氏曰夫蔡叔之過以君臣言之則為不忠以親親言之則為不孝然則前人之愆在於不忠不孝為之子孫者將欲立身揚名以掩其父之過惡故在於忠孝而已又曰有可述之道者則其子不得不述有可繼之迹者則其子不可不繼蔡叔之不忠不孝非所可述也非所可繼也然則為之子者故當邁迹自身克勤則外不惰於事無怠則内不懈於心能邁迹自身克勤無怠則其道可傳於後世吕氏曰周公親兄弟為一體見得蔡叔得罪於天下周公常若身犯之日日愧悚無箇道理遏絶遮蔽得幸而得仲改行立身揚名以顯父母蓋得蔡叔之愆故告蔡仲爾如今庶幾可以蓋得前人之愆須當盡其忠與孝永逺其蹤跡自其身始克勤無怠使步武可以觀以垂法於後率乃祖文王之􅂜訓無若爾考之違王命無垢曰率乃祖之􅂜訓即率徳也無若爾考之違王命即改行也林氏曰人子之心惟欲法父之所行所為者也然繼其父之可法者人子之幸也繼其父之有過者人子之不幸也人子於此宜如何耶其父不善而其祖善遵其祖常行之道而蓋其父不善之愆則向之所幸者乃所以為深不幸也臨川曰命公義之大者也諱私恩之小者也私恩之小不可以廢公義之大且名之幽厲雖孝子慈孫百世不能改貴為天子富有天下尚不能得以改也而况於人臣乎夫惟如此故人莫敢以私恩廢公義為善者知有所恃為惡者知有所懼而天下國家可得而理吕氏曰當時三叔如此殷民傷動已多了周公於此又怕有一人如此來犯天命以傷骨肉之親故謂幸而有文王之訓可學不可如前人之違王命何者一人違王命尚不可而今三叔皆如此此外又豈可添人皇天無親惟徳是輔民心無常惟惠之懐為善不同同歸于治為惡不同同歸于亂爾其戒哉無垢曰所謂天者不必他求在我而已我無失徳則心逸日休是天輔我儻惟失徳則心勞日拙是天絶之矣天豈有親踈哉惟徳是輔耳惠之所在民心之所在也無惠則民心去矣民亦豈有常心哉此雖成王命蔡仲實周公之言也又曰孟子曰誠身有道不明乎善不誠其身矣夫所謂善者果何物哉天理常明無一毫之私欲其遇事而見或謂之仁義禮智或謂之誠或謂之浩然之氣名雖不同其為善則一而已蓋發於惻隱則為仁發於羞惡則為義發於辭讓則為禮發於是非則為智事親則為孝事君則為忠治民則為惠善雖不同皆足以致治儻不仁不義無禮無智事親則不孝事君則不忠治民則無惠或溺於聲色或溺於貨利惡雖不同皆足以致亂可不慎歟林氏曰善惡非止於一端而治亂無過於兩塗勤於為善非必以我之善如彼之善而後可以成其治凡舉措而得其善者無有不入於治也勤於為惡非必以我之惡如彼之惡而後乃至於亂凡舉措而陷於惡者無有不入於亂也善惡雖殊而治亂則一為諸侯者豈可忽哉張氏曰順之者存逆之者亡則天故無私親也所輔者徳而已撫之則后虐之則讎則民故無常懐也所懐者惠而已詩曰皇天親有徳則徳為天所輔可知矣經曰安民則惠黎民懐之則惠為民所懐可知矣可欲之謂善可惡之謂惡天下所可欲之事雖不同也要其所同歸則歸於治而已天下所可惡之事雖不同也要其所同歸則歸於亂而已為諸侯者上必欲為天所輔下必欲為民所懐為善之效既如彼為惡之應又如此則蔡仲者其可不戒之哉慎厥初惟厥終終以不困不惟厥終終以困窮無垢曰孔子云譬如為山未成一簣止吾止也召公曰為山九仞功虧一簣古語曰行百里者半九十里此言終之難也齊侯其初任用賢臣九合諸侯一匡天下葵丘之㑹微有驕色叛者九國唐太宗勤勞憂畏身致太平末年浸弛於嫡庶之分不明欲引佩刀自刺唐明皇即位之初勵精求治末年惑於李林甫播遷西蜀唐憲宗即位之初亦慨然圖治淮西既平志意驕惰服方士之藥以至忿躁為宦官所弑此數君者其初非不美也而執志不堅中道而廢以至困窮信乎終之之難也此周公之戒所以反覆於終之之説歟豈以感激者多鋭於初而怠於終乎蔡仲始也發憤為善欲盖前人之愆誠恐為日滋乆怠心乘之則終歸于殆而已其可不戒耶林氏曰有國者莫難於為可繼之道何則人之立事無不鋭於始而工於初至其中而稍怠卒則漫澶而不振蓋不思其可繼之道故其未必至於斯也惟能盡戒慎於其始而又思其所以為可繼之道則自初及終行之不倦用之有常其效又豈止於旦暮之暫而不可延於嵗月之乆哉苟惟圖於始而不圖於終是雖有一時之功而非所以為善後之計其入於困窮之害也必矣懋乃攸績睦乃四鄰以蕃王室以和兄弟無垢曰在己則當盡其職事在四鄰則當致其輯睦在王室則當屏蕃在同姓則當協和故戒之懋攸績睦四鄰蕃王室和兄弟其事之多如此可謂難矣惟知有難然後能戒慎則必有以處之懋乃攸績者謂事事當有成功也睦乃四鄰以蕃王室者謂有叛國則率諸侯以伐之也以和兄弟者謂同姓之國有未睦者為睦之也然聰明才智則能事事有功曲盡人情則能睦四鄰蕃王室和兄弟矣要非戒謹不能也史氏曰懋勉所立之功則徳近乎忠親睦所交之鄰國則徳近乎厚列五等之封環千里之寄孜孜為是者豈有他哉亦曰尊親而已以蕃王室則至尊者無憂以和兄弟則至親者有頼尊尊而親親則所謂諸侯之小心者無過於此矣張氏曰積功之成謂之績則績者非一朝一夕之所積不能懋之則或至幾成而廢者有矣則績不可不懋也能懋乃攸績則國治矣然而于其四鄰又不可不與之睦也小大相比内外相維聘問以時徃來以禮此所以睦四鄰之道在我者能懋乃攸績在外者能睦乃四鄰然後可以同力協徳以為中國之扞蔽而中國頼之以安矣故繼之以蕃王室蓋王室以諸侯為蕃為諸侯而不能懋乃攸績睦乃四鄰則中國無所恃頼而其蕃缺矣睦乃四鄰則睦之而已至於和兄弟則又相與作為兄弟而無或乖戾者也康濟小民率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則予一人汝嘉王曰嗚呼小子胡汝徃哉無荒棄朕命無垢曰康濟小民無他以我之情自度之足矣我欲安佚民豈可使之勞我欲飽煖民豈可使之饑寒如是則能康濟之矣率自中謂取度於我中心也一决於我中懐又恐其任聰明以亂先王之典法也故曰無作聰明亂舊章先王以公道治天下不以私意違人情故為典法以遺後人儻任私意則亂其法矣大率聰明絶人者好興事功而易憲度蓋恃其聰明以為前無古人後無作者此周公所以戒也東坡曰以一偏之言而改其常度非其本心也生於視聽之不審耳故患常在速不在緩緩則視聽審而事無不中矣林氏曰不循中道之行則矜恃之心易起則未免有非古之失不致視聽之審則一偏之言易入則未免有敗常之愆何則中道不可不循也惟循中道則内有所守而外無所恃聰明雖自我有而未嘗有妄作之意孰肯非古是今而亂先王之典章者乎視聽不可不審也惟審視聽則公心益持而私意不奪妄言雖欲惑我而未嘗有輕用之失孰肯厭常棄故而更其常行之度者乎為諸侯者苟能盡心於此則其稱職足以慰天下之所望也天子得不深嘉而褒揚之哉張氏曰民勞而未息必推吾仁以康之民難之未釋必推吾義以濟之然而其身正不令而行則康濟小民之道又在乎率自中也率中者言其所循者中道也自中者言其所用者中道也為人上者能率自中則天下之人不期而中矣

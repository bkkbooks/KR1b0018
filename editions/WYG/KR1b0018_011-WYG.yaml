body:
  text: 尚書精義卷十一宋黄倫撰荆河惟豫州無垢曰自北條南山至於河皆豫州界東坡以地形考之北條至河北勢甚促如何其為州也故云當是跨荆而南猶濟河惟兖州也觀此州言伊洛瀍澗則西至𢎞農矣言滎波既瀦則北過大河南至滎陽矣言菏澤孟瀦則東至定陶又至睢陽矣此州當南北狹東西長陳氏曰冀州帝都不言疆界所至豫州當冀州之南故言豫州之北境以表冀豫之界至於荆州又居豫州之南故言荆及衡陽惟荆州則南荆山以北之地為豫州之境伊洛瀍澗既入於河滎波既豬導菏澤被孟豬無垢曰伊瀍澗皆入洛惟洛水徑入河是伊瀍澗之水附洛水而入河也向也四水皆失故道泛濫漂溢為民之病今禹順伊瀍澗之性使復入于洛又順洛之性復合伊瀍澗之水並入于河四水又附河水入于海沇水東流為濟入于河溢為滎沇水東流則為濟濟水潛行地中自河而溢出則為滎即今滎陽是也盖濟既入于河潛行地中至滎澤又溢出也其言滎波則是滎水至堯時失其本性遂駕為波浪為民病也夫滎水本不波浪其所以然者以衆水失道並流入滎故有波浪之患矣今伊洛瀍澗既入于河衆水皆復故道故滎澤之水亦復其本性豬蓄為澤不復為民患也又曰既入既豬既導底平底定之語皆禹導之而使然也向也言其成功而不言其所以成功者今曰導菏澤被孟豬因此一字則前後之説皆煥然矣然導菏澤之水使之被孟豬之澤有所儲蓄而不泛溢非菏澤之水為孟豬之害也蕭氏曰凡言既澤豬之大也凡言既豬澤之小也導菏澤被孟豬菏澤大可導而被孟豬也東匯澤為彭蠡者對下文震澤底定則彭蠡亦小矣王氏曰於滎而言波者豈非滎澤之旁地卑而波蕩之水多今治導之則其波皆入于澤乎以菏澤地髙孟豬地卑故言導菏澤之水加被於孟豬則水患去可知張氏曰洪水既平則滎之澤可以蓄水故曰既豬導菏澤被孟豬者孟豬在菏澤之東北導其菏澤之水以被孟豬之藪則孟豬資之以為灌溉之利矣厥土惟壤下土墳壚厥田惟中上厥賦錯上中無垢曰厥土惟壤下土尚皆墳壚土性之肥美如此而田止第四賦因雜出乃為第一何也向來未有洪水之患人力不至故賦正第二今洪水既退人力加功所以雜出第一賦耳夫何故以其土性本美也如揚州厥土惟塗泥土性不美故田第九賦第七以漢考之乃歳出百萬粟以給闗中田賦何遽如此則以人力之至耳况厥土惟墳下土尚皆墳壚賦其有不為第一乎特在人力何如耳張氏曰墳言其土之脉而起壚言其土之剛而黒言下土墳壚則知惟壤者其色不一也厥田惟中上則田在第四厥賦錯上中則正賦第二或雜出第一故也王氏曰上言土下言下土則上為平地下乃地之卑者可知矣皆不言色者豈非皆土之本色不必言乎東萊曰下土墳壚見土色不一厥貢漆枲絺紵厥篚纎纊錫貢磬錯無垢曰以土性之美故陸産有漆枲絺紵地宜蠶桑故有纎纊之篚以是知聖賢貢篚皆因土地之自然不貢其所無也荆陽去冀都甚逺其待錫命則有説矣豫州比近冀都而聖賢惜人力如此以此推之則夫崇飾臺榭以為遊觀輦運土木以資妄費此聖賢所深惡矣可不警哉王氏曰枲麻也絺細葛也紵謂紵布與漆四者為貢纊綿也細綿則今之好綿盛於篚以貢磬錯謂治磬之石此微物而不常貢故有以與之而後貢浮于洛逹于河無垢曰豫州水患既平故浮洛逹河以奏冀都也豫去帝都甚邇似不必面奏即往梁州併以二州水事奏陳亦不為簡忽矣何為區區如此哉曰帝都治水患既畢尚自碣石入于河以奏事况豫州哉君命豈可忽耶想禹每治一州皆廟堂豫計次第而治之其間曲折利害有未能盡者當即面奏可否施行焉豈容自便以肆怠惰簡慢之心耶嗚呼聖賢之慮深矣張氏曰由洛然後逹河而㑹帝都華陽黒水惟梁州無垢曰嶓冢導漾岷山導江江漢之水皆發源此州是今之東西兩川及梁洋之地苐其大界東至華山之陽西至黒水耳陳氏曰東據華山之南西距黒水華山在豫州境内梁州不得華山故言華陽岷嶓既藝沱潛既道蔡蒙旅平和夷厎績無垢曰岷山在西徼外江水所出也隴西郡西嶓冢山西漢水所出也而自江别出為沱自漢别出為潛江出於岷漢出於嶓岷嶓既可以種藝則江漢之源治矣况自江漢别出為沱潛之水者安得不由其故道乎沱潛發源此州以入荆州故梁荆二州皆言沱潛也禹治水皆自其源而正之天下之事儻不正其本源而欲障隄末流豈不遽止然隄防一失為害大矣鯀失此義所以致上帝震怒禹行其所以天乃錫禹洪範九疇歟梁州之地不過岷嶓沱潛蔡蒙和夷為水所病耳一州大致盡該於此今禹治之岷嶓既藝矣沱潛既道矣蔡蒙二山可以設祭而水患平矣和夷之水亦去而治水之功成矣是梁州之所病者皆已除矣夫道修載叙乂之言皆以言其治也千百載之下欲考一州山川利病之迹可以按此而知矣王氏曰所以言底績者以其用功多故特稱其底績冀州覃懐底績亦同東萊曰旅平旅蔡蒙之山或謂禹不自有其功而歸於山川之神正不如此盖山為天地作鎮能生雲氣出水源故聖人重之後世不知鬼神之義凡山川必泥刻為人形此大失其意夫山亦是萬物中一類止者為山流者為川飛者為禽獸人在於其間亦是一類今必欲山川為人則人亦可以為山川乎厥土青黎厥田惟下上厥賦下中三錯無垢曰冀州言上上錯揚州言下上上錯豫州言錯上中此州言下中三錯孔頴逹曰多者為正小者為雜冀州言錯在正下謂本賦第一雜出第二之賦也豫州言錯上中謂本賦第二雜出第一之賦也惟揚州言下上上錯與此州言下中三錯最為難明盖言下上上錯其意言本賦第七雜出第六之賦也誠如此説何不如豫州之法曰錯上中乎曰此史官小變其辭以相發明也豫州言錯上中是本賦第二雜出其上第一之賦也然而不明言雜出其上之賦恐後世無所質正焉故於此發明曰下上本賦第七也上錯雜出其上第六之賦也以明錯字居上者謂雜出其上之賦也此史官作文之巧也如此則下中三錯兼該上下可不言而喻矣然如冀州本賦上上揚州本賦下上豫州本賦上中梁州本賦下中是其地出本賦特多而其雜出不可以為常也王氏曰凡言錯者皆不指名其物以其物微不足書故縂言錯而已厥貢璆鐡銀鏤砮磬熊羆狐貍織皮無垢曰此州貢此十物而熊羆狐貍獨貢其織皮耳璆美玉也鏤亦鐡也第其鋒剛利可以鏤物耳西傾因桓是來浮于潛逾於沔入於渭亂于河無垢曰西傾在隴西臨洮縣西南桓水出蜀郡蜀山西南行入羌中自桓入潛自潛入沔逾渭捨舟陸行潛即沔也豈有陸行入沔之理乎故知自沔陸行至渭也逾字正謂入渭而設也自渭至河中絶流而入河可以歸冀都奏事故曰亂于河也正絶流曰亂黒水西河惟雍州陳氏曰豫州當冀州之南豫冀分境則河為南河雍州當冀州之西雍冀分境則河為西河按地理志益州郡計在蜀郡西南三千餘里故滇王國也漢武帝元狩二年始開為郡郡内有黒水祠止言有其祠不知水之所在今梁雍二州之境自黒氷分後世不可考諒去雍梁二州之境壤逺矣弱水既西涇屬渭汭漆沮既從灃水攸同荆岐既旅終南惇物至于鳥鼠原隰底績至于豬野三危既宅三苖丕敘無垢曰天下之水既東趨惟弱水為西下是天下之水其性東流而弱水之性獨西流也禹行其所無事不敢於水性之外増損一毫也故導河導江導漾皆随其性使之東趨而導弱水獨至於合黎餘波入於流沙此盖隨其性而使西流也豈獨治水哉聖人之治天下無不行其所無事此天下所以亹亹然日趨於治也盖廣谷大川異地民生其間異俗剛柔遲速輕重異和器械異制衣服異宜修其教不易其俗齊其政不異其宜是亦衆水性東而亦隨其東弱水性西而亦随其西之意如商鞅變法是欲使弱水東流之比也一時隄防激發豈不勉强及力到勢大潰然一决天下已矣涇水入渭此本性也向也水失故道涇水亂流今弱水既西故涇水亦屬渭汭也渭水自鳥鼠山來地理志云隴西首陽西南有鳥鼠同穴山渭水出焉夫渭水之大受涇水漆水沮水灃水而不溢故涇水自安定涇陽縣來入渭漆水自岐山縣來入渭灃水自扶風縣來入渭沮水自北地來入渭夫以一水而受四水則渭水之大可知矣惟涇水來入于渭乃得其性故曰屬惟漆沮二水来入于渭乃得其性故曰從惟灃水來入於渭乃得其性故曰同屬也從也同也其理一耳荆山岐山以水患既退皆可旅祭豈特荆岐哉終南惇物亦可旅祭矣豈特終南惇物哉其逺如隴西鳥鼠山亦可旅祭矣深以見水患既除四境之内山川各得安其所而有司無事得講典禮也原隰詩所謂度其隰原者也豬野即地理志所謂武威縣東北休屠澤者是也禹自隰原治水成功至于豬野而後已是皆涇漆沮灃四水入于渭而不泛濫之效也向者雖竄三苖于三危洪水為害未可居止及禹使涇漆沮灃四水皆入於渭則三危之地可居而三苖之族皆得其所而大有次敘矣以此知舜之遷逐四凶終無疾惡之心必欲使之大有次序安其居止而無憂愁不聊之苦而後已此聖人之仁心也張氏曰禹之道弱水使之西流至于合黎而後入于流沙則弱水之西注可知矣夫水萬折必東水之理也今弱水既西者地勢使然也水北曰汭涇水之流連屬於渭水之北故曰涇屬漆沮自北而從之所謂漆沮既從者以其從於渭也其上則灃水自南而同之渭也荆岐二山也水退而可以旅祭矣故曰既旅繼之以終南惇物至于鳥鼠則三山亦旅可知矣蕭氏曰舜竄三苖于三危其時盖有水災其黨散處而未大敘至禹治水三危盡可居而三苖大敘矣而特其君之頑者弗即工焉史氏曰弱水有可疑者二天傾西北地不滿東南故天下之水皆趨而下之既曰弱水而其力乃能逆流而至於西可疑一也水不勝載導而使西宜矣然中國四夷皆吾民也中國雖不為患其不念西之為魚乎可疑二也東萊曰萬壑東注惟弱水之勢不可東使禹治水不順其勢必欲導之使東則弱水終不東流而水患未可盡平惟聖人深得時中之理順其勢而導之不害其為無患且天下之理自古如此春夏之時萬物生長然當時猶有枯朽之根秋冬之時萬物肅殺然當時固有發榮之實㡬曽害其為夏冬之莭世之曲士不明此理以一囬之夭一跖之夀遂疑天地之常道亦如此三苗不道竄於三危自後世觀之凡以罪流放者聴其自殘自生在所不恤聖人之心不如此方其有罪必行竄棄刑行之後施仁發政自當同及故禹治水至三危亦為畫其居宅其與漢文時所論王制不同凡禹之導山導水必窮極首尾跨渉數州故言其制别於後若其細者不能槩舉則分見諸州雍州東據河曰西河者自冀看則為西也厥土惟黄壤厥田惟上上厥賦中下厥貢惟球琳琅玕無垢曰土性不美厚加培擁所獲必多今以肥美之地棄於無用殊可惜也聖賢處事豈為此哉球琳美玉名而琅玕石似珠者以雍州之富秦漢所都使貢賦如此何以立都乎乃知禹治水之後其於貢賦闊畧簡易如此者思深慮逺不肯貽禍於萬世以啓昏君亂主之侈心也萬世之後想見其心使人抱經而歎王氏曰土色黄而無塊此則地之不甚美者而田則第一或以土性不甚美田雖美而或少故賦為第六浮于積石至于龍門西河㑹于渭汭無垢曰自積石至于龍門亦已逺矣釋水云河千里一曲一直故安國以謂千里而東千里而南河自積石順流而北又自北順流而至龍門西河凡二千里亦已逺矣此所以言至于也積石非河之源禹治雍州極于積石耳積石在金城河闗縣西南龍門山在馮翊夏陽縣北禹鑿此山以通大河此河正在冀州西界故謂之西河禹自此河入冀都奏白雍州畢工也東坡曰渭水至長安東北入河河始大自渭汭而下巨舟重載皆可以逹冀州矣如此則是言㑹渭汭之水入河非謂再入雍州也王氏曰㑹渭逆流而上此順流而浮于積石山之水至于龍門山遂至于西河乃逆水上而至于渭水之北織皮崐崘析支渠搜西戎即敘無垢曰雍州之水既治雖西戎皆得其所且致織皮之篚以效區區臣子之意也崐崙析支渠搜頴逹分渠搜為二國以解安國四國之説鄭𤣥則併為一國又以為三山而東坡直以為三國意以謂貢篚者此三國也至于言西戎即敘則不止于三國皆無水患而獲安定也顔氏曰崑崙析支渠搜三國張氏曰崑崙也析支也渠搜也皆織皮以為衣故曰織皮崑崙析支渠搜凡此三國皆西戎之地也西戎即敘者言西戎于是就功也言即敘于此則始未必即敘矣盛哉禹之烈也際天所覆極地所載無乎不被之也陽鳥攸居則動物之有及乎飛鳥草木漸包則植物之有及乎草木也島夷之皮服卉服和夷之厎績西戎之即叙逺而四夷有以及之也當時之人得以降髙丘宅平土而兔為魚之患則禹之功有補於世不為少矣陳氏曰織與皮當為三戎國貢篚之物戎國貢篚所以為即敘也導岍及岐至于荆山逾于河壺口雷首至于太岳厎柱析城至于王屋無垢曰九州分别已顯矣然山川相連固有非一州所能該盡者此禹所以于别九州之外又言導山導川之事通貫數州横厲天下使後之作者有所考焉此意亦已深矣其言導山之事自雍州始岍山在扶風東坡謂即吳岳也岐在美陽縣西北荆山有三條岍為北條以北條之山起自岍岐而逾于河以至太岳東盡碣石以入于海是河不能絶也至于山言導者以向者洪水滔天首尾不辨今水患既除使山川復其夲性隨山之勢窮極其首尾以遂其風土之宜此言導之意也豈特導水云乎哉乾坤猶一身也而山川乃其血脉耳人在天地之中其喜怒哀樂足以致鳯麟泉露之瑞召水旱札瘥之災不足怪也故記禮者謂人者天地之心則以天地之運用處乃在人也其可忽哉張氏曰導岍及岐以至于敷淺原則所導者九州之山也導弱水以至于導渭導洛則所導者九州之川也夫水之流行莫不有道因其故道而發之者導也禹之治水先導山之澗谷而納之川然後由川而導之以納于海此其先後之序也禹之治水其于九州則自下而上故始于冀終于雍其于導山則自髙而卑故始于西與西南終于南與東南盖自下而上者所以䟽水勢而使水有所泄自髙而卑者所以滌川源而使水有所通此其治有不同矣髙氏曰導岍及岐嶓冡導􅃞所導者皆山也導山者導之澗谷而納之川也導弱水導黒水導河導漾導江導沇導淮導渭導洛所導者皆川也導川者導而納之河海也其地理之逺近其水勢之髙下作書者載之注書者言之固自有序焉然益稷曰予决九河距四海濬畎澮距川與此不同何也盖水曰潤下可使在山可使過顙是豈水之性哉禹之治水自下而上先導川而後距海後導澗谷而距川則地理順而水勢便也不然則以隣國為壑是白圭治水而已故播為九河殺其决溢之患同為逆河迎其順下之勢而河已帖然歸東矣上官氏曰天下之水見於禹貢者四十有五而九川為大天下之山見於禹貢者三十有五而九山為髙夫大者既導則小者無不順矣髙者既治則卑者無不平矣此九山九川以叙於九州之後也王氏曰言導者十二盖治水則有開决隄障之事導則專于䟽滌引導之而已恐再有大水則壅塞為患亦以方治九州之時姑從其急者未暇及此及九州之水大患已去然後專導水之源故十二導者列于九州治水之後也又曰言導者皆謂治山之水山則無瀰漫之患唯有壅塞故導之耳東萊曰禹之導山有二説或謂隨山通導以視其源委脉絡或謂治山旁小水此兩説當兼用禹固相視水勢然山旁有水不應又去二匝獨以治山旁之水則水又何由知也觀其次序自可見逾于河是人逾非山逾或以為山勢連屬然既有河以絶則不可謂之逾無垢曰北條荆山既絶河而又過為壺口雷首至于太岳之山此皆河東之山也壺口在河東彘縣東而東坡乃謂太岳即霍太山孔安國謂太岳在上黨西頴逹謂太岳東近上黨故孔安國謂上黨西也信如東坡地脉之説則禹之窮察地理亦可謂神矣厎柱在陜東北析城在河東濩澤西南王屋在河東垣縣東北山之首尾如此其可輕有興動哉蒙恬塹山堙谷起臨洮訖遼水其斷地脉亂物理亦多矣太行恒山至于碣石入于海無垢曰此北條荆山自岍岐為首碣石為尾横亘東北連延以入于海而北條之地脉畢矣西傾朱圉鳥鼠至于太華無垢曰此中條山首為西傾朱圉鳥鼠迤邐至於太華也地理志云太華在京兆華陽縣南自鳥鼠東望太華甚逺乃知地脉所至雖逺而相屬也非禹窮盡地理妙通神明其能知此乎熊耳外方桐柏至于陪尾無垢曰此又中條東為太華又迤邐東南為熊耳外方桐柏陪尾也熊耳在𢎞農盧氏縣東外方嵩髙山也在潁川桐柏在南陽平氏縣陪尾在江夏安陸縣中條至此畢矣此禹隨山治水導其地脉使不相絶以相天地之常經厥功大矣陳氏曰天地猶人之一身山與川猶人之有脉絡也脉之經其行有常度而其絡則迭相貫理善導山者因其所由出而行之亦猶醫者能䟽導脉絡使復其故不能更張而易置也導嶓冢至于荆山内方至于大别無垢曰向也洪水為患山川失其常性今隨山性地脉導之使復其舊山性敷暢地脉流行使草木鳥獸各遂其生者皆禹治水導之之力也伊尹曰古有夏先后方懋厥德罔有天灾山川鬼神亦莫不寧於此可見矣荆山三條乃横厲天下之半其亦壮偉矣非禹窮盡物理知地脉所在其能順天地之性如此乎王氏曰山頂曰冢導嶓山之頂水也岷山之陽至于衡山胡氏曰自岷山之南至于衡山諸蠻小水西山細流禹皆治之東注為湖中所入大者九水合注于江則是復敘未治之水今皆治之非指岷山更言江出北言岷山之陽則是岷山之南南過諸蠻下水細流非謂大江自岷山而過衡山也過九江至于敷淺原無垢曰岷山地脉自蜀郡始迤邐至衡山又迤邐東行絶九江而至于敷淺原也九江在廬江潯陽縣南敷淺原即豫章厯陵縣南慱陽山也岷山地脉至敷淺原而止矣余以三條四列之説推其地脉相連如此則夫人生於三條四列之中者其氣均也天地為父母則條列之人皆兄弟也異形而同氣異息而同心横渠西銘之説其得造化之理乎東莱曰禹之導山者或以為三條或以為四列三條之説謂岍及碣石為一條西傾至陪尾為一條嶓冢至敷淺原為一條然内方大别在荆州岷在梁州相去數千里豈可合為一條以此知四列之説恐是自嶓冢至于大别為一列自岷山至于敷淺原為一列然岍岐嶓冢則言導西傾岷山則不言導者盖水出于此則言導水之所經則不言也

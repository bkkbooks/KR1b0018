body:
  text: 尚書精義卷四十三宋黄倫撰周公作立政無垢曰周公致政于成王其法度紀綱典章文物皆已粲然備具但欲成王擇其人以立之耳故周公作此一篇之書所以戒者無非任人之事又曰周公將告歸以謂運動天下非人不可此篇之意專以得人為説是説也豈特為成王説哉為天下萬世無窮之計也嗚呼有此天下而非其人使之共政其喪亡也必矣故歴陳夏商以為戒張氏曰治國以立政為先立政以得人為本有國而無政者如有舟航而無櫓楫有政而無人者如有櫓楫而無烝徒然則莫非政也凡正已而正物發為號令為綱紀喜而慶賞怒而刑威皆所以為政非得人以輔佐之則政不能以自立然則立政之道其大要在於得人吕氏曰無逸立政皆周公以戒成王兩篇實相表裏無逸是人主治身之道立政是人主治天下之道合兩篇看所謂合内外之道治身綱領在不敢荒寧治天下綱領在於用人然就此兩篇看何故無逸在先立政在後葢君心先正則游田觀逸聲色靡麗有不能蠧惟其本原澄澈然後可以論為治之道所以先作無逸而後作立政立政周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常壬準人綴衣虎賁周公曰嗚呼休茲知恤鮮哉無垢曰用咸戒者不特周公戒也周公率凡百執事有官君子無不盡戒葢考之於古驗之于今求之於先王之事詢之於衆人之論莫不皆然此古今不易之理也然其所以咸戒者果為何事哉曰在慎擇左右之臣而已百官之長曰常伯三公之官是也任事之臣曰常任六卿之官是也準人者上自三公下及百僚皆取以為準若今臺諌之官是也掌衣曰綴衣衞士曰虎賁此五人尊卑貴賤雖不同皆在王之左右者也王者以其一身端拱於廟堂之上朝夕親炙無非左右之人豈可非其人乎又曰有天下者其要在于立政立政之要在於慎擇左右而已周公之告成王亦非自立其説也自堯舜傳之禹湯禹湯傳之文武文武傳之周公葢有所受之矣故其後曰予旦已受人之徽言咸告孺子王矣然是道雖美知之憂之者幾何人哉曰休茲知恤鮮哉張氏曰且夫丹之所藏者赤漆之所藏者黒與善人居如入芝蘭之室久而不聞其香與不善人居如入鮑魚之肆久而不聞其臭然則王左右近習之臣雖微且衆矣尤不可不戒之也又曰孟子曰堯以不得舜為己憂舜以不得禹臯陶為己憂則古之聖人未嘗不以得人為恤也周公將陳夏商得人之盛而欲成王以此為恤故告之以此蕭氏曰葢人君之於臣也或責能而不知勞則徒休而已或知其勞而不責其能則徒恤而已吕氏曰任人牧人準人固是係天下之安危固當戒綴衣虎賁只是侍衞僕從何故與任人牧人準人同一般説而都無輕重這是周公養成成王君德深厚處大抵外朝之人人君臨朝方得入覲而人君又見其望髙德厚待之尊嚴而不敢䙝近惟侍御僕從朝夕與他親比若得一箇正人動作起居隂化黙移須到聖賢地位若有一箇讒謟面諛之人朝夕與他相處便到失德何故綴衣虎賁位最賤地最親所以不特是常任準人要得人而虎賁綴衣須要得人又曰立政綱領全在任人任人綱領在近而朝夕與居者何故氣質之所以變性習之所以移都在朝夕與居者古之人迪惟有夏乃有室大競籲俊尊上帝無垢曰此道雖美知恤者少惟有夏行是道故曰迪惟有夏此舉三代以告之也夏后天下所以大强者無他以能招賢以尊上帝耳尊上帝之道不在於玉帛粢盛牲牷器皿在於招賢而已何者招衆賢于朝廷王者與之同處一言一語一作一止至于法度綱紀典章文物無一不當於理此即所謂尊上帝也又曰人主善養其心者必親近君子疏逺小人使左右前後無一非正人以養吾之誠則是事上帝也此招呼衆賢布滿左右所以為尊上帝之道也張氏曰籲和也夫惟衆賢之和則内可以正心脩身外可以與之立政立事尊上帝之道莫大乎此迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準茲惟后矣謀面用丕訓德則乃宅人茲乃三宅無義民桀德惟乃弗作往任是惟暴德罔後無垢曰宅乃事即常任也宅乃牧即常伯也宅乃準即準人也何謂宅曰使宅其位也必如此之人使居此之位乃安耳孟子曰仁者宜在髙位不仁者而在髙位是播其惡於衆也故必能論道經邦燮理隂陽乃可以居常伯之位必能分職率屬以倡九牧乃可以居常任之位言行必能模範一世乃可以居準人之位如此乃盡為君之道耳葢為君之難莫難於任人也又曰夏之謀面用丕訓德與湯之用人惟已文武之克知宅心灼見俊心是或一道雖然知人之道堯以為難今也斷以己意而用之誠不可易必也既視其所以又觀其所由又察其所安俟之以久反覆熟識然後用之而不疑此宅人之道也又曰義民者知義之民也天地萬事皆自有義義即理也或者以義為斷是皆知義之一偏而不足以盡義知義者其孟子乎故其言曰義人之正路則凡可以行而當于理者斯可謂之義耳又曰夫暴德之與義民正相反也何以言之知義者必不暴而暴德之人决非知義之士也請言其故知義之民其舉動也若迂而甚徑若緩而甚急若難行而可持久而暴德之人一切反是張氏曰開其所未諭達其所未能所以迪之者也是是而非非善善而惡惡所以知之者也與之以誠任之以信所以忱恂之者也以其信之之深故謂之忱以其信之之徧故謂之恂曰忱恂則其信之者篤矣又曰有夏之君其所以有室大競而享國安榮者以三宅皆義民也桀承禹啟之後而不能為往昔禹啟之事自取滅亡者以其三宅無義民故也陳氏曰夏桀不能作效往古以任賢而所任者皆暴德之人安能有後吕氏曰君倡臣和乃天地之大義若人主不能知臣不能信君子賢者則養而深之不敢蹈未信而諌之戒何故坤道是不當先倡惟人主深知深信九德之行盡號召賢俊在位臣下承其休接續其美意乃敢告教厥后非君有以先倡則臣下亦不敢告教也亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德無垢曰陟升也天下之理有黜斯有陟夏之時桀不愛民故天黜之而湯以興商之時紂不愛民故天黜之而武王以興湯武之興固未嘗有求于天而天亦未嘗有私于湯武也葢天地之大德曰生其佑下民而作之君凡欲其仁斯民而已人君苟不能體天之意而以不仁加乎民則必有一仁者出矣由是一黜而一陟雖湯欲辟之有不可得者又曰所謂三俊者常伯常任準人之中其傑然者也舜之時九官十二牧禹臯陶則其傑然者湯之時伊尹萊朱仲虺之徒為輔弼而伊尹則其傑然者文王之時濟濟多士皆在位節儉正直而周公太公召公則其傑然者人君既用三宅以為股肱又得三俊以為心腹則任人之道盡矣又曰不邇聲色不殖貨利則心體昭然照映萬象三宅三俊之心一皆見于其心故成湯用三有宅則果能辨三宅之任稱三有俊果能當三俊之實則人主於聲色貨利可不視之如毒藥如仇讎而務有以屏逺之乎後世人君或不能性之而有陷於聲色貨利者盍亦戒慎乎其所不睹恐懼乎其所不聞而求所以反之之説乎如是克用三宅三俊無不可者又曰夫天地有自然之理萬物有自然之義不邇聲色不殖貨利不雜以私意而順理之自然故其在商邑用協于厥邑其在四方用丕式見德豈人人示之使其見德哉葢湯惟盡吾之心以合一邑之心故一邑之人翕然稱其美盡吾之心以脩法度施政教於四方而四方之人莫不拭目以觀盛德矣林氏曰桀有暴德天命不宥湯有明德上帝享之夫普天之下不可獨治萬幾之繁不能徧視必在乎委任賢才㑭之在位分職率屬各當其能夫然後四海之逺盡在吾目中矣葢人君以心為天下則雖逸而有餘以智御天下則雖勞而不足當與賢者共天位食天禄然後上當天之意又曰嚴者敬之而不敢慢式者法之而不敢違也言成湯能用三宅三俊之人是嚴是式其在一邑則利在一邑其在天下則利在天下何施不可何用不宜葢人君之用賢出乎爾而反乎爾用見于此而利見于彼功若至微而效為至大昔武帝不冠不見汲黯明皇臨軒以送姚崇此嚴之之意也湯之於伊尹學焉而後臣傅說之于髙宗予惟克邁乃訓此式之之意也一則至于建中于民萬邦惟懐一則至于四方之内咸仰朕德是也嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政張氏曰羞刑暴德者殘忍之人也與之同於厥邦則虐民而終至于失邦庶習逸德者怠忽之人也與之同于厥政則敗事而終至于失政夫紂德既昏而又支之而不已此所以為暋惟其暋也則其所與者非其人此其所以亡也陳氏曰羞刑暴德之人同于厥邦者虐民也逸德之人同厥政者政事不立也湯之三俊至紂而紊亂矣帝欽罰之乃伻我有夏式商受命奄甸萬姓亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯林氏曰頥之時義大矣哉言天地養萬物聖人養賢以及萬民養賢雖出于聖人之能及究其功課其效則無非上順皇天之心下從斯民之心也雖然人君任人苟不知其心而徒授之以位任之以事其不曠職者幾希孟子曰見而知之然則見之者或知有所不能盡也文武惟得三宅三俊之心所以能得民心得民心然後得天心人心既說天意自解葢天之聰明自我民聰明天之聽視自我民聽視然則得天在乎得民得民在乎得賢故夏之尊帝湯之丕釐周之敬事其揆一也而周公所稱各隨以異者葢互相發明也張氏曰夫目之所見心有所不知見之者目也知之者心也見之者外也知之者内也則灼見又未至乎克知矣于三宅言克知厥心于三俊言灼見其心此其别也文武之能克知三有宅心灼見三有俊心則與共治者皆俊乂之人此所以相與有為以欽事上帝欽事上帝則上足以奉天者也立政任人準夫牧作三事虎賁綴衣趣馬小尹左右攜僕百司庶府大都小伯藝人表臣百司太史尹伯庶常吉士司徒司馬司空亞旅夷微盧烝三亳阪尹無垢曰有德者必立政立政者不可不得人此古今之所共知也至于得人之要又在乎人君處心積慮之間惟周公一人知之耳夫人君處心積慮一或不出於正則在朝者皆小人朝多君子則政不期而自立朝多小人則政事日趨于荒亂矣此固不易之理也又曰葢天下之人嘗急於知人而苦于不自知曽不知不能自知而欲知人猶却行而求前也能自知者未有知人不精者也文武之檢察其心無一毫之私以蔽其聰明視聽者葢有素矣故周公之所稱特舉其知三有宅心見三有俊心則文武之德可知矣吕氏曰古人為治規模不惟一時間公卿有其人求賢之心遂止且如湯固有許多人又須旁求俊乂惟如此治道之所以接續無窮到此周公又告成王立政時凡在位在職大小之人都當一一留意擇别所以歴舉許多吉士大抵與六卿之人或大或小雜舉説許多雖其才固有大小德固有淺深須都是吉人才有一箇讒諂面諛之人存於其間便為害正如萬頃良田有一粒稊稗便將延蔓文王惟克厥宅心乃克立茲常事司牧人以克俊有德無垢曰夫文王司牧人皆有俊德司牧人有俊德則文王之德可見矣此天命所以歸之也夫天命之所歸必得于俊德之人以其間氣所鍾絶異于人天亦不能庸釋于我也唐虞之時所謂俊德者莫出于堯舜故天命必歸于堯舜夏商之時俊德莫出于禹湯故天命必歸于禹湯至周之時俊德宜莫出于文武天命將捨文武亦無所之矣夫以聖人之言故未嘗有所必也而記曰大德者必受命豈非知此道乎文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于茲無垢曰百官皆有職事惟人君無職事百官各率其屬脩職事以奉一人故人君獨無職事然而朝廷之尊四方之逺内有百揆四岳外有州牧侯伯必得其人盡心以脩職事而無愚懦不肖雜乎其間者此又人君之職事也人君自有人君職事故不兼百官之職事其百官之職事其大者有三曰庶言凡朝廷議論皆是也曰庶獄凡萬民獄訟皆是也曰庶慎凡天下幾事皆是也三者之在天下其來無窮而一人之智慮有盡以有盡之智慮而應無窮之事則雖竭一己之聰明日昃不食終夜不寢孜孜以求其全以之兼庶言則可也庶獄誰與治之以之兼庶獄則可也庶慎誰與圖之舉其一則違其二得于此則失于彼其終必至于天下之事一切頺敗不振而後已又孰若釋然捨去而盡以委于百官之為愈哉此文王所以罔攸兼于庶言庶獄庶慎而惟有司之牧夫知有司牧夫之賢者此乃人主之職事也亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有間之自一話一言我則末惟成德之彦以乂我受民無垢曰夏禹以籲俊尊上帝有室大競矣傳之萬世不亂可也桀一用其暴德不旋踵而敗之商湯以丕釐上帝之景命克用三宅三俊四方見德矣傳之萬世不亂可也紂一用羞刑暴德之人與夫庶習逸德之人不旋踵而又敗之至於文武以克知宅心灼見俊心乃能敬事上帝以至左右前後内外大小之臣夷狄之長小邦之尹皆有俊德之人此文武之政巍巍煌煌其業鞏固不可動摇所以並受此丕丕基者自常人觀之真萬世不拔之基其安若太山矣自聖人觀之如累卵之危何哉以夏商之盛如此及其敗亡曽不過一桀紂之昏暴則失以文武基業乃以成王冲人繼之厥惟艱哉此周公既言禹湯文武之興又言桀紂之亡又舉文武之事以誨成王葢舉逺不若舉近逺論夏商之事不若近法吾乃祖父目覩而親見之且欲使成王瞿然儆懼故先感歎以告之嗚呼予旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之林氏曰文德者治之本威武者治之助文德猶膏梁威武猶藥石養生非膏梁不可伐病非藥石不可夫當天下既富而盈既治而成太平歌於既醉守成詠于鳬鷖語其時則尚文之時也論其德則尚文之德也安敢誤于庶獄庶慎惟正為治則文德不可忘也苟不本其正則當文而武當仁而暴則是不知正矣安能為治哉吕氏曰葢獄者天下之命所以文王必明德慎罰收聚人心感召和氣皆是獄離散人心感召乖氣亦是獄所以前既説庶獄庶慎到此又説大抵事最重處只在獄何故三代之得天下只在不嗜殺人後世之所以亡亦只是折獄不慎惟是用獄之際養得一人好生之德自此發明此方能盡得君德自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之茲乃俾乂無垢曰聖人立言垂訓于天下可傳于後世者非徒以一己之訓為訓葢以先王之訓為訓也然常人之取禮也取于文獻聖人之取禮也取諸人心取之人心則必不盡然則古昔稱先王可也今乃必舉商人文王以為訓者葢已試之效人所易見無稽之事人所難明也又曰世人之觀人也觀其事而聖人之觀人也觀其心世人之觀人也觀人之心聖人之觀人心也先觀我之心繹者紬繹也既能紬繹則胷中明白如是為正如是為邪如是為聖賢之所為如是為邪人之所為格物之道無出于此君子小人一見决矣夫吾心不自能紬繹亦何以能知人哉葢吾心正則聲容色理與夫動靜語黙酬酢應對為如此吾心不正則聲容色理與夫動靜語黙應對酬酢又如此即吾心以求三宅之心則邪正之明何啻白黒之異何哉一人之心千萬人之心是也知一者無一之不知不知一者無一之能知古之人所以不下几席而坐照四方萬里之逺者用此道也使不能繹其心而區區恃吾之智術以知人往往人未必知而在我者先亂矣臨川曰克宅之謂能使之安其職業也克由之謂能行其道也克繹之謂能思繹其言也不能脩己以敬則賢人去之而小人在位其能宅之乎不能脩己以敬則自恣以易人其能由之繹之乎

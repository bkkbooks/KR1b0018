body:
  text: 尚書精義卷九宋黄倫撰夏書禹别九州隨山濬川任土作貢無垢曰洪水滔天九州莫辨禹欲治水先定九州之界然後隨九州之山濬九州之川使水復歸故道而入于海水盡土見即任其土地所出而作貢法不廢其所有不責以所無不强以難得此之謂任土作貢此聖人立言精到豐不餘一言約不失一辭孫氏曰共工氏之霸九州也其子曰后土能平九州則自堯舜禹以前天下經界亦分而為九遭洪水之時經界圮壞封圻湮没禹於是正其經界使九州各復其舊如東南距濟西北距河是為兖州北據海西距岱是為青州之類是皆髙山大川分别為九州之界也髙氏曰傳曰兩山之間必有川焉水由是而行也故隨山而後濬川又曰土地所宜風氣所有物由是而産也故任土而後作貢胡氏曰任其土地之有無多寡以制其貢故曰任土作貢蓋物之無不責之使有物之寡不責之使多任其土之所有以貢焉耳九州有貢有賦下以職供謂之貢上以取下謂之賦夏之賦亦謂之貢孟子所謂夏后氏五十而貢是也禹任土作貢故謂之禹貢張氏曰九州之别其來久矣大浸之後疆理錯亂封圻湮没禹之治水至於地平天成然後因其故而别之此九州之所以分也隨山所以刋除其障蔽濬川所以疏通其壅塞九州之水原皆出於兩山之間必有川焉隨山而濬川水有所决而泛溢之患可除矣夫然後可以任土作貢任土者任其土之所出而作為貢法則下供上也易矣是故因於土地之宜陳氏曰孟子言禹之行水行其所無事其言蓋有所考而學者不知也經曰鯀陻洪水汩陳其五行記曰鯀障洪水而殛死然則鯀之治水不能行其所無事也蓋水曰潤下知潤下之為水則禹之為治水也隨水原之所自出者濬之以為川寖寖乎水有所歸矣鯀也者障之而使東陻之而使不濫今年一堤成明年一防决歴九年而無功者汨陳其潤下之性故也東萊曰九州之界以前固然但洪水泛濫湮没了故欲治水先别其疆界九州之界既定則可下手隨山有兩意一謂隨山開導以觀水勢一謂隨山便導水隨山之脈絡相視其水勢濬其川益稷言濬畎澮距川此獨言川舉其大者而言之任土作貢任土物之宜以作貢賦之法禹貢禹敷土隨山刋木奠髙山大川無垢曰敷分也敷土即别九州之義以謂分别九州之地然後隨山之形勢以導水之歸路且又刋木之蔽障以表山路之逺近則又定髙山如五嶽者大川如四瀆者東西既辨南北已明然後導山導川可得而施功也此蓋禹初措手治水之規模也不别九州之地則大界不分不隨山則地勢髙下無從而知不刋木則道路無從而辨也不奠髙山則無以定位不奠大川則無所行水規模如此其間曲折則又推此意而造化之耳張氏曰横流之初土為水之所没則土未平夷禹於是敷而治之故謂之敷土序言隨山濬川者言其終也經言隨山刋木者言其始也蓋隨山刋木然後川可得而濬序總一篇之意故以隨山濬川言之經言治水之序故以隨山刋木言之此作書者之法也奠髙山大川者奠之為言定也髙山既定則九州之山正矣大川既定則九州之川别矣奠髙山大川則九州之封域疆界理矣胡氏曰所奠髙山者冀州之山壺口梁岐太嶽雷首厎柱析城王屋太行恒山碣石大伾青州之岱宗徐州之䝉羽嶧陽揚州之敷淺原荆州之荆山衡山内方大别豫州之熊耳内方桐柏陪尾梁州之岷山嶓冡蔡䝉雍州之岍荆岐山積石龍門西傾朱圉太華終南惇物鳥鼠三危是也所謂大川者冀州之衡漳恒衛洚水大陸兖州之雷夏灉沮九河濟漯青州之濰淄汶水徐州之淮沂大野揚州之彭蠡三江震澤荆州之江漢三澨九江沱潛雲夢豫州之伊洛瀍澗滎波菏澤孟瀦梁州之沱潛沔雍州之弱水合黎流沙涇渭漆沮澧水是也夫先言髙山大川而後列九州山水川澤者先凡而後目也已列名山大川而更言九山九川九澤者總括而結文也陳氏曰敷治也髙山九州之巨鎮也大川九州之巨浸也奠定也禹欲定九州之山川升髙而望之懼草木蔽翳故隨所至之山斬木以除蔽翳爾于斯時也水土之功未施故定者髙山大川而己冀州既載無垢曰冀堯所都也禹治水自冀州始曷為自冀州始冀州河所注也為害特甚治在所先也自冀而兖自兖而青自青而徐河水流行同歸於海然後自徐而揚自揚而荆自荆而豫自豫而梁以治江淮之水自梁而雍以治河上流梁髙於荆荆髙於揚梁荆之水從揚而入海雍髙於豫豫髙於青徐雍豫之水從青徐而入海其治水次序尚可攷也向非禹識大體先别九州之界然後隨山刋木以開水路奠髙山大川以辨四方其何能知水之所出入而治之如此其密哉禹之治水猶兵法之用兵也先登髙山以望敵之大勢某處陣堅某處陣薄某處走路也某處險地也然後避其堅而衝其薄奪其險地而扼其走路其間變化出入倒行逆施則又在將之智術如何耳禹之别九州以至奠髙山大川然後治水豈非出于此歟范氏曰冀州堯所都禹治水自帝都始故先言冀州堯都平陽冀州之域今河東晉陽是也張氏曰禹之治水始於冀州終於雍州冀州為最下而又帝之所都先其下然後水有歸矣列子曰天傾西北日月星辰就焉地不滿東南百川水潦歸焉是故水性趨下而萬折必東者自然之勢也九州之治莫先於冀由冀而東南次兖由兖而東南次青由青而東南次徐由徐而南次揚由揚而西次荆由荆而北次豫由豫而西次梁由梁而北次雍其先後之序必始於東南終於西北豈不以東南者地之最下者乎或先或後一終一始曷嘗任私智於其間哉蓋亦順導其勢而已矣壺口治梁及岐無垢曰既治壺口則梁岐之水皆治矣以言壺口之水既入於河則梁岐積水皆自壺口而通流於南河矣梁岐雍州界而言於冀州者以言梁岐水脈與壺口相連也東莱曰既治壺口治梁及岐岐梁皆是龍門左右之地水之所以為患正縁龍門狹隘壅塞其水故禹治之鑿龍門使水勢通行以此觀孟子謂禹之治水行其所無事此豈得為無事蓋鑿其所當鑿治其所當治所以為無事也推之為學豈因循不作為無事為其所當為則為無事今人治水最難聖人惟先為其難非聖人灼見此理自信之篤則憚而不為既修太原至于岳陽覃懷厎績至于衡漳無垢曰既修太原至于岳陽者以言既治太原之水沿流而至于太岳之南也太岳在太原西南上流既治則下流通利而入于南河矣衡漳在懷北覃懷厎績是先治上流也順流而下至于衡漳使漳水入渤海渤海入東河也或治東而西流或治上而下流或治下而上流皆禹一時造化知利病所在而治之不可以一途求也苐以地理考之昭然黒白分矣治天下猶治水也豈有常形哉惟知利病所在滯者興之弊者補之或寛或猛不可預定行其所無事而已吾何容心哉張氏曰太原之地水攻蕩而壞矣必將有以修之故謂之修太原覃懷近河之地也衡漳者漳水之横流也其治之非一朝一夕之力故曰厎績所以見其積功之成也王氏曰治水或言地名或言山名或言水名者言地名則以地有水瀰漫也言山名則以山有水壅塞也言水名則以水泛溢而不見故道也治山之水者自上而達之于下治地之水者自小而達之于大故初則至于川次則入于河終則歸于海歸于海則無壅塞瀰漫不見故道之患矣治水或言載或言治或言厎績其實一也欲文其辭故異其字耳冀州治水至此則無水患矣厥土惟白壤厥賦惟上上錯厥田惟中中孔武仲曰冀州者四方之衝會天下之奥宅千里之封域豈其土地所生者無足以貢于王乎何其言不及也謂内外之勢異爾冀州者天子所都之地也餘八州者諸侯所封之國也諸侯之君各以嵗時奉其國之所有以獻于王然後謂之貢貢者四海之所有而圻之内無也故兖之漆絲青之鹽絺徐之五色土揚之瑶琨篠簜荆之羽毛齒革豫之漆枲絺紵梁之銀鏤砮磬雍之球琳琅玕萃四海之珍而致之天子謂之貢焉至于冀州之域千里之内全屬于王一木材則林衡掌之矣一蒲葦則澤虞掌之矣一金錫則牧人掌之矣一禽魚則罟人􅈄人掌之矣是皆其所自有之物何貢之云哉故夫冀州不稱貢者其勢異於餘州也王氏曰田與賦皆分作九等故有上中下而上中下之間又各分之故有上上上中上下又有中上中中中下又有下上下中下下是為九等故上上為第一上中為第二以次至下下為九等又曰賦乃田與土所出故八州言賦皆在田之下惟此在田之上者傳之誤也且九州或田與土品第髙而賦則卑或田與土品第卑而賦則髙何也蓋田土論性賦論多寡故田與土品第髙者其性美也賦則品第卑者其數少也田土品第卑者其性不美也賦則品第髙者其數多也故賦與田土品第不同東萊曰水患平見其土色賦上上田中中差四等冀堯之都事事皆出於此所以特重於他州然别有所利亦與他州一般恒衛既從大陸既作島夷皮服夾右碣石入于河無垢曰從者復故道也作者耕作也謂恒衛二水既復故道則大陸可耕作也非獨大陸可耕作極冀州之東至于島夷之地水患既去皆得安其故居而衣皮服也島夷食鳥獸之肉而衣其皮此本性也以水為患失其本性今蠻夷亦得其所矣况民乎碣石海畔山碣石在海之北海在碣石之南而河又其南也禹行河逺至冀州之極處然後逆流入河以歸帝都方其入河時碣石山乃在挾掖之右此又記山川形勢所在也又曰禹治冀州水害凡四處治壺口則梁岐之水皆得入于南河治太原之水則岳陽之水亦得入于南河治覃懷之水則衡漳之水得入于東河治恒衛之水則大陸因以耕作島夷因以皮服其識利病所在一處既通則數處皆受其利非其識見窮盡水之理其能如此乎上官氏曰即中國言之則冀者北方之極揚者南方之極也青徐東方之極也雍梁西方之極也禹之治水冀州之功畢則治及于北夷故曰島夷皮服揚州之功畢則治及于南夷故曰島夷卉服青徐之功畢則治及于東夷故青曰嵎夷既畧莱夷作牧徐曰淮夷蠙珠暨魚雍梁之功畢則治及于西夷故梁曰和夷底績西傾因桓是來雍曰織皮崑崙析支渠搜西戎即敘蓋聖人以道蒞天下無内外之間故雖蠻夷亦不棄此禹之功所以在于四海而與夫以鄰國為壑者異矣東莱曰夾右碣石入于河此帝都通漕運之道凡九州必有漕運之道以一人統天下之大絲牽繩聯凡所貢賦不可無道以達于帝都也濟河惟兖州無垢曰禹既定冀州則自冀而東以治兖州之水也分别九州之疆界故定兖州分野曰濟河以為東南據濟西北距河者乃兖州也既定其大界則一州之山川不出乎濟河之間至於其間土色田賦貢篚草木則又别白而言之使人主欲知兖州風俗土地可按圖而知也有司將有所須必察其州之所出者而取之不責以所無不廢其所有不求其所難得此又禹别九州之意也其深矣哉張氏曰東南據濟西北距河兖州之界也九河之原出於積石之西其始則一流而至於兖州遂析而為九九河既道雷夏既澤灉沮會同無垢曰九河雷夏灉沮皆在兖州禹先治河使九河復歸故道雷夏復為故澤而灉沮二水復會同于雷夏則兖州之水患除矣又曰此州治水畧不及山則知兖州多平地而河患為甚也張氏曰昔之水也懷山襄陵莫知其為川也亦莫知其為澤也天下無適而非水也今也水患既平然後辨其為澤而水復有所瀦故曰雷夏既澤灉沮二水也會同則合流而為一矣髙氏曰九河既道者水有所行而不壅由其道也雷夏既澤者水有所止而不溢鍾於澤也灉沮會同者水有所合而為一始會而終同也此曰九河既道及其終則必至於同為逆河入于海此曰雷夏既澤及其終則必至於九澤既陂此曰灉沮㑹同及其終則必至於四海會同理蓋然也胡氏曰九河之未道也其過在鯀及其既道則其功在禹禹導河導洛導淮導渭導岍導嶓冢之類皆謂之導則昔之湮者今皆引而通之使適乎道為之度數而不敢私意以行焉此所謂行其所無事也潁濵曰古者五材之用於天下莫不有患幸而得聖人以治之故至于今而無傷今之天下知夫江淮之所以疏山川之所以安草木之所以生兵刃之所以割人之所以不茹毛飲血者也安知夫聖人修其教以治五行五材之難也五材之中其至柔者易䙝狎而不畏之者因以敗壞天下故堯之時水猶逆行汎濫於天下得禹而後能止方禹之治水也治河尤難以為河之所從來者髙不分其勢以殺其怒而欲專以一河受其勢可乎使後世而能守禹之所為則何患於水之為灾唯聖人為之甚勞而後世敗之甚易故至于今河水嵗溢而莫之或救蓋欲决而注之於匈奴者近乎危築堤而守之者近乎固多穿大渠而分其流則勞民而成功遲求之禹貢之遺跡而治之則今之一河又非若堯之天下皆水也然欲知夫九州之髙下與禹用功之先後則禹之行始於北方之冀自揚而還入於天下之中循豫而訖於雍凡十餘載而後功乃成使禹治水不先治之於崇髙之地而汲汲於卑濕之處則水之居於髙者必反傾而赴於下是卑濕之地未可以一用功而已天下之大川不過江淮河濟而其小者不可勝數也不流而入於四瀆之中至於海者蓋寡矣九江之相合伊洛瀍澗之入于河其勢便也若夫蓄之而不决如大野等之九澤者則又其勢也東萊曰兖最水之下流為患最深看此可見漸包與惟喬大不同禹既鑿龍門河水至此蕩激湧溢故禹不惜數百里之地疏為九河以殺其怒善治水者不與水争地禹之所捐者數百里之地凡天下可以居者皆禹之治也所捐者小所得者大以此推之人之争毫末之利而失其大能筭却是不能筭處後世河水徃徃代為人患是非河害人乃人害河蓋禹所疏之河皆湮塞而為平土之居水無所泄豈得無患大抵水為五行之首其在天地間譬如人之血氣流轉不已固不可使之涸竭亦不可使之壅蔽但令有所容乃可凡瀦澤之類皆禹不與水争地也桑土既蠶是降丘宅土無垢曰九河既復故道雷夏既復為澤灉沮二水又復會同於雷夏則水患盡除而宜桑之土可以蠶矣向也洪水滔天彌漫不辨東西何桑土之可論乎桑土既蠶是此州之民皆降髙丘而宅平土矣向也避水故各就髙丘今水患既除故皆降丘而宅土矣降丘宅土九州皆然何獨於兖州言之鄭康成之意以此州寡山而居濟河雨大流之間適遭洪水其民尤困故避水者皆在髙丘水害既除於是下丘居土以其免於厄故喜而記之以此觀禹之功亦大矣拯人人於墊溺之中而付之以安平之地生養之原然而有功如此回視畧無毫茫存於胷次至無矜伐之可見此所以為聖賢也人不學聖賢何以為人乎張氏曰桑土則土之宜桑者也既蠶則人得從事於蠶矣先王之時五畝之宅植墻下以桑匹婦蠶之則桑者民事之本也水患既除民得以力本故曰桑土既蠶是降丘宅土者横流之初上者為營窟下者為櫓巢則民之避水患者莫不陟彼髙丘矣今則降髙丘而宅平土則水患之平可知矣蕭氏曰洪水之時九州之土居民皆失其所而兖視餘州尤為甚故特言之厥土黑墳厥草惟繇厥木惟條無垢曰向也洪水為患土地草木皆失其性今九河既道雷夏既澤灉沮會同故土地草木皆復其本也禹之功非特拯人於墊溺以遂其生也雖土地草木皆依之以遂其性其功為何如哉又曰下濕田所宜也今揚州之田自漢以來累計百萬以供關中豈土地之不美哉特人工修與不修耳此又不可不正髙氏曰聖人推愛物之心一草木之㣲未嘗忽也故於徐州曰草木漸包揚州曰厥草惟夭厥木惟喬此曰厥草惟繇厥木惟條蓋以此也草木漸包則其本固矣本根固則質幹修質幹修則枝葉盛惟繇言其茂也未至於惟夭之美好惟條言其長也未至於惟喬之髙大三州之草木如此則餘州可見也厥田惟中下厥賦貞作十有三載乃同無垢曰言厥賦貞於厥田中下之下是史官刪潤以成其文也使云厥田惟中下厥賦惟中下此成何等文乎儻為第九則當云厥賦惟下下有何不可而故變文為貞乎又州自為第九何與賦事兖州所載無第九之文今遽近舍厥田之正而逺求州為第九州之説豈不迂乎余嘗疑之未敢斷也而東坡云賦當隨田髙下此其正也其不相當者蓋必有因故如向所云相補除者非其正也此州田中下賦亦中下皆第六等然後余心斷然不疑禹治水乃是舜歴試時歴試三年堯乃禪位以禹治水成功也舜受禪乃巡守分九州為十二州使水未平豈能為此乎是禹貢之作乃堯禪位舜歴試時也髙氏曰説者謂禹之治水辛壬癸甲四載而已而孟子言禹八年於外此言作十有三載乃同何也蓋九河之道皆分於兖州則土田貢賦非若他州之比水土平而後别所以敷治之功為多從役之人為衆歴嵗時為之作十有三載而與九州同功固其所也蕭氏曰洪水之患雖虞難以遽平蓋自禹治之又八年乃平獨兖州之貢賦凡十有三載乃同於餘州也東萊曰兖州水患尤甚自禹八年於外及諸州皆平約十三年乃與諸州同賦也孔氏謂禹當水初平其制賦各隨其力役漸增此以後世利心窺聖人聖人正不如此禹正欲當水患初平之時人工未盡修地力未盡闢制為貢賦之法後雖人衆地闢賦不加多藏之於民以為裕民之政厥貢漆絲厥篚織文浮于濟漯達于河無垢曰漆可以為器用之飾絲與織文可以為衣服之用因兖州所産而人工所長故因以為貢篚之數也然而使人不樂輸于上而禹科定其名使之必貢必篚是禹為聚斂之臣也切意水患既除人樂其生無可以報上之徳者斯民勤勤之意以為吾州所産者有漆絲人工所長者有織文故或貢或篚以致臣子之意若人子之獻其親也故因禹以定其數使後世不得加損責以所無而求所難得者若曰地所産者漆絲汝其必貢人工所長者織文汝亦必篚此禹所必不肯為也順流曰浮因水入水曰達以言順濟漯而下㳂流而入于帝都也入奏之間其間水勢曲折貢篚田賦細大皆一一開陳以為永久之計使帝可其奏則無復變改儻或上未合帝心下未合人意則將付之衆論以評其可否此雖不經見大抵聖賢所為例當如是耳王氏曰時已有織文之貢則此織文也必非水去之後創為此制則其來逺矣以堯禹在上而不能革後世將誰革之乎衣不必温而又為目觀之美則奢侈自堯舜前矣張氏曰順流而浮自此通彼曰達濟漯之水皆通於河故曰浮于濟漯達于河達于河則由河以會于帝都也

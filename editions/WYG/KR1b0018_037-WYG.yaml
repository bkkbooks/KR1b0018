body:
  text: 尚書精義卷三十七宋黄倫撰嗚呼皇天上帝改厥元子茲大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬無垢曰皇天上帝紂之父也紂皇天上帝之元子也然天帝以有敬德者為子紂為不敬此天帝所以改厥元子紂而以文武為元子武王既没以成王為元子受此大國殷之命也大國殷者合四海九州而有之也其大如此一旦為周家所有大之不足恃也明矣又曰恤憂也今成王雖受天命為天元子代天牧民然而不可保也貴為天子富有天下若美事也桀為天元子一旦放於南巢紂為天元子一旦獻於白旗其可憂如此嗚呼人主其柰何不以敬為事乎是敬則有無疆之休不敬則有無疆之恤矣盖方其敬時萬理皆著百邪不生於内則耳目聰明血氣和平於外則正其衣冠尊其瞻視儼然如天帝在上臨北極而拱衆星為天子而氣象如此其受無疆之休也亦奚疑哉天既遐終大邦殷之命茲殷多先哲王在天越厥後王後民茲服厥命厥終智藏瘝在夫知保抱􅂝持厥婦子以哀籲天徂厥亡出執嗚呼天亦哀於四方民其眷命用懋無垢曰天於殷本欲逺其厯數而末世有紂不知以敬存心徇目前之欲故逺見之士所以韜晦而在野快一己之樂故虐民之賊所以得志而在位夫神器之重所以能負荷者以人主心存於敬而衆智助之經營也今愚暗酷虐在位而衆智退藏安得不取覆亡乎又曰天以民為心四方民以哀呼天則天亦哀于四方民矣此自然之理天之哀也如之何眷顧改命四方勉於敬徳者付之以牧斯民之任焉於時四方勉於敬德者惟周文武父子而已朱子發曰太史公曰儒者不言鬼神而言物何也曰人之死各反其根魄體隂也故降而在下魂氣陽也故升而在上則無不之矣今也魄降而氣下之非物而何故聖人死曰神賢人死曰鬼衆人死曰物聖人清明在躬氣志如神故五帝配上帝傅説上比列星聖人得其所歸衆人則知富貴生死而已其心徳不出於心腹之間袵席之上夸張之勢自以為利焉物欲蔽之不能自反其初故謂之物以此觀之則精神之在天者哲王也宋齊愈曰智藏言君子在野瘝在言小人在位夫知保抱携持厥婦子以哀籲天徂厥亡出執言明棄不保夫君子在野小人在位民棄不保此有苖所以亡也而况於王乎紂維如此故天亦哀於四方其眷命用懋此周所以代殷而王也智以言其明瘝以言其病智者明於愛民而愚者則惟病民而已以智對瘝則知瘝者乃其愚民之所以籲天徂亡而見執於王者非獨王之罪乃惟小人之所助故也使智者在位則民其有相亡者乎臯陶曰知人則哲子曰知人者智有智明言哲王則其知人可知矣言智藏瘝在后王非哲也然則知人所以窮理自知所以盡性此稱殷先哲王而又言智藏瘝在則知召公導王以窮理之事也王其疾敬德相古先民有夏天廸從子保面稽天若今時既墜厥命今相有殷天廸格保面稽天若今時既墜厥命無垢曰夫敬徳者則天眷命不敬者則天改命其禍福曉然如此成王今嗣位可不疾行敬徳乎夫行敬者不可緩不可急緩則幾於舎苖而不耘急則幾於揠苖而助長今言敬德而使疾行可乎曰讀書者不以文害辭不以辭害意召公方言不敬則改天命故使成王急行敬徳以答天命也其疾也對不敬言之耳若夫行敬之道其間又自有造化焉如孟子所謂必有事焉而勿正心勿忘勿助長也必有事焉者非緩也而勿正非急也心勿忘即衍必有事之義勿助長即衍勿正之義此又行敬之要道也黄氏曰處天下之至變者必有以破天下之隂謀彼其胸中之鬱鬱將發而為亂者吾昭昭既暴白之矣則其勢必沮沮則折折則雖欲為而有所不能也召公之營洛也商人有在焉召公明言之曰王其疾欽徳哉今商已亡矣其民固已服命於周矣然其智則藏於中而周之病固在也彼保抱擕持厥婦子以哀籲天其欲為商而亡固不翅徂徃其逃亡而解出其囚執也夫夏之亡非商亡之也夏自亡也商之亡非周亡之也商自亡也惟不用徳故也王其鑒於夏商而疾欽德則商人雖欲叛其如周何哉夫暴揚商人之情足以解散其隂謀而勉成王之德於營洛之始也是以鎮壓天下之心而為傳世乆逺之道上焉以事君而下焉以防亂吾以知召公憂天下之深也今沖子嗣則無遺夀耉曰其稽我古人之德矧曰其有能稽謀自天無垢曰沖子謂成王今周公復辟將嗣位不可以少年鋭氣輙遺棄元老大臣也盖元老大臣深識古先哲王之心所以格物誠意與夫治天下國家之理我將稽考古人之德則於元老大臣考之元老大臣非特識古先哲王之德而已上天之心非元老大臣亦不能識之盖元老大臣之心即古先哲王之心古先哲王之心即上天之心我不遺夀耉豈特考古先哲王之徳而已上天之謀亦以元老大臣而考之張氏曰稽我古人之德則稽乎人矣稽謀自天則稽乎天也稽乎人者未若稽乎天之為至也能稽自人則於事有所證能謀自天則於理不敢違人君代天以理物則有行有為其可不稽謀自天者哉嗚呼有王雖小元子哉其丕能諴於小民今休王不敢後用顧畏於民碞無垢曰召公又歎今成王雖幼小然乃天之元子其任甚重非細事也祖宗文王武王深仁厚澤已自固結民心王今欲天下安康休美非有他道也大能信於小民則不俟終日天下皆太平矣又曰王於元老大臣所以不敢後用者以顧於人言而已碞僭也人口嘵嘵之意豈非不用元老大臣則天下失望而衆口諠譁乎古今一理也然則成王復辟儻不留周公衆口當如何王來紹上帝自服於土中旦曰其作大邑其自時配皇天毖祀於上下其自時中乂王厥有成命治民今休無垢曰上帝之意敬而已矣成王今即政是紹上帝之治也使成王躬自服行敬徳於洛邑則不辜上帝之付託矣夫王者乃繼天為政豈可以邪心私欲横於思慮乎故人君心術一不正則三辰為之變移嗚呼此豈細事也哉吾心常敬即上帝之心也以敬涖事即上帝之治也上帝把握隂陽持挈天地指揮風雨密移寒暑吾代上帝為政則又將調和隂陽彌綸天地動止風雨節制寒暑矣語至於此亦大矣誰知夫止在一敬字乎又曰於此洛邑配皇天而即政上祀天於此下祀地於此為治於此天地設位而成王為治於中以配之豈不盛哉毖慎也天地之祀非細事也其可不慎乎盖即政之始天下觀聽所望非輕不可不合人心也自旦曰至此皆周公本意言誠命之説非有意為留已也張氏曰紹上帝者言其德足以繼天也配皇天者言其道足以合天也德足以繼天帝之事也道足以合天皇之事也故成王自服其政事於土中所以紹上帝其於洛作大邑也以建中所以配皇天此其異也人君者天地之主也其於上下神祇故當毖祀之矣盖神非祀則不安定休止則祀者所以寧神也祀不致誠慤則鬼神有所不享此祀不可不謹也吕氏曰王來都於洛盖將嗣上帝中天下而立定四方之民洛乃天下之中召公又托周公之言以戒成王觀此則召誥非是告周公尤分明周公曾説作洛邑非是徒然合天心格幽明治萬民皆自此出作洛邑只要如此若王來洛邑果能如周公言做這大規模必須有大德業天命到此方可有成以治民今必休美王先服殷御事比介於我有周御事節性惟日其邁王敬作所不可不敬徳無垢曰堯舜率天下以仁而民從之桀紂率天下以暴而民從之以此觀之欲殷御事之臣比介於周成王當思有以率之成王制節其性於念慮之間不言不動而殷之御事皆惟實其行以從於我矣將見不敢慿恃血氣而惟義理之從比介於我周御事其復何從乎又曰制節其性者敬而已矣王以敬為所則民日趨於敬心開智明自然比介於我有周御事不俟驅迫矣以此觀之王其可不以敬為徳乎盖敬則不敢遺棄元老大臣則殷御事亦不敢不比介於有周御事矣我不可不監於有夏亦不可不監於有殷我不敢知曰有夏服天命惟有歴年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有歴年我不敢知曰不其延惟不敬厥德乃早墜厥命今王嗣受厥命我亦惟茲二國命嗣若功無垢曰監視也欲知敬與不敬之效請即夏商國命長短而視之盖徒視有夏一代之事或以為偶然又視有殷而照之則知敬之為德如此之大而不敬之禍乃至顛覆人社稷也嗚呼其敢少肆哉又曰夫有夏被服天命如大禹以下享歴年之乆又如桀之享祚乃不得延及子孫桀如此無他以不敬厥德故早墜其命也夫有殷受天命如成湯以下享歴年之乆又有如紂之享祚乃不得延及子孫紂如此無他亦以不敬厥德故早墜其命耳又曰桀墜厥命而湯嗣受之紂墜厥命而武王嗣受之傳至成王而成王嗣受之成王亦當惟二國之受命所以或長或短者以何故也敬徳者則有歴年不敬者則早墜厥命其道亦曉然矣成王當斷順二國有敬德之君以保有天命庶有功於祖宗耳史氏曰孔子曰知之為知之不知為不知是知也故予嘗以為君子之於命也以不知知之於此見之矣世或以為受命之有歴年與不其延盖有定矣雖修德不足以增不修德不足以損也此召公之所不敢知也王乃初服嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歴年知今我初服宅新邑肆惟王其疾敬徳王其徳之用祈天永命無垢曰王初即位如人之初生子也生而習為善則終身為善人生而習為惡則終身為惡人哲者善也善者敬也敬則明明則哲天何心哉習為哲則命以哲惡則不敬不敬則昏習為昏則命以昏命以哲則有歴年命以昏則早墜厥命是人主之受哲命非天私於人主也自貽之而已矣又曰天既無心唯人所造習為哲命以哲習為昏命以昏習為吉命以吉習為凶命以凶習為歷年命以歴年習為早墜厥命命以早墜厥命天果何心哉唯人自擇耳又曰敬德則有歷年王欲祈天永命無求之他也其惟敬徳之用而已史氏曰天生人君以為吾民之司牧莫不皆命之以哲能因其哲修身以順天命則其事必吉其數必長或恃其有哲放逸而不能自防昏亂而不能自懼其事必凶其數必短天既以哲命之君復命之吉凶命之以歴年盖以二者為人君修德欽畏治天下之資也謂已有天命謂敬不足行謂祭無益謂暴無傷此紂之所以亡歟故召公又曰王其疾敬徳王惟徳之用而祈天永命云其惟王勿以小民淫用非􅂜亦敢殄戮用乂民若有功其惟王位在徳元小民乃惟刑用於天下越王顯無垢曰其惟王勿輕視民為小民而過用非法以虐之至於果敢殄絶刑戮以為治民之道如紂之徂厥亡出執也盖敬則無小大無衆寡無敢慢其敢輕視民為小民敢過用非法以虐之敢殄絶刑戮以治之乎不敬則我心自用鄙絶輕忽視天下為無人其輕視民為小民其過用非法以虐之其敢殄絶刑戮以治之者不足怪也召公言敬德歴年以前言不敬必輕視小民敢用非法於後成王之心或前或卻當知所擇矣又曰王以敬徳在天下之上則天下將取法而見於行事是上天下地東西南北逺近内外無非吾君敬之所在矣王之為王能如此豈不光明盛大乎東坡曰古今説者以謂召公戒王過用非常之法又勸王亦須果敢殄滅殺戮以為治嗚呼殄滅殺戮桀紂之事桀紂猶有所不果而召公乃勸王使果於殄滅而無疑嗚呼儒者之叛道一至於此哉臯陶曰與其殺不辜寧失不經人主之用刑憂其不慎不憂其失不經也今召公方戒王以慎罰言未終而又勸王以果於殄滅則臯陶亦當戒舜以無失不經乎季康子問孔子曰如殺無道以就有道如何孔子曰子為政安用殺子欲善而民善矣君子之徳風小人之徳草草上之風必􅅯夫殺無道以就有道為政者之所不免其言盖未為過也而孔子惡之如此惡其恃殺以為政也今予詳考召公之言本不如説者之意盖曰勿以小民過用非法之故亦不敢於法外殄戮以治之民自用非法我自用法民自過我自不過稱罪作刑而已上下勤恤其曰我受天命丕若有夏歴年式勿替有殷歴年欲王以小民受天永命無垢曰王以敬徳在天下之上天下皆取法王之敬德而見於行事是上下勤勞憂恤惟在敬徳耳勤恤即敬徳之狀也其意曰我周以敬德受天命若有夏歴年之乆又用此敬徳無有怠惰新而又新則豈特如夏之歴年哉又將兼有殷之歴年矣盖敬徳則有年此理之必至者也張氏曰上下勤恤者言上下之人同心同徳咸知其勤恤也勤則無事於怠惰恤則無事於耽樂上下之人咸勤且恤其皆曰我周受天命丕若有夏歴年式勿替有殷歴年欲王以小民受天永命此上下勤恤之辭欲使王之永世無窮如夏殷歴年之乆也拜手稽首曰予小臣敢以王之讎民百君子越友民保受王威命明德王未有成命王亦顯我非敢勤惟恭奉幣用供王能祈天永命無垢曰召公欲率讎民百君子越友民以敬保成王威命明徳夫人喜於放怠而厭於謹飭故入放怠則為逸而入謹飭則為勞以敬為徳則常在謹飭之中常人必皆以為勞矣然召公非敢以此為勞也以為人而不敬何以為人以此為勞則是以放逸為勞矣又曰召公不敢以敬為勞成王亦不敢以敬為勞盖敬在天矣不能敬則是棄天威命能敬是祈天永命也所謂祈者非曰牲牷肥腯粢盛豐潔也敬則天是行敬乃祈天永命也召公不以敬為勞惟恭奉幣為贄見之禮以慶王之能以敬祈天永命也吕氏曰百君子是未從我者友民是已化者我敢以此兩等民保受王之威命明徳召公前面既説是王先服殷御事比介於我有周御事既告成王合而為一了到這裏却又分讎民與友民者何故前面自心而言後面自勢而言自心言之人君當一視同仁合商周為一自勢言之今有所謂讎民有所謂友民尚未得他皆從化至於純一正要得撫摩教化他召公所以言讎民者只因成王之時商民尚在伺候成王手差脚跌便來乘間投隙其勢甚可畏此只欲警戒成王初不是分為二體

body:
  text: 尚書精義卷四十四宋黄倫撰國則罔有立政用憸人不訓于徳是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家無垢曰世之言立政者必曰作法考制立經陳紀為一代不刋之典殊不知有治人無治法故人君能繹其心則能立政矣能立政則必不用憸人矣何以知之吾心既正則所好者天下之善所惡者天下之惡所惡既當則其視憸人如惡惡臭如見怪物聆其語言聲音若將凂我者矣故與圖事者皆天下之君子此立政之本也苟不先正其心則天下之善有逆己而惡之者矣天下之惡有順己而好之者矣顛倒錯亂無所執守而與憸人性合則其所用者皆天下之小人也所謂憸人者傾巧敏給之人詐足以飾非辨足以拒諌得其心則舉桀紂為堯舜失其意則毁伯夷為跖蹻其言可喜可愕聴之令人忘倦退而考察此言無一是者然人君或用之則是無他故是不知立政之道知立政之道決不用憸人矣林氏曰國家無政則君子退而小人進是憸人得志憸人既得志則不順其徳而惟邪是行則天下無顯著之迹求其令聞譽者無有也自今而後立政任人安可以憸人自用其惟吉徳斯能勱相我國家以隆此不㧞之基也今文子文孫孺子王矣其勿誤于庻獄惟有司之牧夫張氏曰先王以不忍之心行不忍之政其于刑罰皆不得已而用之故立政之篇其于庶獄尤在所諄諄也周公于此又告成王使之勿誤于庶獄惟有司之牧夫者先王建官不必盡賢必得賢者以為之率此有司之牧夫又在所當慎而不可誤也吕氏曰周公憂王室之深成王之幼所以至三兩遍説庶獄葢人君有天下非不嗜殺人則做不得周公所以諄復言之都不覺得諄復其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈林氏曰無怠無荒四夷來王夫人必自侮然後人侮之國必自伐然後人伐之苟于政之不修徳之不備而欲責人之不服是猶却行而求前無藥而除病多見其不能為也夫刑罰不可弛于國鞭笞不可亡于家惟能詰其戎以陟禹之迹則威之所加化之所被無遠不服無幽不届四夷百蠻罔不率俾東西南北無思不服然後可以對文王之大徳成武王之丕業其功豈不大哉晁無咎曰治至于可用師者治之成故善人為邦至于可以即戎而後為功也豈非詰戎兵者政之終歟故詩曰閔予小子遭家不造又曰蹻蹻王之造盖當時成王初即政濫溢者未收泮渙者未圖則法度未立而功未成故曰不造告成大武則成王既除䘮而即政其武功足以嗣其先君故曰蹻蹻王之造葢言成王寵受武王之成功而能蹻蹻然征伐四方以成祖考之業王業于是乎成矣張氏曰文王之徳光于四方則其徳之光可知矣周之大勲集于武王則其烈之大可知矣為之子孫者能繼承嗣續而粉澤藻飾之則前人之功徳不至于泯滅矣以覲文王之耿光者言能昭文王之徳光使夫天下之目同見以揚武王之大烈者言能稱武王之大功使其愈久而愈不墜然則成王之所以持盈守成之道在此而已嗚呼繼自今後王立政其惟克用常人無垢曰暴徳之人與夫逸徳之人皆血氣為之也血氣之急者必暴血氣之緩者必逸暴者行其一切之政必有淫刑濫罰使人無所措其手足謂之常人可乎逸則萬事不理機㑹之來必將委而不治謂之常人可乎若夫常徳之人初未嘗暴也理義所當急者未嘗緩而失事未嘗逸也理義所當緩者亦未嘗急而傷民終始前後不變其節惟理義之所歸誠得若人者而用之政不足立矣又曰成湯之不邇聲色不殖貨利求此常也文王之罔攸兼乎庶言庶獄庻慎亦求此常也武王之率惟敉功率惟此常也周公所謂時則勿有間之者勿間此常也所謂克由繹之者繹此常也吾之徳既常矣則朝廷之上皆常徳朝廷之上皆常徳則發一號出一令法度紀綱賞罰刑政典章文物禮樂庶事莫不井井乎其不可亂秩秩乎其不可紊其有暴横之賦斂以朘民之膏血乎其有苛刻之刑政以傷民之肌體乎其有黷武窮兵争城拓地之舉鬭民于鋒刃之下乎使斯人尊之如神明愛之如父母信之重之如四時如金石可殺可辱而不可使之為亂也此常人見用之功也張氏曰臯陶之戒舜則曰彰厥有常吉哉伊尹之戒太甲則曰常厥徳保厥位然則立政用人之道其可以不用常人乎故周公于立政時申誥之以此周公若曰太史司宼蘇公式敬爾由獄以長我王國兹式有慎以列用中罰張氏曰成王之時能得人以立政則教化為己明習俗為己成為司宼之所慎用者惟中罰而已周官刑亂國用重典刑新國用輕典刑平國用中典以列用中罰者中典之謂也成王既黜殷命滅淮夷還歸在豐作周官無垢曰成王由周公克由繹之之説深得用人之術思為天下後世計乃以其所見作為周官以謂必如是者乃為三公必如是者乃為三孤如是者為冢宰如是者為司徒以至為司馬為司宼且總告别告以為子孫之守使子孫髙明者得其心而常才者得免過居位者有此才則無愧無此才則懐羞其有補於人主也大矣周官惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承徳歸于宗周董正治官林氏曰朝廷政教之權輿政教百官之綱紀人君之於天下正身以正朝廷正朝廷以正百官始之不正終莫克正昔文王之時在位皆節儉正直徳如羔羊先後禦侮奔奏疏附莫匪正人棫樸之詩美其能官人成王者繼文武之丕緒紹祖宗之令猷持盈守成神祇安樂人人有士君子之行其作人有道官人有法雖百僚之間皆有忠嘉正直之行不必飭戒而自循董正而自治而成王於此猶云董正者何哉葢既黜殷命滅淮夷尚慮朝廷之顯人左右之百官蹈其遺風染其舊惡不能自正成王歸于宗周正當閒暇之時得不修其政刑而復其治官乎史氏曰致治甚易求所以致治者不易安邦非難求所以保邦者惟難昔成王承文武之大業徳未著於人道未孚於下於是撫萬邦而使之服命巡侯甸而使之述職諸侯之不庭者征之兆民之不安者綏之六服羣辟自是奔走服役而皆知所畏治可謂已致邦可謂已安矣然成王制治于未亂保邦於未危其謀猶汲汲也歸于宗周董正治事之官所以為子孫憑藉扶持之計長乆逺大之法何其至哉張氏曰萬邦為逺矣故撫之侯甸為近矣故巡之撫之者所以致其美而其事畧巡之者所以致其察而其事詳四征弗庭所以誅惡也而惡者有所畏綏厥兆民所以佑善也而善者有所怙當周之時六服羣辟罔不承徳則天子之徳意志慮得以下達也此成王之歸于周所以董正治官也王曰若昔大猷制治于未亂保邦于未危張氏曰圖治者必在夫未亂圖安者必在夫未危亂而後思治危而後思安則無如之何矣古之人作炳於忽𦕈綿之際用智於未奔沉之前者此也曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂眀王立政不惟其官惟其人無垢曰唐虞去上古未逺民淳事簡此所以建官百而已内止責成於百揆四嶽外止責成於州牧侯伯而内外庶政無不和協天下萬國無不安寧矣夏商民漸澆浮事漸叢大此所以不及唐虞之簡静而建官有倍於唐虞也建官雖倍亦僅能無危亂而已豈敢復望惟和咸寧之盛乎大抵眀王立政不惟其官之衆多惟在得其人而已觀成王此言其亦心地眀白而乃能自立名言矣此葢周公保佑之力而力學克由繹之之效也東坡曰唐虞官百而天下治夏商曷為倍之徳衰而政卑也堯舜官天下不為患失之憂故任人而不任法人人得自盡也故法簡官少而事省夏商家天下惟恐失之不敢以付人人與法相持而行故法繁官多而事冗後世徳愈衰政愈卑人愈不信而一付之法吏不敢任事相倚以苟免法愈亂官愈多事愈不舉人主知此則智矣又曰天下之事古畧而今詳天下之官古寡而今衆聖人非有意於其間勢則然也火化之始燔黍捭豚以為靡矣至周而醯醢之屬至百二十甕棟宇之始茆茨采椽以為泰矣至周九尺之室山節􅇨梲聖人隨世而用之節文豈得已哉又曰聖人不以官之衆寡論治亂者以為治亂在徳而不在官之衆寡也今予小子祗勤于徳夙夜不逮仰惟前代時若訓迪厥官立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人林氏曰君子與上下同流人和則天地之和應上下之理雖殊交感之情不異今夫三公之官師道則尊傅道則親保則尤親親則幾於䙝而不嚴故師尊於傅傅尊於保此三者皆以道為事而佐王者也夫隂陽者天之事經邦者人之事論道而後能經邦經邦而後能燮理隂陽非以道佐主至公無私者疇克任爾又曰天能天而不能地地能地而不能天孰主張是孰維持是必有主之者耳大臣特立而無朋故曰孤化待徳而後立天地待隂陽而後立此三公之任特燮理隂陽耳至三孤之任言寅亮天地者惟道足以握造化之權故先隂陽而調之惟徳足以贊化育之妙故後天地而奉之天地之化不能無愆我則範圍而罔棄曲成而不遺使自生自育若形若色舉皆自遂而無夭閼之患者孰謂非寅亮之功乎天地之道本以固存我則輔相而罔闕裁成而不虧使亘古亘今作晝作夜流通不窮而無凝滯之患者孰謂非寅亮之徳乎此則三孤之官所以不得不立也史氏曰其任專則其責重其責重則其選不容輕甚矣三公之官不可以輕授也師所以傳其道傅所以作其徳保所以保其躬各專其職如鼎足之承君其任不亦專乎講論道義以正君經綸邦國以治民燮理隂陽以事天苟失一職則三者不治其責不亦重乎責既重矣若無全材宿徳之人以居其官其敢虚冒而輕議哉吕氏曰三公之職朝夕納誨格人主之非心處便是燮理隂陽處何故人主之心乃萬化之原一都一俞論道間使人主果識本源於本源處轉移得時上則日月星辰無不順其序下則山川草木無不得其性這是三公之職惟命世間出之材然後可居若不能論道經邦不知天之精㣲無縁居得此職官不必備惟其人則居之無其人則缺之此見三公之職甚重處不敢説常有其人冢宰掌邦治統百官均四海東坡曰政教禮刑無所不掌謂之邦治而百官總已以聽焉故冢宰為天官必三公兼之餘卿或特命無垢曰陳平曰宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職則成王命冢宰之説盡見於平之説矣林氏曰為治之道必有其要人君之職在論其官苟得其人則内而百官有以倡率外而四海得以平定其倡率之也則有倫有要作綱作紀而咸得其序非統而何其平定之也則或逺或近或多或寡咸得其正非均而何吕氏曰古之稱宰相者多以平為主在商則謂之阿衡衡平之謂也天之所以立君命相者不過欲平天下之所不平者爾使四海之内貴者貴賤者賤耕者耕織者織士農工商鰥寡孤獨事事物物咸適其宜是冢宰均平天下之道均之一字是宰相之大綱不是要作聰眀别有職分均是易簡道理天下本無事須是識得易簡道理方盡冢宰之職司徒掌邦教敷五典擾兆民林氏曰天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉典雖天敘非人安能惇之禮雖天秩非人安能庸之今也司徒之任掌其邦教使其父子有親兄弟有順朋友有信夫婦有别長幼有敘舉皆擾之使懽忻和睦之心油然而生乖争陵犯之變無自而作則知司徒之官安可後邪宗伯掌邦禮治神人和上下無垢曰禮者理也神人皆自有理吾因神人之理使之各安其分非曰治乎昔九黎亂徳神人雜揉不可方物堯命重黎絶地天通此治之之實也上下言和者和之者亦禮也上下尊卑各自有理吾因其理而調和之使情意交通者和也林氏曰神人雜揉上下紊亂此害教之大者也苟能因其禮而為之節文循自然之序辨事類之情天地自天地隂陽自隂陽不相瀆亂咸正常經則其理胡可廢尊卑自尊卑長幼自長幼而順其常理正其人倫則其道不可没非宗伯疇能治之司馬掌邦政統六師平邦國無垢曰夫周官之法居則為六鄉之民出則為六軍之師司馬實掌國之戎馬之職六師之所繫焉者也其職曰馮弱犯寡則眚之賊賢害民則伐之暴内凌外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之平邦國之義可見矣林氏曰强凌弱衆暴寡苟非平之則乖亂而難治參差而不齊此禍亂之階也欲治其平非興師以理之則安能效順此司馬之任不可闕也夫司馬六軍之長使之統治六師而已如在秋官之職負固不服則誅之賊賢害能則誅之苟或興師動衆以及窮兵玩武非弔民伐罪惟逞意肆欲則非建官之意也惟在平之則邦國無有不治矣司寇掌邦禁詰姦慝刑暴亂林氏曰治於己然而未若見於未然刑於己至而未若戢於未至夫先王之立刑法於天下惟恐天下之人入於其中而不能自出故明示利害之端使之心知而誠服曰如是之罪必蹈如是之刑如是之惡必麗如是之辟俾之知所畏懼而無自陷於機穽也故司宼之職特掌邦禁而已及其罪大而不可掩惡積而不可解不得已而後加之刑則聖人建官之意可謂忠厚矣姦慝者所以為暴亂故詰之暴亂者姦慝之加於人故刑之張氏曰完而支之者宼也人物之養趨完而已彼完而我支之是以有刑此刑官所以謂之司宼姦慝者暴亂之未施暴亂者姦慝之已著於姦慝言詰於暴亂言刑刑之所施將以除暴亂故也司空掌邦土居四民時地利無垢曰上有徳化待君子又有兵刑俟小人則四民皆安其居而相地利以種藝為長久之業矣使綱紀紊亂小人無所懼君子無所怙民欲安其居得乎六官之職其不可闕一如此上法於天地四時此葢眀天理之不可易也林氏曰先六典之職各言其事至此無復有事矣但使四民各以其職分地而處然後因地之利而定其居焉宫室城郭之制川塗澮洫之施故司空之職當察地利而修之以時是也六卿分職各率其屬以倡九牧阜成兆民無垢曰有其人則傳無其人則絶絶則天下亂矣故自其所得創為此一大典立三公六卿之官分三公六卿之職使子孫見有此徳此才者乃使居此位而使居此位者知吾所職在此不如此則為曠職為無窮之羞其用意亦以勤矣又曰六卿得其人九牧效其職則民自然皆得其所矣葢治教政刑禮事中無一事意不在民者葢聖人本心止為民設爾是知古先聖王其愛敬民乃至如此後世乃借官職之勢以凌虐下民漫無忌憚其欺天也甚矣林氏曰先王建官必使小大相維内外相聨如尾之應首臂之運指然後政無不舉治無不成也又曰夫天地之道非運六子不能成嵗聖人之治非任六卿則不能舉治政使天地切切自為而不付以六子吾知天地亦天地耳求其成功無有也使聖人規規自營而不建以六卿吾知聖人亦聖人耳求其舉治者無有也夫然後以倡九牧以阜兆民此其效也六年五服一朝又六年王乃時巡考制度于四岳諸侯各朝于方岳大明黜陟林氏曰虞舜之時一年東方諸侯來朝則赴禴祭之禮二年西方諸侯來朝則赴祠祭之禮三年南方諸侯來朝則赴烝祭之禮四年北方諸侯來朝則赴嘗祭之禮至成周則異於是毎嵗則一服入見故更六年而五服各一朝也更十二年五服兩朝王然後巡守於春則東於夏則南於秋則西於冬則北故諸侯各朝于方岳王者於是觀四方之風俗察政刑之醇疵考其行能審其治績修制度而増損之使有便於時而無負於民也當是之時十二嵗一出而不患其疏者葢有大行人小行人撢人之類絡繹於道路審究其利病王不必躬行而周知天下之故殆如目之所睹無可逃者是使内外之服逺近之民莫不向風也胡氏曰諸侯朝雖不可弛然責之煩則下有不勝之勞期之數則人有咨怨之心何則由侯而至於甸由甸而至於采衛道途之遼逺山川之險阻其造於王非旦暮所可及責之煩期之數則席不暇煖者有之肩不及息者有之尚何撫邦境宣徳惠之有哉五服一朝必以六嵗為節焉聶次山曰茅土之封星列非一人邦國之建鱗比非一所徳教有行有不行法則有修與不修度量或不同歟瑞節或不達歟人主不下几席雖殫一己聰眀烏能周知徧察哉必因巡守以眀其黜陟焉黜之者所以罰惡也先王之義也陟之者所以賞善也先王之仁也先王之取諸侯仁義而已仁義一行則威愛兩得此所以能使之敵王愾而蕃王室也王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懐學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官無垢曰夫公則無私私必不公公與私常相為勝負公勝則私滅私勝則公亦亡矣嗚呼私心勝而公道亡此亂亡之基也安可不謹乎欲滅此私心以何道哉公而已矣公何自而識之哉惟學古先聖王之道可也古先聖王之道非一己之私心也乃天下之公心也又曰曲學偏見妄以私心窺測聖人以謂道在於我乃以其私心發於利口别立新法盡廢故事其持之有故其言之成理其害天下國家而穿鑿聖心破碎大道有不可勝誅者按而行之國家典常盡皆廢墜苟簡自恣之風成而循理奉法之心亡亂厥官矣罪莫大焉有官君子所宜深戒也公孫疆之亡曹王莽之篡漢皆如是而已矣林氏曰靖共爾位好是正直左局右局各司其局無以小加大無以彼亂此咸事各率其屬敬之而不敢慢循之而不敢違此欽乃攸司之意也又曰天下有同然之是非斯民有同然之好惡得其所同然還以導之雖不強之使從駈之使服而民將心悦而誠服罔有不懐矣葢狥私欲者不足以得民立私黨者不足以得民私欲一勝則窮奢極侈適所以擾民私黨一奮則分守不明適所以亂民也惟在大公之道曉然示之則其心有不可解者其允懐豈不信哉蓄疑敗謀怠忽荒政不學墻靣莅事惟煩無垢曰暗則疑疑則好為異論故敗謀無志則怠忽怠忽則常失機㑹故荒政有官君子而使濁暗無志之流居其間其敗謀荒政也必矣此非有官君子所當自勉亦人君所宜謹擇也張氏曰天下之事是非可否之相攻相勝雖智者處之不能無疑疑而蓄之則其惑愈甚而終莫之解此謀之所以敗也古之聖人其有疑明必謀之卿士庶人幽必謀之鬼神卜筮然後可以建功立事又况夫有官君子其可不知此哉又曰不學墻面者言其蔽而無所見也莅事惟煩者言其勞而不知要也古之人必學然後從政未聞以政學者戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱温公曰傳曰决者智之君疑署事之蠹蔽近習之知則疏逺有所不能入受先入之説則忠者有所不能盡所養未厚所資未深則辨是非不早計利害不熟决意有為而悔吝乗之矣能無疑乎要之問學以窮理虚一以迪心考之以古今之成敗騐之以事物之情偽参而伍之觸類而長之則天下之理迎刃而解矣又曰昭帝斷於任霍光則能破燕上官之詐憲宗斷於信裴度則能成平蔡之功如其膠於紛紜之説則䘮其資斧尚能成大功乎元帝牽制文藝非不善也然優游不斷而業為之衰又况執狐疑之心以來讒賊之口持不斷之意以開羣枉之門者乎林氏曰坐而論道謂之三公作而行之謂之大夫卿士職業異於士夫故别為之戒不自立者無以與天下之務不自勉者無以成天下之功㳺豫不正者安能定事苟簡自棄者自遺其咎張氏曰所以濟者謂之功所以成功者謂之業功以志崇若夫柔懦而無志則功無自而崇業以勤廣若夫怠惰而不勤則業無自而廣矣知所以崇功廣業又在夫及時若夫猶豫失時不能無後患也且天下之事當成於敢為發於莫之為則將欲建功業者故不可不果斷惟果斷足以有行然後可以無後患也位不期驕禄不期侈恭儉惟徳無載爾偽作徳心逸日休作偽心勞日拙無垢日治驕當以恭治侈當以儉出恭儉當以徳不學之人位髙則驕禄厚則侈知驕侈不可為則偽為恭儉以沽衆譽其病如此則以不學故也不學則不能格物不能格物則不能知至不能知至則不能誠意意不誠則是恭儉乃所以行其偽耳又曰作徳者以誠為恭儉也雖闇室屋漏之中常若在青天白日之下雖居床第袵席之上常若在大賔大客之前其心如此則仰無愧俯不怍所以常安逸也自至誠中行日見聖人之心日履聖賢之行日休之説豈曰不然若夫作偽之人其恭儉非真也皆以偽而為之耳其閒居為不善無所不至見君子而後厭然掩其不善而著其善人之視己如見其肺肝然則何益矣其心如此不亦勞乎彼將防於東而又敗於西成於明而又敗於闇取笑天下貽羞家門日拙之説豈曰不然夫卿士病在驕侈而偽在恭儉成王既指其病而障其偽前挽後推其必知所歸矣居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政庬舉能其官惟爾之能稱匪其人惟爾不任無垢曰位至卿士則亦寵矣見其寵而忘其危則身辱家破可不畏哉不見其寵而思其危處則謙謙之恭如集于木惴惴之心如臨于谷戰戰兢兢如臨深淵如履薄氷其視爵位無非可畏者其敢恃寵而驕侈哉儻惟不畏禍不旋踵矣霍光梁冀滅門破族聖人豈欺人哉又曰作徳之人好賢樂善作偽之人妒賢嫉能好賢故見賢者則推舉之樂善故見能者則遜讓之推遜之風既成於上則雍穆之風自就於下庶官乃和卿士推賢讓能之力也夫使作偽之人為卿士不特妒賢嫉能使乖爭凌奪習為風俗也而便文自安嫁禍自利人人如此政其有不亂乎庬亂也又曰天下事未有不自已出者舉六官之屬而屬皆能其官是惟我能其官也使舉六官一有不得其人是惟我不勝其任也其敢責諸人乎孟子曰愛人不親反其仁治人不治反其智禮人不荅反其敬行有不得者皆反求諸己其身正而天下歸之其斯之謂歟張氏曰賢有徳者也推而上之則在位者得以其徳顯能有才者也讓而先之則在職者得以其才達大臣能推賢讓能則庶官莫不化也王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁無垢曰安民者人主之職助君以安民者三事以至大夫之職使四海之内有一夫不獲其所豈特人主之病哉亦三事以至大夫輔助之不至也夫三公論道三孤洪化六卿分職以倡九牧為何事哉為民而已矣一民不安則是四海之内有厭苦之政者為政而使人厭苦是人主之罪也為臣子而使人主為民所厭苦是三事以至大夫輔助之罪也斁之為言厭苦也臨川曰自下助上謂之佐自上助下謂之佑今此申飭羣臣而曰佑乃辟者葢屈己尊賢畏衆之辭天之所以立君而君所以設官分職者皆以安民而已民安則天下樂推而不厭林氏曰人主之職在於一相一相之職在於正百官始戒以有官君子中戒以卿士及其終也又言三公及於大夫丁寧反復不啻若慈父之訓子弟寛而柔順而和焉其曰欽爾有官治于爾政當輔我一人永安下民將使萬物樂而無厭永永無窮也
